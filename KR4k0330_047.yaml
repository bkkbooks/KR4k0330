body:
  text: 第四十七回鳳凰台大開武選元世祖二十八年上都太原等處大飢平陽地震世祖禦殿各處奏知下令賑恤右丞何榮祖奏曰淮南自耶律淵陳亡後行省參政梅殷相繼戰死壽陽不能討平陛下須詔文武會議討賊一事世祖即定右丞相完澤問以平賊方略完澤奏曰壽陽合郡賊盤踞已久區區徵調人馬無多京師宿多物故者精兵亦少不如即命集慶路安撫自行招募伺便圖之一舉兩得世祖允奏即傳此詔達至建康時行省安撫乃宣徽北院使塔思不花一接此旨即大閲士卒武備一新與僚佐商議再行設法招募以充行伍有廣陵府統制鞠弋仲曰招募之法前梅參政已於淮南行之安撫欲選武略何不竟設武科俾天下英雄盡赴建康選取安撫親行典試拔其尤者練成一隊為常勝軍餘則分列各部至選將之道則以萬人敵者為上將次者副之又次者將為裨將大選十八日命自相角勝則技藝盡矣塔思不花喜曰不拘資格不限貴賤而以能者為尊大選十八日十萬師不難聚也壽陽聞之亦足以奪其氣矣淮安兵馬使臧凱進曰安撫既開武選須高設一台臺上陳設詔命誥敕獎賞等項台下角藝勝者升台受賞填寫誥身補作某官某秩至考取之法首韜略次弓矢雜藝次強大有力一材一技皆分別録用更宜設一典試都監須足智多謀勇冠三軍方可當之塔思不花撫掌稱善曰都監之設凡應選者須與比試有能勝過都監者方得上臺受賞任職否則仍歸卒伍如此不惟選舉不濫亦足為朝廷生色即有松江統制裴金仙京口都督彭悅齊聲曰典試都監之任非鎮海將軍戚璘不可時戚璘亦在座中安撫欠身揖之戚璘起立曰安撫為平賊起見大開武選璘不才願以郭隗自任安撫塔思不花大喜即傳令出榜曉諭遠近限以三月內齊集建康應選一面擇地建台府尹周岐政曰建康乃文獻之邦遍是名勝然無過城西鳳凰台即今之保寧寺也宋元嘉中以鳳凰曾降此山故建台唐宋以來名人多有題詠李白所謂三山半落青天外二水中分白鷺洲是也昔南朝陳將吳明徹亦在此山練兵伐魏安撫即就此處建台揆文奮武亦有聲有色矣塔思不花從之即委官吏預為應供凡選場應用器物等項無不兼備惟候英雄畢集登臺閲武此信一出遠近無不周知時登州府萊陽縣高麗村有一人復姓勾龍名闊海力能扛鼎稍涉書史不事生産落拓有大志一聞此令不覺技癢數千里赴選一至建康見人山人海凡一技一長者無不來歸以求録用不數日安撫使見期限已逾應選者亦已畢集訂期於上月初六日起至草四日止先期射策以衡武略次則角藝以校武力又與文武將校等擬就各款條例二十則張挂台下若能中選依次擢用衆人至初六日皆紛紛攘攘爭往獻策安撫與僚佐等逐一閲畢大驚曰似此選舉焉能拔十得五也就中熟諳韜略者不過十數人而已若不分別去取則玞玉莫辨若概用收録又濫於取材欲僅録此十餘人又恐阻天下應選之意奈何都監戚璘進曰安撫開選不專用射策取韜略也待角藝比武後則優劣定矣安撫允之次日戚都監結束停當令台下校射能于百步外箭中紅心者上賞戚都監下令畢即下臺縱馬連發三矢從此中紅心只見台左湧出一少年壯士自稱南陽史忠都監之射不足為奇亦縱馬連發三矢不上不下不左不右皆一貫出之戚璘贊聲未已台西又出一碧眼紫髯者大呼淮北馬昌連放二矢而於末後一箭反背射之亦中紅心史忠驚訝馬昌面有得色忽台東湧出一人面如重棗大呼巨鹿人韓雙待某射來控馬上前三矢更反背而發俱一貫出之臺上安撫暗暗喝采命從官注記分明一時爭奇賽勝射無休息校射三日畢更演槍法及各般武藝亦是都監戚璘首先出馬大呼應選者能與某力戰三百合否一時應聲而出者不數合俱被戚者監戰敗末後有遼西耶律霸者挺槍上前大戰五十余合戚都監力乏方欲退下不提防耶律霸暗掣銅鞭在手喝聲著中戚璘負痛而走戚璘弟戚璠在臺上大怒縱馬下臺耶律霸接住又戰三十餘合戚璠抵敵不住右臂業已被創鮮血進流帶傷而逃有壽陽將閻飛熊暗在隊中看定二人皆敗勒馬殺出不數合耶律霸量不能敵虛掩一槍便走隨有韓雙手挽雙刀而出力戰二十餘合見力不能勝遂暗發紫金標思以中之連發三標俱被閻飛熊接去回手一鏢韓雙幾乎墜馬史忠馬昌雙馬齊奔不三合皆敗又有漢陽賊將白文狻宋羅睺在隊中見閻飛熊戰敗數將大怒出馬壽陽項嗣昌恐傷同伴急驟馬上前助戰臺上早有人認識四人者暗暗告知安撫安撫大驚急令諸將下臺拿獲都監戚璘曰不可四賊驍勇異常諸將又全無準備造次妄動倘選場一亂將如之何不如聽其爭戰兩虎競勝必有一傷塔思不花已驚得六神無主惟令諸將緊護台下不可稍離只見四人惡戰不已勾龍闊海暗思此時可出馬矣從中殺出撇開四將左右敵住四將暗吃驚隨與交鋒殊不知四將鏖戰半晌業已力乏不數合早被勾龍闊海槍挑宋羅睺鐧打項嗣昌一齊敗下臺上戚都監大呼戰勝者登臺填爵受賞勾龍闊海甚喜正欲上臺準知壽陽張師旦暗藏台下從人叢中覷定臺上暗發一矢安撫塔思不花應弦而倒臺上下一時大亂閻飛熊項嗣昌欲殺上臺去有裴金仙鞠弋仲臧凱等忙掣劍阻定而漢陽賊將白文狻宋羅睺倪雕兒汪夜義四人偷入建康思從中取事亦乘亂殺出幸有勾龍闊海奮勇抵敵四將戚都監兄弟分頭迎敵有耶律霸史忠馬昌韓雙應選諸英雄一時分別不出惟助戚都監弟兄往來截殺頃刻間鳳凰台下校場改作戰場兵民相雜各難分辨踐踏死者不計其數壽陽賊將耿青乘亂混入城中縱火焚倉廩糧草一空有集慶村花山賊莫天夜等三十六人亦乘亂劫了寶藏庫而走及官軍來追時業已去遠時變起倉卒又五號令東西奔走處處救應處處俱不及救應幸得勾龍闊海戰退白文狻等四將又來助裴金仙等夾攻壽陽三將當下項嗣昌為流矢所中張師旦閻飛熊漸不能支刺斜殺出便走裴金仙等亦不暇追趕急來保護安撫且幸受傷猶輕拔出箭頭用藥傅上簇擁回府戚都監等已撲滅了火迎入府中衆將齊伏地請罪疏於防範安撫使塔思不花自顧無顔見衆將佐無不帶傷亦未便深究遂遷怒太府周岐政不應以凶地作選場致生此變欲行奏免周太守推説大開武選不與文員相涉若無防範雖城中難保不生變也安撫滿面含羞惟喚集將佐大加呵斥而已台下保護深得勾龍闊海耶律霸等之力且武略邁衆遂請過誥身勾龍闊海議升建康副都統制耶律霸都指揮使韓雙馬昌史忠等俱武功郎餘皆進秩有差編入卒伍者共得三萬餘人命鞠弋仲臧凱二將各引二百輕騎分追壽春漢陽兩處賊將務獲戚璠引二百輕騎追花山賊三將引兵沿途追訪俱言去遠不得已齊歸復命時壽陽張師旦等四人改換服色逃歸不久項嗣昌遂卒子普略見淮南不可久居望南陽而去漢陽白文狻等雖偷入建康大鬧選場而汪夜義宋羅睺俱身受重傷回歸臥病不起就中惟花山賊席捲財寶滿載而去
