body:
  text: 第五十二回木棉庵老魅談禪龍溪士人章生性朴訥讀書城南木棉庵寒暑無間風雨之夕庵左廂斗室中常有悲泣聲章生不以為意一夕月明如晝章生偶步東軒玩月室中悲聲頓起章生諦聽之蓋女子聲也涕泣一會又互相告語其一日妾來雁本吳江人幼嫻書史工詞翰奈家貧親沒無以為葬自鬻於淮西軍淮西夏貴見妾頗通音樂遂送至葛嶺誤我一生今老賊既死妾等銜恨以沒矣言訖而泣其一曰妾嘉興李蘭香也會稽守劉良貴買妾獻媚於老賊得擢轉運及妾在半間堂鬥蟋蟀偶拂老賊之意立杖殺之妾死不足惜妾有老母未知身葬何處耳又一日妾蕙娘柳氏偕老賊共遊西湖偶過斷橋見裴生豐度可人不覺失聲讚美老賊心疑可憐紅顔薄命竟作斷頭之鬼言畢哭聲嗚鳴又二人齊言曰妾姊妹乃余杭沈氏芳卿瑞卿也父為司李一字本邑李侍郎長子一字于潛吳學士三郎姊妹偶出踏青被翁應龍所見稟知老賊強被娶去父含羞而死李郎吳郎亦鬱鬱而卒妾姊妹自盡十年賈平章老賊始時衰運退為陳潘兩禦史劾奏免官妾等間關奔走先至閩中俟老賊數盡再圖復仇詎料會稽尉鄭虎臣銜冤尤甚生則拉胸殺其身死則吸魂索其魄怒氣勃勃妾等不能近前奈何此外更有數女子嚶嚶哭泣方欲訴苦有一人問曰汝等沈埋地下多歷年所豈亦賈平章所陷耶女子泣曰妾等墮入香粉地獄十餘年矣蕙娘問曰何謂香粉地獄女子曰大凡陽世官吏犯貪酷二字自有國法而間有漏網者地府則録其愛女弱媳入青樓以償孽債今之倚門賣俏者是也蕙娘問曰汝等父母生前作何官女子曰妾等五人一為縣令媳兩為縣令女兩為典史女父皆以賄賂堂吏廖翁二人得選美缺開門納賄贓寶無算敗露後仍被上官搜括獻媚與平章去妾等已罰入九幽填補贓款陷沒至今向使平章正身率下廉以奉公不開納賄之門妾等又何至於此蕙娘曰汝等來漳州幾時矣女子曰妝等步迹追隨物色殆遍首至越州暨老賊終喪後聞謫婺州即隨至婺州及婺人露布逐之乃徙建寧隨至建寧又遇翁合文上表諫阻始安置循州妾等奔憊已甚始隨老賊而行及今仍不能報仇雪恥此恨何極言已大哭不止衆女子嗚嗚咽咽重復飲泣正悲悼間忽又聞一老嫗聲大笑而出曰衆女鬼何事悲慟要報宿恨非問過來人不省也衆女子譁然曰花月姑至矣若相起居問訊者少頃老嫗又曰昔非今是一切休稱後果前因鐵無差忒衆女子及今尚未悟徹本來耶衆女子肅然聽命老嫗曰女等粉黛籍中宿債未償或青年淪亡或紅顔未老故今世同附和于富貴之場以消魔障從此脫離煩惱當赴清涼世界矣衆女子曰妾等宿愆固然應償而老賊生平一味安樂淫佚果何福報如此乎老嫗曰賈秋壑孽緣實深罪如山積渠一世為秦將白起以殺孽太甚墮入畜生道為牛雷殛後得轉人道罰毫州為娟以贈金十兩曾救人七命再世為江陰富翁力行濟人利物之事在唐即李林甫一居相位頓失本來陰險陷人姦惡特甚沒後罰長白山為犬司戶善警主人甚愛之犬斃更為僧能持戒喜放生全活者無算故仍得宰官身既入平章故態復作欺君罔上吝軍賞開邊釁陷忠良肆聚斂種種誤國怙惡不悛尚當與章惇蔡京童貫秦檜諸人受無量怖苦從此永無輪回望矣衆女子無不稱快老嫗又曰誤國之罪重誤人之罪輕賈秋壑所誤汝等者乃生命耳渠雖誤人實汝等自誤也故被鄭虎臣一靈索去汝等俱不能報然女等不能報其身獨不能報其子孫乎漢陽雲夢咫尺不遠區區守此殯宮奚益哉衆女子齊謝曰蒙花月姑指迷妾等不朽矣一時人聲頓息哭聲亦止章生在窗外聽得分明次日急啓其戶視之毫無他異惟壁上題詩二絶雲山上樓臺湖上船平章醉後懶朝天輕盈妙質歸何處黃壤沈冤不計年其二雲雲鬟消盡轉蓬稀旅魄逐荒無可依牧馬不嘶山月白魂驚猶欲向南飛章生奇之為白寺僧始知庵中左廂為賈似道死所庵側為賈似道殯宮地也章生視其殯所猶露棺在外因責之曰誤國老賊汝生前踞葛嶺遊西湖有無窮受用曾亦知有今日否命人舉其棺碎之後章生成進士作南豐令有循聲
