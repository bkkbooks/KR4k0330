body:
  text: 第六十六回鍾情人一心合墓劉翠翠壽陽民家女也生而穎悟能通書史父母令就學同學有金生名鏞者與同庚亦聰明俊雅諸生戲之曰同歲者當為夫婦二人亦私相許諾金生贈翠翠詩曰十二闌幹七寶台春風隨處豔陽開東園桃李西園柳何不移來一處栽翠翠和曰平生每恨祝英台懷抱何為不早開我願東君勤用意早移花樹向陽栽既而翠翠年長不復至學父母為之擇配輒悲泣不食問之初不肯言久之乃曰西家金郎妾已許之若不相從有死而已誓不登他門也父母以金生家貧欲占鳳富室則翠翠抵死不從然以金生少年俊秀且勤學遂許可焉蔔日合巹凡幣帛之類羔雁之屬皆女家自備迎婚入門夫婦相得之樂雖翡翠之戲蘭苕鴛鴦之遊緑水未足方喻時壽陽為賊陷沒賈智深篡位稱尊用莫綏猷為右相一日莫綏猷出郊偶見夫婦二人踏青姿容絶世問之即翠翠夫婦也莫綏猷未免垂涎將納為婢翠翠夫婦聞風而逃將竄至建平縣母姨蔡氏家少避誰知中途正遇元兵來剿壽陽夫婦失散翠翠為元將吳興李都監所獲納為側室壽陽既平道路始通行李無滯金生打聽翠翠下落遂辭別內外父母物色其妻中途囊橐盡竭此心終不少懈草行露宿乞丐于人不日始達湖州則李都監以平壽陽有功升團練正使安撫重之威焰隆赫金生佇立轅門欲進不能欲言不敢閽者怪而問之金生答曰仆壽州人也喪亂以來聞有一妹在於貴署今不遠千裏至此欲求一見非有他也閽者叩其姓名並其妹年貌何似生曰仆姓劉名金鏞妹名翠翠識字能文當離散時年僅十七以歲月計之今二十有四矣閽者曰是矣府中果有劉氏者壽州人也年二十餘識字善吟詩性巧慧本使寵之專房汝言信不誣吾代汝稟知遂奔走入告少頃令生入見李團練坐於廳上生見畢具述其由李團練武人也信而不疑即命小鬟告於翠翠曰汝兄自壽州來此當出見之翠翠承命而出以兄妹之禮見於廳室兩情默喻四目凝視竟不能措一詞惟吞聲悲咽而已李團練曰汝千里遠來即在吾署中棲止吾當徐為之所生遂館焉翌日謂生曰汝妹既識字汝亦通筆墨否生告以業儒李團練大喜委以記室生性既和平益自檢束應上接下鹹得其歡代書回柬曲盡其意李團練以為得人豐其廩給托以腹心待之甚厚府中內外人等無不敬禮之然生之來此實為訪妻自廳前一覿面後侯門似海欲達一意終無間可乘荏苒數月時及授衣西風大起白露為霜獨坐空齋抑鬱無聊乃成一詩曰好花移入玉闌幹春色無緣得再看樂處豈知愁處苦別時雖易見時難何年塞上重歸馬此夜庭中獨舞鸞霧閣雲煙深幾許可憐辜負月團圞詩成題於片紙即拆衣領而縫之時有小鬟常相出入生餌以百錢曰以衣付吾妹令其縫紉將以禦寒小鬟持入交與翠翠翠翠解其意拆衣而詩現大慟無聲別為一詩亦縫於衣領內付出還生詩曰一自鄉關動戰鋒舊愁新恨幾重重腸雖已斷情難斷生不相從死亦從長使德言藏破鏡終教子建賦遊龍緑珠碧玉心中事今日誰知也到儂生得詩涕泣不已知其以死許之無復可望愈加傷感遂成痼疾翠翠聞之請于李團練始得一至榻前問候而生病已劇翠翠以臂扶生而起生引首側視凝淚滿眶長歎一聲奄然死於其手李團練憐之葬于城南道場山麓翠翠送殯而歸是夜得疾不復飲藥展轉床席奄及一月一日告團練曰妾棄家相從已逾八載流離外郡舉目無親止有一兄今日已死妾病必不起乞埋骨兄側庶泉壤之下有所依託不致作他鄉孤鬼也言訖而卒團練痛惜不已不違其意竟附葬於生壙之左東西二邱宛若同穴焉葬後有五彩異鳥翔於墓前樹上比翼哀鳴數日而去李團練猶以為兄妹魂棲異域精靈所感十分傷悼始終不喻其意籲此李團練之所以為李團練可歎亦可恨也
