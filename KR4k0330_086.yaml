seq: 86
body:
  text: 第八十六回吳草廬不序藏經元武宗即位以母弟愛育黎拔力八達為皇太子哈刺哈孫仍為右丞相答刺海為左丞相因承成宗遺詔凡嗣位者俱宜崇祀孔子武宗即於是年七月加封孔子為大成至聖文宣王命翰林承旨閻復草詔曰蓋聞先孔子而聖者非孔子無以明後孔子而聖者非孔子無以法所謂祖述堯舜憲章文武儀范百王師表萬世者也朕篡承丕緒敬仰休風循治古之良規舉追封之盛典加封大成至聖文宣王遣使闕裏祀乙太牢於戲父子之親君臣之義永惟聖教之尊天地之大日月之明奚罄名言之妙尚資聖化祚我皇元時有太子右諭德蕭爽鬥等皆竊歎曰大元尊崇聖教朝野可望治矣至大元年又下詔禁白蓮社毀其祠宇以其人隸民籍帝復優禮大臣敦崇儒生席富有之業慨然有勵精圖治之意究之蒸亂諸母仍然冒頓遺風官制雖汰多循達魯之名章服雖頒雜用罽韋之飾宦者李邦寧乃用為江浙平章西僧教瓦斑用為翰林學士承旨顛倒錯亂莫此為甚帝在位五年而殂皇太子愛育黎拔力八達即位是為仁宗乃定大成至聖文宣王春秋二丁釋奠俱用太牢復科舉策進士于廷及第出身有差從翰林李孟之奏也李邦寧至是寵遇日隆帝竟遣邦寧行釋奠於孔子邦寧受命方入廟中行禮就位忽大風起殿上兩廡燈盡滅燈檯底鐵蹲人地尺許邦寧悚息伏地不敢仰視諸執事伏地良久不能成禮而退邦寧惱悔纍日帝亦悔之帝即下詔制自今宦者勿得授文階改皇慶為延祐及延祐三年復加宦者續元暉為昭文館大學士帝蓋中心無主每相矛盾然聰明恭儉通達儒術可為元守文之主在位十年而殂太子碩德八刺即位是為英宗以至治元年元夕張燈極其華美帝禦樓門而觀民皆爭呼萬歲帝又酷信浮屠崇奉西僧敕建西山佛寺甚亟又下詔於各郡寺觀宏開道場廣建法會作功德以資冥福興薦拔以賑先靈諷經禮懺宣科演教州郡靡不翕然從風帝遂敕寫金字藏經詔翰林直學士吳澄為序吳澄抗表奏曰陛下敕寫金字藏經為生民祈福此堯舜禹湯為心誠盛舉也若用以追薦則臣所未諭蓋福田利益雖人所樂聞而輪回之説不過謂為善者死則上通高明其極品與日月齊光為惡者死則下淪污穢其極卑與沙蟲同類浮屠子遂創為薦拔之説以惑世人今列聖之神上同日月何庸薦拔且自國初以來凡寫經追薦不知凡幾若耒效是無佛法矣若已效是誣其祖也撰為文辭萬不可以示後世臣無任懇切之至帝再三敕之吳澄堅不奉詔即日移病而歸至文宗至順二年卒澄字幼清號草廬先生臨川人也潛心好學篤志力行著書立言翊翼聖教謝疾歸時從學者數百人所著有易春秋禮記纂言及校定皇極經世書大戴禮等書卒贈臨川郡公諡文正
