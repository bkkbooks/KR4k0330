body:
  text: 第五十八回牡丹鈿玉奴擇壻樊東樓遊西湖而歸心中悵然每念西冷橋芳卿不已日在隕陽遊鼇水訪龍山登爽籟亭盼熙春樓優遊山水吟風弄月不及西湖萬一東樓偶爾春遊遇玩花台前見四面桃花楊柳丹桂英蓉點綴得紅紅緑緑心焉愛之踱過台左見一宅第緑槐修竹清陰欲滴池內點溪荷葉鋪滿水面池上春花開滿馥馥鬱鬱分外可人良久忽聞有嬌聲語曰美哉少年東樓著驚四顧見池西緑陰中小樓之上有三四嬌娥傾國傾城倚檻而窺中一女子尤豔見東樓顧盼一齊退入樓中東樓以瓜田李下欲進不敢只得逡巡而出步過花台心懶意倦東樓以弱冠少年刻意求凰尚虛嘉偶自此行坐寢食俱有一樓上美人時在意中乃吟最高樓詞一闋垂楊裏隱起最高樓雕闌曲綺窗幽碧霄乍看開金鏡珠簾恰好上銀鈎倚樓人瞧著我一回眸他初見人來微靠後他又見依來凝望久思展步已勾留應知心事遙難達如傳眉語轉含羞倒教人平白地一天愁吟罷投筆而臥伏枕後不覺又入花台徐步而進見池沼依然花木宛在樓上美人悄無形影悵望良久在樓下踱來踱去口不住吟曰去年今日此門中人面桃花相映紅人面不知何處去桃花依舊笑春風吟畢歎曰人言秀色可餐如芳卿者亦可以療飢矣言未畢樓上簾鈎響處美人方露出半面東樓正喜忽樓下突出二人一碧眼紫髯一偉岸風骨齊聲喝曰何處風狂兒擅窺人閨闥大踏步欲來拿獲東樓嚇得魂不附體抽身便走東西亂竄無路可出恨脅下無兩翼插翅即飛奈舉足無力回看追者已近一時窘急忽聽老仆樊鴻呼喚驚覺仍在枕上猶惴惴不已既又惱恨非此二人阻隔則美人已會合矣悶悶不語老仆樊鴻已窺其意問之東樓以實告樊鴻曰此易事耳吾家去花台不遠何不令人訪問如果佳麗竟央蹇修納幣可也東樓聞言驚喜欲狂樊鴻令人訪問始知即安陸京山縣鄭夢蘭之妹避亂彭澤賊平後仍奉母與妹轉遷房縣者也東樓翌日備禮投刺其家升堂拜母與夢蘭訂文字交東樓一見索通馬陵二仆暗驚曰此即夢中所見二人也心猶鶻突夢蘭亦造其室俱有饋送從此二人往來甚密夢蘭知東樓未偶遂有為玉奴擇壻之意母夫人亦屬意東樓與玉奴言及玉奴堅拒不從母夫人未便強逼遂托他故婉言辭之東樓忽忽不樂漸致染疾誰知玉奴以花朝偕二嫂彎英鳳英登樓賞花望見樓下少年未免有情日在心中故母與兄言樊生求親之事一味堅拒又不敢明言懨懨在床漸就疲憊鸞英鳳英微將此意達之夢蘭夢蘭叱之二嫂亦不敢多言母夫人惟命延醫調治諸藥罔效玉奴病中每念樓下書生而已一日夢復登樓上倚檻而立時紅梅盛開望見前日書生仍從池畔冉冉而來直入樓下各道相慕之意玉奴拔鬃邊牡丹花鈿方欲擲下與之忽索通馬陵嚷聲驚覺得此一夢病若少瘥而東樓臥病已久一日夢蘭往問其疾則病已增劇展轉床席恍惚作囈語曰若得花鈿雖死無恨夢蘭聞之不解所謂少頃東樓開目視夢蘭曰弟死之後望兄見憐他無所托乞與先考妣邱墓附葬得正首邱於願足矣夢蘭泣答曰弟宜珍重何出此不祥之語東樓亦泣夢蘭別去東樓滿腹抑鬱無可排遣纏綿數月醫者皆言不治日就尪羸老仆樊鴻十分著急更延一醫此醫刀圭業已三世自詡國手預言謝儀方為診脈診畢搖手曰此漸成癆瘵矣凡人傷其精則陰虛而火動耗其血則火亢而金虧相公六脈沈細微滴而數元氣耗散脾胃損傷氣血虧損髒腑虛弱而相火上炎熏克肺金肺為五臟華蓋受火邪一克所以四肢倦怠五心煩熱咽幹聲啞蠱脹腫滿此難治之症也當為養心血扶元氣健脾胃以參苓芡術等藥投之東樓服後益加困憊喘急不已樊鴻又更一醫視曰此肺受邪故也肺主外感有汗表虛無汗表實故症有實喘有虛喘實喘喉必作聲眉必擡起症若重而實輕以黃芩烏藥等類治之即愈相公此症乃虛喘也腎氣太虛脾氣又復將絶故奔沖而上欲絶未絶此病殆死症也幸幾微之氣流連於上下之間若用涼藥是速其死即用桂附補之亦速共亡當用救絶止喘方一劑輕二劑止全愈必服十劑樊鴻從之誰知服後病仍如故樊鴻歎曰醫者爭奇誇勝無非捕風捉影此疾何日廖也暗暗垂淚不已時東樓氣結已不能言奄奄待斃會其中表陰生者來省其疾陰生故精岐黃隨為診視乃啞然笑曰此鬱症也心有所慕而不得故郁氣蘊於中懷憤悶留於脅下而更以補劑溫之則增劇矣引疾倘投其所好如其所願將不藥可愈急命諸藥勿服樊鴻即懇陰生治之陰生將逍遙散略變其法曰此藥開鬱行氣去濕利痰於散之中有補之法得補益之利受解散之功命煎一帖投之東樓氣若少舒而終不能言語陰生曰病在傷肝傷肝而又伐肝是助其鬱也急多服救肝開郁湯樊鴻曰前者醫士莫不治肺金木相克是猶操刀殺人此藥妙處亦可得而聞乎陰生曰此方妙在用白芍多至三兩則直入肝經以益其匱乏之氣自然血生火熄又用白術當歸健土以生血柴胡以解鬱甘草以和中白芥子以消膜膈之痰又妙在多用獲苓使鬱氣與痰涎盡入膀胱之中而消弭於無形一劑而聲出再劑而神安三劑而郁盡解矣果然服此藥後疾漸回春樊鴻大喜厚贈陰生陰生不受而去一日聞夢蘭在園中招飲作紅梅宴詩社諸友無不折柬相邀東樓此時疾已減去三分之二亦欲抱病赴會樊鴻多令僕從隨侍一至鄭園中夢蘭迎入喜出望外衆友各申契闊無不粲然東樓見勝友如雲高朋滿座又見滿園紅梅含苞吐豔灼灼照眼如含宿雨如帶新煙園以西竹林深處即是前日所見小樓西顧爽然疾更不知何往矣少頃分席列坐水陸雜陳雖無絲竹管弦而低斟淺酌幽情暢敘飲興方酣夢蘭即席請曰今日敝園紅梅盛開略設小飲不可不題詠佐酒勿令梅花笑我衆皆曰甚佳但引興必煩東道主我等用以下里巴人和陽春白雪耳夢蘭謝曰座中皆名公巨手井蛙敢語海耶拋磚引玉恐不堪覆諸君酒甕耳即以紅梅為題書七律一首詩曰一自東風嫁海棠全欺絳雪豔群芳火齊夜照疏鍾冷錦瑟朝翻繡幕香素質豈堪留血淚纖肌故遣襯荷裳任誇豔冶牡丹貴不藉花鈿賽曉妝衆賓交口稱羡一時唱和甚多獨樊東樓一見首韻便有含蓄尾聯有牡丹花鈿四字默然有感即題七絶六首其詩曰芙蓉不耐九秋霜菡萏趨炎怯晚妝爭似芳菲冰雪體牡丹豈復羡河陽玉盞酡顔興未央染成殷膩暈檀郎多情錯認啼鵑淚拾作花鈿有暗香灼灼含苞綴玉房為邀神女漱雲漿相逢月下驚嬌豔不是羅浮舊日妝燒鮑絳蠟裛明光午夜輕寒擁鷫鸘不向曉風貪結子丹衣染就謝東皇稜稜玉骨映紅牆照眼橫斜水一方聞道石家舒步障珊瑚滿樹引鴛鴦雨到春山點壽陽瓊枝玉樹窗明璫金鈿釋手開歡靨咫尺花台是七襄詩成衆皆讚美特不知寓意之所在衆友人座又暢飲一會方始別去原來此宴乃玉奴所設玉奴一日病起因至樓上見園中紅梅盛開觸動情景夢中樓下書生宛在目前因作紅梅詩一首詩雖詠紅梅而以牡丹花鈿藏在詩尾即夢蘭所書一律而詭為己作者也玉奴因母擇配高低不就心戀樓下書生又慮有貌無才遂心生一計對天立誓以紅梅招飲各處名士畢集以己詩詭為兄作務令屬和就中若有喻得牡丹花鈿之意者必樓下書生即己之畫眉人也此意惟白母氏夢蘭不知也玉奴遍觀衆人和韻佳葉非不甚夥而多粘定紅梅惟此六絶深明其意纍纍關合花鈿在內心中暗喜曰此必樓下書生也但衆人分紙題詠時皆未署名並不知此人為誰玉奴一時躊躇暗想諸人倡和吾兄必一一周知但與明言殊覺不雅又心生一計將各詩盡用封緘而以牡丹鈿獨藏於此人詩囊中余者封潤筆銀五錢令家人逐一送去吾兄發付時當自有斟酌誰知夢蘭不解其意以為賞花招飲各贈潤筆亦屬尋常隨接手中呼馬陵至前執筆微啓封緘視之曰此某人詩也送某處此某生詩也送某處逐一送去亦未細審詩囊所貯之物而東樓之詩恰恰誤筆標為竹溪王生開選王生開選轉誤為樊生東樓之詩獨有東樓此時得詩稿送還見俱有潤筆喜不自勝開緘視之乃封銀五錢再看詩稿卻非已原詩為五言律二首心中大疑細審詩意亦僅詠紅梅之色香而已一時躊躇暗思此詩豈夢蘭之再韻耶抑閨中之屬和耶而家人口中詩囊紙上明明言原韻奉還益發不解東樓滿望姻事克諧在此次詩為之媒詎知乖舛無常望空捉雪已痊之病漸欲復發既而轉念曰樊東樓何執迷乃爾改日夢蘭兄至問之自見分曉遂日日專望夢蘭探王昌之消息殊夢蘭有母舅梁嵩因亂移家棗陽目下宋師平定漢東收復襄陽招納賢俊梁嵩已投宋出仕授武經大夫轉薦鄭夢蘭于宋帥嶽招討梁嵩書達房縣夢蘭得知即奉母命赴襄陽一以省舅一以自圖進取於賞花招飲後五日即與馬陵同去東樓得此資訊心如冰冷自念姻事坎坷左右迍邅鄭氏量無復諧之理樓前邂逅特鏡花水月耳遂將此念擯棄不題一日忽有數十壯士馬上擁一軍官款門問曰樊先生東樓可在家否樊鴻應之軍官自言大宋人也奉扈韓兩先鋒之令特送薦書至此東樓聞之即出延人叩其來意始知平定夢澤巨寇者即昔年涪陵祠相遇之扈德威韓搏虎也扈韓二人投宋已為上將身統重兵討平巨寇漢東一帶業已肅清襄樊諸郡無不納款軍官亦言不久又見太平氣象矣先生抱濟世之才身遇明主正好出仕慎勿辜負兩先鋒之意東樓謝之置酒款待次日東樓厚贈之辭去東樓始觀其書曰憶自涪陵祠前藉接清暉別後遂身歸故宋蒙宋以不次拔擢用為列將纍積微功目下已收復閩廣湘漢諸郡大宋帝業不日可成先生既懷瑾握瑜擇主而事時不可失定如尊翁之言不負從龍之意此書到日先生可至長沙俟大兵凱旋同見宋主自當重用余不宣扈德威韓搏虎同拜東樓久欲仕宋今得此書正中其懷遂命樊鴻治裝不日起行一日有鄭氏老仆索通至東樓叩其家事則梁夫人無恙玉奴臥病未愈蓋玉奴以花鈿贈詩久無音耗不覺鬱鬱成疾母夫人深知其意每問擇壻究屬何人玉奴曰得吾牡丹鈿者即壻也奈花鈿既無下落長兄又遠去襄陽壻擇何所母夫人因命索通往招飲諸友逐一探問花鈿消息多疑在樊東樓處索通因以微言挑其意東樓始言詩稿不知誤送何所畢竟索通會意即討過詩稿登時別去遂竟往竹溪時王生開選自鄭園招飲後即有友約共遊洞庭未歸詩稿現在家中未開索通大喜即説明錯誤更換詩囊索通細審內有貯者即花鈿也如獲至寶先攜歸家與玉奴看明不差以愈其疾始送與東樓東樓得見花鈿封貯在己詩囊內不禁狂喜把玩不置指定花鈿笑曰花鈿花鈿樓上美人樓下書生望汝作蹇修乃播弄人如此耶遂設酒款待索通因問夢蘭幾時回歸索通曰公子行程尚無定期但家中大小諸事老奴力能相助東樓即請作伐索通笑曰有此花鈿二家姻事不諧自諧回歸與夫人玉奴説知約定成婚一日馬陵亦歸索通迎門大罵村夫無識將詩稿誤送幾誤大事馬陵曰此公子手書之誤也夫人急問夢蘭之事馬陵曰公子隨舅父引見嶽招討得蒙收録以文士宜隨大軍過長沙去見宋主自當重用命老奴回家報知接家共往歸宋且言小姐姻事宜在樊生夫人早為于歸他無所囑夫人大喜以夢蘭既不在家命索通知會東樓人贅東樓命樊鴻預送聘金權為花燭之費一至佳期夫人命張燈結綵肆筵設席笙簧疊奏鼓吹喧闐迎接樊東樓入贅金屋銀屏共飲合巹花燭影裏玉奴看東樓明明樓下書生東樓亦暗瞧玉奴仍然樓上美人東樓即命侍婢交還花鈿司馬才高文君調絶非花鈿無此幾番狼狽非花鈿亦無此一封鸞凰也玉樹琪花允稱佳偶比翼鳥比目魚有未足喻其夫婦相得之樂者旬日後一同治裝東樓遂請夫人玉奴鸞英鳳英侍婢等隨行自與索通馬陵樊鴻衆僕役挈家望長沙而去
