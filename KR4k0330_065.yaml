body:
  text: 第六十五回雲貞女萬里傳書韓生文錦字秋塘泗州天長人骯髒不羈落拓有大志仕元許州州判在任以倔強纍與州牧有隙州牧銜之而州牧後以贓敗韓州判亦被議遣戍緬甸萬裏投荒家口未歸生母尚殯任所嫡母楊氏在家偏愛諸兄弟膏腴沃壤皆不及秋塘諸弟傲狠在家屢生枝節欲以陷兄任所秋塘不以為意殊禍生不測妻妾子女相向而泣秋塘曰我身生還無望母老子幼汝等能代余侍奉甘旨教育兒女秋塘雖在煙荒死亦瞑目時秋塘一妻馬氏二妾劉氏吳氏無不毅然應允誓無二心秋塘喜曰如此吾復可憂萬里之行其甘如飴惟側室陳氏默然不語秋塘問之曰雲貞何獨不語寧以吾勢敗將欲改適耶雲貞陳氏斂容答曰韓氏祖宗不各修德幾許今一旦乃建無數貞節坊矣自古迄今間有改醮之命婦寧有守貞之側室耶秋塘聞言色慘神沮雲貞亦向隅而泣秋塘暗思他日首先改醮者必雲貞也遂勉強安慰一會其妻馬氏諸事均肩其任囑以勿慮秋塘歎曰家政綱紀仍不離結髮人也當夜置酒與秋塘餞別次日姬妾俱送至汜水惟雲貞依依不舍直送至襄城楓亭掩泣而別秋塘猶以欲他適故作此態也者怏怏惜別秋塘既登長途不勝悽楚雲貞自回許州偕正室馬氏等收拾細軟招集僕從啓殯望泗州迸發不日遂抵天長至家將生母安葬諸事停妥初時亦相安無事久之而五弟文秀謂秋塘萬里遠戍妻妾在家坐耗廩糧令各自為計馬氏大怒與文秀互相詬詈楊夫人左袒文秀反杖馬氏馬氏且號且泣恚怒欲死雲貞勸止之六弟文釗乃與秋塘一母所出繼而三弟文綿四弟文華皆欲驅逐雲貞誣以不孝構母訟之雲貞遂陷囹圄久之縣令以無所驗白得釋家中遂如水如火全不相人矣有中表王生者美少年也偶至家而秋塘妾吳氏與之接談被文華所窺大怒俟王生去後立逼吳氏改醮吳氏披發號泣指天誓日楊夫人亦醜詆備至王生知之以一書怒絶文華其事遂寢自此秋塘長兄文鳳亦事事偵察窺隙覓釁仆役使女多用買囑而屋宇田産文秀漸次吞併又纍構與鄰人爭訟以傾陷之媒孽事端已非一次馬氏劉氏吳氏皆不勝忿怒惟雲貞不以為然婉勸之曰石卵之不敵明矣且姑待之楊夫人又責以每歲甘旨非數百金不可雲貞皆委曲從之秋塘在緬甸疊有家書俱為雲貞所得雲貞意中早有把握至元間江淮大飢人不自保壽陽賊又不時擾亂泗州徭役頻興馬氏等漸次力不能支又訛傳秋塘已在緬甸身故於是妻妾數人自相魚肉矣馬氏每責劉氏日日誚讓鞭答隨及劉氏久不能堪亦恚曰夫人不過欲獨建貞坊逼劉氏作再醮之婦而已馬氏立命尋媒不數日即將劉氏嫁於淮西楊夫人及諸弟文秀等無不暗喜惟雲貞一女名瓊兒楊夫人鍾愛之年雖沖幼性最穎異上及祖母諸叔下及嫡母馬氏往來調停頗得其力馬氏欲加淩厲無隙可尋乃暗減刻其衣服飲食久而又與雲貞為難而雲貞每俯首低眉不稍露一辭色馬氏有子名丁郎亦甚聰明至是馬氏生心並其子亦苛遇之每不與食而雲貞暗相保護丁郎反依戀雲貞若生母然馬氏益加憤悶愈生風波不拘雲貞吳氏瓊兒丁郎等一罵便是四夜三朝一打便是千紅萬紫文秀見此光景正中其懷又黨于馬氏益加唆使暗相謀陷吳氏丁郎等度日如年未及半年吳氏不堪其苦又被馬氏嫁去馬氏至此專意雲貞窘辱備至俱難撼之無可發泄日日打雞罵犬雲貞已窺其意以言挑之曰夫人經理家政十分勞苦馬氏怒曰若非賤婢等纍我此家業已交卸于丁郎矣雲貞又曰聞緬甸物故之信乃系訛傳夫人何言及此馬氏亦怒曰如此景況漫道訛傳即使秋塘尚在餘已久不能堪欲脫離此苦海矣但無人瓜代耳雲貞曰夫人戲言耳若果有此意妾願撫孤成立為秋塘立後馬氏遂回嗔作喜曰恐汝亦戲言耳雲貞曰妾何敢與夫人作戲馬氏一時不覺五體投地再拜而起曰雲貞妹子乃馬氏再造之人也自今以往馬氏不復作韓家婦矣也不稟告楊夫人竟自央媒嫁與徐州邳縣趙進士為妾楊夫人見此光景未免怏悒從前念頭亦漸改三分之一而秋塘田園被文秀侵奪去者存亦無幾加以歲益荒旱文綿文華皆相繼而卒而惟文秀搖唇鼓舌啓釁生禍者猶安然無恙文秀至此猶時時謀陷雲貞讒毀多端雲貞艱苦萬狀百折不回上以承母夫人之歡心下以供兒女子之朝夕早晚尚得瓊兒稍一寫心無何而瓊兒病故雲貞慟哭不已目幾失明從此惟一子丁郎一女瑻兒作伴過日又一小鬟蓮姐年幼而頗有血性文秀久思染指一日因蓮姐往花園摘花幾為文秀所逼雲貞敢怒而不敢言惟命出入時加防間一日六弟文釗自盱眙歸來言二兄秋塘未抵緬甸在蒙化軍某處因有公幹尚在盱眙雲貞連夜修書一封附詩六首托文釗立時寄去且説秋塘自離許州迤邐直達滇南幸有滁州全椒縣陳青者為蒙化廳司李陳青乃雲貞之從四兄也遂館秋塘時去時來荏苒光陰多在蒙化一日蒙化廳得緬甸公幹人送書至陳青交與秋塘秋塘持歸寓所急拆觀之書曰妾雲貞端肅斂衽再拜致侯秋塘大人安履憶自楓亭分手彈指十年萬里羈愁空懷歲月長門幽恨莫訴晨昏然母親膝前兒女團圓尚可安慰君隻身孤戍依人作計誰與為歡問暖噓寒窺飢探渴涼涼踽踽未知消受幾許淒其貞雖不能縱萬里之身續一夕之好而離魂斷夢常繞左右矣思君十二腸回九折豈虛語哉別來七奉手劄未復一函使固難逢筆亦莫罄單詞片語未足慰雙撑盼睫也客歲五月初六日得一密信來人送書之日適貞臥病之時投遞參差歲成不測幸瓊兒解人覷破支吾遮掩得以解紛不覺冷汗涔涔二豎頓然告退伏枕細讀悲喜交集少頃母親拆書榻畔笑語貞雲錦兒帶罪邊衛歸期可望來稟頗自愧悔想已磨折悛改我今亦憐之矣是皆君孝思所感不然此恩正未易施也別後情景概未寄知生母新阡樹木成林圍牆完固歲時伏臘瞻拜如常江水平漕不相侵害可以放懷嫡母極履優遊飲食猶昔惟痰症時作精神稍衰耳親族中概同陌路大姊夫大姊姊雖不甚冷落亦無大照料二姊夫已故二姊姊尚留都下七妹遠在楚省音問久疏翼廷大兄人雖刻薄但為母親所依賴嗣有書來總以一味感歎不失歡心三弟四弟業已物故至負義人五弟今已移居他所不及提防萋斐之言暖昧之事難免聳惑于高堂貞惟忍性堅心立定腳跟期盡吾之所當盡而已至於青蠅牆茨之譖信與不信又何敢必總之瓊女而在尚可為解不幸又於去年八月出疹冒風以死十五年仳離辛苦盡付東流草草治棺瘞於塋側猶記沒之前夕捧貞頰而啼曰爹爹離家已久兒沒後萬不可一語及之今憶此言不禁淚如泉湧何止殘稿遺書驚心玉碎零脂剩粉觸目蘭摧耶丁郎讀書頗有父風然恃聰明而少沈潛務高遠而不咀嚼詩詞有新穎之句文藝則駁雜不純青青子襟初非金馬玉堂中人也來書詢其所師舞勺以前皆貞口授經史詩詞略知大義庚戌仲夏始就楊先生授業講解嗣後楊先生選任辭去至今皆卜權齋訓迪教法頗嚴貞亦不敢稍假辭色課文之暇仍以詩詞試之不留餘力惟母親姑息太甚奈何奈何所可恨者君元室馬氏侍妾劉氏吳氏皆言力能守貞不及數載頓食前言良人猶在改醮他適拋棄兒女苟圖富貴惟此殊增人怛悼耳丁郎雖出馬氏猶貞所生此君一塊骨血而貞之所莫敢遑息者也貞母於壬秋患病延至癸春二月六日奄然長逝兩老人一生血脈惟貞一線之存不料六十年鏡花水月情深半豫能不酸楚耶庸弟原非己出漠不相關只知搜索家資良可痛恨貞自遭此變愈覺難堪顆粒纓絲一無所出家計歲入不敷貞屢求典售而又不忍輕去徒令侵吞剝削多致荒廢房産欹傾過半復被負義人據為已有拆變一空僅留敗屋數椽聊蔽風雨大非昔時光景從前緩急可商之處近皆裹足不前遇有急需貞亦不輕啓齒正恐不惟無濟反惹非笑君友馮郭西絶迹多年近來詢問消息情意頗真些小通融尚可資助第恐日久漸疏難保終始如一耳而其肫肫懷念之忱則未可負之節次囑帶瓶口扇套鞋襪筆茶諸物盡為負義人賺去言之恨恨貞邇來兩餐之外不能稍自舒展嫁笥奩具陸續盡歸質庫頻年己身之補綴蓮姐之盤纏丁郎之膏火束惰瑻女之叉釧鞋腳在在皆挖肉補瘡所辦也況問安侍寢未敢偶離怡色柔聲猶虞獲咎即飲食衣服儉則負嗇吝之嫌費又受奢侈之責素則雲朴陋無色豔則雲冶容誨淫非詬誶疊加即夏楚從事求有一日之完膚而不可得貞年逾三十非復少時兒女家人見之有何面目結縭之始筆墨為命拈毫橫笛倡隨幾及十年一旦梗斷蓬飄往事不堪回首簫聲研迹久已荒疏縱有屬和之章不過勉強承命吟風弄月之句斷不敢形於毫端顧影自憐可勝悲咽蓮姐自壬夏摘花受逼之後其志益堅雨榻風櫺寒更暑夜甘苦與共形影相隨此貞今世之贅瘤而君他年之桃葉也高魁顔忠賀花兒等只知迎合上意計飽私囊素芝碧桃輩鈎深索隱播弄如簧尤為腹心之患此狂奴故態又何足道惟有委曲將就餂以甘言博一時清靜而已負義人屢言在緬甸館谷豐隆一年之中若肯節省尚可余三四百金而貞初不信也伏思君以疏狂之性未展才華頓遭大難一朝失足萬念俱灰又有何心矜持名節且棲身異域舉目誰親月夕花晨酒闌燈炧呼廬排悶擁妓消愁亦旅人常事或值多情倩女知音嫠婦彼美憐才書生結習未能免俗聊復爾爾貞方痛憫不暇寧效彼妒婦口吻涉筆規諷耶惟念君身已非強健情復憨癡彼若果以心傾何妨竟為情死特恐口餳齒蜜腹劍腸冰徒耗有用之精神反受無窮之魔障私心自揣殊為君憂況曲蘖迷心兼能痛腹樗蒲遊戲更喪文名些小償來之財何足為計所慮君以千金之體甘自頽唐反不若貞之釜蟻餘生尚知自愛者何哉來書三月適館四兄春齋六月仍回故地此中原委未得其詳君既與四兄為骨肉之交相依邸舍便可為家何必舍此他圖別生枝節況去之未久旋復歸來則貞所不能解者大丈夫處世怨固不可深結恩亦不宜過求未曾拜德之前先思圖報之地四兄豪俠人所共稱窺其心迹量可超拔君於苦海中而噓拂之酬報之機貞心早為區畫矣相隔萬里餘忽東忽西萍迹靡定未覘雁足空致魚書即有薄裹冰資亦不敢徑行遠寄恐蹈故轍轉使空函莫達也去春有徐州俞令回籍恩旨惜未波及然此後機緣大有可望十年期滿定遇赦歸諸凡惟隨遇而安耐心以守鸞台珠浦我兩人寧終無團圓時耶每念弱草微塵百年一瞬夢幻泡影豈能久留生死兩途思之已審別後況味不減夜台現在光陰幾同羅剎何難一揮慧劍超入清涼奈緣孽如絲牢牢縛定不得不留此軀殼鬼諢排場冀了一面之緣不負數年之苦他年白頭無恙孺子有成大事一肩雙手交卸貞心不大快哉故今者君一日未回此擔一日不容放下也六弟自盱眙來聞有緬甸公幹故掩戶挑燈略書悃忱淚痕滿紙神魂遄飛計書到日開緘當在黃梅想君閲之亦心與俱酸也附詩六首聊以言志信手拈來亦是一幅血淚耳詩曰搔首雲天接大荒伊人秋水正茫茫可憐遠戍頻年夢幾斷深閨九曲腸井臼敢雲虧婦道荻丸聊以繼書香孝慈兩宇今無負即此猶堪報數行鶯花零落懶搴幃怕看簾前燕子飛鏡裏漸斑新鬢角客中應減舊腰圍百年幻影身如寄一線餘生命亦微強笑恐違慈母意藥囊偷典嫁時衣十五嬌兒付水流緑窗不復喚梳頭殘脂勝粉鞶絲閣碎墨零香問字樓千種淒涼千種恨一分憔悴一分愁儂親亦未終儂養似此空花合共休當時夢裏喚真真此際迢迢若比鄰愛寫團圞邀字讖偷占榮落祝花神哪堪失意飄零日翻作關心屬望人別有憐才惟一語年來消瘦恐傷春早自甘心百不如肩勞任怨敢欷歔迷離摸索隨君夢顛倒尋求寄妾書妝閣早經疏筆墨簫聲久巳謝庭除讒言休撼離人耳猶是堅貞待宇初未曾蘸墨意先癡一宇剛成血幾絲淚縱能幹終有迹語多難寄反無詞十年別緒春蠶老萬里羈愁塞雁遲封罷小窗人靜悄斷煙冷露阿誰知甲午嘉平朔夕雲貞載拜上秋塘觀畢聲淚俱下釋書長歎曰馬氏自言養親教子力肩重任乃一旦改事他人結髮情安在耶劉氏吳氏固不足言孰知韓文錦恩人乃陳雲貞也即向書長揖曰勞卿代餘養親教子肩勞任怨辛苦惟汝當之文錦當年目不識卿真負心人也從此以往文錦知罪矣手捧其書嗚鳴而泣直至元貞二年丙申遇赦回籍則五弟文秀亦卒秋塘一入家中見丁郎瑻兒兩兩出迎一男一女業已成立但物是人非舉目愴側老母蒼然尚猶矍鑠拜見定省畢回至私室一見雲貞也不暇詳問便撲簌簌淚下將一男一女並雲貞三人一束抱住瞪目而泣嗚咽不能成聲雲貞此時始任情一哭淚如湧泉秋塘觀之更撫膺欲絶自言吾過矣吾過矣彼婦之口自言能守今安在耶丁郎瑻兒亦悲悼不能仰視轉是蓮姐在旁再三婉勸以為骨肉團圓一天之喜若更悲楚恐痛傷陳夫人矣秋塘方釋手收淚謝曰雲貞乃秋塘恩人應宜拜謝言未已即伏在地下雲貞亦拜拜畢丁郎瑻兒置酒為父上壽六弟文釗聞兄萬里歸來亦攜酒肴為之洗塵長兄文鳳亦扶掖楊夫人至一家聚會酌酒稱慶秋塘見丁郎學已有成歎曰此汝母之力乃父不與知也秋塘自此待雲貞至老不衰後果納蓮姐為小妾不忍拂雲貞之意瑣女字本邑邊太守之子丁郎後出仕於宋至資治少尹夫婦壽皆耄期得與誥命焉
