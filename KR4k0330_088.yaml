body:
  text: 第八十八回劉蕡墓軒轅還金宋昭宗隆熙七年夏四月少保左丞相范國昌樞密使保昌公狄定國相繼卒乃以關普靈為樞密正使嶽鎮為樞密副使九月廣右節度使大將軍高耀卿入朝奏元主南坡有變當乘其亂攻取京西諸郡元人必不暇顧機會不可失也帝恐礙於和議耀卿奏曰宋與元和者乃先帝一時體兵養民權宜之計當此士馬精壯陛下正宜發憤有為以繼先帝恢復之志右相司馬肅奏曰乘人之喪而伐人之國仁者不為也陛下此時未可妄動待來年詔集各鎮會議方可興師高耀卿曰宋與元仇敵也先帝日日臥薪嘗膽恨不掃平燕雲肅清海內仍為大宋一統今既有機會寧可因有喪而中止乎帝從之猶未下詔忽報嶽州節度使新寧侯扈德威卒帝悲悼數日伐元之詔遂寢以種世虎兼開府儀同三司為嶽州節度使即日赴鎮高耀卿歎曰天不欲宋復興大業矣辭帝仍鎮廣右而去高節度一日巡至柳州見城垣崩坍過半責太守立即修理時柳州守戚臣任法嚴峻飭所屬州縣派撥民夫委官督工日夜修理官吏承上意旨催工既迫催科尤急以鞭箠從事而法愈嚴者弊愈滋凡司會計管錢谷總出入者無不枉法索賄民甚苦之系纍於縲絏之中而仍負擔土木之責甚有賣妻鬻子破産傾家而以償官緡者融縣西羅村有一李匱産本中人素性長厚一子尚乳一女名翠雲同裏中有汪生六一者家甚富一日窺見翠雲裝束雖甚朴素而一種婀娜之態流光顧影自足動人汪六一久思染指無隙可人正值郡守行扎修城撥派民夫以家業饒裕者為城工局首經紀銀錢按此局首若黠者充當便肥私囊朴者承任罔不蕩其家資汪六一聞之即令人將李匱之名舉報縣中可當局首李匱聞之大驚急至縣中申辨縣令不允責曰業經舉報即日申祥豈容推諉若人人皆免此任公事誰為經理竟申入郡中去李匱無可如何隨衆局首齊赴柳州汪六一遂日夜設計欲騙翠雲入手李匱妻崔氏拼擋家政井井有法三姑六婆概不入戶燒香賽會未嘗離門汪六一無法可施而李匱在柳州經管數月支給不敷虧折無數日積月纍逋歉益深官吏索賄李匱又不善應付未幾遂身陷囹圄崔氏聞之無計可為惟有變房屋市田産計圖贖出囹圄誰知數仍不足李匱在獄中寄信崔氏若更得五十金則禍可免崔氏得書泣曰家業典賣盡矣此金從何而出其女翠雲亦泣不可止乃謂母曰聞古有緹縈上書願入宮為婢以贖父者兒亦願賣身得金以贖父崔氏聞言大慟然至此已無可如何遂從其策汪六一聞之大喜即令人與崔氏説知願以五十金買去作妾崔氏欲不允翠雲泣曰但得贖父出獄兒雖作妾亦所甘心崔氏勉強許諾汪六一以金付之娶翠雲而去母女分手淒絶自不待言而崔氏急於贖夫既得銀在手即負幼子自往郡中愈行愈遠益想益悲又慮此銀一入若更不能贖出則夫妻惟一死而已行至馬平縣經劉蕡墓前疲勞已甚遂將幼子放下置囊于地哭訴于劉蕡大夫之墓嗚咽之聲字字酸楚聞者無不下淚崔氏悲悼一會見黑雲四起知陰雨將至遂起身倉皇負子而去至郡中則城工業已告竣而李匱在獄中已年餘矣崔氏至獄視之李匱悲喜交集急命取銀付吏而崔氏一聞此言如震驚霹靂魂魄俱喪不知此銀失落何地李匱亦嗒然若喪又聞乃系賣女之銀惟呼天而泣崔氏此時欲出城覓之則已日暮閉城不得已至邸中寄宿是夜雙睫淚盈直盼天曉雞鳴即披衣起出城沿途物色俱不見暗思必失于劉蕡墓前仍至故處亦毫無形影尋思無計不覺捶胸大慟坐於墓下聲聲直喚參軍乃唐室直臣寧長臥地下死而無知耶一面哭一面訴淚如湧泉淚盡繼之以血四顧無人覺宿鳥為之悲鳴林木為之淒側哭訴一會正欲就墓前觸石而死忽來一書生問曰娘子毋乃失金者乎崔氏急應之曰然書生曰汝金為我拾得可隨我入城行當還女崔氏聞言如身至鬼門死去復生叩頭不已書生止之徐步而去崔氏倉猝間亦未叩其姓氏此人乃東蘭州軒轅生名固同一友華生名國選者應舉將入武都偶過劉蕡墓前拾得一囊啓之內有五十金華生喜出望外謂軒轅生曰吾二人仆馬之費盡有贏餘軒轅生曰不可此金安知為富貴人所失乎為被難人所失乎若富貴人所失用之固為不義若為被難之人所失則性命死生皆系之矣華生大笑曰兄何其迂非盜非奪自我拾之自我用之亦復何尤軒轅生不以為然回至寓所置金囊於枕畔終夜不寐暗思明日必訪其人還之黎明即起仍至劉蕡墓前候之恰遇崔氏尋死問明金數皆符引至邸中還之誰知華生見軒轅生有還金之意即移寓他所不與共事將金囊攜去軒轅生大驚急至華生寓所則金已耗去過半正色責之乃持歸邸中而崔氏已望眼將穿一見軒轅生喜不自勝正欲稱謝只見軒轅生愀然曰爾金已被吾友耗去過半奈何崔氏聞言重復嗚咽而泣曰良人身陷囹圄前此易業取贖因不足數又陷月餘始賣女得金五十若仍不足數則良人終無出獄之期言畢泣下如雨軒轅生惻然久之既而曰吾橐中尚有十五金並以贈女合計尚少數金軒轅生又至城中問各處可有東蘭州朋友一一訪之代為挪移三日後始全數與之崔氏千恩萬謝而去軒轅生以試期尚早與逆旅主人略貸資斧仍回慶遠東蘭州更備仆馬之費始赴武都而李匱悶坐獄中以為此金已失忽見崔氏持金而至一一説知感泣不已急以金付吏越日釋放夫婦攜幼子同出柳州口中時時感歎軒轅生謂異日當銜給圖報一心望歸融縣至女家視之誰知翠雲之事更有不測汪六一既得翠雲大暢心懷詎料其妻陰氏悍而且醋以六一娶妾即本村李匱之女又聞其美大怒俟翠雲入門引至內房鎖之不通半線汪六一讒口流涎無可如何遣人與陰氏哀懇陰氏益大起風波一罵三朝一詈四夜汪六一伏不敢動彈陰氏亦並不少假辭色汪六一服不敢動彈陰氏亦並不少假辭色汪六一飲恨而已一日偶至內房門隙私窺翠雲忽陰氏至前汪六一見而反走陰氏操杖逐之六一不提防足挂屏風一跤仆地陰氏近前以杖捶無算家人僕婦等將陰氏勸解入內汪六一狼狽始起恚甚大言曰吾何以生為語畢大慚時邑中有臧生者作懼內供狀嘲之其狀雲伏維陰盛陽衰巾幗之雄可畏女強男弱鬚眉之婦堪憐稟坤而乃以乘乾夫綱已墮治內更兼夫正外妻道何隆風斯下矣豈世間多燕趙佳人教且同焉實宇內少昂藏男子慨往古而已然歎近今之更甚某本儒生家傳閥閲自信美如城北豈期配在河東號閫內之大將軍自他有耀怕老婆之都元帥舍我其誰非關南國人柔倍見北方風徑鳩盤茶踞白蓮臺上胭脂虎臥紅錦叢中一言觸惱分明太歲當頭片語加嗔儼似小魈破膽抱衾裯猶存觳觫侍飲食時切悚惶奉命承教早等綸音諭旨之嚴言聽計從恪遵婦倡夫隨之訓被罵總莫妙妝呆動怒又何妨陪笑出必告似哀猿唳月反必面如餓馬奔槽可駭者平時聲若洪鐘到妻前而不聞其響可憐者縱爾勃然盛怒入房中而忽改其容誠何心哉良有以也兼之娘子每抱采薪之憂卑人獨盡割股之孝茶湯自進不同保母之頻呼藥石親調無此梅香之偷懶體心著意痛癢相關敲背搖肩殷勤曲盡宜乎恩威並用賞罰皆施奈何慈悲心不舍半毫冰霜面居然終日縱使盈盈秋水但常見金剛努目之時如何淡淡春山不曾有菩薩低眉之日燈影下誰教你屈體蛇行所可道也言之醜也人面前可畏他大聲獅吼庶幾改之豫日望之更可憚者立法尤嚴設刑備至大門閂使丈夫之驚魂墮地小棒椎乃娘子之撲作教刑馬桶蓋制就圓枷儼似中軍之帽裹腳布權為長練竟同綿殮之尸繡房中一個罪囚即夏禹泣之而奚益黑夜中渾身疼痛縱文王視之而徒傷欲討饒既慮鑽隙相窺將高喊又恐隔牆有耳無奈啞氣吞聲學吞炭之豫讓攢眉咬齒等刺股之蘇秦古公何罪竟罹無妄之災陽貨激恩常感不孥之德瓠犀牙如此鋒銛長頸邊時隱著一顆紫印麻姑爪這般利害瘦臉上早現出幾縷紅斑以雲困頓不亦甚乎若謂風流未之有也將登山臨水總是驚心吊魄之場即宴客娛賓尤多疐後跋前之恐九于魔時時作伴羅剎女刻刻相依既難為孟嘗君之秦地私逃亦徒為齊景公之牛山隕涕頗情願削髮而念阿彌或告之籲無所禱也恨不能腐刑而為閹寺彼將曰噫于汝安乎是以生死均難進退維谷從未得吐氣揚眉之日恆抱此囚首蹙額之容此懼內之稟性良然真怨慕之苦衷莫解不得已而傳之管城子猶未盡我形容無可奈而寄諸楮先生庶得知豫苦楚聊以藏拙不敢書名人各有妻觀之莫笑供狀是實汪六一久而不堪其苦挾資遊京湖而去陰氏竟將翠雲出賣有邵陵老商人在融縣聞之買去商人行至新田縣疾卒翠雲遂淪落營陽李匱夫婦回融縣西羅村時則已賣去月餘矣李匱夫婦自然不勝悽楚幸得一姻家顧氏時周恤之僦居敗屋稍延殘喘時當宋隆熙之十三年正月福寧候開府儀同三司種世龍武寧侯龍武大將軍關普靈俱薨是年禮部知貢舉者乃集賢大學士工部左侍郎歐陽懋德六鎮士子俱雲集于武都歐陽侍郎扃門後得一佳卷擬作首選耳邊似有人語雲此人不可入選歐陽侍郎隨問之曰爾為誰其人答雲吾即唐元和中下第之劉蕡也侍郎聞言遽棄之隨取一卷填為首選放榜後則巍然高列第一者即東蘭州之軒轅固也一榜九十餘人及第出身有差軒轅生以首選即銓道州刺使謁見時侍郎問曰東蘭州有華生名國選者賢契亦知之否軒轅生曰此門生契友也侍郎曰華生之卷業已取列第一有人呼餘不可入選因而擯之究竟其人何如軒轅生對以甚佳侍郎再三問之軒轅生始將拾金一事始末告知待郎瞿然曰無惑乎呼餘者自稱劉蕡職此故耳諸生以一第為兒戲耶一念之差遂落孫山之外以五十金而棄一進士至此悔無及矣子勉之前程未可量當不負吾拔擢也軒轅生再拜受命而退赴任道州令人至東蘭州接其母至其妻亦同至任所時軒轅生無子其妻勸置側室以延宗祀軒轅刺史應允因公至郡中偶見一女子在破屋中為人縫紉刺史悅之遂納為妾叩其裏居姓氏蓋即融縣西羅村賣身贖父之李翠雲也翠雲問明亦知刺史為還金贖父恩人兩情不勝驚訝以事非偶然軒轅刺史轉私歎曰惜乎此女賣身數次不然即充次房可也攜回署中母與妻皆喜為另置鸞鳳巢誰知翠雲仍然處子刺史大喜更令人至融縣訪李匱夫婦至即立為次妻李匱夫婦再拜謝曰再造之恩無可答報願充媵妾以酬高厚刺史不許年餘舉一子其妻愛若己出爭撫養之未幾連生二子後刺史仕至贊善大夫翠雲獲誥命焉而謀陷李匱計圖翠雲之汪六一者竟以狎遊妓館病死於外不獲歸妒婦陰氏絶嗣家資亦蕩然無存矣
