body:
  text: 第三十回狄招討三征羅浮卻説漳州府治東南隅有館曰水雲館前臨浦水面對梁山滄洲繞其左圓山峙其右洵為一郡勝概遊人雅土畢集於此館前有亭曰留珮亭相傳景祐間漳州有虎患早晚常出傷人漳民苦之晉江呂王壽來知漳州頗有德政因蹤迹虎所出入處設穽而死漳民德之後呂王壽將去任漳民挽留不能呂王壽留珮為別後人因建此亭以志遺愛亭中遍植奇花異卉開時郡守邑令多來酌酒賞玩時亭中有盆樹一株高可三四尺幹葉皆紫黑色時小類石楠質理細厚無花俗名鐵樹凡事之難成者譬之鐵樹開花即此樹也一日李繼業馬遇陽等偕齊僚佐文武遊至亭中忽見此樹花開四瓣皆紫白色狀如瑞香嗅之有草氣久而不凋繼業大異之有老吏進曰此花最難開者忽開郡中定有佳兆當為總鎮預賀繼業謂馬遇陽曰其殿下得賢之征乎遇陽等然之花間酌酒呼盧浮白皆謂殿下此去必得奇才以為良輔共成王業忽丹霞嶼守卒報入大洋內有只海舟舟中人雲由占城國與趙殿下送親來此李繼來等不知原委亦不知作何接待惟馬遇陽深明此事遍告衆人曰此必殿下漂泊海外時至占城國赤城堡所聘棗陽人孟來翂之姊也來翂之父名琪理宗時官防禦使因見呂文煥將隱襄陽翂家遠徙其父早卒今來翂送姊回國萬里之遙與殿下完姻真鐵樹開花之兆也衆人齊聲稱賀繼業大喜下令滿城軍民人等皆張燈結彩迎接貴人長孺赴羅浮漳州府事由葛天民代理天民乃送冠誥至丹霞嶼登舟與孟來翂相見各敘寒暄天民備陳殿下由占城歸來於虎丘得遇故人張懷亮自龍會山以劉氏弟兄起兵曆下撫州建昌南安等處統禦八閩又得邵武汀州等郡近得高韓二將軍薦一大將殿下屈己聘賢親身造廬不日回歸方請貴人入郡殿下畢姻目下且權在舟中安宿數日大禮既成香車始進有蹇修令狐老先生請同天民入城與文武官僚一敘時年已七十餘天民甚是尊重其子韜亦趨謁天民略敘款曲一同入城李繼業率同文武邀入賓館獨馬遇陽以子壻禮參見衆人始知來翂與遇陽本聯襟袂李繼業與葛天民等準備花燭諸事停妥惟候涪陵歸日便是佳期且説來翂之姊名麗蓉與母向氏嫂令狐瓊華並瓊英等在後艙中曆盡海島始達漳南沿海探聽未得音耗被海風吹到漳州之南至丹霞嶼泊舟涪陵果在此處篙工與舵師俱疑若有神助瓊英此時同在舟中日看嶼石朝色如丹晚色如霞未免有情不識意中人亦在漳州否芳心脈脈未敢明言又見岸旁祗候官吏逐日不斷饋送問候但是姊夫孟來翂酬答未審書柬中馬氏弟兄亦曾具名否左右思索欲竊一觀舟中耳目甚近恐有不便正在猶豫麗蓉早喻其意以言挑之瓊英未答心中總未能釋然忽報令狐威回至舟中言趙涪陵公聘賢已歸約定香車彩輿來日入城以寅賓館安置孟夫人及瓊英等二姓家小貴人即以來日合巹早正母儀共秉國政孟來翂亦諸事齊備專候鑾輿卻説涪陵與燕超等一行人衆回漳州離城三十裏有葛天民李繼業馬遇陽等率文武官吏俱身穿吉服前來迎候涪陵以為慶得燕超不勝之喜燕超下馬與諸人見禮問訊畢俱各耳語燕超聽罷歡喜異常涪陵怪之縱馬入城見家家結彩張燈俱曰來日接貴人入城惟涪陵以衛王祥興二年已卯十五歲由崖山逃遁海外整十有一年自起兵至今又四易寒暑納聘占城已恍惚若隔世事忽忽忘之入府見羅列許多油幢寶扇金裝玉鈿香車翠輦珠帳彩旗並鸞簫象管鳳笙龍笛無不畢具始暗暗會意衆文武參見已畢燕超父子再三致謝誓報殊遇于萬一涪陵因未正名號權將軍馬盡歸總制燕超讓諸衆將並言高韓二公可托大事涪陵曰國家之事同負責任不必辭謝燕超方受命隨又力薦汝南范國昌應令同參國政涪陵問可方誰人燕超曰才略可方劉穆之風節直逼高允而學問建樹當亦不減耶律楚材也但其人系風流名士行從定耳涪陵愀然曰吾安能即得二賢士而用之燕超曰且令人四處物色燕超亦不時探訪一面將漳州之水雲館改為招館懸挂榜文二人必將自至涪陵大喜從之發付已畢葛天民進曰殿下昔在占城所聘孟貴人令已送至漳南丹霞嶼泊舟候殿下歸成大禮明日即是佳期應用儀注禮物臣等俱已預借但迎接貴人鸞輿或用武職或用文官請殿下傳令涪陵曰此家事耳且待國事稍聞再議成禮不遲葛天民曰人倫風化之首殿下異日正位即妾母儀天下諸事可緩此事萬不可緩涪陵沈吟末對嶽燕超進曰所望殿下恢復故宋者惟為趙氏一脈也殿下已及壯年尚未有室家將何以負祖宗之望慰將士之心涪陵點頭道是命文武酌議李繼業曰今日之貴人將來之母后也不拘文武皆應同往扶侍捍車衆人齊口稱善言未畢有令狐威由丹霞嶼復命涪陵降階而迎令狐威再拜曰老臣風波餘生重視殿下三生有幸也一應儀注孟夫人俱請如約涪陵拱手稱謝令狐威又與衆人禮畢馬遇樂上前重敘闊各申款曲次日已牌時吉辰已到漳洲府滿城錦帳蔽天彩緞鋪地笙歌盈耳香氣襲人許多文武俱錦衣駿馬簇擁一輪香車直入府月與涪陵交拜成禮麗蓉命侍女送還鮫綃帕涪陵亦退回於闐玉相隔萬里今日對面麗蓉舉目四望見金屋銀屏滿眼華麗恐涪陵居安不能思危就飲合巹乃徐言曰海外賤妾蒙殿下不棄收入媵妾自謂置身天上不戀人間矣未審殿下還能記憶當日風波之險惡否涪陵知是針諫乃謝曰風波遠涉勞卿久待地闊音稀罪誠在我但某歸國以來無日不臥薪嘗膽以當日險阻奉為殷鑒卿言及此實深慚愧尤望卿共勷國政以匡不逮麗蓉起立謝曰殿下興言及此大宋之七廟有靈生民有幸矣涪陵見麗蓉舉止端莊談至更深入幃就寢外面令狐威孟來翂等自有葛天民李繼業馬遇樂等一班文武相陪宴至更許而罷次日令狐威叩見已畢涪陵先謝堡中綢繆之情海道遼遠再三勞慰並厚賜其家遣馬氏弟兄往慰母氏孟夫人來翂待以賓禮不時擢用令狐威亦賞賚甚厚賜第貢珠門左養尊處優以示遺老不敢臣之意瓊英系涪陵執柯亦為擇吉與馬遇陽成婚隨有嶽燕超張懷亮等大小文武州縣官僚一齊入賀並邵武高耀卿杉關韓靖夏桂嶺拓跋琳劉瑛史進汀州劉瑝南安馬晉臣撫州馮道南建昌查士珩吉安長孫軌及降將王方朱昶石雄朱旵等會合漳州皆來稱賀涪陵大設筵席三軍俱有犒賞漳州城內歡聲如雷有高韓二將與燕超甚是相得臨別耀卿問燕超曰兵過廣南當在何日燕超約以來春二將遂別各鎮亦散再説廣州參政狄定國因征羅浮兩次失利二廣經略孫靜奏聞元主言定國玩寇敗兵宜正其罪世祖大怒命禦前親軍侍衛往逮之時太傅伯顔已老出奏曰不可定國雖兩次失利尚未大創不如降職帶罪出征如勝贖罪敗則連坐倘更逮入京他將能保其必勝乎世祖允奏下詔貶為參議遣南台禦史胡浩奉詔催促進兵胡浩奉旨至廣州定國望闕惶恐拜受訖謂胡浩曰今日定國不能掃清羅浮無面目回廣州矣即點三千鐵騎令其子狄勇統至城下駐劄然後設宴款待胡浩因問元主之意何如胡浩曰元主甚怒非太傅伯顔將軍業已被逮入京矣此次務勉力圖之胡浩去後定國憂形於色點兵二萬仍調王彥陳同屈突申庹靖等一同進征定國策厲諸將曰此去務鑿釜沈舟以期必勝若更頓挫罪難道矣直望惠州博羅縣進發時羅浮韓昭李穆方至漳州府回皇甫惇侯長孺見寨中兵馬強壯將士雲集且皆命世之英暗喜英雄聚會卻在此間大宋不亡矣逐日與韓李諸人盤桓議論種世龍關普靈寇復雷等至此亦鋭氣日增投壺宴飲豪情雲上練兵走馬旌旗生色鼇怒思蹴翻五嶽鯨掣便掉破百川即滿營將士亦無不躍躍欲試忽報廣州狄定國帶罪出師來征羅浮距胥橋五裏下寨種世龍曰元兵鋒芒正鋭且稍避之待其少衰一戰可捷欲定廣南在此舉矣衆人計議停妥各去準備有前哨狄勇率三千鐵騎竟過梅花村直逼山下討戰定國恐狄勇有失令屈突申王彥引兵隨後埋伏接應又命廖雲以連座車繼進自與陳同庹靖統大軍在後相拒數日羅浮始令王麟引兵出戰只見狄勇金盔銀鎧面如冠玉目若星朗手挽雙鐧立馬門旗之下兩軍對壘狄勇一股鋭氣直欲以靴尖躍倒羅浮王麟抵敵不住大敗而走忽虞凱一兵殺至放過王麟迎馬橫刀與狄勇大戰三十餘合有元將屈突申王彥接應兵至王麟回馬慌忙救護奈生力兵馬不能支援少時廖雲又以連座軍潮湧而進羅浮兵將被圍左沖右突正在危急卻得吳廣吳康洪時錦史霸四將一齊殺入救出王麟等奔回山寨元兵大獲全勝收軍回營定國重賞諸將大犒三軍次日親臨行間指揮軍士力搗羅浮之師吳廣王麟等連戰畢北逐日元兵勝了數陳營中諸將皆謂指日可滅羅浮獨定國戒諸將曰羅浮不可小覷我師纍勝恐敵人驕兵計也下令四處哨探防有埋伏沿夜更鼓刁鬥務宜嚴明人甲馬鞍俱不解卸後軍輜重更宜著意又調庹靖領哨兵一千往來巡警防衛方議攻打仍令狄勇當先廖雲王彥以連座車翼之果然連座車勢不可擋又有鐵騎沖突吳廣史進等三戰三北退上山去死守柵門元兵已到半山定國催動大隊鼓噪而上山上檑木巨石弩箭火噴打來三軍少卻定國按劍大呼曰今日不滅羅浮誓不回兵遂手拿蠻牌身先士卒冒矢石而進殺散守兵奪望樓大軍繼進吳廣史霸等把守不住棄了前關退入次寨定國一聲令下將隘口圍住各隘口矢石如雨此處連座車阻不能進元兵頗傷定國大怒曰三軍何怯也挺槍躍馬方欲上前忽流星馬飛報宇文慶取了龍川寇復雷奪了長寧張燕牛宏破了海豐關普靈率大軍直打惠州府搶上白鶴嶺乘高以瞰城中已圍數日我兵力不能支請招討作速捉師往援定國大驚跌足曰伐魏救韓我兵危矣令狄勇廖雲王彥屈突申把守前關勿與交兵俟救惠州已回方可議戰自率諸將直趨惠州離城不數裏遙望合江樓火焰迷天驚知惠州已失直奔城下忽一聲鼓響突出一隊人馬焦芳挺槍殺來陳同敵住不數合焦芳望城東敗走楊孝伯一馬殺出庹靖敵住不一會楊孝伯又望城西敗走定國見敵軍隊伍不整旗幟不明終是烏合不以為意忽城上鑼聲大震一支響箭射下伏兵四起焦芳楊孝伯分左右殺回傅突一軍直攻其後定國麾兵三面迎敵而斛律亢宗一馬殺出直搗其前元兵披靡紛紛退後定國大驚急催馬迎敵斛律亢宗二槊並舉大戰四十回合不分勝負而元兵已疲於奔命人困馬乏棄甲而走退十五裏下寨定國入帳喘息未定又報羅浮取去長樂和平等縣定國怒髮衝冠切齒不已次日敵兵討戰定國自出見關普靈赤面緑袍金盔銀銷立馬橫刀在門旗下欠身請曰狄兄別來無恙耶定國正色責之曰足下素稱立志不凡今為何從賊關普靈笑曰狄兄曾不記文少保之言乎從懷湣而北者非忠從元帝者為忠從徽欽而北者非忠從高宗者為忠然則今日從羅浮而興故宋者非賊從蒙古而事胡元者乃為賊耳定國不覺滿面羞慚欲戰知普靈不亞於己欲退又恐元兵見之不雅遂勉強揚鞭大呼曰既臨行間且休饒舌來日定決雌雄掩襲者非丈夫也關普靈亦喻其意按兵而退自此不與之戰相持數日定國左右思索並無妙計忽一日報肇慶府知府苗秀實已將肇慶所轄十二州縣納款城中定國急焰中燒帶罪出師失陷州郡罪益難逃又一起流星馬飛報公子狄勇被羅浮擒去廖雲王彥突申三將皆敗兵退博羅縣閉城固守定國驚得手足無措愛子被擒五內俱裂忿怒曰吾今先復惠州再掃羅浮遂下令三軍有進無退矢石當前百步內有回首反顧者立斬以徇擁大軍直逼城下城門緊閉定國令軍士惡罵城中不理定國大怒令造起雲梯周圍用木板遮護一乘立二十餘人各把短梯軟索軍中擂鼓自下而升一齊上城誰知城上火箭射下不一會木板雲梯盡皆燒毀定國立造沖車百餘乘四面分布呐喊而進城上用鐵鎖貫穿鐵鎚飛打沖車無不擊碎定國再起虹橋虹橋不成遂填磴道磴道被毀令軍士頭頂鐵鍪纍肩而上拼力一鼓登城奈城上戈戟如林矢石如雨人無躲處不敢近身定國智勇俱困方欲收軍忽城門開處焦芳傅突兩軍突出大殺一陳元兵頗傷諸將皆潰定國回營納悶暗思如何破了惠州便不愁羅浮矣然必擒得敵將一員換回吾子方妙來日當以混元一氣陳擒之次早傳集諸將各授方略正欲進兵恰好有漳州府皇甫惇至定國聞報愕然即命請入皇甫惇儒巾儒服飄然而進定國素敬儒士禮畢分賓主坐下因問先生何來皇甫惇曰從羅浮而來定國色變曰先生亦羅浮之黨乎皇甫惇曰然既而曰羅浮本無黨黨在漳州然漳州有朋而無黨漢末黨錮唐末黨禁皆亡國之事元惇黨碑南宋以亡招討已入非黨尚言黨乎定國曰何謂非黨皇甫惇曰昔蒙山氏當夏後時國勢強大有臣五人為國柱石其後漸衰臣民離散有商之世蒙山氏赫然中興立國伊耆之墟四臣後裔翕然來歸獨一臣名祝龍者招之不來撫之不至投于鬼方氏之國纍為邊患暨高宗武丁伐而滅之虜其臣民而歸蒙山氏四臣聞之笑曰父析薪而子弗克負荷非吾屬之黨也定國聽罷滿面發赤大怒曰烈女不事二夫忠臣豈投二主定國既事大元有死無二吾以先生乃名教之士卻為羅浮作説客來耶怒氣勃勃顧謂左右曰匣中寶劍新磨今日且將腐儒發硎一試皇甫惇笑曰隨何陸賈不聞事楚蘇秦張儀未曾叛君恐匣中之劍不能試某招討欲自試耳定國益怒曰汝能使羅浮諸賊殺我耶皇甫惇曰羅浮等衆焉能殺招討招討戴罪出師誓平羅浮今羅浮未損一兵未折一將招討既陷惠州又失肇慶公子被虜三月無功經略使孫靜與招討有隙據以劾奏元主忌刻殘酷人誰不知此番被逮縱有太傅伯顔亦愛英與助矣夫日中則昃月滿則虧必然之勢也疏不間親新不間舊必然之理也況顔子拾塵尚惑于師曾母投杼猶疑其子前經兩次敗績固已不勝衆楚之咻今又一翻大創豈非又增一秦之患殆哉岌岌尚言匣中寶劍能試某乎元夜張宴奪昆侖可惜一副好銅面具耳吾言已畢即請告退定國大驚離座而起慌欲挽之皇甫惇不顧拂衣而去定國滿腔心腹被皇甫惇一一道破進退維谷諸將已默窺其意方欲進言勸降忽報公子狄勇已回定國喚入剛欲責其辱師被擒之罪只見狄勇怒發如雷大呼衆將歸順羅浮重興宋室定國怒欲斬之狄勇大言曰父親教子須以義方弗納於邪豈反令兒不忠不孝乎定國曰何為不忠不孝狄勇曰漳州府宋室復興乃是故主今反顔事仇何得為忠先祖武襄節度為宋室股肱懿親今違命仕元何得為孝子定國無言可辨乃曰畜生已入羅浮圈套中他人計矣衆將亦勸曰公子所言俱有大義招討不可不從狄勇曰羅浮所聚盡名世之英義旗直舉聲應閩中大人三次起兵能少挫其威乎況種世龍關普靈兩位叔父素與大人契交今已入局中大人何執迷不悟也定國沈思良久尚在遲疑又報元旨下準備接旨果然定國因失陷州郡被孫靜劾奏世祖大怒命宦者洪實給事中撒泰不哩奉旨摘印械京不一會校尉簇擁二人入營定國方欲下跪接旨忽狄勇上前拿住洪實拔劍斬之庹靖便殺了撒泰不哩校尉緹騎十餘人濟得甚事被衆將剁為肉泥狄勇庹靖各提首級大呼曰今日全軍歸宋有不從者以二人為例三軍皆言願降定國屢戰不利原有悔仕蒙古之心只恐衆心不服今已殺使命將士皆從始下令改換旗幟兵屯娘娘廟遣使請惠州關普靈羅浮請種世龍至營中會議次日世龍普靈皆至尚未開言定國曰狄某執迷不悟叛父叛君想既往不咎了二人齊聲曰當今之世不但君擇臣臣亦擇君兄前日亦食其祿者忠其事耳定國曰歸宋一事公等有何計議種世龍曰弟等已遣人表奉漳州約會宋王來春兵過廣南仗義大舉關普靈曰宋主起江右閩中已得十郡根本已固至過廣南尚冀狄仁兄羽翼大事可成定國曰此間有二萬人馬權作進獻潮州府所轄十縣乃部將曲猛鎮守某即發令箭命改換旗號更易服色同歸宋室何如世龍普靈大喜曰可謂三人同心其利斷金矣關普靈曰漳州府皇甫惇侯長孺二先生何不請至一敘世龍曰甚妙定國始知皇甫惇即宋主遣來會合興師者也催促二人作速請至世龍方遣從人出營忽報營外有四人俱高冠博帶軒然而來定國出視之即皇甫惇侯長孺韓昭李穆也逐一禮畢定國一見皇甫惇自覺慚愧深謝曰定國武人未嘗學問前日開罪先生先生其有意乎皇甫惇正色曰將軍是何言也前日將軍若坦然即來歸宋則將軍亦無心肝之人矣於某何取焉定國曰采葑采菲無以下體諸公不我遐棄保全餘生誓當努力報效使前愆晚蓋韓昭李穆曰淮陰歸漢先仕西楚不聞以執戟郎官掩後日開國殊勳也定國遜謝候長孺笑曰將軍與長孺同出一轍然皆皇甫先生力也語雲為浮圖者必合其尖越王台當共為皇甫先生一建衆人大笑定國此時意力釋然死心降宋大設筵席款待情甚周密世龍普靈亦令山寨賚牛酒至營中大犒三軍將士鼓舞大悅世龍請定國移兵羅浮定國曰合兵一處固屬至便但關仁兄守惠州距羅浮不遠惟潮州最近海道元兵由登萊而下即到南境定國分兵一半屯潮陽嶺與曲猛犄角相援再令狄勇庹靖廖雲王彥四將領兵一萬劄陽江縣海陵山遙應肇慶一處有警各路赴援待至來春始合兵征進豈不甚善衆人甚喜得計各回營中厲兵襪馬廣南大事不日可定矣
