body:
  text: 第七十四回王太常詞慰幽魂武都太常署中廳室左側後廢軒數楹時有鬼物作祟無人敢入軒前梧桐數株連抱合圍清陰欲滴直蔭半畝王太常用槐愛其清幽令糞除此軒以為書室家人切諫不聽退朝後花底會客月下賞心皆在其中時而飲醇醪數盞時而吹洞簫一曲久之安然無恙太常笑曰甚哉人言之多妄也暑夜每獨宿軒中心神俱爽自以為淵明之南窗高臥作羲皇上人不是過也既而西風乍起軒前梧葉瑟瑟有聲太常每當月上即吹簫一曲其音清越以長直動林木以後秋夜軒中微有蠕動繼而幾案陳設之物往往有移至他所者太常以為常未之奇也又漸而人臥後即窸窣不已或作翻書聲或作太息聲雞鳴方止太常靜觀其異一夕月色晃朗正從梧桐影裏映至軒中太常愛之小酌吟詩一會又引簫嗚嗚吹之直至夜深方寢伏枕後見一紅裳女子直趨案前時殘燈未滅女子即挑燈斂容端坐把卷翻閲吟詠不止太常細聽之聲韻淒切音節悲楚若不勝幽咽者太常披衣欲起忽女子又釋卷執筆在手口詠手書頃刻即成二詩自歎自賞乃朗吟曰舊梳妝處最堪憐疊次開軒點翠鈿今日事非人面改夜台空喚奈何天恨煞當年夢幻身墮來苦海幾多春行將化鶴西歸去華嶽山頭作女真太常聽罷不覺技癢搴幃咳聲而起曰嘻寧有如此不畏人鬼耶女子亦起身微笑曰太常寧有如此不畏鬼人耶太常此時也不暇款曲也不問人鬼走筆即和其詩曰淚盈紅袖有誰憐腸斷三更懶整鈿安得返魂香一炷再生人世莫生天泉下誰同泡影身鶯花依舊故園春從知埋玉難埋恨兩首新詩自寫真女子觀畢嚶衽而泣斂衽謝曰太常真解人也妾一生埋沒筆硯今日始遇賞音太常問卿生於何地歿於何時或飢欲食耶寒欲衣耶抑旅魂無依尸骸未葬耶女子曰妾俱無所願妾雲間人也姓劉名絳雪父為此郡太守因汝大宋兵臨城下父仰藥死妾亦在此軒前雉經而亡妾生前極好筆墨苦耽吟詠故旅魂滯魄至今猶戀戀舊遊處也今得太常陽春白雪一和俚曲妾從此逝矣太常喜曰卿好吟詩真雅人哉豫行將大延禪士普度慈航仗楊柳枝頭甘露為卿灑遍體清涼可乎女子辭謝曰感太常高誼憫及幽壤但法會之設於妾亦無所損益妾既耽書史雖異物亦頗能免俗太常既憐妾何不更為妾一續原韻太常驚喜欲狂捉筆又和曰青草黃泥最可憐妝台無處覓花鈿傷心環佩空歸夜疏雨梧桐欲曉天仍是亭亭倩女身夜台虛度十年春無塵羅襪輕歸去佳話流傳悟本真太常和畢以洞簫度之簫聲未已曉雞已喔喔三唱矣女子乃拜謝而去在常深以為異自是而軒中寂然無恙女子料不復至
