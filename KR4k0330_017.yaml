body:
  text: 第十七回壽陽城錫帛僭號卻説太平府楊鎮龍命史進引兵攻取寧國史進偃旗息鼓偷過涇水將沿江斥堠拿下直達宛溪竟臨宣城出其不意一鼓襲之守將逃奔不及皆被擒獲口稱願降史進即令褫女衣甲扮元兵模樣打宣城旗幟直賺宛陵日暮始達城下大呼宣城守將兵敗至此作速開城城上舉火照見果是宣城兵馬大開城門史進隨後一湧而入城中大亂縣令吳倫方於燈下料理簿書聞驚仰藥而死千戶走涇縣去了史進毫不費力又奪了宛陵惟寧國府尚有重兵屯涇縣石蘭坡阻截去路琴高山有團練副使佟宣朗駐兵二千遙為之勢史進移兵遂向涇縣直叩石蘭坡元軍前隊指揮濮陽其通列開人馬兩軍殺出史進迎住大戰三十餘合元將精神倍加槍法亦無破綻史進料難力取撥馬便走濮陽其通縱馬來追史進拈弓搭箭回身射去濮陽其通有心防備側身躲過腰間掣出流星就勢打來史進措手不及已中脅下負痛而走元兵從後追殺搶去鞍馬器械輜重無算濮陽其通大獲全勝收兵仍屯石蘭坡扼險以待佟宣朗聞前部捷音移營向前合兵一處方酌酒稱賀忽暴風吹折元武牙旗一角佟宣朗曰此警兆也今晚賊兵決來劫寨可分兵四散埋伏虛其中軍一鼓可擒賊矣濮陽其通深然之當夜史進悄地引兵而至三鼓後昏黑欲雨雷電交作史進且不入寨先令二百名精壯軍士呐喊殺入信炮一起業已退出帳外果然元兵埋伏四起自相混殺佟宣朗轉出後帳濮陽其通轉出前帳二人督兵酣戰史進將大隊遠遠扎住待其疲倦將欲天曉始擂鼓呐喊以生力兵馬橫沖其隊元兵首尾不能相顧人困馬乏史進以逸待勞士氣百倍正遇佟宣朗交馬只一合史進手起一槍刺落馬下濮陽其通血濺袍鎧猶指麾軍士廝殺抵死不退史進督軍亂箭齊發濮陽其通兩腕連中數箭用口咬出箭鏃皆深入骨裏乃拔劍大呼曰上以報君父下以示三軍某力竭矣死又何辭自刎而死兵士死者無數余者倒戈伏地盡降其衆史進長驅直取寧國入郡盤查府庫休養數日然後引兵復下旌德南陵諸縣勢如破竹全隊仍還寧國剛至城下見敵樓上刀槍齊豎一將仗劍而立指史進大呼曰吾取寧國已多時矣宣城一帶鄰我壽春臥榻之側豈容他人鼾睡乎史進見紅旗招展皆書秦字知是鳳陽乘虛襲取激得雙目欲進怒填胸臆率兵攻城城上矢石如雨不敢前進史進忿憾不已大罵秦錫帛無義猾賊秦楊二家聯盟起義共相救援不圖姦猾如此叵測折箭之誓口脂未幹料汝姦相孽子後裔當立見其敗也言未畢城上賈智深一矢射下史進驚避已中盔上益加忿怒然無可奈何方下令退保宣城別作良圖忽流星馬報來太平城楊寨主已被安慶府都統制耶律淵引兵圍困十分危急城下赴水而死妻孥自焚元兵恢復太平鳳陽秦寨主不為援救且因乞糧之恨乘勢奪廣德據吳興慕容光大敗蕪湖不知去向張師旦耿星星皆投鳳陽去了史進聽罷目瞪口呆半晌説不出一字良久乃涕泗交流撫膺長歎曰楊寨主絶鄰閉糴坐取敗亡盟言何用惜我等枉自疆場血戰耳吾雖不智敢不忠乎拔劍欲自刎左右奪劍勸曰良禽擇木賢臣擇主楊寨主既死將軍即自刎無濟也以將軍之志勇何往不可史進躊躇未定左右又勸以即投鳳陽史進佛然曰不可秦錫帛為人倨傲姦險不足有為定非可托身者不如權過江右南安大庾嶺蓬頭寨安身相時而動擇主而事衆軍願從者即從不願者各歸農圃聽其自便部下皆言惟將軍命史進乃分三隊徐徐以退過了寧國盡散隊伍由饒州望鄱陽而去且説秦錫帛命賈智深率龐奮褚點襲寧國府藍天蔚襲吳興邢士龍襲廣德三路俱有捷音又聞楊鎮龍兵敗赴淮而死正欲領兵來爭太平史獻白壽曰太平不可得也錫帛問故史獻白壽曰太平府乃金陵門戶前以疏虞偶爾失陷今既恢復豈無重兵沿江防守即長江千里互有聲援牛渚採石萬難飛渡況耶律淵智勇兼備不可輕敵既無成算徒勞師動衆取他人笑耳為今之計大王宜先正名號鼓勵將士觀釁而動再議興師未遲錫帛大喜旬日間有萬俟蠣莫綏猷二人來投又有楊鎮龍部下耿星星孫虎樂螭皆來歸順自此謀臣如雲將士如雨錫帛遂撥兵五千令其兄開岐率領龐奮褚點鎮守鳳陽所轄州縣錢糧移屯萬歲山刑士龍領水兵三千就淮水下寨其寧國吳興廣德等處俱遺驍將分兵鎮之自統諸將率大軍仍回壽陽自稱淮南王以賈智深為左相史獻白壽為右相權軍國重事莫綏猷為參議萬俟蠣為司農卿理錢糧度支藍天蔚為統制兵馬大元帥邢士龍為水軍都部署龐奮褚點皆團練使新降若耿星星等俱授指揮封其兄開岐為寧國公兼鳳陽留守杞梓二子見質廣陵即以楠為世子而以紫金山為雄武營壽陽城中建立宮殿出入皆警蹕莫綏猷請立宗廟崇祀三代錫帛從之然錫帛本以王姓遺孽冒秦氏後裔秦氏自孝宗時已盡流嶺南寧宗登極並沒其姓惟家資巨萬皆昔年屏塞人主開門受賂所得曆高宗孝宗寧宗三朝不過敕令致仕徒置嶺南奪其爵諡而已皆未籍其家故猶永保其富儲藏既廣久蓄異心元兵南下後仍返江陵自復其姓錫帛以其父考皆不顯廟中設為配享而祀塤堪坦三人為曾祖熹為高祖檜為太祖萬俟蠣又請書一德格天匾額於廟並録紹興時靜江知府呂願中所作秦城王氣詩以獻錫帛見二人舉措十分稱意無不從之並賈史四人皆托心腹預贊機密忽一日錫帛與萬俟蠣議論各處錢糧戶口並聚斂榷取之法萬俟蠣乃是個刻薄小民的慣家條陳理財一事被他搜括得毫發不漏錫帛大喜手撫其背曰卿初投孤時見卿僬僚傴僂孤以為不足齒之傖今條陳大略雖桑弘羊利析秋毫不足過也卿可謂孤之王猛矣即加以參政之職萬俟蠣叩謝此時兩淮百姓要生不能求死不得飢寒困苦道殣相望被萬俟蠣多方設法羈縻牽制思逃遁他方亦俱不能越境爭奪錫帛軍糧既廣又命藍天蔚整頓兵馬不日爭奪就近州郡有安豐路經略宣撫副使董文炳聞知大驚不疊星夜奏入燕京去了且説涪陵與馬氏弟兄離了占城國赤城堡望交趾迤邐進發晝夜兼行只期十餘日直達瓊州便抵廣南忽一夜轉了風星月無光昏黑中颶風突起波濤洶湧船勢顛簸不定涪陵忙持定風珠船頭坐定大洋不辨東南又恐落套只好隨風漂去一時舟行如駛且喜此珠果系異寶當風而立便一直吹去船仍端然不動三人與掌針水手徹夜不敢瞑目呆呆看著候至天明水手認定風色大驚曰不好了此是小琉球國北界近福建洋幾次下不著碇風愈發愈緊益加迅速又是數日直至松江府上海縣東洋方排舟定泊下遠遠望見黃浦又墟煙縹眇間有小舟飛也似來涪陵三人始登小舟不一會上岸入城恰至上海縣令擺道而來旌旗對對鹵簿前呵涪陵一見故國衣冠禮樂制度大非往昔真是風景不殊舉目有山河之異暗暗垂淚歎曰某等竟作南冠楚囚也又見處處遵行大元正朔涪陵一時心頭火起指定城中大言曰趙某若得光復舊物正朔仍當還我軍民違者以叛逆論罪言未畢忽旁立一人大喝曰何來賊匪在此私探衆人作速拿獲送官正法三人大驚未知如何且看下文分解
