body:
  text: 第十四回萬俟蠣棄家走壽春東京陽武縣一人姓萬候名蠣以刀筆為業天性狡獪利口便給仗一支懸河口三寸不爛舌不耕而食不織而衣一班也厭膏粱而服文繡且人所不能言者彼能言之人所不能為者彼能為之以此變亂黑白混雜涇渭遮莫是明察官長俱被他弄得糊糊塗塗瞞得清清楚楚至迎合官長處提頭便知尾舉念即會心逮至日深月沈則操縱若提木偶反復似弄嬰兒告訐舞文指揮如意河南陽武縣一員七秩縣宰竟歲歲皆萬俟蠣除拜矣以此攔劫公門不數年遂有千金之産因念生平惟托城社為姦終寄人籬下代作嫁衣未能手撫印綬身蒞公堂巍然作一真命縣宰立定主意直入燕京投身在丞相桑歌門下自效這開門納賄乃萬俟蠣賣物當行大來大做小來小做不久遂大愜桑哥之意用為記室托以心腹從此漸打點自己前程又每與桑哥左右送殷勤仆妾行兜攬無不為之極力遊揚桑哥亦不知不覺滿心歡悅直補以京西平涼府固原州州判萬俟蠣聞命大失所望不得已就任自思有大勝者必有小敗一下車即勤謹清廉慎守官方同寅皆稱羡之事無大小皆市美譽沽買德政歌正所謂欲擒先縱欲貪故廉也一時治下士夫頌之者不曰召杜遺風即日萬家生佛將固原州州判竟拂拂揚揚傳入安撫耳中安撫使呀曰此循吏才也任為州縣長或可展其驥足耳遂加以直隸知州銜而調補褒城縣知縣萬俟蠣大喜蓋非喜其得加職銜喜其得作縣令也從此森羅變相刻刻怕人百萬生靈驅入饞口接一狀子不問其理之直不直先問其家之富不富若富雖盜跖莊蹻皆有生理不富即伯夷叔齊亦有死法此風一倡上行蔔效自有一班吃白的無賴棍徒或誣控賭博或捏造人命修造房屋指占公地買賣田産捏漏國稅柳下惠之坐懷竟是姦淫婦女許孝廉之讓産直斷估占家私最嫉惡者鄉紳士子進見每高自位置動加鄙夷微有忤犯必十分廷辱窘迫備至若遇不肖掩紳袖金入見手出白鏹分庭抗禮則尺有二寸睫毛皆毶毶然作鷺鷥笑矣萬俟蠣又將褒城遠近地勢酌按陸路設關水路設卡事事有行行行有稅山居者稅菽麥水居者抽魚鱉樵豎供柴薪織婦女輸布帛釐毫絲忽網羅幾盡至各關上稅取十分之三然此關稅矣前關又稅前關稅矣首關又稅弄得你權子母者告瓶之罄矣意猶難甘凡商賈負販誤入褒城者多是晦氣當初商王成湯網開三面萬俟蠣褒城縣之網共開六面四面皆設法羅取又上下其手豈不共有六面時有販繒客人婁丐系寧羌州人氏南北通行乃一富賈從人甚衆押著百餘輛繒帛直過褒城稅了頭關不稅二關人役阻住貨物婁丐大怒揮動老拳打傷吏役直闖過關吏役再追至次關兩關齊力一同拿獲擁至褒城萬俟蠣初聞咆哮大怒及見許多車輛貨物不啻萬金遂事急智生心花俱開將婁丐略略審問一毫也不動聲色命監下候命逐日設計托心腹人監詐嚇誆騙使入圈套婁丐乃鐵石硬漢江湖豪客在監已煩悶不過齷齪不堪又被他歪纏到底願以十車繒帛獻之十車不允增二十車二十車又不允至四十車萬候蠣見百餘輛僅得此數意猶未足仍然不放又設伎倆謂打壞關門致損什物毆傷吏胥各處所值若干此類雲雲分析甚夥仍延至數月婁丐在禁中無可如何如數獻之貨物已去三分之二此時有牢頭獄卒等皆曰客人自此脫離犴狴矣誰知萬俟蠣更不釋放又謂應取保結奉節級付文憑給申引如此懲般説法還不下數百金婁丐聞知只激得雙目直瞪欲自刎而手無寸鐵欲自縊而徒死無益竟如數償之伊更何説萬俟蠣見弄得如此已無法可設無計可搜始命放出當堂將貨物交割婁丐一看尚有三十餘輛即票曰此數應客人貨物否萬俟蠣曰此女原物也婁丐領畢命從者推出儀門聚於一處縱火焚之一時公廨煙焰大起少時三十餘輛繒帛胥為煨燼領著從人大笑而去萬俟蠣在公座目中火出眼睜睜看著婁丐舉火不便發語更不便令人救護並腸子也激做七段八續連叫可惜沒興而退從此南北商賈紆道而過畏褒城之多關也至褒城百姓乃囊中物著手惟傾家破産賣子鬻妻而後已但聞得萬候蠣三字無不魂驚魄悸一日進香回衙經一巷口見有新造門牆十分美觀忽隔巷一破戶內有鼓樂聲是日乃國忌日立即大怒命鹵簿速往拿至皂役回稟乃是破戶萬俟蠣罵曰奴才多口明明此家作樂于破戶何與皂役會意立即擁至轎前乃一納粟巡政廳萬俟蠣責曰國家忌辰如何擅自作樂巡政廳答曰職員李曉山作樂者乃隔巷張道土家為伊亡母作小祥齋職員有何涉也萬俟蠣怒曰明明女家系我親聞尚有支吾命回衙收入卡內靜候發落李曉山叫屈不已只得暗通關節令人囑託五百金為壽萬俟蠣立便釋放一日審一小偷系竊瓜賊不肯妄攀平民被夾拶不己大呼曰小人僅偷一瓜何至如此取筆題曰不須夾拶不須敲女比穿窬術更高叉手取人肝與腦滿身俱是殺人刀萬俟蠣大怒反唇相譏吆喝一聲立斃杖下又一日問一株連平民姓劉名友恭家道殷實素讀書敦氣節與胥吏有隙因將友恭之名囑大盜供出萬俟蠣如獲重寶橫加拷掠鍛煉成獄劉友恭指天誓日謂捕風捉影憑盜口一詞誣人不法恐天理公論難泯萬俟蠣愈怒用死豬愁定百脈等法羅織鞫之極其殘酷劉友恭死而復蘇咬牙切齒大言曰女串通盜賊詐擅民財劉某身首異處畢竟不服萬俟蠣一聞此言眼中火噴口中沫出即如劉友恭殺其父母一般令速杖斃一時皂役如狼似虎惟見血肉交揮劉友恭屈杖而死將尸拖出其子遇隆尚幼冤填胸臆無處發泄領尸呼天搶地而歸萬俟蠣褒城敲詐之謀除去盜口便在娼妓得一妓當案鞫問令供體面紳民甚至有娼妓盜賊良心難味處不忍一味妄扳萬俟蠣要拶要打十分恐嚇日日抽筋刮骨富民剝削已盡漸無蛇可弄矣忽又想及城市鄉鎮有許多訓蒙老學究每館按書童若干應繳結若干搜刮一遍不拘一兩五錢積少成多可憐褒城散了無數寒館逃去無數孰師以及巫醫先生木石工匠寺內僧尼觀中道士日日奔走皆為萬俟蠣充滿囊橐日有日征月有月稅至此漸及下藝聞衙前一剃發師有玉杯價值數十緡萬俟蠣思構陷之而未得其便也一日有磨鏡奴一賣菜傭一操舟牙儈一牛醫叟並剃發師五人聚而間談拍手而笑萬俟蠣適出遇之喝左右拿下五人方欲驚走已被鎖住帶至堂前面面相覷萬俟蠣問各習何業何故聚此摴蒲磨鏡者曰磨鏡而兼補鍋偶然聚談並未摴蒲萬俟蠣怒曰聞所談者明系摴蒲何言尚未命且監下問賣菜者並習燒餅師謂其不去燒餅不合坐而談笑命且監下問操舟者系漁戶謂其不往捕魚不合坐而談笑命且監下惟牛醫翁甚黠不待問及先大哭曰小人家無鬥筲所業最窘乃牛醫耳萬俟蠣罵曰不長進也老傖若大年齒尚家無擔石並皆監下又問剃發師謂其也不合坐談摴蒲一同監下五人暗暗叫苦各個會意典房舍衣物賣家室兒女少者貫以青蚨多者湊成白鏹惟剃發師直勒至變賣玉杯得五十兩元絲方釋手而罷又有一修足匠聞其女甚美有富戶欲以百金娶為妾修足匠未許萬俟蠣算計已就命入衙修足見伊手正用力處故將足一伸攖著刀鋒鮮血淋漓萬俟蠣捫足大怒修足匠已魂不附體連連叩頭萬俟蠣惟令速速打死既而曰且待足傷痊愈重處未遲命收入禁遣心腹微示以意修足匠無奈托人將女賣與富戶以百金獻之始免罪而出仍令不時入衙修足一日修足匠入萬俟蠣惻然問曰女父女頗相憶否修足匠伏地大哭不已萬俟蠣曰女可捏定買良作賤一詞將富戶告來修足匠果從其策呈詞上萬俟蠣批傳富戶大加呵斥要依律處分富戶此時噬臍無及暗托人關説願退女外贈百金作奩費更獻二百金為萬俟蠣壽萬俟蠣允之待女金兩繳始喚修足匠謂之曰爾女業已退回可領歸去但此案頗費周旋非獻我百金不能辦也修足匠不知所對萬俟蠣笑曰此間業有百金系富戶某贈爾女者留此可也修足匠叩頭謝曰父女聚首已出望外不願得金也泣拜而去如此之類不可殫述一時賄賂塞途人人震恐穢聲狼藉比戶相罵欲上控而萬俟蠣系出桑丞相之門根深柢固安撫使亦頗礙情分正值京西路廉訪使按至漢口凡褒城被冤者紛紛控訴廉訪使得實並欲劾奏安撫及直省左丞等安撫始赫然震怒將吏役等擬軍罪而于萬俟蠣終留桑哥情分從寬革職徒三年而已萬俟蠣此時宦囊正足洋洋不以為意落得起程時褒人惡言謾語極力詬詈兒童婦女亦持瓦石擲之萬俟蠣低頭出城徐謂輿夫曰笑罵由他笑罵好官自我為之直望朔州而進徒限既滿並妻妾子女家於朔州撫有萬金因思一富貴長久之計遂置姬妾開妓館己亦得便宜取樂即眼穿金線衣織回文皆是子弟揮霍免破自己血鈔一時車馬盈門笙歌徹夜燕趙一帶院中之名大噪有寧羌州婁丐經此偶至院中留連數日賞賜無算衆姬妾著意順承吹彈歌舞婁丐幾乎樂而忘返忽見萬俟蠣在內吒異久之因問姬妾始知就裏婁丐喜至手舞足蹈曰妙哉妙哉早知女今日如此可兒悔當年不贈數百輛繒帛也萬俟蠣侍立拱手不敢多言婁丐盡興而去萬俟蠣不以為恥方謂富足生涯惟此穩適己不過託名而已誰知大同府懷仁縣獲劫餉大盜十餘人追問餉銀俱費在萬俟蠣院中移交朔州太守立命拿獲緝捕等將萬侯蠣鎖至公堂太守喝重責四十追償贓物萬俟蠣伏地猶稱罪官願繳原銀懇恩免責太守怒曰本州管女罪官不罪官皂隸見本官動怒已拖翻在地退去褲子方杖一下即如曲蟺壓定兩頭從中亂扭杖至二下一時爺娘皇天喊將出來杖至三下喊不成聲如殺豬也似號吼而已一五一十滿滿杖足方知杖下痛苦乃如此難熬者今日始嘗嘗滋味皮開肉綻將銀交楚立即驅逐家中什物皂役已虜掠一空姬妾逃去院中亦房廊未折而已餘無所有幸褒城所得之銀猶七分未動無人知覺攜了妻小急離朔州自思不便競回陽武遂過潛江修第宅置田産召僕役仍富甲一鄉鄉人不測其底蘊每嚴憚焉久而出入皆仕宦聲勢赫赫欺淩裏閈挾制官長漸至道路以目忽一夜有無數巨盜突入其家將萬俟蠣縛定榜掠備至仆役驚起見群盜皆摳臂熊腰各持霜刃不敢聲張任其席捲財物而去萬俟蠣甚恚當夜燈下遂草詞狀將往承天府大肆告訐殊知福無雙至禍不單行猶未天曉忽廚下無故火發急令撲滅奈火勢正猛愈撲愈熾號呼鄉鄰無一至者轉瞬間延燒以盡將一所連雲耀日宅第化為烏有還有二幼子與一妻燒死宅中搶救不及萬俟蠣恨所賺贓物更去三分之二不日仍鳩工庀材重新建造輪奐式美棟宇維新丹漆堊黝一時備舉方落成之際自謂富家翁仍不在他人下也乃有俊仆竊其女兒並金銀等項遠揚而去萬俟蠣知之而不敢發一夕又一小廝與其妾有苟且事遂勃然大怒提刀而往將及忽轉念曰天下事大可知也放下刀子出門飄然而去至中途遇一人自言自語忽悲忽笑異而問之乃歸德府考城縣尉姓莫名綏猷者也秩滿回閩宦囊頗不空虛為鄉里所不容疊遭橫逆將往壽陽投秦錫帛處萬俟蠣聞言兔死狐悲物傷其類各訴衷曲二人遂入鮑魚之肆攜手同行齊往壽春自此鳳陽又添二賊矣
