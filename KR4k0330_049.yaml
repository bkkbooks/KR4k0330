body:
  text: 第四十九回嶽招討計賺長沙翔龍府涪陵王命耿進誠在邵武建都立國經營土木之事又分撥諸將于江右閩廣大興屯田積儲有餘都統制嶽燕超已在廣南練兵養精蓄鋭一日關普靈引降將二人入見涪陵王問之乃劉遇隆藍天蔚也涪陵王以用人之際俱授武議郎撥入統制營下聽用二將拜謝入營會涪陵王拜統制嶽燕超為招討使調集隨營將士選精兵十萬以扈德威為先鋒辭別涪陵王及文武等由廣南望湖湘而進前隊扈德威方逾桂嶺有兵馬使寇復雷由茶陵州亦引兵來會二將相見甚喜扈德威問曰長沙各處守將何如寇復雷曰長沙防禦使杜元侃頗有威望而湘東守將邵倫蒲宏不協人心可襲取也二將即首先引兵濟湘江赴衡陽至煙霞關有元將撒哩合達阻住扈德威寇復雷將軍馬列開勢若長蛇鼓噪而進撒哩合達開關迎敵兩軍合戰撒哩合達豈是二人之敵不三合中槍身斃元兵遂敗宋師乘勢搶關降其餘衆大隊繼進二將直過回雁峰遂抵郡城邵倫登陴固守蒲宏引兵出戰扈先鋒督軍即與對壘蒲宏鏖戰多時被德威奮斬之元軍大敗城內接應兵出方鳴金收軍次日邵倫死守不出欲勞宋師二將竟引兵徐退至三十裏屯住元兵不省城中閉關數日漸次少懈出入樵汲五日後宋師復至將城圍定邵倫登城親自巡視弓弩矢子疊番施放二將督兵奮勇攻打圍至宵分忽城西有人開關接宋師入城邵倫大驚率兵下城巷戰兵無鬥志邵倫被擒二將遂得衡陽勸降邵倫所屬州縣傳檄而定時嶽招討大軍在湘江既得捷音命張懷亮種世虎馬遇樂三將引兵徇下湘潭以開路徑大隊望長沙進發經安化縣有杜元侃部將陳璣苗賁屯兵士星寨以遏宋兵招討命嶽坤退敵嶽坤以山勢險峻路徑不熟初戰竟為所敗招討大怒立命斬之衆將苦苦告免始杖之仍令破敵嶽坤負罪引兵再戰陳苗二將果為所殺破其軍遂過此寨令人哨探回報此去長沙沿途俱有兵阻而杜防禦之兵屯善化縣西北八十裏金盤山長沙城近共七十二座連珠營內外戒嚴招討聞之即移兵向善化而進中途又連遇元將馬埏張濟杜勳等之兵俱為種世虎敗去遂抵金盤山列陳討戰時馬埏等敗回金盤山杜防禦怒責之黜退令趨護郡城自率部將迎敵張懷亮一騎早出元軍中一將大呼團練使劉鴻來也二將交馬不一合杜防禦令健將白忠從東南角殺來霍偈從西北角殺來各引一軍橫沖其陳詎料宋師壁立不動杜元侃援桴擊鼓督將士力戰混殺一會招討見兩軍互有損傷鳴金收軍當夜宋營中有降將藍天蔚劉遇隆請往劫寨招討不許曰杜元侃老成持重寨豈可劫待別尋良策破之張懷亮曰杜元侃輜重必由浮邱嶺益陽等處搬運招討若停兵數日某願往截糧道招討曰杜元侃駐兵于此原非持久之計糧運有限但截斷浮邱令伊腹背受敵亦是一策惟不可不慎耳即令張懷亮率藍天蔚劉遇隆引輕軍一隊由間道去訖次日杜防禦引軍索戰宋兵不出一連數日杜防禦心疑即命劉鴻率兵往益陽一路哨探時張懷亮已偷過浮邱阻住糧道劉鴻兵至已遲一日為宋師所遏遂大戰于浮邱嶺上劉鴻不敵三將為藍天蔚所殺兵皆逃散入防禦營中杜元侃自悔疏虞大隊仍堅守不動藍天蔚暫守浮邱嶺張懷亮劉遇隆二將率兵遂襲益陽益陽兵少守將不支遂潰二將安民畢又往奪寧鄉杜元侃自知善化難守遂由金盤山徐徐引退衆將皆欲追之嶽招討曰此兵進退井井有法不可追也令狄勇以一軍拔善化亦移營而進時扈先鋒引兵渡青草湖會合湘陰張懷亮亦至寧鄉會同進兵直抵長沙距城五十裏下寨杜元侃調集將佐堅守城垣迎戰於銀塘浦前士殊死鬥宋師少卻而嶽招討壓定陳腳步伍不亂杜防禦亦舉止慎重立即鳴金收軍是役也宋師頗有損傷元軍將士無不稱慶杜防禦不以為喜惟令將士益加小心次日宋營中馬遇樂討戰元軍健將霍杲出馬不數合馬遇樂敗走霍杲驟馬趕來狄勇種世虎兩翼伏兵殺出元軍大敗霍杲措手不及為馬遇樂所斬仍來討戰杜防禦令白忠對壘馬埏張濟左右救應不三合馬遇樂又敗白忠不追令人哨探號召左右救應二軍而進忽鼓聲大震扈德威一軍突至大刀闊斧阻定前路馬遇樂一軍反抄出元兵之後前後掩殺三將腹背受敵元兵大敗扈德威輕舒猿臂生擒白忠於馬上擲之於地衆軍縛定馬埏正慌亦被馬遇樂刺死張濟落荒而走元兵死者大半余皆逃去宋師大獲全勝杜元侃大驚移軍入城堅閉不出嶽招討且不攻城即撥扈先鋒率種世虎劉遇隆等引兵三千直犯營陽先拔江華新田等縣進攻道州道州都指揮赤丁引瀟水以灌宋師宋師少創再戰浯溪口赤丁大敗退保祁陽扈先鋒既得道州立攻祁陽赤丁立腳不住望營陽而走扈先鋒進兵營陽以種劉二將攻城自引精兵五百埋伏城西朝陽岩靜候種世虎劉遇隆領兵圍困營陽東南擊鼓西北喊殺炮聲震天班聲動地城內驚慌不定太守嚴公輔朝服望闕再拜服毒而死軍民縋城降者甚衆赤丁阻遏不住潰圍出走種劉二將早已撤開西路一隊人馬赤丁乘勢混戰一會望城西而逃甫及朝陽岩扈德威一軍攔住去路赤丁交馬不一合宋軍俱用長繩絆馬赤丁墜地一擁縛定降其餘衆扈先鋒與二將合兵入城出榜安民連夜將赤丁械赴大營嶽招討一見喜曰吾計成矣即喝退左右親釋其縛設酒壓驚赤丁感其意誠遂降自言願效死力赴湯蹈火在所不辭招討即附耳低言給衣甲鞍馬帶領營陽降兵黃昏徑奔城下大呼營陽敗兵求援城上驗之果系元軍即令開門入城赤丁一見杜防禦哭訴營陽失陷太守殉節求防禦分兵往復故城杜防禦細細問以失陷情形不覺心疑推言本處且守禦不遑豈可分兵令協守城池退敵後且議營陽之事此時宋兵日夜討戰杜元侃一味堅守不出欲俟糧盡擊之宋師攻打日久怠生坐臥辱罵全無隊伍杜防禦始以為誘敵之計愈久愈甚已忍耐不住欲遣部將掩殺又恐疏虞遂令衆護城自領一軍突出宋師不意猝至人不及甲馬不及鞍倉皇遁走杜元侃望見宋將張懷亮若喪魂魄飛越逃竄心中詫異忽號炮震響方欲約住衆兵見左側紅旗招展狄勇一軍殺出右側黑旗飛舞史進一軍殺出前有先鋒扈德威一軍攔住宋師人人奮勇爭先元兵不敵杜防禦情知中計勒馬殺回只見青旗對對拓跋琳將鐵騎列開握槊便刺杜元侃無心戀戰虛掩一槍刺斜殺出望城而走奔至城下見吊橋拽起赤丁獨立城上大呼曰吾降宋已多時矣杜元侃大怒攻城忽敵樓上刀槍齊樹劍戟如林宋招討嶽燕超憑欄坐定左陳同右嶽坤招討帶笑言曰杜防禦力戰辛苦汝部將吾已擒獲何不納降杜元侃怒忿不休督兵攻打只一聲梆子響矢石交下杜元侃欲退又見扈德威拓跋琳張懷亮史進狄勇五隊精兵一齊掩至大呼曰有能生擒杜防禦者封萬戶賞千金元兵當者即死杜元侃自知不免仰天大呼曰元侃竭盡心力誓不負國遂拔劍自刎一時元兵死者無算餘皆降之嶽招討安輯居民吊生恤死拔幽賑困人心大悅衆將一一獻功設宴慶賀賞賚三軍令將杜防禦葬于八景台前以旌其忠
