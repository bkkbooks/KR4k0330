body:
  text: 第八十五回宋昭帝詔求直諫宋重康十七年元仁宗延祐之四年也帝巡至香山島敕為文天祥張世傑陸秀夫三人立廟名曰三傑廟令有司春秋致祭再過新會至崖門山重招帝昺之魂觸景興懷回憶當年顛沛流離中逃死不遑遙望海中號泣不已扈駕文武再三勸慰帝始收淚巡至潮州掃陸秀夫之墓立神道碑帝親為贊書之遂駐蹕於潮州時驃騎將軍靖海大都督史霸鎮守潮州府一十五年史霸威名素著海寇平息臥護潮陽帝疊加褒美慰勞備至加威武副將軍之職帝是夜宿於行宮忽見海岸有黑鬼數十人高不逾三尺其行如飛去地幾二尺許各持利刃四面圍繞殺來帝大驚速呼將士扈駕左右迄無應者帝狂奔黑鬼亦奔而追之帝大窘忽轉出一壯士手揮鐵椎奮勇擊殺數十人黑鬼遂敗紛紛散去帝急呼壯士何人壯士伏地奏曰臣泰山石敢當也言訖不見帝亦驚寤次日即問扈從文武史霸奏曰雷州有黑鬼蠻能馭空離地而行前楊孝伯大兵收復雷州時有三千黑鬼前來迎降孝伯誤以為阻抗王師一鼓殲之感入陛下噩夢者即此是也帝又問石敢當何人韓昭奏曰五代時劉智遠為晉祖押衙遣力士石敢當袖鐵椎從晉祖與湣王爭忿敢當與鬥死殺湣王左右故至今人家有橋路沖戶者立石刻泰山石敢當字樣於上謂以敵煞也陛下入夢壯士即此入耳帝聞之即封石敢當為三界蕩魔伏鬼將軍敕史霸就雷州祭之帝回憶夢中情景猶惴惴不已遂不欲行巡駕回武都不數日樞密正使永安王嶽燕超薨帝幸其家親往吊唁詔命集賢直學士李仁恭為辦喪事越日又詔文武俱往送葬諡曰忠武帝悲悼過甚八月癸酉帝不豫免朝賀宣范國昌種世龍司馬肅關普靈等四人入宮受遺詔輔政丁醜遂殂於麟德殿群臣輔太子璁即位是為昭宗冢宰範國昌權處分軍國重事帝在諒陰中哀毀如禮孟太皇后歎曰此令狐少傅輔導之功也葬顯宗于壽陵尊孟後為太上皇后帝始親政以明年為隆熙元年王妃為皇后尊范國昌為太保班宰相上種世龍為左相司馬肅為右相狄定國為樞密正使關普靈為樞密副使六節度暨各將帥俱入朝賀帝又降詔於六鎮之內設四大營以都部署領之四時練兵以備不虞江右設神武營以拓跋琳領之屯大庾嶺湖廣設天策營以陳同領之屯茶陵州廣右設神策營以庹靖領之屯昆侖關廣南設靖海營以李繼業領之屯湖陽關六鎮之內又連營若蜂屯蟻聚堅不可犯各鎮俱拜命而去帝一日又下詔曰朕以薄德謬承大統但置鼓懸鞀聖主每樂聞其過而師針瞍賦英辟不欲掩其非朕居青宮常勤乙夜深羡魯直之忠不嫌汲黯之戇咨爾內外大臣百職庶司屬在言路因時時鳴鳳朝陽未入諫垣亦在在批鱗殿陛負氣敢言乃褒鐵面聞風彈事亦重豸冠能面折而廷諍重有造於我國家也如模稜而阿附豈所望於爾文武哉直言上聞毋負朕意欽此一時言路大一開台諫諸臣爭相上疏論事一一優詔答之右相司馬肅諫曰為人君者能言不如能行臣竊見台諫諸臣所奏皆切中時弊陛下若不見之施行徒加敕獎譽是陛下有納諫之名無納諫之實乃好名之心盛也為人君者而徒好虛名則粉飾太平將何以傳後世臣恐阿諛取容者不旋踵而至矣帝聞言恍然大悟曰朕不吝改過立見施行即將諸臣所上如開經筵厚風俗培國脈興學校隆教化敦農桑慎銓選別去取各款發至政府一一頒行冬十一月祀昊天上帝於南郊有星于於東井又孛於南方時帝建慈寧宮未就禮部尚書葛天民上疏進諫其略曰臣聞采椽卑宮唐虞大禹之所以重皇風也瑤台瓊室夏癸商辛之所以犯吳天也今官室崇侈民力凋敞天示恆象妖彗炳灼斯乃慈父懇切之訓當崇孝子只肅之禮不宜有忽以滋天怒帝覽疏殊不懌太保范國昌賀曰臣聞君明則臣直有陛下納諫之君始有天民敢諫之臣臣等殊不及天民也帝意乃釋時汀州府太守辛次公上疏請旌孝子賴祿孫一摺按至元初漳州陳機察作亂擾至汀州祿孫負其母並拿妻子入山避寇寇至人皆散走祿孫獨守其母不去寇出利刃將殺其母祿孫以身蔽母泣曰寧殺我毋傷吾母母衰矣乞憐之時母病渴甚山中覓水不得祿孫乃含唾詬之寇皆驚駭莫不歎服敕衆不得妄殺孝子反取水與之又祿孫妻有殊色寇中有欲掠其妻去者衆寇責之曰奈何辱孝子婦誓將殺汝挾其人去送其婦歸之亂離中逃竄能敦至性孝行可嘉有關風化不可不以上聞帝甚悅詔下禮部特賜旌表
