body:
  text: 第一百回明太祖應運和陽元順帝聞張土誠聲勢甚大命太師脫脫引大軍擊之脫脫善用兵先平定芝麻李威望已著一至高郵連戰皆捷分兵收復六合等處截其路徑士誠大窘會中書右丞相哈麻與脫脫有隙諷監察禦史袁實本劾奏脫脫出師三月無功傾國家之財以為己用半朝廷之官以為己隨帝即下詔奪爵安置淮安哈麻尋矯詔遣人鴆之脫脫既卒張土誠勢復猖撅進據姑蘇稱吳王既又詐降於元元主封為太尉方穀珍陳友定聞之互相效尤元主又以方穀珍為浙江行省左丞相陳友定為福建行省平章事是時劉福通建都於汴梁迎其主韓林兒居之明玉珍起劍閣亦自稱帝國號大夏改元元統此外更有何虎真關先生毛貴劉益田豐王仕誠等分據山東廣南大同遼陽益都各處惟天完將倪文俊始建都於漢陽徐壽輝正位封倪文俊為平章時陳友諒尚在廣南聞之即歸有元行省左丞何真引兵突入翔龍府據之仍名為廣州正值吳王張士誠降元每歲運糧十萬余石至燕京帝遣使臣齎龍衣禦酒賜之使臣至中途遇陳友諒殺而奪之得禦酒龍衣以奉其主徐壽輝壽輝平章倪文俊專恣欲弒壽輝未果懼罪奔黃州陳友諒故與文俊有隙及歸因襲而殺之並其軍自稱平章隨又攻陷信州改都江州稱漢王與其將張定邊楊政熊天瑞陳英傑等謀迎徐壽輝至尋弒之遂稱帝國號曰漢改元天義當時竊據群雄惟吳王張士誠最富漢王陳友諒最強然皆攻城掠地爭戰無虛日兵亂歲飢民不聊生並無有安天下救生民之志者惟大明太祖高皇帝此時避兵濠城侶義起師收納賢士欲定天下太祖姓朱名元璋先世家於沛後徙句容再徙泗州父世珍始徙濠城鍾離村生於朱家巷母陳氏夢一黃冠者授丸藥吞之及誕白氣貫空異香滿室數有光起比長姿貌雄傑志意廓然年十七父母相繼卒葬親無棺謀瘞鳳皇山谷中道梗絶忽雷電晦冥大雨如注少避之明日往視土裂則尸已陷入矣田主劉繼祖即以其地與之至是孤無所依乃入皇覺寺為僧兵亂乃取伽藍杯筊蔔避難守舊皆不從既卜倡義卓然倡立計遂決西至汝潁夜陷麻湖遇群兒呼迎聖駕叱之不見有瘋道者周顛見之輒曰告天平又曰你打破一桶再做一桶又常夢西醜有朱台數羽士以彩絳衣衣之元順帝至正十二年始從郭子興於濠州子興奇其貌留為親兵戰輒勝次年收得裏中兵七百餘人子興遂署之為鎮撫乃與徐達湯和等略定遠下滁州得李善長與語大悅用掌書記次年又下和陽時郭子興已卒劉福通立韓林兒于亳州欲檄朱元璋為副元帥不受此時朱元璋已恩威並著豪傑歸心欲渡江取金陵而患無舟楫恰值巢湖寨水軍元帥俞通海等率衆萬餘船千艘來降元璋顧左右曰吾事濟矣遂率徐達馮國用邵榮湯和李善長常遇春鄧愈耿君用毛廣廖永安引水軍東下首克牛渚磯進拔平府耆儒陶安李習等率父老出迎陶安因進言曰方今四海鼎沸豪傑並起攻城屠邑互相雄長然其志皆在子女玉帛取快一時並無撥亂反正安天下之心明公率衆渡江神武不殺人心悅服以此應天順人而行吊民伐罪之師天下不難定也元璋嘉納之既而取集慶路改為應天府分遣諸將取鎮江廣德皆下之元璋以諸將推戴始稱吳國公略定江右自立為吳王建百官又命孫炎往浙東聘龍泉章溢麗水葉琛浦江宋濂青田劉基四人同至應天吳王迎至勞之曰我為天下屈四先生今天下分爭何時定乎溢對曰天道無常惟德是輔惟不嗜殺人者能一之耳吳王深以為然皆重用之後三次伐漢拔江州戰鄱陽圍武昌始平陳友諒降其子陳理至正二十七年始命元帥徐達副將常遇春等取平江路火焚齊雲樓擒吳王張士誠以歸士誠妻劉氏縊死繼降方穀珍遂盡有淮南浙東江西荊楚之地又命征南將軍湯和克福建執陳友定以至正二十八年正月乙亥祀天地於南郊即皇帝位建元洪武以李善長為左丞相徐達為右丞相夏四月征南大將軍廖永忠平廣東征虜將軍徐達常遇春平河南繼克太原甘肅都督馮勝取潼關六月平章楊璟取廣右閏七月徐達常遇春李文忠傅友德等分道徇河北連下衛輝彰德廣平順帝始詔擴廓帖木兒領兵勤王大明兵至通州元知樞密院事十顔帖木兒力戰而死順帝大懼乃詔淮王帖木兒不花監國及丞相慶童留守燕京自集三宮後妃皇太子夜半出居庸關北去如上都八月徐達等克燕京淮王帖木兒不花等皆死洪武二年順帝奔應昌府洪武三年殂于應昌時征虜將軍常遇春卒于軍李文忠遂代領遇春之衆進兵開平縣白海子駱駝山敗元將太尉蠻子沙不丁平章朵兒只八刺等之兵遂督兵長驅大進攻拔紅羅山直抵上都連戰皆捷降其左丞蓋元魯平章上耶罕留守八失忽都余萬等再襲應昌府元兵大敗皇太子愛猷識理達臘從數十騎逃去皇孫買的哩八刺及皇妃寶玉皆被擒獲李文忠以元帝既殂想昔日滅宋張宏範乃逼至航海不休回圈報復亦入吾手遂率兵窮追大加捕剿又降其衆五萬餘人直至北慶州而還露布以聞太祖以元帝知順天命退避而去特諡曰順皇帝而封買的哩八刺為崇理侯至是天下歸一而正統於是乎定矣
