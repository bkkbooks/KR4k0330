body:
  text: 第八十一回趙孟俯入宋和兵嶽招討等三大帥及諸將士回國次日朝見帝慰勞備至於是招討嶽燕超進爵為王豫長子嶽鎮為南安伯世職樞密狄定國進爵為保昌公節度寇復雷進爵為寧武公如種世虎狄勇嶽坤慕容長藍天蔚等俱加大都督三大帥各部將佐亦論功升秩有差陳亡諸將如斛律亢宗追封武烈侯焦芳武勇侯牛肱張燕屈突申傅突俱以伯爵贈之子孫蔭其本職陳亡士卒各有優恤所在立廟命有司祀之大出帑藏重賞三軍寧武公寇復雷仍為長沙節度使彈壓各鎮即以便殿設宴飲至衆臣山呼拜舞謝恩而出數日後寧武公寇復雷率其本部將赴長沙入朝陛辭奏曰廣右大功業已底定尚有慶遠泗城二府郁林永安二州未入版圖陛下宜詔高節度不時訓練人馬若有機會立攻下之以便建閫立鎮帝允之寇公辭帝赴長沙而去帝亦以廣右不全為宋土終為後患即日下詔與高耀卿乘機進取高節度遂檄各鎮將逐日厲兵秣馬尚猶未動元朝守臣疊次飛章奏人上都元成宗憂形於色召平章政事張九思梁圭等問曰朕不用卿言悔已無及今廣右陷沒僅餘四郡觀宋人之意不盡得不止卿等何以處之禦史台臣力言參政蒯毅夫失陷廣右多由三軍不努力將帥不協心致此大敗辱國喪師失地數千里毅夫雖死尚宜逮其家屬論以覆軍之罪然後朝廷命親王大臣協同陝右滇南二省徑兵討之以圖恢復所謂乾綱獨攬陛下不可不明信賞罰也成宗聽畢歎曰夫疆場披堅執鋭之士枕戈待旦臥雪通宵皆為國也幸而勝則蔭子封妻不幸而敗則肝腦塗地朕昔在藩邸治軍親所閲曆將士以軀命博功名死生存亡旦夕殊難料也卿等安坐朝堂徒事筆墨業同蝕蠹技比雕蟲叨服章縫惟呻占畢一聞敗挫即雲將帥失人士卒畏死但閫外之事非卿等所知慎勿妄言留夢炎其車鑒也台臣等大慚語塞左丞相哈刺哈孫亦奏曰陛下負宗廟社稷之靈當赫然震怒以圖討賊不然恐負世祖寄託之望並徽仁裕聖皇后手詔之心平章張九思獨曰恢復境土固為國家立威然必師武臣力將帥得人乃為有濟目下內外大臣無出宋人右者此何以戰依臣愚見惟畫地求和各安境土然後養精蓄鋭以觀其變此長策也集賢大學士阿魯軍撒力爭曰大元中外一統豈容宋人鯨吞虎視不大挫其威則侵伐不止平章之計毋乃款和誤國效宋人南渡之事乎梁圭亦曰以陛下英明兩國既勢均力敵非戰則和今戰不能和不可臣不知計之所出矣戰與和惟陛下獨斷獨行耳時群臣各執一説有議堅壁清野以待之者有議會合京西滇南福建江右川湖五省以討之者獨中書右丞相完澤默然無語帝遂問之完澤奏曰諸臣之議皆未盡善依左丞相之計則兵連禍結戰無已時徒驅數百萬生靈委之鋒鏑之下依平章之見畫地求和恐宋人未必允蓋昔年金人和宋以有秦檜為內應故指揮如意今宋人非復南渡時也君臣同德將相一心日夜臥薪嘗膽以復崖山之仇為事其國以得人為強其兵以久練而精廷臣謂欲與戰適驅羊人虎耳臣愚以為陷沒兩廣不足慮惟陷沒襄漢者憂方大耳成宗一聞此語拍案稱善蓋宋師既得襄漢漕運梗塞惟海運一路入京上都路十分不便完澤又奏曰臣愚以為與宋和者應目下之急不必與宋久和且休養觀變此至善之策也帝欣然從之謂文武曰朕意決矣廷臣有再言戰者朕必唾其面卿等可至中書省酌議以聞於是文武不敢復爭張九思梁圭等皆至中書會合台省九卿文武議復襄陽德安安陸漢陽四郡地而以廣右慶遠泗城郁林永安四郡歸之湖廣則畫江為界大江以南為宋北為元立盟修好休兵養民並遣使先至桂林止兵然後議行人直人武都與宋定盟文武議定次日奏聞元主請以翰林學士趙孟俯為行人領太醫院事李邦寧副之二人皆宋舊臣故有是命帝無不允從元主修定國書副以禮物並太后所授玉璽歸之于宋且曰朕不嫌自屈作無璽天子凡以為兩國體兵養民也二卿其善達朕意慎不辱命趙孟俯李邦寧領詔而出即定於次日起程不日遂達武都宋重康六年夏五月也宋主臨朝有近臣奏知即命元使臣趙孟俯李邦寧二人入見帝見二臣皆故宋人大有不悅因問曰二卿既仕大元今至小朝廷見朕何意趙孟俯惶恐免冠稽首對曰陛下龍飛禦極寡君特命下臣入賀一則寡君度德量力不敢與陛下及在廷文武諸執事並駕爭驅故俯懇上國聯盟修好息兵養民下臣因不避斧鉞之誅冒幹天威悚息待命李邦寧亦俯伏奏曰罪臣等逃死餘生原不應以閹廢刑餘汙及興朝而寡君與在廷文武皆曰欲休兵養民非二臣不可遣也竊以寡君與在廷文武之意非以罪臣等乃大宋委棄餘息一線可通冀陛下宏堯舜之仁闊天地之量而相容並包也乎故罪臣等昧死入覲乞陛下憐而赦之帝始回瞋作喜問曰二卿仕元現居何官趙孟俯奏曰下臣逃死歸安自謂已得偷生應埋首江浙與草木同朽矣乃廉訪使程文海再三相逼郡縣迫促目下待罪翰林學士實大宋之首惡也李邦寧奏曰臣以小黃門隨恭皇帝入元元主用以給事內廷供使令而已近成宗在位始命罪臣領太醫院事帝首肯者再曰元主欲與朕和其意何如趙孟俯忙俯伏丹墀將玉璽國書獻上奏曰寡君不忍生民塗炭願作無璽天子而以國寶歸於陛下則薄海內外皆知正朔所在矣地土則廣右陛下已轄九郡寡君更割慶遠泗城郁林永安四郡以奉陛下以成全美而與陛下求襄陽德安安陸漢陽四郡之地以便畫江為界以江之南者屬宋江之北者屬元干戈永息生民樂業兩國赤子皆戴陛下之德于不衰矣伏乞陛下聖裁帝觀其國書大意亦與孟俯所言相似乃曰二卿且退候聯與文武商議趙孟俯李邦寧叩謝而出早有右相種世龍大將軍關普靈奏曰宋元之仇不共戴天萬無可和之理以勢言之蒙古雖中外一統而宋以海南偏安足與頡頏仗陛下天威文武努力尚當削平區宇再造社稷方雪崖山之恥報伐陵之仇以雲議和斷乎不可尚書皇甫惇奏曰元人請和之意特屈於一時勢衰力竭耳明為休兵息民暗為養精蓄鋭其勢如猛獸噬人必先卑身帖耳始得以肆其讒口此勾踐沼吳之策而亦金人款和愚宋之謀也南宋已誤陛下豈容再誤樞密副使狄定國奏曰慶遠四郡皆掌握中物何勞元人割取其意殆欲得襄陽四郡耳四郡一得則漕運可通元人不懼我矣一時群臣議論無允和者惟侍郎蘇伏威尚書李穆右丞劉知幾左相范國昌四人以為可和帝不悅而罷一連數日群臣堅持不和帝召元使臣趙孟俯李邦寧二人以國書玉璽謝而遣之二臣知事不諧忙俯伏奏曰議和乃寡君有求于陛下非陛下和寡君也陛下曷不卷雷霆之威施雨露之仁使兩國百姓各安生業處於堯舜之世也乎帝曰汝主地土莫非大宋之物而猶欲割襄漢四郡以通漕運自為計則得矣朕不受汝主愚也趙孟俯又奏曰陛下去四郡獲四郡于陛下之版圖並未損也何不可之有帝怫然曰宋元欲和除非德祐復還會稽諸陵無恙方可議和李邦寧叩首奏曰恭宗皇帝北狩業已殂落太子完普現今作賓王家封為瀛國公寡君優禮相待至會稽諸陵皆先帝失德所為今世皇墓木已拱寡君深悔之又不敢直彰其惡特令浙省平章修復皇宋陵墓以蓋前愆故投誠乞憐于陛下陛下獨無意乎種世龍在旁厲聲答曰伐陵取骨乃群盜所為蒙古殘酷如此天必棄之至廣右慶遠四郡以我兵臨之如探囊取物何勞汝主將機就計謂以割奉大宋而欲我襄陽四郡耶恐汝主此念差矣關普靈亦正色責之曰寄語汝主能戰則來否則遂降宋元世仇無可議和趙孟俯李邦寧遂不敢多言再拜辭去不數月二臣又奉元主詔至雲以元貞元年修復皇宋陵寢今更於每陵置守冢三百戶以贖前愆瀛國公願送還人宋至廣右慶遠四郡不必動兵即日歸宋更增歲幣十萬計襄陽等郡所出每歲不過此數乞兩國通好講信修睦帝覽畢笑曰朕恢復仗義大舉寧為此歲幣金錢起見耶又以問樞密正使嶽燕超燕超曰臣職在樞密身任武職惟知有戰而已餘非所知惟左相范國昌從容奏曰臣愚以為陛下仗義恢復原應掃平區宇聿新王室但立國偏安定鼎海隅以陛下之英明文武之贊助能與大元並駕爭驅亦可謂千載一時矣即雲議和一出元人本意和不和尚以我為政也且元人能以欲取姑與之策和大宋大宋獨不能以欲擒先縱之策款元人乎陛下何必爭此一間使戰鬥無已時也帝亦念歷年戰爭費用浩繁歲入不支又損兵折將殆無虛日亦欲趁此允和待休養數年生息聚斂再議征伐之舉乃謂范國昌曰或戰或和卿意何如范國昌曰戰者乃陛下恢復不易之理和者乃一時休養權宜之計此一言而決耳尚書司馬肅亦曰和不可拒而戰亦不可忘此出自陛下聖裁耳帝乃諭文武曰論德祐崖山之事宋與元萬無和理但以兵連禍結生靈塗炭將士死亡血戰何時已乎朕欲少屈姑允其和使軍民得以休息至割地一款卿等更宜籌劃不可少失鋭氣種世龍關普靈狄定國三人齊出奏曰陛下既決定與和臣等不敢爭執但議和各款須令臣等參酌帝曰此事由關卿等主持文武遂齊至樞密府中商議以為當如契丹石晉故事以南朝為父北朝為子否則南朝為君北朝為臣以親王大臣各一人為質于宋更割膏腴富饒二十郡歲幣一百萬則襄陽四郡可歸餘皆依樣云云范國昌笑曰何必石晉即如金人之事以南朝為兄北朝為弟足矣以親王大臣為質此事未妥種世龍讓之曰左相袒護蒙古耶范國昌曰非也以元人為質于宋豈能相容竟不用質足見大宋以信義為重且免生意外之事衆皆然之國昌又欲減割郡歲幣之數衆皆力爭曰不可議定上之帝乃減二十郡為十郡百萬為六十萬謂曰酌乎其中不可大過恐梗和議致爭戰無已時也范國昌贊成之帝始召趙孟俯李邦寧入見謂之曰朕之本意原欲光復舊物宏我國家但為生民起見屈意允和議和各款當依大宋二卿速歸去見汝主若能如議便兩國修好不然朕之兵即日渡江取東京諸路先為大宋掃陵墓矣二臣再拜稽首謝曰陛下若能允和則天下蒼生之幸寧獨寡君與在廷文武同受其賜哉二臣領命辭出不敢停留星夜回上都而去直至宋重康七年元成宗大德十年秋九月趙孟俯李邦寧二行人又齎國書入宋以南朝為兄北朝為弟割廣右慶遠泗城二府郁林永安二州及江右之臨江瑞州袁州三府寧都一州凡八郡與宋荊楚則畫江為界以襄陽漢陽德安安陸四郡歸元歲幣三十萬玉璽獻與宋主惟瀛國公自言在燕已久不欲回宋北朝亦未敢強餘皆依議趙孟俯李邦寧先至樞密府與宋文武相見諸臣猶欲再議左相范國昌曰行人之跋涉至矣既欲修好惟堅信義可也預先奏聞次日帝乃大設朝會元使臣朝見畢將玉璽國書及諸般禮物呈上俯伏奏曰陛下宏天地之愛戴仁育萬物恩沾率土寡君及在廷文武實被其賜和議各款俱一一如命祈陛下睿覽帝觀畢謂使臣曰朕屈意允和亦為兩國之生命耳元主但出本心朕焉有不俞允之理趙孟俯稽首奏曰寡君欲與民休息直齋戒沐浴以告於宗廟社稷始遣下臣寡君囑下臣之言皆抽肝擢膽之言也寡君所望者得陛下一俞允則大元宗廟社稷之靈實邁相之帝悅李邦寧亦奏曰從此二國修好邊陲無警內外文武亦得以共用升平罪臣等蒙陛下之賜亦可謂不辱君命矣帝亦曰朕不食言令守臣讓還四郡之地以便二卿復命趙孟俯李邦寧再拜謝訖帝命於偏殿設宴以待使臣時百官畢集飲酒樂甚惟武班中諸臣見和議已成欲退四郡之地未免怏怏皆曰我等疆場血戰始得四郡乃以片言棄之從前汗馬功勞盡成畫餅況此四郡乃得之于賈翀非奪之於蒙古也帝聞之頗不懌有范國昌私問李邦寧曰元主為君何如李邦寧曰內事決于宮閫外事委于大臣而連年寢疾元主殆不久于人世矣國昌又問太子何如邦寧曰無太子有國者其北邊總兵之懷寧王乎帝又謂趙孟俯曰卿雖仕元猶能奉使和二國之好不忘故主而留夢炎乃竟領兵伐宋是自取其死也言之令人髮指趙孟俯拜謝曰前者非留夢炎阻詔則宋元早聯和無此數番爭戰矣使臣與文武等盡歡而罷越日帝交割四郡重賞使臣遣侍郎蘇伏威給事李進誠二人入元報命以答其禮自是而和議成矣
