body:
  text: 第三十四回南雄鎮雷雨交兵涪陵將廣州改為翔龍府又得范國昌等風雲會合一時如龍得水遂覺意氣自雄神采英暢一日大集府堂商議謂燕超曰某欲分兵兩路夾攻元師一師由五羊城趨陽江越肇慶高要等處紆道以攻韶州之後一師由峽山出涵暉穀度湞陽峽抵曲江攻韶州之前卿當其後某當其前韶州若下張景略必奔南雄可乘破竹之勢長驅直進使疾雷不及掩耳一鼓成功燕超等皆然之涪陵留兵三萬命種世龍范國昌等守城自率兵一萬以關普靈為先鋒扈德威韓搏虎副之余者隨軍聽用分撥既定即時起行燕超亦在營中令寇復雷為先鋒史進焦芳次隊斛律亢宗拓拔琳三隊張懷亮寧文廣四隊自統衆將押後五隊並進又將人馬列作五龍奔海之陳由肇慶抄出韶州右路而進涪陵前軍徑達曲江至日觀台元兵阻定芙蓉山當道下寨關普靈令人哨探乃大同總兵丁不拔也暗思此人乃長洲籍貫外強中幹必無膽氣命多張旗幟多鼓金聲以震蕩其心方與之戰果然丁不拔一見宋師便準備迎敵廝殺宋營中幾次鼓角齊鳴旗旙麾動皆不見出戰疑有詐謀正在錯愕之間關普靈出其不意敗之丁不拔甚忿次日又率兵討戰關普靈橫刀勒馬而出戰不數合宋師後隊忽亂因有元兵在後軍士皆驚普靈下令曰回顧者斬督兵向前極力攻殺元兵遂潰少頃宋營後元入伏兵俱被扈德威韓搏虎二將殺敗四散奔走宋兵大殺一陳有元將鄢知節救應兵至方始收軍涪陵大軍既至謂此間已離韶州不遠且將人馬略屯候燕超兵至夾攻破之且説寇復雷一軍由高要縣直趨英德張景略亦料宋師兩路齊進令馬如龍屯兵英德城中寇復雷思奪其城以搶頭功直抵城下誤入伏中為馬如龍所破頗有損傷復雷十分納悶自思前隊失利已幹紀律欲極力攻打又城小而堅一時不下左右思索無計遂跨馬出營且看元兵動靜見城門緊閉城西一山巍然在望上有旗號招展人語馬嘶暗思此山可瞰城中虛實元兵預先駐扎防我師乘高以瞰英德也復雷又問左右此山何名左右曰此大慶山也復雷喜曰計在是矣率兵直往爭山元兵死據山腰酣戰良久馬如龍在城上望見恐奪去此山急率兵接應寇復雷便接住如龍廝殺不數合忽報宋兵入城如龍情知有失虛掩一槍回馬便走寇復雷從後追殺元兵大敗如龍奔至城下見吊橋拽起城上悉是宋師欲奮勇攻城則箭如飛蝗又後面追兵已近不敢迎敵遂望曲江而走寇復雷取了英德暗喜曰而今可免罪矣且説馬如龍帶領殘兵直過曲江界口正遇丁不拔鄢知節三人合兵一處如龍曰韶州後路已陷與公前路相持者誰人兵也丁不拔曰即趙宋主也如龍喜曰此易與耳趙涪陵未諳兵事恃衆深入不知地利前去有鹿頭寨南道路狹孤懸一徑吾與交鋒引入絶地丁將軍以精騎斷後鄢將軍用柴草木石阻塞其前火焚之涪陵成擒矣二人皆雲此計甚善分頭去訖且説涪陵兵屯芙蓉山元將馬如龍引本部兵聲言索戰宋營中扈德威韓搏虎皆願出馬有副將王建忠曰不勞先鋒建忠一往足矣涪陵甚喜曰諸君如此努力元師不難破矣隨命史霸種世虎領兵五百從後策應王建忠引兵一馬殺出見如龍所部悉輕弓短箭笑曰此遊兵也遂令軍士各持長斧如牆而進馬如龍抵敵不住拍馬便走建忠驟馬趕來馬如龍回身又戰數合建忠抖擻精神奮勇沖殺馬如龍又敗軍士皆棄甲拋盔騾馬糗糧失落滿地迤邐望鹿頭寨而逃建忠大疑約住追兵令人哨探而進忽又見塵土大起知是種世虎史霸接應兵至建忠聞報放心前進且恐二將來分其功大驅人馬直抵鹿頭鄢知節一軍從半山殺出一派喊聲伏兵即在後面將乾柴亂草塞住山口順風舉火煙漲蔽空王建忠大驚欲殺回寨口量已塞斷歸路前面鄢知節人馬阻住自知難免咬牙切齒大呼陷陳橫沖直搗殺開血路鄢知節揮戈迎戰時已被建忠一槍刺中左腕幾乎墜馬賴元兵保護建忠得以突出人馬折損過半建忠率領殺往山後而走卻無去路兩廂俱是危崖峭壁勒馬回轉不數裏正遇丁不拔引兵截住大呼曰宋將休走某在此等候多時矣建忠忿怒挺槍躍馬交手不一合元兵先將絆馬繩將馬拽倒搭起撓勾活擒建忠盡降其衆種世虎史霸二將引兵殺至山前被鄢知節一軍阻定二將情知建忠已入虎口無可救應忽元兵大隊擁出聞建忠被擒二將大驚不敢抵敵師亦大潰時有丁不拔馬如龍鄢知節三將合兵將王建忠械至韶州張景略立命梟首號令城上並降兵殲之即出五萬騎兵離城三十裏下寨餘者命監軍赤老溫統之守城卻説種世虎史霸領敗兵回營正值涪陵會食二將伏地請死言建忠被擒全軍盡覆救應不及之故一時滿營皆驚涪陵投箸而起喝退二將升帳謂衆將曰張宏範滅我國家殄我宗社已屬不共戴天今其子景略又如此猖獗欺我太甚某與景略誓決雌雄命史霸由間道走報燕超令倍道而進兩處合兵限三日立下韶州有功者不吝爵賞不用命者殺無赦部署既畢怒氣不息全身披挂欲親臨戰陳關普靈皇甫惇二人諫曰勝敗乃兵家之常建忠不諳鄉道誤陷險地偶有敗挫大隊未損傷也殿下必親冒矢石然則軍將何用哉涪陵曰某不親臨行間將士焉肯用命種世虎馬遇陽二將隨身保護萬無一失諸將努力向前可也關普靈等不敢再諫各厲兵以從張景略聞之笑曰此忿兵也吾有以破之矣即調馬如龍丁不拔鄢知節曹伯雄四將為四正按鳥蛇龍虎調劉耀李粱王豹牟衍昌四將為四奇按天地風雲自以一軍居中為天柱以魏文通鈕師成率二軍出為遊弋入為護衛戰為救應收為斷後嚴整旗鼓陳于曲江之南原涪陵則命關普靈列陳於東扈德威列陳於西自與韓搏虎居中種世虎馬遇陽二將緊緊護從在門旗下遙見張景略陳前旌旗鮮明金鼓回應諸將皆以為徑敵宜避其鋒涪陵不可關普靈進曰張景略以忿兵目我師當乘其惰氣破之涪陵曰何謂惰氣普靈曰凡敵人之氣朝氣鋭晝氣惰哺氣歸故善將兵者避其鋭氣擊其惰氣此治氣者也以治待亂以靜待譁此治心者也以佚待勞以飽待飢此治力者也勿搴正正之旗勿擊堂堂之陳此治變者也今我軍宜嚴陳以待乘其惰而攻之敵必走矣涪陵深然其策曰誠如公言果然元陳中兩次擂鼓搖旗喊殺而來宋師不理少頃元兵人馬已憊涪陵此時勇氣十倍直欲併吞元軍皇甫惇暗喜曰劉將軍遇小敵怯遇大敵勇此之謂矣涪陵一股鋭氣時已不可按納擁隊欲出韓搏虎曰殿下率性更阻一會我師之氣百倍矣此時元兵已十分勞頓人思歸馬思食景略亦恐宋師乘之方欲收兵忽宋陳中鼓角齊鳴人人思戰奮勇爭先元兵少退景略畢竟善戰忙揮動太白旗即有魏文通鈕師成兩軍阻住宋師其餘人隊仍結成陳勢號炮震天八隊一齊圍上方方有門門門有將馬足到處箭似星流宋師一時遮蔽不周韓搏虎曰此未足奇也舞動雕旗將三陳列作常山蛇勢首尾互應大戰良久兩軍未能取勝各鳴金收軍涪陵回營謂衆將曰景略小豎子乃能治兵宏範不死矣諸將各宜注意防彼劫寨來日當設計破之次日張景略忿甚直率大軍逼宋營討戰有扈德威憤然作色曰景略且不能勝焉能定廣南也綽槍上馬鼓譟出營元將李梁王豹雙馬向前扈德威力戰二將全無懼怯普靈恐德威有失拈弓搭箭覷定敵將一矢正中李梁右臂二將敗走突有魏文通揮刀抵住德威又戰魏文通五十餘合魏文通武藝絶倫精神倍增德威只能抵敵不能取勝韓搏虎舞刀飛馬夾攻張景略速令馬如龍牟衍昌助陳韓搏虎大喝曰能戰者速來交手五將正遇強敵勢不相下忽探馬飛報韶州城已被嶽燕超圍困攻打垂破三將不敢貪戰勒馬便走景略大驚鳴金不疊已被扈韓二將督兵掩至景略忙令後隊改作前隊且戰且退涪陵命衆將齊出力攻其後元兵回至營中喘息未定宋師追及乘亂砍開鹿角景略立營不住拔寨而起涪陵率兵長驅直進景略奔回韶州見郡城已破赤老溫偕數員健將狼狽出走至皇圖嶺景略遇之笑曰奉旨監軍者乃如是也赤老溫兩頰發赤至南雄飛章劾奏張景略無功失律逗留不進請逮京按問景略大怒亦表監軍不堅護城池失約致陷韶州之罪元主情知二人不和有誤軍國亦悔不應監軍掣時無功命緹騎赤老溫撤回更切責景略出師三月恢復無功令京湖兵馬使童應彪調騎兵一萬助之責以後效景略已失韶州至南雄拜命訖乃修理垣墉備造器械用重兵分布堅守自率精兵次保昌縣九十裏洪崖寺駐扎以遏宋師燕超既得韶州命宇文廣駐樂昌史進下翁源寇復雷平定各隘口始請涪陵入城隨至皇圖嶺謁虞帝廟此時涪陵方知王建忠不屈而死傷悼不已令尋其尸葬之曲江涪陵曰兵貴神速可乘勢直取南雄不然則日久難下矣燕超曰景略亦一徑敵擒了景略則慶南傳檄定矣關普靈曰某觀景略兵法雖熟多拘死法若有機會元帥當以計勝之燕超深然之涪陵命燕超盡統其衆往保昌而進燕超令前隊以輕騎挑戰景略持重約束軍士不可輕戰候京湖兵至再議禦敵相持數日童應彪兵到景略問何以戰童應彪曰敵將知兵未可輕動某意欲引輕騎由間道暗襲廣州然後元帥引兵疾走其營蓋解紛者不控卷教鬥者不搏撠批亢搗虛形格勢禁敵兵自潰此救趙伐魏之策也景略曰將軍計非不善但廣州尚有重兵未可輕襲此策恐亦瞞不過嶽燕超也不如先挫其鋒此處有地名曰黃塘可以伏兵將軍領兵三千軍于黃塘據山列陳分五百人各帶弓弩埋伏前五裏榆林中敵至佯敗引入淺灣吾以大軍截出將軍可急攻之信炮響時弓弩齊發縱不能大創敵軍亦可少挫其鋭童應彪見景略不用其策意甚怏快領兵而去有宋營前哨史進右軍傅突領遊騎數千探敵直抵黃塘望見前山旌旗知有元兵攔阻拍馬向前正遇童應彪二將即與交鋒不數合應彪往後便走史進不追傅突曰前面無多人馬量無詐謀史進遂與傅突驅兵趕去直上兩山但見榆樹成林闃無鳥聲史進始悟此中有伏兵前山信炮已響人馬擁出一將緋袍銀鎧蓋鄢知節也二將不敢戀戰刺斜殺出王豹李梁率兵追趕二將奔過林中忽一聲梆子響五百弓弩手一齊放箭宋兵死者無數傅突身中數矢史進亦帶重傷王豹李梁抵死不退二將引敗殘人馬而逃不數裏一軍攔住二將急曰今番休矣視之乃張懷亮楊孝伯也截殺一陳元兵始退史進傅突回營請罪燕超怒其輕敵妄戰致損兵威立命斬之衆將伏地請免燕超不允喝斬益力業已綁赴轅門關普靈在後帳聞之即入見曰二將失律理應伏誅念主上恢復大舉得人為難宜赦之使立功贖罪燕超初不之許關普靈視之以目燕超頓悟即命召轉二將重責一百軍棍逐出營去二將羞慚無地抱頭出營關普靈揮之以手令速去傅突憤悶中燒史進暗思既從寬免死應責後效胡為見逐但關先鋒亦揮手使去決有深意將入後帳問之忽自悟曰是矣遂同傅突徑去當夜投于童應彪營中言戰敗回營為燕超斥逐願投麾下自效童應彪初疑有詐二將大哭曰我等忠而獲謗信而見疑宋營被逐不投大元將投漢陽壽春耶不如以死自明奪左右佩刀遂欲自刎童應彪忙令救免終疑是計且曰斥責受辱無可證驗此詐降計也二將又哭訴前事謂如何問斬如何受棒如何告免且某二人隨趙涪陵最先江右閩中皆某二人血戰所經今嶽某有小才一旦得志舊日將佐無不受其淩屈人心不屬妄自尊大猶雲指日可定廣南所謂壁翅甕中而尚詡詡焉自吒為垂天之翼也不亦慎乎童應彪疑信參半命啓其兩臀視之見皮開肉綻鮮血淋漓目不忍視暗思受杖非誣始録用之因問廣州虛實可襲取否二將曰廣州有重兵控守種世龍范國昌等防範綦密襲之末成功目下可襲者惟韶州耳童應彪怒日汝二人詐也廣州且不可襲而雲韶州韶州新下又系趙涪陵居守豈無重兵二人決有詐謀速令斬之二將神色不變大笑日將軍徒居幕府行軍機宜尚欠分明兵法不雲乎十則圍之倍則攻之廣州久據根株已定韶州新下人心未堅目下雖系涪陵控守韶州然自恃其近僅以數千人馬鎮之何不可襲之有童應彪始回嗔作喜謝日非二公指迷幾誤大事設宴待之叩以兵事應對如流暗思宋營無目如此將才棄以資敵良可笑也二將請襲韶州願得執鞭共效尺寸童應彪亦坦然不疑二將遂暗暗報入宋營應彪謀之景略景略日兵不厭詐恐宋人之苦肉計也應彪謀以一軍探之見可而進景略不從應彪堅請欲行景略惟戒以慎重不可妄動雖無功亦無過應彪大怒日襲廣州則雲有兵襲韶州則雲有詐從裹糧坐甲將欲天雷震殺宋師耶吾奉元主密旨監軍恢復城邑爾擁兵逗留有心欲學狄定國乎景略不得已以一軍付之且曰降將宜送至大營為質不可同往恐生他變應彪曰即在某營中用兵守之何害景略又撥馬如龍丁不拔牟衍昌鈕師成四將率兵一萬緩緩而進自引大隊駐保昌界口以便策應時燕超既得密報即升中軍帳大集將佐如關普靈寇復雷扈德威韓搏虎張懷亮馬遇樂楊孝伯斜律亢宗焦芳史霸牛竤張燕宇文廣洪時錦劉瑛嶽鎮嶽坤拓跋琳虞凱王麟吳廣吳康查士珩種世虎馬遇陽馬晉臣等除去史進傅突營中尚有三十六員將佐時燕超發言曰胡元殲我宋室奪我中夏某與諸公先代無非宋室股肱雖天命已去不能救之於未亡之前而人心思奮何難復之於既滅之後主上既臥薪嘗膽我等宜破釜沈舟興復大舉在此一戰諸公各宜努力勿得退阻有功者賞違令者誅軍法所關萬不徇隱衆將皆曰諾燕超遂將紅旗一面令關普靈為南路先鋒統焦芳史霸領兵七千概用紅旗紅甲紅纓至南雄鎮按南方丙丁離位埋伏如勝即打南雄府之西應火克金將青旗一面令寇復雷為東路先鋒統牛竤張燕領兵七千概用青旗青甲青馬至南雄鎮按東方甲乙震位埋伏兵進城下即打南雄府中應木克土將黑旗一面令扈德威為北隊先鋒統劉瑛嶽坤領兵七千概用黑旗黑甲黑馬至南雄鎮按北方壬癸坎位埋伏如勝即打南雄府之南應水克火將白旗一面令韓搏虎為西路先鋒統查士珩馬晉臣領兵七千概用白旗白馬白甲白纓至南雄鎮按西方庚辛兌位埋伏如勝即打南雄府之東應金克木又將黃旗一面令張懷亮為中隊先鋒統吳廣王麟領兵七千概用黃旗黃甲黃馬至南雄鎮按中央戊己中路埋伏如勝即打南雄府之北應土克水再調斛律亢宗引兵五百優於張景略營之左拓跋琳引兵五百優於景略營之右候敵兵一出即虜其輜重拔元幟立宋幟但據其地不可出戰又調馬遇樂楊孝伯宇文廣種世虎四將各領兵八百由曲江直抵保昌沿途埋伏候敵兵既過始出誘戰許敗不許勝務將敵將引轉南雄便算功勞再令虞凱吳康領兵五百至洪崖山左童應彪營中救出史進傅突即偷上山巔火焚洪崖寺以惑亂景略之心不可竟奔韶州防有他變令長子嶽鎮引兵五百沿途號召接應指揮進兵晝則揚旗夜則舉火會合史進傅突以躡景略之後景略既敗必奔誨嶺萬不可放過如違先斬汝首嶽鎮受命而退燕超保護涪陵固守韶州命馬遇陽洪時錦二將屯兵城外韶石山以備不虞分撥已定諸將各去燕超不敢禦甲登城晝夜巡警以待捷音且説童應彪統輕騎萬餘望曲江而來方過保昌近清浦縣界忽後面連珠炮響童應彪心疑暗想景略救應兵至決不舉炮正走之間忽探馬飛報宋兵果在後面掩襲而來應彪大怒情知中計忙將後隊改作前隊撥馬回轉至石牛嶺正遇宋將馬遇樂一軍攔住應彪舉槍就刺不三合敗走遇樂竟不奪路搶過反奔保昌童應彪暗笑此賊命合休矣沿途俱有接應兵至所謂自投羅網也吾令不襲韶州先擒此將偏不落汝圈套督車追殺回轉遇樂正奔走不暇忽元將鈕師成一軍排開遇樂略戰數合方欲敗走童應彪大軍亦至遇樂不敢戀戰落荒而走鈕師成曰童將軍與某率性殺回會合諸將擒獲此賊再振旗鼓襲韶州不遲應彪然之合兵而行不數裏宋將楊孝伯殺來放過馬遇樂敵住元兵應彪鈕師成雙馬來戰孝伯不敵幾乎墜馬牟衍昌一軍又至截殺一陳宋將馬遇樂楊孝伯棄甲拋戈而逃童應彪遂合三人之兵窮追不止隨又見元兵旗幟對對戈戟森森馬如龍丁不拔二將屯在前面遇樂孝伯正在逃竄馬如龍丁不拔亦分兵截殺追趕五將會合童應彪益發氣壯迤邐趕去忽號炮一震宇文廣種世虎左右殺出列開陳勢縱馬舞槍敵住五將遇樂孝伯回馬夾攻董應彪怒發如雷曰此兵且不能破焉能襲韶州復廣南哉揮刀躍馬正往斯殺宋將見山椒嶽鎮己將紅旗招展遂一齊敗退馬如龍曰宋將明系誘敵決有埋伏將軍不可窮追童應彪曰縱然誘敵乃敗而反走已是魚遊釜中況前面尚有元帥大軍未動雖天羅地網不足懼也馬如龍曰某所慮者南雄耳此間勝敗何足介意不如趁此全師而還會合元帥別求他計破之童應彪作色曰將軍懼戰請回營中飽食安坐應彪乃關西男子不畏死也馬如龍不敢多言立命小校飛報景略請速接應景略駭異令人往應彪營中將史進傅突囚在後軍用健將四召護守防其逃逸始命王豹李梁緊守大營自率兵接應行三十裏忽回頭見洪崖寺火焰燭天而起急遣鄢知節回營護衛心中疑異緩緩而進以便接應兩頭誰知斛律亢宗拓跋琳二將乘景略起行後即乘虛奪營虞凱吳康嶽鎮三將引五百壯士突入左營殺散軍士四員健將俱被嶽鎮搠死虞凱打開囚車放出史進傅突吳康領捷足軍士數十人溜上山椒縱火焚寺僧人不知就裏四散逃出當時五將會合直奔大營助戰王豹李梁皆非斜律亢宗拓跋琳之敵棄營而走二將降其餘衆改換旗幟遂據其營五將繼至一可據守時鄢知節將兵回營至中途遇王豹李梁知大營失陷大驚見族旗飛動悉是宋字鄢知節大怒殺近鹿角強弓硬弩利鏃穿骨人不敢近鄢知節已中數矢大驚而退王豹李梁亦被亂箭射回營中竟一騎不出三將無可如何引兵去訖時張景略已合著應彪之兵追宋師三將引敗兵亦至景略聞奪去營寨失許多輜重大怒曰賊將如此猖撅吾誓決雌雄馬如龍諫曰元帥宜慎重此間據末將愚見決有詐謀景略曰何故馬如龍曰苦肉計敗露誘敵至此寧遂已哉窮寇勿追望元帥三思之景略知童應彪倔強不肯退兵乃下令曰南雄空虛防有他變且分兵一半護守城池再議攻戰即請童將軍去保守南雄某等力任攻殺以均其勞童應彪抗令而言曰將軍之意如何應彪曰此去離面雄僅數十裏呼吸可應不如分兵兩路追殺且戰且走見可而進景略按地理圖示之曰此間即南雄鎮之西陵道也南雄鎮距郡城四十五裏兩路可通北多險阻南較平坦某與將軍從西陵分兵全隊退入城中再追殺不遲童應彪大言曰如此元帥請回南雄堅守城池戰者自戰守者自守南雄設有疏虞應彪當來救援應彪若有敗挫南雄亦來策應則首尾成犄角矣景略知應彪執意不可阻擋即分兵二萬健將十員與應彪追殺行至南雄鎮遂各下營寨此時童應彪方令人探宋將敗往何處打點進剿戰而捷再拔韶州忽轟天雷震響數聲兩營皆驚訝不已只見宋將馬遇樂楊孝伯宇文廣種世龍仍督敗兵殺奔南雄鎮來重應彪見之尚不以為意惟張景略以宋將出沒詭異十分著急丁不拔王豹李梁正在出馬種世龍上前手起一槍刺李梁于馬下一時伏兵五路俱起見正西韓搏虎正北雇德威正東寇復雷正南關普靈中央張懷亮五將殺來各執五般兵鎧各樹五色旗幟明分八卦暗合九宮按十幹五星列成五方五帝之陳張景略認定前後令衆將分頭殺出則前後勢若長蛇首尾救應堅不可攻景咯又列作兩翼約住衆將分左右而進則左右如龍虎之形風雲會合無懈可擊景略見不是頭勃然大怒令董應彪臨陳應彪見宋兵如荼如火四面八方若有百萬之衆束手無策亦不知從何處殺起不得已捨命向前直犯王西韓搏虎見白旗緩繞搏鹿忽然不見惟左有查士珩右有馬晉臣雙槍並舉應彪奮勇力敵二將不提防門旗下突出韓搏虎一馬殺出應彪措手不及被韓搏虎刀劈馬下二將取了首級白旗高舉陳勢依然元兵死者無數丁不拔殺奔正東寇復雷揮動青旗牛竤張燕二將敵住不一會旗開處寇復雷一矢射來丁不拔雖勇奈痛不可忍被張燕一斧砍死金鼓不震張景略見連折二將急督衆軍一齊混戰思乘勢殺出直奔南雄再作區處誰知宋兵五隊團團圍住自末初殺至黃昏不能殺出己戳傷劉耀箭斃曹伯雄人馬損失大半元師大潰當夜雷電交作風雨驟至元兵混殺一會衝突而出急奔南雄喘息未定宋師隨至一聲響喊五路人馬將南雄府圍定關普靈率焦芳史霸攻其西寇復雷率牛竤張燕攻其中扈德威率劉瑛嶽坤攻其南韓搏虎率查士珩馬晉臣攻其東張懷亮率吳廣王麟攻其北電光閃爍燈火照耀如同白晝幸城中有生力軍二萬有餘守禦皆備攻至三日馬如龍巡至西域偶被流矢所中拔箭而死太守姚映藩朝服望闕仰藥自盡其餘將佐死者甚衆關普靈知城已垂下便撤開酉路一軍張景略果然力不能支令鈕師成牟衍昌二將作頭隊魏文通鄢知節二將作二隊自己斷後棄城而走不數裏焦芳史霸分兩翼殺出牟衍昌措手不及被史霸輕舒猿臂活擒過馬鈕師成捨命與焦芳廝殺二隊魏文通鄢知節亦至焦芳不堤防為鄢知節暗箭所傷翻身下馬鈕師成正欲舉槍忽後面有人大呼看箭乃劉瑛也嶽坤隨後上前舞槍敵住鈕師成已箭中左肘宋兵已將焦芳救起劉瑛嶽坤截殺一陳魏文通鄢知節鈕師成三將奪路而去比張景略殺出城時有寇復雷韓搏虎二將所部齊至張景略不敢貪戰突陳而走忽前面關普靈一軍攔住景略命副將王豹出馬不一合被關普靈揮刀斬之張景略隨與交鋒不三合大敗而走關普靈放馬來追大呼曰張景略汝父張宏范能滅宋室今日天道好還汝非沖霄之羽料難出羅網也景略尚率殘兵數千捨命奔走只見先來誘敵之馬遇樂楊孝伯宇文廣種世虎四將一齊排開人馬阻定去路後面關普靈亦相距不遠景略情急智生令從軍拋棄騾馬鎧仗器械財物以餌宋師果然軍士見了財物皆爭出搶奪景略奮勇挺槍又衝殺而去四將緊緊追趕直至南安大庚縣界景略奔上梅嶺曰任汝窮追今無奈我何矣蓋此嶺為五嶺之一江右廣南兩界之間嶺上多植梅花中通一徑乃唐時曲江公張九齡所鑿景略自謂登嶺有險可恃忽山坳中鑼聲鼓響有嶽鎮史進傅突虞凱吳康五將引五百刀斧手一齊湧出時張景賂已身帶重傷隨身將佐死亡殆盡軍士面面相覷實不堪戰景略見此光景情知不免歎曰吾命休矣勉強兜馬向前宋將史進奮勇爭先挺槍便刺馬遇樂等四將追兵亦到緊緊圍定嶽鎮傅突四人又左右夾攻不一會景略己血流被面大呼曰天亡我也又北向泣曰臣力盡矣遂拔劍自刎史進取了首級衆將上前爭臠切之盡降其衆九將合兵回至中途遇關普靈引兵至聞景略已死一齊收兵是役也張景略喪師七萬有餘死大將三十余員列將百餘員免者鄢知節鈕師成魏文通三人率裨將數員三萬餘衆不敢徑過南安由間道達臨江而歸自此一戰元兵聞宋師之名皆膽落矣時關普靈待兵屯城外衆將齊入南雄寇復雷等安輯軍民整頓公廨備接涪陵次日涪陵燕超隨至諸將各上功畢涪陵再三勞慰急令皇甫悼出榜曉諭軍民不用元政仍行宋法與民約定秋毫無犯問傷吊死鰥寡孤獨皆有賑恤人心大悅涪陵隨設香案書故宋列祖神主用張景略首級祭告己畢命史進鎮守南雄傅突副之以酬其功保昌始興兩縣官吏如故劉知幾權府事兵過韶州以劉瑛吳康留兵鎮之乃回翔龍府於是將士皆有推戴涪陵正位之意涪陵恐廣南初定人心未屬辭以稍緩燕超又與范國昌種世龍等再三勸進且曰殿下固以讓為美德然海內無主已久將士血戰疆場九死一生猶無名號推翊獨不灰將士之心乎涪陵不好推辭始擇吉日祭告天地昭祀神祗尚無宗廟乃書一十八帝神主先行禱告即于翔龍府進爵為涪陵王行省公署府第改為翼天殿論功行賞大集文武以范國昌為參政兼少傅種世龍韓昭為左右丞司馬肅李穆為左右參議皇甫惇為贊善大夫嶽燕超為武威大將軍都部署狄定國為武功大夫行破虜將軍兼防禦使關普靈寇復雷高耀卿韓靖夏扈德威馬遇樂張懷亮韓搏虎劉瑛九人俱驃騎將軍白映雪為學士知制誥馬遇陽劉瑝宇文廣楊孝伯種世虎斛律亢宗拓跋琳焦芳牛竤張燕史進史霸嶽鎮狄勇傅突等授懷遠將軍任天鵬夏侯傑嶽坤吳廣正磷吳康虞凱洪時錦李繼業查土珩馬晉臣王方庹靖屈突申廖雲王彥陳同等俱武議大夫兼都尉侯長孺葛天民苗秀實劉知兒馮道南長孫軌為資政大夫耿進誠宗夢弼蘇伏威韋蔚文為資治少卿陸宣陳暢陳華為中丞龐英張昌石雄王遼朱昶朱升等為武功郎大開帶藏賞勞三軍陳亡之家俱有優恤隨征將士死者另加封賜一時翔龍府歡聲鼎沸文武逐班拜舞謝恩畢設宴大慶時廣南已控六府一州五十七縣惟高廉瓊雷等四州未入版圖福建控三府一州二十一縣江右控四府二十五縣兼有茶陵一州直抵衡湘涪陵王乃加狄定國為副統制鎮建昌府當江右一面高耀卿為留守司鎮邵武路韓靖夏為兵馬使用重兵鎮杉關二人當閩中一面寇復雷為都監率吳廣王麟引兵三千駐茶陵州兼制桂嶺而用牛竤張燕馬晉臣三將守北藏上梧蓬頭三關遙應江右斛律亢宗守福寧州史霸守潮州二將俱用重兵防海寇韓搏虎鎮吉安阻臨江一路宇文廣楊孝伯拓跋琳三將守肇慶防湘湖兵至降將李繼業加團練使仍守漳州王方已老不作外任調歸翔龍府作金吾將軍其餘各郡守略加更移如葛天民知翔龍府侯長孺知韶州府劉知幾知南雄府馮道南知肇慶府長孫軌知惠州府陳暢知潮州府李繼業兼知漳州府蘇伏威知邵武府宗夢弼知汀州府耿進誠知建昌府苗秀實知撫州府陸宣知吉安府群蔚文知南安府其餘武將俱分制險要彈壓各處以靖人心
