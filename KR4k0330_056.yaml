body:
  text: 第五十六回嶽招討怒打襄陽夢澤既平扈韓兩先鋒合水陸兵押定檻車仍由漢江欲返嶽州不料元常山王成吉思帖木兒逃至襄陽養精蓄鋭又以襄陽重鎮控制三大團營可以任意指揮聞宋師討平雲夢跨江撫有數郡老大不平遂集三大統制五都部署及諸將校議曰宋人往來湖湘欺人太甚今以得勝之兵直濟漢江我兵可截江一戰數郡不難定也當時三統制銚藩劉璝脫虎脫五都部署耿精忠楊剛李梁李通呼延廷鈺皆曰宋師聲勢甚大我兵恐非其敵即如阻險攔截長江有千里之遙亦恐顧此失彼不如且俟之歸所留將士定然無幾出其不意攻之此兼弱攻昧之策也常山王怒曰若待緩圖則兩湖陷沒盡矣朝廷養汝輩寧坐視敵兵往來漢江束手待斃耶楊剛李梁齊聲曰非末將畏死怯戰以襄陽乃京湖重鎮不可妄動一被敵至恐襄樊數千里自此無寧日矣常山王大怒曰庸懦之夫不足與謀爾等自赴各鎮緊護襄陽待我親自引兵截殺宋師衆將校知其意不可回皆日大王且親冒矢石將等何敢畏死常山王始回嗔作喜令三統制守襄陽五都部署隨軍出戰各領兵一萬至漢川等處阻住不許宋師過江自率一軍徑取漢陽時宋將陳同在漢陽病已全愈聞之大怒方欲作露布罵之繼又聞引兵者乃嶽州敗去之成吉思帖木兒喜曰此易與爾統軍迎戰常山王列開旗門裨將出馬不三合被陳同刺死常山王大怒援桴擊鼓麾動大軍以蹙宋師陳同兵少亦恐有失退馬壓定陳腳不動元兵衝突數次俱被強弓徑弩射退乃徐徐旋師入城是役也宋兵毫無損傷陳同自思元兵若不大創漢陽焉能保守遂用遁甲遊都之法以天耳聽之主乙庚之日應覆敵軍吏神在子賊神在午明日庚子主傷敵一員大將乃伐陰木之枝為六甲神符符中書六甲名陳同至夜乃披素服仗劍再拜北斗不致酒脯焚香為祭借用白茅用五色彩為幣以所祈之事北面禱祝三奠而止祭罷為六囊各盛一符不令人知次日臨陳即以本句符囊系於旗纛內令裨將舉之果然元兵望見即駭走陳同遂與常山王交馬十余合陳同暗發錦鏢如星飛電瞥正中常山王脅下血流如注滾鞍下馬陳同正欲挺槍結果性命元軍有裨將數人捨命相殺竟被救去元軍大敗陳同督兵大殺一陳元軍立腳不住拔寨而走宋師迫過漢川見元兵去遠唱凱而還常山王被創甚引大軍先回襄陽且説扈韓兩先鋒合兵欲由漢江撥入石首抵華容聞元兵阻溳口不容過江韓先鋒大怒曰巨寇擾亂十年置之不理乃阻我平賊之師也扈先鋒急問為何處兵左右曰乃襄陽兵也扈先鋒笑曰成吉思技止此耳韓先鋒問及夏侯傑防江一軍則已為元將所敗退保沔陽州去矣軍行不一會忽哨軍報江口水面下五大寨阻住我師舟不可行滿營將士無不忿怒皆欲決戰奪險而過兩先鋒即令史進狄勇種世虎馬晉臣四將出戰各領戰船二十隻未抵江口早見元軍五寨分布水面旗幟耀目劍戟如林外列樓槽勢若城郭兩岸俱石壁孤懸江口仄狹勇不可施四將觀望良久無所為計忽元寨中旗幡麾動放出五六十號小船如飛而來船頭元將大呼曰宋人欲得過江除非還我地土復我州郡不然此江不容渡也史進聽得怒目圓睜奮勇當先不提防弓弦響處史進中箭落水元軍之來其舟如飛狄勇忙救起史進種世虎馬晉臣引舟師抵敵詎料元軍發動神機銃一時轟天震響宋師中者皆死四將大敗回舟元軍追迫甚急卻得張懷亮楊孝伯二將兵至始殺退元軍四將回營請罪兩先鋒皆言此非汝等之罪以不知虛實故也次日韓先鋒親往挑戰督同衆將身先士卒力戰一會元兵少卻忽風浪驟起元兵所據乃是上流宋師戰船進難退易元軍隨放出二三十號艨艟巨艦衝突而來宋師下流奮勇如何抵敵一時中箭被槍者不計其數宋師又敗將士帶傷而退韓先鋒回營鬱鬱不樂相持數日兩先鋒令人打探旱路可有間道抄出元軍後者回報各處間道俱有元兵把斷扈先鋒忿然曰此江且不能渡焉能回軍令選大船百餘號編聯配搭上用平板鋪定排鐵騎於上外用小船數十隻令水軍各備火箭俟鐵騎衝突與元軍交戰時小船即飛進元寨以火箭射其箬篷各軍再多備引火之物火焚水寨元軍必亂衆將準備次日扈先鋒自統鐵騎以戰艦突陳元軍五將齊出兩下在水面交鋒宋軍後隊一聲鼓響水軍如飛奔出將近元寨施放火箭正待舉火忽上流頭風刮水面對面撲來人不敢近火不能發韓先鋒見風色不順急鳴金收帆元兵趁勢因風縱火火箭火炮火銃一齊施放戰艦惹著火種煙焰齊起水軍小船一時救應不及元兵乘勢攻殺宋師大敗衆將奮勇極力斷後元兵方不敢窮迫宋師折損甚衆兩先鋒只激得咬牙切齒指天誓曰若一過江必滅襄陽令將士調養數日韓先鋒一人微服上岸偷度小別山行過江滸暗至陽台觀等處瞰元軍虛實見五塞扎在水面勢若列星人馬甚衆下寨處正當隕口回看漢水波光浩蕩齊赴沔口而溳水發源在漢川之東有堤捍定故元軍得於隘口下寨若決其堤引動漢水一發則元軍皆魚鱉矣韓先鋒勘得分明急回與扈先鋒商議移兵上岸決堤淹之扈先鋒喜曰我兵不利於火寧不利於水耶當夜盡棄船雙移營上岸韓先鋒遂率狄勇嶽坤廖雲庹靖四將選精壯三百人偷過小別山見山頭有元哨軍數十人擒而殺之再過陽臺又遇數十伏路軍人亦殺之連過數隘口俱無巡軍齊奔溳口衆軍一齊將堤口決開溳水久蓄未泄一發如雷又有上流漢水以助其勢長堤一洗蕩然無存勢若天崩地塌萬頃洪波洶洶湧湧直望溳口衝突而來當夜元軍五寨將士多在夢寐中驚覺五都部署忙駕小舟亡岸回看水寨並不知溳口今在何處但見波濤激湍中將士爭相逃命五都部署忙令上岸軍士用撈鈎抓起直至天明五萬人馬已淹去三分之二急至高阜處營未扎定只見宋師大隊奮勇殺來此時元兵驚魂未定焉能抵敵扈先鋒身先士卒衆將繼之宋兵無不以一當十截殺元軍如摧枯拉朽楊剛李梁被創而死耿精忠李通呼延廷鈺三將保定殘兵望襄陽而走宋將迤邐追趕三將率兵逃竄眼睜睜惟望常山王及三統制兵來援豈知常山王自漢陽敗歸數日創甚病卒三統制急為料理喪事表奏朝廷匆忙之間忽報宋招討嶽燕超領兵由嶽州來攻打襄陽三統制大驚急令驍將許思進合萬戶甄宏副將夏德興等引兵出屯峴山脫虎脫登城固守銚藩劉璝自引大軍阻住鳳林關此關濱江作險為水陸門戶銚劉二將緊守此關且説嶽招討自調扈韓二先鋒出征雲夢遂引兵過嶽州駐扎不時打探俱有捷音後聞雲夢已平賈翀就縛因過漢川溳口為襄陽兵所擊連戰皆敗大為所窘嶽招討聞報大怒投袂而起即檄寇復雷來守嶽州自統水陸兵一萬率慕容長藍天蔚劉瑛嶽鎮四將放舟直打襄陽不日遂抵鳳林關慕容長藍天蔚奮勇爭先不畏天險一鼓奪關元將銚藩劉璝披靡直走峴山合著許思進之兵來戰宋師嶽招討披執臨陳親冒矢石士氣百倍慕容長藍天蔚二將忘生奮死萬衆辟易襄陽兵焉能當此惡戰許思進夏德興俱為慕容長所殺銚藩劉璝甄宏率敗兵望城而走不數裏又遇嶽鎮劉瑛伏兵截殺一陳甄宏為流矢所中血流滿面倉皇遁走嶽招討曰兵貴神速立即攻城若養成鋭氣又費爭戰矣宋師一聲呐喊圍了襄陽太守鄧公亮已驚得六神無主脫虎脫登城罵敵被嶽招討泄滿神臂弓射中墜城而死宋師班聲動地炮響連天城中百姓入見太守曰府公素有德政何不獻城納降以救生靈鄧公亮遂率百姓開門迎降嶽招討下令軍民安堵秋毫無犯且命劉瑛嶽鎮統大軍屯於城外率慕容長藍天蔚引二軍肅隊而入百姓扶老攜幼爭觀宋師有喜至泣下者至府中坐定聞鄧府尹素得民心令仍知府事少時宋師擒銚藩劉璝至二將口稱願降並言常山王謀截宋兵欲奪疆土非我等敢敵天兵嶽招討始知起釁之由允其降命隨軍聽用乃查倉廩賑困窮問傷吊死登俊舉賢養老恤孤行諸善政軍民大悅不日所屬州縣俱有表至忽報南江口有無數人馬爭渡逃竄招討即命慕容長藍天蔚二將引輕騎覘之乃襄陽都部署元將耿精忠李通呼延廷鈺兵也三將大敗而來慕容長藍天蔚見是元兵舉槍便殺元將人困馬乏耿精忠被慕容長揮刀劈死李通呼延廷鈺見前後俱是宋兵自知不免大呼願降藍天蔚麾軍士縛之盡降其衆半日後扈韓兩先鋒大軍已至始知招討已得襄陽大功成就入城相見甚喜越日招討令將賈翀廖維新翁國肜三人斬於襄陽西市將首級傳送沿江上下被難百姓無不焚香拜謝招討即在襄陽犒軍降將李通呼延廷鈺隨軍聽用彈壓各處分撥諸將至是而荊湖之寇始平
