body:
  text: 第九十四回清風嶺廉夫祈嗣紹興府嵊縣有一青楓嶺因嶺上楓樹甚多故以名嶺宋端宗時元將阿魯台兵徇浙東破台州等處虜掠一空時臨海縣民妻王氏有殊色亦在虜中千夫長殺其夫並其翁姑欲納為室王氏恐被汙乃佯謂之曰能使我為翁姑與夫守期月之服略盡寸心方可從命千夫長甚喜許之又恐其自縊令所虜婦女雜擁之師還契與同行至嵊縣之青楓嶺王氏見下臨絶壑不啻千仞守者亦少懈乃仰天竊歎曰妾今得死所矣遂齧指出血題詩于石上有雲雲中千古恨金石一生心之句題畢投崖而死千夫長悵望而去後其血漬入石中顔色如新不為風雨剝蝕紹興府為之樹碑立祠嶺上易其名曰清風嶺元仁宗皇慶二年以翰林學士李孟請行科舉始詔令以皇慶三年八月天下郡縣興其賢者能者充貢有司次年二月會試京師中選者親策於廷及第出身有差此詔一下南北士子齊赴京師就試時有溫州府縉雲縣申屠生入京應舉才思出衆慨然以第一人自命道經清風嶺見郡守為王節婦所撰碑紀不覺啞然失笑曰既矢志不從矣而又臨海相從至此耶節之一字談何容易我等讀書人正當為名教中抉出節義二字真面目方不負所學耳乃題詩一絶雲齧指題詩似可哀斑斑駁駁上青苔當初若有詩中意肯逐將軍馬上來題畢走馬揚鞭而去是夜嵊縣令夢入城隍祠見吏役等倉皇出曰請縣令速入兩郡城隍至矣縣令趨而進見兩郡城隍上面端坐私問左右左右曰上面居左坐者乃紹興府城隍即東晉時宣城內史桓彜也居右手坐者乃台州府城隍即故宋招諭使謝枋得也縣令禮畢即有門吏入報曰至矣兩城隍皆離座降階以俟縣令隨之只見門外一婦人冠帶而入兩城隍揖之升座禮畢分賓主坐定婦人首先泣告曰王氏所以間關忍死者以舅姑與良人未成服且未得死所故耳王氏寧畏死哉今申屠生自恃多才毀我貞名將來節之一字將盡喪于彼文人之口況婦女生前含辛茹苦甘萬死而不辭者專望死後有人為之發潛闡幽申屠生前程遠大而存心如此尊神若不主持從今以後恐無人立坤維之正氣矣言畢掩袂而泣桓內史色變徐謂縣令曰黜其科名謝侍郎亦怒甚乃曰竟絶子嗣兩城隍再三安慰婦人始泣謝而起兩城隍轉身謂縣令曰節義最為地府所重世人不省往往肆口譏訕士子尤甚今後垂為令典凡譭謗貞節者皆絶子嗣但王貞婦祠屬在嵊縣宜不時令人好為守護縣令方欲問申屠生何人而曉鍾一聲春夢頓醒次日即令人至嶺上祠前訪之果有一申屠生至此留題縣令立毀其詩令人偵察之申屠生果下第而歸後竟無嗣及致和中山陰有楊維貞者字廉夫諸暨人也博學能文乃大元時一家作手曾過清風嶺亦題詩祠中以辨其事雲胡馬馱馱百里程清風後夜血書成只應劉阮桃花水不似巴陵漢水清後廉夫登泰定進士署天臺尹又任江西儒學提舉曆修宋遼金三史作正統辨千餘言著作甚富致仕後居杭州鐵冶嶺得莫冶所制鐵笛故改號鐵崖曰鐵笛嗣又築圃于江之上戴花陽巾披鶴氅頭挽雙髻吹鐵笛作梅花弄曾有詩雲青羅包髻自行纏不是凡人不是仙家在洛陽城裏住臥吹鐵笛過伊川時廉夫年逾大衍尚未抱子一日過會稽拜禱曹娥祠下夜夢一女子謂之曰爾不必禱我爾不記昔年未第時題清風嶺一詩乎雖未嘗掩婦之名而譭謗節義其罪至重故天絶爾嗣廉夫悚然驚覺汗濕重衣始大悔恨次日即市香楮福物牲醴諸事上清風嶺祠中再拜謝過奠畢乃改題一詩以紀之雲天隨地老妾隨兵天地無情妾有情指血鑿開霞嶠赤苔痕化作雪江清願從湘瑟聲中死不逐胡笳拍裏生三月子規啼斷血秋風無淚寫哀鳴題畢是夜即宿祠中夢一婦人入斂衽致謝廉夫急欲問之忽見一小兒牽其衣婦人倏不見亦遂驚醒廉夫此時憂喜交集暗思文人弄筆一錯三十年今後凡有關名節者萬不可妄肆筆墨因復在祠前和節婦絶命詩一首拜謝而歸歸後未及一年果生一子其和詩雲君王無道妾當災棄女拋男逐馬來夫面不知何日見妾身料得幾時回兩行清淚頻偷滴一片愁眉鎖不開回首故山看漸遠存亡兩字實哀哉
