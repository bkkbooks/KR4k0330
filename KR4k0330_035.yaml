body:
  text: 第三十五回德報德上官朴免禍松江府婁縣韋子琇以丞倅宦遊山左得青州之樂安主簿家小僑居於青自以一琴一鶴赴任不半載卒于任所宦囊如洗一妻一女由青州奔至喪次殮畢輿櫬不能歸裏遂瘞樂安母女二人煢煢無依艱苦萬狀以女紅佐薪米每至缺乏貧病交迫繼而轉徒靡定流離東昌有聊城尉署內招乳媼急往投之其女偕往謂自此可免飢寒矣不久尉挂冠去母女仍大窘有憐之者令入浣衣局終日任勞漸獲安燠忽又臥病並浣衣局亦不能執役母女束手待斃又值歲荒只得賣女與一富商作小鬟得銀四兩正將訣別母女抱頭而哭忽有一人來問其故母具告之其人惻然拂袖而去少時案上得銀一錠知為此人所贈欲追謝已不知所往母乃還富商之銀骨肉保聚相賴以生而終以不識贈銀之人為憾有知之者曰此高唐州上官朴也其人好行隱德往往有不令人知者且説上官朴字太貞博學能文然不事章句好擊劍落落有大志慷慨重義鄉里多德之夕有偷兒入其家被拿責之曰堂堂五尺何甘作梁上君子偷兒泣拜曰母老家貧千里投親不遇路無資斧不能歸故鄉耳若蒙恕有誓當自新上官朴聞之動心乃曰穿窬之行不可再也取銀十兩與之偷兒拜謝去家中僕役無不笑以為愚一日泊舟臨清江下夜靜聞鄰舟哭聲迹其所在至最遠一舟得之見一男子白皙而修望月而泣叩以故其人姓方名連茹徐州碭山人也曾隸遼陽鎮都督麾下因至常州無錫等處為都督運河糧中途聞家中母病垂危拭目以等永訣欲赴遼陽則不孝欲歸碭山則不忠心中如碎是以悲耳上官朴問同行幾人連茹曰仆某一人又問河糧他人可代運否連茹泣曰長河數千里干系非輕誰肯代為任者上官朴遂力肩其事渭曰某高唐州上官朴也遼陽一役某任之決不負公文簿册籍等項速速交出汝星夜直歸碭山以盡人子終天之念方連茹一聞此言五體投地謝曰感君高厚實同再造此間河糧二千三百五十八斛號船五十隻船戶人名册籍可稽劄付批文等類概以交君沿途無礙但都督袁珙素極傲岸峻急因目下真定劉勇士餘黨竄登萊間其勢復張朝廷欲行剿除急需軍飽海道太緩命某度淮倍道而進至天津營交納君至彼處先見劉參軍直陳某意自有方略言畢開船匆匆而去上官朴待至天曉喚集船戶遂名點查並道已意順風開舟不日直達天津至參軍衙內投文交割參軍劉孝德命糧官驗過米色登時收楚立傳方記室入見上官朴坦然直入孝德一見愕然上官朴參謁已畢備陳顛末自言願伏廟代之罪以盡彼人子之心劉孝德回嗔作喜曰足下乃誠實君子也傾蓋相逢素無一面能寄託大任可敬可嘉但方記室之事某須向幕府處力為周旋以全足下盛意上官朴稱謝劉孝德請至賓館設宴相待兩情相投備極款洽飲至更深始出蓋方連茹乃劉孝德之甥連茹母病垂危孝德自然極力周全次日與袁都督説知都督亦無異言劉孝德心義上官朴之為人薦于都督請重用之都督用掌書記旋用為參謀時登萊業已興師袁都督引兵會剿即命隨軍聽用兵過海州蓋州由金川衛所直達登州衰都督知會兩鎮率兵進剿一戰萊陽再戰旗山三戰海寧州白沙河追過昌邑勢如破竹再抵膠東進勞山路途漸狹且多險阻上官朴謀曰連戰皆捷都督之威力矣宜屯兵險要先播威德剿撫並用不可深入重地袁都督不聽大驅人馬直搗勞山登萊兩支人馬一剿石城蛇皮嶺餘黨一追焦山豹林等處惟袁都督所部迤邐馳去沿途俱無敵兵阻滯袁都督喜曰賊已入吾掌中矣上官朴又諫曰彼雖烏合恐有詐謀宜探虛實待兩鎮兵至三路齊進方保無虞袁都督一股鋭氣橫搗直沖有進無退上官朴十分憂慮議將人馬分作三隊先後繼進即有不測可相救援袁都督勉從其策自作前隊裨將段逵魯鎬次之上官朴領後隊策應分撥已定袁都督縱馬當先直入穀口見山路崎嶇並無人影遂放心前進正行之間忽山坳裏鼓角齊鳴賊兵分左右殺出截斷歸路前隊陷於伏中火炮石子萬弩齊發袁都督雖驍勇已身帶重傷部下死亡將盡仰天歎曰悔不聽上官參謀之言乃為鼠輩所欺拔劍自刎而死全軍盡覆一時敵兵蜂擁大出二隊段達魯鎬力不能支棄甲拋戈而走死者枕籍不計其數上官朴後隊猶隔數裏聞前軍失利督兵疾進慌忙迎敵愈殺愈衆以全軍漸次陷沒乃棄馬卸甲雜亂軍中而走敵兵一擁擒住縛赴大營當晚大犒三軍歡呼暢飲上官朴知已必死忽一賊直入後帳四顧無人竟開囚車釋其縛悄悄引出後帳指明山谷贈以乾糧命速走叩其姓名則即向日贈金之偷兒也再欲問之惟用手一推令疾走不顧而去上官朴遁出山峪數日始遇著殘兵會合段達魯鎬二將回至遼陽人人危懼靜候朝命時直省平章業已奏聞世祖世祖大怒命將遼陽鎮隨征大小軍官並登萊二鎮將齊逮入京系獄論罪另調保定府總兵胡深鎮守遼陽再命曹州府兵馬都監阿沙不花剿賊旨下劉孝德歎曰可惜上官參謀為都督所誤豈不冤哉臨行時孝德惟多贈禮物珍重而別上官朴等入燕經三法司會勘得實以副將段逵魯鎬失護主將臨陳而逃致陷全軍論斬登萊二總兵分軍剿賊逗留不進從寬革職軍前贖罪立功參謀上官朴雖再三諫阻計議未行然已充後隊不能救援與失律同科擬決監候袁珙愎諫喪師雖陳亡不與蔭襲請旨定奪上官朴悶坐天牢日待旨下淹及一年竟成立決自歎曰華亭唳鶴東門牽犬人事大抵如斯但首丘之悲未知尸橫何處耳將至歲暮未決忽一日有兵部尚書董文用表稱勞山賊黨肅清登萊總兵業已復職袁珙蔭子已仕至都督同知惟遼陽鎮參謀上官朴未能免罪非聖主深仁厚澤之意也亦宜復職以責後效旨下僅允免死放歸田裏上官朴死中得生既出獄自思待死年餘乃得一素昧生平之董尚書上表拯拔不可不一識其面乃具名帖赴尚書省啓請尚書即時傳見上官朴伏地陳謝董尚書曰老夫為公為國非市恩也有恩於足下者其崔諫議乎上官朴唯唯而退滿腹疑義問明諫議公署在給事中衙左又往叩諫議大夫崔百祿謁見時崔百祿乃曰救汝者興文署陳學士也上官朴又唯唯隨又往集賢院拜謝學士陳功甫即升堂方欲跪下學士用手扶住笑曰救足下者更自有人小弟不妄受也上官朴大驚暗訝此也不是彼也不是寧鬼神之呵護群仙之手援耶正在沈吟學士又笑曰此足下之自救耳少時便知隨命設宴款待上官朴勉強就席學士坐于主位殷勤把盞上官朴此時匕不敢擎卮不敢舉如坐針氈較在天牢其難尤甚俄而簾卷處一麗人明眸皓齒珠擋玉珮錦妝花簇數小鬟扶持如攜薔薇一支搖曳而出上官朴急欲起避麗人已俯伏席前口稱恩人高厚銘感不忘容妾拜謝略酬萬分之一上官朴不知所措急問其故學士曰此弟小荊即足下東昌府贈金之韋女也上官朴心始恍然因念無意間所救二人今日大難深得其力十分感激因問尊閫遇合在於何所學士曰弟昔在滁州未遇時已喪前妻再娶梅氏至正二十年梅氏又故繼得史中丞薦剡入京道經彭城遂聘此女邇時母女相隨入燕不久其母遂卒每言足下大恩無緣報答及聞被難寢食俱廢令弟保救奈弟職非言路因懇敝同年崔諫議代弟上章一言崔諫議亦慮事關軍情難回上意又轉懇其老師董尚書幸得允旨不辜韋氏之意然溯其由來非足下之自救乎上官朴如夢初覺猶再三稱謝韋夫人不置學士笑曰從此書斷鴻溝二家皆以恩報恩完此一段公案可也上官朴此際疑慮盡釋方歡然與學士陳功甫開懷暢飲誓結昆仲而別數日離京欲歸忽憶遼陽劉參軍頗重義氣不可不往辭之以示來去分明仍轉遼陽以布衣謁見劉孝德喜出望外安慰再三禮意殷勤款洽數日告別孝德執手言曰黃鍾毀棄瓦釜雷鳴吾深為公惜並深為朝廷惜耳但目下此鎮都督比前任剛愎尤甚愚甥方連茹聞已投故宋去了足下珍重遇合尚自有期上官朴亦應以得時則駕不然急流勇退可也二人依依不捨灑淚而別上官朴遂由天津不日抵東昌風景依稀桑梓未改至其家則庭戶封鎖蛛網懸空前後皆扃闃無人聲不勝駭異往問比鄰皆言女家已通仕籍官參議令人迎家小赴任所矣上官朴目瞪口呆不知所謂暗晾曰寧吾業已朝露為異物耶復視庭樹蕭疏修篁窈窕故園舊井明明在目倣徨久之裏門外忽一騎飛至滾鞍下馬視之乃老仆王安居也自言千里覓主今幸相遇問何來答曰徐州上官朴急問家室何往王安居曰主人別後家中大有異事遂曆曆言之先是上官朴有弟曰上官誠韶年秀美勵志下帷仁厚有朴風一日寒食遊野外蕭寺見二桐棺露殯所不忍正視方欲反日已昏暮乃投宿寺左莊戶家是夜風月澄霽忽聽外有吟聲其一曰野煙禁處故人稀埋首荒原無所依春草年年寒食露離魂猶共鳥爭飛又有一吟聲微低者亦曰翠袖香消雲鬢斜飛飛燕子客還家荒村無人作寒食夜月空臨棠棣花淒絶之音動人悲楚上官誠素有膽識起視之二女子一衣紫一衣緑俱絶代佳麗愁慘之態似無可告語者問其故二女子曰殯宮雨風飄拂求君子舉槥葬之則泉下人不朽矣上官誠許諾二女子奄忽不見次日將二棺瘞之高原以帛爵奠之始歸時上官朴已赴遼陽家有小廝曰王四素黠託病逃役唆衆不和誠纍責之待兄歸將擯斥焉王四又與衆詈而毆四訴於誠四本理直而誠以黠故呵之王四大恚越日黃昏後誠臥書室淡月微星中見先後數人驀然直入少頃榻下有聲甚厲燭之則王四暈絶在地猶手持利刃呼僕從起而縛之知四行刺誠大怒將鳴於官其嫂刑氏勸以存厚不如逐之生死聽所適誠遵嫂命王四既出仍投一大姓家為奴誠不之理晝則經紀出人夜仍扃戶讀書一夕方挑燈忽見前日蕭寺中所葬二女子紫綃緑羅俱作鳴蟬髻貼翠鳳翹丰姿綽約流光顧盼益增嫵媚雙雙而入斂衽致謝誠甚異之因叩生前姓字裏居紫綃者曰妾琇琴沈氏舒城人父以司李官堂邑妾頗耽書史好筆墨父鍾愛過甚未笄而天又指緑羅者曰渠名倩桃即聊成鄒內翰之侍女也元兵擾攘停棺蕭寺曆十有餘載感君高誼得托幽壤前惡奴不逞時姊娣小用斡旋然不置之死恐將來禍未已也誠始悟當晚王四之暈絶者二女力也謝曰感卿救護得保首領未來隱憂可明示乎二女曰不足慮也但小有虛驚耳臨時自有分辨誠又問卿等處地上乎抑處地下乎二女子曰鬼在地下猶魚在水中也地之不礙於鬼猶水之不礙於魚也誠曰地下閻浮提主者有更換乎二女皆曰然誠曰地下主者德以何為重二女曰純孝誠曰惡以何為先二女曰淫惡誠曰幽明無二理也又問地獄之説果有之乎二女曰俱在人世誠曰然則十八重之語何説二女子曰此特論其理耳夫人于眼所見耳所聞鼻所嗅舌所味身所觸意所思處為六根界色聲香味觸法為六塵界眼識色為眼識界耳聞聲為耳識界並鼻識界舌識界身識界意識界為六識界總為十八界夫十八界即十八重也釋氏以心即佛妄為業皆目前者也使六根六塵六識不得其所即地獄耳誠曰然則長人土伯皆為寓言爛土雷淵俱無實地前此之言地獄者不皆謬乎二女子曰地獄之理為中人而言若窮凶極惡者生前十八界俱得其所沒後始用業風團結成種種形狀受無量布苦蓋不如是不足蔽其辜誠大喜曰地獄乃不常有而亦不常無所謂無常也又問二卿主者為誰二女曰女子最重者守貞一有不貞則無處而非約束妾二人貞魂獨往獨來即阿姆坤英夫人亦不拘也誠曰二卿樂生乎樂死乎二女曰生來死往豈有往而不來之理然與其不順而生寧死而得其安也誠笑曰二卿甚樂其死能攜吾一遊乎二女曰然則君好死而惡生也誠笑曰不然卿輩芳澤伊邇猶之購十二金叉圖作一銷魂窟寧不春宵一刻千金值乎二女子掩口笑曰郎君辭褻矣幽魅之氣不足以奉巾櫛將報君者反害君矣願訂文字交結再生緣可也誠聞言爽然若失斂容起敬曰料得也應憐宋玉二女齊聲曰肯教容易見文君既而曰今夕之遇不可無詞以記其事紫綃女子沈琇琴遂首唱雲羅襪無塵悄訪君西窗剪燭共論文癡情縱有高唐夢不作巫山一段雲緑衣女子倩桃亦雲夜雨春郊點翠鈿短歌唱罷冥冥天感君高誼托華表化鶴來歸訂夙緣上官誠細味詩詞悵然久之亦奮筆書雲良宵大好入芳叢金屋徒勞撇夢中絳雪丹燒猶有待元霜臼搗竟何功鞋尖彩鳳雙飛紫袖底鴛鴦一撚紅咫尺藍橋增惆悵偏將別恨惱文通二女子歎曰郎君情深見於辭矣然宜自保重郎君固非紅樓選夢者流而妾輩亦非紫陌尋春者比姊娣勉為之則嬴台月暗雙鳳可乘銅雀春深二喬重鎖妾與郎君未必無人面桃花相映紅時也歎息一會時曉雞三唱逡巡辭去上官誠於邑者纍日忽一日見王四引持黑索者數輩洶洶而入誠方欲問之不由分説將鐵繩系頸而去誠如聞青天霹靂倉皇失措隨至州署問之始知為王四所告蓋王四所投汪姓名向瑤巨富而有二女一夕二女忽失去汪治家方嚴有法婢仆不敢犯自思並非私奔決有妖異即鳴於官高唐州刺史準案緝訪汪歸家亦懸金賞購四出密捕正值王四投入暗思行刺時見上官誠書室中倏有二女子適從何來非汪女而誰乃言于汪且出首告訐將誠拘至而刺史素重上官昆仲之為人取鄰里保結俱無證驗王四所言俱屬夢夢上官誠始將王四叛主行刺詐陷等情呈上刺史大怒將王四滿杖囚於獄中並責汪向瑤擅收叛奴妄聽誣扳上官誠始得無事且説汪向瑤素尚任俠交遊甚廣見刺史推尊上官於已多不禮遂大忿恨日夜與俠客輩出謀思相報復無何而二女得于上官誠別墅莊戶鄭氏之家先是某日有一女覡冒雨入汪之門向瑤唾罵之女覡有幻術恚而攝去其女寄于鄭鄭懼禍出首而覡已逃去二女得歸汪向瑤曰欲控上官氏不患無辭矣上官誠家世長厚亦慮為莊戶所纍難免株連聞其兄朴已為遼陽鎮參軍將往省之以避此案繼聞勞山敗績逮京問罪訛傳者遂言已坐覆軍極刑家屬發邊衛安置上官誠大驚方欲逃去既而曰嫂不可棄也乃與嫂商議買舟直竄淮南刑氏聞言不勝惶恐僕役聞之一齊散去上官誠曰事急矣且去聊城舅氏家少避再行不遲正欲起身忽見一人飛馬而至誠暗思必軍官也其人下馬皇遽直入曰某碭山方連茹也感上官先生代任得歸母病全愈今聞被陷家屬豈可坐以待罪上官誠急問何策方連茹曰今日惟投宋一計可免某亦有心久矣故連夜由間道八百餘裏至府略酬前日信義上官誠急喚家人多半逃盡惟老仆王安居應聲而入命收拾細軟物件雇車乘馬並刑氏嫂直達徐州濠梁由江右而去卻説上官朴消息聞其放歸急遣安居至故里待之恰好相遇上官朴始知別後情事亦以元室不獲大用主仆二人一同歸宋至翔龍府則家屬已由方連茹安置停妥上官誠已知樂昌縣方連茹亦任連州州判二人相見促膝談心以為士遇知已死也數日後引見涪陵王涪陵王亦重其人命判府事
