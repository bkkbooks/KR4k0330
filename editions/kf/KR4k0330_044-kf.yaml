body:
  text: 第四十四回周處台馬陵伏妖潛江二女子長鸞英次鳳英姓許氏有殊色父母俱逝兄嫂猶存遭亂相失陷賊中與玉奴親若姊娣得索通共夫人贖出同至江右彭澤縣小姑山北買山築室爲避亂之計內有夫人做主外有索通經紀玉奴三人可以相安惟不時歎息夢蘭不知竄離何所夫人玉奴每每泣下索通時以溫語安慰謂必已同馬陵量無他虞索通又雇人不時各處探聽並無音耗一日夫人與玉奴正悲咽間忽一人驀然直入視之非他即公子夢蘭母子相逢喜出望外索通急問馬陵何在夢蘭自言被賊沖散一人逃至黃梅竄伏數日打聽母妹音耗又至蘄州天門等處足迹殆遍近日方問道歸家索通曰黃梅去賊巢不遠如何不知且馬陵自言尋主不得不歸寧肯背主而逃心中狐疑不定誰知夢蘭與馬陵前時逃過建康至上元備極辛苦一日過周處台前少憩夢蘭因奔走太急兩鼻衄血不止瀝紅滿地因過西州城館于村南龐老之家歸家之夢蘭乃妖所托也周處台下舊有蛇穴自梁至宋約五百餘年一蛇偶出見夢蘭瀝血滿地用舌舐之遂化爲夢蘭託名歸家竟至彭澤爲母子會合而真夢蘭所主之龐老名洪者上元素封也有二子延師課讀夢蘭主仆正無家可奔遂托足任爲西席所居園亭幽寂花木叢茂夢蘭安心住下惟思念母妹與馬陵太息而已住月餘忽有一女子眉目如畫月夜就之聞漏聲則來及曉鍾乃去每去夢蘭啓扉而送複掩扉而寢龐氏二子臥榻前月余夢蘭恐其覺以微言試探而毫不省馬陵獨臥一室更不知就裏會一日龐老留他客同宿齋中女子先一夕告曰暮有客至妾不能來當遣入迎子夢蘭至是稍疑之是夜三更後果有兩人自窗紙中入皆衣青衣貌極醜惡夢蘭不欲行不覺被其扶掖出門行如駛至元武湖躡浪而渡夢蘭大恐然毫不沾濡無異蜻蜒之點水既入門則甲第連雲儼王侯家女子貌益莊雅服飾愈麗迎夢蘭於中門慰勞甚歡席間綺繡錯陳金玉羅列酒酣攜手入臥內至其陳設之璀璨尤人所未見帳前懸明珠十二顆間有大於雞卵者雙金鴛鴦口吐香煙環繞衣袂間香不添而煙不減夢蘭至此時目蕩神搖不知置身何地榻前複設小酌女子橫玉琴彈之捧紅玉斝滿斟香醪自飲其半以半進夢蘭將就寢隔帷簫聲嗚鳴然夢蘭揭帷忽見一女子年十四五姿態更妍不覺得隴望蜀不能自持前女子急牽其袖曰小妹學簫羞見生客無煩竊看遂寢女子攬被覆之被如輕煙若不知有被者以手捫之惟輕溫貼體而已雞鳴複呼二醜人送歸還至湖邊醜人推之入水大驚狂呼而寤客與二弟子俱問先生適夢魔耶夢蘭唯唯而窗外鬼聲啾瞅聞之始懼告于馬陵馬陵視其面目形容大與前異遂與偕寢迨女至仍懵然與之歡狎馬陵無力可助從此日漸尪羸益懼告于龐老龐老使健仆數人守之仍如故衆咸以爲淫魔連請數巫俱不能遣自此夢蘭終日昏昏若夢病轉增劇馬陵十分著急龐老又訪得天慶觀羽士楊真人善能伏魔降妖不惜重禮請羽士來登壇作法穿戴星冠羽衣拈香禮拜即念淨心神咒一手執七星降魔劍一手持五雷訣步罡踏鬥用天蓬尺在案上三敲四擊口中唧唧噥噥又念金光咒淨天地神咒北方真武蕩魔神咒念畢敕符遣將捉邪龐老以爲此妖定可伏矣誰知女子即附在夢蘭身上至壇前斂衽言曰奴與鄭公子有夙緣乃五百年前結好何勞念咒書符楊真人見此光景老大作慌急將法劍在案上一擊揚聲喝曰都天大雷公霹靂虛空神兵千萬上來降此壇中敢有逆令者雷部定不容吾奉太上老君急急如律令敕念畢隨又燒符召請龐劉苟畢鄧辛張陶馬趙溫關十二天君速來降妖女子在壇前不覺撫掌大笑曰楊真人汝滿身皆魔自己心中魔尚不能祛焉能驅人魔也俺與汝同是一魔若以魔治魔豈有此理說罷仍轉入書齋去楊真人滿面羞慚只得收拾法器而去龐老無可如何馬陵守定夢蘭無可發泄目中火出日泣訴于嶽帝廟前而土偶無靈夢蘭日憊一日甚且不肯服藥馬陵忿然曰可笑紹虯髯直爾無能便束手待斃也一日龐老謂馬陵曰汝能往信州一行乎馬陵曰何故龐老曰信州天師張興才乃漢道陵天師三十八代元孫元主封與才爲太素神凝廣道真人領江南諸路道教但往還千餘裏汝若不辭辛苦往求符籙當必有效馬陵一心救主毅然願往龐老贈以資斧馬陵次早即離上元不分星夜數日遂達信州直至貴溪見山前兩石對峙如龍臥虎踞乃道書三十二福地之一馬陵三次請謁候至日晡始入上清宮見處處俱有神牌十分嚴肅少頃天師出馬陵參見畢遂達來意天師見白手求符面有慍色微曰此易與耳汝速至茅山可傳吾命請猶是道人去馬陵見天師羽葆星冠執笏秉圭而退遂不敢停留又望集慶路奔走往還半月有餘始至句容上茅山至觀中間猶是道者或曰在山下左側茅庵種菜而居馬陵問至山下果見茅屋數椽叩門問之內雲糞田未歸馬陵暗暗叫苦良久果見一擔糞桶者頭挽雙鬃時已秋末冬初尚穿麻衣貌甚猥瑣馬陵足恭問訊答言即猶是道者馬陵即拜懇伏妖並達天師之意道士笑曰天師終年賣符籙得金錢以千萬計降伏妖孽終必煩我擔糞人也遂命之人道士放下糞桶坐謂馬陵曰汝主所患者蛇妖耳非吾符籙不能制也建康故城西舊有周處台台下深穴藏蛇甚多自梁及今魅人不知幾許吾所持者乃太乙神符念汝義氣可嘉將此符授汝歸而盡之無留種類貽害他人慎勿負予心也道士遂口話指授馬陵盡得其訣拜謝而歸回至西州城南村則此妖已於三日前屏迹去矣夢蘭病亦少瘥逐日痊愈馬陵深思妖蛇不除此恨難消遂偕龐老家健仆十餘人多備雄黃藥水種種毒蛇之物直至周處台前往穴中逐一注下少傾聞內喘聲如牛衆人大歡馬陵命衆少退自伏劍以俟不一會果然穴內刮起一陣冷風令人毛髮皆豎竄出一蟒身如吊桶眼若金鈴張開血紅大口露出雪白齒牙衆人一見手足皆軟退後便倒馬陵手持神符惡狠狠奮勇上前妖蛇一見此符果然不敢妄動馬陵見路旁有大石即用費長房飛石法書符于石石便飛空落下此蛇粉碎少時連出二蛇微遜此蟒馬陵如法治之無不立斃始信擔糞人不欺我也馬陵呼衆人觀之已心膽俱碎遠遠立定無不吐舌馬陵候至半晌俱無蛇出始率衆歸龐老得知大喜曰可笑前此法師直兒戲耳馬陵歎曰豈但各處巫師兒戲即龍虎山廣道真人亦裝腔做勢圖騙金錢耳向非遇擔糞人此妖烏能伏哉龐老亦笑曰今後遇賣菜傭慎勿以爲不足齒之傖也彼裝模做樣者直黔驢之技耳馬陵主仆深感猶是道者不置夢蘭病已全愈辭別龐老欲行龐老不敢強留命二子拜謝厚贈之主仆遂渡採石磯由太平蕪湖以達池州欲從安慶還江右九江而回京湖一日至東流縣黃花驛偶遇一人問曰公子幾時至此夢蘭愕然不識爲誰其人又曰某昨自小姑北山來公子猶在家中何迅速如此夢蘭益發不省馬陵心知其誤因私問曰汝所問者爲誰其人曰鄭公子夢蘭京山人也家一母一妹一老仆索通如何不是馬陵大驚因問家在何處其人曰此去百餘裏彭澤縣小姑北山下是也住此已數月矣馬陵狐疑不定催促夢蘭速過彭澤縣小姑北山訪之主仆兼程而進三日遂抵小姑訪至北山下只見索通一見馬陵便大罵無義棄主而逃馬陵見不是頭心內火起揮拳便欲相打索通忽又見一夢蘭相隨大驚不止聲聲叫鬼夢蘭喝曰索通不得無禮索通忙上前即見畢急先奔回家中則家內先來之夢蘭已不知去向矣連呼怪事夫人問之則雲又一小主至矣先來小主如何不見夫人叱之曰老奴何昏憒至此明明公子散步而回何得家中一公子門外又來一公子甯公子有身外身法耶索通一手指定曰馬陵來矣只見夢蘭與馬陵徐步而入夢蘭叩見夫人曰兒不孝失散後不知母妹何所幾乎骨肉不能聚首言畢嗚嗚而泣又與玉奴兄妹敘禮夫人十分駭異細察形音無異惟面目少覺消瘦似從病後來者玉奴在旁大疑鸞英鳳英滿面發赬馬陵亦叩見夫人泣述夢蘭所遇之事夫人玉奴益發驚駭夢蘭曰莫非家中亦遇妖耶諸人疑惑不定馬陵遂大罵索通在家真贋不辨某因公子遇妖茅山求符曆盡辛苦始回索通亦罵馬陵狂妄某贖夫人小姐曾向金山寺三次盜寶始得生還二人兩不相下轉是夫人調停曰兩俱忠心爲主吾家自當酬勞時有鸞英鳳英姊娣俯首一旁欲言仍止夢蘭不知二女來歷倉卒間猶未問及夫人爲言其故始亦以兄妹禮見夫人曰汝姊娣何言不妨直說只見鸞英羞澀滿面格格不吐鳳英情知難掩遂向壁面泣曰兒等已許身于前日之夢蘭兄矣索通聽罷勃然大怒欲發仍止夫人心中鶻突暗問玉奴玉奴曰兒每見他言語輕佻出口媟嫚心竊疑之至今方知非吾兄也夫人大恚馬陵曰此又一妖耶前公子所遇尚有巢穴此則不知逃匿何所矣鳳英遂向夫人低言曰前中秋月夜妖於酒後露出一言說周處台下更有二妹子兒急問周處台何處彼急掩飾兒猶以爲男子在外風月常情未及深問馬陵恍然大悟曰是矣即將藥酒命二女服之二女遂大呼腹痛欲裂夫人驚慌無措大罵馬陵馬陵安慰夫人曰非此藥不能救二女至晚各産一小蛇二人羞忿欲死夫人再三慰之馬陵更以藥服之二女遂愈馬陵遂問索通曰公子已歸吾二人再至周處台斬蛇除害何如索通欣然願往稟過夫人公子遂直往江南望建康故城不遠南至周處台仍用前法向穴內探之無蛇在內二人遂轉過東府城聞道路沸沸揚揚說樂遊苑左近姚進士有愛女被妖所魅百計遣之不去馬陵問妖形狀雲是偉然丈夫各處法師俱莫可如何索通曰定在此二人直叩姚進士門首稱來伏妖者姚進士正無法可施急出迎入索通急問曰此妖現在何處姚進士曰日在弱息房中飄飄然白面書生也法師一至門首即口吐白光對面不見不知何妖索通不信命馬陵守定外面大踏步而入至門首猶聞嬉笑之聲聽之夢蘭也索通更悄步從窗外窺之則宛然一鄭公子方與女在榻前雙陸作戲索通不管好歹闖關而入以鐵撾奮擊之妖夢蘭一見索通張口即噴白光索通便倒妖人抽身就走索通在地瞑目躍起複以鐵撾從後擊之不中妖人奔出門首馬陵仗劍阻定妖人大怒倏化爲猙獰惡鬼兩目灼灼有光手持雙刀左五右六且戰且走索通馬陵如何肯舍直從樂遊苑追過東府城未能拿獲索通恨此妖人骨一心欲生擒之以察其變看看又過建康故城已近周處台矣馬陵恐其仍入故穴急畫太乙神符于劍此符真妙用無窮一時劍忽飛起不偏不正恰好從空落下將妖斬去仍爲巨蛇長有數尋古長度單位八尺爲尋索通大怒馬陵不應誅之須生擒證前事馬陵亦怒曰此妖也何能生擒二人忿爭幸得姚進士家丁十數人追至慌忙勸止姚氏家丁一見巨蟒無不悚然驚異索通忿持鐵撾寸寸斷之姚進士隨後亦至邀請二人轉至家中馬陵索通不得已仍回樂遊苑姚氏莊堂上大設華宴姚進士親爲把盞十分殷勤其女病亦愈命出拜謝索通馬陵酩酊大醉姚進士厚贈金帛二人不受回至小姑山家中細言其故夫人玉奴等心始釋然夫人遂有意以許氏二女配夢蘭不好出口因與索通馬陵言之索通願說二女馬陵願說夢蘭夢蘭以爲既定姊娣豈應聯婚馬陵曰此營中權宜之辭彼自姓許公子自姓鄭于兄妹何有夢蘭終以二女爲妖所汙不懌馬陵怒曰二女因在汝家爲妖所魅公子獨不爲妖所魅乎始終皆汝家所誤彼將誰歸夢蘭大慚馬陵正色曰此皆公子誤之非二女之過也夢蘭亦念二女難中無故爲妖託名所誤我不娶之更誰爲之偶者遂允之馬陵大喜索通告知二女鸞英鳳英含羞不語索通曰此終身事既無父母稟告須自主持何必羞澀鸞英泣曰姊娣陷於賊營性命皆恩人所賜姊娣更有何言索通怒曰老奴斷不相強允不允在汝一言鳳英曰夜來夢父說姊娣天緣有定瀝血人即結髮人也當應在來日恰好今日恩人說合非泉下人預示兆乎兩俱允之索通甚喜稟知夫人夫人安排佳期不日合巹從此遂爲一家
