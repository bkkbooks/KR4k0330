body:
  text: 第四十三回金山寺索通盜寶雲夢賊賈翀既破漢陽兵屯漢川四出大掠將犯黃州有倪雕兒汪夜叉姚太師宋羅喉趙閻羅等議曰此去蘄黃不遠攻城掠地不足介意惟兵餉不足奈何趙閻羅曰我兵目下雲集回應不下十餘萬衆古雲兵多將累糧草不敷決遭困憊不如大加檢閱精壯者留其難民脅從者用武安君長平之法坑之汪夜叉曰不可饑民脅從用以衝鋒則不足用以擄糧則有餘隨從我軍令自覓食亦足以壯聲色即官軍截殺亦無損於大隊豈不兩便倪雕兒曰二公議皆未盡善某有一法難民俱有用處衆問何用倪雕兒曰我兵行處並無輜重押後全靠擄掠今將擄掠之法分爲三等第一酷比縉紳第二贖取婦女第三搜刮富戶夫縉紳之家即在任廉介者薪俸之餘豈無微積若貪污官吏日坐私衙敲精吸髓民膏民脂橐輦歸遂甲第連雲膏腴萬頃非我輩不能出所藏也至擄掠婦女另置一營不准男女混雜以身分高卑定貴賤取贖素封之家累世蓄積嚴加搒掠拷出私窖糧餉自充矣衆人皆曰此計甚妙比縉紳掠富戶二件即令難民脅從者任之爲伊等平日吐氣當有奇效惟贖取婦女一事非我輩自爲稽查不可也倪雕兒曰各委部下將校主掌但紀律不可不嚴擄來婦女決不可犯如有士卒姦淫者立斬不赦如此則贖取日衆而銀錢自廣矣衆人如命此令一下縱兵四出漢沔一帶雞犬俱盡時有安陸縣鄭恒者度宗時曾知紹興府其高祖毅夫仁宗朝狀元及第世代通籍鄭恒爲紹興知府抗疏力言襄樊不可不救賈似道諷台臣奏劾之罷歸安陸石柱鄉不久遂卒宋亦隨亡妻梁氏生一子一女子名夢蘭才華秀美女名玉奴姿容閒雅一兄一娣讀書木蘭山房而玉奴穎悟過分每相問難夢蘭自歎弗及也年十五工吟詩善填詞七夕登樓作憶江南二首詞雲七月七瓜果設庭中乞巧穿針兒女技在天在地誓深宮銀漢自空空其二雲七月七鵲渡訴離衷盡夜綢繆今夜裏情魔難障太陽紅分手各西東夢蘭見之長然曰字句雖然清新聲口未免懊惱恐有不祥玉奴又題楊妃教鸚鵡念心經一絕雲春寒卵酒睡初醒笑倚東窗小玉屏早悟眼前空是色不教鸚鵡念心經又題綠珠墜樓雲花飛金谷彩雲空玉笛吹殘步障風枉費明珠三百斛荊釵哪及嫁梁鴻夢蘭見之喜曰妹此二作頗斂才就範矣一日木蘭亭前池中芙蓉盛開夢蘭有感乃作菩薩蠻一詞雲紅雲半壓秋波急豔妝泣露嬌啼色住夢入仙城風流石曼卿宮袍呼醉醒休卷西風景明月粉香殘六橋煙水寒玉奴觀畢亦作行香子詞二首雲如此紅妝不見春光向菊前蓮後才芳雁來時節寒沁羅裳正一番風一番雨一番霜其二雲蘭舟不采寂寞橫塘強相依暮柳成行湘江路遠吳苑池荒奈月朦朦人杳杳水茫茫夢蘭看罷愀然不樂曰吾妹將來大有迍邅觀詩詞聲口可見矣無何雲夢賊起乃奉母梁夫人避兵京山縣莫愁村時盜賊縱橫人情洶洶家中廝仆逃亡過半餘者俱懷觀望惟老仆二人一名索通自稱賽昆侖一名馬陵綽號紹虯髯二人素有肝膽原本山東死囚遇鄭恒生之收爲健仆後奉使淮西夜宿蒙城賈似道遣人行刺被二人擒獲竟免於禍鄭恒待之益厚景定間三使海道頗得其力但二人積不相能常睇目視同食不交語睚眥小忿輒奮老拳相毆鬥及聞漢陽已陷縱兵四出漸至近村夢蘭已束手無策忙與母梁夫人及妹玉奴棄家逃竄倉皇出走馬陵攙扶梁夫人一步一跌行不數裏索通方負一橐趕上喘息未定忽一隊賊兵蜂擁而至主仆沖散梁夫人母女慌做一處忽見一枯橋內頗空闊潛伏其中俟賊去乃逡巡而出已不知夢蘭與二仆何所急尋僻路而奔回望各村俱煙焰蔽空道路皆橫屍枕籍見男婦號哭而行者絡繹不絕行約數十裏力漸不支足亦皸裂乃投深林中母女相對而泣坐以待旦腹餒特甚捱至天明又恐賊至母女狼狽而行午後已十分困憊前臨石橋于綠楊深處少憩饑不可堪乃摘柳葉嚼之驚布方定聞橋上逃死者悲慟欲絕不勝酸楚又至黃昏時四野蟲鳴啾瞅母女更喁喁飲泣自分必死忽疏星淡月中橋西若有人大踏步而來口中唧唧噥噥聞語雲夫人小姐存亡未蔔此事怎了玉奴細聽之索通聲口也急低聲呼喚索通一聞大喜急至橋下扶出母女曰夜靜行將安之索通曰此名離狐村前去不遠有延慶寺權往寺中明日再作理會遂一步一步行去直入寺中月下見門庭荒蕪並無燈火母女至佛前禱拜泣訴就殿角坐定索通將橐中食獻上夫人始問夢蘭消息索通愀然曰不知去向業有馬陵往迹之矣夫人泣不可止玉奴亦泣曰倉卒出奔並無資斧倘至京山舅氏家則無慮矣索通曰老奴橐中幸預有準備且過應城須雇車馬方能直達京山三人勉強捱至天明索通前去探路緩緩而行但所過殘毀並無旅邸索通覓食之一日道出烏阪達鹿頭口將近大路索通曰沖要之處防有賊兵老奴往探之夫人玉奴匿路旁深林中既而林外忽聞有人來往玉奴方探頭一望誰知正是賊隊探軍一見玉奴知是奇貨凡十餘人奔入林中將母女拿住夫人叩頭不已玉奴情知難免正欲投崖賊一繩縛定慰之曰我等不傷性命若有親眷取贖異日還可歸家不由分說押赴而行少頃索通飛奔而來一見夫人玉奴被陷狂呼不已投入隊中賊將刃之一賊曰且問系此女何人索通曰老仆也賊曰既爲主仆即屬親眷賈大王有令不戮婦女須用金贖取決不食言索通恐詐且泣曰老奴願隨軍中乞將主母小姐釋放衆賊大怒三拳兩足推之使去曰非三百金不能贖也簇擁而去索通抵死追趕且呼且泣只見一賊引弓持滿向之曰老奴才不畏死耶某營中所得婦女何止萬千但宦家女子贖以千金民家者三百金命婦五百金有金則歸無則死嗖的一聲索通應弦而倒負痛而起忙拔出箭鏃則右臂血流如注裂衣束之賊已去遠矣坐而泣下曰保主不全不如一死即欲尋自盡既而又轉念曰抱慚而死不惟無以見老爺于地下且馬陵有知將笑我爲偷死矣今日之事一生九死不可不死中求生賊明明告我以千金贖取若得千金則夫人小姐生還皆可冀也遂熬著痛楚立起身來暗思主人舊日頗有蓄積家中豈無暗藏不如仍歸安陸遂連夜奔回石柱鄉方入裏門見凋殘已極再至家中則廬舍已付煨燼一見愴然基址俱發掘靡遺心如灰死無計可施左右思維忽然曰計在是矣京山縣梁氏舅家亦是世胄且屬至戚惟此處爲可望耳且幸身邊尚有餘金行路有資遂至京山但梁氏家則先一月已被抄掠矣索通如冷水澆頭垂淚而已抽身便走又忽憶著主人存日同僚有一蘇學士最相契學士乃宰相蘇頌之孫世居丹陽不如竟赴京口且南徐不曾被兵此計定不落空遂不分星夜雇舟直下迤邐達於鎮江由江口撥運河十數日已近丹陽上岸訪問居址俱雲蘇相公世居城西晚香村于大宋革命時遠遷台州去矣索通望空捉雪大失所望囊中羞澀流落京口幸幼年頗好引拳尚能記憶遂以賣拳營生且救眉急一日在丹徒縣焦山鎮遇一頭陀亦槍棒師也兩人心投意合言語之下索通不時長歎頭陀怪而問之索通以實告且曰若得千金則吾事成矣頭陀曰此處金山寺現貯數千金何不取之索通驚問何金可取頭陀笑曰其實金則無之有一物可值數千金耳索通又問何物頭陀曰北宋時有一佛印禪師乃是高僧住錫金山蘇東坡學士將往訪之直造寺中禪師迎問曰內翰何來此間卻無你坐處蘇學士戲曰借和尚的四大身體用作禪床少坐禪師曰山禪有一轉語內翰答得來則罷不然將身上玉帶留下永鎮山門蘇學土即解下玉帶請問何語禪師曰山僧四大本無五蘊皆空學士要在何處坐蘇學士一時答應不及禪師即喝侍者速收玉帶蘇學士欣然棄帶而去按此帶出宋皇上禦賜所值何止千金見今存在方丈後佛頂閣庋置第一層樓上若得此帶勝汝數幹金多矣索通大喜深謝頭陀頭陀戒之曰汝義氣可嘉故以密告但百年鎮寶盜之甚非容易吾將逝矣索通力任不辭頭陀遂去索通便渡過揚子江見金山浮在江心四面懸絕一徑孤懸暗驚此山如何可止方逡巡山下瞻前顧後忽山頭有人大呼曰山下有賊至矣索通大驚細審之乃賣拳頭陀聲也心中大疑既而忿然曰但得救主赴湯蹈火亦所不辭是夜方欲止山聞寺內鳴鍾不已即當更漏甚是分明不敢入寺一連數日聞本月初七日乃英烈龍王誕辰賽會燒香索通喜曰機會在此時矣至初七日果人山人海索通踱將上去但人人進香者俱至龍王堂而止寺前寺後巡視甚衆直延至晚下見衆僧俱登佛殿頂禮哺喃喧揚佛號索通由大殿經過數重殿宇混入方丈側左有門未閉竟闖將入去果見一閣高出層霄暗思必佛頂閣也正欲登閣一時聞方丈內木魚震響衆僧已入方丈索通大懼忙至閣子後黑暗中伏定少頃又見十餘僧合掌而入索通悚息毛髮皆豎見衆僧一一掇梯直上樓去索通懊悔曰計不成矣既而樓上梵音齊作時腹中餓甚遂出大殿見佛前羅列供獻果晶正好充饑饞猿遇果餓犬聞腥任餐一飽更轉身人閣下聞梵唄聲少息又欲踱上樓去未及閣門忽履聲橐橐慌忙轉身正在窘急忽見回廊右手畔有一小門可盼江水遂徐步而出見有小徑可以紆道直達山門幸有生路始潛身下山正值夜渡船搭過江去宿於旅中當夜納悶不已展轉床席未能合眼時月影當窗猛聽隔巷有行步聲起而竊視之見一偷兒在隔巷入家壁下蛇行而入少頃橐負而出如是者再索通看得分明徐至壁下偷兒正探頭從竇中出索通一把拿住偷兒作慌忙將橐中財物獻上索通一時觸動心事扭至僻靜處抵死不放偷兒乞命不已益發窘急伏地叩頭乞免一死索通笑曰某非捕盜者特有求於汝耳偷兒不省索通曰汝入此道幾年矣偷兒聽其聲口似同道者流乃答以初學索通不覺愀然久之偷兒已窺其意乃曰實不瞞公某作此勾當近今十五年矣索通大喜急叩以有悶子火雞鳴斷魂香否偷兒愕然暗驚此人乃大盜也今晚小巫見大巫矣因問以何用索通曰有則求之無則不勞說辭即以橐還之令去偷兒負豪欲行仍止複問曰足下果何人也索通怒曰免汝一死速去耳饒舌何爲偷兒愈不肯行棄橐於地再拜曰何敢相瞞某實系小偷願拜門下以聽驅策若得承教一二沒齒不忘索通複笑曰汝以吾爲巨盜也爲汝求二物殆將有所用耳遂以心事告之偷兒大喜曰斷魂香悶子火惟吾師處有之吾師爲江陰巨猾之魁每在皂角林瓜洲渡等處截江剪徑徒衆百有餘人如虎生翼要得此帶某去請吾師將寺中擄掠一空便了可勞如此瑣瑣索通大驚不許急以婉言謝之令去偷兒又曰公既存心仁厚不願買禍某一人去竟將此帶盜出用以報公盛德何如索通大喜又曰寺中防範綦嚴重樓複榭道路曲折恐汝路徑不熟須某同去方保無虞偷兒大笑曰作此勾當甯問道於人耶某試探之決不辱命次日當晚二人搖舟過江至山下索通遂止舟中偷兒踱上山去犬吠無聲至更許而回索通急問之偷兒曰業已探過在閣上古佛龕前庋置第三層以伽楠香木泥金匣裝護外用紫紗罩定周圍俱列禪慶共宿一十六僧明晚定當取至索通驚以爲神仍駕舟回至寓所次晚又至舊處將船系定偷兒邁步上岸已近寺門忽犬吠一聲偷兒折身便轉曰事不諧矣索通促之令去偷兒曰大凡此道最忌犬聲犬既司驚入戶必多危險且俟五日後再至可也索通恨不一時到手便去贖取夫人玉奴十分歎息偷兒曰盜取他人之物豈可迫促倘太倉卒必生他變索通懊恨而回二人遂隱至僻靜處五日方至黃昏偷兒忽不見索通處處蹤迹並無形影始歎強人無義誤我大事十分追悔乘著月色再至江下悵望一會見隔江一人駕小舟如飛而來方欲避之忽舟中人大呼曰幸不辱命有以報公矣索通驚異視之偷兒也棄舟上岸手捧一匣背負一橐望僻靜處而走索通狂喜直至北固山腳下啓匣視之果玉帶一圍用黃羅封裹再啓其羅見帶上鑲嵌明珠二十四粒中交環處乃通天犀角琢就龍鳳交戲之狀兩旁護腰皆於闐玉也光豔奪目真希世異寶匣中更有玉斝金樽古玩珍奇十餘事索通德偷兒惟取一帶餘盡以贈偷兒偷兒不受曰予橐中尚有貨物不啻數百金值也得此足矣視之皆金銀器皿白鏹數十錠偷兒喜出望外曰得公義氣所激直人寶藏庫中席卷一盡勝某十五年行竊矣索通笑問如何得近閣上偷兒曰此易與耳閣中耳目甚衆俟僧等熟睡竟從閣上沿屋而下既得此匣又見龕前羅列許多寶玩天與不取留以供群禿作無窮受用也耶索通曰寺中既失許多寶物必鳴官緝捕足下此地固不可留即梁上君子之行亦不可再某勸足下刻意改行前愆晚蓋有此數百金不愁不作富家翁將匣中寶玩盡以贈之偷兒堅拒不受索通怒曰可知賽昆侖是有肝膽男子仗義救主故作此事並不爲貨財起見爾堅拒不受毋乃無意改行而甘心作竊盜乎偷兒唯唯謝罪泣曰某乃京西鮑立家貧落魄自念生平行竊並無此膽今爲公義氣所激輕身涉險若履平地非天實啓之乎某從此仍歸京西去矣得此餘生皆公所賜又承厚贈感戴何極索通甚喜二人遂迎江而上過丹陽由南京達湘湖至黃梅渡口方始分手索通再三囑咐鮑立泣別而去索通將玉帶用匣庋定打聽賊兵音耗時已破蘄水賊營現在廣濟索通遂直叩營門賊兵票知主將傳言所掠婦女盡在應城有來贖者自赴應城可也索通聽言暗思雲夢去慶城不遠吾不如先赴應城竟至雲夢賊首賈種處獻帶免生枝節主意已定直奔雲夢先稟知廖維新翁國肜二謀士隨令人見賈翀將玉帶呈上賈翀一見光豔照人知是異寶滿心歡喜把玩不置遂問寥翁二人價值若干廖翁齊聲曰此禦賜寶帶歲月既久應值五千貫賈翀狂喜遂問索通欲金乎欲官乎嚴索通曰兩俱不欲願得主母小姐並大王令敕得保鄉里足矣賈翀曰汝主母小姐爲誰索通曰主母梁氏小姐鄭玉奴現在應城賈翀即付令敕命廖維新引至應城查出梁氏玉奴付與索通再賜銀五百兩以賞獻帶之勞不日面南稱尊佳兆在此一帶矣索通謝恩而出同廖維新至應城有劉環將冊籍呈上查命婦籍果有梁氏應贖五百金宦女籍果有鄭玉奴應贖千金廖維新笑曰汝獻帶贖主允稱義仆但價值過半倘有姻戚准更贖數人去時玉奴有同伴二女子皆潛江人逐日與玉奴寸步不離甚是相得聞玉奴贖去悲悼不勝夫人不忍命索通一同贖去二女子得離虎穴皆索通之力也索通拜謝廖維新領四人而出自知京山不可複居雇車馬直過江右望九江而去
