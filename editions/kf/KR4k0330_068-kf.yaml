body:
  text: 第六十八回孝伯誤陷金鎖陣元建甯路設總管府世祖以武康侯赫連頠素有重望鎮建寧十年一日翰林承旨留夢炎齎詔至令舉兵伐宋赫連頠望闕拜受命訖設宴款使留夢炎就席前叩以伐宋之策赫連頠曰用兵之道相機而行故兵有五機留夢炎曰何謂五機赫連頠曰五機者一地機二事機三勢機四利機五神機是也列營布陣先據要害敵取逆我取順動息得勢是謂地機審探敵事因而爲之以中敵情使敵不知爲我所覺得以欺敵是謂事機鼓十人之氣爲百人之用鼓百人之氣爲千人之用威名氣焰動如雷霆所當者破是謂勢機糧芻儲積士馬嫻習是謂利機敵人料我于前失之於後料我於遠失之於近動靜出入敵不能察是謂神機用兵能以五機應敵未有不坐操勝算者留夢炎深服其說自言願居麾下得參帷幄自效赫連頠待以賓禮赫連頠傳檄各營將士整傷戎行赫連頠重加簡閱以福建指揮桑仲遠爲先鋒率兵三千即日起行直抵建寧縣下寨副將蠻子呀班領兵三千爲合後自與留夢炎等統大隊居中哨馬報入杉關韓太尉即升帥府問衆將誰往應敵有驃騎將軍宇文廣楊孝伯皆言願往韓太尉甚喜即以兵五千付二將退敵宇文廣楊孝伯引兵出關議曰元兵之來勿使入境我師可兼程而進一敵其前一抄其後元兵可敗也敗其前哨則元人之銳氣折二將急出界外五十裏元將桑指揮前隊已至宇文廣列開旗門出馬問曰元人無禮直犯我界何故興此無名之師桑仲遠笑曰汝宋人侵奪我州郡幾半海內何爲無名宇文廣曰汝主天下從何得來汝今臨陣敢與某決戰否桑仲遠怒曰不勞唇舌吾誓必擒汝二將交馬十余合宋師便退桑仲遠以爲力怯督軍衝殺宇文廣且戰且走約退數裏元兵後隊忽亂宇文廣指揮將士勒馬殺回橫當其前楊孝伯一軍迅擊其後首尾夾攻宋師銳不可當元兵抛戈棄甲而走桑仲遠被圍在垓心死戰得免奔五十裏宋師始駐赫連總管聞前哨敗績速來赴援則宋師已退大怒桑指揮深入重地致挫軍威黜退不用桑仲遠滿面羞慚而去赫連總管遂撤去前隊而添左右兩翼以總統葛顗爲左哨防禦使以都監唐玲爲右哨救應使並與中軍一路並進而宋將宇文廣楊孝伯二人合成一隊當之二將一應敵一守寨連戰數日互有勝敗赫連頠暗驚宋將勇健善戰引軍稍退二將立逼其營討戰赫連頠命左右兩翼輪流交戰日日戰日日敗直退近浦城赫連頠總管謂夢炎曰司馬來日可預備酒宴待吾破敵後賀功留夢炎問之總管不語當夜乃密喚葛顗唐玲二將謂曰此去離浦城不遠有地名曰郎官原四圍空闊前後山勢俱有照應可用諸葛武侯八卦圖以破宋師八陣者一方陣二圓陣三牡陣四牝陣五沖陣六輪陣七浮沮陣八雁行陣此陣名八卦亦名八門金鎖其法共六十四陣而總曰八陣也蓋六十四陣者天衡十六陣居兩端地軸十二陣居中間天前沖四陣居右後沖四陣居左地前沖六陣居前後沖六陣居後風八陣附天雲八陣附地合爲八陣天衡並前後沖二十四陣合風八陣爲三十二陽地軸並前後沖二十四陣合雲八陣爲三十二陰遊兵二十四陣在六十四陣後凡行軍結陣合戰設疑補缺全在遊兵天地之前沖爲虎翼風爲蛇蟠兵家先陰以右爲前又風從虎虎與蛇皆陰類同位西北也天地之後沖爲飛龍雲爲鳥翔兵家後陽以左爲後又雲從龍龍與鳥皆陽類同位東南也四陽爲正四陰爲奇四陽者天地風雲也四陰者龍虎鳥蛇也又天陣列西北地陣列東南者取天地之相對也每以二陣相從一陣之中又有兩陣一戰一守中外有輕重之權陰陽有剛柔之節彼此有虛實之地主客有先後之數宋將若不諳方位不明向背必爲吾所擒矣二將得令自往郎官原如法佈置而以遊兵二十四陣純用弓矢防宋將驍勇衛衝突也唐都監遂伏郎官原葛總統引戰且說宇文廣楊孝伯二將近元兵直抵浦城是夜孝伯伏枕後夢祖父再興立于小商橋上呼之甚急醒來深以爲異次日宇文廣忽欲停兵一日孝伯問之宇文廣曰今日干支乃十惡大敗日不宜出兵孝伯笑曰十惡大敗者我敗敵兵也湯武之乙卯甲子其明征矣大將出師焉計此類宇文廣遂從之言未畢又報元將葛顗搦戰楊孝伯大怒率兵躍馬出營忽馬失前蹄將孝伯跌翻軍士慌來扶掖孝伯一躍而起換馬挺槍直取元將葛顗隨與交鋒不數合葛顗力怯敗走楊孝伯縱馬如飛督兵追殺將至郎官原葛顗勒馬複戰楊孝伯怒不可止奮勇一槍已將葛顗左肘連甲去了三分葛顗幾乎墜馬負痛落荒而走孝伯正欲生擒葛顗忽號炮震響只見元將唐玲領八隊精兵一齊殺來列成一陣團團圍住孝伯已知遇伏忙定睛看時乃八門金鎖陣也暗笑曰此陣按休生傷杜景死驚開八門或變六花或變長蛇只此而已吾今且從生門開門擊人景門休門殺出其陣必亂遂約定軍士勿得妄動急按乾坎艮震巽離坤兌方位已定認著生門列在西北正待挺槍躍馬衝突而入忽有遊兵突至愈殺愈廣二十四隊遊兵一齊圍定亂箭齊發楊孝伯身受重傷棄槍於地與戰馬共死於亂箭之下
