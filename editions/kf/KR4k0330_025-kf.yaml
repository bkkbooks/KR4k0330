body:
  text: 第二十五回蹠跋將計取南安卻說涪陵在建昌府操練人馬欲攻撫州皇甫惇進曰殿下且按兵盱江某請先往說以大義如不納款再攻未遲涪陵喜曰先生此去撫州下矣但須慎重免生他變皇甫惇許諾隨帶小僮一人直往撫州時建昌已下撫州戒嚴皇甫惇至城下大呼曰侯太守故人相訪速往通知巡城軍士見皇甫停恂恂書生諒非奸細報入府中侯長孺大疑此間何來故人即請相見皇甫惇飄然而入侯長孺一時記認不起正在猶豫皇甫惇笑曰府公忘棲霞嶺題詩人矣侯長孺頓悟曰是矣皇甫惇禮畢先謝其玉成之德始敘寒喧侯長孺曰惡棍媒孽事端妄相告訐仆當日竟爲所傾名裂身敗繼聞葛令執法實出足下之謀然則足下亦湖海豪士也今日一晤甚慰鄙懷行旌自何處來皇甫惇曰自建昌來侯長孺錯愕良久又曰然則足下何以教我皇甫惇曰請問府公厲兵秣馬登城守陴所爲何事侯長孺曰子且勿言子必已從建昌來下說辭也皇甫惇曰不瞞府公愚某實欲來說撫州非說府公也侯長孺曰仆即撫州之主欲說撫州非說仆而何皇甫惇曰愚某此來不過將天地之道聖賢之禮順逆之義曉諭撫州人士使知誰爲賊誰爲非賊誰爲從賊辨明賊之一字愚某之意足矣何暇來說府公也侯長孺艴然作色曰子以吾不識道理不諳大義謂仕元爲從賊耶欺吾太甚方今兵戈擾攘盜賊縱橫行省傳諭嚴拿黨與不拘郡縣生殺可便宜行事姑念子爲儒士從輕懲治吩咐監下皇甫惇笑曰府公已叛離名教尚知儒士耶侯長孺益怒曰仆即不才亦叨附黃甲非納粟出身也子焉得以儒笑我皇甫惇曰儒爲席上之珍儒誠可貴府公獨不知儒有君子亦有小人乎君子之儒以名義爲重綱常爲尊大節所關生死不變今蒙古滅天毀聖亂華爲夷置儒者於娼之上丐之下識者尚猶羞之乃竟有名登故國之榜身立仇敵之朝誰賊誰儒蒙混示辨君子之儒當不如是也愚某之說畢矣即請就獄侯長孺不覺兩頰發赤急下階手挽之再三謝過曰相逢盡道休官去林下何曾見一人此宦途中囈語也請先生釋疑勿咎既往足矣皇甫惇亦謝曰狂妄之罪在所不免望府公見原侯長孺急問曰前石門山有人嘯聚以號召故宋爲名仆竊有疑恐仍中山狂人之故轍耳征撫兩字尚持未決仆亦不料攻城略地若此其速也今已得建昌一府五縣聲勢逼近撫郡又有先生在焉先生必有主見何以賜教皇甫惇曰府公之言誤矣今日之事乃秦王一十七代元孫涪陵公趙晟由崖山失散航海十年而歸仗義大舉光復故國並非諸人自稱宋主若中山之狂人也故義旗一建勢如破竹軍民無不納款侯長孺大驚而起曰趙氏尚有人耶足下胡不明言而重長孺之罪乎皇甫惇曰府公以說辭相難愚某不得不辯然今已約會廣南羅浮起義傳檄南安大庾興師不日仍見故宋天日矣未審府公亦曾三思否侯長孺謝曰長孺愚昧何遂至此隨令人請都監萬戶提點府貳縣尉併合屬佐貳官員人等至具道其事衆皆大喜惟都監汪彥國執意要戰長孺再三以大義動之汪彥國堅持不允反面斥長孺等守土畏死有負國恩長孺大慚萬戶馬晉臣拔劍而起汪彥國亦挺劍來鬥長孺大驚解勸不及馬晉臣武事高強一劍將汪彥國割了首級提出府門大呼曰我等原本宋人撫州今日有歸故宋有不從者以汪都監爲例軍民皆諾請過皇甫惇與衆相見又將大義申曉一遍衆人心服設宴款待長孺即遣通判史良璧萬戶馬晉臣至建昌納降皇甫悼謝別起程不日即達涪陵得知大喜迎入馬晉臣史良璧手捧降書並獻撫州府六縣圖籍涪陵親手扶起再三慰勞賜坐曰晟不幸國家多難流離失所卿等不忘故國鍾鼎之名不朽矣設酒相待數日後涪陵親至撫州獎慰長孺撫恤軍民出榜曉諭命府貳史良璧暫攝府事侯長孺請過建昌參贊軍務定位之後方始進爵衆官無不舉手加額曰不圖今日仍爲大宋臣民矣再說蓬頭寨史進自得涪陵之書大喜與衆議曰今史進所投之主決不誤矣即令人往桂陽嶺約會三關守將拓跋琳起兵拓跋琳乃大同府朔州人氏原本東晉時北魏國王之裔其先出自黃帝黃帝以土德王北俗以土爲拓以石爲跋故以爲姓拓跋琳虎臂熊腰碧眼黃須極有膂力元太傅伯顔掠地至大同得之用爲虎賁將軍撥守江右三關三關者一北藏關一上梧關一上蓬關南扼交廣西拒湖湘連控隘所一人把守萬夫莫開總名之曰桂陽嶺此外更有揭陽臨賀始安三嶺乃響馬出入所在拓跋琳總鎮三關威懾全嶺綠林不敢正覰因昔年落魄山西酷好樗蒲爲鄉里所賤漂泊在外史進家資巨萬販負爲生路過壺關羊腸坡遇紅毛賊巢瑰剪徑與史進大戰不已恰好拓跋琳中途遇著拔刀相助殺敗賊黨史進德之遂訂車笠之好又憐其貧贈以百金令作經紀奈拓跋琳一見雙陸即又技癢呼盧而進傾囊而退久而逋負益深自顧無顔流落澤潞間史進又令人訪之延至其家再三勉慰又贈以千金拓跋琳不覺泣曰生我者父母知我者史進也遂立意改行舊日交遊概屏絕之立志自勵仍歸鄉里一時拓跋琳之名大噪伯顔略地至朔州召而用之故授總鎮史進白楊鎮龍身死千里奔赴蓬頭與桂嶺聲息相通不時來往拓跋琳屢欲薦之史進不可然拓跋琳久鎮三關威名甚著五載並無升遷此時完澤未相桑哥當國累來索賄拓跋琳怒而不與繼聞史進約投故宋大喜曰今日有以報史公矣即引心腹數人至蓬頭寨與史進商議或攻茶陵或攻南安史進曰先取南安路通江右隨後好清閩廣拓跋琳即起身附耳低言如此如此史進大喜各自回歸次日史進引兵直下大庾嶺離南安五十裏下寨令人哨探南安城四門緊閉星夜往桂嶺約兵前後夾攻史進得實率兵直逼南安城下討戰其統制海叠塔速兒殘酷不仁平日減刻軍糧兵不附將臨時勉強附以恩信督之守城稍拂其意又鞭撻隨加太守郝成志柔懦無能兵臨城下方寸已亂幸府丞馮道南內外調停撫恤軍士整飭器械清理糗糧各門巡哨防守井井區畫各有條理人心賴以少安自知城中決不可戰惟待桂嶺兵至便可成功史進日夜督兵攻打甚急城中日日盼望忽見塵頭大起知是援兵至矣海叠塔速兒準備接應出戰史進之兵即時退去裏許結陣以待少時拓跋琳鼓噪而來掉起開山大斧與史進交手不數合史進敗走海叠塔速兒乘勢從城中殺出一齊混戰史進兵棄甲抛戈而逃海叠塔速兒大喜收兵即請拓跋琳率衆人人城設宴慶賀犒賞元兵府丞馮道南進曰援兵今晚且在城外安營以防他變得犄角相援海叠塔速兒曰賊兵敗去豈有複來之理況援兵遠來安營城外非敬客意也馮道南歎息而退海叠塔速兒遂盛開筵席呼盧暢飲犒賞不及南安軍士仍責令小心守城軍士各出怨言太守郝成志亦言己兵無功不加犒賞馮道南又齎牛酒私自登城慰勞軍士恰際黃昏史進又引大兵殺至擂鼓呐喊將城緊緊圍困馮道南大驚頓足曰統制不聽吾言援兵入城大失策矣拓跋琳海叠塔速兒等一齊登城見史進耀武揚威指揮攻打馮道南覰定分明拽滿雕弓一矢正中史進甲上登時拔出血流如注史進大怒催軍速打手出流星打上城去軍中四下遍懸紅燈只見城上拓跋琳手起一劍將太守斬之提著首級大呼我等奉故宋涪陵公之命收復南安不傷百姓軍士降者免死南安兵先無鬥志援兵斬關落鎖史進首先沖入兵不血刃盡願投降海叠塔速兒方欲下城而走見左右概是桂林援兵一齊向前擒住上綁馮道南知大事已去方欲自刎被史進追上城來一把擒定於是皆降出榜曉諭齊至府中軍士綁海叠塔速兒至史進立命斬之少頃馮道南亦縛至史進一見咬牙切齒大怒曰汝還能射否馮道南面不改色從容請死只見滿城百姓扶老攜幼齊至府門泣告曰若殺馮府丞是殺滿城百姓也投降軍士皆大呼願替一死史進大驚回嗔作喜慌忙下階親解其縛扶之上座納頭便拜謝曰馮先生君子人也史進愚莽村夫負罪多矣不知肯與史進等共事否拓跋琳亦婉言勸之道南乃降百姓大悅史進遂出涪陵手書與道南觀之道南看畢驚謝曰馮某不合誤傷將軍然馮某區區一紙招降南康上游崇義三縣官吏以助將軍免煩勞師動衆何如史進大喜即請修書遣人分頭去訖原來馮道南以集賢院大學士降授府丞三縣邑宰皆其門生得書皆來納款史進又將府事請道南攝理拓跋琳仍守桂嶺遙爲聲援自引本部兵望建昌府告捷而去
