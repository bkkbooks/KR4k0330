body:
  text: 第八十二回令狐韜當殿論璽宋重康八年帝一日設朝下詔以所控郡縣改爲六鎮除延平建昌肇慶長沙桂林外嶽州設一節度控武陵辰州澧州郴州靖沅桂陽等州長沙控衡陽營陽建州茶陵而益以平樂蒼梧潯州等郡建昌至是亦增臨江瑞州袁州寧都四郡桂林亦增慶遠泗城郁林永安四郡計大宋此時所轄五省凡五十二府州三百二十四縣六節度得詔入朝見帝曰臣等出萬死一生爲陛下恢複大業今大業粗就如火之始燃泉之始達正宜席捲宇內囊括四海一洗崖山之恥光復舊物奈何信元人狡獪之謀竟與之和乎有襄陽節度使扈德威抗聲言曰臣與韓搏虎討平雲夢始得四郡此四郡者大宋得之于賈翀非得之於蒙古也蒙古慮梗漕運何不取之於巨寇之手況溳口之戰臣等幾罹不測艱窘萬狀始奪其險故招討激怒始打襄陽蒙古計亦毒矣即所割八郡不及襄陽等萬分之一蒙古不惟欺大宋無人實欺陛下不智也陛下昨降此調襄漢之民無不喪氣即日挈家而徙者數萬余家陛下縱不爲臣等惜獨不爲大宋蒼生赤子惜乎德威聲淚俱下帝乃斂容答曰朕播越海島蕭然一身非卿等萬不至此卿等血戰艱難拓土開疆重爲我大宋定鼎建國卿等之勤勞自足千古但恨有功未賞鐵券莫封朕未免怏悒於心耳即議和一事朕亦以卿等血戰半生權爲休養之計徐圖進取之機養晦觀變作十年生聚訓練計耳朕非偷安遽忘仇恥卿等六人俱加開府儀同三司永鎮六郡令將士等操練簡閱卿等臥護靜鎮但總其成暇則宴酣優遊頤養天年不亦可乎寇複雷韓搏虎二人正欲力諫一聞此言即叩地流血泣奏曰陛下興言及此臣等雖捐頂踵不足報也但願主上無忘崖山臣等亦不敢深阻和議帝亦泣謝曰有臣如此顧複何憂朕日夜思海島艱難惴惴於心即崖山之戰猶赫赫若前日事也六節度齊拜謝而出皆歎曰朝廷自此不復用兵矣不日各赴任所扈德威遂移鎮岳州諸將士亦略有遷移越日蘇伏威李進誠自上都回國見帝曰臣等入元則成宗已殂懷甯王正位爲武宗矣武宗以陛下既允和議欣慰之至即日大赦天下加孟頫爲行台侍禦使兼翰林院承旨加邦甯爲大司徒兼左丞相仍領太醫院事當時李邦寧笑謂臣等曰寄謝大宋皇帝有邦寧爲相諸事不足慮也帝聞之驚曰邦寧宦者亦官左丞相乎元政從可知矣時有工部侍郎長孫軌鴻臚寺少卿黃仲通中書右丞劉知幾等以宋元息兵生民有慶元主願作無璽天子而以國寶歸宋宋得秦璽應上尊號請表賀帝欲許之太子洗馬令狐韜出班奏曰不可璽有真贋不可不辨帝問曰卿何以知之令狐韜曰秦璽之不在久矣秦始皇並天下以趙璧爲璽此藍田玉即卞和獻楚璞也楚婚趙納璧爲聘秦昭王給以十五城藺大夫奪以歸趙者也璽圍四寸六面正如螭紐李斯蟲魚篆其文曰壽命於天既受永昌漢高祖入關秦子嬰系頸以組奉璽降漢哀帝臨崩以璽付董賢曰無妄與人平阿侯王譚子閡侍中白元後帶劍入宣德後闥叱賢賢跪授璽綬孺子未立璽藏長樂宮王莽篡竊使安陽侯舜求璽於孝元後後怒駡曰若自以金匱符命爲新皇帝當自更作璽何用亡國不祥璽爲而欲求之我漢家老寡婦旦暮且死欲與此璽俱葬終不可得因涕泣旁側長禦以下皆泣舜亦悲不能自止謂太后曰臣等已無可言莽必欲得璽太后甯能終不與耶太后恐莽脅取之乃出璽投地缺一角莽末漢兵入長安商人杜商取璽殺莽校尉東海公賓就斬莽首問璽綬主所在曰室中西北陬間就取詣王憲憲遂稱漢大將軍舍東宮妻莽後宮乘其車服將軍趙萌等以憲得璽綬不上收斬之璽歸更始赤眉立劉盆子爲帝破長安更始敗上璽綬於盆子盆子立一年其兄恭知赤眉必敗教盆子習爲辭讓之言下床解璽綬叩頭願避賢路涕泣唏噓赤眉樊崇等共抱持盆子帶以璽綬盆子號呼不得已受之馮異收長安盆子率丞相徐宣肉袒上所得璽璽複歸漢靈帝崩何進誅宦官洛陽亂中常侍段珪張讓劫少帝及陳留王步出穀門夜至小平津六璽不自隨三日還宮失傳國璽餘璽皆在董卓燒洛陽宮闕遷都長安諸侯兵起長沙太守孫堅進至洛陽得傳國璽于城南甄宮井中建安元年袁術謀僭號聞堅得璽拘堅妻而奪之四年曹操破術術走死壽春廣陵太守徐璆得璽獻之漢傳魏魏文帝隸刻肩際七小字曰大魏受禪傳國璽魏傳晉懷帝於永嘉五年劉聰陷洛陽遷帝及六璽於平陽聰子粲見殺于靳准劉曜平准准群臣推靳明爲主遣上表奉傳國六璽降曜曜大喜曰使朕獲此靈璽而成帝王者子也國稱趙趙爲石勒所滅稱後趙勒死石氏亂冉閔盡殺渚石稱魏晉穆帝永和八年閔與前燕慕容雋戰危急遣蔣幹求救于謝尚尚使戴僧施據枋頭求傳國璽幹沈吟未決僧施率百人入鄴紿幹曰今燕寇在外道路不通璽未敢送回卿且出以付我我當馳白天子天子聞璽在吾所信卿至誠必多發兵糧以相救餉幹以爲然出璽付之僧施宣言遣人迎糧陰遣督護何融懷璽送建康江南之未得璽也中土人笑爲白板天子至是複歸晉晉傳于宋宋文帝義隆三十年子劭弑逆武陵王起兵入石頭縛劭於馬上送軍門不見傳國璽以問劭劭答在岩道育處就取得之道育宮婢也宋傳齊梁侯景亂梁稱帝百餘日而敗王僧辨進石頭問王克天子璽紱克良久曰趙平原持去景之奔也以璽自隨使平原太守趙思賢掌之曰我死宜沈于江勿令吳兒複得之思賢自京口渡江遇盜從者棄之草間至廣陵告兗州刺使郭元建元建送東南道行台辛術術以北齊天寶三年四月壬申上璽于齊主文宣文宣告太廟而受之周之破鄴齊幼主令侍中斛律孝卿奉璽至瀛州歸於北周宇文氏周傳隋宇文化及弑煬帝于江都盡收寶器及後宮蕭妃抱璽歸化及守聊城竇建德攻破之擒化及拜謁蕭後稱臣收其璽建德倚突厥以壯兵勢隋義成公主先嫁突厥遣使迎蕭後建德以千騎送後入虜廷而留璽秦王世民擒建德獲其傳國八璽璽歸唐開元六年改稱傳國璽曰受命寶元宗幸蜀使韋見素奉寶傳位於肅宗僖宗光啓元年李克用逼京師夜出開遠門使神策軍使王建負傳國璽以從登大散嶺閣道燒絕丈餘建囊璽於背手掖上自煙焰中躍過夜宿板上上抱璽枕建膝而寢解禦袍賜建曰以有淚痕也既入蜀田令孜盜璽埋地下尚食使歐陽柔治令孜故第得璽獻之前蜀主王建建傳子衍唐魏王繼岌滅蜀璽歸後唐後唐潞王從珂清泰之末石敬瑭臣契丹而攻唐從珂攜傳國璽登元武樓縱火自焚璽已爲煨燼矣晉天福三年更作受命寶其文曰受天明命惟德允昌末帝開運三年契丹入晉晉奉傳國寶一金印三出迎契丹以國寶追琢非工又不與前史相應疑其非真詰責使獻真者晉人對以潞王自焚失傳國璽此寶先帝所爲群臣備知非敢匿寶乃止契丹建國爲遼寶之爲真遼興宗重熙七年試進士賦題以得傳國璽者爲正統猶侈言之至保泰二年金人克中京天祚奔雲中遺傳國璽於桑乾河實晉之天福璽也故傳於今璽之大略如此帝聞之笑曰非洗馬洽考辨幾誤此璽爲秦璽矣令狐韜曰天福晉璽之外更有姚璽慕容燕璽即魏晉亦各有刻魏自刻者其文如秦秦璽獨自右魏璽獨自左晉所刻者其文曰受命于天皇帝壽昌唐太宗貞觀十六年刻受命璽其文則曰皇帝景命有德者昌六朝雲擾自謂得秦璽者皆魏晉所刻也今按此璽雖其文爲李斯八字而篆法全殊特不知所從來耳侍郎蘇伏威奏曰元禦史大夫崔彧得於故臣紮刺氏之家即宏吉刺皇后所手授于成宗者令狐韜曰此即大宋元符中咸陽縣民段義于河南修舍有光照室掘之得古玉印其文曰受命于天既壽永昌上之哲宗蔡京等驗以爲寶璽遂命曰天授傳國受命寶改元元符即此璽也宋至元符得璽佞人滿朝國運浸衰得此璽者何賀之有群臣遂不復言表賀帝又曰三代以九鼎相傳桀有昏德鼎遷于商載祀六百鼎遷于周所謂在德不在鼎也非洗馬之言聯幾爲卿等所誤長孫軌劉知幾等大慚帝遂升令狐韜爲太子少傅賜水晶鹽十兩冷暖玉一盤謂之曰此玉出日本之東集真島島上有台曰凝霞台臺上有池池中出玉棋子自然黑白分明冬溫夏冷故謂之冷暖玉卿勤學考據故賜此玉以旌之又聞卿所辨鑿鑿可憑亦如此鹽之有至味也令狐韜再拜謝恩而出
