body:
  text: 第五十回慕容長鏖兵武陵嶽招討既撫定長沙議取建州武議郎藍天蔚進曰末將初隸麾下未建寸功願取建州以酬知遇招討許之劉遇隆亦願同往招討甚喜撥兵一萬與之二將謝別起程既過衡永已非一日將抵邵陽聞朱梅嶺有兵控制劉遇隆先引一軍探之且說鎮守朱梅嶺者乃副將靳虎臣驍勇善戰昔在安豐路曾與劉遇隆相識疆場共事者三次劉遇隆乃按兵不動潛修一書勸虎臣降宋虎臣大喜其部下有牙將王秀累犯軍令虎臣常責之王秀得此消息竟赴建州太守錢鳳儀處告變鳳儀遂與都督解公輅商議設宴命牙將王秀代理軍事召虎臣議退敵計就席間擲杯爲號殺之虎臣既誅王秀始至軍中一至朱梅嶺軍士不服鼓噪營中大亂劉遇隆聞之疾赴其營元兵爭砍王秀之頭以獻蓋虎臣待下素有恩信故也劉遇隆撫定余衆藍天蔚後軍亦至喜曰聞建州僅一靳虎臣若解公輅直奴才耳二將一同進兵至鹿角岩解都督引兵阻定藍天蔚曰待某破之解公輅一見宋兵方指揮軍士紛紛擾擾列陣迎敵藍天蔚趁他行陣未就即率兵如潮湧而進解公輅不能抵敵棄營奔入城中守禦各項倉皇未備宋師接踵而至滿城軍民無不歎曰靳統制若在當不至此解公輅聞之始大悔根府尹失策錢鳳儀不肯任過亦譙讓都督行軍躁率一文一武忿爭不已城外炮聲大震宋師圍城水泄不通百姓驚慌無措藍天蔚劉遇隆圍僅三日竟將西南攻破一角宋兵蟻附而上錢府尹在集瑞堂前解帶自縊解公輅不敢迎戰引家將數十騎望武陵逃去藍劉二將兵不血刃遂得建州其城步新寧等縣無不納降惟武崗州負固不服劉遇隆引兵徇之方始納款各處撫定往返未逾一月即告捷于長沙岳招討大喜曰吾固知二將必成功也帳下有台州降將慕容長大呼而出曰建州既定武陵未收當令末將建此微功岳燕超曰武陵乃荊湖重地必有能將鎮守恐汝非其敵致損吾兵威也慕容長大怒曰如長取武陵不下甘當軍令招討曰軍中無戲言慕容長即寫下軍令狀招討撥兵一萬與之慕容長大喜而出有先鋒扈德威進曰此去武陵必下矣招討曰子何以知之扈先鋒曰觀其臨行時意思安閒必有成算是以知之招討亦以爲然慕容長領兵由桃源龍陽二縣俱無阻隘竟奔武陵時常德守將屈突鵾因解公輅來奔已掃清境內以待一聞宋師入境領兵者乃台州楊鎮龍故將大怒曰鄙夫何敢欺我即命偏將王鷔穆良引兵一千離城三十裏崔婆井埋伏候宋師既過從後擊之自統大隊出城就沈約台前屯住果然宋兵不曾防備前隊竟爲二將所敗比及慕容長知之已無及矣慕容長見少挫其銳勃然大怒曰長昔在台州將烏合之衆尚欲橫行天下今大宋以堂堂之陣正正之旗兵精糧足長若不能收復武陵有何面目見招討乎催軍直逼沈約台下寨立營未定屈突鵾以逸待勞出其不意又敗其軍于武陵城外慕容長直激得氣焰騰空太陽穴火星透上三千丈不止次日結束停當一刀一騎坐索屈突鵾出戰屈突鵾怒欲出馬健將潘孟揚曰何勞主將臨陣末將願往敗之慕容長見健將出馬益加忿怒潘孟揚甫交手已被慕容長刀劈馬下仍然勒馬討戰屈突鵾怒發如雷正待出馬王鷔穆良二將齊出慕容長毫無懼怯大奮神威不三合用拖刀計斬卻穆良王鷔著慌便走慕容長拈弓搭箭嗖的一矢王鷔落馬爲宋兵所獲屈突鵾在門旗下飛馬來救已無及矣屈突鵾氣滿胸膛恨不生擒以與三將復仇接住慕容長惡戰五十餘合不分勝負慕容長拍馬便走屈突鵾不舍追過木瓜砦慕容長手出一鷂望空飛上四下伏兵齊起聲聲大呼休教走了屈突鵾元兵圍在垓心死戰不已損傷過半屈突鵾奮勇殺出已中數創奔至沈約台始得生力兵一支前來接應入城慕容長性急如火即督兵攻打一見圍城屈突鵾憤焰中燒次日登城大呼曰宋將能與某力戰便將軍馬撤退否則任汝攻打守禦有備不畏汝也二將一性急一性躁慕容長果然將軍馬撤退五裏仍至沈約台前紮定屈突鵾鼓噪而出揀一平曠所在列成六甲迷魂陣大呼宋將打陣慕容長定睛一看見六隊之中顛倒參差暗藏六神不省此陣未敢造次亦調七隊精兵列爲七星斬將陣敵之屈突鵾見之曰此常陣也慕容長呼曰能入陣否屈突鵾不以爲意選精兵千餘一馬當先殺入陣中慕容長麾動令旗抽出一軍以遏外援頃刻化爲圓陣又將屈突鵾圍在垓心元兵死戰無路可出屈突鵾仔細看時訝曰分明七星陣倏化爲六花陣也吾一時期敵誤入此陣沖殺一會卻得建州都督解公輅引兵由西北殺入接應而出且戰且走奔至城中喘息未定宋師又至慕容長二次圍城屈突鵾守禦甚嚴宋兵攻打即將灰瓶滾木金汁等項施下傷人甚衆慕容長大怒量雲梯沖車等物不能破之立造尖頂木驢矢石所不能制者運以攻城詎料屈突鵾即用雉尾炬拖鐵鏃灌以油擲下木驢盡燒毀慕容長架起虹橋屈突鵾以撞竿慕容長命穴地道屈突鵾暫塹以長濠慕容長百計攻城屈突鵾隨方禦之攻者自勞守者自逸旬余慕容長見城不能下且解圍暫退兵屯茶陵山屈突鵾又引兵出城北駐紮以敵之慕容長納悶營中暗思此城如何可下左右思維智勇俱困是夜星月交輝夜半後忽狂風驟起大雨傾盆終夜不止慕容長猛省柳葉湖之水若得暴漲可以灌入城中令人探之果然水起丈餘慕容長大喜急令軍士沿夜冒雨用木版塹定阻其下流湧入城西併合玉帶河之水用灌武陵果然次日武陵城外澎湃汪洋怒湍奔流滔滔汨汨不絕於響城不陷者三版慕容長率兵乘筏鼓噪而來三次攻城時屈突鵾已移軍入城水勢洶湧無可消瀉雖有閘門數次泄出有限且隨泄隨滿無力可施遂深恨宋將登城認定慕容長極力一箭中在右臂幾乎墜入水中得衆軍擁扶熬定痛楚拔出箭鏃忙用藥敷佐慕容長咆哮大怒曰城下誓將屈突鵾剮之時水勢倍漲高與城齊元兵舍死就女牆阻定力不少懈宋師見主將受傷攻打益厲不一會城垣坍塌數處元兵不能制宋師乘筏直入屈突鵾先殺妻子然後與宋師決一死戰慕容長一見恨入骨髓令衆軍萬弩齊發屈突鵾體無完膚死於亂箭之下少頃衆軍擒解公輅至慕容長亦命斬之其餘大小官吏逃者甚衆餘者皆降時宋師以掘開水閘元兵民死者皆衆慕容長始安輯人民清查倉庫略定所屬四縣事事皆定乃令人往長沙告捷嶽招討大喜即令岳鎮史進運牛酒犒兵並黃金彩緞先爲慕容長獎其功元代野史第二部民國田騰蛟著
