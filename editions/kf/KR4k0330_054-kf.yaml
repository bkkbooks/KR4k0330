body:
  text: 第五十四回元太后駕遊五臺山元至元三十年湘潭各處相繼陷沒湖廣行省左丞飛章告急世祖昏耄病憒中心志衰頹無意出師時常山王成吉思帖木兒兵敗表至世祖不覽丞相完澤安童等憂之十月紫微垣彗星見抵鬥魁光芒丈餘三月乃滅甲午春正月壬子世祖不豫以天變告警免朝賀越日禦紫檀殿召平章政事不忽木問以天變如何可銷不忽木奏曰風雨自天而至人則棟宇以待之江河爲地之限人則舟楫以通之天地有所不能者人則爲之此人所以與天地參也且父母怒人子不敢疾怨起敬起孝故易曰君子以恐懼修省詩曰敬天之怒無敢馳驅三代聖王克克謹天戒鮮有不終漢文之世同日山崩者二十有九日食地震頻歲有之善用此道天亦悔禍海內乂安此前代之龜鑒也願陛下法之因誦文帝日食求言詔世祖悚然曰此言深合朕意既而歎曰朕昔年平宋之後一片雄心欲掃盡海內連年征交趾搗日本伐占城而叛者四起命將出師殆無虛日我國家建極開運垂五十年而一意用兵遺黎殘姓遊魄驚魂虔劉蕩摩殆欲殲盡而征愈勞叛愈廣此皆朕嗜殺之過無惑乎天怒人怨災異告警也自今以往朕不復用兵於海內矣言已而泣不忽木亦泣奏曰陛下善自保征海內餘氛不日自當平靖世祖曰朕所深慮者廣南故宋耳其措畫甚大在廷諸臣無出其右者朕撫心自問恐昔年滅宋伐陵諸事未免太過自此以後卿等好爲之不忽木叩謝而出癸酉世祖隨崩時皇太子真金已卒弘吉刺皇后即傳懿詔以真金第三子皇孫鐵木耳即帝位是爲成宗尊弘吉刺皇后爲徽仁裕聖皇后同預國政後即以禦史大夫崔或彧獻玉璽賜之夏四月蘭州河清三日先是世祖不豫諸王頗懷覬覦成宗方在軍中料理軍務欲整飭戎行討平荊湖思大有爲迨世祖既崩以奔喪至上都得即帝位遂深感徽仁裕聖皇后之力乃大崇釋教廣作佛事爲皇后資冥福修福寧寺合經藏之數共五千八百四十間金碧熒煌極其華美有五臺山在太原府五台縣東北一百四十裏周回五百余裏高出雲表頂皆積土因謂之台分東西南北中又東五台與西五台相去二百餘裏直至奉聖州之北即世傳北方文殊師利所居之清涼山也成宗爲皇太后修寺創始于元貞之初閱三年而功未竣花費鉅萬群臣有諫阻者輒罪之至大德元年丁酉又請太后由上都路入居庸關經可汗州臨幸五台諸王駙馬六宮妃嬪隨駕者數千人所過郡縣供億浩繁民多逃竄官吏苦之葷薪運米絡繹於道丁男不供役及婦女鑾輿所駐信宿即行飲食委棄狼籍滿地所謂螻蟻人民沙泥金帛莫此爲甚矣禦史台臣等皆畏罪莫敢發言獨監察禦史李元禮上疏諫曰臣聞五臺山創建寺宇工役俱興供億繁重民不聊生伏乙太皇太后臨幸五台尤不可者有五盛夏禾稼方茂民食所仰騎從經過不無蹂躪一也親勞聖體經冒風日往復數千里山川之險萬一調養失宜悔之何及二也天子舉動必書簡冊以貽萬世書而不法將焉用之三也財不天降皆出於民今日支援調度百倍曩時而又勞民傷財以奉土木四也佛以慈悲爲教雖窮天下珍玩供養不爲喜雖無一物爲獻亦不怒今太后欲爲兆民求福而先勞聖體使天子曠定省之禮五也伏望回轅中道端處深宮上以循先皇后之懿范次以盡聖天子之孝誠下以慰元元之望如此則不祈福而福自至矣臣無任屏營之至疏入成宗大怒曰此寺乃先皇帝嘗許修建腐儒何知輒敢訕謗立命下獄敕右丞相完澤平章不忽木鞫之二臣不敢違詔但遷延其事俟帝怒稍解方爲保奏時京湖各處守臣請兵告急日有表至成宗覽畢曰廣作佛事兵戈永息何事張皇乃爾敕下令緊守要害而已且說太后既幸寺中佈施動以萬計諸王駙馬爭舍金錢以資福果群禿幾富敵于國藉焚獻以充囊橐土偶無知也太后在寺中留戀月餘只候官吏苦不勝言太原各郡生民日胺月削賣妻鬻子死者枕藉于道生者則負縲絏猶肩荷重任鵠面鳩形含情莫訴鑾輿所經罔不側目所謂敢怒而不敢言也至土門關有羅雄州酋長阿那龍少糾合生番子數百人攔輿劫駕太后大驚諸王駙馬極力保護命扈從將士剿拿僅獲生番子百餘人殺之阿那龍少竟被逸去太后受驚得疾諸王駙馬等十分憂危不日至幽州昌平入居庸關此關西連太行東亙遼海狼居胥諸山皆爲襟帶太後下令不出北口乃由關南行僅一百二十裏遂抵大郡鑾輿至關南相通處路繞兩崖間其隘如線其側如傾其峻捫參其降趨井而下有深澗巨石磊塊艱折萬狀凡四十五裏太后正行兩崖間忽大風驟起鑾輿幾爲所掀太后驚得魂不附體路既險狹不堪車輦太后乃下車令人扶掖而行惟舉手膜拜聲聲我佛有靈而已一時風又猛起隨從多墜崖死者太后已心膽俱碎諸王駙馬妃嬪內官無不口出怨言太后聞之病轉增劇諸王等急並日而行始達上都帝及文武出郭迎入太寧宮拜賀畢帝慰勞曰太后親勞聖體駕幸旃檀佛日增輝應受無疆之慶太后搖手泣答曰幾乎與官家不能面會矣帝驚問之諸王駙馬始言其狀帝亦驚訝太后怒曰文武當時何獨無一諫者丞相完澤平章不忽木始奏禦史李元禮因諫下獄之故臣等奉詔尚未鞫問太后取疏觀之且感且泣曰官家若從此諫土門不受驚矣帝大慚即日旨下李元禮出獄複其官以金帛賜之自此太後遂臥病不起
