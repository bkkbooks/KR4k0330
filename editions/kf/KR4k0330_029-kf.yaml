body:
  text: 第二十九回趙涪陵聘賢龍首卻說涪陵即得漳州用重兵控制邵武以遏江右閩中兩省援師命馬遇樂拓跋琳分頭領兵略就近州縣方欲傳檄以達廣南再議進兵忽報皇甫惇馬遇陽由吉安回至順昌遇著二將引兵來降涪陵迎入二將俱虎頭燕頷魁梧奇偉一見涪陵納頭便拜涪陵慌忙扶起再三勞慰始叩姓名其一姓高名耀卿渤海人氏其一延安人也姓韓名靖夏曾爲宋末留守司統制一向隱身閩中近聞殿下江右起義因於九龍山集兵千人耀卿取了南靖長泰二縣靖夏亦攻破福甯州有建甯路都統制遣兵來援某二人合敗其師方始來歸無可表現權將二郡作贄進見涪陵喜出望外稱謝曰將軍等不忘故國則南宋之中興有日矣遂登風月樓酌酒與二將洗塵又謂衆人曰大將已至諸公當輪流把盞只見高耀卿推箸而起曰殿下此宴賀功則可若雲大將則閩中尚有奇才此人若至國家厄運日消恢復立見縱使伯顔張宏範複生不足慮也涪陵急問其人耀卿曰馬邑人岳燕超也將略素裕可當專閫之任二子鎮坤俱非凡鳥燕超與耀卿契交最久伯顔曾令魏天祐以參政顯職聘之不就則令州縣密捕除之恐生異日之患蓋陰以淮陰比燕超也今隱霞浦縣龍首山殿下遣使聘之則大事立成涪陵問其人比將軍何如耀卿曰勝某十倍涪陵疑信參半韓靖夏亦亟言燕超可用殿下不可錯過有皇甫惇起身願往招之涪陵曰古之聖王側席求賢不惜三聘五征國事既重名賢自不可輕宜遵造廬之禮方足以表敬意且說當時涪陵以高將軍權知兵馬事總制邵武韓將軍屯兵杉關救應閩中防建寧兵至劉瑛史進拓跋琳領兵控上梧蓬頭桂嶺三關防脫脫兵至救應江右諸郡各處要地俱用將防守不日進徵調用收拾禮物猶未起行轅門上又傳廣南惠州府羅浮山有人奉表至涪陵降階而迎乃韓昭李穆也二人叩見起居畢奉表呈上涪陵觀之其表曰伏聞殿下潛身海島十載播越中州鼎沸無所統屬今天誘其衷萬里歸國崛起雄師使天下士大夫得以效死圖報國恩人意既諧天時亦順危運立時而銷中興拭目可待夫以紫色餘分擬亂正統已令英雄短氣志士灰心況狂惇及於聖天罪浮羸政兇暴至於陵骨虐逾曹瞞軍民切齒中外一心語雲天生斯民必有司牧當今司牧非殿下而誰獻公之子九人晉文創霸漢家之厄十世光武中興師定閩廣席捲荊湖則大事可成王業可興矣仍遵航海國號祥興二年會合勤王義師雄兵百萬請約主盟並示師期先定廣南預建國都招魂二王肅清陵墓其餘地土可傳檄而定無任懇款之至羅遊複宋營首領衛臣種世龍等百拜謹表以聞大宋祥興二年八月初二日奉表韓昭李穆涪陵觀畢喜極而泣叩問廣南用兵情形噴噴稱羨約以來歲之春師過羅浮韓昭曰殿下之兵朝至廣南則廣南朝定夕至廣南則廣南夕定李穆曰羅浮聚兵三萬有餘能征慣戰之將三十餘員兵精糧足所以不敢攻城掠地者一以軍中無主恢復尚屬虛名一以廣南有一大將尚未招降故遲疑至今未敢妄發近聞殿下由江右入師閩中羅浮士氣百倍不必兩軍對壘而勝負之形判然矣涪陵見二人議論侃侃舉止安詳知是賢士改容禮之設宴款待從容問及故國典要條分縷晰井井不亂涪陵若飲醇醪不覺自醉又有侯長孺皇甫惇等相陪談心意更款洽涪陵私語左右曰吾不喜得羅浮書喜得二賢士耳語罷即命皇甫惇侯長孺往羅浮報命隨帶馬遇樂張懷亮及親隨數人望福甯州禮聘燕超不日遂達蔗洋近福寧州西北過太姥山忽聞喊殺之聲涪陵大驚登高而望見曠野平原間有二將面如傳粉唇若塗朱弱冠年紀凜凜威風一持梨花長槍一舞方天畫戟二人正鏖戰不休殺得性起如雪花紛紛亂舞又似白龍攫雲拿霧騰空矢矯惟見寒芒隱隱不露人身張懷亮馬遇樂亦極口稱賞均喝采不已時已過午二將戰了一會勒馬大笑而去涪陵心慕其人思蹤迹之但求賢來遇只得先縱馬下嶺約行裏許見空山落寞草荒人稀薜蘿縱橫夾道皆碧苔青蘚愈行愈遠無可問途從石蹬峻嶒中紆折出峪恍聞馬蹄鸞鈴之聲遙見鏖戰二少年驟馬嶺上其行如駛張懷亮大呼問誰其一按轡而去其一停馬審視張懷亮始向前問路少年飛馬而去見一行人衆舉止非凡便先問訊張懷亮曰我等奉趙殿下往龍首山訪賢至此少者曰誰爲趙殿下將訪誰也懷亮曰前面紫衣驄馬者即宋涪陵公也將訪嶽賢士燕超少年聽罷大驚下馬拜伏於地涪陵忙令扶起少年曰某即燕超之長子岳鎮也殿下至此有失祗侯涪陵大喜曰前面演武者想即汝昆季也少年謝曰然此山有東西二徑西達棲雲嶺近福安縣下嶺過扈崎山下即小將蝸居殿下從此登嶺越前面三峰而下即見衡門矣小將理當先驅遂躍馬而去涪陵一行人衆緩緩逾嶺果見林巒秀出處左泉右石其中結廬一所茂林修竹點綴掩映不一會已至門首下馬見一片平曠知是走馬之場兩旁大木合抱參天少時燕超岸然而出涪陵視其人英姿颯爽氣宇軒昂有儒將風度二子亦神爽飛越肅客而入堂前依次禮畢各敘起居涪陵先將禮物幣帛呈上正襟而起曰趙氏國祚傾移涯山煨燼固屬大命已去不易挽回然蒙古之虐毒生民中原板蕩滅天毀聖伐陵鄙儒種種狂惇之行聞者髮指晟不度德量力欲恢復故業拯斯民之疾苦雪先代之仇恥有高韓二將軍盛稱足下將略兵機有經天緯地之才故不揣冒昧造廬請謁乞足下垂念我太祖皇帝開創艱難即足下先代亦有造我國家小子漂泊海外虎狼餘生所伏惟天以有今日然暗于時事昧於機宜不賴良弼焉定厥功未審足下肯賜教否言訖泣下長跽而請燕超大驚急免冠伏地而起曰殿下不擇樗櫟之選下及芻蕘燕超敢不竭股肱之力盡鉛刀之一割乎涪陵聞燕超許可方起燕超又叩首謝曰殿下隆禮相貺惠顧敝廬如此知遇雖肝腦塗地不能報也涪陵大喜扶起張懷亮馬遇樂等齊聲曰殿下聞君大名每飯不忘形諸夢寐今君肯出而展其經綸佐厥成功即齊威之得管夷吾符秦之得王景略也吾屬亦攀龍附驥相與有光矣燕超遜謝不當設筵枕戈亭下涪陵酒酣叩以當世急務燕超曰先建都邑以屬人心次定名號以立國本都邑既定名號既舉然後以深仁厚澤固結民心民心本未忘宋而更以恩施德政收拾之則不可動搖矣涪陵曰固結民心盡于輕徭薄賦乎燕超曰仁民之政不止輕徭薄賦然相時立言則當今與吾仇敵者元也元以暴吾以仁元以刻吾以義元峻而急吾寬而緩凡興利除弊一反元之所爲即如元主滅天殿下自然敬天元主毀聖殿下十分崇聖元主鄙儒殿下加意重儒上行下效不外是矣但此中緩急次序調度施行尚宜多親儒者商榷得宜非燕超敢與聞也惟捍禦外侮折沖之任燕超與請君力當爲之涪陵點頭稱善又問兵行先征何所目下廣南羅浮有書約會舉兵此去能有濟否燕超曰羅浮大有識者傳檄荊湖聚會英雄直待以殿下爲名義收復廣南決有成算涪陵曰既得廣南即都廣南乎抑都閩中乎燕超沈思良久曰閩廣亦宋末之故都耳故當時有一汴二杭三閩四廣之謠夫天下者常山蛇勢也秦蜀爲首東南爲尾中原爲脊若以東南爲首必不能起天下之脊故自古中興之主起西北即足以據中原而有東南起東南即不能複中原而有西北天下形勝川陝爲上荊湖次之淮揚又次之此已往之陳迹也又雲天下治地氣自北而南天下亂地氣自南而北今南方地氣大至矣不出百年仍舊大治亦天地剝複之機也殿下重興舊業死灰復燃據燕超管見殿下興師以來所得州縣無過於邵武者控制閩廣吳楚可通前臨海道據八閩之上游荊揚一帶郡縣遣將取之席捲可定矣至行師運用之妙在乎一心臨時應變非敢預爲決也涪陵大喜自謂相見恨晚馬遇樂張懷亮並請凂其二子一同立功燕超不可曰孺子業未成且此間薄有田畝力耕自給勿致荒蕪可也時二子在側次子岳坤平日喜操強弓騎怒馬演槍試劍聞聘乃父甚是技癢一見燕超不許冷語冰人面如土色長子鎮默然不語張懷亮方欲開言涪陵艴然不悅曰足下許身爲國而令二子饘粥自給是薄晟不能以祿詔賢也同建功業未爲不可燕超起謝曰年少新進每多喜事即易僨事令伊耕田曆練再仕未遲馬遇樂張懷亮二人再三勸行燕超堅拒不許嶽坤情急面漲通紅涪陵會意不由燕超分說命二子且隨某去臨陣爲左右護衛馬遇樂大喜曰殿下臨敵正少扈從二公子正當其選張懷亮慫恿二子作速謝恩燕超不便再阻二子叩首謝命喜出望外佩劍行酒隨侍涪陵當晚即在莊上安宿涪陵甚喜得士竟夜不眠次日燕超將行召集村中父老以廬舍田産托之衆父老聞燕超應聘出仕各置羊酒鹿脯迎門祖餞問仕何所燕超告以宋主父老驚喜曰我等皆故宋赤子也昔日文少保開府南劍大舉勤王我等從福安縣謝翺應募赴難轉瞬之間十餘年矣一齊叩見涪陵伏地舉觴上壽曰此小民芹曝之獻也涪陵見此光景不覺泣下心感其誠逐一飲之勉以孝弟雍睦勸課農圃岳鎮岳坤把車輿家小先行涪陵與燕超等隨後衆父老依依木舍直送至十裏外而別
