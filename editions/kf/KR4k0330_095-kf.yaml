body:
  text: 第九十五回張士誠販鹽起泰州元監察禦史張士宏奉詔聘宋聞廣王瑩即位改元景新是爲穆宗以白映雪爲左相令狐韜爲右相馬遇樂爲樞密正使嶽坤爲樞密副使時老臣文武若司馬肅皇甫惇葛天民李穆韓昭劉瑝嶽鎮等皆卒穆宗甫即位見元主入賀甚喜厚待士宏亦遣議郎甘霖奉使答之傳詔以景新二年出巡六鎮是時六鎮節度使四營都部署疊經更換如延平節度使石城侯劉瑛建昌節度使南靖侯韓搏虎長沙節度使甯武公寇複雷肇慶節度使安瀾侯馬遇陽廣右節度使威武大將軍常甯侯高耀卿俱薨惟岳州節度使總領衛大將軍種世虎如故四營都部署則靖海營李繼業神策營庹靖天策營陳同神武營史進翔龍府留守司開國侯張懷亮杉關元帥太尉益陽侯韓靖夏俱更調數次文教武功漸次不及重康隆熙之初矣後穆宗聞潞安王上都襲位大喜詔以司徒上官誠參政樊東樓二人齎禮物往賀是時集慶路花山賊大掠江陰鎮江等處盜艦往來江邊莫敢如何耶律霸駐兵通州泰興間阻定江海門戶急請許參政檄各鎮將校協力捕剿許有壬即調戚芳李典王姚匡四將各領兵一千相助剿賊而花山賊首莫天夜戎無敵耿冠軍等凡三十六人起事前至建康劫寶藏庫者即莫天夜等也天夜自號爲英老虎戎無敵自號爲巨無霸耿冠手即耿星星之子星星死于海島冠軍出沒江海新附賊黨自號爲耿天王余賊亦皆有諢號與梁山泊情形相似聚衆數千橫行州郡商民苦之有戚芳王二將合兵至常州與耿冠軍大戰于武進縣孟城山王不敵爲耿冠軍所殺元兵大潰耶律都督聞之大驚急令裨將等緊守海門自率兵倍道而進又與賊戰於丹陽傷其頭目數人賊兵奪氣姚匡一軍又在洪澤湖爲戎無敵等所敗時賊已蔓延各郡耶律都督顧此失彼乃泝流而下思以重兵截揚子江口行至青龍灣不防賊兵猝至耶律都督亦爲莫天夜所敗耶律霸不勝忿怒檄衆將合兵於海州誓與死鬥莫天夜耿冠軍等聞之竟糾合賊衆直奪海州攻破其城擄掠一空時耶律都督兵猶未至莫天夜等又大獲全勝遂屯兵海門三十六頭目俱微服偷過廣陵欲遊瓊花台私探揚州道經茅山偶遇推車運輦者數百人各持弓矢荷戈矛以行莫天夜等視之乃鹽徒也不以爲意忽內有三人拍馬當頭大呼曰此花山賊也呼哨一聲一齊圍定莫天夜等忙掣出兵器抵敵殊三人勇不可當戰不數合莫天夜中槍身死耿冠軍被斧劈落馬其餘死者亦衆傷者多爲所擒鹽徒打探賊党尚在海州乘勢追過海門賊衆聞耿天王莫老虎皆死於其手望陣先逃餘者皆鳥獸散比及耶律都督兵至賊已肅清令人訪殺賊者爲誰蓋即泰州之張士誠土德士信也大軍既集無所攻殺惟撫定瘡痍郡縣而已耶律都督深以爲恥歎曰朝廷養兵數十年而賊乃平於販夫我輩都應愧死引兵而歸且說張士誠本泰州白駒場亭民家貲巨富販鹽爲業兩弟士德士信膂力過人亦有權略諸子張龍張虎張熊張虯張彪張豹等凡十七人無不驍勇善戰又有呂珍韓敬之李伯清紀世熊金鎮達等智勇足備者數十人爲之爪牙故士誠負販所經盜賊不敢正視士誠每撫枕自歎曰天下荒亂草澤中非無英雄惜乎蒙古不能駕馭耳至是無意間大破花山賊兵益輕朝廷潛蓄不軌之志多結亡命俱列部曲仍以販鹽爲名往來蘇松京口間常謂其妻劉氏曰姑蘇台館娃宮去此不遠吾大事若成當于蘇州立國建一樓曰齊雲爲汝宴酣之所又謂兩弟曰吾他日起事其在高郵州乎高郵有三十六湖以受七十二澗之水又有形勝可控蘇松諸郡俱可順流而下土德士信皆以爲然遂日與賓客諸子謀方略制器械布腹心收爪牙聚糗糧駸駸乎不日欲乘長風破萬里浪投鞭斷淝水之流矣
