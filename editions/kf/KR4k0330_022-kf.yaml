body:
  text: 第二十二回狄招討二征羅浮卻說涪陵在撫州龍會山命馬遇陽往蓬頭砦下書已回備言史進傾心歸順願率三部人馬結連桂陽嶺三關守將蹠拔琳共取南安權作進見之禮並具回書一通表明心志涪陵得書大喜急集衆將會議攻打建昌之策此乃涪陵起兵發軔興複宋室之大舉爰刑白馬禱告神祗並故宋一十八主之靈命皇甫惇作文祝之文曰皇宋播遷中原板蕩故宮禾黍赤縣丘墟金酋蕩禍檜賊款和於前胡元行兇賈奸誤國於後遂蒙垢於韃靼並隸統以腥膻冠履倒置生民塗炭臣晟整飭名義扶立綱常仇複崖山戎起江右起白水興漢之師效赤帝亡秦之舉鋒鏑霜瑩滅天之罪宜討卒乘鱗集貶聖之謬可誅華表虛懸夜月慘矣伐陵墓木高拱寒原慟乎取首誓不共戴天舉族有北轅之釁雖混一率土薄海同左袒之心伏惟祐相錫我休嘉敬達天麻實叨神貺是享涪陵率衆將祭畢設太乙壇堅六纛旗命張懷亮爲先鋒領兵一千作前隊即日起行劉瑛領兵一千爲左護衛使馬遇樂領兵一千爲右防禦使劉瑝領兵五百爲五軍提點往來催督馬遇陽領兵五百作監車押後爲左右救應皇甫惇參謀軍事涪陵自統大隊居中指揮兵馬金鼓號令中軍帥字旗上大書曰大宋龍興軍前門旗上亦書左右二聯雲虎賁三千直抵幽燕之地龍飛九五重開混沌之天大軍放炮起行由臨川直抵瀘溪等縣沿途望風納款改換服色獻糧助餉不日前哨張懷亮已近建昌府竟達南城過盱江逼華子岡下寨建昌知府陶惜陰忙與守將查士珩等商議禦敵曰此兵自稱故宋恢復義舉名號與賊兵不同未可小覰將軍計將安出查士珩曰事急矣府公速報行省請師一面登城固守某率兵一千往城東蛟湖阻住勿使近城再議迎敵陶惜陰曰此計甚善令人不分星夜報往洪都去了張懷亮兵屯華子岡令人哨探至蛟湖見隔岸已有人馬紮定無舟可渡究竟張懷亮昔年久練沙場兵不妄動再令人四下探聽並無埋伏始分兵五百暗令裨將抄出籲水上流揚帆而下盱江邊斥堠屯兵忽見無數人馬旌旗招展全是宋字慌忙報入營中查士珩不意後兵掩至大驚急調兵攔江截殺一時舟聚如蟻對岸人馬乘勢合兵渡江鼓噪上岸查士珩欲半渡擊之見宋兵部伍森嚴旗幟不亂知是勁敵將軍馬退後列陣以待張懷亮過了盱江結束上馬挺槍直出陣前大呼曰某乃宋先鋒張懷亮是也領兵收復故地汝等皆大宋人民何得隸彼蒙古助桀爲惡查士珩笑曰大元天命攸歸肅清一統智者見機明者順時既心不忘故宋即宜埋首泉石終老山林作大元之逸民亦無相害何苦妄肆囂張興師跳梁張懷亮大怒飛馬直取士珩士珩舞鞭迎敵二人大戰數十回合不分勝負兩軍混殺一會各鳴金收兵次日查士珩索戰懷亮出馬不數合大敗而走士珩縱馬來追懷亮用槍頭一招兩翼伏兵殺出將士珩圍在垓心元軍死戰得免恰好右隊已到馬遇樂將生力兵衝殺一陣元軍大敗而走遇樂亦不十分追趕收兵回營與張懷亮各下一寨互爲犄角之勢次日左隊劉瑛又到三將合兵一齊攻殺查士珩立營不住奔回城中拽起吊橋將城緊閉三將把建昌圍了三匝日夜攻打城內頗有準備急切不下相持數日太守陶惜陰登城大呼曰宋將欲戰請軍馬少退以決勝負欲攻則城中自有準備憑汝攻打援兵一到誠恐片甲不回矣諸將皆願決戰將軍馬約退果然城門開處首先放出數百壯士俱仿韓世忠背嵬軍遺法各持大刀闊斧如牆而進以鐵騎繼其後馬足到處箭如飛蝗宋兵一時驚潰幸張懷亮三人力戰押後雖敗猶能成行元兵勝了一陣奏凱入城仍舊固守以待救兵馬遇樂曰不圖城中有此排布折我銳氣張懷亮曰小小進退兵家之常何足介意願施小計破之附耳低言如此如此三將遂各領兵退去城中一連數日不見宋兵動靜守禦未免疏虞一日報行省左丞董文炳援兵將次到新城縣了太守陶惜陰大喜遂令百姓出城樵汲準備迎接援兵不意宋師忽然大至城城圍得水泄不通馬內驚惶兵心遂不堅固當夜陶惜陰與查士珩親自巡城見宋將張懷亮馬遇樂等分頭攻城又見城南清風亭一帶火光勢若長蛇暗暗驚異巡至城西忽一將走上城樓查士珩情知有變拔劍就砍那將仗劍來迎城上慌亂即有人斬關落鎖城門已開宋兵大隊直入查士珩棄了敵將急忙保護太守招呼人馬殺出城去不數裏正遇一支宋兵乃五軍提點劉瑝舞刀殺來查士珩馬蹶被擒降者甚衆餘珍保太守逃走又遇涪陵大隊人馬截殺一陣陶惜陰匹馬落荒忽見山坡後旌旗對對戈戟森森疑是元兵乃宋監軍馬遇陽後隊人馬亦到陶惜陰一見故宋許多人馬心膽俱裂直望南昌而去且說涪陵率大軍入城忙令衆將禁止三軍不許傷害太守家小出榜安民秋毫無犯城中大悅衆將獻功畢少時劉瑝押查士珩進見涪陵一見士珩親解其縛士珩感其意誠乃降涪陵攜手入帳賜坐士珩辭曰罪當誅戮免辱釁鼓已出望外焉得有坐涪陵曰將軍本宋人也偶然仕元食其祿者不得不忠其事今名義兩全趙某焉敢不敬士珩推阻再三方敢就坐涪陵禮遇甚厚士珩十分感激願領本部人馬收復建昌所屬若新城南豐廣昌諸縣涪陵慨然許之劉瑝進曰人心叵測恐有變詐涪陵曰查將軍忠義人也提點不必過虞仍遣之去士珩約以十日爲期果然殉下諸縣回兵後恰好十日並招降許多兵將一齊進見涪陵大喜兵將俱有重賞即命查士珩爲行營團練使之職隨軍聽用涪陵撫有建昌自此糧草漸廣軍聲頗震專候南安史進消息忽一日轅門抄得羅浮檄文一張呈上涪陵看罷始而喜繼而悲終焉而一片發憤爲雄之心勃勃頓起謂衆將曰當世人心如此不枉我朝祖宗養士三百年矣衆將皆鼓舞大悅涪陵歎曰起義兵複故宋世家子弟與草澤英雄且然而況于趙某乎趙某若不能清陵寢複鍾虡爲祖宗勤王敵愾者誠東海呂母之不若矣衆將皆曰我兵取過贛撫一帶州郡得通南安當由閩中邵武等處竟過廣南與羅浮首尾合兵大事不難成也涪陵稱善且說廣州參政狄定國初征羅浮失利引還至是調齊人馬日日操練並兩廣峒丁共有二萬餘衆命其子狄勇爲先鋒庹靖屈突申副之自統廖雲王彥陳同等押後而進種世龍等亦知定國必複來征俱有準備命牛竤史霸山前下寨扼住來路以待元兵牛竤史霸料狄勇青年子弟恃勇輕進況此山周回五百余裏長江海連群山壁立地理不熟先于龍公竹下設伏兵二支從後掩殺可獲大勝果然元兵不曾哨探狄勇率庹靖屈突申二將迤邐直進牛竤史霸候元兵一隊一隊過畢方舉起信炮從第三峰龍公竹奮勇殺出狄勇救應不及一時潰散失去騾馬器械輜重不計其數狄定國大軍一到聞知敗耗大怒狄勇疏虞有失銳氣立命斬首衆將苦苦告免定國怒氣不息黜退先鋒之職赴後隊押糧切責庹靖屈突申二將同降後軍聽用而以陳同爲先鋒率兵直抵寨門搦戰種世龍遣王麟應敵王麟綽起開山大斧突出寨門二人更不答話一刀一斧交相廝殺不數合陳同敗走王麟驟馬追來忽陳同手中放出紫金錦標寒光一瞥冷豔逼人王麟躲閃不及已中左腿翻身下馬陳同回馬舉刀剛欲剁下史霸飛出雙戟刺來敵住衆軍方將王麟救回本陣陳同與史霸約戰數合仍然敗走史霸縱步趕來陳同回手又是一標勢若長蛇劈面飛來史霸是有心提防側身躲過乘勢一戟刺去准知陳同慣習此標臨陣傷人一發不中隨收隨出史霸短戟尚未近身肋下已中一標血涔涔衣甲皆濕一聲不好棄了雙戟不顧衆軍溜煙逃走陳同驅動人馬大殺一陣網浮兵大敗損去無數人馬陳同得勝回軍定國隨紀大功一次犒賞三軍次日網浮兵張燕吳廣出馬又爲陳同所敗定國又演七星八卦陣佐以峒丁勁弩引洪時錦入陣大破其軍相敵數日網浮兵連戰皆北種世龍大驚諸將大怒願決死戰種世龍不許命寨前嚴加防守將王麟史霸調養病癒再議禦敵定國將大軍頓紮半月有餘日日討戰網浮兵不理定國暗想網浮兵守則有餘戰則不足大將行兵必棄其所長而攻其所短方能取勝不然敵人持重固守徒老我師耳逐日催督三軍攻之不破誘之不出營中漸漸糧餉不繼急令人催趕狄勇一時又不能到自來三軍之命在乎足食然後可戰可守一連數日缺糧軍中皆出怨言定國十分焦急忙檄王彥速往惠州府博羅縣常平倉權糴秋米百斛以救燃眉奈兵燹之後倉儲不盈連博羅縣二倉糴出始得米四十餘斛運至營中不日又盡誰知庹靖屈突申二將押赴糧草才過東莞縣大鵬嶺正遇韓昭李穆關普靈寇複雷焦芳斛律亢宗宇文廣傅突等由衡永而來聞廣南招討正打羅浮一見糧車皆曰觀押糧軍官催趕甚急營中定然乏糧諸君何不助羅浮一陣衆皆大喜焦芳傅突願去舉火寇複雷楊孝伯願去截殺關普靈斛律亢宗宇文廣願去斷後韓昭李穆二人于高阜處瞻望動靜只見庹靖屈突申正押著車輛催趕而來寇複雷楊孝伯雙馬從山谷中殺出大呼羅浮兵在此等候多時矣二將不意敵人至此倉皇迎敵糧車忽然火起見二漢子殺散衆軍處處皆著火種一時煙焰蔽空二將又被戰住不能救護火勢愈烈眼睜睜惟望狄勇來援誰知狄勇少年出征原少慎重量此咫尺決無他變自思押後不比當先何妨按轡徐行忽報前隊糧車已失慌來救應林中閃出關普靈斛律亢宗橫刀勒馬攔住去路狄勇大怒挺槍就刺關普靈將青龍偃月刀撥開火焰槍頭笑曰少將軍前面糧已燒毀救應不及了願降隨我等共人羅浮徐圖大業不降則自回廣州亦無相害狄勇愈加忿怒捉槍又刺斛律亢宗舞槊直取狄勇量狄勇雖青年勇猛豈是二將之敵不三合被斛律亢宗輕舒猿臂活擒過馬拔劍遂取首級關普靈急止之曰不可不可迫人於險退其兵足矣至傷其命仁者不爲也且此將年少英武將來或有造就亦未可知遂縱之去關普靈曰小將異日須記著河東關某救汝性命也狄勇滿面羞慚而去前面寇複雷楊孝伯已殺敗二將奔走追趕忽見元兵蓋地而來寇複雷等大驚原來種世龍已知定國營中糧盡必將引還急出大隊以躡其後史霸王麟病已痊愈種世龍急遣牛竤張燕世虎吳廣等一齊出戰從後掩擊元兵先無鬥志棄甲抛戈而走定國雖是能將奈軍心無主惟與衆將力敵斷後保護徐退羅浮衆將掩殺元兵十分狼狽又見寇複雷等迎面鼓勇殺來衆將不知疑是元兵救應直至種世虎一眼認定關普靈在內大呼曰關仁兄別來無恙耶關普靈見是世虎大喜始收馬橫刀請前後衆將回軍曰廣南經此大創羅浮之威名立矣可以止矣衆將一齊鳴金收軍定國始得脫身而去是役也定國父子非關普靈幾乎不免羅浮衆將請關普靈韓昭等先行一時鞭敲金鐙響人唱凱歌還種世龍得知喜出望外直出望海樓前倒屣而迎關普靈笑曰南山豹林將略不朽矣種世龍曰尚望仁兄輩同德同力共成厥美齊至寨中敘禮各相起居互陳姓名是日寨中大吹大擂犒賞二軍款賓賀主大開筵會東首是種世龍王建忠牛竤張燕史霸吳廣種世虎王麟虞凱吳康洪時錦西席是韓昭李穆關普靈寇複雷楊孝伯斛律亢宗焦芳傅突共十九員賢傑南北英雄一小聚會也
