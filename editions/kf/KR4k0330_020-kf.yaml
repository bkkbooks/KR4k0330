body:
  text: 第二十回韓搏虎七敗賈翀當時元兵大敗定國阻遏不住命衆將護定人馬先行自己斷後世虎等亦不追趕收兵回寨定國候庹靖王彥一支人馬到齊收拾殘兵回至廣州上表自劾願去參政之職權任統制練兵自效伯顔奏知元主不許仍照舊供職務必平賊而後已此時元世祖因征日本喪師十萬頗厭兵革而湖廣安撫使敖魁奏稱雲夢有漢陽盜賈翀賈羽辛聚衆數萬搶奪州郡有窺漢東之意請旨命將征討即有三寶奴脫虎脫二人力薦襄陽府都督呂翔可當此任兵部尚書董文用請帝別遣他將且謂呂翔非大將才恐不足以折沖禦侮元主不聽竟用呂翔爲帥加制置使湘湖人馬悉聽節制且說雲夢澤在德安府安陸縣南五十裏按楚有七澤小者名雲澤夢澤其實爲二而七澤之水皆納於此賈翀弟兄由漢陽起兵擾遍蘄黃並東京汝甯羅山真陽等處有黃河渡口倪大威汪夜叉姚太師一班凶徒夥人又有揚子江水賊宋羅睺趙閻羅及皂角林巨魁白文狻引兵來歸賈翀如虎生翼任意橫行各處擄掠糧餉山堆阜積漢東一帶不敢正視賈翀乘勢欲奪德安以爲養兵之地聞元主命襄陽呂翔來征即喚過白文狻領兵一萬就石柱山下寨阻住元兵大隊隨後即有人馬策應又令倪大威汪夜叉二將各領兵三千列營東西兩岸多備戰艦以便救應自引諸將在澤中往來督戰應敵當時元都督呂翔一得旨意隨檄各郡精兵先以自衛始離襄陽望德安進發有岳州府統制薑愷承天府兵馬都監王濛鄖陽府鈐轄阿沙不忽漢陽府萬戶韓搏虎等先後皆到又有荊州團練副使臧超長沙指揮淩士褭各統所部耑候大帥兵到一齊征進誰知呂督師由樊城沿江逗遛遷延未到賈羽辛已探得消息即遣姚太師領三千人馬且奪應城先掣其肘姚太師引兵將應城圍定一鼓下之分兵把守即攻隨州隨州刺史孫良丕頗有將才多方守禦星夜告急呂督師尚然未到德安知府夏侯信叔忙與衆將商議衆人皆畏懦以將命爲辭韓搏虎奮然曰若待將令隨州無噍類矣遂引本部三千兵往救隨州去了孫良丕正在死力拒守見塵土大起知是援兵已到少膽俱壯姚太師亦將人馬約退一箭之地列陣以待韓搏虎怒目圓睜大罵狂賊奪我城池若不歸降少時身首異處姚太師大怒手舞銅叉迎面就刺韓搏虎揮刀抵住大戰二十余合姚太師力怯敗走賊兵烏合無主自亂韓搏虎驅動人馬掩殺一陣降者無算解了隨州之圍州牧孫良丕大喜迎師入城設宴犒師孫刺史親手執爵與韓搏虎把盞酒過三巡韓搏虎推著而起曰應城未複趁此賊勢未定速往奪回若有重兵固守則難動搖矣遂引兵離隨州急趨應城果然姚太師已登城嚴兵固守韓搏虎下令三軍一聲呐喊將城圍了城上矢石交下韓搏虎手執蠻牌奮勇先登砍翻數十賊兵城中百姓又爲內應斬開城門元兵直人姚太師棄城而走韓搏虎又恢復應城乃帶領本部人馬徑回德安耑聽節制行過洞庭山又遇姚太師合賈翀大隊複轉殺來韓搏虎自知衆寡難敵即靠山勢下寨不與交戰命軍士由間道至德安速請援兵相持數日援兵未到賊兵逐日討戰辱駡不堪韓搏虎素性躁暴至此亦勉強忍耐一日見賊兵耀武揚威辱駡索戰至午後見馬已困乏解鞍人已勞倦卸甲坐者臥者全無隊伍韓搏虎暗思賊兵豈知誘敵惟恃勇耳遂選精兵一千奮勇殺出賊兵倉皇不知所措自相踐踏死者甚衆元兵蓄銳已久人人思戰無不以一當十賈翀立營不住拔寨而走退二十裏下寨韓搏虎之兵搶得器械輜糧俱各歡喜回營是夜陰雲四合少時大雨如注韓搏虎曰破賊兵此其時也又選五百壯士以大刀闊斧直犯其營賈翀不意元兵冒雨猝至更無防備大亂奔走韓搏虎連勝二陣又奪得許多糧草軍士得食歡聲女口雷皆願效死韓搏虎夜徙其營次日賈翀憤甚自統大軍要決死戰姚太師曰韓搏虎驍勇難敵不如智取今夜可往劫寨彼連日得勝而驕必不準備可獲大勝賈翀然之當夜悄悄引兵至安營所在一看乃是空營知有詭計速退人馬行不裏許忽左邊山谷中一聲鑼響喊殺連天姚太師慌忙接應忽右邊山谷中鼓角齊鳴亦在喊殺賈翀慌忙迎敵少時前面又見火光燭天而起不知多少人馬一夜弄得東不是頭西不是尾黑地裏自相混殺良久韓搏虎始用生力軍痛加掩殺賊兵已心膽俱裂誰爲抵敵各顧奔走直得大寨人馬前來接應元兵始退韓搏虎雖已出奇得勝一心專望救兵接應方始放心誰知日複一日全無資訊只得仍然深溝固壘密布鹿角作死守計士馬乏食喜得隨州刺史孫良丕不時饋送賈翀雖累次衝突索戰亦無可如何韓搏虎日在營中超乘投石獎勵士卒真是人忙我暇養精蓄銳以待後援約有數日韓搏虎曰可以戰矣次日將兵馬列成一字長蛇陣乃橫刀勒馬大呼賊將陷陣姚太師見其兵少全不在意以大隊人馬乘之三路並進使他首尾不能相顧誰知兵不在多而在精韓搏虎用皂旗一層反將賊兵大隊圍在核心姚太師身帶重傷死戰得免韓搏虎又勝乃下令曰兵威已震來日可乘破竹之勢殺回德安請督師添兵剿賊衆軍各宜努力違者斬首次日韓搏虎拔寨而起身先士卒姚太師縱馬敵住被韓搏虎手起刀落斬于馬下賈羽辛不敢抵敵拍馬落荒而走一時逃兵如摧枯拉朽逃脫者皆鳥獸竄韓搏虎保護人馬大殺一陣直望安陸而去回至營中督師猶未傳令起兵且說呂翔自來德安府安陸縣北界離石柱山五十裏屯住人馬二十七日未下一令日日黃金不離手酒卮不離口一聞韓搏虎往救隨州怒其不遵將令擅往挑敵不發援兵當時有荊州團練使臧超出曰同一禦賊何論先後韓萬戶應城破敵在我則爲犄角之勢在彼已有掣肘之虞掃平雲夢在此一舉臧超願率本部往應城助陣呂翔又遷怒臧超妄動有亂軍心連聲喝退臧超滿面羞慚而出時府尹夏侯信叔亦在營中聞之大驚急入帳諫曰臧團練之言深爲得計韓萬戶應城陷陣督師若不救援應城再陷德安震動能保督師之威名乎且奉旨出征韓陷州郡甚非吾主遣都督之本意也呂翔被夏侯太守問得低頭不語又羞又惱徐曰府公且退出師尚容商議夏侯太守頓足曰韓萬戶應城望救急如星火都督獨斷獨行之事若待商議則應城隨州休矣呂翔心懷忌妒素性又庸懦鄙吝見信叔出言太激作色而起曰營中將士一令不許妄下來日整備戰船先攻雲夢水寨違者定按軍法言罷拂袖而入夏侯信叔暗暗叫苦連聲歎曰督臣如此大事可知矣不數日韓搏虎全師而還細言前事滿營將士爲之憂喜交集喜者喜其克敵有功憂者憂其不免於罪一入帳中參見呂督都言其七敗賈翀兵恢復二城細述交兵形狀呂翔這奴才有心要結冤家不分皂白喝令斬訖才吩咐一聲已推赴轅門韓搏虎大聲呼屈且曰小將雖未奉令念有微功乞責後效呂翔大怒曰汝貪戰邀功不候將令僥倖得還尚然誇口營中將士盡似汝躁率妄動大寨空虛賊兵四至襲破本府此行誰克當之韓搏虎怨氣沖天俯首無語滿營將士一齊跪下求免呂翔執定不從益怒曰一人作梗萬夫違令喝令速斬剛剛綁出轅門有漢陽府隨征數千軍士大呼曰我等血戰疆場有功不賞可憐韓萬戶逐日不解甲連夜不安寢數日一食九死一生始殺敗賊兵恢復故城不惟無功而且有罪女奉旨出征遷延日久逗遛不進釀成賊勢先調精兵自衛興師二十七日不下一令妄斬有功殺了韓萬戶我等皆叛附雲夢去矣滿營士卒一齊鼓噪呂翔嚇得面如土色手捧著面劍令斬不可令赦不便呆呆看定左右臧超見此光景也不用將令竟至轅門將韓搏虎松綁呂翔無氣可出令逐出營去諸將不敢再諫韓搏虎出營朋好相送上馬快快而別
