body:
  text: 第九十二回潞安王出守歸國元文宗既弑兄奪位欲泯其迹以箝人口乃加殊恩於明宗二子而封長子妥歡鐵木兒爲潞安王次子懿璘質班爲鄜州王俱養于宮中視若己出惟右丞相燕鐵木兒司徒香山等以妥歡鐵木兒乃明宗養子不應居在宮掖令出外藩免生他變帝以明宗眷愛之且尚幼未之許也時燕鐵木兒已冊封太平王加太師獨握大權威行宮省帝倚恃之以泰定帝後宏刺氏色尚未衰燕鐵木兒通焉欲收爲妻而見潞安王在宮恐將來成人掣肘遂讒間兩宮以危言撼帝帝不能無動妥歡鐵木兒即迎機請鎮雲南仍繼先帝之志帝許之此時妥歡鐵木兒年十一歲矣原有明宗舊日一班文武將校護向雲南而去鄜州王懿璘質班年僅五歲乃留于京師帝尊崇釋教較泰定尤甚封西僧輦真吃刺思爲大國師一日至京帝命朝臣一品以下皆往郊迎大臣悉俯伏在地雙手進觴帝師端坐不動受之惟國子祭酒張養浩獨挺身舉觴立而進曰帝師釋迦之徒天下僧人師也予孔子之徒天下儒人師也請各不爲禮帝師笑而起舉觴卒飲衆官爲之栗然帝日受佛戒謂清淨之理可與天下相安於無事而邊報傍午一時若遼東陝西武安祿餘俱有兵起諸王禿堅烏蒙羅羅斯等各據地以叛尤甚者集慶路之花山賊橫行州郡行省莫可如何報入燕京帝笑謂宏刺皇后曰此輩鼠竊滿腔都是天子之心所幸宋昭帝乃恭默之主不然宋師一動朕宵衣旰食又寢不安枕矣即下詔以監察禦史張士宏爲行人往聘于宋以修舊好命各行省徵調兵將嚴行討戰時諸路小警隨撲隨滅惟集慶路花山賊行省參政許有壬檄調京口都督耶律霸引兵討之初戰互有殺傷再戰官兵折損無數賊遂不可制奏入帝不悅五月白虹並日而出長竟天秋八月天鼓鳴于東北禦史台臣皆上章論事以銓選之弊因入仕之門太多黜陟之法太簡州郡之任太淹朝省之除太速當設法以救四弊應天變庶時事可挽帝覽奏不省時已寢疾乃詔太平王燕鐵木兒入宮遺命傳位於鄜州王燕鐵木兒曰不如立燕帖古思帝不許隨殂燕鐵木兒即征會諸王至京師立鄜州王懿鄜質班爲帝是爲甯宗時年七歲百事皆裁決于中書燕鐵木兒在位二月而崩燕鐵木兒又請太后立燕帖古思太后不可曰吾子尚幼潞安王妥歡鐵木兒現在雲南今年十三禮當立之燕鐵木兒聞言色變欲再諫阻後遽下懿詔命諸王迎潞安王于曲靜既至上都燕鐵木兒出城迎入途次並馬徐行自陳迎立悉出己意潞安王年幼見燕鐵木兒聲勢凜凜氣焰熏灼不敢仰視亦不敢回答燕鐵木兒疑之王既入京久停懿詔不獲冊立太后及諸王屢請于燕鐵木兒燕鐵木兒故緩其事日與姬妾飲酒作樂偎翠倚紅體益尪羸十餘日遂死後乃與諸王大臣立潞安王爲帝且囑之曰萬歲後仍傳燕帖古思勿負吾意潞安王再拜受命告廟升殿改元元統是爲順帝以伯顔爲太師右丞相燕鐵木兒弟撤敦爲太傅左丞相從此蒙古大統仍暗屬於炎宋矣
