body:
  text: 第九回北固亭范國昌望氣卻說狄定國領兵退守饒平次日其子狄勇亦至言賊內外夾攻我師已潰藍關亦失定國即命狄勇速往肇慶府苗秀實處乞師恢復潮州一面申明參政命將出師來援狄勇去後鍾明亮隨率大軍攻打饒平定國出其不意用精兵夜突其營敗之明亮大怒揮軍四面攻打火炮石子雲梯沖車一齊並用誰知定國長於守禦隨方禦之明亮智勇俱困退二十裏下寨時饒平縣知縣姓白名映雪者浙之秀水人也先世原歸德府商丘人氏因父白璉以宋度宗咸淳進士官秀水令遂家焉映雪七歲而孤母樊氏教之每夜以書燈就績樊氏有賢行教子方嚴有法映雪秉母訓素廉謹學成亦登進士遍交當世知名往來從遊如非其人樊知必叱之跪而責之曰汝不親賢人君子而狎比此類吾不忍見爾有玷家聲也或泣杖之或終日不與言必映雪再三叩首謝罪改過至絕其人而後已至是以家貧親老作毛義捧檄奉母任所官居廉明頗有循聲饒平時有一方翰林挂冠而歸家富無子複納一妾後妾生一女而妻亦於是日忽生一子妻本朴而妾甚黠暗將己女換去其妻之子妻知之問妾妾故狡詐又複便捷與妻相爭方適自外歸不能決妻兄大忿因質於官映雪換二婦質訊爭執如前妾雲系己出某處有誌某處可驗妻雲惟己所生是子妾者女也烏得欺心暗換牴牾不已映雪令將其子暫存署中交付乳母來日複問次日至舟中傳齊先問方方亦言妻妾俱同日産無可證驗次問二婦二婦你爭我辯聒絮不休映雪大怒曰子嗣以承禋祀娶妻納妾皆爲子也二婦無良究竟有子不如無子命汝夫另娶將其子棄擲水中旁立一役十分狼毒果然叉手就往乳母懷中奪來抛下水去重重包裹乍沈乍浮猶圉圉蠕動已無啼聲其妻見此光景五內俱裂不顧生死望水中便跳思往救援其妾端然不動映雪速令救起其妻撈上其包內裹一魚見水自然動了複令人回衙抱其真子至大罵其妾既爲爾子如何不救妾無言可答用刑具一嚇乃悉吐實又有兄弟三人以分居涉訟者兄宦爲州倧兩弟俱農家中經紀因兄宦遊歸令弟各爨外藏錦綾二笥不與分閨闥噴有煩言漸至詬誶因以涉訟映雪於末後判雲何處西風夜卷霜雁行中斷各淒涼吳綾越錦藏私篋不及薑家布被香其兄見之肉袒謝罪兩弟側然感動映雪複曉之曰手足之愛天性也汝弟兄雖有三人要皆父精母血所成實父母一人也兄弟參商其如父母何三人抱頭大哭誓不複分叩首而去一時傳爲美談此類甚多不必具述映雪此時見四郊多壘戎馬倥傯生民塗炭又慮城小難守恐驚其母晝夜焦思一日見定國獻策曰賊能用金人鐵浮圖之法我兵獨不能用羌人鐵葉車之法乎定國大悟曰甚妙即請貴縣督造守禦之事吾力任之待造齊援兵若至用此車布壘陣法破之可獲全勝映雪遂連夜督工匠人等造作戰車其車兼用靖康時李綱遺法兩竿雙輪上載弓弩又設皮籬以捍矢石下用鐵葉裹釘作裙以衛人足長兵禦人短兵禦馬旁施鐵纖貫之可陣可營每軍用兵二十五人四人推竿以運車一人登車以發矢餘執軍器夾車兩旁每軍共二千五百人以五之一爲輜重及衛兵余當車八十乘即布爲方陣則四面各二十乘而輜重猶得處中鐵浮圖雖勇而銳不能當矣督造已畢正值狄勇自肇慶而回言苗秀實頗懷觀望托言海近盜發不測不敢擅離定國怒忿恰好參政梅殷統兵五千親臨潮陽來援已在十裏外下寨定國大喜速往參見起居禮畢梅殷問曰聞賊兵甚銳攻城掠池勢不可擋吾已調有兩廣峒丁在此憑統制分布作何計較定國聞有峒丁起謝參政曰吾計成矣遂告以鐵車之故梅殷亦可其策定國辭歸次日五鼓分派衆將各授方略軍中蓄銳日久間有鬥志定國希望一鼓成功振頓精神決一大戰請參政梅殷縣令白映雪留重兵守城策應兩軍對圓賊陣有李虓章王同出馬狄勇敵住戰不數合詐敗而走鍾明亮麾動大旗鳴鼓進兵只見朱賁從東殺來曹順從西殺來童義耿星星領鐵浮圖從中殺來三路齊進勢若長蛇中軍衝突兩翼救應首尾相顧進止不越步武定國暗中驚服賊兵正仗鐵浮圖奮勇攻殺搶掠馬匹器械無數忽元兵散而複合號炮一舉定國放出鐵車步步聯營來如潮湧山奔堅如銅碉鐵砦銳不可當鐵浮圖雖勇衝突不動漸漸少退元兵鼓聲響處更出生力軍馬兩翼殺出此兵便是兩廣峒丁概用弓矢箭無虛發定國命軍中大呼降者免死賊將李虓章王同曹順童義等已被衆軍剁爲肉泥耿星星身中數矢棄馬逃竄鍾明亮血賤滿身死戰回寨方欲改換衣甲而走奈鐵車層層圍裹上來營已攻破自知不免先殺妻子然後仗劍自刎一時賊兵屍積如山血流成渠降者稱是有朱賁曹能口稱願降衆軍縛定一戰成功大獲全勝其漏網逃去者不過十分之二參政梅殷大喜舉酒迎勞曰將軍一戰而捷凡有大勝者必有小敗若非前此失利以驕敵心恐成功未必如此之速也定國遜謝曰此衆軍努力白縣令獻策功也參政梅殷即駐師饒平命定國肅清餘黨兵至潮州耿星星離陣即望台州而走張師旦孤掌難鳴亦棄城而走餘黨隨剿隨撫所陷州縣一時恢復梅殷師回廣州表奏元主擢梅殷樞密正使入燕與完澤中書同參密勿也狄定國廣南參政兼招討使隨征將士俱有升賞饒平知縣白映雪除授廣南道監察禦史制誥方下同官相慶映雪母氏樊徐謂之曰汝非宋人也家貧而仕已得微職不無報效急流勇退在此時矣映雪即日表還制浩不俟命下挂冠歸浙不久其母臥病不起疾革渭之曰今後慎勿再仕蒙古名義二字不可不慎也其他吾無慮矣言畢遂卒雪號慟欲絕葬祭如禮墓廬守制每潸潸作孺子泣曰終天遺恨風木生悲再不能奉慈母之訓矣聞者悲之映雪仕饒平年方弱冠尚無配偶服闋後聞有故人范國昌司馬肅在京口將往探之沿途盜賊縱橫紆道始達鎮江又聞國昌等已往丹陽再至丹陽三人相晤悲喜交集各訴契闊映雪述母遺命二人不勝感歎范國昌曰當今南北雖有數人皆無大志搶州奪郡殺戮生靈徒甘盜賊之名反使元人借爲口實我等身如轉蓬未知瞻烏爰止於誰之屋耳三人再回丹陽留連數日買舟放回京口映雪在舟中略敘前事極言狄定國頗有將略廣南得人可謂繩其祖武但定國有功於蒙古將來事業恐亦徒爲蒙古之用矣范國昌曰仕者自仕用保民也退者自退以適志也達者審所出處以應世用而已于蒙古何與子司馬肅亦深然其言曰無名分者固亦無傷但恐後世笑越客之徒勞耳三人舟次遠遠望見南徐蒼蒼冥冥如輕煙一抹蜿蜒由黃鶴而來真百越舟車之會三吳襟帶之邦也沿江波濤渺渺如匹練飛去一望無極將近丹徒見前面金山吳山色色如畫范國昌喟然歎曰長江天塹所以限南北也江表三百年王氣盡矣時映雪遙指城北一山謂曰峭拔聳翠者非北固山耶我等曷登山一望二人遂同上岸直登北固此山三面臨江高數十丈江景盡在目中視鎮江府治外蔽國畿內連天塹無惑乎金主亮吟立馬吳山第一峰也映雪又望金山寺在揚子江心距城僅三五裏許歎曰韓世忠張世傑當年大戰阿術風景猶如昨也三人徑至山頂遙望金陵佳氣鬱鬱蔥蔥皆曰建康不出百年當有應運而興者至亭中坐定良久亭上有蘇子瞻飛白大書三字曰北固亭亭下自晉唐以來代有名題南宋尤甚三人逐一賞玩不置皆曰此亭經兩晉六朝後爭地爭城不知幾許無情江水淘盡古今無數英雄想像劉夢得詩意蕭蕭廬荻悠然意遠睹此名勝亦宜分韻記其事范國昌遂即景詠京口晚渡雲輕帆如葉下關頭北國蒼蒼動客愁雲淨蕪城山過雨江空瓜步岸橫秋鈴音幾處煙中寺燈影誰家水上樓最是二分明月好玉簫聲裏下揚州司馬肅曰我意不在京口當詠金粉六朝以懷古命意雲玉樹庭花唱已遙金陵王氣又重消龍蟠不去懷雙闕牛首空回望六朝故壘雲低天漠漠荒林秋盡兩瀟瀟石頭城畔多情月夜夜來看過上潮白映雪猶凝思未定二人問屬意所在映雪曰適觀金山有感未免語涉譏訕耳詠曰一戰金山敵已紓偏安南渡竟何如雲開鳳嶺笙歌滿夢冷龍城驛使疏海日忽驚宮漏盡春潮猶笑將壇虛誰知立馬吳山客不惜千金買諫書三人互相甲乙評覽一會忽江下一隻官船呼哨而至泊近山下內一差官上岸徑入亭來映雪認定曰此廣南差官也二人避去映雪上前施禮差官遂言廣州狄參政聞大人服闋上表薦舉升授西台禦史之職因差某來秀水預先知會不日誥敕下了請大人勿辭某從秀水物色而來誰知相遇於此命僕從將禮物呈上映雪急止之曰九重丹詔休教彩鳳銜來一片閒心已被白雲鎖住從此予將往南山之南北山之北與草木同朽矣爲我深謝狄參政當圖後報耳遂吟詩以見志雲青雲有路擢西曹參政十分薦剡勞下乘難追千里馬虛名恐誤九方臯嵇康自信趨時懶少室誰雲索價高總使陽和動鄒律心如流水去滔滔吟畢拂袖而出差官一場沒趣仍回廣州范國昌等遊興正濃尚欲留戀北固忽被差官唐突至此聒絮一會直待映雪話畢始同登舟過江遊芙蓉樓而去
