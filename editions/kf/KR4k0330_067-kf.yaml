body:
  text: 第六十七回宋主重立元祐碑宋重康四年帝命集賢直學士呂希賢右補闕張純粹給事中楊懷清富珩等提學各郡命崇文館大學士李仁恭權知貢舉得士百餘人擢用爲州縣長吏所在有循聲時稱得人帝甚喜考官重有賞賚一日帝微行至廣祐廟見一碑字已漶滅不可識末題元祐五年立碑上有人題詩雲微軀飄泊豈無家只爲蠅頭一念差白髮已添頭上雪黃金都盡眼前花夢魂自信歸鄉國骸骨誰憐沒草沙寄語妻孥休問蔔十年戎馬陷中華帝讀畢即訪其人乃郝文慶安西州敦煌人也蒼頭白發僑居廟中自言幼業儒其後貿易入閩因元兵陷沒不得歸帝憐而恤之使歸因下詔各郡所在有羈旅阻滯及孤苦疾病者從優賑恤務使得所帝又見廟中碑上有元祐五年等字因下詔求元祐黨碑觀之欲盡得當時諸賢姓名詔下旬餘有潭州守范時中覓得此碑獻之帝原碑雲皇帝嗣位之五年旌別淑慝明信賞罰黜元祐害政之人靡有佚罰乃命有司夷考罪狀第其首惡與附麗者以聞得三百九人皇帝書而列之石置於文德殿門之東壁永爲萬世臣子之戒又召臣京書之將以頒之天下臣竊惟陛下仁聖英武遵制揚功彰善癉惡以昭光烈臣敢不對揚休命仰承陛下繼述之志司空尚書左仆射兼門下侍郎臣蔡京謹書元祐奸黨文臣曾任執政官二十七人司馬光文彥博呂公著呂大防劉摯範純仁韓忠彥曾布王岩叟梁燾蘇轍王存鄭雍傅堯俞趙瞻韓維孫固范百祿胡宗愈安燾李清臣劉奉世範純劄陸佃並元祐黃履祥符張商英蔣之奇元符曾任待制以上官四十九人蘇軾劉安世范祖禹朱廷光姚勔趙君錫孔文仲孔武仲吳安時馬默錢勰李之純鮮于侁趙彥若孫覺趙高王欽臣孫升李周王份韓川顧臨賈易呂希純曾肇王覿范純粹呂陶王古豐稷張舜民張問楊畏陳次升鄒浩謝文瓘並元祐岑象求周鼎路昌衡徐勣董敦逸上官均郭知章楊康國葉濤龔原朱緩葉祖洽朱師服並元符餘官一百七十七人秦國黃庭堅晁補之吳安詩張耒歐陽棐劉唐老王鞏呂希哲杜純張保源孫平仲司馬康宋保國湯或黃隱畢仲遊常安民汪衍餘爽鄭俠常立程頤唐義問余卜李格非陳瓘任伯雨張庭堅馬涓孫諤陳郛朱光裔蘇嘉龔夫王回呂希續吳儔歐陽中律並元祐尹才葉仲李茂直吳處厚商倚李績中陳祐虞防李祉李深李之儀范正平曹蓋楊琳蘇芮葛茂宗劉渭柴袞洪羽李新趙天佐衡鈞袞公適馮伯樂周誼孫宗范彙中鄧考甫王察趙峋封覺民胡端修李傑李貫石芳趙令畤郭執中金極高公應張集安信之黃策吳安遜周永徽高漸張夙鮮于綽呂諒卿王貫朱紘吳明梁安國王古蘇迥檀固何大受王箴鹿敏求江公望曾紆高士育鄧忠臣種師極韓浩郁貺秦希甫錢景樣周綍何大正梁寬呂彥祖沈於曹興宗羅鼎臣劉勃王極黃安期陳師錫于肇黃遷黃俠正許堯甫楊朏梅君俞胡良寇宗顔張居李修逢純熙黃才高道恪曹輿侯顧道周遵道林膚葛輝宋壽岩王公彥王交張溥許安修劉吉甫胡潛楊懷寶董祥倪直儒蔣津王守劉元中王陽梁俊民張裕陸表民時世英諸潛陳唐劉經國扈充張恕陳並洪芻周諤蕭刓趙越滕友江詢方適許端卿李昭圮向訓陳察察鍾正甫高茂華楊彥璋彰醇廖正一李夷行梁士能並元祐武臣二十五人張巽李稱王獻可胡田馬田馬稔王履趙希夷郭子旂任璿錢盛趙希德王長民李永李愚王庭臣吉師雄吳休複崔昌符潘滋高士權李嘉亮李玩劉延肇姚雄李一基並元符內臣二十九人岳全忠陳恂張士良知新李綽譚扆竇鉞趙約黃卿從馮說魯燾蘇舜民楊稱梁弼陳恂張茂則張琳裴彥臣李稱王緩閻守勤李穆蔡克明王化基王道華鄧世昌鄭居簡張祐王化臣並元祐爲臣不忠二人王跬元祐章惇元符右今准尚書兵部符傋降敕令旨揮立石監司廳崇寧四年二月日帝觀畢笑謂文武曰此碑自靖國五年毀碎遂希傳本今獲見之猶獲寶頠矣元祐諸賢除溫潞兩公及范韓數十人外設無此碑焉能識其姓字此碑在當時獨蔡京以爲不可毀傳至今日則天下後世人皆不欲毀之矣命刻石重立朝門尚書李穆奏曰此碑當時立文德殿門者乃徽宗親書州郡廳事則蔡京筆也後星變遂毀當毀碑時蔡京厲聲曰碑可毀名不可滅也京之意欺當時並欺後世夫忠奸自有公論京之愚可謂甚矣學士白映雪亦奏曰崇寧中此碑發至開封推官命碑工安民刻石安民辭曰民愚不知碑中之意如司馬相公者乃目爲好人耶不受命推官怒欲加罪安民泣曰民被役不敢辭乞免鐫安民二字于石末免得罪後世又江州有碑工李仲甯自顔其居曰琢玉官召刻石亦辭曰小民因蘇黃二學士詞翰以致溫飽忍目之爲奸耶揮淚而逃以免其役當時士大夫洵碑工之不若矣今陛下既重刻黨碑當鐫二名於末曰不刻黨碑石工某某以昭後世帝笑而從之
