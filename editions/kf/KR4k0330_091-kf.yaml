body:
  text: 第九十一回趙完普焚香告天元泰定四年詔皇子允丹藏卜往智泉寺受佛戒帝則禦興聖殿受無量壽佛戒于帝師輦真吃刺思郊廟祀事概用大臣攝祭監察禦史趙思魯以大禮未舉遂上疏言天子親祀郊廟所以通精誠迓福厘生烝民阜萬物百王不易之理也陛下宜講求故事以格純嘏一時禦史台臣莫不交章上奏極論此事泰定帝覽疏不悅群臣不敢複諫時西僧佩金字圓符絡繹道路馳騎累百傳舍不能容則假館民舍而因以驅逐其男子姦淫其婦女民皆苦之有奉元一路經西僧往返者百八十五次用馬至八百四十餘匹較之諸王行省之應供十多六七驛丞無可控訴台察莫敢誰何有帝師輦真吃刺思弟子撒花只裏者奸橫尤甚佩金字圓符率其禿衆凡百餘人由福州經建甯路沿途所經見有孌女優童輒擄去民間畏如蛇蠍逃匿不遑一日撒花只裏偶經泰寧縣地迂道而過泰甯乃邵武所屬宋民聞之亦多驚懼杉關韓太尉聞此消息大怒檄校尉四人引壯士二百名往泰寧捕至將佩金字圓符者斬其首餘盡杖殺寇節度在長沙亦捕西僧十餘人處以極刑以故西僧騷擾不敢少逾宋界元泰定帝在位五年殂於上都大臣倒刺沙等立太子阿速吉八王禪爲帝泰定以支庶入繼遂承大統而英宗以南坡被弑失統外藩按英宗乃仁宗嫡子仁宗則武宗同母弟也武宗以母弟爲太子故仁宗得位而武宗二子長子名和世棘封周王出鎮雲南次子名圖帖睦爾封懷王出居建康武宗既殂弟仁宗立約以次傳位於周王懷王而丞相鐵木叠兒欲固位取寵乃立英宗爲嗣周王出鎮雲南行至金山西北諸王率衆從之遂居於北部及泰定帝殂於上都燕京留守燕鐵木兒謀舉大事徵集兵將露刃以會群臣曰武宗皇帝二子位當歸之不從者斬群臣失色一時商議以長子周王遠在沙漠猝不能至次子懷王在江陵少近乃迎入燕都懷王不允曰長兄在北當有天下燕鐵木兒曰人心向背之機間不容髮一或失之噬臍何及懷王不得已乃以九月襲帝位改元天曆是爲文宗自謂居攝布告中外時泰定太子阿速吉八已即位上都遣兵分道來攻燕都大敗而去文宗即詔齊王月魯帖木兒領兵一萬爲東路元帥不花帖木兒領兵一萬爲西都元帥合圍上都不旬日攻破上都倒刺沙等出降阿速吉八逃至西都爲亂兵所殺文宗既克上都乃遣使迎長兄周王和世王束於漠北時周王在漠北業已稱帝爲明宗文宗以帝位讓之固請還京明宗不可文宗又遣右丞相燕鐵木兒奉寶玉赴漠北再三陳請明宗始許之因遣使立文宗爲皇太子皇太子乃自發京師往漠北迎之天曆二年九月明宗駕至旺忽察都與皇太子弟兄相見握手言歡乃大宴皇太子及諸王大臣于行殿是夕帝與皇太子同榻而寢時惟丞相燕鐵木兒宿于外寢天曉忽聞哭聲甚哀燕鐵木兒即奔入帳中取出寶玉此時皇太子已弑明宗燕鐵木兒即扶皇太子上馬向南而奔駕回燕京以明宗暴姐布告天下乃複襲位計明宗在位僅半年而殂中外頗多議論文宗患之先是有故宋趙和尚者即宋恭宗之子趙完普也恭宗以德祐二年北狩入上都初封瀛國公後皆爲僧皇后全氏爲尼居佛寺二年帝鬱鬱而殂又七年太皇太後謝氏崩于燕皇后全氏聞之亦不食而殂完普與其親屬轉徙沙漠靡所定處後徙薊鎮聞淮陽王張宏范滅宋擄掠宗室子女入燕者無數元人爭取之惟端宗一昭儀柳氏者被掠至燕業有孕元人皆棄之不取發至薊邱與趙完普等一處安置完普密問柳氏以身孕所由柳氏回言于景炎三年二月朔帝在謝女峽與妾一幸時宰相陳宜中已逃文天祥未至帝日日悲泣每望海祝曰願天爲朕生子與大宋滅元復仇四月帝崩於碙州衛王立是爲帝昺五月黃龍現於海中妾隨楊太后往觀感而有孕故當時改元祥興妾負孕迄今四年於茲完普聞言密爲保護多方維持誰知此胎非凡直懷至至治元年正月應大都路地震有聲之日方始分娩果然日角隆准方面大耳試啼聲英物也趙完普大喜命乳母用心撫養名曰趙一暗取背城借一之意不日令下詔遷於上都時宋元已和故完普不願入宋意蓋以武都敵於外己則撫養趙一成立以應於內後以丞相塔思不花奏又移應昌府至治三年太史令奏應昌有天子氣不應以趙完普等居之又徙五國城完普頻年遷徙每暗撫趙一日異日能爲我故宋雪恥者必吾弟也一日周王和世王束輕弓短箭帶領人馬獵至五國城見趙一愛之時周王無子欲取一爲養子即召完普說知完普不敢不從即命拜於膝下周王大喜命將校扶上駿馬簇擁而去完普依依不捨送了一程佇立瞻望直至不見人影始掩袂而歸周王引至上都更名爲妥歡鐵木兒及出鎮漠北俱命相隨至泰定四年周王妃始舉一子名懿璘質班周王稱帝于和寧之北爲明宗皇帝時妥歡鐵木兒僅八歲懿璘質班僅二歲迨至明宗暴殂二子俱隨文宗入于燕都趙完普此時與其親屬又遠在沙州妥歡鐵木兒聞之不勝感泣而完普在沙州聞周稱帝暴殂每夜於中庭焚香暗暗祝曰願吾弟早正大統暗續國脈爲大宋一泄仇恥則天實邁相之矣
