body:
  text: 第五十五回兩先鋒分剿雲夢雲夢臣寇賈翀虎踞江漢控制德安安陸漢陽鄖陽蘄州五大郡幾及十年累勝累敗元人竟無如之何後又與壽陽聯盟益肆猖撅惟至元二十九年集慶路大開武選賊將白文狻等混入建康大鬧選場賊夥汪夜義宋羅睺俱受重傷不久遂死從此勢焰少衰賈翀隨調白文狻仍屯水寨姚太師倪雕兒駐紮漢江口忽報宋師兩路來征正先鋒扈德威統兵三萬由岳州華容渡青草湖直攻雲夢副先鋒韓搏虎統兵三萬由湘衡直抵荊山取荊門州賈翀大驚忙令漢江口二將移兵迎敵雲夢水寨亦命準備是時韓搏虎鎮守肇慶奉檄征討挂副先鋒印所部有任天鵬夏侯傑馬晉臣楊孝伯虞凱庹靖廖雲陳同吳廣龐英十將共水陸兵三萬韓先鋒渡漢江擊楫爲衆將言曰搏虎昔在漢陽曾將此賊戰敗七次惜大功垂成不就賊勢益猖今幸得與諸君共佐明主建閫出師仗諸君威力搏虎若不能肅清江漢者有如此水衆將皆曰願聽先鋒之令共效死力時宋兵既過漢江賊姚太師倪雕兒擁兵阻住韓先鋒大怒曰二賊皆某敗將焉敢阻抑我師誓必擒之廖雲庹靖齊出曰割雞焉用牛刀二將結束上馬姚太師手舞鋼叉抵敵二將混戰一會韓先鋒所部皆有紀律之兵加以昔年威望賊兵業已膽落不三合姚太師已被二將戰敗賊兵皆鳥獸散韓先鋒麾動人馬如風雨驟至殘花敗葉無不委地賊兵死者降者不計其數所棄鞍馬器械山堆阜積姚太師遂奔走當陽倪雕兒乃竄過潛江韓先鋒遂撥任天雕馬晉臣吳廣龐英四將領兵一支追剿潛江自統全軍追剿當陽約定鍾祥縣會齊四將引兵追至潛江與倪雕兒大戰於覆釜洲倪鵬兒狡獪善走見不敵宋將如狼奔豕竄率兵又走京山據城死守四將築長圍困之百姓斬關獻城倪雕兒奪門出走爲任天鵬所殺盡降其衆壯者留之餘散歸農圃四將安輯民居始回安陸時安陸府城賊已久據府庫空虛滿目荒涼居民聞宋師平賊而來爭相出迎四將肅隊而入不一日韓先鋒全隊亦至時姚太師奔走當陽追至漳江竟爲韓先鋒所擒賊兵降者過半餘皆逃去四將出城迎入百姓焚香道左韓先鋒再三安慰命將姚太師綁至府城法場斬之以首級曉諭漢江上下居民人人稱慶無不牽羊挽車轅門助餉韓先鋒養兵三日即過漢陽師至沔陽州有賊將劉環鎮守韓先鋒令夏侯傑探敵且說劉環昔日曾犯襄陽爲扈先鋒所敗逃歸應城至是白文狻拔守兩陽聞宋師至準備迎敵時夏侯傑引兵討戰正當沔陽之南見劉環繞出西門乃北向迎之竟爲所敗次日馬晉臣出戰見劉環又屯營城南心中暗算須用心提防倘再敗時將爲夏侯傑所竊笑交馬不一合劉環臨以精銳之兵心內膽怯又爲所敗回營韓先鋒激得雙目直豎勃然大怒一面分撥諸將逐處埋伏一面令陳同出馬劉環抖擻精神大戰三十餘合陳同料難力敵詐敗而走劉環追來遂撒出錦標回手放去而劉環亦有心提防錦標尚未及身流星早已出手陳同收標不及已爲流星所中幾乎墜馬卻得吳廣龐英兩支伏兵殺出劉環始退陳同翻身殺回賊兵大敗劉環正奔走間忽信炮響時左有任天鵬右有夏侯傑兩軍阻定劉環被五將圍在垓心層層攻殺人馬漸盡劉環猶奮勇抵敵捨命衝突陳同深恨著中流星之仇隨放一鏢劉環滾鞍下馬被衆將砍爲肉泥五將合兵奔赴漢陽城下韓先鋒大隊亦至一鼓下之漢沔皆平諸將上功畢一面賞兵與城中父老歡飲數日令陳同守定漢陽就此養疾夏侯傑鎮江口任天鵬守安陸自統衆將望雲夢進發非止一日行經應城隨州等處韓先鋒不覺感歎物是人非昔年風景依稀猶在目前打探賊耗則賈翀智勇俱困被扈先鋒圍住水寨賊將如趙閻羅等戰死過半韓先鋒遂督兵倍道而進甫過應山濟東河忽遇一支賊兵倉皇遁走韓先鋒麾衆圍之全股被擒無漏網者就縛審問方知即雲夢二謀士廖維新翁國肜也因見賈翀勢敗欲遁鳳陽入壽春不期被獲韓先鋒大喜曰二賊助桀爲惡不可不明正典刑令檻車囚之韓先鋒最熟各處險隘分撥衆將緊守水陸要害防賊逸去自引大軍直搗夢澤助扈先鋒成功且說扈先鋒率舟師由青草湖放入雲夢三戰大破賈翀德安已爲史進嶽坤二將所襲賈翀逃入水寨與白文狻等死拒宋師扈先鋒圍之數重令種世虎略隨州拓跋琳取應城狄勇攻破應山廖翁逃竄衆將收復各處仍回夢澤同引大隊蹙之時已月餘白文狻累次衝突奈宋師如銅牆鐵壁堅不可動時賊中餓死者甚衆人自爲食力不能支賈翀與白文狻潰圍奪舟出走種世虎望見賈翀忙駕小舟趕近踴身躍入賊船砍翻數人一把擒定衆將繼至其子賈仁賈義俱死賈翀就縛白文狻乘空而走棄舟上岸自幸得離虎口急望應山而逃不數裏端遇韓先鋒一軍蓋地而來阻住去路交馬不一合被韓搏虎揮刀斬之賊兵死者無算餘皆降將士逃出者俱被各隘口衆將擒獲韓先鋒兵至夢澤見巨寇就縛大喜招回七將之兵略定各處餘黨盡平兩先鋒合兵德安大犒三軍招撫瘡痍之民各安家室所降賊兵老弱者盡歸於農賊寨焚之命將留兵鎮守始統大隊而歸至是雲夢漢陽百姓逃亡在外者乃還四郡百姓亦感兩先鋒之恩不盡矣
