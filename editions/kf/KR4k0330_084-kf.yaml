body:
  text: 第八十四回楊妃井太真洗心尚書葛天民奉宋主命略地廣右至蒼梧道經容縣之西有楊妃井者相傳以爲昔日太真所飲也好事者建祠其右肖太真於內香火特甚天民一見笑曰異哉生男勿喜女勿悲君今看女入神祠此亦文人韻事也命市紙馬冥鏹數十事入祠酌椒槳奠之奠畢在祠中觀玩一會詠唐人句雲元宗回馬楊妃死雲雨難忘日月新終是聖明天子事景陽宮井又何人天民歎曰床第之言不逾閾椒房宮閫之事史官何由知之洗兒一事新舊唐書不載溫公通鑒乃以天寶遺事入之此委巷之讕言也又論者動以武後楊妃同稱亦太不公武後與呂後等詎可與楊妃比例語雲姚宋若存妃子在胡塵哪得到中華林甫國忠之罪何妄加于妃子也感歎良久是夕宿驛中見一人冠步搖冠披紫霞衣佩紅玉曳鳳舄明擋翠羽飄飄欲仙侍者十余人相隨向天民斂衽謝曰蒙尚書枉顧惠及梓裏複承厚貺辨明前事馬嵬坡前死且不朽但予更有一言予與武後事雖不同而皆蒙千古不白之冤予並爲武後一陳衷曲共釋覆盆按貞觀十一年以武氏爲才人年十四二十三年太宗崩武後爲尼永徽五年以才人武氏爲昭儀年三十一歲明年立爲後子宏生三年矣宏道元年高宗崩則後六十歲臨朝七年稱皇帝改唐爲周又十五年中宗復辟遷太后于上陽宮凡十月而崩年八十二歲中宗景龍四年臨菑王討韋氏之亂封平王立爲太子年二十六睿宗太極元年傳位於太子明年癸醜改元開元開元七年予始生至二十三年始冊爲壽王妃予時年十七二十五年武惠妃薨二十八年度予爲女道士號太真召入宮時皇帝年五十七予年二十二天寶四載秋七月冊予爲貴妃十四載十一月祿山倡亂十五載丙申六月皇帝幸蜀予死于馬嵬年三十八歲肅宗即位靈武尊皇帝爲太上皇至德二載丁酉上皇還西京上元元年庚子李輔國遷太上皇于西內寶應元年壬寅太上皇崩年七十八歲夫武後不能亂唐高宗自亂也武後雖亂唐未嘗亂天下也唐祚之得長也武後系之也中宗非令主韋氏多失德房陵無異于桐宮悔艾不終於元德武後不帝而誰帝乎二十二年之間使環海恬波金甌無恙是豈中宗所能辦耶向使天促其年相從於乾陵之下韋條煽禍烈于鸚鵡不知李氏百年社稷作何景象蓋中宗之暗弱甚于高宗韋氏之才略不及武後高祖太宗殆陰壽之以待臨菑王之壯絜天下而遠之子孫彼中宗者爲之傳舍而已武後何嘗亂天下亦何嘗竟亂唐也至予之事則誠如尚書所言以貌見寵不與國政並無陰謀遠略稍有過於男子設使當年宰相非林甫邊帥非祿山何至雨泣鈴淋香銷羅襪波翻太液之飈虐煽驪山之焰致予齎恨而沒沈香亭畔花萼樓前彰彰可考也千秋下有知我心者其尚書之謂矣予言已畢請從此逝倏忽不見天民亦寤披衣而起挑燈少坐歎曰天下安危系于將相吳信宰嚭而西子沈冤唐任安李而太真蒙慘同一千古疑事也不意祠前一奠竟感其靈滌垢洗汙直至今日鬼猶如此人何以堪次日複至祠中再拜稱謝出俸錢十萬命容縣令爲新其祠奏聞宋主更發帑藏大爲恢廓改作宮殿而顔之曰靈妃置田百畝春秋奉祀自是而水旱疾疫合郡禱之靡不應
