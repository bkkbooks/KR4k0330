body:
  text: 第三十九回岳燕超練兵演陣涪陵王聞壽陽僞主秦錫帛將敗而漢陽巨寇賈辯猶盤踞雲夢騷擾州郡行省奏知元主而世祖年已昏髦置不爲意賈羽辛愈橫行無忌涪陵王遂欲乘此撫定衡湘平此巨盜以蘇民困隨集衆將議之關普靈曰元人專意壽春雲夢不以爲意此殆天與殿下收復衡湘之機會況安豐路雖複鳳陽僅一老將石中孚可制賊兵然已病故今耶律淵一人不暇爲謀必用江右臨安二省合兵剿之元人既征壽陽必不能回顧荊楚三湘可傳檄而定矣岳燕超曰先複衡湘次定廣右自不待言但目下秦錫帛雖無能爲恐元人亦不能殲除之也涪陵王問故燕超曰近日昂將耶律淵守定鳳陽不能移動江浙二省惟脫脫知兵已回上都其餘鎮將直庸才耳但錫帛賊黨終必自相魚肉不久必敗殿下且靜聽好音涪陵王曰壽陽雲夢二賊皆我大宋誤國元惡之後若親手刃之方泄吾憤但此時雲夢猖獗尤甚卿等宜整飭人馬以俟征進燕超奏曰我兵除分去屯田其在各營中尚三萬有餘臣等當逐日操演精兵以便大舉涪陵王甚喜燕超次日領兵至教場紮定聚衆將分撥人馬列作五營令馬遇樂屯其東用青色旗幟按蒼龍之勢種世虎屯其西用白色旗甲按白虎之勢楊孝伯屯其南用赤色旗甲按朱雀張懷亮屯其北用黑色旗幟按元武以劉瑛屯其中旗甲器械概用黃色按勾陳戊已又設招搖北斗七星皂雕旗自掌中軍始將各隊人馬逐一檢閱去老弱而選精壯士卒俱量才而用身材長大者拽弓拽弩矮小者持矛戟少壯者鳴金鼓強健者持旗者不能遠視者聽號令不能聰聽者望烽火肥者爲馬軍瘦者爲步軍日食鬥粟者爲前驅日行二百里者探機密更換紀律部伍一新乃命各部以五人爲旗十人爲總用隊長頭目執旗以爲其表餘者隨後務步迹相繼一不許混亂行伍二不許退後三不許喧嘩四毋得越規五要遵約束將禁約三令五申令軍中鳴鼓一鼓整兵二鼓習陣三鼓趨食四鼓嚴扮五鼓就行鼓聲既合然後舉旗旗舉處果然麾左則左麾右則右燕超約略演了一會見三軍頗服其威士卒亦皆用命乃召集諸將諭之曰練兵之法有五曰練膽練藝練陣練地練時五者缺一不可師若不練雖百萬軍可立潰也然五練之內又有三威一日清二日明三曰嚴金鼓威耳不可不清旌旗威目不可不明號令威心不可不嚴故軍伍貴嚴整士卒貴齊備今可令任天鵬爲軍政司兼五軍提點多用書手將練兵實錄繕寫成編分給各部使將士知陣法諳進退營屯有陰陽有生旺隊伍如何排列陣勢如何調度奇正如何相生動靜如何起伏以便將軍等教演士卒如何是入隊如何是出隊如何是行營如何是安營如何是對敵如何是摧敵如何是埋伏如何是攻奪營陣方向出入紀律各有條理大約三月可成精兵某當五日巡視一次不可違誤衆將受命訖自此日日操演燕超不時閱視見將益熟兵益精甚喜三月有餘一日涪陵王與種世龍等俱來視師燕超先至營中又下一十七禁令曉諭轅門將士觀之曰其一聞鼓不進聞金不止旗舉不起旗按不伏此謂悖軍犯者斬之其二呼名不應點視不到違期不至動乖師律此謂慢軍犯者斬之其三夜傳刁鬥怠而不報更籌換度聲號不明此謂惰軍犯者斬之其四多出怨言怒其主將不聽約束梗教難治此謂橫軍犯者斬之其五揚聲笑語蔑視禁約馳突軍門此謂輕軍犯者斬之其六所用兵器弓弩絕弦箭無羽簇劍戟不利旗纛凋敝此謂欺軍犯者斬之其七謠言詭語造作鬼神假託夢寐大肆邪說蠱惑吏士此謂妖軍犯者斬之其八奸舌利齒妄爲是非調撥吏士令其不和此謂謗軍犯者斬之其九所至之地淩侮其民逼淫婦女此謂奸軍犯者斬之其十竊人財物以爲已利奪人首級以爲己功此謂盜軍犯者斬之其十一軍中聚衆議事私近帳下探聽軍機此謂探軍犯者斬之其十二或聞所謀及聞號令漏泄於外使敵人知之此謂背軍犯者斬之其十三調用之際結舌不應低眉俯首面有難色此謂憾軍犯者斬之其十四出越行伍挽前越後言語喧嘩不遵禁訓此謂亂軍犯者斬之其十五托傷詐病以避征伐扶傷假死因而逃避此謂詐軍犯者斬之其十六主掌錢糧給賞之時阿私所親使士卒結怨此謂弊軍犯者斬之其十七觀寇不審探賊不詳多則言少少則言多此謂誤軍犯者斬之滿營將士觀罷無不股栗各歸隊伍悚息聽命燕超升帳衆將參見畢燕超謂衆將曰陣圖一書雖系行軍死法然爲將之道亦不可不知故陣而後戰者用兵之常不陣而戰者用兵之妙也今主上親臨視師三軍操演已熟諸將其各如約毋違軍令衆將皆曰諾於是燕超請涪陵王登臺觀兵耀武燕超下令演陣只見衆將整率人馬揮之則前伏之則退左右有法啓閉有路金鼓回應旗幟嚴整規矩準繩毫釐不差按九宮四象八卦列五行十幹十二支旗雖尚赤而引軍開道者則按五方制雖爲王而威儀號令則專五伐合四陣而爲一陣起則爲長蛇分一陣而爲四陣止則爲四門坐作起伏井然不亂涪陵王歎曰將軍練兵如此雖頗牧不是過矣曩日之兵真兒戲耳種世龍笑曰殿下曩日以兒戲之兵猶席捲各郡今兵已有紀律甯畏蒙古哉壽陽雲夢直拉枯折朽耳涪陵王甚喜獎譽將士大加犒賞燕超令三軍謝恩收陣一時歡聲如雷涪陵王觀畢有種世龍岳燕超等保護始歸
