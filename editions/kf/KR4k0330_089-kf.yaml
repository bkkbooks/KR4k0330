body:
  text: 第八十九回烏蒙僧巧設騙局宋右贊善張純粹外任爲武陵太守廉幹有聲於城內建雙忠廟四賢祠雙忠廟者祀唐張巡許遠也四賢祠者祀楚屈原漢馬援宋唐介嶽飛也蒞任數載生民安居樂業一日有一老僧擔經執杖詣郡自陳爲烏蒙僧由南海歸來入浙過寧波曉起山行經鎮海縣千丈岩拾得一襆囊內貯三百金複有小冊記其銀封甲乙及商人姓名俱甚分明僧坐岩前欲俟其人至還之半晌迄無人影欲自詣官又恐見疑反遭不測乃沿途遍問廉吏無出上國武陵張太守者願以銀貯庫乞太守出榜揭示通衢召商人至符其記數則還之太守大喜延老僧於郡齋爲設供養欲留爲郡中四賢等祠作常住僧僧辭曰老衲大事有托此願畢矣孤雲野鶴何天不可高飛而堪匏系也耶食後即飄然辭去太守器重之每宴僚友賓客即舉以作快論常曰元人奉西僧而西僧一出輒斂金錢官吏人民莫不苦之以視此僧判若天淵聞者皆嘖嘖稱羨數月後果有商人至自言秦中人販貨入浙日暮行急墮裝馬下近聞爲老阿師慈悲所拾貯於貴庫詣府自領太守令驗之無分毫異乃原璧歸趙商人口頌心銘感老僧之德更無已時傳播一郡人人無不知有義僧者欲見其人不可得也年余太守以事偶過岳州商人迎拜馬首自言僑居巴陵太守望見前日老僧持缽乞食于路僧一見太守急避匿人叢中太守遣人邀至甚歡遍語縉紳稱讚不已商人聞之請見則匍匐捧足頂禮而謝曰肉眼不識聖僧非神使君在此幾於覿面失之卜時義僧之名複播于嶽州居無何洞庭湖內君山黃陵廟及軒轅台年久傾圮欲重新改建議募貲而難其人士民皆曰此非義僧不可交口推之老僧遂慷慨任事即首赴武陵請張太守題募序張太守欣然命筆倡首捐百金郡民樂施者頃刻千金夏回嶽州及潭澧諸郡以修復名勝與義僧倡首莫不聞風回應數至鉅萬商人亦捐三百金爲佽助且曰此三百者聖僧所惠也募貲既足士民等議將入蜀中購木又請於僧老僧辭曰貧衲蕭然一身之外更無長物乃契重裝以行千里無乃爲盜齎乎衆皆曰阿師義不容辭廟成則阿師功德與平等閣相頡頏老僧不得已曰必欲貧衲肩此重任須官給郵符多備從人並秦商與俱秦商嘗言欲以報我必願往也衆稱善嶽州士民於是爲之蔔日戒行男女執香擎幢導鼓樂以送者幾於填巷塞途觀者蜂屯蟻聚祖餞于岳州城中商人亦貯數十篋於肆內令一老仆一蒼頭守之臨行又殷勤治酒邀鄰里囑代爲看守老僧與商同行凡二十余人皆張弓挾矢挂劍揚帆而去行至荊州石首縣正值重陽日僧與商人上岸市酒肴以啖從人竟日之內僧但食酸齏而已衆皆酩酊大醉一睡直至天曉呼僧與商俱不見而囊橐如故試一舉手輕如無物啓之則蕩然無存惟一利刃在其中衆人急歸嶽州鳴之官官發商人肆中所藏數十篋視之內皆瓦石其老仆蒼頭皆嶽州人半年前所傭也捕緝累年竟無形影武陵太守聞之爲之於邑者累日後張太守有猶子名崧者以省親關中道經華嶽間策蹇日暮偶遇大雪暫至路旁空室中少憩忽見有紫髯狐裘騎駿馬隨兩奚奴軒然而來者見崧熟視之頃曰足下非張公子耶崧曰然紫髯即下馬問何以至此崧以省親對紫髯遂笑曰還識我否崧茫然未對紫髯握手曰蝸居不遠家有濁酒可以談心幸相過從免今夕邸中冷寂相與上馬聯騎而行不數裏即有莊院門徑幽邃屋宇華麗登其堂陳設甚備咄嗟治具物物精腆席間金玉杯碗不下數十事紫髯浮白大嚼時時向崧大笑崧心疑之托醉就寢終夜反柵未嘗合目次日雪霽更治酌而複厚贈之複問曰竟識我否崧終不省分袂時乃曰爲我謝尊叔賢太守我即向日烏蒙僧也大笑而去崧歸至武陵以白太守太守悵然若失曰如此騙局真如鬼如蜮令人不可測度矣十分懊惱已而大笑
