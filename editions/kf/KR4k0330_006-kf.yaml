body:
  text: 第六回秦錦帛起義紫金山且說涪陵公趙晟在惠州甲子門遇元兵殺來急與榮公晸樊公昱並工部尚書馬南寶之子遇樂遇陽一齊躍上一舟而走元將唆都刺斜殺出弓弦響處樊公昱應弦而倒傍舟又有參政魯嗣源保護虞公趙景而走唆都躍過舟去將魯嗣源趙景擒下四人始急駕舟由港放入大洋正值順風瞬息已去百里方始放心時榮公晸年最幼受驚得疾在洋中一望惟見白茫茫一片浮光暗影海水連天渺無津涯又海風時發時止船愈顛翻不定自顧已不知置身何所舉目無依仰天號泣二馬與涪陵再三撫慰弗聽不及提防躍入洋中而死涪陵公趙晟大哭見此景況亦欲尋死馬遇樂止之曰殿下保重且看此舟吹至何所必有下落再作區處不一時遠遠望見一山三人甚喜將舟順風掉去隔岸隱隱聞有鐘聲恍惚見一白鸚鵡飛來飛去涪陵訝曰此補陀落伽山也已屬寧波府定海縣東洋遂同碇舟上岸登善財岩直入大士道場涪陵至蓮台下五體投地禱告不已起身出寺少憩略玩聖境偶見璧上有元中書史天澤留題雲使相函香至此誠願將海水救群生慈悲可謂消諸惡征伐容將息大兵金色圓光開寶髻玉毫妙相絡珠纓手中示現楊枝露願洗干戈作太平涪陵觀罷點頭數四日我之懷矣亦題一絕於後雲拜手慈航大士前宏深誓願本無邊人亡國破家何在底事重將問老禪涪陵題畢與二馬轉過潮音洞見一老僧方欲入定知是異人叩以休咎僧笑曰老別號古崖挂錫洞口暫托福地焉知休咎然頗善風鑒觀君日麗中天額角廣闊目光外射二肘如龍虎之狀貴不可言元武盤屈晦滿天庭不受顛越焉垂汗青異日勉爲之此間賊舟不時竊發非君所居三人謝別即時登舟方欲順海歸浙誰知大洋風色忽變一時逆轉向南飄去三人無可如何聽其所適無何已近一島船礙風阻白浪掀人慌忙棄舟上岸回顧即覆三人驚得目瞪口呆島中荒僻杳無人煙涪陵業已忍饑數日至此更舉步維艱了二馬扶持勉強而行險阻嶔崎榛榛莽莽迷天塞地荊棘鈎衣刺骨偶一躑躅又陷於濘泥溪壑真是艱苦萬狀正行間忽然跳出一隻猛獸似狼非狼似熊非熊小頭庳腳其毛如漆其大如驢見人迎面便撲涪陵早已驚倒在地且幸二馬孔武有力略略少退讓獸撲來側身躲過馬遇陽縱步入去揮拳便打馬遇樂回身手扼其頸緊緊抱住那獸方欲再縱遇陽已躍在背上用力一夾弟兄使盡平生之力那獸雖猛已動作不得大吼一聲山鳴谷應弟兄乘勢按翻草中揮動老拳盡力毒打那獸端然不懼弟兄二人手無寸鐵一毫不敢鬆手忽聞人聲少時有人奔上山來見擒猛獸招呼同伴齊前圍定馬遇樂汗流脊背大呼拔刀內有一人止之曰此獸非金鐵所能傷也慣食銅鐵以鐵錐錐之鐵皆碎落火不能燒名曰白豹惟羚羊角可以碎之隨行有佩此角者慌忙取出按其筋骨照身劈之可怪一時皮開骨折而死衆皆大喜方欲問訊二馬不暇酬答慌尋涪陵已驚死在地二馬大哭手撫其心猶溫內又一人曰壯士休慌此受驚暈絕不省人事牙門緊閉系涎潮壅塞耳非真死也以大指掐涪陵人中令人取水以藥少許灌之漸漸得蘇衆人此時有扛獸者有引路者有代負涪陵者二馬隨之至岸近見有三隻大海鰍頭一應帆檣舵靛篙工舵師俱備隨將涪陵負入艙中臥定調養篙問衆裏居始知皆廣南交趾之鳥蜒戶也鳥蜒戶者交廣浮海采珠客也二馬亦陳廣南香山人氏衆皆大喜曰此島名黑獸島乃大琉球國所屬島中方廣二千餘裏慣出白豹故以名之白豹之骨最強直中實少髓其齒尤堅其皮可以悴濕其腹內有鐵可以鑄劍切玉如泥凡南荒海島山澤中皆圖其形所以祛邪此獸有許多妙處壯士若肯同舟航海則三生有幸矣二馬問將何往答雲赴真臘時涪陵已可稍進飲食遂安心與衆商議同赴真臘國去訖且說安豐路國鳳陽府壽春知縣姓史名獻白壽原系史彌遠裔孫與刺史賈智深二人表裏爲奸敲擊萬民之饑膚咀嚼百姓之膏髓蒞任三載恨不得壽陽一片地皮並刮人宦囊去安撫廉得其實欲奏免二人二人情知上官惱怒下民咒詛思出一先發制人之計史獻白壽曰男子不能流芳百世也當遺臭萬年恒大司馬且爲之而況爾我乎賈智深曰智者觀時達者審勢奈無機會可乘耳史獻白壽曰此處有紫金山即漢淮南王宴賓客之八公山也晉謝安以敗苻秦周世宗大破南唐皆在此處累爲得勝之地先據此山與壽陽相爲犄角直窺鳳陽則安豐路皆在掌握中矣賈智深曰吾有契人秦錫帛久蓄異志未敢妄動吾今以書招之來時直獻壽春若何史獻白壽鼓掌大喜賈智深遂暗遣心腹送書直達江寧秦錫帛自杭州逃歸江寧府上下督捕甚急錫帛已山窮水盡當日得書正合機會令衆扮作大商富賈載以巨艦器械盡置艨艟底下偷渡淮清河以邢土龍藍天蔚二人作前隊出石梁其兄秦開岐作後隊出巢湖自作中隊直抵壽陽守將梁果大怒率兵拒戰至二十裏外迎住邢藍二人遂與交鋒不數合大敗奔回登城固守自以壽陽城堅可恃多備矢石以防攻打誰知賈史二人已暗開城門賊兵長驅直入粱果大驚棄城而走往鳳陽投其兄粱毅而去了秦錫帛不費寸尺之力遂得壽陽城中倉廩積儲最爲饒裕分兵以邢藍二將並子秦楠史獻白壽等屯紫金山自與兄開岐賈智深等緊守壽陽不日又得褚點龐奮汪維彥諸將來歸錫帛分佈攻取就近臨淮盱眙天長等縣皆有捷音秦淮大震駸駸乎遂有立馬吳山之志矣
