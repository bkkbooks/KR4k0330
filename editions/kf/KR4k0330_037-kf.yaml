body:
  text: 第三十七回涪陵王大興屯田卻說耶律淵既複甯國藍天蔚尚拒南陵以精兵圍之南陵城小而堅積儲頗足急切不下元軍中一時無糧軍吏稟曰請都督暫緩其圍待糧至然後攻之耶律淵乃下令曰營中無糧三軍各奮努力攻破南陵以就館谷機會萬不可失遂手執蠻牌身先士卒一鼓作氣軍士皆蟻附而上藍天蔚自知孤城難守殺開血路擁兵望吳興而去其徑縣旌德等處仍舊屬元耶律淵安撫人民已畢駐兵甯國整頓師旅欲隨取廣德州忽報鳳陽府石中孚年老病卒耶律淵大驚急調安慶府劉遇隆暫守甯國自率本部星夜往風陽鎮守一面爲石中孚發喪撥兵扶櫬歸裏安撫奏聞蔭子承襲追中孚爲驃騎將軍都指揮使石中孚巨鹿人年老知兵撫下素有恩信曆鎮京口廣陵淮安鳳陽等處聞其死者莫不泣下自此惟耶律淵一人作江淮之保障矣且說涪陵王控三省一十四郡日在廣南養精蓄銳一日有懷遠將軍史進往撫州犒兵薦一將至入見乃楊鎮龍部將慕容長也涪陵王命爲牙將慕容長拜受訖涪陵王又命學士白映雪贊善大夫皇甫惇制誥敕文書分齎各鎮將吏操練土卒修造器械嚴禁擄掠肅清盜賊司牧長吏更宜撫恤人民勤課稼穡務使春秋耕斂盡力田畝毋得騷擾民生以培元氣至各處稅糧有逋欠者連遭兵戈概用蠲免務令得沾實惠監禁人犯非十分不赦者釋放回家獄訟不許連累妻孥羈縻日月便宜諸事條陳分遞各處閩廣江右人心大悅一日涪陵王禦殿訪問群臣以恢復用兵之要參政范國昌曰兵家之用情狀萬變不可測度雖良平處之亦未能燭見其利害而逆斷其成功古者凡創業中興之主多引老成宿將相與謀劃蓋彼已身曆行間故謀必中機會而動必將成功趙充國所謂兵難遙度百聞不如一見也承平日久則武事廢弛殿陛左右率多不出都城坐取卿相之人耳不聞金鼓目不見旌旗成敗利鈍何由得知邊陲有警倉皇發縱稍有敗挫即行阻抑雖名將不能展其略矣是以婢爲耕以奴爲織未有不顛倒錯亂者也今殿下宜擇老成持重之將專而任之勿撓其志勿餒其氣勿掣其肘然後責其成功則事有專屬將盡將職相盡相職軍民皆不勞而理矣涪陵王嘉納之隨有左丞種世龍條陳便宜十事上之其目曰一舉賢俊二擇守宰三慎出納四裕邦儲五簡官職六寬民力七恤窮困八課農桑九立學校十旌節義又有參議司馬肅亦上九事其目曰新法制行賑恤變風俗信賞罰革弊政杜僥倖建宗廟定都邑開經筵涪陵王皆次第舉行惟定都邑建宗廟二事尚停議有待統制岳燕超承制遂上屯田便宜七事一謂屯田備糧戰守並用二謂開墾荒蕪可得沃壤三謂裁騎兵以省國家巨費四謂均逸勞以免農人饋餉五謂閒暇即訓練士卒兩不失業六謂積儲即繕治器械各自爲用七謂更番出征人勞我逸坐得必勝之理燕超曰臣竊觀肇慶府德慶州南雄府始興縣汀州府上杭連城二縣延平府永安縣以及撫州府晉安縣贛州府會昌龍南石城三縣俱有隙地可墾廢地可種並故田公田可得十余萬畝屯其要害浚以溝渠每人受二十畝量地容兵每屯軍以三分守城七分耕作給牛種教樹植複租稅民不困而餉益饒其無可屯田之慮則留兵捍衛如此更番叠戰更相休息以五佇列一寨名曰五花寨每隊五十人二十面戰鼓二十面旌旗多造兵器積儲糗糧更以十人掃地叫殺則兵堅寨固兵精糧足如此不越五年臣能保其必勝矣涪陵王大喜即命劉理屯德廣州傅突屯上杭連城二縣吳康屯始興縣虞凱屯永安縣焦芳屯晉安縣王方屯會昌龍南石城三縣而以張懷亮馬遇樂二人爲營田大使經理屯務總攝其成不時撫諭勸課又有關普靈進言請各鎮修軍政各關嚴邊防沿江置斥堠招附豪傑有能拔一州複一縣者即如唐時方鎮之法以團練防禦等使授之使人樂爲用士有必死之心軍無可奪之氣與蒙古一決雌雄不足畏也涪陵王甚壯其言乃曰行兵多算則勝少算則敗況無算而欲取勝其可得乎關普靈曰王者之兵貴謀而賤戰蓋以全取勝也故百戰百勝者非策之善也語雲未得勝先料敗預爲不可勝以待敵之可勝斯無不勝矣涪陵王欣然曰如卿者可言孫吳之略者矣隨又訪任相之法于右丞韓昭韓昭對曰自古人君惟賴一相相得其人則朝廷正而天下之事舉相非其人則朝廷亂而天下之事廢然任相之道在人主能擇能用能專能久而已昔管子語齊桓公有雲不能知人害霸也知而不能用害霸也用而不能任害霸也任而不能信害霸也能信而又以小人參之害霸也夫知人能信任而參以小人尚足以害霸矧欲建中興之業乎願殿下察管仲害霸之言留神于君子小人之間使諸臣得以竭盡愚衷則中興不日可待矣涪陵王會意乃曰昭烈任諸葛苻堅任王猛神宗任安石高宗任秦槍爲治爲亂其大較也衆臣畢悅而退
