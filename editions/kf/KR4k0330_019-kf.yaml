body:
  text: 第十九回狄招討一征羅浮江南蘇州之水莫大於太湖周圍八百餘裏界跨江浙兩省內有七十二峰居民聚處村落甚衆湖中水發後仍然波光如練一碧萬頃時有涪陵公趙晟馬遇樂張懷亮皇甫惇馬遇陽一行五人命舵工緩緩蕩槳舟過銷夏灣有一卜者姓劉名知幾面湖而居門首設蔔肆往來問休咎者絡繹不絕然以術自晦晨起乃自占一課得離之蒙內外皆伏藏不見訝曰新莽篡漢猶有中興天下事未可知也但蒙昧在山水中躍出雲衢尚猶有待言未已見湖上一舟鳴榔而來船頭上雲氣如華蓋又若龍成五彩隱隱不絕知幾望氣大異之忽斥堠上防湖軍士認定舟中有三人非元人衣冠疑爲奸細呼哨一聲駕只小舟飛去盤詰舟中人不服互相喧嚷軍士躍入舟中被一人打下水去一時舟聚如蟻各舟上皆用撓鈎長矛奮勇攔截奈湖面浩浩蕩蕩茫無際涯兵往東截舟往西走兵往西截舟往東走斥堠上十余號船全不濟事岸上總兵官到遠遠望見激得性起大呼扛混江龍來軍士慌忙將大炮扛至江邊安布舉火一時火不能燃衆軍正在慌亂之際舟去已遠總兵吩咐不必追趕約住軍士方去驗炮見藥線皆有水氣炮內藥雖盛滿水皆浸遍總兵大怒重責軍士發付畢轉身欲過蔔肆造訪知幾蓋知幾素與總兵相善故也時總兵來至相館見闃寂無人問左右居民曰先生何往皆言适才往東首去了行色倉皇不知何往總兵全不在意縱馬而歸殊不知劉知幾有心救護舟中人熄了火種不得不離火地也且說涪陵等因張懷亮打翻軍士一時冒險得離虎口急催趕放舟而行直出嘉興由秀水過錢塘江非止一日在舟中遠遠望見臨安城雉堞隱隱樓閣層層雖殘敗之餘而雨中春樹仍然萬家煙火氣象回視吳山在望劃斷江浙二省有衣錦懸留棲霞葛嶺無不南北東西洞天拱極涪陵淒然淚下謂皇甫惇曰天日依然潮汐如故故宮禾黍誰閔周宗某欲泊舟上岸一覽舊都諸君何如皇甫惇亦有心訪錢塘令葛天民消息皆言願往惟馬遇樂深以上海縣之事爲鑒堅拒不可逐日皆在舟中安宿直至嚴州府桐鄉具方始上岸過富春訪釣台再達衢州經常山縣張懷亮曰此去草平驛交浙省地界過此玉山即廣信府屬江右離撫州不遠矣一日抵臨川縣約行數十裏一山聳峙四圍廣闊樹木蓊蔚中忽有鳴鏑聲涪陵大驚張懷亮邁步上前一聲口號林中奔出數十嘍卒內有曾認得懷亮者大呼吾家大王好友來矣懷亮曰作速報知爾主說有大宋涪陵殿下特來造訪嘍卒如飛而去涪陵等又行過數重山隘方見圍場袤延十餘裏乃是練兵所在又見一山危崖峭拔孤是一徑上列鹿角天造地設兩扉石門豁然洞開只有飛鳥可下真是一夫可守萬軍難攻時劉瑛劉瑝弟兄迎出寨外涪陵見二人英氣勃發風骨偉然甚喜一齊拱入大寨逐一行禮起居畢二家各述行徑備達款曲便推涪陵爲軍中之主權領其衆任隨驅遣涪陵謝曰晟以不幸身遭國難海外殘喘得延餘生足矣軍中之主恐不勝任也二劉不許隨令帳下大小頭目隊長參見皆稱千歲寨中共四千餘衆俱有重賞即將石門山改爲龍會山更換旗號設宴慶賀劉瑛就筵中首先舉觴上壽曰殿下請盡此盞小將明心涪陵不辭飲訖坐定劉瑛曰先督臣力禦外侮賈平章款和誤國先君知事不可爲樊城未陷縱酒飲恨而卒我等嘯聚山林別無他意不願服事蒙古耳今遇殿下英雄有用武之地名義所在我等之志舒矣涪陵斂容謝曰諸君猶努力王室願複神州晟獨不能枕戈待旦乎但混一區宇勢難動搖螳臂當車其如石卵不敵何皇甫惇曰不然堯舜揖讓湯武征誅同屬應天順人自後得天下者或以德或以功逆取而必順守始得人心人心既堅根本自固所謂衆志成城也蒙古功德不聞而兇惡日甚自謂滅天毀聖崇奉西僧足以恐嚇天下也不知天下久欲荷戈逐之矣曲直之分勝負已定請殿下勿疑涪陵喜曰先生開陳大略使晟釋疑但在江南號召天下或易爲力耳馬遇樂曰金陵王氣盡矣紹興中且不能挽回何有今日劉瑝曰近來江淮已被群賊騷擾不堪楊鎮龍敗死秦寇稱尊自謂不日席捲東南其志不小涪陵曰志大才疏焉能成事竅據壽春毒痛生民不日當自斃矣某等作恢復大舉總以得人心爲本皇甫先生金石之言信不誣矣事之成敗尚賴諸君翼贊耳馬遇陽曰我等竭力保戴何愁大事不成但恢復州郡須要避瑕攻堅方得根株穩固張懷亮曰此去建昌府控三吳之襟帶扼五嶺之咽喉最爲緊要若論富饒則本府撫州衆人皆欲先取撫州可就糧亦屬近地涪陵曰不然仗義舉事宜先取形勝沖要之地居之使天下知我志在掃平區宇不徒利其蓄積可以養我士卒也因問撫州太守其人何如劉瑛曰太守姓侯名長孺原本萍鄉縣令在任清廉可風升授府尹其人雖有幹才然我等佔據此山亦置若罔聞未知何意也皇甫惇聞撫州府太守乃侯長孺大喜曰殿下議取建昌最爲得計建昌若下則撫州不勞張弓寸箭憑某入城曉諭大義撫州唾手可得涪陵大喜又謂衆人曰兵必練而後可用寨中嘍卒須逐日按隊操演方可征進劉瑛進曰此間兵士不上五千倘遇大隊焉能對敵目下作速招募張懷亮曰雖鞭之長不及馬腹召募之兵一時教演不及如驅羊入虎徒資讒口耳聞南安大庾嶺蓬頭砦史進兵皆精練有數千人觀變未動殿下何不修書一封開陳大略招之舉事或約會建昌或隨取南安聞其人誤投楊鎮龍麾下事敗深有悔心以卑辭厚禮招之必于於而來矣皇甫惇力贊此計甚妙遂代涪陵修書以鮫珠十粒黃金一封白金二封命馬遇陽下書直往南安而去涪陵一面整飭人馬一面儲聚糗糧準備不日攻打建昌不提且說廣南參政狄定國聞朱清張瑄在惠州府博羅縣界失了漕運二人被逮人京丞相伯顔又行文至廣南切責定國不能肅清廣南皆宜逮問定國憤怒探知賊在羅浮遂調齊兵馬並麾下部曲如都監陳同團練使王彥總統屈突申指揮廖雲惠州統制庹靖等一班將佐選精騎五千直搗巢穴離山五裏至沖虛觀下寨當日種世龍聞之聚集寨中王建忠牛竤史霸張燕種世虎吳廣吳康洪時錦虞凱王麟等商議迎敵王建忠曰此人系天使狄武襄之後家世爲將頗嫻韜略不如多備弓弩石子固守勿戰俟他糧盡引還從後擊之牛竤笑曰不必憂慮憑某一支槍也教他片甲不回張燕大言曰縱使忽必烈自來無能爲也衆將皆願出戰種世龍曰守者萬無一失戰則勝敗難保然不戰而守是示弱也敵兵遠來利在速戰牛竤張燕試探一陣相彼虛實不可深入重地吳廣王麟從後接應餘衆緊守寨柵不得稍懈違者定按軍法牛竤張燕各綽兵器上馬領輕軍一支下山迎敵牛竤在左張燕在右恰好列成陣勢見門旗開處當先一將面如傅粉唇若塗朱白袍銀鎧手撚長槍繡旗上大書一狄字牛竤大呼曰來者可是狄參政否定國回答已畢縱馬向前二將遂連環戰住至二十餘合定國敗走二將揮兵趕來忽一聲炮響兩翼伏兵一齊殺出二將圍在垓心左沖右突不能得出元兵大呼降者免死狄參政一支槍神出鬼沒二將此時方知利害正在危急恰遇吳廣王麟引一隊生力軍馬接應混戰一場天色將晚始各鳴金收軍定國回營謂衆將曰賊軍不可小覰沿夜巡更各宜小心至二更後人馬方才歇息忽報營西鼓聲大震賊兵不知多少量來劫營定國急命準備鼓聲頓止軍士方欲安寢又報東面火光燭天喊殺而來定國急出看時火光又息遂下令曰此疑兵計也諸軍各備硬弩防他衝突不得亂動如有擅離鹿角者斬首示衆三軍悚息聽命夜半後果然羅浮兵擊鼓呐喊而來幾次衝突恰到鹿角邊又被亂箭射回定國當夜立營不住拔寨退至三十裏次日定國抖擻精神整兵複至山下索戰山上寨門緊閉一人一騎不出攻之不破罵之不理定國大疑恐有埋伏令人四下探望又山勢綿亙重崗複阜絡繹不斷遂督兵直逼鐵橋見山寨周圍險固加以修篁密箐無路可上望見瑤台約高數百丈直扶霄漢回視梅花村朱明洞等處山皆平衍量無伏兵仍舊統軍奮勇直從寨前望海樓邊殺上未及半山寨門上矢石如雨滾木擂石一齊打下軍士死者無算不敢前進定國激得七竅生煙令軍馬且退相持數日全無動靜定國知是以主制客欲曠日持久徒老我師一日探得羅浮糧道儲在五龍潭定國暗令王彥庹靖二將引兵由蝴蝶洞抄小徑焚其輜重自以大軍攻其前寨可獲全勝誰知糧屯處乃是史霸虞凱二將守護史霸自恃本事尚不十分在意每每疏虞惟虞凱謹慎周密人不卸甲馬不解鞍時時巡綽嚴督軍士小心防守王彥庹靖行不數裏已被伏路軍士巡哨得知虞凱聞報火速知會大寨準備自己引兵扼險以俟只見史霸手舞雙戟如飛迎敵去了王彥庹靖正在探路尚不知離寨遠近忽見一將面如藍靛短小精悍率領數十軍士步行而來大呼臊羯奴快來受死庹靖訝曰此藍關源史二僄子也王彥欺史霸寡不敵衆自謂一鼓可擒誰知二僄子善戰善走不數合二將俱大敗而遁且說定國率全隊攻大寨仍舊前番模樣置之不理幾交衝突皆不能奪險而上捱至午後業已倦疲定國欲退時又慮二將無人救援牽制忽山上鼓角齊鳴無數人馬一齊殺下定國慌忙迎敵當頭一少年將白馬銀鐙弓弦響處一箭正中定國盔上簪纓俱落衆將一齊上前定國吃驚不小速問來將何名少年答曰定襄種世虎參政若不歸順山寨恐損半世威名竊爲參政不取也定國大怒方欲挺槍上前總統屈突申一刀一騎業已沖出世虎縱馬迎住大戰三十餘合毫無懼怯定國見屈突申戰世虎不下急令廖雲陳同助陣山上一聲鼓響吳廣王麟又領雙馬殺下生力兵馬一擁而來元兵不能抵敵棄甲曳兵而走
