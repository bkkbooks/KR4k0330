body:
  text: 第十六回楊孝伯擊楫過洞庭卻說關普靈寇複雷韓昭李穆楊孝伯斛律亢宗焦芳傅突一行八人由臨安至東京望見北宋諸帝陵寢關普靈曰此陵雖不免劉豫之難然較之會稽猶爲萬幸也李穆曰凡帝王陵寢鮮能永保不發者無他多藏金寶故也惟周太祖有鑒於此布衣瓦棺而葬其處心積慮不可謂不遠矣寇複雷曰伐掘陵寢每在易世之後而最慘者惟會稽不及二十年遂遭兇暴反不如草莽寒賤長保一盂麥飯於年年也韓昭等因至陵所惟見莽莽榛榛墓木無存經兩次陷沒後殘碑斷碣俱僵仆荒蕪叢中諸人感歎不已韓昭有詩以吊之曰玉碗金魚鎖寂寥墓門芳草綠蕭蕭悲風石馬依殘棘泣露銅駝臥斷橋燕子尚知憐舊主杜鵑猶似說前朝紙錢麥飯空華表零落楊花盡日飄諸人將由東京探種世龍閩廣消息經汝寧府過郾城次臨穎忽一橋飛岸臥波形如半月橋頭碧柳毶毶斜陽掩映旁有石碣題曰小商橋楊孝伯一見泣曰此先統制盡節之所也衆愕然孝伯曰先祖楊再興爲岳侯部下副統制曾以三百騎破金兵二千餘衆金人萬弩齊發力戰而死逮岳侯長公子雲兵至金人望見岳家旗號不戰而走先統制已是身無完膚焚其屍得箭鏃二升岳侯聞之哭泣者累日小子今履其地惡得不悲韓昭慰之曰令先祖爲國殉節雖死猶生足下異日克承先志即無忝祖德也衆皆歎息一日又至朱仙鎮衆皆曰此嶽候奉詔班師冤含千古地也李穆歎曰出師未捷身先死長使英雄淚滿襟凡爲名將者往往如斯真是古今同慨衆人欲赴開封聞漢陽盜雲擾扶溝延津等處開封正在出師乃望蘄黃過武昌一日將渡蘄水忽見對岸戈戟耀日有無數人馬正紛紛攘攘爭舟而渡衆皆駭異又見旗幟繽紛中驅著許多男婦號哭登舟稍緩者以刃脅之不從者棄置水中呼號哭泣聲聞數裏傅突定睛看時乃曰即漢陽盜賈氏弟兄也兄名翀弟名羽辛台州人俱粗暴有力專務私販往來江漢間官不敢捕某在襄陽耳其名與劉勇士趙和尚二人交情甚密相約劉起真定趙擾川蜀賈亂荊襄不圖趙和尚詐稱故宋福王之子廣王煽動愚民事未成被官捕磔於市劉驢兒生得方面巨目身軀雄偉又胸有三乳自以爲異聚衆至數萬起事被都部署朵爾察忽所擒族之餘黨尚衆蔓延未獲惟賈氏兄弟竟起漢沔糾集數千大掠州郡至今猶擾蘄黃洵荊楚之大患也有焦芳勃然大怒曰某與此賊誓不兩立荊襄乃某父母之邦昔年落魄鄉里蒙父老贈以資斧應募襄陽文煥降元某漂泊京湖賣演槍棒爲生曾在嶽州鹿角鎮遇二賊與某格鬥某賣弄本事打傷二賊二賊豪霸此鎮當場弄醜爲衆所笑遂懷不平火焚鎮中傷毀人民無數某懼而逃今又戕我故土當與截江決一死戰傅突亦忿然欲往關普靈急止之曰衆寡不敵大勢顯然今日非爾我爭戰時也衆人始趨麻城抵沙河以濟漢江遂達武昌泛鄂渚賞赤壁登松風閣上黃鵠磯各處盤桓數日時李穆有登黃鶴樓一律雲千里間關赴崔嵬浩然江上一登臺連天雲氣三湘合動地濤聲七澤來賦就浪傳鸚鵡手詩成誰識鳳凰才鄉園南望無多路回首臨安詠落梅韓昭等小住數日遂由江夏望岳陽而進方離莆圻至臨湘聞道路傳揚廣南惠州府羅浮山有英雄傳檄各處恢復故宋諸人皆以種氏弟兄舉事其在此乎不日已至巴陵縣一近峽口即是洞庭見湖中浩浩蕩蕩橫無際涯東連岳陽西抵澧州北據江陵南至潭州方廣五百里衆人此際恨不插翅飛近廣南一齊登舟遙望君山如青螺一點萃在湖心有楊孝伯擊楫言曰祖生尚有大志吾屬獨何人哉孝伯不能掃淨鼠輩恢復故國繼先人之志者有如此水焦芳傅突更咬牙切齒誓不能除襄漢之賊肅清桑梓者亦如此江一時爾願枕戈我欲負石正淬厲奮勇間忽隔水聞有歌聲聽之即鄰舟有人鼓枻而歌也歌曰三十六灣雲作屏君山遙點一螺青岳陽樓上誰人笛又引波聲下洞庭歌畢有人以洞簫依歌和之衆皆寂然側耳諦聽少時又一人歌雲黃陵廟下水悠悠斑竹淚痕千古留麥飯一盂原壟上家家正祭李潭州歌罷洞簫仍如前和之韓昭不覺觸著技癢興會勃發朗然吟雲重湖雪浪卷寒芒氣勢奔騰逼武昌今古客來詩境闊楚吳界破水天長雁沖曉日排孤嶼帆帶睛雲過岳陽回首君山青未了一聲長嘯入滄浪韓昭吟畢忽隔舟有人大笑而出雲三尺焦桐七線琴迢迢遠遠訪知音韓昭應聲雲未知誰是知音者想應他心即我心其人亦喜掉舟面前視之乃二年少書生也前者抱琴一張後者攜簫一管直過舟來寇複雷一見抱琴書生大呼曰竹生賢侄何來抱琴者慌忙入艙叩見複雷始偕攜簫者與衆人敘禮起居畢寇複雷將衆人逐一告之竹生曰此位王兄名用槐大名人也避亂湘陰與侄同裏侄從陷沒京西離華州者近已十年矣言罷嗚咽複雷亦感泣叩其父母則母亡父在複雷喜曰不圖弟兄更有相逢日也王用槐亦遍問諸人各陳衷曲因言廣南羅浮之事未知的否將往投之王用槐隨袖出一物以示韓昭昭訝曰羅浮檄文也衆人趨前觀畢無不思奮關普靈舉手加額曰我等東西漂泊行無定止今得所歸矣寇竹生王用槐見衆人氣概甚是敬服願同舟共濟相與談論湖中昔日岳侯平水寇楊麽約張樞密以八日奏捷何等英武逮檜賊以三字冤獄陷之和議以成南宋不振千古奇慘也王用槐感憤不過以洞簫寫其意雲鑿釜沈舟誓不還直期一戰掃腥羶班師冤獄成三宇破虜奇勳廢十年屈膝自甘天子任斷頭誰信將軍憐無情最是黃龍飲反兆金酋作賀筵用槐將洞簫故緩其音嗚嗚然如怨如慕如泣如訴真是一字一淚舟中人無不欷歔寇竹生曰一人向隅舉座不歡兄勿調此悲咽之音遂撫琴按拍勾弦徐引動角徵調爲發揚蹈厲之曲其詞曰強胡擾擾我提兵血戰中原憾未平大廈已傾支一木豈期長腳誤蒼生衆人聞其音錯落沈雄發越皆激厲起舞竹生隨手收拍不覺微重鏗然一聲遂斷一弦竹生撫軫歎曰角多宮少幽雅之操不足以寫高亢良有然也然斷此一弦主異日有災遂不復彈探首出艙訝曰已近南岸矣不一會即由湘江上岸已是潭州韓昭笑曰此家家正祭李潭州地也寇竹生亦笑曰蛙鳴聒耳怎及大呂黃鍾然潭州人慕李安撫固無日忘之可見奸者自奸賢者自賢涇渭各別也韓昭正容曰李安撫之盡節表表天壤安撫一亡湖南隨陷所謂以一人系千萬人之命也況其闔門自盡並將佐鄰民無不盡節忠義凜然古今罕有我等當具瓣香一伸景仰衆皆願往遂令人市祝儀數事竹生用槐導引至忠節廟中見題額顔爲宋故潭州刺史湖南安撫使敕贈端明殿大學士忠節李公名芾云云遂有廟祝迎入衆人默默禱拜訖轉過回廊壁間俱有名人懷感題詠李穆奮腕亦書五十六字於壁雲烽煙鼙鼓震潭州抗節孤城死運籌目斷青燐楚澤變魂歸朱鳥陣雲收徒勞齧齒埋殘壘卻愧降幡事不仇後輩瓣香思頂禮雁聲驚破海天秋時寇複雷欲往湘陰一省其兄竹生並約衆人同去衆皆從之將至笙東鄉竹生別衆先歸少時其父複雲蒼顔皓首曳杖而來望見複雷喜至泣下弟兄握手請衆先行至家備極款洽複雲喜礙英賢畢集骨肉重逢鎮日讌飲以暢衷情並招用槐之父王翁亦至其家評論時事贊成義舉十餘日衆人告辭複雲投轄不許韓昭曰某等心切恢復旦夕不敢偷安乞叟量之複雲遂慨然許諾祖餞於庭手撫複雷曰華州一別轉眼十年不料吾弟已有此氣宇昌大我寇氏者必吾弟也努力爲之澶淵之績不墜矣並勉勵諸賢灑淚而別竹生用槐直送至十裏外衆人苦辭方謝而歸
