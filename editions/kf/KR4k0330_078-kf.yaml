body:
  text: 第七十八回元世祖入夢崇聖元太后于大德元年幸五臺山中途受驚得疾回鑾上都臥病四年夏始崩附葬先陵時大德中始定郊祀之禮以冬至禮天夏至禮地元帝於悲悼中即壇壝行禮未免少疲禮畢而歸業已困倦宿于大安閣內忽內豎走人報曰世祖至矣帝整衣而起迎入世祖至玉德殿坐定形容慘沮起身執帝之手問曰爾曾降詔令中外崇祀孔子信乎帝答曰此至正三十一年七月事也世祖泣曰幸有此詔少減罪過不然朕幾不能出泥犁之獄受無量怖苦矣帝驚問之世祖曰有玉清瓊霄宮糾察使呂獻可者宋人也扈從上帝駕遊炎州而回適遇朕下滅天毀聖之詔獻可大怒飛章劾奏上帝張翁勃然震怒立命謝仙糾集雷部震陷太極殿先以示警乃遣金星垣司天府賢書之修文郎韓昌黎協同地下閻浮提主者大判此案韓修文既奉敕命即至九幽會同閃多羅十主者拘朕並西僧等征問朕至九幽宮中見鐵榜森嚴令人可畏少頃韓修文郎禦殿左右二王者相隨一文一武文者乃宋故相寇准武者乃隋故將韓擒虎也韓修文郎一見西僧等即拍案大怒曰禿子無禮敢汙滅上天譭謗聖教立喝左右用刑隨有鳥喙赤須吏人呼朕入見韓修文一見即責問曰元主以沙漠入主中國自應用夏變夷乃爲風教奈何嗜殺爲心狂悖爲政輒敢蔑視上天指斥蒼冥即此罪辜已加於商王武乙一等矣又況聖人立教自古及今無不奉以馭世淑身齊家治國胥本乎此汝以胡人作生民之主乃肆意妄行欲貶至聖夫尼父德與天侔賢於堯舜昭於日月豈因汝之貶能稍損其萬一也乎但汝狂悖之罪上通於天其他淫毒穢宸極虐焰燔蒼穹諸款尚不足數也左右寇韓二王齊聲曰元主狂悖擢發不足以數其罪萬死不足以蔽其辜朕無言可答只見韓修文謂左右二王曰元主之惡應與秦政同科待有嗣君能蓋前愆再行議罪可也寇韓二王即朱書一帖令鳥喙赤須吏引元主人泥犁獄中去訖朕不敢不從隨吏人出殿早有會稽陵中諸宋帝一齊攔定大呼還我頭來扭住不放幸得吏人以朱書示之諸宋帝始去轉至通衢則又見伊吾高昌鐵勒爪哇羅鬼三十余國夷王上前喝曰忽必烈也有今日揮動老拳爭相毆打朕被捶楚無算吏人再三諭解而朕已將顛仆於地幸有一縮頸深目藍面紅髯紫衣烏帽官人至彼等始散朕方起身與吏人行經數處始至一府上懸粉版大書曰無間獄吏人叩門門隨啓朕隨之入見兩旁夜叉遍是赤發蝟奮金牙鋒鑠臂曲癭木甲拿獸爪衣豹皮褲攜蒺藜杵銅叉鐵戟等物見朕即獰目電烻吐火噀血躑跳哮吼鐵石銷鑠朕見之喪精亡魄吏人以朱書示之皆叉手諾諾而退吏人引朕由左廂而上半裏許至一暗室門上書曰泥犁之獄命朕入焉則先有一人龍顔日角貌亦雄傑荷枷帶鎖蹲於床上朕問之自言即焚書坑儒之秦政始皇吏人賀之曰始皇脫離狴犴此其時矣始皇未之信吏人即以朕滅天毀聖之罪告之始皇即帶笑起曰朕焚書坑儒不過用以愚黔首未敢毀聖也朕之惡不爲惡瓜代者今日始至累朕候至二千餘年之久一時枷鎖即自脫落吏人隨拾起用以加朕朕不勝忿怒而枷鎖已上朕躬朕不能堪只見始皇大笑曰汝之強甯強於朕之併吞六國分天下爲三十六郡乎地府不問貴而問德不問強弱之勢但問善惡兩途朕行去矣汝須忍耐待後至者可也與吏姍笑而去朕悶坐獄中苦於昏暗目不能見五指如是者數年忽一日見前吏人仍持朱書一簡至獄賀曰元主今得離此獄朕問之則告以有許魯齋先生者至言嗣君已下詔崇聖矣朕一時不勝之喜枷鎖仍自脫落隨出獄門沿途無阻至殿上則與韓修文郎及左右二王分庭抗禮者乃朕之故臣集賢大學士國子祭酒許衡也許衡一見朕至起身相迎命朕立殿左又至殿上與三人語移時始見二王者出朱書一敕曰煩魯齋先生命之歸許衡隨送朕出沿途再三囑曰陛下急回上都與嗣主說知命速複聖廟興釋莫敬天勤民痛改前非則陛下之苦惱盡去許衡珍重而別朕不敢少停回至上都面諭汝等以後凡嗣位爲君者不可不極力崇奉至聖也至囑至囑毋荒棄朕命等語帝受命訖忽宮漏一聲驚覺乃在夢中帝不勝駭異即於次日下詔定郊祀之禮牲用馬一蒼犢十羊豕鹿各九文舞曰崇德之舞武舞曰定功之舞重建文宜王廟于京師行釋莫禮營國子學于文宣王廟之西偏命左丞相哈刺哈孫通飭各郡州縣亦如之
