body:
  text: 第三十二回寇竹生慘遇無辜卻說杉關總兵劉瑝聞桂嶺上梧關無人把守即命部將龐英控制上梧因史進拓跋琳俱隨涪陵出征蓬頭關由史進部將王遼鎮守北藏嶺由拓跋琳部將張昌控制加以龐英三關以固當時龐英一得茶陵書信立請王遼張昌分巡上梧自率本部兵急下桂嶺來守茶陵范國昌等得龐英兵至大喜一面守護城池巡視隘口一面設宴款待龐英諸人皆以座中不見白映雪爲憂二十餘日未知何去扈德威欲往蹤迹之又慮孤城無人防守范國昌只好遣人四下探問物色殆遍並無音息一日訪至靈岩問寺僧始得確耗又不知去向正在憂疑忽見無數車輛簇擁映雪而來車上大書助餉旗幟范國昌扈德威等異而問之映雪始言雲合屯如何投宿如何敍舊如何成婚一一備陳顛末臨別時岳翁蔡德新他無所贈聞興義舉願助餉銀五千略資犒賞諸人一齊稱謝皆笑曰白子丹路入天臺作嬌客去矣怪底爾許未歸也然賀得佳偶吾屬當以金叵羅各敬三鍾映雪唯唯是日歡呼暢飲盡醉而罷令人賚書謝蔡翁助餉之德各作準備不日會合閩中時長沙郡守失去茶陵一州損壞長吏行人忙申安撫請命征剿一面撥本部兵馬先往茶陵然守府軍官庸懦無能卒伍不整郡守大驚會合都監逐加檢閱不堪調遣始行劄付各屬派點民兵策應一時長沙所轄十一縣丁口紛紛藉藉騷擾不已有湘陰縣五甲汩水村笙東鄉寇複雲一戶亦在點中其子竹生訴於縣曰生員忝列膠庠例免徭役老父師何不筆判春風使生員得盡菽水之養乎邑令不許竹生再三懇求邑令作色曰一班俱是朝廷子民食毛踐土同受國恩苦樂自宜均受安見紳民遂有例免之理寇竹生拂衣而出大言水上打一棒蓋以俗雲空無用也邑令聞之不省其意疑爲惡語譏訕喚轉怒問之竹生以實告邑令恚甚思有以難之曰汝能賦此當免其役竹生遂朗吟雲丈丈琅玕杖碧流一聲驚破楚天秋千條素練開還合萬顆明珠散複收鷗鷺盡飛紅蓼岸鴛鴦齊起白蘋洲想應此處無魚釣起網收綸別下鈎邑令欲待不允業有成言無隙可尋笑而免之且說竹生父複雲素行端愨心氣傲岸家本饒裕縣中胥吏及奸猾惡棍等請托全無然極好施與裏黨鹹德之惟與本鄉甯廉孫百曉二富翁積不相能甯翁以刻薄起家慳吝異常親鄰借貸閉關自守獨喜夤緣官長破鈔揮霍門庭冠蓋相望借長勢焰道路以目所生三子納粟俱有前程元世祖至元二十四年京湖兩路大旱赤地千里人民相食湘陰縣寇家積穀罄用賑饑谷盡繼之以錢錢盡而來者陸續不絕寧翁積谷連庾累囤閉糴以邀重價計所蓄積息已數倍猶且得隴望蜀私心祝曰更一月不雨則三湘七澤之利皆入吾彀中矣孫百曉本潯陽舟子因渡一賈人窺其橐中多金刺船至僻港處劫而沈之遂至湘陰置田産稱素封生子世保疼愛珍惜身服文繡口厭膏粱凡事任之不敢拂也及長遇他人亦謹樸恭順獨忤于其父動輒謾駡勢若仇讐百曉每向親友飲泣欲絕至是與甯翁約請術士扶乩甯問米價孫問子逆仙判孫百曉雲六月初三風雨惡潯陽江上一時錯汝兒便是喚舟人自受原來由自作百曉見之汗流脊背亡魂喪魄歸數日病死其子遂蕩其家仙又判甯翁雲豐年積穀爲凶年一升米糴三升錢天心若與人心合頭上蒼蒼不是天甯翁玩之不以爲意繼後方欲出糴倉中無故火發愈發愈烈無可解救數年蓄貯一時煨燼其弟甯寬素行平恕分毫不毀鹹以爲神湘陰之人無不稱寇翁之德而幸寧翁之災恩怨兩形人人稱快寇竹生聞之歎曰家門之禍自此啓矣甯翁聞之果恚曰萬石穀焉能窘我哉寇某施惠沽譽幸災樂禍我必有以報之遂入縣與蠹役猾吏謀媒孽告訐吏役俱德寧而嫉寇正欲陷之數日後恰好拿獲雲夢逸賊十餘人啖以金令一口交定寇翁扳入案中再令人以糾衆可疑連夜告變府中幕賓累沾甯翁餘瀝亦命以前日竹生免役一詩力證其事邑令大驚立命隸役鎖拘赴案時寇翁已染病在家一憤而絕竹生氣填胸臆呼天搶地號啕慟哭草草斂畢當不得隸役輩蜂擁直入不分良賤概行鎖拿將竹生用鐵索套住牽定就走竹生欲待分說則蒺藜杵無端亂打一時喧嚷驚動本鄉饑民傳呼殆遍約集數百人阻定隸役不放皆曰寇先生活我鄉党可代白其冤也竹生急止之曰若爾則竹生死期至矣饑民等始放行號哭相從邑令聞之再委弓兵並饑民亦拿獲到案饑民得知有逃竄者亦有挺身向前者皆曰我等死則與寇相公俱死耳邑令將竹生質以盜口證以饑民佐以詩詞尾句褫衣衿坐以不軌饑民衆口呼冤縣令不理命將饑民押出竹生抗言曰學生讀書明理守典奉法薄有微積不過賑恤鄉里未敢市恩何言不軌老父母休聽一面之辭邑令大怒曰前以斯文待汝汝利口饒舌動吟歪詩今已謀逆尚猶倔強耶命重責之然後監下竹生方悲父喪又遭此慘滿腹冤屈無處可伸逐日邑令又嚴刑鞫問孱弱書生焉能承受兩臀已打得皮開肉綻鮮血淋漓受杖時即是吏役輩世忿時也籲世道之難容也如是竹生受刑不過大言曰士可殺而不可辱羅織成獄生死聽之至謀逆一款頭可斷名不可受也皇天後土可鑒此心邑令因竹生前日請兔役時業已銜之當下見竹生不招將三木套上竹生暈絕數次沃水復蘇書役捏就供詞坐以大辟申詳安撫時王用槐從大名省墓而歸聞耗大驚不分星夜將入縣代爲申訴聞通路傳言姻戚裏黨都入連坐用槐叫苦不叠奔赴行省安撫左丞等處控告衆饑民亦多赴長沙府郡守及宣慰等處投詞伸訴不日邑令招詳盡行駁轉衆人訴狀批赴長沙知府委理刑廳勘問推官復審吊卷詳玩多在疑似之間又看竹生恂恂書生時已病劇惟群盜衆口一辭供定不易推官再三訊之俱無實驗大驚稟知太守切責縣令縣令老大著急忙與佐貳幕僚計議旦說縣令姓錢名奉世閩中長樂人以貢士出身教諭任滿除河南懷慶府經歷繼遷湘陰知縣初政頗顧聲名久而利令智昏幕僚等又教猱升木竟紗帽下行劫矣伊以貢士由經歷遷知縣皆姊夫盧順之力盧順以盧世榮之侄出自桑哥門下授河南行省左丞及楚省敖魁離仕盧順遂安撫湖廣兼屯田大使錢令見府中詰責饑民又各處控冤不止急令心腹家人與盧順關說此案盧安撫果然行文通飭本省有雲目下盜賊橫行雲夢未剿入其黨者甚衆若不嚴刑奚以迅掃該地方官有拿獲得實及入其黨者立即處決云云劄至長沙郡守推官等遂不敢違貳將竹生原案仍照該縣供招發轉縣中竹生與衆民惟望此番覆盆可雪誰知官府黑幕密布無可解脫惟延頸以待秋決矣甯翁出入衙中見此案已定大喜過望以爲得計邑令幕僚上下俱有饋送惟王用槐愁苦萬狀知此案萬無可翻君門萬里焉能以一紙徑達天聽日夜飲泣竹生悲悼不止更不待言忽一日有按察司副使巡至長沙副使姓陳名思謙亦由提舉司升授此職用法強恕喜判冤獄時適行過湘陰王用槐攔輿首控此案隨至行台饑民爲寇竹生誦冤者亦絡繹不絕副使細察全案大驚曰謀逆者族豈同兒戲立提各犯重新複問並推官縣令佐貳幕僚等赴轅伺候獨甯翁反得逍遊事外各官俱悚息待命副使首傳王用槐問系寇氏何人既非宗黨何故擅自出首妄逞刀筆從長刁風若不實供律有三尺王用槐曰幼聯桑梓之誼長叨羽翼之恩十載同窗情逾骨肉髫年遊泮義訂金蘭赴鄴都而省墓展我松楸回湘江而下帷已羅桎梏暫學睦婣任恤甯知曲突徒薪憐他洽比其鄰竟致城門失火如涉虛誣願甘連坐或有疑異請同族誅況管鮑分金已是生我知我而羊左共烈不妨死之從之縱饑民申訴于前適所以速其死而安撫行劄于後尤所以重其辜生不忍坐視等于秦越人之肥瘠而作風馬牛之不相及也如蒙昭雪豈但寇氏沒齒不忘即生也亦當啣結相報用槐爲友一腔熱血無可瀝處今日盡情托出訴畢聲淚俱下副使動容命且退單傳寇竹生問以父母兄弟家室年齡並何年補弟子員瑣屑之事逐一問之全不問案中情節問畢押往別室再看饑民鵠面鳩形救死不暇焉能謀叛亦命押赴一旁始喚一盜問以如何入黨如何舉事如何往來相識盜隨口答應繼問以寇姓家室竹生年齡則直相去天淵再喚一盜問之又是一番言語曆問數盜越形差錯甚且含糊吞吐答應不出勉強支吾半屬懵懵副使大笑曰寇竹生一人有如許年齡家室也令上刑具供出指使便休少有抵牾立即粉身碎骨群盜自知業已敗露終不免死何苦坐受鍛煉遂一齊將吏役等主謀盡行吐實錢縣令如冷水澆頭慌忙褫去衣冠俯伏跪下副使大怒將吏役等滿加重刑畢竟吏役原系狡獪齊聲叫屈曰通盜非實而買囑人心定不虛也副使叱曰饑民餓莩余息瘦骨支立買囑何用汝縣中義社兩倉積儲充盈毫不念及民隱人施賑濟彼饑民不往將坐以待斃耶且寇氏所賑者亦有限安能買遍人心一役曰寇某若無異情何以動至數百人阻遏不許赴案副使又曰愚民焉知嫌疑感其恩者恨不爲之雪其誣代其罪且此數百人不過瘡痍之夫耳非強粱者持械拒捕也又一吏曰寇竹生猶有反詩可證其心叵測副使掀髯微笑曰汝輩狠心辣舌焉可言詩寇竹生亦就詩詠詩耳即有他意甯不於平日抱膝長吟而至公堂上對官長詠耶吏役等俛首無言可辯佐貳幕僚一皆伏地不敢仰視副使喝令加刑隨供出甯翁閉糴招怨媒孽告訐平日出入衙署往來甚密官吏皆其指使一一招出副使即令人役飛拿甯廉到案偕吏役等共上刑具將竹生饑民開釋聽候發落指縣令歎曰語雲縣令破家民之父母顧如此哉又指推官怒曰經汝復審何得糊塗了事推官梁義成從容將前後兩安撫批文劄付兩相矛盾細意剖明且曰下官非不嚴訊但屬在下僚焉敢相抗副使作色曰罷官吏事小盡職事大明系患得患失不肖作強項令也安撫非狼非虎能天噬人哉梁推官唯唯謝罪陳副使曰盧安撫劄付雖系通飭全省然此案卻針鋒相湊大有可疑再將各官親近用刑具一嚇盡行吐實副使大罵各官無良上下交通律有明條爾等二罪俱發乃援筆判曰朝庭嚴昏墨之條惟期一腔白水同官勵冰霜之志只攜兩袖清風故呂侯有命一篇載在壁經而蕭相成書千古遂爲國憲今湘陰錢令實墮官方弗察民隱棄德從奸輒思上下其手即聾從昧妄雲輕重在心不僅安重霸受州民之三脡豈識楊伯起謝故人以四知竟執莫須有之詞坐平民以不軌且將釋不經之意攬上官以舞文六月飛霜濫施五刑之用三年不雨實乏百里之才既交通以枉法宜罷職而爲民縣尉蔡某官有常司不思靖共爾位漫指關節可通身任薄書心同溪壑利入囊中不問池魚之何罪有皆局內欲托社鼠以爲奸全無惻隱之心偕主簿例應同坐難免故人之律並幕賓罪當問徒推官輒徇偏私罔分曲直金科直同空文鐵筆視爲兒戲雖迹涉嫌疑下令亦有強項倘義不引避上官能勿寒心阿附取容聽他人皆入甕模棱持法定多網漏吞舟一家哭知弗恤也三尺法將安在哉降補知縣以肅官箴失察府尹著貶三級甯廉爲富不仁閉糴邀利財虜居心逞狼威於卿黨老饕肆志吐蜃氣爲樓臺雖彼銅臭使法堂上陸地生波縱乃錢神致儀門外青天掣電祝融縱火不思省愆囮媒成風妄相告訐偕胥吏重加三等並蠹役枉法重論寇竹生士林翹楚素行可風如彼歲早尚指囷以無難遭此凶年猶傾囊而不吝趙清獻減價越州心可見也富鄭公發粟山左德莫大焉釋爾覆盆撥雲見天此日複汝席帽乘風破浪他年衆民俱無所問群盜如法擬斬云云判畢將饑民釋放甯廉吏役等盡加滿杖連衆官一齊發往本府如律施行推官梁義成即攝湘陰縣事陳副使又諭之曰湘陰民困已久速發倉廩以賑貧窮著意撫恤不日自有推遷梁推官受命訖陳副使始喚寇竹生至前安慰一會命取黃金彩緞花紅等物旌賞之竹生不受叩頭流血泣而請曰小子遭家不造亡父存日酷好施與不料小惠遂搆大禍臥病受驚而絕殯而未葬小子尚未成服今蒙憲台俯賜昭雪得歸終喪三年於願足矣不忍受賜副使見竹生病已尪羸而猶舉止雍容心甚側然首肯者再賜銀五十兩爲寇翁修墓又大書湘陰義民寇翁之墓賜之副使故精書翰筆力勁遒竹生捧此八字再拜謝曰大人洞悉民隱光及泉壤亡父死且不朽矣副使又喚王用槐至前慰之曰汝爲友情義交盡用心至矣今還汝一個完名全節寇竹生金蘭共勵後效勉之王用槐亦再拜稱謝與竹生辭歸時寇姓家已中落竹生廬墓三載用槐每顧恤之寧廉發往邊遠一子隨行死於道餘子在家爲惡不悛益遭釁禍又大肆淫賭家亦蕩然流爲乞丐甯翁竄至遠方聞之恚怒病死且說安撫使盧順聞此案忿甚暗恨副使陳思謙欲中傷之乃托人至燕京與桑丞相說知桑哥素嫉思謙即將濫參官爵縱容民叛各節嗾工部給事中賈欽奏之陳副使亦將錢奉世與盧順姻戚交通及盧順夤緣相府得擢顯要各款條陳奏聞事連桑哥一時科道九卿及侍郎張九思中丞崔彧禦史王暉等皆交章論桑哥不法數十事世祖知桑丞相稔惡已久又見各官紛紛劾奏大怒將桑哥系獄逮治命尚書省按問定罪籍其家金寶至數萬姬妾累千溺器等物皆七寶鑲嵌世祖益怒命窮治之提盧順至京交部議處後來桑哥伏誅盧順竄死黨與俱貶黜有差世祖遂專任完澤爲尚書左丞相不忽木平章政事升按察副使陳思謙爲都察院殿中待禦史
