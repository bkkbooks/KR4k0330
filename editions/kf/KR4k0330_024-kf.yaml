body:
  text: 第二十四回鐵幢浦秦楠敗兵卻說秦錫帛既據壽春僭稱淮王屢欲攻打太平府以窺金陵僞參政萬俟蠣曰太平乃建康重地最難攻打爲今之計不如先往廣陵將二公子賺回再議征進不遲僞相賈智深選曰廣陵之行非參政不可萬俟蠣慨然願往錫帛許之隨遣裨將數人偕之而去萬俟蠣素衣小帽一到廣陵見衣冠文物往來都會乃六朝花錦之場心中暗喜欲一遊秦樓楚館礙著隨從不便遂命裨將從人等各分路打探約定在城東騎鶴樓女齊隨從去後萬俟蠣乃鮮衣華服散步妓館遊至螢苑近處遇一粉頭姓馬名慕蘭風容色澤技藝精妙乃煙花隊裏領袖萬俟蠣昔在朔州素喜漁色加之慕蘭十分趨奉遂極力揮霍流連院中正是溫柔鄉不讓銷魂窟任你車馬填門笙歌徹夜自謂慕蘭是其專寵他人不得分潤誰知江都縣有一三衙妻舅魏公子名宏已在院中破費千金不時來往一日入院遊宴正遇萬俟蠣在露葵軒下與慕蘭聯杯共飲心頭火起自從人揪出拳足交加渾身皆傷萬俟蠣方欲開言隨有皂隸上前將鐵索套住往外就走萬俟蠣氣填胸臆又恐遇著隨從低頭而行一至署中三衙即時升堂不由分說飛簽立杖四十吩咐逐出萬俟蠣兩臀疼痛難禁暗思此官狂病喪心屈棒冤板較我昔日在褒城尤甚一時羞不是羞惱不是惱一腔怒氣無可發泄只有悔不應遣散隨從偷遊妓館吃此大苦而已行過塘務所四顧無人棒痛難行遂不顧好歹憑幾而坐忽一騎軍漢造門下馬曰淮安制置使有信牌一面速由塘遞齎往建康府去萬俟蠣勉強掙扎接過信牌軍漢飛馬而去萬俟蠣細看信牌雲淮安制置使石中孚爲曉諭沿江水路軍情事照得附近壽春賊勢猖撅各處水關屯衛斥堠員弁兵丁等宜嚴加防範細意盤詰至廣陵所質二賊須重爲禁錮太平乃建康要地尤防其窺伺曉請到日毋得疏虞須至牌者至元二十一年三月初一日萬俟蠣看畢訝曰石中孚已升淮安二公子得離犴狴矣放過信牌方欲起身猛省曰欲賺二公子此牌即至寶也遂藏過信牌煞住疼痛急望城東而走剛至騎鶴樓下遇從人等齊曰參政一去不回令我等物色殆遍也萬俟蠣老著臉怒曰不入虎穴焉得虎子此非容易事豈草草便得確情可歸來也從人曰我等探得二公子禁錮府中石中孚已升淮安離任時將二公子交付太守沈之奇謂二人關係揚州安危宜小心在意慎勿疏虞沈太守許諾防閑嚴密繼任都督尉遲漣性最剛烈然暴而寡謀多在醉鄉平日吹毛求疵斥責部曲鞭打士卒人心大失所望特稟參政得知萬俟蠣曰爺已定計可賺二公子出獄矣遂取出牌文將重爲禁錮四字摹仿筆迹改作械赴淮安四字再假造令箭一支命從人四散流言說壽陽賊兵將打淮安然後令隨行裨將一人扮作淮安鈐轄齎信牌令箭擁檻車二乘直入揚州府中言奉石制使之令淮安有警急將所質二賊械赴淮安以制賊兵不敢攻城廣陵無事惟慎加防守別無他慮沈太守驗過信牌令箭心中猶豫曰前日石都督將二賊重托我永鎮揚州今複反前言殊難憑信再觀鈐轄並隨從數十人亦無一相識者十分疑異惟信牌令箭不差遂往都督府與尉遲漣商議以一賊留揚州一賊械淮安豈不兩全尉遲漣恚曰石制使以二賊爲質倚如太山去了二賊束手待斃矣焉能鎮淮安耶府公即將二賊械去不必憂慮沈之奇曰其中恐防有詐尉遲漣大笑曰府公文人何其怯也揚州有某在寧畏賊兵哉沈之奇不悅而回隨將秦杞秦梓齊上檻車回文一角給與信牌並飭沿途州縣撥兵護送直抵淮安不得違誤鈐轄離了揚州即時起程萬俟蠣先在瓊花台等候渡過揚子江由儀征縣泰川至駱駝嶺下僻靜處打開囚車秦杞秦梓如魚脫餌如鳥出籠深謝萬俟蠣不已一行人衆望壽陽僻路而走不日已至壽春秦錫帛父子聚首喜不自勝萬俟蠣又紀大功一次勞慰再三設宴慶賀秦梓在席前與萬俟蠣舉觴上壽萬俟蠣一飲而盡頗自居功僞相賈智深曰參政跋涉勞頓面目青紫矣萬俟蠣唯唯莫綏猷曰參政步履之間已成跛躄用謀出奇十分勞瘁應晉爵太傅以示優異萬俟蠣勉強支吾錫帛甚喜即晉太傅命二子執贄受業衆人獎譽備至弄得萬俟蠣攢目皴眉滿面羞澀用手輕試兩臀隱隱猶痛忿焰中燒不敢吐泄又見衆人宴酣歡洽大飲大嚼萬俟蠣如坐針氈愈想愈羞又慚又惱忍耐不住忽然擊案大怒曰吾與三衙誓不兩立一時盅箸交起衆人大驚急問曰太傅何出囈語萬俟蠣格格不吐半晌乃大哭而訴曰二公子禁錮廣陵有年可憐囹圄之內受盡苦楚三衙巡視百般恐嚇此仇不共日月今脫離桎梏此仇不可不報廣陵不可不伐座中有邢士龍藍天蔚等一班武夫皆切齒痛恨爭欲出兵立破廣陵錫帛問計於衆秦杞見秦楠已爲世子怏怏不語秦梓願領兵復仇僞相史獻白壽獨曰不可廣陵得質二公子有年一遭賺出必嚴加準備況沈之奇料事不差尉遲漣剛而有勇兩人合謀我兵決難取勝萬俟蠣曰廣陵沈之奇尉遲漣等皆行屍走肉耳以我兵臨之勢一摧枯何難之有秦梓深然其言賈智深請按兵觀釁不可妄動一時議論不合錫帛不悅秦楠獻策曰父王欲報杭州之仇含恨日久今兵精糧足何不趁此機會直犯杭州以抗大敵錫帛大喜遂命秦杞秦楠率兵侵杭以刑土龍爲先鋒孫虎樂螭爲後勁隨發雄武營兵一萬出征刑十龍領兵先行獨秦杞十分怨望次日告病不願與秦楠出師錫帛不喜命秦楠一人爲帥領兵由廣德湖州直趨富陽無人出戰圍三日拔之隨後大軍繼進再攻海寧早有史天雄阿察木多二將領兵三千前來禦敵史天雄雖是宿將年已老邁統制阿察木多與刑士龍大戰于海寧之百尺浦元兵奔潰刑士龍前哨遂抵錢塘屯吳山報入臨安平章脫脫訝曰賊兵神速至此耶自統大軍來吳山相隔五裏下寨次日刑士龍搖旗擂鼓而來脫脫遣健將範文龍出馬不數合被刑士龍刀劈馬下元兵大敗脫脫見賊兵英勇且戰且退南城屯紮秦楠大軍遂逼近杭城於鐵幢浦下寨脫脫按兵不戰一連數日秦楠喜曰脫脫膽落矣隨派人馬令孫虎領兵三千左出攻其後樂螭領兵三千右出攻其前刑士龍領兵一千前後策應攻破大營擒了脫脫則杭州大事定矣次日衆將鼓噪而進誰知脫脫堅閉不出直攻其營堅不可人只得退回百計索戰元師不出秦楠等無不笑脫脫以爲怯編成歌詞令士卒歌以羞之歌曰脫平章守浙杭出師無策守營帳連戰皆北乏主張坐穿鐵甲食空糗糧緊閉轅門不敢出兵將恁般奴才也任封疆恁般奴才也任封疆元軍將士聞之皆怒欲戰脫脫下令有一騎一人擅出轅門者立斬衆將皆私語曰吾軍坐守於此殆欲天雷震殺賊兵也互相嘲笑脫脫置之不聞相持半月有餘忽一日脫脫傳令遍集諸將謂曰連夜見畢星纏于太陰之分天河內亦群星繁亂數日必有大雨潮信將至百家奴引兵五百暗將賊海石塘拆去一角阿刺達一面準備戰船只待水發破賊史天雄領刀斧手埋伏虎林阿察木多領弓弩手埋伏鼉江各分頭去訖衆將如夢初覺此時方知不戰之意且說秦楠遣將逐日討戰攻之不破罵之不出無計可施刑士龍曰脫脫不過以主制客堅壁固守以老我師俟糧盡擊我耳我糧運不絕糧道不梗其計不行但我兵徒與相持無益不如來日揚言分兵三路一軍打余杭一軍奪新城一軍守杭州彼聞我分兵決然出戰一鼓可擒矣秦楠大喜當夜遙望杭城燈火輝煌樓閣參差四顧水光接天星稀月朗敵營旌旗不動刁鬥無聲回看江上一白如練不啻千里水面泊舟萬艘檣楫林立商賈輻輳富甲南都秦楠暗思臨安乃故宋都邑若得臨安較壽陽百倍可以南面稱尊矣三更後忽然狂風驟起大雨如注秦楠不以爲意惟令提防元兵冒雨劫寨少時聞錢塘江上若鯨翻鼉吼萬馬奔騰衆將大驚起視下寨處忽如汪洋大海軍士大半盡在水中載沈載浮掙扎不起秦楠頓足叫苦曰潮信至矣奈何奈何刑士龍慌忙上馬望孤山而走秦楠與衆將隨後鑼聲響處杭兵盡乘筏駕舟而來賊兵上岸者截而殺之在水中者用撈釣抓著擒獲無算其被水淹沒者還不計其數秦楠同衆將登高阜處眼睜睜望著杭兵往來若飛而壽陽之兵擒者死者逃者降者三停人馬擒去一半水淹一半其餘相隨者二千餘人而已秦楠此時如亂箭穿心急急走過武林忽一聲炮響史天雄引刀斧手擺開擋住去路樂螭見史天雄鬚髮皓然欺其年老縱馬上前不數合被史天雄刀劈馬下孫虎保護秦楠而走刑士龍捨命斷後士卒死者甚衆逃過新橋將近鼉江阿察木多擁衆一馬殺出箭如飛蝗時敗兵已人困馬乏焉能抵敵孫虎刑士龍死力殺開血路身帶重傷而逃杭兵搶奪器械衣甲輜重馬匹不計其數秦楠等甚是狼狽竄出富陽界口漸抵桐江迫兵已遠至此量無伏兵放心而行忽一派鼓聲遙望富春山紅旗招展處見平章脫脫獅盔鸞帶錦袍金甲腰懸弓手按刀駿馬高據身先土卒而來喊聲到處賊兵束手就縛秦楠此時眼中帶淚口內失聲曰今番死矣二將亦面面相戲覰脫脫手起一箭正中秦楠帶箭拍馬落荒而走刑士龍孫虎俱爲流矢所中血流滿面拼死殺出保護殘兵簇擁秦楠望吳興而去杭兵大獲全勝脫脫傳令速將捍海石塘江水引退積石植木立刻修補回府諸將上功畢脫脫謂衆將曰兵法有雲多算則勝少算則敗而況無算可言決勝乎汝等請戰皆謂我爲怯矣但一味血戰有何裨乎諸將拜服脫脫重賞軍土隨即奏聞元主時杭州軍士鼓舞歡欣亦作一歌以頌其功雲脫平章鎮杭州大播皇威著遠猷水淹七軍賊破膽功成一旦民分憂凱奏鐵幢浦業勝籌邊樓深溝固壘有來由將不在勇而在謀事業彪炳江水悠悠事業彪炳江水悠悠
