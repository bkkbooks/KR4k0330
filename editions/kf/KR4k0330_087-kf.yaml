body:
  text: 第八十七回三清樓公孫醉酒甯都有金翁者甚貧臂曲如弓本名金駝子好事者偏飾以美名曰金錠子遠近有慶賀事必邀至家以爲佳兆金翁之名大噪每遇吉日爭相致之以得者爲幸翁一一造之莫不奉金錢饋酒食醉飽盈袖而歸久而積累遂置田二十畝其田故膏腴壤也裏中有呂富翁者久欲此田未果一旦爲金翁所得心銜之陰以裏役搆訟傾其家其田遂歸於呂而金翁以貧昔年爭欲致爲佳讖者至此無人叩門矣金翁乃傴僂田畔瞻望飲泣裏中人有以搆陷始末皆出呂翁告之者金翁甚恚自念無可報復惟伺便或遇呂翁以利刃刺之一日聞呂翁飲於姻家夜深始歸金翁即挾刃至中道伺之挨至更餘未至曠野蕭條松風刺骨金翁忽轉念曰呂翁不仁渠自昧心而貧乃我命貧而且病何必更作孽乎哉即擲刀於河抽身反走忽失足一顛跌踣於地良久始起徐捫腰背皆有異至家叩門其妻一見驚而訝之曰爾胡爲頎然而亭亭也金翁自顧亦錯愕不知所出調笑之聲喧聞比鄰共走入視之無前此拳跼故態矣遠近皆以爲異金翁深秘其挾刃事惟言得奇方所愈而竟無人知之者至是亦稍有周恤免於饑寒數月後呂翁亦遣人厚加饋遺並請臨其家金翁峻拒之呂翁親自造門邀請甚恭金翁不得已造其家則陳設豐隆酒肴交錯備極款洽告辭輒不許又延至內室促膝談心意甚親密金翁甚疑之入夜已深金翁欲歸呂翁始告曰聞翁痼疾頓愈甚慰鄙懷但不佞有所求於君可乎金翁問故呂翁長跪而請曰愚夫婦年逾半百僅一七齡之子生而韶秀亦甚聰慧乃於前月某夕偶步階前逾門限而忽顛仆竟同翁之痼疾百藥罔效因思欲愈此疾者非翁之奇方萬難爲力也翁如不吝請奉百金爲壽金翁聞之瞠目直視不語者久之呂翁笑曰翁以百金爲不足耶金翁不覺長歎數聲欲言仍止呂翁怪而問之金翁乃移座近前盡吐其實兩處約計擲刀與其子得疾之夜時刻分毫不爽呂翁聞之毛髮悚然深自惱恨盡反其田即於是夜載金翁之妻至夫婦皆養于其家越明年呂翁複舉一子而七齡者竟死金翁夫婦無子皆厚葬之即以其田爲祭田呂翁子命名爲呂金生以示不忘金翁也金生美姿容性聰敏成人後博學能文時呂翁夫婦已卒金生屢試不售淡於進取挾貲遊覽放浪江湖縱酒嗜博無所不至客廣陵戀一妓燕娘有終身之約久而逋歉愈深猶日與惡少縱博不下數百金燕娘代爲籌算雖傾囊不足償也燕娘一日乃大張宴飲邀集豪貴十餘人決賭金生連擲皆北燕娘在旁審視良久乃盡出簪珥釵釧珠璣燦然請以五十金爲注時同博者各攜數百金皆相視而笑許之點籌既定梟雉互陳次至燕娘乃揚袖大呼一擲六緋衆客皆愕燕娘斂骰在燈拂衽稱異數不敢有後冀計其獲已三千餘緡盡征而歸之金生罷酒後燕娘複約諸豪貴曰明日幸相過從妾有所請翌日乃早起治酒諸客一一皆至燕娘乃豔妝而出手挽金生對天灑酒再拜曰今日爲郎戒賭次浮巨白上其假母亦再拜捧出匣中五百金爲贖身以次遍酌諸客亦再拜曰自今日以往將爲呂家婦不復見矣遂入舉座感歎有泣下者其假母持金嗚咽不能成聲既而酒闌燕娘椎髻短袷車騎已在門外矣即日南還道經新城東至三清樓下金生欲登樓少憩且玩江景燕娘問曰何謂三清樓金生曰新城舊有何淵何潛何濱弟兄同登慶曆三年進士後淵諡清節潛諡清敏濱諡清忠至今臨江起三清樓以紀其勝燕娘曰此乃名勝所在妾與郎君不可不登樓留題以遣逸興金生大喜甫登樓即遇有惡少年十數人行歌而前聯袂喧笑燕娘貌美且都光豔照人將遮侮之金生自度力不能支窘甚忽樓上一道者角巾素服鬚髮蒼然當窗責衆曰若輩獨無宅眷耶焉得無禮衆怒曰我輩作戲何預爾野道事群起攻之燕娘始得間而逸金生欲留謝之道者揮之速去金生始望空而走衆惡少齊攘臂樓前叱曰何來潑道胡爲者因手挈樓前巨石可重百斤擲地入土者三四寸以示膂力複相與戲博無不矯捷輕悍視老道士直豎子耳道者徐步下樓笑曰貧道少年粗習此伎可與若輩共試否衆惡少恃衆且勇爭赴曰來來話未已道者忽起騰躍而上者丈許踢其一人自額至胸及於腹其人仰仆不能少動即挈石擲地人也又一人奮袂而進複飽老拳亦臥而嘔血兩人皆巨魁既負餘皆懾服不敢動老道士兩手提巨石擬碎兩人首於是諸惡少號泣請命道者正欲釋放忽鳴鑼一聲見旌旗對對戈戟森森報節度使至矣諸惡少急扶掖二人蹌踉遁去老道士即欲避匿韓節度搏虎在馬上早已望見以鞭梢指曰此湘陰道士也急下馬上樓坐定令人邀道者至道者一見便識即呼曰韓大人別來無恙耶叩見畢韓節度以賓禮待之諸將校皆侍立於側韓節度與道者相別幾二十年故舊相逢喜不自勝即命置酒樓上玩景談心飲興方酣韓節度遂言別後入宋如何征討如何興複如何建都立帝每言至忻動處道者擊節稱善輒浮一巨白言未及半而老道士已酩酊大醉入黑甜鄉去矣韓節度猶刺刺不休說戰功說制度口談指授語漸含糊不一會睡去諸將校無不竊笑忙扶節度與老道士下樓至新城驛中安宿衆惡少此時方知老道士與節度有舊無不吐舌猶慮節度得知爭先逃去受傷二人一遍體青紫呻吟半年始愈一竟成痼疾呂金生家中望之歸者三年驟相見甚喜詢得其狀舉家深佩燕娘之德而金生與燕娘情好甚篤自是亦不復作浪子遊矣後聞此道者乃韓節度故交遂至建昌謝之時湘陰道士已客節度署中金生入建昌半月不獲得見一日有幕府錄事張宜偶出一見金生問之張錄事蓋金生姻戚也金生遂言其故張錄事曰子欲見公孫先生耶金生不知張錄事曰湘陰道士姓公孫名鴻節度在漢陽相會時尚隱姓名至今聞大宋建國已固方始說出此乃節度之上客也幸子早至若更遲三日將赴岳州扈節度處去矣引之入見老道士笑曰貧道偶見不平少加聲色何足言謝呂金生再拜稱謝而退並謝張錄事始歸寧都後金生以貲謁選得龍門縣尉燕娘隨赴任所金生居官頗清慎不數年仕至柳州刺使解組日燕娘始出囊中骰子六枚面面皆緋即當年一擲三千者也噫詭不害智燕娘其女中傑出者哉
