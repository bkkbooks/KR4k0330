body:
  text: 第三十八回淳于丹論史匡君卻說涪陵王好微行一日帶近侍數人至香山見其地草色蒼翠竹花迷離峰巒競秀岩峪爭奇長松掩映間又襯出怪石峻峭溪壑瀠洄遂心樂之信步而行各處佳勝觀玩不輟見一處賽勝一處昔人曾作招隱詩以紀勝雲翠竹林中景最幽人生獲此更何求數方白石堆雲起一道清泉接澗流得趣猿猴堪共樂忘機糜鹿可同遊紅塵一任漫天去高臥深山百不憂涪陵王正欣賞不已忽見左泉右石茂林深處現出茅屋數椽小小柴門靠著短牆未扃近窺之內一老人方踞胡床讀漢書至僞遊雲夢處乃釋卷長歎數聲且曰韓侯將才則優而臣道豈未之聞也朗吟曰若使英雄早見機奇謀肯立漢邦基囊沙破敵功雖大躡足封齊事已非既謂無心從蒯徹何緣執手教陳豨未央宮裏當時事千載令人淚滿衣吟畢浮一大白涪陵王知爲隱者叩門而入老人驚起禮畢訝曰殿下何來涪陵王視其人童顔鶴髮飄飄欲仙因問曰叟閱幾何甲子矣老人曰臣于孝宗三年判國史館光宗五年以老病乞休者也涪陵王叩其姓字對曰臣閿鄉人淳於丹也殿下輕身微行獨不念恢複重任乎涪陵王問以恢復之計微笑曰頹邁之人荒僻陋處枕流漱石久矣涪陵王再三叩之惟謝不知又問曰叟當年職史館應知史館之事靖康中北狩其詳可得聞乎老人愀然曰煙霞瘤疾強半遺忘然二帝北狩一節勉爲殿下陳之按靖康元年丙午二月初二日金人圍汴城二月初三日金人北去十一月十九日金粘罕元帥再圍京城二十五日京城陷金人入城二十六日粘罕遣使入城求兩宮幸彼營議和割地事二年正月十一日粘罕遣使入城請帝車駕詣軍前議事二月十一日車駕出城幸彼營十七日帝還宮三月初三日再幸彼營次早帝見太上皇亦至彼初四日至十五皇族後妃諸王陸續到營十六日粘罕今以青袍易帝服以常人女服易二後服侍衛番奴以男女呼帝十七日金以張邦昌爲帝國號大楚十八日上皇及帝二後乘馬北行二十一日次黃河岸二十二日入衛州二十三日入懷州二十四日至信安縣二十六日至徐州二十七日至泉鎮四月初一日過真定府五月二十一日至燕京見金主六月初二日朱後崩年二十六歲十三日至安肅聽候六月末移居雲州紹興二年鄭後崩年四十七歲二帝移居五國城紹興四年金主死孫完顔亶即位五年移居西均州六年上皇崩於均州年五十六歲是年又移少帝於源昌州八年金人立僞齊劉豫召少帝於源昌本年十月初九日少帝複至燕京與契丹耶律延禧同拘管鴻翼府十三年賜帝居燕京十八年歧王完顔亮殺金王主亶並後自即位紹興十五年徙少帝出城東田玉觀二十年複徙少帝入城囚于左院二十二年春帝崩年六十歲老人言至此涪陵王隨問少帝之崩作何情狀老人曰殿下猶未知耶乃爲彼奴射死于馬足之下涪陵王聽罷不勝憤懣乃曰當時彼此不共戴天檜賊專政日主和議誤國誤君萬死不足以塞責也老人歎曰寧徒檢賊誤哉高宗亦自誤也檜賊誤於前似道誤于後高宗之下不可忘靖康二君猶殿下之不可忘德祐二主也涪陵王斂容謝之隨前席請教訪爲君之大略焉老人曰恭儉仁恕以明君德親賢遠佞法天重民治道庶幾近矣涪陵王請就國爲師保不與政事閒居以養其老得備顧問老人堅辭不許涪陵王曰叟四壁蕭然貧也實甚小朝廷縱不能容叟然敬老之典不可廢也不日安車至矣老人笑曰貧莫貧于未聞道賤莫賤於不知恥士能宏道曰達士不安分曰窮殿下敦堯舜之盛老臣守巢許之節安車雖至不與知也涪陵王遂辭而歸遣人厚贈之令有司以時問候恤其家涪陵王深憤南渡偏安權臣誤國乃銳意興複思大有爲一日下議曰當今百職庶司所最宜得人者惟吏部戶部爲要吏部司銓衡擇監司戶部判度支理財賦非諳練老成者不當此任其以司馬肅兼吏部韓昭判戶部而以葛天民蘇伏威等爲諫議大夫大開言路務敦實效去虛文各陳時政樞要參議李穆上言曰立國以建都爲本而治國以恤民爲先建都擇地必當設險而後國可固國之有民猶人之有元氣也而可不恤哉輕賦稅除盜賊遷守令更弊法省官吏皆恤民事也既能恤民而後立政有經有經然後賞罰當賞罰當而後號令行人心既從惟上所命守之則固戰之則勝攻之則克而國以定矣涪陵王喜曰卿所言恰中款要即命吏部選舉官吏戶部斟酌賦稅務恤民隱次第施行越日因大集文武一決定都之議左丞種世龍奏曰自古人君圖王霸之業者必定根本之地以作固守之基若漢高之于關中光武之於河內是也縱經營四方而根本自爲重任堅固不搖方可進取而猶非定都之謂也天下建都之地自有定所關陝爲上荊襄爲次江淮爲下此大較也然殿下今日甯一時遂及此哉廣南雖撫有六郡僻處海隅無所控制不如邵武據八閩之上游枕三吳之襟帶控引二廣荊楚可通昔文少保四鎮建閫之策今可用也參政范國昌參議李穆將軍關普靈皆主其說獨司馬肅曰依臣愚見閩廣皆近海表不如收復長沙更議定都蓋長沙峙以五嶺環以三湘左納荊門右統夏汭較之邵武尤便諫議大夫蘇伏威曰長沙雖據形勝然未入版圖不如建昌控三吳之襟帶據五嶺之咽喉牽制江淮呼吸甌越經營中原實當沖要學土皇甫惇曰臣之見與諫議相合請殿下鈞裁岳燕超曰不然自來建都者西北可據中原東南不據西北古今大勢已定即南渡之事殿下所深知也舍建康而都臨安偏處一隅棄六朝之遺迹尚難振起而況今日僅在閩廣中求勝地哉一時權宜則非邵武不可臣前于殿下固言之矣資政大夫劉知幾進曰臣以術占之江青三百年王氣雖盡於六朝然不出百年金陵佳氣重見興旺殿下不如都建昌爲近江淮丘墓南宋陵寢當必有發祥于殿下者涪陵王笑曰但得卿等同心戮力衆志可以成城無形之險牢不可破況語雲在德不在險乎然閩廣中非邵武亦無險可恃矣卒主種世龍之議命耿進誠允工部經理建都事宜祟墉浚池築關豎險建宮立署朝市社稷以次齊備擇日車駕當臨幸焉
