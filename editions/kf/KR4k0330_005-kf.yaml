body:
  text: 第五回寇複雷大鬧臨安郡卻說焦芳斛律亢宗沿江觀玩誰知有靈隱寺僧在旁指示哨軍即報兵馬使司百家奴令僧認識衆軍隨後上前一擁圍住焦芳斛律亢宗見勢頭不好揮拳打翻數人衆寡不敵一齊被擒械至杭城衙中百家奴細細鞫問是何盜賊何處人氏且獨不知哈平章威望乎焦芳睜目大怒曰婦蒙古奪人宗社發人陵寢是謂盜賊我等非女所管轄要殺即殺要剮即剮何必瑣碎百家奴怒其言無狀欲動極刑只見斛律亢宗厲聲曰禹門縱使高千丈放過蛟龍也不防我二人故宋之遺民也一名焦芳一名斛律亢宗靈隱寺戰敗了了和尚是我等不願作婢膝奴顔漢子供辭已畢任女施爲百家奴聽畢大驚似此聲口俱屬反賊怒謂二人曰惡賊桀驁不法明系中山狂人之黨權責一百軍棍等平章奏聞元主然後發落二人鐵石硬漢並不討饒百客觀存在奴暗暗警異令發往府中禁下即將所供稟知行省哈馬黎大驚曰據此必有羽党潛伏臨安早晚更宜嚴備委軍校四下密察一面行文嚴戒沿江州郡百家奴始退卻說寇複雷等得此消息議曰勢已騎虎與其束手就縛曷若血濺杭州李穆曰未可造次且宜三思畫虎不在噬臍何及寇複雷仇忿然曰天下事不成則敗不敗則成何思之有韓昭曰不然百足之蟲死而後僵以所輔者衆也某慮者衆寡之勢太相懸耳衆畢默然關普靈曰事急矣有台州楊鎮龍聚兵數千久蓄異志昔曾有書聘某某義不從則累謝絕之今事在燃眉聞鎮龍已移兵溫州府泰順縣東某處劄定某往乞師萬一得助則大事濟矣衆畢曰甚善韓昭囑曰關兄精細某所深知此去事在必在但沿江一帶哈馬黎防範甚嚴兵來須如疾雷不及掩耳使他善防而我偏出其所不防相機行事自不多囑我等分頭打探江下須以欽乃二字爲號城近須以囒哰二字爲號庶人不疑齊于杭界一會關普靈許諾隨即扮爲舟子往來江下適有溫州府太守在杭聞本府有事星夜回歸官船正少舵師喧嚷不止關普靈正合機會登舟把舵太守屢顧舵師若疑訝者普靈一心乞師低頭不語一日一夜遂達溫州聞楊鎮龍時在瑞安縣被金華府統制兀良圍住今溫州太守回歸必添兵助戰果然太守一歸即披挂上馬率兵往瑞安縣而去關普靈此時如坐針氈急焰中燒忽然暗想太守在艙中累累顧盼似曾相識秘密問之乃知即昔年蒲州同學之呂大成也一時大喜得計遍處傳言雲婺州賊葉禹五仍轉金華全軍屯於浦口不日攻打金華以就牧養兀良一聞此信吃驚不小果二賊合謀騙我出戶使我無歸則越境失地二罪俱發有此一驚金華兵心無主圍遂鬆懈關普靈已混入賊中去了楊鎮龍正在危迫一見關普靈如饑得食如渴得水關普靈不暇款曲討過鞍馬綽刀而出湊殺一陣兀良本是庸才焉能抵敵敗回金華呂大成一見關普靈又在臨陣疑惑不已欲戰不可欲回不便關普靈打個照會大成會意二人交鋒不數合大成詐敗而走楊鎮龍大喜稱謝曰非將軍來圍幾不解矣關普靈曰某解此圍一酬前情一修繼好有所求而來耳鎮龍問何求普靈遂以杭州事告之並露乞師之意鎮龍初聞似有難色昔靈曉之曰大王欲舉事兩浙杭州乃都會也我等乞師先爲大王立威名于此杭浙聞風皆膽落矣且大王異日獨無緩急乎鎮龍大悟即撥二千兵與之普靈辭曰精壯之土五百人足矣兵不貴多在調遣得宜若分布有法五百人人杭可當十萬師矣衆兵聞往攻臨安人人磨拳個個擦掌皆稱願往選來選去仍有一千之衆鎮龍隨撥裨將二人聽用普靈見過二將授以計劃先行又囑鎮龍曰溫州之地不可久居溫州之民亦不可傷害蓋溫州呂太守智勇足備大王非其敵也兵法雲兼弱攻昧大王最宜留意鎮龍許諾關普靈謝別起行遂望錢塘進發且說杭州知府鄭良謨憐焦芳斛律亢二人系是好漢點查監下惟令小心看守未更加刑牢頭節級亦不許若刻侵犯故二人在內得以自如焦芳一眼瞧見有襄江好漢姓傅名突字伯通者亦在內禁暗問何爲至此傅突言遊玩臨安于海寧渡口一言不合失手毆死舟子海甯縣令將某取供械赴在此二人亦告以故各言且俟機變忽一日按察僉事不木華兒又將二人提去複問二人在白馬街前見韓昭宇文廣一賣夜來香一呼囒哰各個會意至僉事衙中複問不木華兒純用極刑凡突地吼死豬愁定百派等法羅織鍛煉極其慘酷二人雖是鐵漢已死去活來身無完膚扶入獄中奄奄昏迷不木華兒與衆官議曰杭近左右盜賊雲擾此類不可久留恐生他變來日即宜斬訖衆官皆然之焦芳斛律亢宗在獄得蘇見此獄如銅牆鐵壁人役甚衆內外毫不通風囚犯俱各分禁不能共語凡囚犯到此者惟延頸待決而已二人納悶一會兒見就近一囚面貌凶惡低聲問曰二公來此非等閒輩亦束手待斃者耶二人略以示意囚手出二丹擲來命速吞之傷可立愈已而果然二人問之則海鹽響馬也欲再問時忽然牢子突至見囚與二人私語以蒺藜杵怒擊之囚敢怒而不敢言二人甚不過意四體棒傷乎複如故感囚不已時已黃昏忽聞炮聲震天雲上都天使至乎章哈馬黎率同文武出郭迎接下馬拱候少時天使一到齊齊上前方欲施禮忽城門火起天使後面數人囒哰一聲在馬上突出兵刃就殺起來那天使縱出肩輿綽斧一躍上馬大喝羯賊休走一斧砍來將不木華兒劈爲兩段哈乎章嚇得魂不附體郭門擁塞不敢人城潛往僻暗處逃竄衆官一時擁擠或前或後良賤難分只聞一片喊殺之聲四下回應俱是楊鎮龍撥來軍士四路縱火呐喊恐嚇人心當時臨安城中燒動民舍哭聲震地其都統制招討使兵馬使諸武官齊去接旨各營軍士皆無主將部曲不相統屬東往西殺全不濟事有知府禁中傅突乘勢破監而走衆囚犯死中得活相隨接應兵拼力攻殺杭兵救火不是禦敵不是惟兵馬使家奴隨過太傅伯顔略地稱爲慣將死力在乎章府前將關普靈敵住宇文廣已打入僉事衙中節級牢頭皆被殺死焦芳斛律亢宗在內縱出凶徒只見海鹽響馬猛下辣手爭先殺入後衙將不木華兒家小盡行屠之此皆理刑官生平法外行兇殘酷之報也當時焦芳等殺出縱兵火掠府庫轉過巷口又見襄陽傅突亦領有許多囚徒喊殺而來衆人合併往杭城大街衝殺如入無人之境關普靈已殺敗百家奴亦會合一處惟不見寇複雷言未已在杭州都統阿刺達口領大隊人馬殺來衆人一齊鼓勇連環戰住阿都統本是蒙古驍將奈衆人兵器如雨點刺來目不暇瞬漸次危急焦芳傅突雙槍並舉搠于馬下元兵奮勇奪去兩軍混戰一會焦芳已被箭傷血流不止諸人亦各有微傷號召軍土方欲出走忽前面一彪軍馬蜂擁而至當頭一將乃是宣撫司統制劉坤舞丈八蛇矛攔住去路後面又有副使殷其雷都監王璋領精兵來追軍士慌亂關普靈抖擻精神約住衆兵大呼關某獨當前面衆人顧後橫刀躍馬而出與劉坤大戰二十余合劉坤力怯敗走前路已開後面殷其雷亦爲宇文廣所傷惟王璋抵死不退解律亢宗大怒方欲助戰只見海鹽響馬躍出大呼曰衆好漢休慌咱能擒之大踏步舞刀向前王璋欺其徒步不提防一刀砍將入處王璋側身欲躲竟被他乘勢輕舒猿臂夾下馬來刀劈首級回身就走衆人一齊催軍殺退杭兵作速出城且說寇複雷楊孝伯率兵挨肩闖入杭城這杭城八街洞達余者星羅棋佈路次慣熟縱橫無不如意約住衆兵休傷土女凡蒙古兵將盡力截殺又令衆軍大呼百姓毋驚我等來報伐陵取骨之仇耳臨安城中無不鼎沸時有兩浙制置使範文虎本故宋安慶知府賈似道婿也叛降于元二王走溫州文虎領兵追殺不及而還伯顔奏授此職亦在杭城挺槍殺來寇複雷一見雙眼睜圓大罵逆賊碎屍萬段範文虎亦怒二人交手楊孝伯從旁夾攻文虎抵敵不住欲走被寇複雷狠命一斧連首劈去不知所在衆軍潰散不一時二人又殺敗數將夜色已深情知衆人已出且戰且走徐徐退出城去韓昭李穆見衆人會合已齊始回臯亭楊鎮龍二裨將押衆軍先行衆人斷後許多囚犯皆叩首稱謝而走衆人隨行沿途虛設警報以止追兵直至臯亭山始住楊鎮龍之兵已在臨安大掠虜得無數金寶歡聲如雷關普靈隨即修書附以幣帛禮物交二裨將並重賞之韓昭亦囑曰歸命爾主異日若有緩急誓當相助決不食言但必以安民爲主方能成事不可屠掠至囑至囑二將應諾謝別領兵遂行誰知鎮龍後日起事一味擄掠全是盜賊之行以致事敗身死願隨執鞭海鹽響馬始自陳姓名公孫濮即海鹽人氏每在淮安維揚等處行劫昨偶歸故土爲仇家所陷然濮生性十日若不殺人即生疾病因見衆好漢事事皆存仁心自念平生殘刻如許存此餘生皆衆好漢之賜也今休矣不複向綠林中劈徑矣衆問何往曰將往建康勾曲山受道德經衆三茅真君長遊去矣舉手謝別衆人飄然而去衆皆歎息不已再說錢塘知縣隨著哈平章當夜於城外一僧寺中躲避次日人役物色之始歸有左丞完宣參議吳敏知府鄭良謨指揮使方文都督史天雄兵馬使百家奴等商議合詞星夜奏聞元主一面選輕騎三千令史天雄方文二人追殺賊黨二人直追至三十裏外並無賊影又聞道路訛言台州賊楊鎮龍已破溫州二人疑惑間忽流星馬上報來果然溫州呂太守兵敗賊已逆江而上請兵沿江截賊二人不敢再追急回稟知平章嚴檄各隘口力拿賊黨量難飛去溫州若失密邇紹興則臨安震動矣不如厲兵秣馬杭城戒嚴探聽的確再行追鞲不然強弩之末不足以穿魯縞更有疏虞兩浙保無憂乎哈馬黎然之不日下旨以江西參政脫脫權攝兩浙事宜哈馬黎以不職調回上都百家奴隨逮入燕其參議總制等俱降補外任餘皆如故
