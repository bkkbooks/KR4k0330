body:
  text: 第二十三回襄陽城賈羽辛授首卻說襄陽都督呂翔爲征雲夢失律喪師陷沒三關並德安州府縣被逮入京安撫使敖魁保奏長沙府都統制扈德威鎮守襄陽德威字虎臣淮陰人也相似馬周鳶肩火眉氣宇軒昂勇略俱備一任襄陽撫循軍民修治樓櫓聚兵儲糧先是呂翔嗜酒糊塗沿江盜賊縱橫樊城等處白晝搶奪人情洶洶德威素有重望令行禁止盜賊屏息襄陽賴以粗安時有范國昌司馬肅白映雪三賢士由東京陽武來至漢川聞襄陽肅清乃過襄陽始知鎮守襄陽者乃德威也白映雪喜曰德威系映雪舅氏世代將家我等且觀其將才何如三人入境見盜賊屏息號令嚴明父老稱慶映雪等心中暗喜恰好扈德威將襄陽整頓一新有雲夢賈翀遣其弟羽辛領兵由安陸來窺襄陽德威下令樊城等處清野堅壁以待賈羽辛遂攻棗陽棗陽告急德威遣兵救援自統大軍守鳳林關濱江作險扼住水陸門戶數日報來棗陽已陷又打宜城宜城危急德威自思不得不救命健將守關太守巡城自往宜城救援誰知敵兵勢如破竹宜城又下襄陽大震賈羽辛得勝長驅直搗襄陽官吏驚慌無措德威屹然不以爲意暗思將欲取之必姑與之竟將鳳林關守兵調退屯回峴山太守崔國器暗暗叫苦謂屬僚曰不圖扈都統有虛名而無實用觀此舉措呂都督之不若矣德威全不在意部下裨將請赴武昌求援德威不應又報賊兵已過鳳林關直逼城南下寨遣人送戰書至德威批回來日決戰次日賈羽辛左劉環右張青排開軍馬搦戰德威一見賈羽辛裝模作樣大罵賊徒拿住碎屍萬段那邊張青出馬一柄鐵拐舞動如飛德威從容舉槍架定不數合德威敗走賈羽辛驅動人馬追過峴山德威忽然不見賈羽辛大疑方欲退時峴山上紅旗招展四路伏兵齊起德威忽然從山谷殺出手起一槍張青死于馬下劉環保定賈羽辛死戰奪路而走德威追至袁曹渡方始收兵屯住次日賈羽辛憤甚縱騎兵蓋地而來德威不敢抵敵棄營而走退五裏草草紮營安定人馬次日又戰德威又敗賊兵奪去營寨一連數日賊兵皆勝德威直至峴山屯兵賈羽辛大驅人馬來奪峴山德威棄山而逃賈羽辛大喜曰得了峴山取襄陽如反掌矣以得勝之兵盡紮峴山準備來日築長圍以困襄陽襄陽既破樊城隨下矣誰料黃昏後德威領大隊人馬突將峴山緊緊圍定不與交戰四圍俱用強弓硬弩射來賈峴劉環屢次衝突不下圍了數日樵汲道絕軍心慌亂賈羽辛無計可施惟與劉環奮勇從上壓下思潰圍出處處皆被亂箭射回仍然屯住不日糧盡殺馬而食馬盡漸以人相食了此時兵士大潰雲夢聲息不通無可救援處乎絕地坐以待斃襄陽太守崔國器等至此方知德威不守鳳林關而守峴山之意官吏軍民人人稱慶一日劉環請賈羽辛曰事急矣末將拼死殺出將軍隨後得出重圍便有生路賈羽辛然之劉環結束飽食捨命當先被德威一馬攔住劉環不敢抵敵虛掩一槍奪路便走德威引弓就射劉環帶箭而逃德威且不追趕回馬正遇賈羽辛亦潰圍出走交馬只一合被德威于馬上擒之敗兵皆不堪戰口稱願降德威許之其餘同劉環逃去者不過千餘人而已棗陽宜城傳檄而複德威大獲全勝凱旋城中賈羽辛押赴刑場數其罪斬之將首級沿江曉諭送赴行省安撫使敖魁大喜襄陽得人奏聞元主力薦德威將才可用雲夢可平表至上都被丞相桑哥匿不以聞密遣心腹舍人至襄陽若能以千金爲壽即領京湖節鉞更有錫命德威大怒曰血戰疆場漫言宦囊羞澀不足以厭老饕即使黃金滿屋豈肯借錢神之力邀鐵券之賞令摧堅陷陣者短氣哉唾之不顧舍人羞怒而退回至上都桑哥恚甚立劾德威擁兵自守棗陽宜城連失二縣坐視不救洎拿獲首逆又不械送京師自行正法請旨逮問以正欺君之罪果然世祖聞桑哥之言如聲應響即時准奏旨下並薦主敖魁皆逮入京中書完澤極力諫阻始停白麻免逮另下詔切責安撫敖魁不行糾察扈德威姑念有功于後降漢川縣千戶德威一聞此命憤惋泣下連聲曰安撫誤我安撫誤我太守崔國器亦爲之不平書空作咄咄怪事不日旨下德威遂離襄陽望漢川赴任衆官吏及所屬部曲麾下軍士皆依依不捨殷殷餞別德威平日恩威並用人心悅服城中百姓老扶幼攜哭送曰襄陽賴有將軍百姓安堵從此一去小民等不聊生矣德威見此光景亦掩面而泣安慰百姓謝別衆官直至鹿門山而別匹馬揚鞭獨行踽踽至陰城龐公鎮日已昏暮遂於驛中安歇當晚星月皎潔銀河耿耿玉露盈盈驛中闃寂一人寢不成寐孤燈背壁兀兀獨坐感歎不已忽佩劍在壁上錚然有聲德威駭異忙除下按劍言曰扈某乃有功無罪之人冤遭貶黜劍匣告警驛中決有奸細言未畢梁上有長歎聲欻下一人短袖輕衫頭挽雙髻腰系革囊德威知是刺客一把擒住刺客乃從容告曰將軍休慌某奉桑哥丞相之命而來實不利於將軍某若有意行刺則將軍之首早入某革囊中矣德威驚異久之刺客又曰某本棗陽人氏幼年落魄江湖曾遇青城道士教某此術身輕體健往來如飛白晝大都中抉人首級神鬼莫測襄陽乃父母桑梓將軍威鎮賊除民安某雖不肖喪心不至於此惟後繼者至將軍亦難保矣言畢縱上簷角屋瓦無聲瞥忽而去但聞四壁蟲聲啾啾唧唧燈燼初落仍複挑起德威不敢久居收拾起行出驛而去約行十餘裏身體困倦遙見山谷中隱隱露出燈光尚有人聲德威異之近視乃一張仙觀也內有人擊劍而歌歌曰元戎無主枉談兵血濺征衣恨未平脫卻孝侯三尺劍何人踏浪斬長鯨歌畢浩歎一回把酒剔燈又低聲吟曰北平飛將不封侯更笑武安死杜郵底事皆含降卒怨滄江何處下金鈎吟畢德威叩門內聞剝啄聲門隨啓一赤幘丈夫岸然而出燈影之下目光外射見德威亦赳赳武夫遂揖之德威系馬而入禮畢坐定將襄陽事逐一告之又言驛中遇桑哥丞相遣人行刺故暮夜倉皇至此其人失口歎曰女無美惡人宮見妒士無賢否立朝見嫉某與足下可謂同病相憐耳某即昔日戰賈羽辛之韓搏虎也德威驚謝叩其行止韓搏虎曰某至雲夢被逐羞歸漢陽權且托足觀中行將登太行之巔俯瞰京湖待時之清草澤中隱身去矣公漢陽之行不必往也德威曰某昔仕元實非本意爲今之計某往漢川固不可即公往太行亦非所宜也搏虎拱手曰計將安出德威曰某與足下並非毛義捧檄爲得祿計不過因廉訪使再三懇迫耳足下先祖父出將人相爲大宋名臣功列鍾鼎名垂金石即德威祖再興亦曾統制京湖著百戰勤勞一心宋室宋亡我等不仕稍猶可原仕則已違祖訓況今者忠而得謗信而見疑尚何戀戀升鬥之俸今後某與足下仍宋人耳韓搏虎曰某有叔父名靖夏者怒某仕元累有書來責斥今遁迹閩中與足下之意同然則今將何往乎德威移座就近徐言曰威昔鎮長沙聞廣南羅浮有人起義傳檄遍達荊楚安撫得知不敢奏聞非我等立身之地乎搏虎大喜二人一席話刺刺不休忽聞長鍾動野村雞喔喔道士隨起鳴罷清磐轉身一見扈德威知是襄陽都督訝曰將軍何來德威曰借宿仙觀將往漢川赴任道士歎曰將軍汗馬無功何苦勞賓士要作大元名臣也德威佯怒曰方今大元一統何得妄出狂言道士笑曰不瞞將軍小道在宋曾爲江陵統制張順部下裨將主將弟兄俱勇冠三軍耑習水戰因破襄陽元兵三萬有餘主將張順力戰而死死經五日方屍浮水面逆流而上猶是身披甲胄手持弓矢身中四槍六箭怒氣勃勃如生直抵橋梁人皆驚以爲神副將張貴遣小道持蠟書回郢都求援小道能伏水中七晝夜不食五日遂達郢都援兵來時大江水阻與張貴失約爲元兵所乘張貴身無完膚被擒不屈而死弟兄盡節故襄陽至今立有雙忠廟祀之當時小道派往樊城張漢英麾下不料元兵攻襄陽不拔先圍樊城截斷救援張漢英又令小道泅水往臨安請援賈平章置若罔聞樊城襄陽相繼陷沒小道猶在樞密府日日候令反被堂吏翁應龍將小道革斥除名小道憤甚潛伏西湖水中候似道葛嶺遊湖即刺殺之以泄天下公憤奈爪牙甚衆不能下手含恨出家崖山一役小道雖托迹清虛尚懷不平也況二將軍以命世之英反爲仇敵效死疆場血戰乎德威大驚韓搏虎亦訝曰某來數月道長全未露出急叩其姓名道士隱而不言固問之惟示以別號湘陰道士以己湘陰人不忘故土也二人遂以實意告之道士大喜曰願將軍早肅清宇內扶持故國世外人得托宇下爲故宋之逸民不亦可乎搏虎曰當今滅儒棄道又何戀此黃冠爲也何不改換裝束仍整威風我等亦得備顧問道士謝曰衰朽殘年無心人世元能棄道焉能棄我二公成功所至當來造訪德威搏虎遂與道士盤桓數日辭別而去
