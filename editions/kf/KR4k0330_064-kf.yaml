body:
  text: 第六十四回七星岩焦芳殉節長沙節度使寇複雷一日聞元主詔廣右進兵將欲伐宋暗思不如先發制人即調集所屬將士若廖雲王彥傅突吳廣屈突申洪時錦焦芳斛律亢宗等八將共徵兵二萬有餘寇節度即拜斛律亢宗爲都押牙統制總攝軍事焦芳爲前部吳廣王彥爲後應次日起程有前隊焦芳領兵三千由營陽江華縣直過臨賀嶺一股銳氣橫沖直搗攻破富川縣遂抵平樂平樂府守將王良楝與焦芳大戰於鳳凰山宋師久練所向無敵王良楝竟爲焦芳所殺元兵大敗宋師遂拔平樂斛律亢宗大軍始到所屬州縣傳檄而定隨告捷于長沙寇節度甚喜即命驍將曲遜運糧直赴平樂斛律統制遂進兵蒼梧宋師約束嚴明軍民無犯經行處百姓歡呼于道饋餉絡繹不絕前隊焦芳兵至蒼梧縣隔江下寨是夜忽見前山火光燭天而起焦芳著驚下令軍士勿得妄動疊次見火直至天曉並無兵至次日訪之始知此間有一山名沖霄山每三五夜輒見火光相傳以爲南越王趙佗藏寶劍于山阿故夜深騰光也焦芳喜曰劍氣沖霄我兵之兆也必下蒼悟矣蒼梧太守管城璧有文武材兵屯城外阻住宋師焦芳候大軍一到遂渡南江與元兵決戰管太守望見宋師嚴陣以待焦芳更不打話挺槍躍馬身先士卒管太守揮刀迎敵不一合元軍兩翼伏兵從左右殺出焦芳全隊被圍垓心斛律統制已到即命屈突申洪時錦二將引兵殺入接應焦芳奮勇殺出元兵遂潰管連城約住後軍徐徐而退兩軍略有損傷管連城見宋師嚴整且衆自知不敵入城堅閉固守暗令一軍截斷宋師糧道俟糧盡從後擊之斛律統制見深入重地亦慮及此令後隊吳廣王彥一軍緊屯隘口不時巡哨打探一日元兵被二將殺敗遁去斛律統制遂督將士圍定蒼梧一時軍中造起轒轀車飛雲梯炮車撞竿等項管太守隨方禦敵城不能下焦芳偶然觸動火光燭天之兆見城上所設木幔樓槽高與雲齊遂用火箭以小瓢盛油灌石端射城樓槽板木上瓢敗油散因以箭鏃內竿中射油散處其火立燃複以油瓢續之樓櫓盡焚又聞城中囤積甚多先用雀杏子中空以艾實之系雀足上加火于薄暮群飛入城向囤積廬舍棲宿一時火發管太守救應不及軍心遂亂斛律統制即駕四輪車立桔橰於上令趫卒蟻附而登焦芳刺翻數人奮勇上城軍士繼之管太守知事不濟自刎而死元兵死者無算餘皆降之斛律亢宗入城安民畢令將管連城葬之即遣洪時錦廖雲諸將徇嶺溪藤容等縣不日皆下養兵數日命健將守定前隊焦芳又引兵直過潯州此時桂林府行省參政蒯毅夫已得元主之詔興師伐宋忽聞宋師入境攻陷平樂蒼梧二郡大驚急料兵于榕樹門下令將士選大將一人須智信義勇賢明者主之副將二人一主軍糧一主馬糧智信仁勇忠義平直者主之總管四人二主虞侯二主押衙嚴勇諳識軍容者主之子將八人明行陣金鼓曉部置者主之大將別湊八人兼十六人副大將總管別湊並同此外用判官二人以沈毅深密者任至偏將軍一人以勇猛果敢力敵萬夫者主之副偏將二人子將四人以明旌旗金鼓節令者主之城房二人判官一人虞侯押官各二人諸將領俱已充備而惟大將無人蒯參政遂自主之始簡閱行伍各隊士卒每五十爲一隊各依隊次解幡立隊伍相去各十步分佈使均其駐隊塞空處去前隊二十步列布訖諸營士卒俱令向大將麾下聽調度每隔一隊定戰隊即出向前各進五十步聽角聲第一聲絕諸隊師一時散立第二聲絕諸隊一時拿槍張弓卷幡拔刀第三聲絕諸隊一時舉槍第四聲絕諸隊一時跪膝籠槍坐看大將黃旗耳聽鼓聲黃旗向前亞鼓聲動齊向前到中間一齊喝殺齊入敗退敗訖可趁行三十步審知賊徒喪敗馬軍從背逐北聞金鉦動即須聽去行膊上架槍側身回身本處散立第一聲絕一時拿槍便解幡旗第二聲絕一時舉槍第三聲絕一時旗隊一看大將處兩旗交即五隊合爲一隊便是二百五十人爲一隊其隊法及解幡舉槍旗隊鬥戰法並依前一看大將處五旗交即十隊合爲一隊便是五百人合爲一隊其隊法及卷幡舉槍旗隊鬥戰法並如前聽第一聲角絕即散二百五十人爲一隊如此三度散畢士卒俱聽大將賞罰進止第三聲角絕始令從頭引隊伍還軍蒯參政見坐作進退指揮無不如意伍長什長督兵俱各遵令連日又將步戰船戰法逐一教演見可以戰蒯參政遂自掌中軍旗鼓令偏將軍樊飛豹作先鋒充頭隊又令副將羊雷朱光鬥領兵押後自統四總管曹豹王淮周虓範瓊領大軍三萬猶未起行探馬又報得潯州已失守將府尹俱已盡節宋師目下攻打橫州甚急蒯參政頓足曰敵兵神速至此急引軍直抵南寧駐定立檄前隊樊飛豹速救橫州時宋將焦芳引軍圍困橫州城垂破矣忽樊飛豹一軍救至橫州之圍遂解而橫州守將樊飛彪乃飛豹之弟手足赴援相見甚喜飛豹曰參政大軍現屯南寧宋師不足慮也弟兄計劃已定次日引兵搦戰宋師大至飛豹飛彪棄城而走兵敗寶華山飛豹飛彪既離橫州斛律統制乘勢遂取橫州飛豹飛彪忿來爭城廖雲傅突雙馬出戰不三合樊飛豹大喝一聲傅突措手不及被飛豹斬于馬下廖雲大驚虛掩一槍方欲敗走樊飛彪隨手一槍已中廖雲左腿負傷而逃斛律亢宗怒發如雷橫槊而出焦芳忿焰中燒一槊一槍戰退二將飛豹飛彪引軍敗走斛律統制催動後軍極力追襲焦芳一馬當先恨不飛擒二將迤邐直追數十裏轉過一山忽報元將轉抄在後面阻定統制大軍焦芳猛省即令人打探則前面已入山峪俱天生石壁無路可進焦芳著急遂令衆軍攀蘿附葛沿壁而上且逾此險更作理會誰知峪中周圍相連七山袤延十餘裏皆危崖孤懸峭壁如削石洞玲瓏惟穀口猶可攀援餘皆猿鳥不下而峪口經行處已爲元兵用巨石阻塞並無出路焦芳又命衆軍往岩後尋路則背枕槎江之水洶洶湧湧奔騰有千里之勢焦芳一軍在山頭左旋右轉如蟻行磨上尋思無計滿望斛律統制兵入援一連十余日軍士死者過半余多病不能起焦芳肉顫心驚偶至岩前見立一石碣上書曰上爲七星岩下有槎江水伏兵犯太陰宋將至此死焦芳看畢歎曰吾一時輕進爲敵所算其死宜矣惜吾不能掃平廣右與宋主成大業耳遙望武都再拜自刎而死
