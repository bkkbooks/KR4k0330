body:
  text: 第一回元世祖貶聖伐陵元之先世本號蒙古其國在女真之北以奇渥溫三字爲姓有始祖母曰阿蘭氏寡居在極北沙漠屢有光明耀腹後一乳而生三子季子曰孛端義兒魁梧奇偉沈毅寡言其後子孫蕃盛不相統屬傳至九世孫曰也速該興師攻塔塔兒部大獲全勝擒其部長鐵木真以歸也速該適生一子遂以鐵木真名之志武功也鐵木真深沈有大略用兵如神滅西夏四十余國雄長一方遂稱帝於斡難河號曰成吉思可汗是爲太祖由太祖太宗定宗憲宗四傳而至憲宗母弟曰奇渥溫忽必烈承位是爲世祖改元至元及至元八年正宋度宗鹹淳七年始改蒙古國號曰元時當宋季衰微理度二宗開慶鹹淳年間國勢已十分不振又恰用一炻賢嫉能不學無信吝軍賞挑邊釁之賈似道爲相平章軍重事竟將中夏神州赤縣輕輕送與韃靼部落去了恭宗皇宗四歲即位僅二年降於蒙古虜之北去二王航海一益王名昱恭宗兄也時年九歲一衛王名昺恭宗弟也時年八歲恭宗北狩益王始即位于福建曰端宗皇帝時元世祖遣都元帥張宏範領兵追至閩中君臣倉皇奔走至廣南碸州而崩再立衛王權統人心以曾子淵充山陵使奉梓宮權殯于香山縣馬南寶家南寶以獻粟助餉拜工部侍郎時左相留夢炎早已逃匿不知去向右相陳宜中見時勢危迫托詞請帝往占城諸國避難己且先往諭意爲之先容亦借此逃往暹羅去了相從者少保文天祥少傅張世潔樞密使陸秀夫宗室有榮公名晸德昭裔也虞公名景寧公名升德芒裔也涪陵公名晟秦王裔也此外有樊公名昱陳公名暹俱年幼涕泣相從就中惟涪陵公晟年方一十五歲沈毅慷慨屢屢痛恨誤國諸奸嘗謂衛王曰早知今日如此狼狽悔不在臯亭山與伯顔背城一戰幸而勝國之福也不勝則君臣在臨安同死社稷省得今日跋涉海島深恨陳宜中當時不從耳言罷目光如炬張世潔大奇之時由惠州之甲子門謝女峽井澳潮州等處又被元將唆都劉深百家奴之兵衝殺數陳張世傑死戰保護衛王而走恰好工部侍郎馬南寶募集鄉兵千人扈駕直送至新會縣南八十裏地名崖山島始住相隨者惟甯公升陳公暹而已諸人並不知生死下落衛王大慟數日後有敗殘兵至言文少保已在海豐縣五嶺坡被元將所擒此時君臣中心如碎次日張宏范大軍由海道猝至將崖山前後圍定張世傑歎曰頻年航海何時已乎縱火焚行朝草市以大舶千餘隻列成一字陣下碇海中外舳內艫貫以大索爲死守計元兵縱火焚舟宋艦皆塗泥上縛長木以拒火舟不能熱張宏範招之不降攻之不克相持十餘日無計可施究竟元人師廣力強又分兵由厘山之東轉而南入大洋兼以奇兵斷了樵汲道路宋師大困世傑雖智勇足備奈天命已去衆寡不敵前後夾攻諸軍遂潰樞密使陸秀夫自知不免先驅妻子入海謂帝曰陛下不可再辱負帝蹈海而死楊太后大慟曰我忍死間關至此者爲趙氏一塊肉耳今無望矣亦赴海死升暹二公及群臣從死者甚衆張世傑以十六舟奮勇殺出正遇元將朵爾思忽橫舟挺槍阻住世傑大喝一聲揮刀斬落水中奪港而去一心望占城逃走惠州失散趙氏後裔必逃彼處別立爲君再圖恢復至海陵山下忽遇颶風大起幾乎舟覆部從欲棄舟上岸世傑止之望著海水長歎數聲命取瓣香來世傑焚香仰天大呼曰我爲趙氏心力盡矣一君亡複立一君今君亡而我未死者非畏死也欲待敵兵退別立趙氏以存大宋之檀祀耳天若不欲我恢復趙氏風覆我舟世傑寧畏死之人哉言未畢果然颶風又起雪浪掀天世傑端坐不動海水突然高起十有餘丈柁折舟覆世傑死焉馬南寶在香山聞之泣曰國亡與亡吾之死期至矣遇樂遇陽二子日日悲泣吟詩有雲目極厓門天地改寸心不與夜潮消又雲衆星耿耿滄波底恨不同歸一少微亦不食而死當時有元將唆都等分兵來追世傑見此風浪亦艤舟近岸不敢向前徐徐回舟合著張宏范大軍肅清閩廣凱還燕京世祖大喜升賞諸將屢令宰相孛羅等勸降天祥天祥志貫金石心如日月迨至世祖至元十九年不屈遇害前三日大史奏三台星折蓋忠義之氣終不能挽回劫運矣且說元世祖自滅宋後志得意滿初政尚略有可觀洎至無丙辰辛已年間悖謬備至燕淫宸極穢汙宮闈傲狠之性殆莫與抗先是世祖嘗問太保劉秉忠曰朕起沙漠奄有中夏海外諸國罔不臣服可謂千載一時矣不知朕之國運千載後誰爲繼者太保占事之來若合符節惟朕深知當不隱諱秉忠曰自古龍犛烏火洛龜無書納甲飛符河圖無法又況鳥鵲知來而不知往猩猩知往而不知來天運國祚安可預知也然據臣推測似屬西方之人世祖默會其意謂僧錄司八思麻等乃西人也平定諸國有佐命功尊爲帝師使天下極其崇奉生列上公死葬王禮沒後更立一人定爲家法或可以暗損西人之福故平宋後即詔以八思麻爲推誠翊運保戴大國師官上柱國班宰相上朝臣凡一品以下莫與抗禮世職罔替其桑門滿利班只授大司徒嗣古妙高爲樞密副使弟子等凡是西僧概授五晶職銜旨下有翰林承旨李迪左庶子贊善大夫王晏上表切諫其略謂朝廷名器不可妄假於緇流且國家景運初開一言一動皆宜慎重舉止以爲天下後世法西僧等至假以國師之名業已過矣不可濫授極晶紊亂典常乞停此詔則臣等幸甚天下幸甚云云世祖大怒曰尊崇釋典敬禮國師乃朕祖宗家法小子何得要君罔上訕謗朝廷立命押赴市曹斬首文武不敢諫阻二人斬畢退禦便殿八思麻等入見謝恩世祖大喜命各賜坐訖謂之曰朕推崇釋教凡有國政皆與國師等商度是非議論得失國師等亦宜盡言無隱罔負朕意忽令彼書生輩饒舌不休也八思麻等再拜起謝曰陛下皈依釋門崇奉吾教我佛有靈大元之國運萬世永賴矣臣等敢不竭盡愚衷翊戴聖明哉世祖稱善八思麻遂乘機進曰陛下尊奉吾教不擇臣等蕡苾猥廁朝右陛下之意至矣然在廷文武與天下之人必不服世祖怒曰朕爲天下主獨不能操其權乎八思麻曰非也自來三教並列而與吾教相水火者道也從古帝王重道則毀釋崇釋則毀道釋與道勢不兩立然最與吾釋門相仇敵者尤莫甚於儒即如當今士大夫多宋末衣冠之舊謂其禮樂文章足以治國平天下其中奸詐百出機變遝生誤人家國爲禍不淺孰有我西方之教清淨純一易臻上理哉陛下崇佛而天下儒者皆謗佛何也蓋所崇者殊而所尚者異也天下僅陛下一人崇佛而已爲今之計欲天下之人皆崇佛法不如禁彼兩教匆使並行焚其書滅其法奪其所奉貶其所尊此陛下所能操其權者也伏維陛下聖裁世祖恍然大悟曰微國師言朕幾爲群儒所誤朕亦思天地間既推朕爲至尊何得又奉上帝又崇至聖聯幾貌焉中處不能轄遍覆載矣來日下詔方表朕心八思麻等遂出次日臨朝大會文武傳詔曰朕今混一土宇中外臣民宜定所尚以便各遵蕩平之路尚忠尚質三代惟然是道是儒累朝皆謬朕前已崇奉釋教皈依西方二三臣工罔敢異志其儒宗至聖孔子降爲中賢免行釋奠之禮學宮改爲蘭若招提科舉學校一律停止上帝天翁坐擁虛器懵懵無識全無降鑒之德宜更其位圓丘郊祀俱罷典禮其道門書籍概用焚毀惟道德經不在此數有私藏天文圖讖太乙雷公式七曜曆推背圖苗太鑑曆等書者殺無赦知而不舉者坐詔下文武駭異翰林學土王磐出班欲諫太傅伯顔手牽其據曰先生獨不見李迪王晏耶王磐不聽大言曰老夫今日得死所矣班中左拾遺吳潛給事中劉元禮集賢大學士許衡工部郎中郭守敬昭文館學士張文謙等一齊曰王翰林能死斷不能一人獨死也王磐蒼顔白髮盛氣向前正欲毀其白麻忽西南口豁唎一聲如天崩地塌內宮傳言太極殿被雷聲震塌一角霎時天昏地黑雨雹並至屋瓦皆起世祖大驚退朝桑門國師等驚得無處逃竄隨著衆官倉皇出朝至正陽門忽疾雷一聲將專吽沒的裏二西僧震死時王磐執許衡手言曰滅天毀聖亙古未有誰謂蒼蒼者或懵也歎息而別次日又報大同路地震江淮等處大水淹死居民二十余萬太廟中鬼哭有聲群臣方謂天變猝至可回帝心上表進諫文武交章劾奏西僧而世祖剛愎日恣竟不批出亦不停悔前詔許衡歎曰先聖德與天侔其聖自在天壤豈人所能升貶哉衡讀其書得以身名俱顯累累乞休不許非我志也今老矣更貪位立朝人將謂我無恥鬱鬱致仕不久遂卒王磐亦以年老乞病而歸一日國師桑門等及一班律臣侍案偏殿世祖偕諸王妃嬪浮白噱飲自起行酒謂衆人曰今日須痛飲盡醉不醉者以違旨論罪一時群臣喪德失儀謔言謾語全無顧忌飲至半酣世祖興起磕頭箕倨大呼曰取龍頭缽盂來少時內官捧至衆視之不解何物世祖曰飲器也用人頭琢就然必國王之頭方妙此乃蠻國王頭也凡我西方諸部君長伐人之國得王頭爲飲器者最爲吉祥群臣皆賀嗣古妙高進曰陛下飲器自以爲妙然據臣思之猶未盡善世祖有怒色嗣古妙高謝曰陛下言此飲器須得國王頭爲之始妙然不過國王頭耳非天子頭也若得天子頭爲之豈不更妙世祖回嗔作喜曰果然更妙嗣古妙高曰今宋帝諸陵皆在會稽何不遣使伐掘陵寢取頭以歸且陵中必藏有珍玩可得金寶最爲兩便世祖手撫其臂大笑曰樞密可人哉朕昔年平國數十有餘所獲珍異無算及張宏范滅宋以歸珍寶全無惟得一死不屈節之文天祥而已朕甚怪焉金寶乃在陵中樞密不言朕焉能知權擢少傅異日更有升賞嗣古妙高叩首謝恩即日傳旨遣侍郎盧世榮宦者咬住前往會同浙省平章哈馬黎伐陵二人領旨即往臨安去訖
