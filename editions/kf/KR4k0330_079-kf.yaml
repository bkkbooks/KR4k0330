body:
  text: 第七十九回黃金河大破元兵寇節度既下太平所屬二縣一十六州留兵命史良璧留兵鎮守太平忽報南陵失陷三將退保橫州急引兵由田州來取南甯中途聞狄樞密攻打昆侖與元將相持未決遂謂衆將曰狄樞密既打昆侖南寧不難複矣回兵由象州進攻柳州府時象州乃團練使勃勃禿兒鎮守有兵三千聞宋師至領兵出城至象臺山下迎敵斛律統制率廖雲王彥二將出馬列爲三陣左廖雲按山川向背爲地陣右王彥按偏伍彌縫爲人陣己居中按星宿孤虛爲天陣互爲照應勃勃禿兒望見將人馬屯作七隊按兩曜五星作七陣圖以敵之兩下交鋒互有殺傷各鳴金收軍是夜勃勃禿兒來偷宋營斛律統制偶有疏虞被元軍大殺一陣而去宋師頗有損傷寇節度切責統制將論其罪斛律亢宗請攻下象州自效寇節度許之斛律統制曰勃勃今夜必防我兵劫寨虛其中軍伏兵多四散遠處不如將機就計廖雲引一軍鼓噪而前虛作劫營之狀入而複出仍舊伏於寨外王彥引一軍邀伏兵之後令勃勃營中自相混戰直至天明二將合兵以逸待勞直突其營吾引大軍邀截歸路欲取象州在此一舉二將然之且說勃勃禿兒得勝而歸謂將士曰宋將失利今夜必乘吾虛不可不防令伏兵大寨左右靜以待之三更後宋師果然擂鼓喊殺直突營門勃勃喜曰中吾計矣發動伏兵一齊殺入營中死戰不休直至天曉何曾有一宋兵自相踐踏死者無數言未已忽寨外一聲鼓響宋師大至慌忙迎敵而元兵混戰一夜業已困乏廖雲王彥雙馬連環勃勃禿兒不敢戀戰拔營而走不數裏一聲炮響斛律統制一軍擋住勃勃著驚拍馬落荒而走元兵大敗宋師追至城下元兵爭先入城一時不及宋師已奪門而入斛律統制遂拔象州降其餘衆遂免於罪勃勃禿兒聞象州已失引殘兵望柳州而去寇節度遂進兵柳州時總管索虎通領敗兵已回守禦皆備自引兵至羅城縣南靠定麒麟山下一大寨兩軍尚未對壘蒯參政又令周鳩羊雷等戰將十余員率大軍五萬前來協戰柳州索虎通命靠定西山下寨寇節度見元兵日增細審四沖之雲氣防有伏兵又下令秣馬厲士每宿于營數裏外伏勁勇之土多列鼙鼓有警即擊鼓爲號敵擊衛兵則中營出輕兵援之敵擊中營則四面夾攻之又於陣中數出奇兵利則進否則退每當臨戰時必設奇兵分左右翼自陣後擊之或伏深山茂草中不施旗鼓唯以強弩劍盾戈鋌藏隱於身伺戰後先出強弩射之或佯敗誘追伏動則撲之皆可以取勝又見元將兩軍約十萬衆犄角下寨宋師僅四萬餘衆乃相地勢用握奇下營法以敵之其法外壘一軍須一萬二千五百人以十人爲火一千二百五十火幕數如之幕長一丈六尺合十人守地一尺六寸以三爲奇以三千七百五十人爲奇數餘八千七百五十人分爲八陣陣有一千九百九十七分五株守地一千七百五十尺八陣積足守地一萬四千尺卒城二千三百一十二步餘二尺積步卒六裏餘一百七十三步二尺以壘四面乘之一面得一地裏余二百二十步壘內得地十四頃十七畝餘一百九十步四尺六寸六分以爲外壘天陣居乾爲天門地陣居坤爲地門風陣居間爲風門雲陣居坎爲雲門飛龍陣居震爲飛龍門虎翼陣居兌爲虎翼門鳥翔陣居離爲鳥翔門蛇盤陣居艮爲蛇盤門天地風雲爲四正龍虎鳥蛇爲四奇乾坤艮異爲闊門離坎兌震爲開門有牙旗遊隊列左右偏將軍居壘門禁出入外有遊軍兩端前有沖後有隊四隅有鋪中壘一奇兵三千七百五十人爲中壘守地六十尺積步得二裏餘二百八十步以壘四面乘之得二百五十步壘內地二頃余一百步六囊旗鼓五麾金鼓府藏皆在中壘此令一下諸將多不解所謂寇節度乃總爲圖以示之衆將觀畢始如法安布訖元軍中遣人下書約戰寇節度回以來日當夜寇節度調度諸將次日昧爽元軍堅陣以待宋營以鳥翔陣馬晉臣應敵元將周鳩奮勇而來戰不一會宋將廖雲王彥率飛龍虎翼兩隊應兵齊出衝殺元陣中王峻楊樊劉洪吳奫戴瑀五隊並進狀若列星宋營中斛律亢宗以盤蛇一陣當之首尾交應兩軍戰鼓齊催混戰一會互有損傷各鳴金收軍寇節度謂衆將曰元陣中旗幟分明金鼓回應不可謂非勁敵也數日後蒯參政聞索總管戰宋將不下自引兵一萬健將十員親臨柳州督戰蒯參政望見宋營大驚曰宋將知兵莫謂無人也下令大軍宜慎重舉止乃背麒麟山面黃金河下寨遂用偃月營法敵之亦繪一圖以示將校偃月營者前後險阻外營以四方幕一萬人以六千人守地九千六百尺積得前一千六百步積步得四裏餘一百六十步爲營轉以六千四百尺得步一千六十六步四尺爲弦弦置三門相去三裏五十步一尺五寸營內有地一十五頃八十五畝五十八步四尺右置上弦門中偃月門左下弦門偃月中營營以二千五百尺守地四千尺得前六十六步餘四尺積步得一裏余三百步四尺每幕加地四尺五寸四分每幕營中兩相置土馬一十二匹大小如常馬被其鞍令士卒披甲胄橐弓矢佩刀劍持矛盾左右上下以便習事衆將校既得其詳亦如法佈置報入宋營中寇節度跨馬出營觀畢謂衆將曰蒯參政自來想廣右之兵盡於此矣收復廣右在此一舉諸君且助吾成此不世之功諸將口雖應允因見元兵日增日衆心中未免少怯寇節度不以爲然回營大集將佐列陣于黃金河邊令斛律亢宗引兵三幹充頭隊搦戰令廖雲引兵三千伏于左王彥引兵三千伏於右洪時錦引兵三千伏於前馬晉臣引兵三千伏於後驍將等緊守大寨自統中軍四陣接應務擒敵將方止且說蒯參政下寨畢索虎通及衆將等皆往參見參政責索虎通曰前檄調出征乃貪戰邀功坐曠日月致傷副將今此間將士如雲如雨乃不速破敵何也索總管無言可答惶恐而退次日即督集衆將校與宋師決戰令羊雷爲左翼周鳩爲右翼自率精兵五萬衝殺合兩營之衆蓋地而來斛律統制以一隊奇兵當先戰數合即佯敗而走索虎通大隊不動麾兩翼兵追之斛律統制直誘至黃金河上只見寇節度引大軍來迎不與交戰即麾動六纛旗四隊伏兵一齊從中殺出周鳩羊雷二將圍在垓心索虎通即引大軍欲突陣而入斛律統制一軍牽住死戰不已寇節度指揮將士往來截殺宋兵無不以一當百周鳩爲亂箭射死羊雷潰圍出時亦身帶重傷忙助索總管夾攻宋將元兵十傷八九索虎通既得羊雷相助大奮神武連挑宋營裨將十余員斛律亢宗不能抵敵寇節度看得分明急麾四陣圍之數重而蒯參政忽引萬餘生力軍衝突而來宋將猝不及防竟被截爲兩段寇節度正欲出馬忽見狄勇種世虎慕容長藍天蔚四將統大隊殺來元軍罔不披靡羊雷被狄勇手起一槍刺于馬下元兵死者無算索虎通一見知接應兵已至不敢戀戰保護人馬奪路而走蒯參政亦引軍而退宋師奏凱而歸
