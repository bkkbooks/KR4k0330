body:
  text: 第四回靈隱寺激怒英雄心卻說杭州臨安城外一寺曰靈隱寺乃吳浙第一名山唐宋以來代有勝迹詩人騷客留題不可勝述南宋又駐蹕臨安故當代尤甚元主既奉西僧凡名刹髡首無不驕恣傲睨而平章哈馬黎每來靈隱見遊士雲集甚惡之謂混擾清門出令禁止寺僧遂如虎生翼種種不法大肆橫行寇複雷等在杭偏欲搗入虎口往來寺中一日有遊士三人一名韓昭一名李穆一名楊孝伯來杭訪友不遇散步入寺憑古迹李韓二人觸景興懷吟詩不輟惟楊孝伯玩景不置觀其氣宇軒昂似非筆墨者流而寇複雷等以英雄遇名士自爾情投意合約略數語歡然相得各通鄉曲即命從者取酒擇一回廓靜處開懷醵飲寇複雷提起伐陵一事拍案大怒目中火出韓昭李穆掩袂欹歔曰似此慘惡一部十七史未之見也關普靈曰蒙古以犬羊之俗豺狼之性兵戈所至靡不殘虐而天意竟歸之作斯世主惟智者不平焉李穆曰天道幽遠此意令人難知古雲順天者存逆天者亡逆取順守尚難保國矧蒙古逆取逆守乎宋未偏安海隅綱紀不振用人乖舛蒙古扼其嘸而奪之偶得志耳未必即爲天命攸歸也韓昭曰諸君以天意佑相蒙古耶而不知天怒實甚蒙古崇奉西僧尊禮釋教停罷科舉狂言悖語貶我先聖尼父而爲中賢妄作妖書欺滅上帝故今災異疊見地動山崩古今有如此天子乎言未畢座中焦芳勃然大怒曰反了反了滅了聖教改換天地是舉目不見三光了不反何待韓李二人訝曰寺中恐屬垣有耳諸君醉矣寇複雷亦激怒而起衆人俱拔劍擊柱暴躁狂呼時已驚動寺中長老古卷思吉了了和尚這了了和尚正是西人獰面赤須勇悍淫虐慣使雙刀二弟子海清海寧原是宋末獨松關總兵張濡部將伯顔破關遁此爲僧助桀爲惡寺中凡五百餘僧俱是鄉里無賴鬥牌宿娼幫閒吃白食的髡禿可惜靈隱寺歷代名勝竟爲藏垢納污之通逃藪矣時寇複雷等初來寺中衆僧欲上前阻滯見諸人狀貌知難歪纏聽其遊玩想不久即去誰知諸人性起大呼大嚼端來撩彼虎須了了和尚得知老大著驚有二行者上前責曰此乃淨地行者有令禁止遊人女等業已違令還狂飲喧呼是何道理寇複雷大怒觸口就罵宇文廣揮拳便打二行者嚇得魂不附體飛也似奔去了韓昭李穆素知寺中僧衆不法即速避出寺外衆人譁然曰不入虎穴焉得虎子率性撞入寺來正遇了了和尚手挽手雙刀而出海清海甯左右扈從楊孝伯拔劍敵住了了和尚猛勇異常刀法全無破綻衆人一齊混戰正是慈悲精舍交鋒地清淨法門作戰場當時斛律亢宗見孝伯戰了了不下手拔階前石欄杆一支乘勢打去正中左臂了了負痛回身便走海甯亦被焦芳揮劍中腕衆僧披靡忽一聲呐喊五百餘僧團團圍住了了振起精神手拈長槍複來助戰衆人雖勇奈隨身僅有佩劍只可防身衆僧是長矛大戟面面刺來焦芳激得暴吼如雷正在危急韓昭李穆在寺外大呼曰公等盡力敵住我二人外面縱火焚寺燒殺賊禿果然西廊後火起煙漲迷天了了大驚速命救火衆僧手忙足亂寇複雷等衝殺而出會合李韓回頭看時倏忽不見火影衆人吒異韓昭曰此吾二人疑兵計所設疑火想已撲滅耳衆人皆欲將寺縱火焚之韓昭曰不可六朝名地焚之可惜衆人曰留寺有僧終爲後患韓昭曰非也此外通近杭城行省得知我等手無寸尺其禍非小衆仍服遂暗往臯亭山暫住而去再說江甯秦錫帛狼聲虎狀眉橫一字及長多權謀能左右射粗猛過人素有異志常遊西湖葛嶺等處慕賈似道之爲人曰似道風流可兒可兒有三子曰杞曰梓曰楠俱能操強弓騎怒馬有兄名開岐又有浦城邢士龍順昌藍天蔚邢藍二子在閩殺人亡命江淮錫帛見二子俱萬夫勇收爲爪牙凡江淮等無賴之徒悉往歸之俱密密分佈于淮揚蘇松間揚子江瓜步洲等津隘遍置腹心劫掠江口收納亡命奸逼婦女無不備至錫帛一日同邢藍二人潛遊臨安私探浙省近來消息偶至靈隱剛入寺門衆僧各執器械一齊打出三人大驚不知所措溜焉逃走至江口方欲上船忽見上流舟聚如蟻船上遍列戈矛無數軍卒大呼且住奉平章之命拿賊來也三人大窘沿岸望小孤山而走衆軍棄舟上岸看看追及三個自知不免藍天蔚立定主意命二人先行獨自擋住衆軍一擁上前擒拿趁著機會隨手奪得一支畫戟丟開架子便左五右六施展起來衆軍卒出其不意錯愕間反慌了手足遠遠辟易一齊亂箭射來藍天蔚一支戟神出鬼沒舞動處箭皆紛紛落地大喝一聲能戰者皆來刺傷數人衆軍已東西逃竄藍天蔚捉空撇了衆軍追趕秦邢二人而走殊不知杭州兵並非能征慣戰不過奉哈馬黎之令巡哨沿江稽察靈隱見藍天蔚孤身獨立只說甕中捉鼈焉能當此惡戰錫帛三人不知靈隱有事沖了頭陣照常往遊幾投羅網藍天蔚趕上備言殺敗杭兵三人大喜錫帛恚怒回首指杭城誓曰有杭無我有我無杭秦某不能效看花洛陽之客立馬吳山誓不休也卻說平章哈馬黎兩次得知此事大怒曰大元混歸一統豈容鼠輩子屢肆猖撅也嚴檄各處關隘十分防範杭城左右密加稽查杭州官屬悚息聽命時錢塘江下潮水發了大凡浙江廣陵兩處潮汐一至觀者人山人海故有句雲聞道浙江潮有信浙潮爭似廣陵潮時值八月之望錢塘兩岸如龕山赭山海門等處觀者如堵韓昭李穆寇複雷衆人亦至羅刹江畔觀潮閣上扶檻而望沿江往來遍見軍卒巡視諸人在閣上不以爲意韓昭指曰此錢塘松江也東北行七十裏爲三江之口東北人海爲婁江東南入海爲東江並松江爲三江言未已忽潮頭高起十有餘丈滾滾而下如天半銀河瀉落長空又如萬丈白練月光激射舒卷夭矯掀撼兩岸天地皆震諸人玩賞不已韓昭曰伍大夫之靈也寇複雷贊曰生有若大志量沒有如此神通非忠憤所激不能也的是英雄楊孝伯遙指杭城謂曰杭州若無捍海石塘則潮水一起杭州皆魚鼈矣李穆曰此錢謬王功也衆問故李穆曰梁開平中錢鏐欲建候潮通江門潮水沖激版築不就因令人以強弩數百直射潮頭既而潮水漸向西陵乃積石築木爲塘捍之城基始定昔人相傳武肅王箭所射正處嘗立鐵幢故名鐵幢浦今其鐵箭猶存也衆皆一心觀潮方津津談論不休忽回頭不見焦芳斛律亢宗二人大疑關普靈曰想沿江玩景去矣少時人聲沸騰言行省遣人拿獲巨盜二名已械赴杭城去了衆人大驚情知有變急望臯亭而走沿途打探行省拿去者果焦芳斛律亢宗也衆人有興而來敗興而返
