body:
  text: 第十八回虎丘寺涪陵遇友卻說涪陵一時失口妄言不料旁有上海縣一個吃白食做幫閑的無賴名曰甯雕兒終日走豪門作篾片一班也鮮衣肥食徜徉街頭忽聞還我正朔一語大呼拿賊衆人皆驚甯雕兒曰此必壽陽奸細來恥窺伺拿獲自有重賞衆人方欲動手馬遇樂慌忙止住代涪陵解說曰我等乃多年航海商旅此位因在海道覆舟喪其資斧附載同歸因中狂病以致誑言妄語諸君不信請驗行色可也衆人觀其行止果然不差哄然而散馬遇樂再三謝過涪陵亦故作狂妄之狀甯雕兒睇視曰女狂則狂矣莫非與中山之狂一黨也衆人內亦有代爲排解者三人始脫身而去馬遇樂大驚曰殿下何不自晦如是倘禍生不測將十年海島辛苦均付東流矣今後當守口如瓶慎勿妄言涪陵如夢初覺半晌乃謝曰謹如兄命不意數日在海中觸冒風寒投宿邸中一時疾作二馬慌忙延醫調治日復一日漸次沈重奄奄待斃二馬晝夜不安寢食俱廢在榻前相對泣曰我弟兄十年海外顛沛相從九死一生始回故國一旦朝露趙氏永無望矣言罷大慟無聲涪陵在榻上微微欠伸二馬又輕輕扶起抉開其口以藥少許灌下忽喉間汩汩作響二馬暗喜少時又略略轉側漸有呻吟二馬方欲詰問忽門外一片喊聲見十數漢子各執器械蜂擁而入馬遇樂當面迎住遇陽守護涪陵遇樂大呼店家何在店中小二不知去向只見當頭數人聲聲叫海外客商定有異寶遇樂心頭火發不上三拳兩足打翻數人轉過店家急爲勸止始抱頭鼠竄而去遇樂暗思店家皆其党類欲爲地方除害恐投鼠忌器轉過念頭心便釋然慌來撫視涪陵涪陵病雖垂危心尚明白聞二馬悲泣聽之了了惟神情仍是昏迷忽聞喧嚷之聲吃驚不小誰知受此一嚇遍體汗出霍然而蘇一時四肢舒暢如釋重負開言問賊匪去否二馬大喜再三安慰隨即進以藥餌越日遂起涪陵曰此處東亭鎮離雲間僅百餘裏且往松江暫住此地非可久留也二馬深然其說剛行數日忽聞松江府沿蘇州太湖水發由青浦福泉上海諸縣淹斃居民無數涪陵遂不往雲間望松陵驛直過吳江將往臨安訪兩浙消息非止一日始達姑蘇城出閶門至靈岩寺四顧峰巒清秀三江五湖精華所萃一片佳麗爽人心目又登落虹亭眺望見江水淙淙由胥口而來震澤洞庭諸水渺渺連天笠澤雪灘香徑鎖夏灣長洲苑陵羽泉姑胥台鱸鄉亭響屧廊生公石諸名景美不勝收涪陵三人在海外所見者山惟島嶼非突兀峭拔即廣漠詭異水惟波濤非洶湧澎湃即浩淼無際豈有此清淑之氣直逼扶輿真是吳中第一名勝惜已陷蒙古非複我大宋版圖也涪陵觀玩感慨不已後人至此曾詠其登落虹亭一律雲身從海外久伶仃欲盼三吳上此亭香徑草荒秋露白山村雨過暮煙青天空一雁來胥口木落諸峰見洞庭莫唱菱歌緣岸起臨安駐蹕即前汀涪陵三人又遊至虎丘按闔廬之塚專諸魚腸之劍在焉葬畢三日而白虎踞其上故曰虎丘寺前石梯懸峻凡五十三級士女肩輿遊此必令舁夫倒擡而上涪陵到此回看賣酒樓下橫塘邊畫舫遊船不計其數海燕亭丁家樓等處策管盈耳不異當年景象涪陵三人不勝淒其又看劍池一潭深不可測昔人有詩詠劍池雲劍去池空一水寒遊人到此憑欄杆年來世事消磨盡只有青山依舊看當時遊人甚衆往來車馬絡繹不絕而樓下花間婦女尤甚明擋玉羽珠翠交錯遺鈿落舄誇多鬥靡處處香氣撲鼻時又百戲雜陳有昆山常熟諸縣樂部妙伶一句一句遍演名調法曲歌喉宛囀遏雲繞梁加以蘇人士女鍾山川之佳麗玉蕊瓊英莫能方喻登山遊眺者直是錦團花簇應接不暇有竹枝詞十首略寫其概橫塘七裏路西東士女如雲踏軟紅才到寺門歡喜地一時花下筍輿空姑蘇樓畔石梯懸步步弓鞋刷可憐五十三參心暗數欹斜扶遍阿娘肩佛座燒香一瓣新慈雲低覆落花塵不妨訴盡癡兒女哪有如來更笑人女冠裝束認依稀只少穿珠百八圍豈是閨人真好道阿依愛著水田衣昏崖老樹落朱藤漏出紅紗隔葉燈不留霓裳有風露吹笙樓上坐三層斑竹薰籠有舊恩湘妃節節長情根吳娘酷愛衣香好個個將錢買淚痕千點琉璃八角亭劍池寒水浸華星天生一片笙歌石留與千人廣坐聽畫鼓紅牙節拍繁昆山法部鬥新翻順郎年少何堪老海燕亭前較一番樓前玉杵一紅牙簾下銀燈索點茶十五當壚年少女四更猶插滿頭花湘簾畫楫趁新涼衣帶盈盈隔水香好是一行烏柏樹慣遮朱舫坐秋娘涪陵此時也覺心曠神怡把國難流離一時化爲烏有正與馬氏弟兄散步貞娘墓前忽一人低言曰殿下別來無恙耶涪陵回頭一眼認定是越國公張世傑部將張懷亮隨即攜手選一僻靜酒樓坐定涪陵與二馬共訴別後情況張懷亮亦言崖山戰敗即同主將以十六舟奪港出走又被元將唆都巨艦沖散某與主將不能相顧逃至香山收集殘兵議圖報複又主將在平章山下殉節而死衛王赴海而亡漂泊江廣只說大宋無人誰知今日得遇殿下實小將再生幸也言罷淚下如雨涪陵亦泣謝曰我三人遠竄海島無國可投無家可奔今日雖歸中土舉目無親得遇足下不愁無援助矣回憶在惠州甲子門日日走馬時我固韶年君亦弱齒轉瞬十稔若隔再世當日趙氏相隨駕者凡有七人今惟某在矣言畢聲淚俱下馬遇樂曰殿下今日得遇故人正宜尋安身之所圖恢復之計何爲作兒女子態乎遇陽亦曰男子仗劍樽酒之間備嘗艱困益加老練殿下惟記著崖山臥薪嘗膽則勾踐會稽之功不日可見涪陵收淚謝之張懷亮因言蒙古伐掘陵寢盜取寶玩至以理宗皇帝首級琢爲飲器暴戾慘毒虐及枯骨爲亙古所未有又滅天毀聖薄儒重釋天怒人怨一時並作故兵戈四起盜賊橫行殿下可乘此時大張義舉崛起恢復系天下之望則生民幸甚涪陵聞會稽諸陵盡被伐掘拍胸頓足嚎啕大哭三人再三勸止涪陵一時目眥盡裂血淚直迸大罵羯賊某與你誓不共戴天張懷亮曰殿下此時行止如何定計涪陵曰將往臨安潛訪故老或世胄苗裔收攬英才徐圖恢復兼省視會稽諸陵惟恨目下手無尺寸耳張懷亮曰江南人才蒙古曾設廉訪使招納凡故家逸老世臣子弟早已逃去至山林隱逸之士詩書禮樂之英十等數內已列儒於娼之下丐之上識者羞之兩浙之行殿下休矣小將近來並無安身所在相識有劉瑛劉瑝弟兄者義重如山本系都督劉師勇之子劉都督昔日與主將張世態情逾骨肉意氣相投瑛瑝弟兄與小將不忘舊好結爲昆仲義不仕元自潯陽江別後聞在撫州石門山聚衆三千餘每思相機行事未得其主殿下何不竟過江右直往撫州大宋之義旗一舉南北必有回應者何勞殿下僕僕風塵也涪陵大喜曰草澤既有英雄趙氏七廟有靈矣明日便當起行言罷四人方欲起身忽樓下輕輕踱上一人大言曰汝等謀事休得瞞我吾將往行省處告變矣涪陵大驚二馬懷亮亦愕然那人上見涪陵納頭便拜涪陵慌忙扶起又與衆人禮畢乃曰某複姓皇甫名悼湘江人也避亂淮右前因遨遊廣陵順道訪姑蘇名勝路過此地適聞諸君忠義之言出於肺腑大舉恢復甚愜人心殿下倡義之始帷幄需人惇不才願借箸前籌附驥尾以圖功涪陵與諸人無不大喜張懷亮先至江幹預備船隻然後請涪陵等一齊登舟望太湖而進
