body:
  text: 第七十五回寇節度力戰青龍嶺宋都押牙統制斛律亢宗聞三將在摩天嶺覆軍殞命放聲大哭招魂設祭三軍無不下淚急令人告急長沙寇節度飛奏宋主帝亦震悼不已樞密正使岳燕超奏曰欲收廣右此兵未可小覰陛下宜命大將協助長沙以成偉功帝允奏即詔保昌侯樞密副使狄定國率藍天蔚種世虎慕容長狄勇四將領兵一萬共取廣右狄樞密領詔點兵征齊四將不日起行寇節度聞之亦命驃騎將軍任天鵬暫攝節度府事自引一軍統馬晉臣史良璧及驍將十余人直望廣右南寧倍道而進不日遂抵思州深責統制損兵折將之罪斛律統制見節度兵至自請出戰命吳廣引兵伏於鴛鴦浦廖雲引兵伏于羅叢門洪時錦爲應兵直至思州複來搦戰蒯參政即命副將退敵朱光鬥羊雷出馬律統制橫槊大罵隨與交鋒不三合即敗二將欺其兵少驟馬來追不數裏號炮一響洪時錦一軍殺出二將忙督兵敵住不一會洪時錦又敗二將方欲勒馬忽報范瓊周鳩接應兵至二將遂放心追趕剛過鴛鴦浦吳廣一軍忽起掩殺一陣二將又戰退吳廣且曰此兵即是埋伏不足慮也不趁此時恢復南寧更待何時追過羅叢門忽後面廖雲一軍阻住去路前面吳廣洪時錦一齊勒馬殺回斛律統制麾衆圍定朱光鬥不提防被斛律統制一槊刺于馬下衆軍砍爲肉泥羊雷見此光景情知難免乃大呼曰今日之戰有死無生遂振起精神一支方天戟神出鬼沒馬到處萬衆披靡竟衝殺而出元兵大敗盡棄甲倒戈而走宋師追襲之間正遇范瓊周鳩接應兵至放過羊雷敵住宋師斛律統制大怒奮勇爭先橫槊便刺不三合輕舒猿臂將范瓊擒於馬上擲之於地衆軍縛定周鳩已落荒而走元軍又敗羊雷周鳩急引殘兵回營保護參政喘息未定宋師已至元軍衆將齊出混戰宋師勇氣百倍破竹之勢敗其兵砍其營蒯參政自知思州難守棄了思州遂赴鎮安斛律統制得了思州將所擒元將範瓊械赴南寧隨告捷音寇節度命軍中斬之又命馬晉臣引一軍攻打田州廖雲引一軍下歸德上思等處留大軍駐南寧自領輕騎徑襲思恩各路攻擊使元人救應不暇斛律統制聞之亦統三將之兵急趨鎮安蒯參政正欲命將迎敵忽報宋主又遣保昌侯狄定國引大兵直搗桂林府蒯參政大驚以兵五千命曹豹死守鎮安自統周鴻羊雷星夜回桂林而去參政既去量曹豹能支幾何被解律統制協衆極力攻打三日遂破鎮安曹豹降宋守城文武無不納降所屬各州一時皆定命將撥兵鎮守統制又進兵太平時寇節度兵至思恩府思恩守臣苗鸞王璠靳衡一文二武號爲三鬼苗鸞爲太守虐遇其民見白鏹則如生命謂之財鬼王璠爲都尉狂蕩好淫姬妾滿屋謂之色鬼靳衡爲團練使終日酩酊酒巵不離口謂之酒鬼寇節度兵至苗彎居守王璠靳衡出戰二將平日惟貪酒色不親卒伍臨陣惟令士卒抵敵殊無鬥志宋師乃是精兵一陣截殺如拉枯折朽二將倉皇逃遁皆爲宋將史良璧所殺思恩百姓見元兵已敗一齊大呼殺了賊官共投宋主遂將苗鸞殺之開門納降寇節度人城安慰父老出榜曉諭令各安生業勿得驚慌倉庫不動窮民無靠者皆賑恤之思恩之民大悅上林遷江等聞之皆送降表至又聞馬晉臣一軍已下田州因攻太平爲元將所困乞援寇節度即令史良璧暫守思恩自率餘兵往取太平按太平府所轄兩縣一十六州地最遼闊守臣乃上都路兵部左侍郎阿爾只思左遷鎮此部下二將一名商三糸辟一名公孫冤皆萬人敵驍將甚廣兵亦充足馬晉臣一人如何能敵方至安平州遂爲所敗再過養利州又敗於雞公嶺自知不敵星夜求援寇節度兼程而進正遇元將商三糸辟追殺宋師甚急寇節度大怒列開人馬放過馬晉臣挺槍而出與商三糸辟大戰三十餘合不分勝敗馬晉臣亦驟馬夾攻商三糸辟始力怯敗走寇節度不追約兵屯住打聽阿侍郎重兵現屯羅陽縣青龍嶺二將兵屯永康州白虎山寇節度日先破二將阿爾只思膽落矣斛律亢宗已下鎮安亦引大軍來太平助戰寇節度甚喜越日自統一軍直犯白虎山討戰商三糸辟命驍將甘受和出馬寇節度大怒只一合斬之商三糸辟公孫冤怒發如雷雙馬出戰寇節度馬晉臣隨與交鋒不數合元軍後隊無故自亂商三糸辟公孫冤著驚虛掩一槍回馬便走原來斛律統制一軍已到探得元兵屯於此山遂從山後直襲後軍元兵背腹受敵遂敗商三糸辟公孫冤棄了白虎山望羅陽而走寇節度合兵一處曰此去離永康州甚近隨令吳廣拔了永康以爲停兵之所再攻羅陽吳廣引兵圍永康州五日下之洪時錦亦分兵取了思陵王彥又大破江州餘更納降數處太平大震諸將仍舊合兵來攻羅陽寇節度遂揀選一片平曠之地北據連山南憑高岡左右皆有襟帶將兵下寨次日阿爾侍郎自率二將忿來討戰寇節度見元兵靠定青龍山列陣即調斛律亢宗馬晉臣洪時錦吳廣王彥五將各統一隊分別旗甲鞍馬等類列成五龍奔海之陣仍自挺槍上馬對敵公孫冤一刀一馬即出寇節度與戰數合即退公孫冤不識陣法望陣追來寇節度將星旗招展五將一齊殺出公孫冤全隊被困死戰不已商三糸辟忙引兵來接應見無路可人正揮士卒左右衝殺寇節度飛馬已至大喝一聲商三糸辟死於槍下立即率兵直取阿爾只思元軍十余員驍將一齊抵敵節度全無懼怯戰敗數人不一會五將已將公孫冤戰死陣中各引軍助戰寇節度便棄了衆驍將又縱馬來擒阿爾只思阿爾侍郎捨命奔走寇節度便拈弓搭箭覰定射去阿爾只思中箭落馬寇節度急棄弓於地飛馬來取首級馬到時竟被元軍奪去元軍驍將又被諸將殺死數人元兵大敗又棄了青龍嶺已知羅陽不守急奔太平寇節度合衆將之兵連夜追之直抵太平一時城東放火城北鳴鉦城西喊殺城南擂鼓一日一夜攻陷數處阿爾侍郎中箭傷重而卒城中驚慌軍民無主文武官吏縊者刎者不一餘皆納降寇節度令大軍屯於城外自引一軍率將佐入城撫慰軍民約定秋毫無犯人心既定乃分兵命將徇下安平養利諸州旬日之間各處皆有捷音
