body:
  text: 第六十三回蘇公堤朝雲集句廣南惠州府城西有湖曰豐湖湖上有堤曰蘇堤因宋紹聖中蘇子瞻謫守惠州見地方人修堤不就出所賜金錢助以成功故名曰蘇公堤志不忘也子瞻既謫惠州以道途遙遠不帶姬妾惟朝雲苦欲相隨許之朝雲者錢塘名妓也子瞻爲杭州太守納爲常侍相依嶺外子瞻甚憐之曾有詩曰不學楊枝別樂天且隨通德伴伶元阿奴絡秀方同老天女維摩總解禪經卷藥爐新活計歌衫舞袖舊因緣丹成隨我三山去不作巫陽雲雨仙朝雲隨子瞻至惠州未及一載以不服水土病卒子瞻痛惜以西江月一詞悼之雲玉骨哪愁霧障冰肌自有仙風海上時過探芳叢倒挂綠毛麽鳳素面翻嫌粉膩洗妝不褪唇紅高情已逐曉雲空不與梨花同夢子瞻葬之於棲禪寺大聖塔後因朝雲臨卒以誦如夢如泡之句而死子瞻爲造一亭以覆其墓即名曰六如亭此墓遂與虎邱貞娘錢塘蘇小俱爲名墓後人每屆清明俱來墓前滴酒澆奠至於墓地常濕亦惠州一勝迹也時朝議郎韓昌爲惠州太守昌有侄名文通同在任所攻讀之暇輒散步於湖山佳勝一日有契友數人招飲平湖閣呼盧浮白吟詩填詞或選瑤台之勝或寄玉灘之景一觴一詠暢敘幽情直飲至東山月上遠遠望見合江樓俱在目中文通始辭別衆友喚侍僮相隨乘醉踏月而歸行不數武忽閣道前有一淡妝素衣女子偕一侍婢持燈前導女子冉冉而行文通業有七分醉意急躡其後素衣女子卻嫋嫋娜娜其行如駛文通追之不上至棲禪寺大聖塔六如亭邊倏忽不見文通深以爲異侍僮皆見之文通心知爲朝雲之靈惜未識面惆悵不已緩步而歸是夜寢不成寐伏枕暗思此人明明在目竟當面錯過豈不可惜翻來複去直待東方發白即披衣而起欲往六如亭前思一申禱古信步行去不覺仍過蘇堤忽見平湖閣在前不遠乃啞然笑曰誤矣方欲轉去忽又想昨宵之事明明遇合在此且至閣下少坐思一良夕佳會何如甫過堤畔經閣道只見西廊墨沈淋漓字迹遍滿壁上文通逐一覽之則壁上共成七言律集句十首七言絕集句十二首乃仙靈之貽芳不朽於世也七盲律雲家住錢塘東複東偶來江外寄行蹤三湘愁鬢逢秋色半壁殘燈照病容豔骨已成蘭麝土露華遍濕蕊珠宮分明記得還家夢一路寒山萬木中妾本錢塘江上住雙垂別淚越江邊鶴歸華表慘新家燕蹴飛花落舞筵野草怕霜霜怕日月光如水水如天人間俯仰成今古只是當時已惘然三生石上舊精魂化作陽臺一段雲詞客有靈應識我碧山如畫又逢君花邊古寺翔金雀竹裏春愁冷翠裙莫向西河歌此曲清明時節雨紛紛東望望春春可憐江籬漠漠荇田田繞篙野菜飛黃蝶糝徑楊花鋪白氈雲近蓬萊長五色鶴歸華表已多年夢回明月生南浦淚血染成紅杜鵑浮雲漠漠草離離淚濕春衫鬢腳垂秋水爲神玉爲骨莢蓉如面柳如眉鍾隨野艇頻孤棹蟬曳殘聲過別技青塚路遙南雁盡問君何事到天涯身前身後事茫茫惱斷蘇州刺史腸儂帶玉環歸洞後君騎白馬傍垂楊鶴群長繞三株樹花氣渾如百合香慚愧情人遠相訪爲郎憔悴卻羞郎孤月無情挂翠巒金爐香燼漏聲殘雲收雨散知何處鬢亂釵橫特地寒去日漸多來日少別時容易見時難明朝有約誰先到青鳥殷勤爲探看杏花疏雨立黃昏金屋無人見淚痕短鬢欲星愁有效此身雖異性常存關門不鎖寒溪水環珮空歸月夜魂倚柱尋思增惆帳夜寒雛玉倩誰溫萬紫千紅總是春登臨一度渴思君舞低楊柳樓心月香惹梨花夢裏雲風景蒼蒼多少恨陰蟲切切不堪聞思君今夜腸應斷書破羊欣白練裙零落殘魂倍黯然一身憔悴對花眠南園綠草飛蝴蝶落日深山哭杜鵑天若有情天亦老月如無恨月常圓此聲腸斷非今日風景依稀似去年七言絕雲舞衫歌扇舊因緣萬事傷心在目前雲物不殊鄉國異夭桃窗下對花眠煙籠寒水月籠沙誰信流年鬢有華燕子銜將春色去夢中猶記詠梅花青山隱隱水迢迢客路都隨歲月消惟有別時今不舍水邊楊柳赤闌橋杜陵寒食草青青長誦金剛般若經雨冷香魂吊書客夢魂同躡鳳凰翎遠上寒山石徑斜宮前楊柳寺前花紅顔未老恩先斷莫怨東風常自嗟與君約略說杭州山外青山樓外樓屈指別來經幾載愁心一倍長離憂旅館寒燈夜不眠湘波冷浸一枚蓮何時最是思君處日落鳥啼霜滿天欲寫愁腸愧不才依稀猶記妙高臺問予別恨知多少巴蜀雪消春水來紫煙衣長繡春雲一樹繁花對古墳辛苦無歡容不異半緣修道半緣君春愁冉冉帶餘酲珍簟銀床夢不成知子遠來深有意酷憐風月爲多情光陰卒卒一飛梭怨入東風芳草多舊枕未容春夢斷秦雲楚岫暗相和身前身後事茫茫秋菊春蘭各吐芳慚愧情人遠相訪爲郎憔悴卻羞郎文通一一讀罷始而驚繼而羨終而浩歎者三急取筆墨疊稿抄去回衙不敢隱瞞稟之韓昌兼以詩呈上韓昌亦驚訝不已乃曰有才如此我見猶憐無惑乎蘇老當年依依不捨也即下令將蘇堤墨迹封好差人守護不許汙損一面邀集同城僚友備少牢一具齊至六如亭前奠之奠畢即就亭前大宴令將此詩刻石亭左韓昌親爲作記以志其事
