body:
  text: 第六十一回炎宋興複設方鎮宋主遣朝議郎耿進誠在邵武建宮立署以城西之熙春山列名爲萬壽山城東之千松嶺更名爲千歲嶺宮殿皆靠定城北蓮花九峰而南向築城周圍四十五裏三分計八千一百一十六丈敵樓四堆房三十六門九東泰安西懷遠南鼎新北永定中神武東北曰靖海東南曰安瀾西北曰揚威西南曰耀德入門常開不閉惟永定一門常閉不開引樵溪綏江之水環以爲池城內前朝後市左祖右社工已告竣始表請涪王由翔龍府發駕臨幸定鼎建極涪王乃加張懷亮爲留守司都統制鎮翔龍府而以老將王方副之擇吉於是年庚子二月朔率後宮文武起行沿途百姓父老嵩呼華祝無不擊壤而歌酌兕而獻涪王皆安慰之不日抵邵武有耿進誠高耀卿韓靖夏等率同城文武官吏父老逾界相迎邵武百姓扶老攜幼瞻視威儀涪王入城見宮殿朝署安布皆井井有法不華不陋深嘉進誠不置妃嬪入宮各有內院文武各官俱已安下一日涪王設朝文武進見請上尊號涪王猶欲遜謝範國昌司馬肅皆曰崖山而後中國無統者三十餘年矣臣等忍恥蒙垢直至今日此時諸事已定中外一心殿下雖欲辭之不可得矣涪王始命資政大夫劉知幾南郊築壇又命參政司馬肅學士白映雪等酌定儀注文武各官俱有職事分別辦理以本年庚子夏四月朔旦丙午祭告天地正位文武甚喜拜謝而出數日後內外大小文武畢集于邵武漳州府漳浦縣奏醴泉至長沙府寧鄉縣奏一麥九穗撫州進芝草廉州合浦還珠文武皆曰此天意也劉知幾奉命南郊築壇按周天之數壇高三丈六尺五寸凡三層上層圓以象天中層方以象地下層正以象人上列兩曜五星八卦九宮二十四氣以及周圍旗幟亦各象蒼龍白虎朱雀元武壇上又奉皇天後土日月星辰風雲雷雨社稷山川之神以及三皇五帝三代聖君並宋初太祖以後一十八代之靈不日壇成又有司馬肅白映雪等將壇中一應禮儀制度陳設俱備內外文武罔不恪遵君臣先期三日齋戒沐浴是時正元成宗大德四年夏四月丙午朔文武保護駕至南郊簇擁登臺始受袞冕改元重康是爲顯宗皇帝壇下鼓樂交奏帝始行八拜禮學士白映雪朗聲讀祝文曰維大宋重康元年歲次庚子夏四月丙午朔臣涪陵王趙晟敢昭告於皇天後土日月星辰風雲雷雨社稷山川歷代聖君及我大宋太祖太宗真宗仁宗神宗哲宗徽宗欽宗高宗孝宗光宗甯宗理宗度宗恭宗端宗帝昺之靈曰天佑下民作之君作之師思我王度式如玉式如金以故周武一戎衣膺籙而著得魚之瑞漢高三尺劍受圖而開逐鹿之基雖遭遇異時建極不同其揆一也自我太祖皇帝混一土宇肅清中夏諸侯以禮爲歸此之謂矣皇天惟德是輔豈其謬哉爰及列聖莫不抱一垂型函三受福皆所稱允文允武克長克君者也胡元蒙古奪我神州竊我名器而乃滅天毀聖妄據四海九州敗俗亂常竟致土崩瓦解蝟亂蜂起鳥思靜於飛塵蝗國瘡民魚豈安於沸水臣本海島餘生涪陵嫡脈仗虎賁三千倡義而揮戈江右作龍飛九五正位而卷席閩中爰至湘廣靡不率從爲衆所推攝君之位重恢藝祖版圖無思不服用踐章憲遺詔咸與維新今改元重康統繼兩宋托天之威尚期興複久淪之境土仗神之力更求翼贊大統之乾坤祈天邁相永克丕承是享白映雪讀罷禮畢文武扶帝下壇范國昌岳燕超等衆文武及都城父老無不歡呼萬歲鑾儀司遂請帝升輦龍旗鳳羽侍衛警蹕帝始偕文武奉歷代神主送入太廟追秦王爲德祖睿皇帝王妃爲睿太皇后皇考爲孝康裕皇帝皇妣爲孝慈裕皇后推而上之皇祖考妣皇曾祖考妣俱追尊帝後之號而小宗大宗左昭右穆俱各如位帝始由太廟升輦入朝城中軍民歡聲若雷無不家懸燈戶結彩歡者填街塞巷有喜至泣下者帝乃升殿受文武揚塵舞蹈拜賀畢詔以此殿爲奉天殿邵武爲京畿更名武都冊立孟氏爲皇后陳氏爲宸妃劉氏爲淑妃世子璁爲太子次子瑩爲廣王三子璉爲湘王官設二相六官九卿左右丞左諫議右贊善台諫文學俱依舊制武職設正副樞密使與宰相並大將軍幕府大都督軍府其餘都部署總領衛兵馬使團練屯田等使俱如舊制帝於次日大集文武崇德報功以范國昌爲左相兼少師種世龍爲右相兼少傅司馬肅爲中書令兼少保韓昭李穆皇甫惇葛天民侯長孺耿進誠爲六部尚書白映雪劉知幾爲左右丞蘇伏威爲諫議大夫馮道南爲贊善大夫宗夢弼長孫軌苗秀實韋蔚文陳鵬陳華陸宣文佐黃仲通李精誠等俱爲部郎上官誠鄭夢蘭寇竹生等爲學士樊東樓令狐韜爲太子洗馬上官朴爲資政大夫王用槐爲太常卿方連茹爲議郎岳燕超爲樞密正使晉爵上柱國永安公狄定國爲樞密副使晉爵保昌侯高耀卿爲威武大將軍韓靖夏爲威武副將軍關普靈爲龍武大將軍武陵侯寇複雷扈德威韓搏虎張懷亮馬遇樂劉瑛六人俱封列侯授大都督之職種世虎狄勇史進拓跋琳岳鎮嶽坤庹靖陳同八人戰功尤著爲總領衛大將軍都部署楊孝伯宇文廣劉瑝史霸任天鵬夏侯傑斛律亢宗馬遇陽屈突申廖雲焦芳牛竑張燕傅突吳廣吳康王麟王方王彥馬晉臣李繼業查士珩洪時錦等俱驃騎將軍龐英張昌石雄曲遜史良壁王遼朱昶朱升等兵馬正使而新降將佐若邵綸赤丁銚藩劉王責呼延廷璠等亦授都團練之職孟來翂以椒房雖無戰功亦進爵爲子授武德將軍至慕容長藍天蔚劉遇隆三降將以平定湖湘等處戰功頗多劉遇隆爲執金吾授懷遠將軍藍天蔚爲左護衛使龍驤將軍慕容長爲右護衛使虎翼將軍其餘內外大小文武新舊將佐俱各拜官進秩有差各官一齊當殿拜舞山呼謝恩畢又念羅浮起義終成大業加少傅種世龍爲福甯侯食邑五百戶而昔年海島播越深得二馬之力乃患難中人馬遇樂已爵通候食邑三百戶遇陽亦進爵爲始興伯食邑二百戶劉瑛劉瑝張懷亮皇甫惇皆仗義舉事之人各賜黃金彩緞等項劉瑝皇甫惇俱賜子男之爵又前後各處陣亡將士如王建忠李君貴虞凱杜朴霍商徐建勳等俱有追封入廟奉祀士卒陣亡者亦有蔭恤又大出帑藏賞犒三軍州縣頻年用兵及水旱不時者皆蠲免其賦稅又敕各處州郡長吏守宰問老恤貧及鰥寡孤獨皆宜賑恤拔幽出滯興賢育才尤爲首務所詔各款次第舉行人心鼓舞大悅帝與群臣大宴三日各官外任者俱各去訖帝一日與宰臣各部酌議下詔分爲四鎮建閫設節度使以統禦之時閩中已控邵武漳州汀州福甯又續入延平一府廣南此時並高廉瓊雷盡入版圖已全省控制江右則建昌撫州贛州南安吉安已轄五府湖廣則長沙武陵營陽建州衡州郴靖辰沅杜陽嶽州並跨江而襄陽安陸漢陽德安無不統轄閩中建閫于延平江右建閫於建昌廣南建閫于肇慶湖廣建閫于長沙而以寇複雷爲長沙節度使韓搏虎爲建昌節度使馬遇樂爲肇慶節度使劉瑛爲延平節度使應敵禦侮檄調兵將皆得便宜行事惟襄陽太遠與元接境則仍以扈德威爲襄陽節度使獨鎮漢沔四郡至武都爲京畿密邇福州以杉關爲重設行軍元帥府用重兵控守仍加威武副將軍韓靖夏爲太尉鎮之步步連營棋布星羅翔龍府仍設留守司都統制張懷亮鎮守如故潮州府海寇不時竊發加史霸爲靖海大都督鎮之桂嶺三關仍立營寨用三將防守治國之要一依右相種世龍中書令司馬肅二人條陳各款如法頒行自是而炎宋之業再興矣
