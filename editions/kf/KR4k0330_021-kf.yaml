body:
  text: 第二十一回岳燕超官辭參政卻說賈瓣收集殘兵探元師已去仍舊奪了隨州應城殺死人民不計其數回至雲夢與賈翀合兵聞韓搏虎己去撫掌大喜曰韓搏虎已去呂翔輩直庸才耳又打聽呂翔欲先攻水寨益發得計隨往旱寨調回白文狻水路迎敵水陸二路分撥已定恰好呂都督糾合衆將領大隊人馬俱用艨艟戰艦排列軍士來攻水寨白文狻亦將軍馬一字兒列在水面只見元兵隊中閃出一將緋袍金甲橫槍立於船頭乃承天府都制王濛也大呼索戰白文狻賣弄本事手舉狼牙棒奮力打去用力太猛鷁首俱爲紛碎王濛大驚急揮軍士以破敵弓翼以神臂弓射之怎禁敵兵矯健異常使船如使馬巨艦橫江衝突而來上設皮籬以禦矢石小舟往來如飛概用撓鈎厹矛戳殺元兵將近艨艟大船一躍而入元兵全不濟事又無成算被白文狻放出大軍沖得七斷八續不能聯絡兩岸炮聲大震倪大威汪夜叉各率人馬前來接應呂翔令諸將分頭迎敵時西岸倪大威與臧超薑愷以船列成一字聯以鐵絙衝突不入將敵兵阻住東岸淩士褭爲流矢所中血流滿面猶麾軍死戰因阿沙不忽一隊先退淩士褭遂孤爲敵所乘亦潰呂翔見衆軍皆敗方欲棄舟上岸忽探馬報來德安府被賈翀襲破副將鄔如龍戰死太守夏侯信叔走長沙去了呂翔驚得魂不附體王濛與白文狻鏖戰聞報遂慌被白文狻搠死前軍大潰阿沙不忽亦死於亂軍之中臧超薑愷亦棄敵將而走敵兵從後掩殺一時中箭被槍沈舟落水者不計其數呂翔等統率殘兵直逃至應山縣渡蟻橋方始屯住諸將聞郡城已陷薑愷請整兵先複隨州淩士褭要打安陸臧超又請速攻德安紛紛議論呂翔方寸已亂不知所從自領兵數千托言赴行省請兵竟連夜遁回襄陽去了諸將無主各統所部兵複隨州複應城皆無功而歸時賈翀領陸路兵馬攻破德安又收得劉環張青二將先是劉環張青嘯聚荊山屢次投襄陽自求錄用呂翔擯斥不收雲夢兵起二人遂憤投賈翀襲破君城皆二人力也賈翀陸路人馬屯於城中次日又報水寨大勝隨州應城有元將來攻皆殺敗而去賈翀兩路皆捷橫行江漢大肆猖撅自稱總領衛大將軍弟羽辛副將軍衆將俱有名目大犒三軍水寨仍屯雲夢阻住湖口江漢一帶道路梗塞早有湖廣行省安撫使敖魁將呂翔失律兵敗賊勢猖撅情形立奏元主世祖大怒將呂翔逮京下獄並衆將一齊拿問兵部尚書董文用飛章劾奏三寶奴脫虎脫喪師辱國之罪世祖左袒二人置之不問時太傅白伯顔中書完澤樞密使不忽木兵部尚書董文用等皆在樞密府議曰安豐路壽陽賊已僭王號跋扈州郡尚未征討雲夢賊又如許猖撅騷擾江漢非得一智勇兼備者爲帥不能征剿如呂翔輩直行屍走肉耳焉可以禦外侮完澤曰皮相之士不足以求人才夜糴之夫不足與論國是前命將時董尚書極力諫阻奈主上與三寶奴脫虎脫如一人事難中止故有此敗不忽木曰壽春漢陽二賊不可小覰專閫重任還須老太傅一行伯顔笑曰老夫年耄矣無能爲也我非馮婦樞密以爲見獵心喜乎完澤曰李靖趙充國皆以耄年立功太傅何須謙遜然太傅宿將元勳良不可往必須太傅舉一可往者始當其任伯顔搖手曰忽都帖木兒阿里海阿答海相吾答兒四帥頗諳兵事相繼而卒目下惟浙省平章脫脫廣南參政狄定國二人知兵奈俱控扼重地不可更易此外實難其人完澤不忽木齊舉董尚書權任浙省平章易脫脫爲帥廣南仍舊董文用亦言願任浙省衆人議妥方欲連名上疏時坐中有福建參政魏天枯獨曰浙省固不可離脫平章而兵部亦去不得董尚書某舉一人可當壽春雲夢之任衆皆大喜急問是誰天祐曰姓岳名燕超雲中馬邑人也但不可屈致須以禮聘之伯顔猛省曰老夫昔日略地至大同府耳其名久矣聞此人索懷大志出處不苟今宜合詞上表保薦擬授江南行省參政兼荊湖制置使之職榮以重爵下詔求之若不奉詔密令所在地方收捕監斃先除此人免生國家異日之患完澤愕然曰老太傅何出此言伯顔曰淮陰侯去了西楚漢高即王天下王景略不就桓溫苻秦遂霸關中此人投一處即興一處不如早爲之所也完澤不以爲然數日旨下如議魏天祐捧詔去訖且說建甯路建陽縣離城一百九十裏有山名唐石山一隱士在山中不常出入時而長歌時而長嘯時而大哭不止居人莫測其蹤談星演易喜說休咎居人每詣山問之久而山中如市遂於建陽驛橋側開蔔肆暇則題詩吟詠往往欷歔不勝一日來一問蔔者偉岸風骨目瞬如電坐定投策叩蓍隱士大異之暗思此人可怪試以卦語探之乃曰爻內寅午戊幹將星疊現加白虎羊刃生世當有金壇之拜但防有陰謀恐禍生不測問蔔者笑曰公且勿言禍福公非謝侍禦疊山先生乎隱士亦笑曰然則足下嶽某亦馬邑之豪士也兩人情投意合言及國事不覺大哭已而在笑從此無日不至疊山賣蔔之暇兩人談論終日娓娓不倦久之而建陽驛中凡小兒賤卒皆知賣蔔者爲故宋江西招諭使謝枋得也卜者契友爲雲中馬邑岳燕超也忽一日道路傳言紛紛有本省魏參政奉旨將至建陽小璜溪聘嶽賢士枋得聞之驚曰燕超危矣一連數日燕超不來蔔肆枋得日日探望忽一日燕超來辭枋得曰前因廉訪使按部雲中燕超遂離馬邑竄荊湖遁蘇松再轉入閩自謂潛居僻壤誰知物色者如影隨形燕超又將遠遁遐陬誓不受樊籠於蒙古也貴官顯秩詎能屈我哉枋得曰子宜速去不然禍生旋踵但後事勉爲之惜枋得不及見耳燕超複問曰先生結局終於此乎枋得曰諸事俱已完畢所未完畢者惟一死字耳足下宜自珍重以子之才何難雪恥枋得與文右相張越公諸人雖在泉下皆拭目以待也言訖泣下燕超亦灑淚而別燕超去後不兩日果然魏參政遣武弁十餘人來收捕燕超甚急訪至驛橋聞與蔔者素有往來武弁等不由分說擁枋得而去枋得已拚一死行至中途即欲扼吭以殉武弁等給枋得曰參政聞先生精于卜易特命請駕問休咎耳既入城魏天枯喜曰得鸞失鳳終占一籌即迎枋得問曰先生果卜人也先生乃知信州之謝侍郎耳前程廉訪文海留翰林夢炎皆有薦章先生不起今遇先生即以聘岳燕超之爵授先生先生豈無意乎枋得不答亦不食魏天枯知不可屈命以一室禁錮之
