body:
  text: 第四十五回梅參政昭關戰死元參政梅殷檄調三路進兵自統大隊出巢湖渡淮水望曆陽進發兵行數日聞戚磷在六安州弩台連戰皆捷恢復霍山兩縣裴金仙亦到宣城宛溪惟廣德州一路尚未探的梅參政既得此信聞宿州無備竟襲宿州一鼓下之有賊將楊洪蔡汜兵屯懷遠縣荊山聞宿州有失引兵來援梅參政以大隊蹙之二將敗死遂由懷遠徑長驅而前中途又敗敵將樊貙王雄李斂之兵再取虹縣倍道而進已抵鳳陽時僞主淮王以世子秦楠守鳳陽張師旦偶過壽春未歸秦楠不意元兵猝至又聞沿途軍將皆敗仇怒不止率兵出戰被元師大殺一陣兵敗入城梅殷圍之數重急切不下淮王秦錫帛聞之命賈智深同二子緊守壽春率兵赴援史獻白壽將諫賈智深視之以目獻白壽不語淮王以耿星星邢士龍等皆有元兵抵敵未可調回惟張師旦方遣赴臨淮不數日遂飛檄召之淮王率精兵直趨鳳陽城下聲言決戰鋒芒甚銳梅參政一面攻打一面迎敵秦桶聞乃父引兵親援亦大開城門縱兵出戰內外夾攻秦楠一馬當先正遇元將戴摩訶馬騰芳雙馬攔定秦楠便與交鋒二將敗走秦楠縱馬直追忽報元兵入城秦楠猛省回馬望見城上概是元兵旗幟怒奔城下箭如飛蝗人不可近抽身殺回方與淮王合兵混戰一會殺出重圍元兵已大獲全勝複了鳳陽淮王父子俱帶重傷兵退劍山遇張師旦從臨淮引兵來援方始屯住張師旦請淮王仍歸壽陽請世子秦楠移軍定遠縣以就糧草自率一軍即頓劍山不日元將王峻引兵來取定遠被張師旦戰敗而去師旦以定遠城小而堅請秦楠緊緊守定劍山離城西僅三十裏元將戴摩訶赤裏古等兵來幾次皆被師旦敗去梅參政大怒命馬騰芳王峻薛超徐罡四將用重兵守城自引輕騎來攻定遠張師旦以定遠終難抵敵棄城而走直奔臨淮梅參政既得定遠知張師旦乃淮南驍將不除終貽後患故又督兵直追臨淮張師旦方渡淮水參政追及下令曰今日之戰有進無退能獲秦楠賞千金封萬戶能取張師且首級亦賞千金封統制不用命者誅一時元兵奮勇爭先濟過東岸大戰淮水之濱張師旦畢竟英勇刺翻元將十餘人身中數槍顧不得秦楠拍馬便走秦楠方潰圍而出被赤裏古一搠刺死張師旦不敢戀戰引敗殘人馬奪路奔走逃過曆陽湖填入和州梅參政從西路追來張師旦分兵一半紮定遏狐城元兵一至張師旦以逸待勞大呼陷陣元兵少卻戴摩訶奮勇上前抵敵張師旦咬牙切齒將戴摩訶搠死馬下梅參政見元兵失利鳴金收軍退保昭關相持數日張師旦聞六安廣德二州元兵俱失利引退大喜曰羯奴吾有以破之矣不數日耿星星邢士龍俱引兵來會師旦迎人營中泣曰二將軍能助某一戰世子之仇可複矣邢耿二將皆願效死力張師旦曰某觀參政梅殷知兵而不諳陣法請二將軍誘敵吾用混元一氣陣破之二將許諾次日邢士龍直叩昭關討戰梅參政命赤裏古出現不合數邢士龍敗走梅參政在關上看得分明見賊軍隊伍不整終是鳥合亦慮赤裏古疏虞有失自率大軍從後掩殺策應命楊暹魏鏞各引一支伏兵以備不虞梅參政追不數裏又遇耿星星截殺一陣皆敗去不以爲意忽賊兵散者複合邢士龍耿星星二將又勒馬殺回大呼曰梅參政何不納降梅殷大怒督衆將力戰邢士龍手起刀落赤裏古死於非命參政忿怒不已援桴周鼓楊暹魏鏞兩翼伏兵殺出邢士龍耿星星分頭迎敵忽連珠炮響張師旦引一支生力軍馬殺來列成一陣勢若八卦形如六花團團圍住梅參政定睛看時見霧籠煙迷天昏地暗並無門戶方向始大驚曰吾生平不喜陣圖嫌爲死法今爲賊將所算麾下將士有以識此陣者方可殺出不然吾命休矣將士攻殺一會楊暹魏鏞俱已落馬部下死亡過半梅殷仰天歎曰吾三入樞密位極人臣又從太傅伯顔身經數百戰一旦落於賊將之手有何面目于人世乎乃北向泣謝曰臣辱國喪師不能平賊有負知遇之恩願陛下速遣兵將以救淮南百姓臣死目不朽言訖拔劍自刎元兵死者降者不計其數餘皆逃回鳳陽張師旦三將合兵來奪鳳陽馬騰芳等不能抵敵聞參政陣亡心膽俱裂棄城而遁三將又複取鳳陽報入壽春淮王秦錫帛此時因痛惜其子秦楠死于淮水亦不行賞惟令邢士龍張師旦二將鎮守鳳陽耿星星仍領本部兵守廣德州而去
