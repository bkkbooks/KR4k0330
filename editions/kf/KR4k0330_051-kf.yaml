body:
  text: 第五十一回西冷橋樊生遇豔房縣湘鄉樊東樓自涪陵祠得范國昌扈德威等救二姊歸後其父樊進士不久遂卒母亦病故二姊出閣業已身無系累因見范韓諸人落落行徑亦思作江湖散人優遊山水待時而動將家事托老仆樊鴻經理買舟放於七澤直至蘇州之太湖上岸按蘇州太湖周回三萬六千頃與浙省之烏程長興等縣接壤樊東樓至蘇州遊遍虎邱吳苑館娃靈岩諸勝遂過湖州吳興諸處遊覽一會由桐鄉達秀水及富陽訪嚴子陵釣台訴流而上看錢塘江潮始覽西湖之勝西湖山景除卻天竺靈鷲石屋煙霞葛嶺孤山而外有城西十二裏靈隱寺尤爲絕勝覺場此山周圍十二裏稱爲武林發脈于新安從富春至余杭蜿蜒五百里始結脈于兩高峰三天竺每逢春曉雨霽登山賞七級之浮屠遠眺群峰屏列湖山鏡浮雲光倒垂萬象俱俯畫舫來往恍若飛鳧又山之峰則有烏門石筍香爐獅子蓮花飛來諸峰山之洞則有呼猿玉女龍泓射旭諸洞山之澗則有南澗北澗大澗山之泉則有月桂伏犀永清倚錫諸泉最足動人者尤爲冷泉山之靜室則有韜光白沙石筍無著松偃諸庵山之閣則有望海超然永安彌陀雲來諸閣俱屬天造地設甲於天下湖中勝景則爲蘇堤春曉曲院風荷平湖秋月斷橋殘雪兩峰插雲三潭映月雷峰夕照南屏晚鍾柳浪聞鶯花港觀魚諸妙樊東樓尋山問水應接不暇四顧爽然正所謂若到西湖遊一遍就是凡夫骨也仙東樓一心玩景暫寓錢塘日到湖上見南山一帶樹色蒼翠相連甚遠旦晚輕煙一抹甚可人意回看湧金清波二門一帶城郭立於東保叔塔葛仙嶺樓賞鳥石北高峰繞於西北南高峰南屏山鳳凰山繞於西南竟將明聖一湖包裹在內儼然一面菱花水鏡而孤山宛在中央但水闊煙深可望而不可即往還非舟楫不可耳東樓此時幾如身入蓬島人在廣寒一日偶至瀕湖橋畔見一墳題曰錢塘蘇小小之墓恍然曰當年油壁香車點綴湖山之佳麗者也乃以瓣香杯酒奠之吟曰香車何處碾芳塵悵望西冷草似茵風柳動搖蘇舞袖露桃開落剩歌唇行雲岫冷連前夢織錦詩奇悟後身識得鮑仁誇俊眼湖山點綴有佳人吟畢流連不舍猶嘖噴稱羨曰美人好一雙識英雄俊眼慨然以百金贈鮑刺史于未遇之先此鬚眉男子所不能者豈風塵中物哉時道旁觀者無不笑爲癡狂東樓仍日日遊湖往來橋畔玩賞茂林芳草如親佳麗一日遊覽漸次夕陽在山逸興遄飛見楊柳依依儼然招我飛花片片恍欲留人信步沿著湖堤觀玩山光水影又吟曰十分顔色十分才豈肯風流便永埋自是西冷橋畔路也應紅杏出牆來沿堤踱來踱去不覺少憊至松杉茂密處少憩片時見一女郎從松杉影裏披冰綃曳霧縠丰姿絕世冉冉而來向東樓歛衽曰妾蘇小小也六朝至今絕少知音感君嘉惠泉下不忘特來一晤君子所謂何處結同心西冷松柏下也東樓狂喜急起揖之問曰美人宋蘇小小耶抑南齊之赤小小也女郎笑曰妾本一人何分齊遂讀其詩宋東樓曰美人獨不聞趙司戶與盼奴之詩乎遂讀其詩有雲昔時名妓鎮東吳不戀黃金只好書借問錢塘蘇小小風流還似大蘇無又有虞美人長短句雲槐陰別院宜清晝人坐春風秀美人圖予阿誰留都是宣和名筆內家收鶯鶯燕燕分飛後淡粉梨花瘦只除蘇小不風流斜插一枝萱草鳳釵頭讀罷東樓又曰詩曰錢塘曰還似大蘇無詞亦說鶯鶯燕燕之後此爲趙司戶之蘇小小也明矣美人何不一決千古之疑免致作詩者或誤錢塘或誤嘉興或謂縣治或謂西冷即如近日吾友張生光弼所吟曰香骨沈埋縣治前西陵魂夢隔風煙好花好月年年在潮落潮生更可憐光弼不知有二既曰西陵又曰縣治是並不知誰爲宋人誰爲南齊矣女郎掩口笑曰湖曲江幹兩難憑信南齊東晉著說滋疑妾本若蘭後身只因璿機圖巧奪天工自恃多才以故偶謫風塵再生仍爲蘇長女身後果前因本來不爽妾不知宋小小爲何如人也況妾雖爲六朝金粉之冠而家住西冷實爲山川增勝即虎邱真娘墓錦江薛濤墳金陵湘蘭塚若輩皆遠不逮妾而更何有于宋小小乎妾自鮑刺史一爲表墓雖千載下珠沈玉瘞猶得騷客詩人唏噓憑吊妾生前之願酬身後之念遂矣感君子貺以佳葉妾亦有短句願瀆清聽遂朗吟唐多令詞一闋曰多少別離衷相思誰與同千年隔世信難通曾記香車遊覽處鏡湖閣下簾攏西子返去吳中長廊響屧空獨立怨東風便令身輕如燕子飛不到館娃宮女郎吟畢東樓狂興勃發亦還以阮郎歸詞雲衫羅膚玉映分明松杉影真風兒偏肯做人情送來一愛卿雲髻墮可憐生香車寶馬迎月兒不肯做人情阻依一歸程女郎歎曰名下洵無虛士但君固多情其如妾薄命何承惠已多結他生緣可也再賦一斛珠詞一闋雲今宵歡聚松陰小並肩兒語綾箋分譜相思句說不盡情總被情牽住一刻千金空擲去他時重會知何處曉風吹斷鶼鶼羽悵恨風前還向東風訴吟罷悵然若失拔紫玉釵一枚贈東樓曰君子珍藏之莫謂女鬼無靈惟識得昔年鮑刺史也語未竟忽聞南屏寺鐘聲聒耳驚醒則身臥小亭回顧松杉影裏曉月將殘起視手中玉釵猶存細審之宛然數百年物也再至墓前謝別而歸
