body:
  text: 元代野史第一部民國田騰蛟著目錄第一回元世祖貶聖伐陵第二回程廉訪招賢納士第三回冬青樹記換君王骨第四回靈隱寺激怒英雄心第五回寇複雷大鬧臨安郡第六回秦錦帛起義紫金山第七回楊鎮龍兵犯牛渚第八回鍾明亮入寇藍關第九回北固亭范國昌望氣第十回棲棱霞嶺皇甫惇題詩第十一回征日本蒙古喪師第十二回走占城涪陵返國第十三回智深獻策掠廣陵第十四回萬俟蠣棄家走壽春第十五回種世龍傳檄達荊楚第十六回楊孝伯擊楫過洞庭第十七回壽陽城錫帛僭號第十八回虎丘寺涪陵遇友第十九回狄招討一征羅浮第二十回韓搏虎七敗賈翀第二十一回岳燕超官辭參政第二十二回狄招討二征羅浮第二十三回襄陽城賈羽辛授首第二十四回鐵幢浦秦楠敗兵第二十五回蹠跋將計取南安第二十六回涪陵公兵進邵武第二十七回范國昌入夢承簡命第二十八回劉先鋒修書取漳州第二十九回趙涪陵聘賢龍首第三十回狄招討三征羅浮第三十一回白映雪奇緣有幸第三十二回寇竹生慘遇無辜第三十三回翔龍府風雲會合第三十四回南雄鎮雷雨交兵第三十五回德報德上官樸免禍第三十六回冤構冤萬俟蠣殺身第三十七回涪陵王大興屯田第三十八回淳于丹論史匡君第三十九回岳燕超練兵演陣第四十回藍天蔚棄暗投明第四十一回謝侍郎燕京死節第四十二回梅參政淮南召兵第四十三回金山寺索通盜寶第四十四回周處台馬陵伏妖第四十五回梅參政昭關戰死第四十六回賈平章壽陽篡位第四十七回鳳凰台大開武選第四十八回鴛鴦絹巧判良緣第四十九回岳招討計賺長沙第五十回慕容長鏖兵武陵第五十一回西冷橋樊生遇豔第五十二回木棉庵老魅譚禪第五十三回扈先鋒收復岳陽郡第五十四回元太后駕遊五臺山第五十五回兩先鋒分剿雲夢第五十六回嶽招討怒打襄陽第五十七回廣陵散竹生得譜第五十八回牡丹鈿玉奴擇婿第五十九回耿星星兵敗海門島第六十回王用槐吹蕭九嶷山第六十一回炎宋興複設方鎮第六十二回衆夷國入貢武都第六十三回蘇公堤朝雲集句第六十四回七星岩焦芳殉節第六十五回雲貞女萬里傳書第六十六回鍾情人一心合墓第六十七回宋主重立元祐碑第六十八回孝伯誤陷金鎖陣第六十九回韓太尉罵死留夢炎第七十回關將軍招降呂大成第七十一回寶林寺韓昭毀佛第七十二回摩天嶺三將隕命第七十三回蘇縣令巧決疑訟第七十四回王太常詞慰幽魂第七十五回寇節度力戰青龍嶺第七十六回狄樞密智破昆侖關第七十七回範仆射登臺觀星第七十八回元世祖入夢崇聖第七十九回黃金河大破元兵第八十回太乙陣生擒索虎通第八十一回趙孟頫入宋和兵第八十二回令狐韜當殿論璽第八十三回廿四堆宋主掃墓第八十四回楊妃井太真洗心第八十五回宋昭帝詔求直諫第八十六回吳草廬不序藏經第八十七回三清樓公孫醉酒第八十八回劉蕡墓軒轅還金第八十九回烏蒙僧巧設騙局第九十回許廉訪請頒葬制第九十一回趙完普焚香告天第九十二回潞安王出守歸國第九十三回還珠亭冤鬼泄憤第九十四回清風嶺廉夫祈嗣第九十五回張士誠販鹽起泰州第九十六回劉伯溫望氣遊西湖第九十七回脫脫決議開黃河第九十八回哈麻獻策造龍舟第九十九回韓節度誤釋友諒第一百回明太祖應運和陽
