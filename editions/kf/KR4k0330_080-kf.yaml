body:
  text: 第八十回太乙陣生擒索虎通蒯參政回營查點各軍共折三萬有餘大將死者十余員副將牙將虞候等共損數十員遂大恚恨曰宋人欺吾太甚遂召索虎通入帳議曰宋師難敵非出奇不能制勝柳州舊有鷺鷥峽地甚險惡一線羊腸盤屈峽內將軍可誘敵入峽用攪地龍攻之吾引大軍阻塞峽口敵軍可全覆也索虎通曰參政計非不善但已施之於七星岩摩天嶺矣宋將智勇足備者甚多恐不能賺人峽參政又曰然則決黃金河之水淹之索虎通沈思曰水攻固是宋軍下營甚有法度不當下流且其營不遷徙黃金河之水不能及也蒯參政勃然變色曰然則裹糧坐甲只待天雷震殺宋師耶索虎通慌忙起謝曰非末將畏死欲求參政檄調慶遠府東蘭州黃幡營五將至末將自能破敵參政許之且說寇節度收兵回營狄勇等四將見畢寇節度日狄樞密兵在何處四將曰樞密隨後至矣樞密兵原赴桂林中途聞節度在柳州大戰元兵特令將等倍道而進以助成功寇節度甚喜次日狄樞密大軍亦至下寨畢寇節度隨邀入營中設宴款待商議先破敵軍次取桂林但元將索虎通智勇足備樞密作何計校狄樞密曰索虎通長於攻戰短於用謀前拒守昆侖非定國用間幾乎不能入關聞蒯參政知兵信乎寇節度日蒯毅夫韜鈐雖熟多按死法不足慮也來日複雷與樞密共破之時東蘭州黃幡營五將一名薩吒利一名魔賁一名餘延陀一名猛欲飛一名蟒龍吉嚕皆僮部蠻酋因昔年隨四帥征大理有功元世祖因封爲五虎將軍立營東蘭州彈壓土蠻五將俱面目猙獰虯髯虎臂粗莽巨偉勇不可當所部蠻兵二二萬餘衆皆耳帶金環眼若銅鈴身披鐵甲手執棒杵之類當時蒯參政檄至柳州索虎通大喜乃自統一軍雜五將夷兵於內練爲六甲迷魂陣以攻宋師次日狄樞密寇節度自引一軍探敵元軍以驍將楊樊戴瑀出馬宋營王彥狄勇飛出戰不數合元軍中炮聲震動放出六隊夷兵聯成一陣奇形怪相粗猛異常宋師驟見錯愕不知所出夷兵皆赤發雙卷碧眼突出似欲噬人之狀奮勇殺來宋師退走狄寇兩大帥麾兵接應斛律亢宗藍天蔚慕容長率兵抵敵奈六隊團結成陣往來如飛旗幟繚繞鉦鼓錯雜幾於目昏耳聾混戰一會該三將亦被圍在垓心三將奮勇衝突潰圍而出已身帶重傷宋師大敗一陣元將鳴金收軍宋師連日交鋒俱不能勝寇節度甚怒狄樞密曰一進一退兵家之常不足慮也聞元軍中大吹大擂酌酒稱慶狄樞密曰此誘敵也置之不理另尋計破之兩大帥正商議破敵之策忽飛馬報入永安公嶽招討統大軍至兩大帥喜曰招討若至成功必矣率衆將士出營迎接且說永安公樞密正使岳燕超聞廣右大功不就因奏宋主自請領軍徇之帝授以招討率兵一萬舊日將佐任隨調用嶽招討奉詔即調史進劉瑝庹靖嶽坤四將相隨沿途打探聞宋兵尚在柳州遂直入營中與衆將相見畢因問敵勢若何兩大帥曰敵勢已窮而複徵調夷兵我師累衂今招討至破之必矣此兵一敗桂林乃囊中物也嶽招討停兵數日又聞元軍中徵調鎮安府大將王龍領峒丁五千至助戰聲勢甚盛笑曰兵豈在多隨命嶽坤往探其陣則王龍全隊而出鋒芒正銳複繼以夷兵一陣嶽坤大敗回營心中惶恐懼父論罪岳招討責之曰既不能敵便當全軍而還如何造次遂喝退嶽坤請二帥入營商議曰如此惡戰非小小機謀所能敵也吾有以破之矣兩大帥曰如招討令越日嶽招討先請二帥一同升帳大集將佐謂曰胡元混我中國非止一日大宋龍興業僅偏安收復廣右此其時矣凡我將士同心努力有功者賞不用命者誅今元將既用夷兵練陣惡戰我亦以陣法破之我今所布陣雖名曰太乙而陣中按三垣混形九星布政定日辰論方位明生克擊父則子應擊首則尾應擊中則父子首尾皆應大小將士俱各依令而行勿得違誤衆將皆諾招討遂取青旗一面令種世虎領本部兵俱青旗青甲青馬駐紮正東方上按北斗貪狼星鎮寨如遇甲午三日庚午三日戊午三日應休門出兵對陣論相生該正北文曲星正南廉真星救應取白旗一面令狄勇領本部兵俱白旗白甲白馬駐紮正西方上按北斗破軍星鎮寨如遇癸卯三日己卯三日應休門出兵對陣論相生該東北巨門星正北文曲星救應取黑旗一面令慕容光領本部兵俱黑旗黑甲烏馬駐紮正北方上按北斗文曲星鎮寨如遇甲子三日戊子三日壬子三日應休門出兵對陣論相生該正東貪狼星正西破軍星救應取紅旗一面令廖雲領本部兵皆紅旗紅甲紅馬駐紮正南方上按北斗廉貞星鎮寨如遇乙酉三日己酉三日應休門出兵對陣論相生該東北巨門星正東貪狼星救應取黑間白色旗一面令王彥領本部兵俱白鑲黑色旗白鑲黑色甲黑間白點馬駐紮西北方上按北斗武曲星鎮寨如遇庚子三日丙子三日應休門出兵對敵論相生該西南祿存星東北巨門星救應取黑間青色旗一面令藍天蔚領本部兵俱青鑲黑色旗青鑲黑色甲青驄黑色馬駐紮東北方上按北斗巨門星鎮寨如遇丙午三日壬午三日應休門出兵對敵論相生該西北武曲星正南廉貞星救應取青間紅色旗一面令劉瑝領本部兵俱紅鑲青色旗紅鑲青色甲火色青驄馬駐紮東南方上按北斗輔弼二星鎮寨如遇癸酉三日丁酉三日應休門出兵對敵論相生該正北文曲星正南廉貞星救應取白間紅色旗一面令嶽坤領本部兵俱白鑲紅色旗白鑲紅色甲火色白點馬駐紮西南方上按北斗祿存星壓寨如遇辛卯三日乙卯三日丁卯三日應休門出兵對敵論相生該西北武曲星東北巨門星救應再取黃色令箭一支令斛律統制領本部兵當于八營之中俱黃衣黃甲黃馬上按北極紫微垣臨鎮中宮按著本日支幹移換旗甲倘有疏虞八營齊應取赤色令箭一支命史進引本部兵當於紫微垣前東南相向俱用紅間黃色旗甲鞍馬從正東起直環列至西南止上按太微垣外應正東正南西南四營的不測取金色令箭一支命庹靖引本部兵於紫微垣後西北相向俱用黑間黃色旗甲鞍馬從正西起直環列至東北止上按天市垣外應正西正北西北東北四營的不測招討調度諸將已畢起謂兩大帥曰元兵若敗請節度引兵一支埋伏百裏外近馬平縣界截斷元兵歸路樞密引兵一支速取柳州待衆將合兵後始圍桂林再令馬晉臣緊守大寨招討自率輕兵五百人登麒麟山觀戰諸將得令領兵而去遂于黃金河之左紫霞灘上各按方位列成大陣哨馬報人元軍蒯參政率衆將令軍中搭起雲梯升高望之見各方有門各門有將有動有靜倏開倏合中間一片浩浩蕩蕩列列森森似有百萬之衆蒯參政觀望良久不識此陣遍問衆將亦言不知入帳坐定令大將王龍引輕騎探之候黃幡營五將接應不可輕進王龍一隊即飛馬出營直犯宋陣只見斛律統制傳令曰今日支幹以文曲星迎敵貪狼二星破軍二星救一聲號角正北營慕容長揮刀殺出王龍見宋將來勢洶勇隨分兩路夾攻慕容長毫無懼怯王龍一股銳氣按捺不下正好鏖戰忽鑼響一聲疑是收兵乃正東營種世虎正西營狄勇兩軍殺出王龍雖猛豈是三將之敵被種世虎一槍刺於馬下宋師截殺元兵死者無數比及黃幡營五將救至則敗兵逃回已無及矣宋師重復歸陣五將咆哮大怒各奮蠻勇直突宋陣而無門可入衝突一會被亂箭射回五將率兵在陣前跳躍如虎痛詈而去索虎通見五將回營細問情狀乃謂參政曰陣中用孤虛法耳何足爲奇文昌鎮寨而以貪狼破軍應之吾兵適犯其所克故敗今用五姓法以陰擊陽以生擊死按本年羽德在中陽子陰午生氣子死午刑禍醜宋營子位在北午位在南我今從南擊北又按九勝法則甲午旬天目在庚子地耳在戊戌行軍宜背天日向地耳宋師正犯庚子今先厭其王氣次按五姓之法攻之宋陣雖整飭不難破也索虎通乃於朔旦旬首正子時在營中月空上環三九步以朱畫八卦壇位成三界其內畫十二辰及月將之名東南西北相去數步取蒼狗白雞各一隻索虎通自披素服右手仗劍左手按二畜北面立默誦敵將名氏即斬之埋於正南方深三尺次日遂向蒯參政請過將令召集將佐調遣入陣傳號箭十二支以驍將劉琪引兵爲正西隊先鋒用白色旗甲攻宋將正東營王峻引兵爲西北隊先鋒用黑白色旗甲攻宋將東南營丁琨引兵爲正南隊先鋒用紅色旗甲攻宋將正西營魔賁引兵爲正北隊先鋒用黑色旗甲攻宋將正南營猛欲飛引兵爲西南隊先鋒用黃色旗甲攻宋將正北營楊樊爲正東隊先鋒用青色旗甲攻宋將西南營戴瑀引兵爲東南隊先鋒用青紅色旗甲攻宋將東北營薩叱利引兵爲中軍左哨先鋒用黃黑雜色旗甲從東南營殺入攻宋將太微垣餘延陀引兵爲中軍右哨先鋒用黃紅雜色旗甲從東北營殺入攻宋將天市垣蟒龍吉嚕引兵爲中軍正先鋒用純青純白純紅純黑四色旗甲從正北營殺入攻宋將紫微垣砍倒大纛旗四圍放火引動十二先鋒之兵一齊從中攻殺再令吳奫及衆裨將保護參政堅守大寨自統一軍應敵號召各隊索虎通自謂調度得宜可敵宋師而按定五姓從南擊北以陰攻陽恰入死門惟厭勝之法適足以制斛律統制耳當時索虎通自恃材勇由正南打入陣中宋將廖雲抵陣戰不一會廖雲大敗繞旗而走索虎通號召十一隊人馬入陣自己督兵直向正北攻打一時萬口喊殺連天十一將一齊人陣倏忽之間陣中有千門萬戶並無東西南北元軍十一隊先鋒一時不知從何處殺起蠻將薩吒利已犯太微垣正遇宋將史進交馬而正東種世虎東南劉瑝兩軍齊至夾攻薩吒利大敗被史進殺之楊樊從東人陣見不是頭遂轉身打入正北遇宋將慕容長敵住不三合慕容長生擒馬上魔賁由正南而進見索虎通已攻破南陣亦轉入東北遇藍天蔚兩將勢均力敵死戰不已卻被史進嗖的一矢魔賁慌忙躲閃藍天蔚隨手一槍死于馬下元將入陣一時各尋敵手相殺並無方位而宋將互相救應人忙我暇元將一時若劉珙戴瑀王峻猛欲飛皆死於陣中索虎通攻殺一會情知十二先鋒陣亡過半亂了方寸遂認定中軍紫微垣攻入正遇蟒龍吉嚕亦至二將遂連環殺進斛律亢宗急橫槊迎敵二將而太微天市史進庹靖俱有元將敵住未及救應索虎通嗔目大喝一聲一槍刺來斛律統制措手不及死於非命蠻將蟒龍吉嚕便砍倒大將放起火來宋陣諸將不見將旗一齊著驚知是中軍有失史進狄勇岳坤藍天蔚慕容長種世虎六將一齊殺入紫微垣內索虎通蟒龍吉嚕力敵衆將一刀一槍毫無破綻慕容長激得七竅生煙使盡平生威力揮刀砍入蟒龍吉嚕斷去一腕狄勇趁勢一槍刺入蟒龍吉嚕滾鞍下馬被宋軍剁爲肉泥索虎通自知孤掌難鳴欲突出重圍業已身受重傷種世虎撒手放出紅錦套索索虎通被纏仰翻馬上史進輕舒猿臂擒下令衆將縛定六將始分頭殺出元將士死者降者不計其數宋師如摧枯拉朽元兵折損十分之七逃出陣者惟佘延陀丁琨數十裨將而已宋師大獲全勝鳴金收軍衆將又令軍士將斛律統制屍首搬回營中嶽招討升帳衆將一一上功畢招討隨令斬索虎通楊樊數將爲斛律統制設靈祭奠葬于黃金河邊立即下令直搗元軍大營時蒯參政聞此大敗六神無主情知廣右大事已去命佘延陀吳奫丁琨勃勃禿兒等斷後自擁敗殘人馬拔營望柳州而走行至羝羊石有寇節度一軍阻定去路元軍人困馬乏奪路便走寇節度麾軍截殺奪得衣甲鞍馬器械不計其數佘延陀死戰得免丁琨死於亂軍之中比至柳州則狄樞密已安坐城上矣蒯參政不敢驚犯迤邐直往桂林而逃數日始達星夜奏入上都求援不三日嶽招討合兩大帥之兵直抵城下四面圍定奮力攻打宋師以得勝之兵聲勢甚大桂林城滿城文武束手無策軍民惶惶宋營中時時下令軍民無犯蒯參政力不能支朝服望闕再拜投池中而死勃勃禿兒自刎文武死者甚衆惟佘延陀率千餘蠻兵奮殺出城望東蘭州而去吳奫及余官吏遂率軍民開門迎降宋師遂下桂林嶽招討自同兩大帥人城撫恤民生出榜曉諭輕徭薄賦吊傷唁死發出倉廩賑恤困窮元人弊政一一更之蒯參政屍首及諸死節官吏俱以禮葬百姓大悅一面奏聞宋主一面犒賞三軍各處安設官吏各關隘發兵控守數旬之後諸事漸理一日大將軍高耀卿齎詔至廣右招討及諸將帥接讀已畢乃以高耀卿爲廣右節度使控制一鎮升資政大夫上官樸爲右丞知桂林府事以史進爲威武大將軍設幕府專守桂林庹靖王彥廖雲吳廣劉瑝洪時錦馬晉臣史良璧各按原爵以戰功升屯衛大將軍都部署都統制等職即鎮柳州思恩平樂蒼梧潯州南寧太平鎮安八府其餘關隘營屯處所酌量分鎮留兵一萬分制各郡其餘將士俱隨三大帥入朝論功行賞嶽招討將廣右事務交卸分明始同狄樞密寇節度二帥率兵向武都而歸
