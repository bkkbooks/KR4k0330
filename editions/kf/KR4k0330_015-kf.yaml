body:
  text: 第十五回種世龍傳檄達荊楚廣南惠州府博羅縣西北三十裏有山曰羅浮本名博羅因昔有山浮海而來博于羅山合而爲一故曰羅浮高三千六百丈周回三百餘裏有五十五嶺三十二峰璿房瑤室共七十二所石樓石門二山相對交處有石磴狀如橋梁名曰鐵橋橋端兩石柱亦曰鐵柱人迹罕到惟大小二石樓登之可望滄海其餘華首台五龍潭沖虛觀等景皆幽渺又有跳魚石伏虎石阿耨池夜樂池卓錫泉亦山之奇勝峰之秀者飛雲玉鵝麻姑仙女會真會仙錦繡玳瑁洞之幽者金沙石白朱明黃龍朱陵黃猿水簾蚨蝶乃十大洞天之一也時有牛竤張燕王建忠者俱勇冠三軍義不仕元哨聚千余人屯華首台下寨累與海道運糧使朱清張瑄爲難朱張二人以海盜降元得仕知山川情勢惟懼潮陽嶺之史二僄子史二僄子者海豐人史霸二僄子其綽號也貌不逮中人而短小精悍善戰善走每戰用雙戟善步戰日行五百餘裏極爲狡猾聞幼時過臨江遇一頭陀相之喜曰孺子可教也老衲挂錫少陵寺中能從遊乎史霸從之至寺內見此僧全五香火習氣朝夕惟引拳使棒遂授以雙戟日日演試久而精熟出一刀圭藥付之曰此藥一劑可行五百里二劑倍之三劑又倍之孺子僅一劑足矣史霸因問武藝師傳所自老僧笑曰孺子不忘本矣當初隋煬帝時天下大亂流賊四起將至少陵寺僧皆議徒避獨一火工頭陀笑而出曰毋憂但憑一棒掃盡流賊衆笑其妄而賊已近寺裏許矣頭陀即持短棒沖入賊隊果萬衆辟易賊皆遠遁不敢入寺因選少壯僧百餘人授以棒法並各武藝而去自是少陵之名揚於天下孺子今得嫡傳但不可從賊自能打遍江南無敵手也史霸遂歸聞海道運糧使乃朱清張瑄每至藍關源輒與抗拒朱張二人以狡猾勝然終不能與敵惟多以金帛與之結納糧船經此歲爲常例牛竤張燕等聞之遂聯史霸互結聲援將華首台前後整飭隘口安布鹿角積儲糗糧兵棚箭亭庫廄房帳事事齊備揚旗招募擬將大舉恰有龍門縣種世龍弟兄亦攜家入山世龍本太原定襄人也弟名世虎弟兄天性迥別兄警悟好學倜攪慷慨弟眉目如畫驍健善騎射尚武略曾學射于馬邑周通周通者即岳武穆學射之周侗裔也種氏世居南山豹林靖康時因欽宗不用其先祖老種扼河要擊之策竟割中山太原河間三鎮與金議和始遷定襲縣及元六後乃馬真稱制塔海等屢侵雲中大掠平陽太原乃再遷廣州龍門縣石羊村居焉家資巨富任俠好客散財以結英雄素有大志宋滅元興初意亦終老泉石徜徉事外逮聞元主滅天毀聖伐陵鄙儒不平於心正欲仗義大舉恢復適聞羅浮山牛竤等亦有此意乃歎曰種世龍豈財虜哉斂齊家資猶未起行有龍門縣令忌其豪富久生覬覦此時自有無賴鷹犬出首告變教猱升木謂其不合與外郡任俠往來潛謀不軌龍門令得此題目以爲黃白物準備橐載矣世龍聞之笑曰哪有工夫與鼠輩絜較席捲家產車載妻小連夜望惠州而去縣令得知大驚速令弓兵並千夫長一同追拿種氏弟兄已過龍門千夫長始及大呼且住世龍不理押定車輛先行世虎躍馬張弓挾矢以待箭無虛發弓兵上前無不應弦而倒千夫長憤甚欺世虎匹馬單槍方欲揮衆直前世虎大呼看箭聲猶未絕千夫長翻身下馬弓兵忙扶起時已中脅下血流如注將箭拔出種世虎去之已遠千夫長懊悔而歸世虎趕上世龍同行不日至博羅縣入梅花屯已近羅浮世龍曰南北英雄多與吾有舊惟羅浮山衆從未識面當往一探爲之先容世虎願往未行則前面已有無數嘍卒大呼奉頭領之命來隻候車馬矣世龍大喜不一會有牛竤史霸王建忠張燕四人迎至山下見世龍弟兄乃文乃武喜不自勝世龍見下寨處前後佈置井井有條亦甚駭異家小安入後寨齊至中軍敘禮起居依次坐定設宴相慶世龍因叩以本意各言心在宋室不仕蒙古但皆一介武夫未明大義願聞足下高論以定方略種世龍遜謝乃正襟言曰大凡帝王治世禦宇無非三綱五常崇儒重道尊賢愛民無論開創守成草澤崛起皆循正道方可統馭萬方蒙古以外夷入繼中州士大夫不無冠履倒置之歎況又欺侮上帝妄貶先聖此乃千古公憤所在我大宋即使國運將終亦宜稍存仁厚免生民之塗炭乃蒙古剽悍殘賊虎狼成性磔屠生靈由太祖丙寅至世祖己卯剿殺已一千八百四十七萬有奇此乃本兵敵兵並屠戮郡縣城內之數其他無辜誅殺者不在此例真天昏地慘三光不能主照時也今又伐陵寢盜寶器尤其甚者以理宗皇帝之首爲飲器更千古未有之奇辱爲天下人所切齒痛心者也南人制爲十等以我儒者列於娼之下丐之上是欲滅衣冠汙名教殊不知有志之士皆思斬木爲兵揭竿爲旗共圖義舉訪求趙氏齊殲之於斡難河外以清中夏而後已彼猶伐高昌征日本專務遠略且鰓鰓然設各道廉訪以求賢士乎說至此種世龍不覺怒髮衝冠衆頭領亦目眥盡裂皆言先生金石之言某等願聽指揮各奮死力誓掃中國腥羶爲大宋復仇並爲天下士大夫吐氣世龍大喜因問羅浮有兵多少衆頭領言約有三千餘衆世龍大驚曰螳臂之力豈足以當車轍廣南若有兵至何以當之王建忠曰不然大宋駐蹕臨安僅保江淮者百五十年無非權臣誤國非其君以十分淫虐速亡也即如先生高論蒙古已爲天下人恨入骨髓我等仗義舉事名正言順義旗所建南北必有回應者人心若未忘宋正不以多寡分強弱也且項籍亡秦會稽惟八千子弟光武興漢白水才一旅之師即今作速召募旬日間可得萬人廣南即有兵來無能爲也世龍壯其言命速召募世虎請曰弟昔過京西遇有吳廣吳康弟兄皆勇健而有大志紹興時涪王吳蚧裔孫吳曦獻四川其父曾諫曦曰祖宗八十年門戶一旦掃地矣曦不聽逃去延安吳廣吳康俱與弟隱群玉山中此去永州非遠盍以書招之西北英雄多出吳氏麾下聞吳家軍複起人心回應矣世龍曰不勞遣使各處英雄與吾有識者抑複不少大丈夫舉事自當以堂堂之陣正正之旗橫行天下吾今以檄文遍達江淮荊楚同類者自能千里相投若區區虎踞此山掩耳盜鈴甚非公等初心也衆頭領大喜世龍連夜遂草檄文其略曰皇宋不幸國祚傾移竊柄權奸以于戈爲兒戲偷安宰輔以歲幣爲壯猷朽索馭馬敝簞焉止池鹹掩目捕禽寸廖豈清河濁致使獨松關下二百州稽首迎降丁家洲前十萬軍蔽江潰散山河破碎故國依然身世浮沈空城宛在潮汐不作莫回三折之波鍾虡播遷空鑄六州之鐵慘德枯之玉關長往馬角未生悼祥興之銅駝奚存龍髯莫逮海道覆舟君臣殉節雖三百載歷數雲終而十八主餘澤猶未湮也咄彼蒙古以紅羊白馬之俗禦我神州不思逆取順守大肆叛道離經狂妄貶聖悖戾滅天惡焰穹蒼滃浮贏政伐陵寢而取帝王之首天子摸金鄙衣冠而列娼丐之中儒生擱筆而且磔屠生靈赤血流地殺戮士女白骨撐天中原皇帝匪天上人爲之此座誠可惜也譬如種荊棘于良田養虺蜴於室內而堂堂中國猶有一寸乾淨地乎又況雨毛隕石危象疊興地震山崩災棼屢告非瘡民蝗國即物怪人妖以至瓜分四海臠莫不虎踞鴞張蟻聚蜂起跨邑皆飈忽之師帶州蓋雲滃之將非蹂躪中夏塗炭生民時哉某等以光復趙宋安集黎庶爲心即今召募英賢重振故國爲念訂盟九土爰告諸姬羅浮師起共鑿蛇盤之山韃靼兵來齊縱牛尾之火滌嵩華之污垢鼈飲滄江洗海甸之腥羶鞭斷淝水楊鑣則兔走鳥飛奮戈則禽奔獸竄槐閣後裔休徒鼎湖之泣幕府世胄用董夔門之師鯨鯢永清乾坤再造重光日月迅掃欃槍矣嗟嗟戎馬聲嘶慟灑崖山之淚墓木虛拱腸斷會稽之陵迨至芟荒夷險胥錄鐵券之勳然後收電回霜永樂金甌之固各定去留匆懷觀望凡我中夏宜檄通知世龍草畢與衆人朗誦一遍無不奮腕泣下遂令抄錄各處挂果然人心思宋遂有樂昌人洪時錦建甯人虞凱東昌人麟並道州吳廣吳康有帥兵來助者亦有仗劍來投者旬間羅浮隨添無數人馬有石樓上邏卒望見海運一到即時報牛竤史霸二人爭先領兵奪糧而去世龍又令吳廣王麟兵策應海道運糧使朱清張瑄一見史霸知是來索常例不爲意史霸牛竤躍入海舟登時殺起朱清舉手無措急駕舟而走張瑄見不是頭望大洋中一躍史霸不舍隨後躍下二人在水中揪住廝打牛竤殺散糧卒急拍海舟近岸令人搬運誰知海船高大沙洲礙住不能近岸一時颶風又起幾乎落套慌忙下碇只見朱清已駕起小舟手撚長槍大呼還我舟來船上軍士各持長矛撓鈎一齊搠來牛竤所部力不能敵俱帶微傷岸上嘍卒奪不著小舟惟呐喊助威而已數十號海鰍糧船漸漸奪去史霸在水中始棄了張瑄躍上一舟殺退軍士撐至近岸衆嘍卒齊登海鰍大船吳廣王麟隨後俱到張瑄知衆寡不敵指揮軍士奪得十餘號海船便走牛竤朱清二人猶立船頭死戰不休吳廣大呼看箭語未畢一矢飛來朱清已中腕上泅水而逃失糧食船三十餘號羅浮士卒一齊搬運上岸史霸笑曰只此糧數已可支給十年矣四人得勝押糧而歸
