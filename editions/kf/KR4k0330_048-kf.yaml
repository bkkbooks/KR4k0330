body:
  text: 第四十八回鴛鴦絹巧判良緣新城九龍潭有沈生名菁華者親沒家貧下帷苦讀爲邑諸生端謹白持其鄰崔鉉家亦中産有兩男一女其女以中秋月夜而生故名螗蜍貌美且嫻閫訓已占鳳於本鄉魏儀之子魏夙魏儀曾判池州致任在家富甲一邑雖與崔氏聯姻而嫌其非閥閱子魏夙亦傲睨驕恣每悻悻自言曰魏公子豈崔氏嬌客哉沈生亦與魏夙相善魏夙爲此言沈生每規勸之魏夙不以爲然適裏中有嚴從典者亦富翁也聞沈生家貧苦讀遂以女妻之沈生一日出門偶于路旁拾得鵝黃輕絹香羅一幅上繡芙蓉一枝鴛鴦雙棲於上刺理精妙巧奪天工沈生把玩不已回齋中置之案頭一日魏夙過訪一見即突然問曰兄何來此物沈生以拾得者漫應之魏夙觀玩一會忽然色變少頃又滿面堆笑曰兄好造化拾得此美人物也兄必有別情休瞞知己沈生素謹朴一聞此言不覺面赤無言可對魏夙益發心疑遂乞此絹沈生未可再三相懇沈生拒之益堅魏夙又含笑曰家娣雛年學女紅欲假此作刺譜摹繡不日當原壁歸趙也沈生許之日復一日不見退還欲往追索未免不雅一日友人相召作賞花飲沈生方欲出門忽有公幹持朱票者數人至不由分說簇擁沈生而去直至縣中始知爲魏夙所告沈生如聞青天霹靂吃驚不小且看縣令作何區處原來魏夙亦有一絹乃與崔氏聯姻時崔鉉所贈雲爲蟾蜍手出者又見沈生亦有此絹如何不惱歸家兩相比較針工線理一毫不差且長短廣狹乃一幅香羅裁爲兩段者眼見系出一手當下說與乃父魏儀尚在疑信之間其母重將兩絹比對毫釐不爽乃曰系一人手出無疑沈生與比鄰而居非贈沈生而何魏儀不覺大怒曰何物市儈玷我清門但沈氏寒酸子如此欺我誓不容之令人先絕崔氏之婚次控沈生在案蓋即以陷沈生者絕崔氏也崔鉉一聞退婚之言忿怒不已欲與控訴情知石卵不敵暗思蟾蜍素守母訓且蓬門桑戶左右咫尺容有別情遂與妻喚出蟾蜍問之坐索此幅繡絹蟾蜍一時倉猝左箱右籠尋覓殆遍乃用汗衫一領包裏在內者兩俱不見崔鉉又聞有汗衣一領情景逼真勃然大怒拳足交加妻亦辱罵不已蟾蜍此時有口難辨自顧已靦顔人世至宵分乃泣下歎曰紅顔薄命信不誣也作詩一首遂投繯自縊詩曰精衛銜山不計年冤沈海底奈何天而今化作香魂去不繡鴛鴦繡杜鵑次日崔鉉夫婦啓門業已呼喚不醒懊悔無及慟哭一場備棺入殮成喪出殯崔鉉將詩辭玩味明明齎恨而死慟心飲泣深恨魏儀無狀斷送蟾蜍一命聞已控沈生在案亦入縣中控訴魏夙憎貧誣奸逼休隕命以詩詞爲證且說新城莫縣宰將魏夙所控各節質訊因見沈菁華恂恂書生言辭朴訥非儇薄子弟繡絹未必即苟合之謀沈生口中亦毫無分辨惟言路旁拾得者莫縣宰暗思必女子另贈他人失落于此沈生得之適中魏夙之忌而魏夙以捕風捉影一詞遽絕婚姻人倫風化豈可造次此案須提崔女澈底根究方得水清石見恰好崔鉉亦至將控魏夙狀子附詩詞呈上莫縣令觀畢訝曰崔女業已死乎然羞憤而死其中不無私情繡絹之贈根株其在此乎雖詩詞有抱怨聲口女殆薄有才名故用是自掩耳時莫縣宰心中有徇情魏鄉宦之意又以沈生崔女又屬比鄰一有才一有貌針鋒相湊愈想愈真沈菁華遂覆盆難釋矣當下翻轉面皮複問沈生曰汝等文士每恃才華筆墨勾挑何所不至業已汙人名節斷送人命繡絹之來夫豈無因沈生一時倉皇失措惟指天誓日自明心意莫縣令大怒喝叫行刑將三木套上沈生冤填胸臆搶地呼天熬住痛楚抵死不招魏夙心中暗喜崔鉉老大不服抗聲言曰小民甘貧守素桑戶咫尺時有防閑私情從何說起求賢父母高懸秦鏡照徹魏夙肝膽則民女汙名湔雪賢父母實生死人而肉白骨矣縣令責之曰家訓不嚴致生風波繡絹自在女家閨閣之物何至落於人乎汝癡夢未醒耳尚言爲女昭雪也耶崔鉉含淚力辨繡絹之誣非蟾蜍所出且描鸞刺鳳誰家閨閣無之安見繡絹獨爲崔氏之物而誣以不潔之名乎民女實爲屈死縣令未及回答魏夙即插口咬定以繡絹明贈沈生何得謂誣迨羞忿而死姦情畢露沈生與崔鉉同口一詞事益可見且天下有如此同形相似之物而謂出於二人之手乎崔鉉大怒曰恃汝門戶嫌我寒微有悔親之說汝將繡絹作成圈套絕婚是實今逼出人命魏夙應宜抵償莫縣令見崔鉉抵賴支吾大怒笞之二十令衆逐出乃曰魏夙業已絕婚不必饒舌亦麾之令去再將沈生拶起拷問一遍沈菁華以孱弱書生熬授不過登時暈絕胥役等以水沃之少頃復蘇仍然不招莫縣令命且系獄而富翁嚴從典一聞此事始知沈生無行亦入縣中逼沈生退婚沈生身陷囹圄不敢不從魏儀聞之喜曰沈氏寒酸子吾有以報之矣即托人與嚴富戶聯姻委禽嚴從典欣然便允魏儀不日遂與子成婚彩輿花燭旌旗鼓吹喧闐輝煌炫耀鄉里沈生在獄聞之吞聲飲泣而已魏夙合巹後誰知嚴氏女乃攣耳印鼻齞唇曆齒者即遍用珠圍翠障抹巾掩袖強作媚態益增其陋魏儀父子懊恨無及然門戶相當亦隱忍聽之而已且說蟾蜍縊絕墜地時卻未嘗身死奄奄一息崔鉉夫婦悲憤中草草殮畢舁棺即殯殊近處有偷兒數人以爲崔老葬女棺內豈無金銀簪珥次夜即乘月色朦朦遂發其棺甫撬開棺蓋正待伸手入棺去頭上掇取首飾詎料蟾蜍在棺內忽長歎一聲偷兒數人聞之以爲死鬼屍變嚇得魂不附體回頭便走一步一跌耳內但聞寤宰聲響從後趕來益覺心慌數人你顛我仆狼狽奔竄四五裏回頭看時並無鬼影低頭審視原來足上帶著一根草索系定荊棘愈奔愈響遂不覺疑心思暗鬼偷兒逃去蟾蜍蘇醒覺得身如束縛不能轉動少頃星眼微瞬惟看殘月在樹疏星幾點荒蕪滿目古木參天見自己躺在棺內方知已死複生掙扎而起渴極思飲翹首見柏葉上露液晶瑩乃以掌掬之吸入口中雞鳴後不覺精神開爽心目了然天明見幼弟偶至墓前一見輒大驚小怪抽身便走蟾蜍呼之而已無及少頃崔鉉夫婦舉家齊至墓所見其複生喜出望外急命人攙扶舁之歸進以湯藥安定魂魄母夫人微微喚之蟾蜍靦然答曰兒含羞又履人世魏氏退婚有此事否崔鉉曰豈惟退婚現構訟未休西鄰沈生亦系累在獄案懸未結蟾蜍泣曰爲我家不白之冤又株連他人魏公子薄情亦至斯耶母夫人見其悲悼恐生魂未定令崔翁勿與之言安慰一會仍命人將棺掩好勿令人知休養將息案完結與否聽之可也且說當夜掘棺偷兒數人奔至天明亡魂喪魄正遇捕盜馬快用鐵繩鎖定牽入縣中時莫縣令署中亦被大盜竊其衣物器具等項席捲欲遁偶遇閽者夜遺驚而去衣物等項失而徐得遂不以爲意而莫縣令不知也按莫縣令一子一媳同在任所子名如珩媳葉氏夫人樊氏被盜之次日葉氏偶過複室中見一物在地拾起看時乃並蒂蓮瓣繡香囊上系伽楠香佛手柑並於闐玉扇墜一個葉氏隨手攜歸臥室挂於壁上是日樊夫人至葉氏房中一見繡囊知是莫公之物驚問何來葉氏回言乃得自複室者樊夫人素有醋癖見莫公香囊乃入葉氏房中也不多問候莫公退入私衙迎著便罵老無恥老烏龜汝繡囊贈與誰人去也汝常言兒媳賢淑桑榆有靠卻作如此勾當莫縣令一毫不省見其妻出言醜詆惱羞成怒亦大罵潑婦無恥樊夫人益加忿怒其罵愈厲莫縣令激得雙目直瞪揮動老拳猶未打擊而樊夫人已手批其頰連髭須拔去一半臉上指爪血痕端然五具莫縣令咆哮不已操杖逐之樊夫人直望外衙走去婢妾門子慌忙阻住挽留入內幕僚賓客亦勸止莫公樊夫人猶且罵且泣莫公正捶胸頓足間忽報兒媳葉氏縊死莫公驚慌無措樊夫人罵亦頓止齊往觀之命公子如珩速速呼喚已氣絕矣莫公大罵樊氏造言生事逼死兒媳一時忿焰中燒聲淚俱下樊夫人此時亦嗚嗚咽咽哭不成聲幕友賓客等一一勸開猶幸葉氏乃莫公原郡所娶並無親眷相隨買棺入鹼聲稱中惡身死不日出殯東郭莫公慟悼不已又以面上傷痕不便理事托言養疾乞假一月莫公日含淚眼臥牙床深恨夫人叠與反目後始知內衙被竊未果香囊必失落在複室中者遂大恨竊賊立即飭差嚴加緝捕不拘城近城遠大偷小偷鼠賊猾賊數日後拿獲約有數十莫縣令駭然曰何新城縣盜如此之多也限滿一月傷痕亦愈開門提訊用重刑拷打內有二盜果人府中行竊而實未得財物者問何從出入盜言出署後逾牆升屋越閣道直入內室又出左側回廊過複室中出內廚爲閽夫起溺所阻棄物而遁又問所竊何物可一一記憶否盜言衣物器具大小數十事然強半遺忘矣又問所竊有香囊扇墜等物否盜猛省曰有之似未出內廚業已失落莫縣令暗暗點頭命用長枷以鐵釘釘之餘盜俱加榜掠監下狠狠而退衙役等皆竊議曰縣公自此疾賊如仇矣莫縣令退入私衙始將繡香囊原委一一說知葉氏實系屈死樊夫人至此悔之無及惟日赴葉氏殯宮啼哭不已莫縣令當晚在枕上翻來覆去寢不成寐猛想前日崔氏蟾蜍之事沈生系獄尚未完案安知繡絹不與香囊同出一轍金雞三唱即披衣而起令傳梆立提魏夙一案兩造復審一班書吏差役星飛火急傳喚各處不及飯後已催促數四午後始集一到便審始知蟾蜍複生系盜開棺驚訝不已莫縣令也不問兩造惟拘群盜拷問有曾入崔鉉家行竊否事非偶然仍是署內行竊二盜承認言曾掩入室內啓其笥被犬吠一聲僅得羅帕一幅汗衫一領驚逸羅帕不知失落何處惟盜得汗衫而已餘皆分毫未動莫縣令拍案叫苦只見崔鉉伏跪在旁不覺狂叫曰原來如此莫縣令喝住二盜複承曰崔女身死後我等複往開棺欲取金銀首飾遇屍變鬼靈亡命逃走爲役所獲可見天網恢恢疏而不漏莫縣令見兩事首尾俱是此二盜所爲激得怒發沖冠令速杖斃沈生之冤始白莫縣令傳至案前爲去刑具慰之曰吾一時不明幾乎燒琴煮鶴爾雖在縲絏之中非其罪也勉自刻勵有厚望焉只見沈生泣訴曰生系獄累月岳家已逼退婚魏夙又娶我原聘求大人作主莫縣令一聞此言滿面發赤命將嚴家父女一齊喚至縣令一見魏夙怒容滿面即責以妄相告訐離散兩婚令杖之魏夙窺見蟾蜍甚美亦在堂上即叩首伏罪願續前好與崔氏仍爲翁婿嚴從典在旁怒氣勃勃尚未發言崔鉉厲聲曰魏夙乃宦家子既不齒于崔宗豈有絕而複續之理嚴從典自知已誤豈容再誤惟叩頭謝過甘伏退婚另嫁之罪莫縣令此時也不暇與辨罪輕罪重惟看魏夙傲狠狠鄙與嚴女龐然大足者允稱配合回看崔女蟾蜍明眸皓齒一種嫣然與此人物俊雅瀟灑出塵之沈生亦天然鸞鳳遂喚崔鉉沈生近前日沈生棄艾獲蘭蟾蜍逐鴉得鳳凶者吉之兆禍者福之基鴛鴦一絹殆爲汝等牽繡幕之絲也汝二人應作翁婿兩不可違崔鉉沈生一齊應允叩首謝恩言未已只見鄉宦魏儀公服上堂請曰崔女既白玉無瑕治下魏某業經聘過願續舊好領歸成婚莫縣令因此案左袒魏氏正在滿腹牢騷無可發泄今魏儀又出此謬戾之語遂讓之曰兄真以婚媾爲兒戲耶魏儀艴然作色曰縣公以魏某無力竟不能娶崔女耶崔女即不歸魏氏亦不應配與沈生魏某亦薄司民社無此判法莫縣令勃然大怒曰魏儀以某爲木偶人不能爲朝廷執法乎飛簽令將魏夙滿杖後照加等之律如法論罪嚴從典阿富憎貧亦受譴責喝左右將魏鄉宦逐出竟令沈生蟾蜍當堂成婚一時鼓樂交作二人拜謝縣尹一夫一婦女貌郎才天生佳偶莫縣令公座受拜始而喜繼而慍終複浩歎且暗暗垂淚令彩旗鼓吹送沈生蟾蜍出衙觀者無不稱羨莫縣令退至內署始歎曰非葉氏一死此案不能結也是皆居官者不嚴盜賊之故而亦居官者誣人名節之報也可不慎哉
