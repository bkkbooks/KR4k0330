body:
  text: 第五十九回耿星星兵敗海門島集慶路安撫使塔思不花既在開武選得將領數十人士卒編入行伍者亦數萬餘人遂欲討平鳳陽無如建康倉庫被賊焚毀糧草不充乃檄各郡運糧至宣城一面徵集各路將士協力大舉即命典試都監鎮海將軍戚璘爲大都督統屬衆將勾龍闊海爲前部率耶律霸韓雙馬昌史忠等領兵五千由廣德州而進時守廣德者乃兵馬都監耿青以兵阻住州南三十裏石雲梯勾龍闊海厲兵秣馬率衆將奮勇爭先壽陽兵望而奪氣元兵直過隘口三戰而敗耿青之師複取廣德耿青退至甯國韓虎梁玧二將聞之急引兵來爭廣德中途遇勾龍闊海等大殺一陣二將大敗仍舊退保甯國元兵圍困甯國二將飛馬告急壽陽僞王賈智深大驚急命張師旦爲兵馬大元帥韓彧爲監軍時龍虎二將項嗣昌已死則命閻飛熊爲先鋒引兵一萬速救甯國是夜張師旦宿于營中合眼便見淮王秦錫帛至師旦大驚方欲起迎淮王大罵逆賊還我命來張師旦未及回答忽轉過邢士龍拔劍砍之取首級而去張師旦急用手撫摩問左右曰吾還有頭否左右不答一時忿怒正欲投袂而起忽鳴鏑一聲驚覺乃在夢中一時悚然毛髮皆豎恐此次行師不利起行渡江直抵宣城正遇鳳凰台鬥武之人師旦駭曰此勁敵也次日以連座車大破勾龍闊海之兵元兵死者無數勾龍闊海忿怒不已解了甯國之圍遂與張師旦大戰宛溪之上元兵又敗韓雙史忠陣亡折兵數千時大都督鎮海將軍戚璘亦至謂闊誨曰張師旦智勇足備耶律都督梅參政皆死于其手將軍尚宜仔細勾龍闊海曰都督休長賊兵銳氣末將自有計破之次日請戚都督壓定陣腳命耶律霸出馬壽陽軍中閻飛熊綽斧迎敵不三合耶律霸敗走閻飛熊恨不馬踏元師耶律霸連戰皆敗張師旦恐閻飛熊有失請監軍韓彧守定大營自引一軍隨後接應耶律霸望見張師旦親自來追拍馬落荒而走張師旦沿途打探並無伏兵始放心迫去暗想元軍若除去勾龍闊海諸人不足慮也耶律霸直敗至太平縣西去二十裏三折嶺下此嶺上有石洞接連山南孤絕處一石門可容一人一騎下有深澗名曰沈香潭耶律霸敗至嶺下直入石門過之閻飛熊喜曰元將行入絕地其被擒必矣驟馬追去勾龍闊海伏其上見閻飛熊過毫不在意直待張師旦後軍到來急發響箭射入碧空伏兵齊起將粗木巨石疊下阻塞前後去路張師旦驚曰身入虎口此行危矣只見勾龍闊海立在石門上瞋目大呼曰張師旦若不納降吾準備多時將爲梅參政耶律都督報仇矣張師旦厲聲大罵曰羯狗奴吾豈懼汝耶言未畢只見勾龍闊海手舉巨石重有千斤劈空從石門打下張師旦並無躲處連人帶馬死於沈香潭中一時嶺表四下伏兵矢石如雨壽陽兵死者過半余盡降之耶律霸將閻飛熊引過此嶺聞賊兵已殲急回馬揮兵圍之竟被奮勇衝殺而去張師旦既死逃兵敗回營中韓彧不敢抵敵引兵望鳳陽而走城中三將得知心膽俱碎戚都督乘勢遂取甯國韓虎梁玧俱爲亂兵所殺閻飛熊耿青引敗殘兵奔至壽陽元兵大隊陸續追至戚都督引兵攻鳳陽勾龍闊海一軍竟打壽春時鳳陽城乃耿星星鎮守戚都督兵未入境耿星星遣裨將二人引兩軍抄出元兵之後埋伏戚都督前部臧凱直入伏中大敗而走比及戚都督來救已無及矣耿星星出其不意夜襲其營元兵又潰退至五十裏下寨深溝固壘與耿星星相持以免鳳陽與壽春犄角相援勾龍闊海兵至壽春壽陽王不意元兵神速如此倉卒間命王芝仙等守城閻飛熊耿青仍舊引兵迎敵連戰皆北敗入城中元兵圍城四面攻打壽陽城內滿望鳳陽耿星星引兵來援殊鳳陽有戚都督大兵牽制焉能動身加以壽陽王任政專信妻舅韓彧其蔡傳荊莫綏猷等備員而已韓彧傲狠肆酒頤指氣使睚眥小忿無不報復壽陽王性尤褊急峻刻馭下小不如意則將莫綏猷蔡傳荊等大加呵斥十分窘辱因此二人頗懷怨望壽陽王寵一愛姬名曰香雲有國色善歌舞元兵圍城壽陽王猶在宮中偎香樓據胡床幽香姬飲酒作樂時閻飛熊被毒箭所傷創甚而死元兵攻打甚急王芝仙耿青力不能支莫綏猷蔡傅荊直入樓前諫曰大王猶晏酣自恣耶元兵已攻破外城矣壽陽王酒已昏迷乃斂容答曰捍禦外侮自有卿等何必問孤也複引手撫香姬曰得卿張麗華孤即作一陳叔寶亦複何恨況自古及今甯有萬歲天子耶二臣面面相覷而出時壽陽百姓無不怨入骨髓一齊擁至午門大呼曰我等皆大元赤子願誅滅此昏主同歸大元莫綏猷蔡傅荊二人一見民變事急智生忙安慰百姓曰不勞汝等費力我二人自將昏主首級獻上大元退兵以保滿城百姓何如百姓大喜拜謝而去二人曰事不宜遲莫綏猷遂至城上召耿青王芝仙至告以故仍命耿青入宮行事耿青曰若命青臨陣退敵殊心驚面顫若令作此勾當則渾身是膽矣耿青遂仗劍入宮至宮門遇壽陽王次子賈琨即拔劍斬之抉取首級藏於身畔至偎香樓下壽陽王一見青至問曰元兵退否耿青厲聲曰元兵攻城甚急特來取汝首去退敵壽陽王大驚曰孤待卿等不薄何出此言耿青曰淮王秦錫帛待汝亦不薄汝尚弑之今日乃天道好還之時也壽陽王位曰乞與妻兒訣別死亦瞑目耿青不許將賈琨首級擲而與之壽陽王嚇得魂不附體手攜香姬往內便走且曰赴景陽並去矣行不數武忽兩眼一昏見淮王秦錫帛與史獻疇立在面前遂暈倒於地耿青大踏步上前拔劍砍其首級並香姬斬之不一會王芝仙入宮亦言世子賈熙爲其所殺隨後莫綏猷蔡傅荊楊瑊章坦等皆至一齊拔劍入內將賈氏無少長盡斬之始攜壽陽王首級出宮命百姓登城大呼納降元兵驗過首級勾龍闊海始分兵入城收其降表將首級用匣庋好莫綏猷等十餘人面縛入見勾龍闊海命且監下俟戚都督發落又出榜安民積年巨寇一旦而定百姓鼓舞大悅勾龍闊海令耶律霸馬昌二將分兵鎮守壽春白引大隊回攻鳳陽時戚都督亦知大功成就闊海入見相得甚歡酌酒稱賀闊海因問此處賊勢若何戚都督曰耿星星善戰某故深溝固壘牽制其師以待壽陽功成一鼓破之勾龍闊海亦以爲然且說鳳陽城中韓彧聞壽春已破壽陽王已死即欲納降奈耿星星崛強要戰勉強應承而韓彧此時已亡魂失魄耿星星日在營中與兵休息投石超乘養精蓄銳練成一陣名曰長虹其法前校首兵中校首兵左右兩騎兵兩伏兵齊相邀起截殺銳不可當此陣不畏衝突準備已審元先鋒勾龍闊海自恃才勇以得勝之兵望敵而進耿星星麾動七星旗五隊齊出勢若奔濤元兵不能抵敵大敗奔走死者無數勾龍闊海亦身被數傷回營納悶問衆將俱不識此陣遂心生一計用車戰法以敵之遂令營中連夜造成如式車輦接沖扼而駕以牛布爲方陣首尾相聯狀若連城士卒臨陣上車各持強弓勁弩射敵更以騎兵翼之翌日耿星星率兵搦戰勾龍闊海隨與交鋒不數合用槍尖一指營中推出無數戰車面面圍定箭如飛蝗人不敢犯復信炮震響更出兩翼騎兵齊衢殺鳳陽兵大敗耿星星被戰車所圍死戰不已一心惟望韓彧引兵來援遂且戰且走保護餘兵奔至城下只見韓彧在敵樓上已豎起降旗大開城門元兵直入耿星星直激得七竅生煙幾乎墜馬元兵大呼曰有能生擒耿星星者受上賞放縱者殺無赦耿星星不敢爭城翻身殺回咬牙切齒大怒曰能戰者皆來受死元兵罔不披靡一連搠翻裨將數人引敗殘兵竟衝殺而出戚都督統師入城將韓彧囚下立命勾龍闊海率臧凱李雲龍鞠弋仲裴金仙等追剿耿星星勾龍闊海五將領兵直追過臨淮耿星星又攖城固守五將攻打不提防勾龍闊海又爲耿星星射中手腕衆皆忿怒極力攻打三日遂破臨淮耿星星潰圍而出一支槍神出鬼沒勾龍闊海已負傷不能力戰四將皆非其敵不一會耿星星又刺中臧凱戮傷裴金仙殺出重圍竟過垓下竄廣陵界日四將見已去遠不追勾龍闊海憤然曰不生擒此賊淮南萬里終不平也四將不得已一同追至高郵又被元兵圍定耿星星奮起神威又槍挑裴金仙于馬下護衆而走軍士忙救起裴金仙則耿星星更遠去矣四將不欲窮追獨勾龍闊海一人抵死不退令請揚州護軍蘇聯芳引兵會合剿賊勾龍闊海又與蘇護軍合兵迫至駱駝嶺及之三馬連環鏖戰不已蘇聯芳措手不及被耿星星一槍刺死保護餘衆直下通州奪船入海門島而去勾龍闊海大驚忙令將蘇護軍屍首殯於廣陵候安撫奏請封卹乃率本部兵索然而歸時戚都督已稟知安撫將莫綏猷等齊上檻車諸將分兵鎮守班師回建康安撫塔思不花奏聞元主旨下以賊黨俱在建康處決將首級曉諭遠近安撫陛樞密正使進爵爲公戚磷封關內侯爲集慶路大都督勾龍闊海爲敦武大將軍都統制如臧凱裴金仙鞠弋仲李雲龍馬昌俱進位有差陣亡者俱有優恤大犒三軍自此鳳陽一帶道路始通
