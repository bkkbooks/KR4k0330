body:
  text: 第十一回征曰本蒙古喪師當時錢塘縣除了巨猾訟息民安人人稱慶皇甫惇在天民署中情誼相得間或觀潮遊湖遨遊山水置身事外一日至江下遇二乞者齊聲謂皇甫先生別來無恙耶驚視之乃向南枝施澤久也問何至此二人言自先生被陷後王多管累來根究我等不許嶺下居住我等不服欲與爲敵誰知彼等有意生事將一久病老兒縊死嶺下謬以人命官司誣陷我等令人呈報我等聞風逃竄幸而得免就近居民無不被累今聞惡榻已除方始來歸皇甫惇亦歎恨不已二人齊聲曰從此更不住棲霞矣問其故曰西湖十景名勝甲于天下遊湖士女如雲每有豪族惡少在此以強淩弱我等素性不耐易生枝節願避此地徜徉他鄉落得無拘無束皇甫惇亦點頭道是問何業向南枝便賣槍棒施澤久就耍花蛇二人回歸果將家室移往僻靜處安置離了錢塘順江而去皇甫悼見二人落落氣概隨遇自得儼然四海爲家自思在此日日羈縻終非長策遂謝別葛天民亦望會稽迸發且說馬遇樂弟兄在暹羅國忽不見了涪陵四處探訪並無迹蹤必因國王令旨知風逃去弟兄十分焦急千山萬水保護海外至暹羅已漸近中國忽然失散海闊天空焉知下落二人暗思陳宜中必知此事急往告之宜中變色曰小子猶問趙氏耶恐汝輩亦難免矣弟兄不敢複問大驚而退情知涪陵爲宜中所不容或往占城亦未可知弟兄急急遂往占城不知涪陵在日本國王坦呢哩特布優禮相待嘗與涪陵並車遊幸所屬名島並境內山川涪陵亦嘗讚賞國王政俗之美國王甚嘉納之其國離城百餘裏有一奉聖寺天生奇奧石徑幽窈修造恢詭已曆千餘年自來日本無兵火水早之憂又無攘奪篡弑之變奉聖寺竟成古迹又日本之南與洛伽補陀爲界寺內番僧歲凡一往因此香火極盛頭陀極多但不似中國名勝鮮有遊覽至此者土人貪而好殺前代國王每勤征伐剽掠海邊獨老王子無此殘暴之氣然性佞於佛一日整備法駕將往奉聖寺瓣香祈福請涪陵同往涪陵不得已從之至寺中國王皈依頂禮衆僧鳴動鐘鼓宣揚佛號國王舉手膜拜誠懇備至少時茶罷衆僧一齊獻諛謂國王有無量功德佛日增輝國祚綿永等語國王大喜涪陵心中不以爲然由客堂散步直入丈室忽見有中國人字迹大書一聯雲水月通禪寂魚龍聽梵音末書司勳郎中錢起題涪陵大奇之暗思曆遍海邦今日忽見六書正體文人筆墨且喜魚龍聽梵音一語暗合身分正在驚喜忽聞淨室中有人私語諦聽之若聞木瓜呀布云云木瓜者尊稱也呀布者猶言好也蓋蠻姑琮女音也涪陵一時心頭火起既而轉念曰此何地也奸僧得知禍不旋踵矣急急走出見國王與僧衆猶趺坐揮麈而談佈施功德如此恁般國王大喜曰寡人來日即當輦金來寺齋僧供佛懺悔夙愆預種福田衆僧合掌叩謝國王遂同涪陵起身作別而歸次日國王果遣內官將許多金寶送往寺去涪陵止之曰金寶送去有何用處國王斂容答曰齋僧佈施爲寡人作功德使國安民服群島附庸不致叛離涪陵笑曰國家安危自關氣運然能親賢遠佞用人得宜雖危可安雖亂可治豈彼群僧能爲力也至於群島叛離只須國王撫以恩信鎮以兵威自然拱服且上國亦非富庶之邦某觀沿海島岸遍是窮民然皆精悍可用之徒何不賜以衣食各安其生各遂其性國有事變可得其力爲用況蒙古殄滅西夏四十餘國今混一土宇爾日本獨能保無虞乎國王默然無語時日本有四猛將曰沙吒魯嘿淵越乞紇幹懈底鼇在階下一齊厲聲大呼曰金寶不可賜與僧衆徒供妄費趙宋王之言至言也國王不可不察國王曰寡人堂堂一國無多金寶既已許口豈可失信於僧衆大夫紇搭出班奏曰近聞奉聖寺邊滄水不裏部落往往失去蠻姑蒜女無算酋長不決諸部常相攻殺奉聖伊邇其中不無弊端濫賜金寶妄予恩典恐將士灰心紇搭語未絕聲諸武將爭相議論呶呶不已國王此時將金寶輦在殿前首鼠兩端中心無主涪陵見衆心不服知計可行請國王將金寶收下大聲謂衆臣曰諸公毋嘩趙某有計獻上衆臣果然一時屏息涪陵請國王調兵五百遣嘿淵澥底鼇二將詐以巡海爲名暗暗將寺圍定一搜其中決有奸細國王未及回答嘿淵澥底鼇應聲願往領兵而去國王一片佛心竟被衆人一吹一唱從中止了卻說奉聖寺僧千有餘衆所恃人廣地僻種種不法凡琉球黑水諸部惡禿多聚於此不是擄掠各部蠻女入寺宣淫即下洋攔截番舶搶奪珍寶補陀山下賊舟皆朝南海番僧之徒爲之也當日嘿淵澥底鼇二將領兵詐稱巡海又暗知會滄水不裏酋長領兵來寺秘密圍定一聲令下二將打人果在複室中搜出姑猔蠻女百四十餘人海物珍異無數僧衆見事機敗露各持刀劍死命殺出二將恐勢力不敵把關攔住也不管千年古迹火焚其寺逸出者截而殺之一時煙漲迷空寺內號吼之聲驚聞數裏不上半日惟見廢瓦禿垣一片白地二將始將搜出蠻女金寶押回國中複命國王初聞不法諸事甚怒僧等繼聞二將火焚寺宇勃然大怒命斬二將文武進諫俱受唾駡涪陵見國王盛怒之頃不便發語只見國王拔劍砍案大呼速斬業已綁出午門無可解救忽報元主遣兵十萬來征日本已至海上了國王大驚無措涪陵乘機進曰蒙古果不出吾所料國王且以應敵爲重恕了二將速議軍旅國王此時不得不從即命赦之二將叩首謝罪在廷文武深德涪陵國王立令將金寶分賞諸島窮倭調來聽用涪陵笑止之曰雖鞭之長不及馬腹是在平時耳此時須別求方略國王前席請計涪陵見國王方寸已亂乃問曰上國險隘何處爲最文武齊聲曰此去七百里扶桑島最險峻島下赤金崖凡航海來日本者皆從崖前泊舟上岸乃吾國咽喉也涪陵又曰除了扶桑島更有何處文武曰此外惟白石瀨亦控制海道但離國僅四百餘裏涪陵又問何謂赤金崖國王曰崖下多産金鐵採用不盡積久遂成赤色故曰赤金崖涪陵擊節喜曰即此甚妙計可成矣遂命沙吒魯率兵三千把守扶桑島吾授汝圖式速采崖前金鐵命工匠起大冶鑄造轟天雷大炮二十餘座鑄成如法安放凡應用諸物速發帑藏措置即此可擋蒙古十萬師矣命嘿淵澥底鼇統兵五千劄白石瀨上國惟仗刀槍廝殺亦大費事可命軍中速造連弩其弩每發共一十二支乃大漢諸葛武侯遺法弩床在右翼以藥箭石子蒙古雖強難逾此二關也再命大將越乞紇幹領兵一萬往來救應步步結營勝則相助敗則相援蒙古不能深入重地其兵必退趙某海外飄泊十年今日務在上國將鬱氣一吐國王大喜下令城中戒嚴衆將分頭去訖卻說元世祖吞併六合總括中外猶貪心不足屢命將征伐絕域專務遠略窮兵黷武費用浩繁民甚苦之有四帥曰阿答海相吾答兒阿里海忽都貼木兒四人日日慫恿元主征伐凡高昌吐蕃交趾高麗鬼蠻天竺鄯善安南西域回鶻甚至欽察離中國三萬八千餘裏因産良馬無不伐之至是又因琉球國使臣入貢言日本國産獨搖芝且有趙宋後裔在焉其國大治橫行海岸所向無前元主業已怒其不貢又聞有宋趙氏住在國內即命起兵伐之太傅伯顔中書完澤右丞相和禮霍孫皆極力切諫不聽惟桑哥廬世榮阿合馬一班佞臣俱贊成之元主大喜即詔相吾答兒爲大元帥阿里海副之百家奴蕃哥方文張燮積慶貼木兒等胥授節制以琉球使臣爲向導統雄師十三萬征伐日本相吾答兒等得旨即備戰艦海鰍由天津放至登萊迤邐而下徑泊羅崇明又數月始達昌國漸近日本不日已見扶桑島了島上因國王用涪陵之計命沙吒魯統兵把守鑄炮以候又調集無數士兵駐崖前連珠爲屯一屯一炮每屯五十人二十餘屯阻住海岸果然土兵能奮死力一見海上隱隱有元兵到來便呐一聲喊聚集滿岸磨拳擦掌約計元兵相去不過十裏之遙土兵從不見過轟天雷戰法爭相上前發動藥線誰知不發則已一發就如震天的響了一聲衆兵就嚇得抱頭亂竄雙耳齊聾盡皆伏地不起那炮打去數裏之遙豁喇的落在水中波濤鼎沸魚鼈皆驚大元帥相吾答兒驚得面如土色謂衆將曰紅夷西洋素長火攻今日本亦用此法即已至此我師焉得上岸言未已島上又發了數炮軍中一時驚惶皆言不如少退略避其鋒誰知風色正順海鰍大船一時焉能駛退島上士兵正打得高興二十餘座轟天雷一齊舉發火焰通紅煙漲迷空但遇著一船無不粉碎衆軍叫苦不叠霎時已不見了萬餘人馬相吾答兒無計可施俄而颶風又起愈吹愈近且喜島上發放已盡準備不及土兵正在喧嚷相吾答兒下令三軍務須死中求生趁此衝突上岸違者斬首三軍方欲鼓噪上前只見沙吒魯率大隊在赤金崖前密如箐筍排定引弓注石處處截殺三軍不敢直進相吾答兒大怒立斬數員健將以殉元軍積慶貼木兒者自負膽略過人躍上一隻小舟奮勇爭先思奪其險突見上流頭豎滿赤紅旗幟不知多少人馬洶湧滾滾而下柁師大喊叫曰不好了鯨魚發了鯨魚者海魚也大者長千里小者亦數千丈轉瞬已近島岸乘時炮聲又舉鯨魚震怒鼓浪成雷噴沫成雨揚耆昂首山石爲之震動翻江攪海白浪滔天土兵俱驚呆了沙吒魯下令退兵但見雪陣銀山卷地若軍聲十萬鼇奔龜吼浮天壯鐵甲三千可憐大元十余萬雄師不一會盡埋臂掩骼于洪濤巨浸中其浮去得生者惟百家奴方文暨一小卒三人回朝複命而已豈不哀哉此皆元世祖窮兵黷武之報而亦元世祖石桀屠生靈之惡也有詩歎曰苦把生靈任毒痡窮邊黷武葬魚湖勸君莫話封侯事一將功成萬骨枯昔時梁武帝築堰淮水以灌壽陽淮水漲堰壞十余萬口皆漂入海世祖此惡比之尤有甚焉淮水湯湯卷土奔煙波一洗徐揚村元征日本惡尤甚十萬貔貅葬海門
