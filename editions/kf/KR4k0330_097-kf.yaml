body:
  text: 第九十七回脫脫決議開黃河宋穆宗景新九年左相白映雪卒以令狐韜歐陽懋德爲相帝頗事聲色經營土木令采漳州水晶以作鏡殿尚書上官誠樊東樓等進諫不聽帝席太平之業日久宴安且生猜忌時馮道南之子馮順爲右丞王武秀爲郎中楊俊爲太子舍人三人皆機巧便佞善伺人主意帝甚寵之又有左贊善韓欽明乃韓昭猶子議郎吳岌乃吳廣之子二人亦阿附上意帝甚重之五人互相朋比朝中目爲五鬼王武秀昔日爲神策營小吏犯令爲庹靖虞候所鞭吳岌亦坐法當斬陳同恕而杖之二人遂倡言國家承平宜廢四大營並歸六鎮帝亦以歲費浩繁租稅不敷遂允其奏宰相令狐韜樞密使岳坤極力諫阻不聽二人奏曰陛下若節妄費以務正用國家之歲供猶恢乎有餘帝滋不悅詔下有建昌節度使史進翔龍府留守司都統制狄勇杉關副元帥劉遇隆三人聞之不肯奉詔一齊入朝上表抗言曰昭皇帝設四大營以佐六鎮星羅棋佈以備不虞乃至善之策也陛下宜守成法不可變易若雲經費不敷則土木之費珍玩之供乃陛下近年始有此舉先帝在日未之聞也且陛下承宗廟社稷之重正宜親賢遠佞節用惜財以固國本詔求直言以培國脈不然惟有負先帝艱難恢復之意並恐失中外人民之望疏入帝大怒曰欲廢四營乃爲國家惜費汝等乃面侮朕躬詣朕聽佞言耶立命斬之史進狄勇神色不撓亦抗聲言曰陛下不惜冗費而裁正供四營若廢武備不振倘變生不測老臣等立見其敗矣可惜先帝十五年海道播越創業艱難耳帝怒不可止敕劍封下群臣不敢進諫時三人已綁出朝門史進目光如炬大言曰自壞汝萬里長城異日定悔無及陳太皇后在宮中聞之立即命駕直出殿門責帝曰汝父如龍汝兄如虎國有大政無不與群臣商妥始行在位數十年並未妄殺一朝士以人才難得當爲國家愛惜也況史進狄勇劉遇隆三人皆顯皇帝恢復創業功臣汝乙夜觀書幾曾見誅殺功臣之主能國祚綿永乎必爲若所欲恐一敗塗地將累及老身不知死所矣且責且泣而入帝大怒即令人追回令旨則三人綁至法場業已斬決矣帝亦惱悔詔厚葬之贈史進爲忠列侯狄勇爲武襄侯劉遇隆爲義勇侯以原官蔭其子孫月余太皇后陳氏崩帝哀毀不勝鬱鬱寢疾九月癸醜遂殂在位十年穆宗子尚幼以昭帝子承枯立爲太子至是即位遂爲成宗以明年爲嗣慶元年從此四營既廢六鎮空虛內而老成凋謝外而宿將物故宋祚不復永矣成宗禦極稔知五鬼妨賢病國盡放流之是年惠州府羅浮山崩有尚書樊東樓歎曰羅浮乃宋業起義之所今無故崩頹時事可知遂致仕而去是時元順帝改元至正複行科舉從右丞相脫脫之請也按此又一脫脫乃馬劄兒台之子因左相伯顔既誅唐其勢獨秉國鈞專權自恣脫脫乃伯顔從子慮禍及己深以爲憂乃問其父馬劄兒台當于伯父未敗時圖之父以爲然脫脫未決又質之于其師吳直方吳直方曰此大義滅親之舉也正值伯顔構陷郯王又擅貶宜讓威順二王帝不勝其忿決意逐之脫脫始以帝出獵用宿衛兵拘伯顔于京城草詔榜其罪狀黜爲河南左丞相徙之蒙化伯顔中途遂死帝任脫脫爲左丞相錄軍國重事帝始憶及文宗謀爲不軌致明宗暴殂於旺忽察都乃撤去文宗廟主徙太皇太后于遠州放故太子燕帖古思於高麗太皇太后乃大悔恨曰惜不用燕鐵木兒之言以至於此燕鐵木兒子孫盡行誅戮凡禦史台臣有諫者帝輒誅之以報宿恨帝又遣使至沙州暗護生母柳氏及趙完普等親屬至京欲尊養之使臣未至而完普柳氏先卒帝慟悼不已詔移至燕京厚葬之俱有封贈親臨祭奠廷臣未喻其意也至正十一年黃河決脫脫乃大集群臣廷議河防一事紛紛衆論無所折衷惟漕運使賈魯以爲必塞北河疏南河使複故道工不大興害不能已脫脫奏知帝遂遣工部尚書成遵大司農禿魯等巡行視河議其疏塞之方以聞成遵等乃自濟濮汴梁大名諸處行數千里掘井以量高下測岸以究淺深博采輿論以爲黃河故道斷不可複山東連年歲歉民不聊生若聚二十萬衆於此地恐他日之憂更有大於河患時賈魯先與脫脫言此役自關丞相一語已決況成遵等采河南北童謠有雲石人一隻眼挑動黃河天下反殆欲以此語驚撼丞相耳及聞成遵等議脫脫怒曰汝謂民將反民即反耶自辰至酉議不能決明日執政皆謂成遵曰修河之役丞相意已定且自有人任責公勿多言成遵曰腕可斷議不可易脫脫遂奏出成遵爲河間鹽運使詔開黃河故道以賈魯爲工部尚書充河防使發河南北兵民十七萬自黃陵岡南達白茅放于黃固哈只等口又自黃陵西至楊青村凡二百八十裏有奇興工五閱月而堤成河複故道超授賈魯爲集賢大學士脫脫爲太傅賜世襲答刺罕之號其餘賞賚有差誰知賈魯治河于黃陵岡鑿山開道拆毀民居驅逐搬徙果然掘出石人一隻眼所拆毀處恰是妖人劉福通所居福通久以白蓮會燒香惑衆奉欒城人韓山童爲主詭言天下大亂山童乃彌勒佛下生當爲中國之主河南及江淮愚民翕然信之事覺官捕之甚急山童被擒福通煽動開河丁夫以紅巾爲號遂據朱臯攻破羅山真陽確山等處又陷汝寧府及息州光州衆至十萬福通乃迎山童之子韓林兒至立爲帝號小明王建都毫州國號曰宋改元龍鳳以其母楊氏爲皇太后劉福通爲平章亂自此始矣
