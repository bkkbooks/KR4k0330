body:
  text: 第六十回王用槐吹蕭九嶷山嶽招討既在襄陽休兵三月招賢納俊四方歸者如雲即命扈先鋒德威鎮守襄陽其餘各處分撥控制乃率兵由嶽州過洞庭望長沙而進以任天鵬守嶽州寇復雷仍鎮長沙時寇復雷之侄竹生由洛西來歸嶽招討甚喜命與樊東樓鄭夢蘭等俱隨大軍而行卻有辰州瑤酋秦猛膂力過人稍有謀略部落畏服之遂訓練蠻部得三千餘人俱能披甲渡水涉溪跳澗矯捷如獼猴因見宋元構兵攻城略地潛謀不軌乃煽動各部如苗蠻洞蠻武陵蠻等各擁蠻兵擾亂州郡又誠州瑤酋楊有木咢宋熙寧中其先世有光僭光富者歸附朝廷為右班上直飛山一帶道路俱設巡檢司子孫世職其名再思者曾據群舸稱刺史有功于民死而靈異土人祀之楊氏至元世失官故有久蓄異志所部又得猛將二人一名濮三怨虎臂熊腰雄健絶倫自言怨天不以富貴庇己怨地不以富貴載己怨人每欺我無才無能故名三怨一名插翅飛本名牛二鋭頭蜂目粗莽有力因能披重甲越巨塹故名插翅飛二人齊歸有遂統蠻兵四出大掠州縣騷然秦猛亦從五溪等處大肆猖獗時郴辰桂陽各州俱劉遇隆鎮守遇隆恐不能制令人星夜至長沙告急嶽招討大隊尚在長沙即撥兵五千令狄勇嶽坤往助討平土蠻二將兵至五溪則秦猛已被劉遇隆追過沅水渡渠河逾黃茅嶺藤蘿營與楊有入夥二將遂督兵直抵誠州有濮三怨正率蠻部在攻擊虜掠被二將痛剿一陳濮三怨敗去二將遂屯兵七星岩次日楊有甚忿統其族姓共三十三州洞之衆來決死戰狄勇曰賊聲言致死於我不如少避其鋒俟其疲倦擊之一戰可定嶽坤然之令衆軍堅護營寨如擅離鹿角者立斬楊有率洞丁在寨前耀武揚威討戰宋師不理直至午後人已困倦多有解甲下馬坐臥而嫚罵者忽宋營中鼓角齊鳴鐵騎當先步兵繼之蠻兵倉皇不敵陳腳已動楊有阻遏不住遂潰二將大破其寨劉遇隆在藤蘿營與秦猛大戰良久忽插翅飛引蠻兵從落濛關驟至攻擊宋師之後劉遇隆腹背受敵力不能支遂敗二將聞之狄勇急引兵往援至九龍山正遇插翅飛奮勇而來狄勇下令衆軍俱用大刀闊斧如牆而進插翅飛與狄勇交馬不一合被狄勇一槍刺死宋師大殺一陳苗兵皆鳥獸散狄勇遂與劉遇隆合兵復攻瑤酋秦猛至郴州之白馬嶺瑤酋部落勇健善戰宋師不能勝潰於嶺下秦猛所部之衆亦損去三分之一未能抵敵聞營陽麒麟峽武陵寨酋長姚應龍部落有三千餘衆遂率餘兵急往歸之狄勇劉遇隆見蠻兵去已遠未便追襲遂回兵來威寨時楊有在會同縣煙墩囤負固阻險前臨大溪前後皆修篁密箐輜重屯其中俱臨溪而守三將兵至觀望良久劉遇隆遂引兵偷過囤後上山縱火焚輜重狄勇嶽坤引大軍就溪邊鏖戰不已楊有前後受敵救應不暇所部精鋭漸已殺盡遂棄衣甲鞍馬與濮三怨混入蠻隊中而遁沿途打探插翅飛一軍消息插翅飛在九龍山戰死秦猛一隊又過麒麟峽與姚應龍入夥去矣楊有濮三怨亦率餘部望營陽而進宋將狄勇嶽坤劉遇隆引兵沿途迫剿迤邐直過道州一日抵飛霞嶺有苗兵阻住三將率兵奮勇奪險而苗兵弩箭傷人最為利害軍士皆怯三將各執蠻牌身先士卒衆兵繼其後苗兵遂退過嶺去三將引軍大殺一陳直逾孤雲澗丹岩石則有武陵蠻姚應龍大隊阻住去路姚應龍碧眼紫須手舞蛇矛迎戰三將分左右翼而進蠻兵殊死鬥三將見難以力勝遂鳴金收軍次日姚應龍合秦猛楊有濮三怨四酋各將苗兵一齊湧至直蹙宋師劉遇隆望陳而逃四酋窮追不已狄勇己入麒麟峽令軍士縱火焚其巢穴煙焰蔽天姚應龍正在追擊宋師忽回頭望見大驚急欲回兵而號炮震響嶽坤發動伏兵楊有被嶽坤手起一槍刺于馬下劉遇隆督兵殺回蠻兵大敗宋師如發蒙振落姚應龍也不顧後軍拍馬便走將入峽口正遇宋師大出狄勇一馬當先挺槍便刺姚應龍不敢貪戰奪路而走宋師亦不追趕姚應龍見營寨已毀妻子俱戮大恚曰此仇不可不報率秦猛濮三怨等離峽而去且説劉遇隆嶽坤狄勇三將合兵商議曰賊已膽落趁破竹之勢討平蠻部成功在此一舉三將令人往探雲賊在披雲洞養蓄精鋭三將一同進兵不日至右筍窩越虎兒峪路皆險峻三將防有不測分三隊而行以便前後救應行經數日俱無苗兵一日抵九門峽將入飛蛇口忽濮三怨引一隊蠻兵迎敵前隊狄勇接住交戰濮三怨焉能抵敵十餘合大敗而走狄勇忙令人報知中隊嶽坤引兵追去嶽坤聞報即催趕而進再報後軍令速來接應前隊狄勇追襲蠻軍濮三怨且戰且走狄勇見蠻兵並無接應中隊嶽坤亦至遂放心追去行不數裏見兩崖多峭壁削天怪石蹲踞嶽坤狄勇未免心疑忙令人哨探所追蠻兵忽不見二將大驚立命兩軍退出穀口則四山已鼓角亂鳴二將恐被圍急奮勇殺至一處地名曰將軍壘就山頭扎定回看穀中無數苗蠻奇形怪像蜂擁而出處處阻住二將幾次衝殺不能奪險一心惟望劉遇隆援兵接應誰知劉遇隆後隊聞報即遇秦猛一部蠻兵橫沖其陳阻截前後劉遇隆與戰即退追至落星岩亦入伏中被瑤蠻所圍三將聲息不通劉遇隆在落星岩眼睜睜日盼二將之回救半月有餘軍士飢不能起掘草根削樹皮勉強入腹蠻兵安坐守定以飽待飢宋師大困劉遇隆仰天歎曰天不欲興大宋耶何置人於死地乎軍士飢不能堪互相怨尤號泣不已死者相繼時當秋深是夜月明如晝銀河在天蠻兵隊中悄無人聲劉遇隆左右思維無計可出心如鹿撞忽聞遠遠若有吹洞簫者策聲嗚嗚迎風送至覺得一聲長一聲短一聲高一聲低其音淒涼其韻清越字字令人下淚劉遇隆審聽一會覺其音自九嶷山東南最高處而來者既而歎曰此張子房之簫吹散八千子弟兵者也吾其殆矣宋師聽者多嗚咽不能成聲蠻兵當夜三五成群聚於一處側耳聽之始初猶覺餘音嫋嫋可歌可詠繼而愈聽愈蒼涼愈聽愈覺酸楚蠻兵各隊無不望月飲泣曰我等各有部落各有鄉土何苦死守於此倘遇敗績不徒作他鄉之孤魂遊魄耶遂一齊號吼解圍而去秦猛不能禁劉遇隆聞之撫慰軍士稍強者當先弱者隨後亦乘勢殺出正遇秦猛交馬只一合被劉遇隆殺之忽前面塵土大起疑洞蠻大至準備迎敵及近視之則狄勇嶽坤二將亦言潰圍殺出深得九嶷山簫聲解散之力三將始合兵一處忙將蠻兵所棄之糧令三軍飽食食猶未畢濮三怨姚應龍領苗兵千餘來追宋師業已得食可以力戰三將圍之混戰一會姚應龍中箭身斃苗兵無主自亂濮三怨下馬請降三將允之余苗亦多降者三將回至營陽以酒食贈苗兵各以溫語安慰厚其賞賜即命濮三怨為本洞之主撫輯苗夷兼制僮瑤三將亦奏聞宋主更頒誥敕無得復生異心濮三怨率衆蠻兵泣拜而去諸蠻盡平劉遇隆曰我三人幸而成功非吹簫之力不至此遇隆當至九嶷山訪之嶽坤亦欲往二將不用隨從遂由寧遠直至山上東南最高處隱仙岩側有一讀書堂內一書生二將叩之即昔日洞庭湖中吹簫之王用槐也大名人避亂湘陰與寇竹生同裏因見寇氏橫遭無辜乃隱於九嶷嶽坤劉遇隆叩見畢各道來意並謝其吹簫解散苗兵之力用槐遜謝曰仆是夜亦偶爾步月因有感二十四橋故爾品一十六管亦書生輩適情自恣耳仆何力之有嶽坤劉遇隆齊聲曰若非先生簫聲一助某等不惟不能成功且坐受台城之困矣先生高臥空山相時而動今宋主龍興懷才抱藝者可以出矣王用槐曰仆煙霞痼疾久矣大宋重興自有將軍等風雲相從仆枯稿之士敢濫廁吹竿耶嶽坤曰前某等大軍平定襄陽招納賢豪之士何啻數十人各處聞之莫不望風景從先生不出想以千鈞之弩不為鼷鼠發機寧薄大宋而不屑耶用槐遂不敢再辭留二人宿於山中次日治裝同至營陽又與狄勇相見劉遇隆仍舊引兵鎮守郴辰桂陽等州二將領五千原兵同王用槐望廣南而去
