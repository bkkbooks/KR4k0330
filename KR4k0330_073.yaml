body:
  text: 第七十三回蘇縣令巧決疑訟漳州龍溪蘇令名會昌新田人吏才明敏縣無疑獄發姦擲伏素有循聲龍溪負山濱海水陸交沖又首隸漳州事甚繁瑣蘇令應上接下事事皆理真是虛堂懸鏡案牘澄清一日判一案乃貢珠門惡奴控主有龐生者世家子廣置姬妾蓄俊仆不數年以瘵病卒其妻尹氏孀居有仆名桑紫者性最黠與主婦通時龐生一子年未及冠亦甚聰慧桑紫與尹氏情好甚密而礙其子遂唆尹氏以忤逆控之蘇令質訊系桑紫抱呈一同鞫問尹氏一口咬定逆子不孝叔舅概置不理無所約束故控蘇令立喚叔舅問之皆言不知蘇令兼得其實喚桑紫問曰有子不孝叔舅兩黨概言不知而子何獨妄控桑紫叩首曰小人蒙先主人豢養之恩日望小主成立克保家室奈日事淫博狎昵邪僻主母束之反加抵觸及赴訴兩黨置若罔聞主母日夜涕泣無所為計不得已故出名抱訴蘇令微笑曰是大難事任勞任怨可謂忠心為主桑紫叩首又曰小人素以義氣自許凡主人之事雖赴湯蹈火在所不辭蘇令益嘉賞之曰義仆桑紫深謝叩頭不已蘇令隨喚其子問之則年僅十五六恂恂書生訊逆母之故無言可答但流涕而已蘇令佯怒曰忤逆不孝律有明條汝死期至矣立飛簽下其子慟哭不已叔舅皆極力哀免請恕而桑紫與尹氏微喜色蘇令乃回顧桑紫笑曰爾小主稚年不任撻楚爾乃義仆雖赴湯蹈火皆無難事曷代之即喝隸胥曳翻桑紫欲杖且曰此杖不孝者不可輕也重責四十蘇令又喚其叔曰伊父與汝乃手足也而不代為約束其侄汝應受杖其叔五體投地乞免蘇令沈吟一會曰有任怨任勞者在汝毋慮也又曳桑紫重責四十繼又杖其舅曰伊母與汝骨肉而不代為綱紀家政成就外甥竟袖手旁觀是何道理亦應受杖其舅蒼顔白髮叩首不已蘇令微笑曰此事自有義仆任勞任怨皆所不辭也命將桑紫曳翻再杖桑紫已血肉交飛大哭求免蘇令大笑曰義仆之稱甚難得也竟杖之復命舁重枷至判曰枷號義仆一名桑紫俟逆子改過日釋放桑紫杖傷已重旬日竟死當下蘇令面諭尹氏曰母子之恩天性也今後慎勿妄聽人言滋生事端尹氏已汗流浹背惶恐謝罪領其子而去又有錢貢士負債一案告者凡十人以貢士曾作一會共收銀四百兩貢士負心竟不墊還現有文簿可執貢士則以平地生波文簿皆偽等語赴訴蘇令心生一計先喚錢貢士問以得會不償是何心意錢貢士極力分辨蘇令不理即於十人內首喚一人入內署斂容問曰大凡作會者必治小酌錢某集會初亦曾備酒邀汝等否其人曰然又問以何日其人曰系某月某日又問以作何酒筵備何蔬菜賓客幾許桌席幾許凡瑣碎之事無不備問問畢令在一旁又喚一人入而問之仍以酒肴杯碗七箸諸碎事問之其人亦隨口含糊應答蘇令問罷隨筆記之令在一旁又喚一人俱如此問凡問十人各相矛盾蘇令撫掌大笑曰錢某以一會故一日之間汝十人乃領受十樣酒肴也耶十人俯伏在地不敢仰視用刑一嚇無不吐實蘇令責之曰捏誣詐磕律有常刑十人俱各如法錢貢士拜謝而出聞者無不稱羡一日升堂放衙甫畢一秀才公服昂然而入直稟曰一等生員告狀蘇令徐答曰二甲進士不準秀才大慚而退兩旁胥役掩口而笑一日有平和縣士子十餘人由武都下第歸道經龍溪宿邸中遇小偷失錢三緡與逆旅主人口角忿爭遂控之謂主人竊去伊等資斧共十二緡衣服貨物不在此數哄集公堂蘇令喚逆旅主人至隨與質訊蘇令見士子一行十二人外腳夫二人俱在堂下心中業有分寸即喚逆旅主人大加呵斥主人力言銀錢有無概未交匱貨物失否殊難憑信小人斷不任咎衆士子一齊紛紛攘攘呶瀆不已蘇令正色約住隨喚一二年長者問以何年遊泮何年食氣今科武都典試者何人策問者何事一一問遍衆士子亦未敢喧譁其一二年長者隨稟以邸中遇盜主人知情一事蘇令曰此無預主人事所失多寡自當蘇某賠還衆士子皆喜蘇令隨喚吏胥將二腳夫所擔行李用稱量之衆士子不解何意少頃量畢吏胥稟曰一重百斤一重八十一斤整蘇令聽畢微笑曰此失錢三緡耳回顧小吏即取錢三緡與之內有數人猶欲爭執失數不符蘇令笑曰此無難知也若失至十餘緡恐汝二腳夫將力不能勝其任矣衆士子不敢復爭驚以為神拜服而去又一案為本邑縣尉二女同在任所居署中忽不見生死未知無可審訊又礙于僚屬官針頗涉疑難正逢朔旦因進香至武廟禱之是夕蘇令遂夢武聖坐殿上大書一詞付之蘇令審視乃曰雜花間紅日西墜悶無心懶傍妝台倚闌幹東君去矣閉紗廚不見多才蘇令方欲跪下問明忽然驚覺不解所謂一連數日遲疑未決偶坐內廨悶悶忽見二童子戲階下大怒擲杖投之二童子遁走杖擊不中觸門限折為兩段蘇令恍然大悟曰是矣乃四門字也間字去日一門也悶無心二門也闌字去東三門也閉字無才四門也意者二女其匿在四門中乎既而曰非也吾聞縣尉素有龍陽之嬖四門子最所鍾愛二女存亡其在此四門子乎遂令人喚至內衙一款而服蓋縣尉二女有殊色因窺見四門子皆美少年偷香竊玉兩俱傾心四門子垂涎已久因縣尉他出門子以爭風忿斃其一四門子懼並二女斃之投尸內署井中蘇令得實令人撈起四門子俱伏其罪此時縣尉已赧顔無地挂冠而去一日有縣民吳小乙持狀控人負債不還被控者名汪七具呈自訴貧窘難償兩下質問吳小乙力言朝不謀夕專望此債少延殘喘汪七自陳不敢負心所欠是實但貧至無錐妻死未葬現沿門托鉢何以償還蘇令看二人情景逼真沈吟一會乃曰此債吾代汝償還邑內某典肆吾存錢若干汪七自往領取遂手書數位摺而封之不準妄開汪七接字在手五體投地飛奔典肆中與肆翁言之肆翁驚訝以為虛謊汪七力言非誣肆翁曰此官明如鏡清如水容有錢存典庫中也汪七猛省手中尚有執據遂出手書與之肆翁觀畢大笑曰手書上只有四字汝曾觀之否汪七答言未觀肆翁笑以示之曰乃還不快走四字也汪七聞言抽身便走其行如飛少頃吳小乙又至肆中言官命來領錢債者亦出手書肆翁明知此案未了不知此書又作何寫含笑接著觀之肆翁觀畢更笑不可止仍還小乙曰此限字也汝去耳吳小乙猶以為肆翁戲言忙定睛一看紙上惟朱書四字曰再限十年吳小乙不敢多言怏怏而去一時傳播以為劇談一日有一民婦涕泣人訴自稱王氏夫名卜三郎昨遠方貿易而歸不知何人截殺奪去財物棄尸某池中因念三黨俱無煢獨無依求為作主言訖嗚嗚而泣蘇令即命人撈起尸首驗畢周身無傷惟滿口泥垢腹脹如鼓系淹斃者問過鄰里俱無驗白遂賞錢數貫令王氏自行收殮掩埋王氏叩謝不已哀亦頓止蘇令使人尾之出看如何葬埋少頃回報王氏出衙正行間忽短巷中出一道士與語多時始去買棺蘇令立即飛簽拘道士至問如何謀死蔔三郎道士初不肯承嚇以重刑始言因姦謀殺其夫與共遠遁等語乃並王氏一同拘至論死抵罪鄰里毫無系纍蘇令決獄諸如此類甚多不可殫述後宗夢弼以循良奏聞宋主即加升以為撫州太守
