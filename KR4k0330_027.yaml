body:
  text: 第二十七回范國昌入夢承簡命卻説范國昌司馬肅白映雪三人在襄陽聞德威遭貶皆為不平遂濟湘江遇同舟一人口吳音喜談往古興廢事迹見三人舉止不俗引與共語言及豫章有人崛起草澤以故宋為號攻下建昌撫州南安各郡縣復赴各地招安歸附甚衆其志不小范國昌訝曰閣下知其人否答曰此人行徑有高世之見下撫州時並非征戰乃遣一士前往勸説太守遂傾心納降雖未識其人然其器重可概見矣國昌等聞之一驚急叩姓名答曰不知因問閣下何人則曰太倉卜人劉知幾也一時萍水契合談論移時共剖心腹共圖歸向豫章當晚同宿舟中翌日登岸遂達房縣且説房縣本太宗貶秦王光美為涪陵公時安置之所秦王鬱郁疾卒房人憐之立涪陵祠春秋拜禱不時祭奠元世祖佞佛祟尚西僧凡學宮猶改為佛寺何況此祠此時涪陵祠已改為菩提寺遂有群髡住持其中皆不守清規的賊禿專一奔走大家認乾親結識些護法尊神曲為阿庇菩提寺中規模閎肆又曲加修飾羅列古玩珍畫名花異草群髡則遍體吳綾越錦冰綃霧縠莊嚴比邱居然風流子弟梵宮精舍即是楚館秦樓逐日興賽龍華浴佛無遮等會煽動鄉愚又命紅顔少婦青春女子濃妝淡抹拈香禮拜豈但徒飽群饞之眼亦且纍抱不白之冤一日范國昌等行經寺外聞寺內隱隱哭聲數人諦聽乃女子呼救聲音知有蹊蹺欲待入寺卻又不敢造次白映雪心內鶻突憤焰中燒暗想若是昔日作令饒平時一紙文書足以了此公案今以孱弱書生欲進不能欲退不可為之奈何范國昌曰汝休性急尚有近鄰可以探察説畢白映雪劉知幾分頭而去少時二人汗流滿面而回皆言附近居民呼之不應招之不來真是異事范國昌又自去告訴一會亦置若罔聞大驚曰蒙古風俗固如是乎四人正在為難司馬肅曰饞猿遇果餓犬聞腥吞下喉嚨容有吐出之理若稍緩時刻則燒琴煮鶴矣説罷挺身直入衆人亦然其言剛欲入寺恰有扈德威韓搏虎二人由襄陽棄官而來迎面相遇德威一眼認定白映雪在內大呼表弟何來白映雪如聞霹靂一聲睡夢驚覺三人也不管是張是李是軍是民一見二公氣概不凡急將寺內如此恁般逐一告訴扈韓二公一聞大怒也不暇款曲邁步飛奔人寺衆人放膽從之尋至哭聲所在重門緊閉扈德威一腳踢開更在內面打關而入見二女子蓬頭散髮哭倒在地旁有少年二僧各守護一個見來勢凶猛慌忙踱出往外欲逃剛剛到門與白映雪撞個滿懷一手撈住韓搏虎亦擒著一個拔劍欲砍范國昌急止之日且住問他的確再斬不遲二女子起身即謝口稱後面還有數僧各擁民婦日夜在內宣淫扈德威即往後搜去果見美婦數人藏在復室僧已知風逃遁數婦各言被騙至此月餘離家甚遠一毫資訊不通未能回歸腆顔人世遺恨罔極問用何騙法衆婦皆言來酬心願或燃指頭香或還血盆素致將我等數人禁錮在此范國昌曰此非僧騙汝乃汝自入騙耳問何處人氏有言寶康有言鄖縣皆遠數百里者范國昌歎曰賊禿罪不容死矣惟先所救二女子抵死不從尚未污染問其裏居即寺近二十裏湘鄉樊進士之女也從早進香來此致人彀中諸人為之浩歎者三恰好樊家僕役已至見二女模樣情知有變返身飛報湘鄉不一會樊進士飛馬而來寺近居民漸來探望一時傳遍鄉里來者益衆被國昌大加呵斥衆皆滿面羞慚僉曰當今崇尚釋門西僧權重寺近鄉紳富戶皆托親寄子我等於螳臂之力豈足以當車轍耶諸人點頭道是益怒僧衆國昌又責樊進士曰身列儒林名登黃甲如何不整飭風俗儀型鄉黨一昧依樣葫蘆倘一行作吏安能振衰扶頽為強項令耶樊進士此時赧顔無地不敢分説急令家人領二女回歸再將衆婦寄居近鄰等處然後同至方丈坐定逐一起居問訊始知韓扈二人即兩湖專閫慌忙肉袒謝罪諸人止之韓搏虎曰此寺本名涪陵祠改奉金仙幾何年矣樊進土曰由至元十三年改建今十五年矣寺僧以城狐社鼠為姦鄉民非不稔知奈投鼠忌器隱忍至今范國昌曰此僧作何發付衆言惟命是聽劉知幾曰不如鳴官且脫爾我干系扈德威韓搏虎齊聲曰不如某等自行處治猶為痛快德威拔劍而起範國昌又止之曰毋爾一劍太輕且汙將軍劍耳我有一法取洪鐘一口將二僧罩定外面多積柴薪縱火焚之務令坐化還彼三味本原衆人大喜樊進士即令居民如法布置二僧此時魂飛天外平日不耕而食不織而衣猶在溫柔鄉無窮受用豈料一旦竟得此報樊進士恨入骨髓命將二僧安放鍾內居民無不切齒爭來舉火一時焰漲迷空火勢正猛忽一聲響亮洪鐘已化二僧遂為煨燼樊進士一時為衆所激厲仍將菩提寺匾額改為涪陵祠范國昌等贊曰此義舉也樊公可謂失之東隅收之桑榆矣韓搏虎按劍厲聲曰此寺本秦王神祠今復仍舊秦王遺愛禋祀不替必能造主一方令汝等年豐歲稔人安物阜也衆皆大喜樊進士又增置祀田修葺殿寢命父老中廉幹者直董其役並請諸賢士或作記一篇或題詩一律刻石祠中以紀其事白映雪奮腕直書一首雲膽識真如百煉精房州遺愛有杯羹能將既倒狂瀾挽且喜中流砥柱擎老父稱觴仍薦酒兒童化紙更陳牲從此名鐫金石上瓣香祈禱總關情范國昌等觀之謂只此一詩足紀其事矣樊進士命刊之石亡末書至元二十八年秀水白映雪題樊進土一片熱心欲款留衆人至家略修地主之儀衆皆堅拒不從宿於祠中樊進士亦偕父老數人在祠陪候衆人忙了鎮日當夜始得互通款曲風雨對床促膝談心范國昌等不知羅浮之事扈德威等不知豫章之事略陳顛末俱各驚異惟礙著樊進士數人在內難剖心腹含糊稱説樊進士與衆父老等早喻其意齊聲曰賢士等不必隱諱我等望故宋復興非一日矣賢士等若匡扶大義豈惟故宋之幸抑亦生民之幸也衆大喜樊進士又剪燭開樽衆父老亦舉觴獻芹江鄉風味浮白暢飲衆人高談闊論父老甚是敬服樊進士曰愚有一子名東樓頗不愚昧從學有年賢士等異日大張義舉當令奉教左右范國昌大喜曰來日可令一見樊進士許之衆人飲罷方欲就寢忽一聲喊起一派火光照見有數僧率領許多強人各執刀棍闖關直人國昌知是寺僧逃去勾引匪類來復仇者衆人亦不少避呐喊助威韓搏虎早已跳出天井隨拔燈杆約長二丈有餘手中試試恰趁使用候衆人略近劈空橫面打去霎時倒翻數人在地扈德威直趕上前拿獲二僧更不容情拔劍剁下禿頭忽旁立一僧手起槍落德威雖用劍撥開已傷了虎口登時血出德威大怒飛劍擲去僧應手而倒奪槍在手就此交鋒對壘殺將起來衆賊不敢近前竟被二人截住內中有賊大呼曰我等乃雲夢賈大王麾下特來縱火焚寺韓搏虎厲聲曰既是雲夢賊可認得應城七敗賈翀之韓搏虎否衆皆股栗扈德威亦大喝曰吾乃襄陽扈都督也賈羽辛首級尚在囊中汝等能識之否賊衆魂膽俱無拜伏於地尚有五僧在內擒出獻上泣告曰小人等實奉白文狻之命剽掠近縣今日遇此賊禿騙我等雲寺中殷富且請復仇早知扈韓二都督在此小人雖死不敢正覷德威笑謂衆僧曰汝自不守法戒惡貫已盈又引賊焚寺罪不容誅姑貸汝螻蟻生命歸語賈翀早晚洗頸以待賊衆喏喏連聲而去樊進士曰非二公先聲奪人強弩之末幾不能穿魯縞矣司馬肅曰此非懾之于一時乃畏之於平日也諸賢你誇我贊忽不見衆父老驚異久之聞復室中寒宰有聲忙舉火燭之見衆父老縮做一處三十六齒盡吃磴磴相打渾身猶發抖不止樊進士大呼曰賊去矣驚疑猶半晌始定時入夜已深衆人方寢當晚范國昌伏枕剛欲睡去忽有人啓之曰秦王候君久矣君宜速行遂披衣而起行至殿上見侍衛甚肅皆持彩幢鋒節羽葆花扇中坐一少年王者冠通天冠衣雲錦裳躡朱雲履玉瑉環珂光彩射人見國昌至起立迎迓范國昌急問左右曰是秦王否左右曰然國昌趨前禮畢秦王謝曰蒙君惠顧光復梓裏然尚有簡命往見藝祖隨即下階登輿而前國昌隨後不數裏至一所在但見瓊樓玉宇碧瓦參差朱牌金字題曰無佞府剛欲入見先有一人等候近視之乃獨松關相遇之嶽燕超也二人不敢少停一同整肅而入惟見雲氣繽紛天花飛舞殿上冕旒玉帶巍然高坐者果太祖也二人上前拜舞已畢俯伏金階太祖命賜平身隨有內官執瑪瑙之壺捧琉璃之盞薦龍肝之果傾鳳髓之茶皆世所罕見茶罷太祖宣言曰傳卿二人別無他意朕弟龍行虎步為太平天子昭憲遺命竟以中令一言秦王致遭貶死徒抱不白賴卿二人光復故物宏我國家以匡不逮二人叩首謝命既而曰建閫固圉開府從龍三五播遷六六一統二人一時理會不出正在遲疑方欲叩問太祖又曰國昌守先憂後樂之志燕超盡智信仁勇嚴遺策二卿之能事畢矣何必再問命秦王送之出秦王至府門亦囑曰重建越王台玉關不肯開燕京承暗統南去復南來秦王送至門外而別國昌私問燕超曰公何時來此燕超曰某來此四十五日矣國昌愕然曰何久也燕超蹙額曰尚嫌其速何為久也國昌方欲再問忽鄰雞三唱猛然驚覺乃是一夢不一會東方發白臨晨起身亦祕不敢泄暗想燕超此日未知何處當再質之回視祠中分外生色心中竊喜少時樊進士之子樊東樓一至逐一禮畢視其人年雖弱冠豐度奇異亦英物也樊進土曰孺子理合隨侍左右奈學猶未成不敢造次衆人慰勉備至彼此款洽非止一日始起身辭謝樊進士依依不捨遠遠送別此時一行凡有六人扈德威議曰廣南豫章吾誰適從嚴范國昌曰豫章廣南俱不必往我等且由茶陵州出上梧嶺至閩廣交會處探兩軍資訊再定行止乃為萬全衆大喜望長沙而去
