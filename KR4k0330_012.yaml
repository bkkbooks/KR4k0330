body:
  text: 第十二回走占城涪陵返國當時日本大將越乞紇幹統接應兵至扶桑猶見波濤洶湧無不駭異沙吒魯令將二十餘座轟天雷安布赤金崖前永鎮此島扼守要害班師回國白石瀨默淵澥底鼇聞師凱旋一齊回兵國人鼓舞稱慶皆曰趙宋王之賜也國王更喜不自勝飲至策勳大宴群臣尊涪陵首座國王舉觴上壽次及文武涪陵接莊在手轉涕泗橫流喟然歎曰可憐蒙古十余萬生靈一旦淹沒中心慘怛上國酌酒相慶趙某焉能入唇國王曰不然蒙古自遭譴責於爾我無與趙王憐念及此異日定仁慈之主也涪陵遜謝終是不説因以為將好殺戒諸武將國王感動亦泫然淚下大夫紇搭進曰趙王德音諸公自當銘心鏤骨然趙王在下國纍施覆載更生有慶又多設良模遺我成法使下國風氣變易豈可無以報德趙王異日登極下國不辭萬里自當歲歲入貢不休也涪陵亦謝勉強盡歡而罷數日後辭別國王欲往占城國王大驚聲淚俱下曰下國若非趙王焉有目前景象所遺成法永久世守然趙王回國如龍躍天衢振翼雲漢亦大慶幸事未敢強留願得早正乾坤永定正朔海外與有榮施命文武整備海艦送往占城略酬萬一涪陵固辭不許次日國王率同文武離城百余裏祖餞海岸送者如雲文臣武將無不下淚各部號吼如雷默淵澥底鼇二將感救死之恩定要送往占城涪陵不許二將便欲拔劍自刎涪陵驚泣許之與國王再三珍重而別二將登舟拽滿風帆望南漂去國王及衆文武方始回國卻説占城國有轄土曰金城堡地廣人稠路扼沖要前臨紫泥島左拒交趾右達暹羅其地東方朔所謂紫泥海也堡中番漢雜處又當沖要交廣通商宋末避難者往往居此時有棗陽人孟來酚者以襄陽被圍時隨其父摯家避兵至此父名琪理宗時官防禦使孟宗政侄也遷金城堡數年遂卒一母一妹僑居海外母氏向賢而有遠識父子避亂占城皆母氏意也妹名麗蓉亦美而有才修潔間雅舉止雍穆慨然有丈夫志每言渠為男子定當為炎宋復仇繼伯父之業伯父者宗政之子珙為宜撫鎮江陵大興屯田者也來翂曰不然凡女子多言能為男子事即為男子又恐鬚眉而巾幗矣所謂大言欺人也麗蓉笑曰弟能量姊乎姊終為常人婦則已矣然姊終不為常人婦二人反唇相譏其母怒止之來翂年近弱冠豪俠有膽力亦慕其叔祖宗政之為人讀其書想其行事有擊碎唾壺之風然母氏方嚴有法不敢犯一日遇樂兄弟由暹羅而至恰遇來翂具陳桑梓來翂奇之款至家中二馬升堂拜母誓訂骨肉之交二馬年俱稍長來翂以兄事之遇樂備言在暹羅國失散小主涪陵之故來翂驚喜曰炎宋尚有人耶占城不聞禁錮搜拿之命逃在占城或未可知弟兄當共往物色訪歸故土次日辭別其母三人攜手而去卻説金城堡有一人姓銚名宏虎而冠者也相識俱狐狗之屬若鮑士韜佟泰費儋鮮於典等皆是堡中每每以強淩弱鯨吞虎視夷民敢怒而不敢言而銚宏尤有勢力諸人皆諂附之豪霸金城罔不懾息堡內有令狐威者亦宋人避難者也年逾五旬一子名韜尚幼膝前惟二女承顔以供朝夕長瓊英次瓊華俱明眸皓齒有天姿國色令狐威閨訓維謹二女亦嫻懿則養親撫弟殷勤備至忽一日酋豪銚宏經過二女未及避躲銚宏一見魂爽飛越喜出望外自此每遇令狐威便十分承順屈己款洽遂有求姻之意令狐威偉岸風骨並不假以辭色銚宏又浼鮑士韜費儋二人再三關説令狐威堅拒不允且曰某本宋人僑居貴國中原肅清即還故土此事萬難從命鮑費二人敗興而去銚宏又羞又惱暗思銚某在金城豈屈己下人者哉以禮相求者念女異地羈旅也受此奚落遂起不良之意鮑費二人又慫恿之宏意遂決一日正值令狐威出外未歸宏率多人排闔而人二女無所逃遁被衆人一擁圍住擒獲就走英華抵死不從狂呼不已幼弟韜年方十歲亦號泣呼救堡中人見是銚宏誰敢出頭喜得令狐韜孺子雖幼卻有急智大呼衆人休助桀為惡銚宏之死期至矣銚宏怒甚令狐韜曰適見空中有金甲神將傳言銚宏惡貫已盈命盡今日日中姚宏聽罷慌忙伏地望空乞命蓋夷人信鬼其性然也衆人被騙皆欲散走惟鮑士韜費儋二人擒定英華不放正在危急忽來二大漢官目昂嗥面貌猙獰三拳兩足竟將鮑費二人打倒又一小後生上前將英華護定欲行突時夷鬼散者復集足有百餘人團團圍定又有佟泰鮮於典手舞梢棒打來二漢子赤手奮勇抵住鮑費二人忽地起身將後生拿住方欲榜掠突來馬遇樂打開衆人一眼認定後生正是涪陵公趙晟心頭火起披靡直入來救涪陵孟來翂能識令狐二女隨與馬遇陽各負其一並幼子韜送往孟家去了二漢子大吼一聲各奪器械丟開架子銚宏等俱受重傷抱頭亂竄脅從者皆一溜煙逃走涪陵見了馬氏兄弟不勝之喜二大漢即日本國之默淵湃底鼇也送涪陵由金城起舵上岸相遇數人正欲敘舊忽見令狐威飛奔而來哭拜在地深謝救援之恩馬遇樂曰此位即故宋之趙涪陵公也令狐威慌忙再拜稽首涪陵扶起孟來翂一齊邀至家中二將不知就裏涪陵一一説知來翂喜甚重相敘禮自是置酒高會各言別後之情次日二將辭歸日本涪陵依依不捨厚贈之不受令狐威亦十分感戴與衆人齊送至海岸而別涪陵逐日與馬遇樂等各處遊覽見占城風氣景物又與諸國懸殊令狐威領二女歸家後涪陵遇樂屢過其門叩以家世令狐威謝曰威從兄令狐概者曾知廣德軍威在理宗朝亦判台州因劾賈平章公田一表為似道罷歸避禍來此緘口不言國事者二十餘年矣言畢泣下涪陵亦泣曰國家不幸崖山殄滅豈盡天命抑亦人謀當年如公者能復幾人威遜謝自言其從兄概不忠於國明知廣德乃臨安右臂臨難苟免望敵而逃朝廷養士百年將何用哉令狐氏可謂無色矣馬遇樂代為扼腕一日涪陵遇樂招飲其家酒酣令狐威起曰威乞一言萬勿見拒威海外漂白苟延殘喘荊妻早逝所生弱息粗知女紅鄙陋在夷前日不逞之徒尚思魚肉此亦未了之事威欲屈殿下權執柯斧馬兄亦代令弟主盟況馬孟二英雄深勞救援未敢過望聊以報德遇樂起謝曰幼弟不嫻禮教恐負所托威曰老夫志意已決且弱息既蒙振拔此外萬無他適之理涪陵大喜極力贊成盡歡而散至孟家説知向夫人喜不自勝定聘納采不日成婚馬遇陽孟來翂二人遂聯姻婭馬孟共處一家涪陵主焉隱身堡中且常以信義感化夷民占人悅服蓋此堡離國中三百餘裏屬占城北境去交趾不遠交趾占城屬郡也交趾之民為占城役歲供租稅皆經堡中交趾極東則界廣南之欽廉二州矣交人至堡涪陵細訪廣南消息交人言廣南今有狄參政威望素著盜賊屏息討平巨寇甚得廣人之心海運已通道路不梗矣涪陵思歸與二馬至海近試試風色登舟方拽帆解纜忽颶風大起柁師慌忙下碇幾乎顛覆涪陵觸動一物隨手探懷誰知烏有涪陵一時嗒然若喪錯愕不知所出二馬驚問之則真臘國所得之定風珠也涪陵欷歔不已二馬曰寶珠即價未重連城何自傷若此涪陵曰失珠何足惜內有藏珠帕乃暹羅逃命時鮫人所贈物耳珍藏其帕者示不忘患難于安樂也遂上岸不樂而歸先是令孤氏二女在孟家避難麗容與瓊英瓊華相得有若骨肉向夫人亦愛若己出不日遂歸麗容母女猶眷戀不已至是成婚鸞鳳並巢馬遇陽亦寄其家三人仍復聚首英華兼通詞翰屬筆之下姊妹互相旗鼓工力悉敵字衛夫人爭寫坐位至精巧女紅乃其餘事麗容惟喜觀書史不恆以筆墨見長然屬思每一脫稿英華俱拜下風以是益敬之麗容每規英華曰凡女子宜觀女誡女史並烈女傳等書以貞德性至吟風弄月乃不過消遣逸興耳所重者不在此而在彼也英華佩其言奉如傅焉一日三人偶經門首麗容拾得一物啓視之內一珠大如雞卵狀有鱗竅黑色而有光灼灼可鑒視其帕似羅非羅似縠非縠柔軟若無物三人大異之麗容置帕水中水各分裂訝曰鮫綃也物若非出水中豈有毫不沾濡之理量此珠亦是珍産遂什襲藏之後聞涪陵失珠瓊英與遇陽言其故遇陽喜曰殿下鏡臺之兆其在此乎瓊英曰向夫人久含此意未便發泄當與吾父商之遇陽然其言告令狐威威笑曰此奇緣也遂力肩其事請之涪陵涪陵初不之許既而曰珠帕所關即我夙緣乎鮫人一物更為我作之合耶但海外淹滯身無長物即以鮫綃之帕為質定風珠尚當還我以便浮海歸國待有建樹乃訂星期某若碌碌終身不復問此帕也令狐威説知盂家則瓊英已備顛末為之先容矣向夫人聞涪陵已允大喜過望且聞欲歸大開華宴祖餞回其定風珠並以禮物副之遇陽與瓊英伉儷雖篤未便同歸令狐威亦年邁子幼門無應僮不免冷落遂移近孟家別室而居遇樂遇陽始謝來翂約以異日努力功業離了金城護定涪陵望國而歸
