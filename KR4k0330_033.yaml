body:
  text: 第三十三回翔龍府風雲會合元世祖至元二十五年三月廣南經略使孫靜奏羅浮兵起攻陷惠州潮州狄定國三次出師無功叛附羅浮肇慶知府苗秀實亦以所轄郡縣叛降羅浮兵勢大振陛下作速命將出征云云世祖驚問完澤曰前脫脫亦稱江西有故宋兵陷沒建昌撫州並閩中邵武路等處直省奏至俱被桑哥遏不以聞倘兩處會合則勢難攻矣完澤不忽木齊稱陛下所見甚明有張宏范之子張景略現為都督僉事鎮居庸關將家子也命帥師往征恢復廣南等處責福建參政魏天祐復邵武路江西平章脫脫復吉安兩京鎮將俱受景略節制當有奇效世祖允奏即命張景略率兵十萬分道並進張景略得旨離了居庸調集各路將佐如宣府總兵曹伯雄青州總制鄢知節古北口總兵劉巨原上都路護軍馬如龍大同總兵丁不拔及隨營將佐魏文通劉耀李梁王豹牟衍昌鈕師成等各引本部分五路進發大同總兵丁不拔自負才勇請為先鋒景略許之且戒之曰前去由大名過徐淮濠梁直濟洞庭出長沙以攻肇慶搗其右江西閩中更有兵至以搗其左我師從此攻入彼左右受敵救應不暇矣全師起行方過河澗忽報有監軍至景略延入則兵部左侍郎赤老溫奉旨來監其軍稱元主諭令景略以大軍倍道而進駐定廣州先固根本然後進攻各處景略受命訖見設監軍知是世祖心疑有鑒前日狄定國之事意甚不懌赤老溫見了景略又傲睨不禮景略途次竟不與接談赤老溫銜之景略遂由南雄抵韶州至英德縣忽前軍報來廣州已失景略大驚兼程而進過清遠將渡胥江見有大隊軍馬阻住隔岸旗上大書宋字望見元師營腳移動徐徐而退諸將爭欲前進景略曰不可此兵未戰而退詐也將營扎定令人哨探四下並無埋伏知是疑兵之計遂命曹伯雄鄢知節劉臣原馬如龍丁不拔五將下成五寨第一廣武第二陽武第三德武第四涉武第五修武五寨俱依山傍水列成五虎靠山之勢甚有機變惟監軍赤老溫撥兵五千與之另下一寨於五寨之後名曰救應而實遠之不喜其人也次日景略隨帶裨將數人欲探宋兵消息暗思此去廣州僅一百七十裏遂由僻路前進沿途隘口盤詰綦密乃易作商賈服狀行近番禺遠遠望當道下三大寨旌旗鮮明鹿角密布喚土人問之則中寨乃元帥嶽燕超左故宋王右羅浮兵也由閩中過廣南一路號令嚴明秋毫無犯人心悅服合羅浮之師沿途望風而降三戰而達廣州宣慰文炳參政朵爾思都督耿仲烈等力不能支城陷而死一時城中文武死者數十人餘者盡降距元兵之來已十七日矣景略問有多少人馬土人曰合羅浮閩中兩處之兵不下五萬餘衆景略易之遂別土人而歸回營令人直下戰書嚴兵以待宋營批允次日即有寇復雷張懷亮二將列成陳勢叩營討戰前哨廣武營丁不拔奮勇爭先合兵鏖戰良久宋師少卻修武營曹伯雄涉武營鄢知節率兵助陳宋師大潰丁不拔麾動大隊欲追景略鳴金收兵丁不拔入帳問以鳴金之故景略曰欺敵者必敗宋師嚴整雖敗成陳未可追也丁不拔歎息而退諸將又欲移營前進景略不許諸將退謂衆人曰將門有將乃怯敵至此乎數日後寇復雷張懷亮又來索戰有陽武營馬如龍德武營劉巨原兩翼齊出寇復雷二人督兵略戰又敗馬劉二將大驅人馬從後掩殺不數裏伏兵齊出焦芳傅突雙馬迎敵二將死戰不已卻得張景略自引一支生力軍策應殺來救出二將忽宇文廣馬遇樂一軍掩至大殺一陳景略護定人馬且戰且走方始回營怒責二將輕敵幾誤大事二將唯唯謝罪景略命人打探江右閩中兩處可曾動兵須三路合攻以牽制其心或可獲勝誰知閩中杉關有韓靖夏把守高耀卿又護衛邵武接應杉關魏天祐將才非所長見各路堅不可攻引兵而退江西建昌吉安等處亦有狄定國節制隘口命將控據要害處處下連珠寨直接桂嶺三關遙為之勢雖脫平章才不亞于定國而宋將一味持重堅守脫脫不能久待全師引還景略聞二處不能進兵遂揚言欲奪肇慶並打惠州用聲東擊西之法震懾人心使分兵應敵思乘其敝燕超聞之請涪陵移軍城中有種世龍關普靈保護城池自統大軍親臨胥江並不分兵往護二郡燕超一見元軍五寨暗笑曰張宏範之子亦有學識彼以奇吾以耦遂命寇復雷張懷亮馬遇樂楊孝伯宇文廣王建忠六將以六隊精兵各按五色旗幟五色衣甲列成六甲神將敵之次日景略誓師已畢兩軍大戰于胥江之浦元左師先潰寇復雷遂斬德武營大將劉巨原元兵奪氣五營不能相應右師敗績宋軍六隊並進奪獲衣甲器械鞍馬無算元兵遂遁正奔走間忽見戈戟森森一隊兵掩至皆宋字旗號景略見其兵少麾衆圍之誰意兵不在多而在精內有二將分頭殺來萬衆辟易燕超大陰趕上前後攻殺死者近萬直奔至韶州夢覺關而止此兵非他乃扈德威韓搏虎范國昌司馬肅白映雪劉知幾也德威等在茶陵聞廣南已定特來會合燕超一見范國昌等至大喜過望舉手加額曰宋室有幸矣范國昌司馬肅齊曰不想獨松關一別會合卻在今日相與攜手回營與衆將一一禮畢燕超詢及扈韓映雪諸人顛末大加稱賞設宴款待意甚愜洽次日退營至五十裏扎定燕超率范國昌等入城引見涪陵涪陵降階而迎以賓禮接見范國昌等不許涪陵曰小子既未造廬又失擁篲理合長跽請教以匡不逮豈敢倨傲鮮腆以見長者推遜再三國昌等始行庭謁之禮起居畢涪陵一一慰問燕超始代諸賢各剖哀曲互陳前事涪陵即向范國昌司馬肅稱謝曰久慕芳名延訪未遂今日賁臨實慰渴想至白賢士扈韓二將軍俱蒙棄官相投必能光復我家故物然某昔在太湖若無劉先生又焉有今日也諸人皆曰臣等葑菲之質樗櫟之才得蒙收録已屬望外敢不竭盡愚衷以陳一得之愚報崖山之仇乎涪陵狂喜置酒稱慶一時觥籌交錯歡呼暢飲酒半涪陵正襟而談曰諸君不忘故國如此趙氏不朽矣但撥亂反正恢復中興必有高世之才而後可不然恐折足覆餗徒以博天下後世人口實而無以副諸君之望也司馬肅曰天生斯民必有司牧崖山一役趙氏幾無孑遺獨殿下于千島萬嶼間崛起稱雄何愁不濟扈德威曰當此瘡民蝗國盜賊橫行有能拯其危者莫不欲率土歸之矧殿下以帝室之胄靖難為心乎劉知幾曰舉大事者必先定國本以安人心殿下體人心以復故國目下義旗所指無不回應此人心也亦大勢也韓搏虎曰漢南一帶已被賈羽辛等騷擾不堪民之望救如飢者之望食寒者之望衣也元人出師屢戰不勝安定偉績此皆有待于殿下殿下豈無意乎白映雪曰壽春漢陽兩盜自應殿下除之以蘇民困而系天下之望至定國之計建國之謨尚當徐議所謂求治勿太急也嶽燕超亦曰白子丹之言是也范國昌獨曰殿下所處與漢唐諸君不同漢唐之世不過暴君禦宇權姦竊命女主僭位異姓瀆宗而已未以夷亂華也非有深仁厚澤不足得民心非有大功偉績不足動天下所以百戰而後定至殿下所處則不然韃靼以烏桓猋集之師殲我中夏值國運日蹙之際劫而奪之力口以剽悍暴戾狡獪殘賊滅天毀聖伐掘陵寢斥儒重佛狂惇已極又磔屠生靈所過蹂躪雖虎豹豺狼未若此之甚也而説者乃以天命歸之即言天命亦且彗星疊見太白經天妖氣災象地震山崩古今來中國有如此天子乎當此生民塗炭殿下以帝室之裔仁以禁暴義以除賊文以安民武以靖亂天戈一指則荊揚吳越之區行見簞食壺漿以迎王師矣請殿下勿疑涪陵大喜曰聞先生言不佞頓開茅塞吾與蒙古誓不兩立望諸君勿吝賜教則不佞幸甚種世龍關普靈推箸而起曰光武白水起義僅一旅之師某與公等努力同心何愁大事不成涪陵謂衆曰今日文武雲集會合不偶此城昔在祥興時名翔龍府今日仍復舊名以志風雲會合衆人皆曰事非偶然殿下所見甚明涪陵再命大設筵席會集文武盡歡而罷
