body:
  text: 第四十二回梅參政淮南召兵元世祖至元二十七年庚寅各路地大震武平尤甚壓死官民等七千餘衆壞倉庫局四百餘間民居不可勝數江陰寧國等處大水百姓轉徙流離者四十五萬餘戶時世祖年七十有六春秋既高內有弘吉刺皇后專政外有諸王駙馬並阿合馬塔即古阿散等表裏為姦尚書省與征理司鈎考百司倉庫錢谷無非貪叨邀利之人騷擾各處民不聊生盜賊縱橫有行台侍禦吏程文海入奏帝不省兵部尚書董文用與平章不忽木二人齊奏曰江南守將耶律淵石中孚與賊連戰皆捷壽陽鋭氣沮喪今石中孚年老病卒僅耶律淵一人應接不暇恐賊勢復熾陛下曷不委將協征壽陽平定江南在此一舉機會不可失也世祖允奏隨有議郎程鵬飛進曰左都督梅殷從太傅伯顔出征最久曆練知兵可當此任世祖從之詔以梅殷兼行省參政協同耶律淵征壽陽觴之便殿文武送至薊門郵亭梅殷舉手謝衆曰殷若滅賊則回軍有期不然則朝天無日文武為之動容梅殷奉旨自望安豐路而去且説淮王秦錫帛自失寧國等處與賈智深議曰聯盟漢陽結為唇齒竟不足恃方今惟廣南兵最強號令嚴明所向無敵莫若姑示順從借為聲援以觀其變遂遣莫綏猷奉書幣納降願為內附且以次子秦梓為質莫綏猷直達翔龍府稟見涪陵王參拜已畢將書幣呈上並達淮王之意有韓昭馬遇樂皇甫惇三臣欲納其降涪陵王本不悅秦錫帛因不欲卻其來意婉言謝曰廣南壽春間關阻隔江右微近僅堪自守上國士馬精強何慮元師況古者慮人不從則為盟誓盟誓變而為交質皆由未能相信故也苟忠信以將之便當推心置腹誠實相與如青天白日何自懷疑義而用質子為哉乃厚贈莫綏猷以溫語遣之恰值梅參政協征淮南之信亦到壽陽秦錫帛益急又遣使以犀角帶象牙梳珊瑚枕龍鳳鏡四寶來獻且請江右等處遙為聲援涪陵王笑曰地土且不受何有於珍玩孤正有事于四方所需者文武才略所用者穀粟布帛他非所好悉卻之使者不敢停留離了廣南急回壽春路經臨淮遇穎川豪士劉漢傑見使者押扛禮物光芒外射知是異寶驚訝不已又見上有淮王旗號大喜曰此人口饅首也一聲呼哨莊客家奴數十人打散舁夫一擁奪去使者星夜逃回壽春稟知淮王曰故宋不受禮物亦不肯聲援禮物押回行至臨淮被強人奪去特來請死秦錫帛只急得雙目直瞪咆哮大怒曰孤不惜重寶求援與國何不沿途小心有辱使命立將使者斬之喚過邢士龍命率三百輕騎奪回重寶拿獲強人不得有違賈智深急諫曰不可臨淮穎州乃系元人地土焉可去兵此寶已失量難奪回大王且速議禦敵之策若復鳳陽數寶自有下落秦錫帛恚曰珊瑚枕犀角帶俱海外異産價值千金不足為奇龍鳳鏡乃先太師未第時與同窗數友偶遊石鏡山遇一異人見先太師驚問曰此長腳者何人也衆告以姓名異人愀然曰此人他日貴顯無比但不克令終耳先太師拜懇以保全之術異人因出古鏡一枚曰此石鏡後身也有此一鏡可保首領矣先太師拜謝而歸見此鏡無甚奇處惟鏡背有龍風交互之文故呼曰龍鳳鏡鏡面亦模糊不甚光華但不時張望屢有警報靖康中從二帝入金見鏡中諸臣文武皆被囚而先太師獨不然後果得還國紹興二十年正月朔旦將入朝忽鏡中見一小校執利刃甚怒及入朝果遇施全行刺不中被獲家世珍藏洵稀世之寶也今故宋幸災樂禍求援不與顯然欲我鷸蚌相爭彼坐受漁人之利也孤意欲分兵伐宋以圖江右等處一面抵敵元帥何如賈智深連聲曰不可不可勞師襲遠萬難成功是又生一秦矣目下惟先發制人趁元兵未到令耿星星仍由吳興襲南陵張師旦由宿州襲臨淮邢土龍由廣德襲六安州三路並進亦牽制之一策也秦錫帛從之下令去訖惟張師旦襲臨淮一支人馬正遇耶律淵引大隊抵住去路張師旦暗思江南惟一耶律淵知兵若不除之終為壽陽之患張師旦遂整飭人馬直與接戰耶律淵橫刀勒馬而出張師旦遂與交鋒不數合大敗而走耶律淵按兵不追張師旦休兵復戰終不能勝接戰數日連戰皆北耶律淵頗易之兵屯臨淮縣高唐館之南是夜恍惚若老將石中孚進營約與入朝方欲問此間託付何人石中孚不答忽然驚覺乃是一夢甚異之次日聞左都督梅殷奉旨來征壽陽又報賊將張師旦搦戰耶律淵大怒曰誓當掃除妖魔陛見元主方顯將略舞刀躍馬而出馬忽失前蹄將耶律淵掀跌在地衆家將慌忙扶起齊諫曰今日將軍出馬恐有不吉不如休兵數日候梅參政到一同破敵何如耶律淵叱曰我往彼亡何不吉之有大將臨陳鑿凶門而出寧問禍福耶家將不敢再言耶律淵一股鋭氣按納不下恨不一刀一馬踏盡賊兵張師旦望陳先逃耶律淵追過漁台濠梁左右蘆葦成林時秋風驟起滿目荒涼不覺心動問家將曰此非戰國時莊子休觀魚處乎家將曰然言未畢獲港蒲叢中伏兵四起大呼曰休放走了耶律淵耶律淵頓足歎曰吾一時輕敵中賊計矣賊兵萬弩齊發張師旦抄在後面阻住歸路可惜大元名將竟為張師旦所算射死於觀魚台下張師旦撥回人馬破了臨淮不分星夜仍舊復了鳳陽報捷壽春秦錫帛大喜遂命三子秦楠領兵同守鳳陽張師旦進爵有差不日又報耿星星襲破南陵邢士龍亦占了六安州安豐路大震日漸強盛兵勢復張及梅殷到日各路失陷已三日矣梅殷聞報大驚忙令三軍與耶律淵發喪表奏元主為之請蔭駐兵合肥調集各路將佐大閲士卒不上萬人訝曰行伍全然不整焉能破敵下令一面召募一面徵調再議征進不遲且説穎川劉漢傑年逾四十尚無子息因至欒城妻舅韓氏家回歸路遇淮使奪得貢物急舁回白鹿莊啓櫝一觀見犀角帶象牙梳珊瑚枕皆稀世異寶不勝驚喜又一古鏡斑駁陸離不甚光華暗思此系貢物必有異用就床前懸之是日重賞莊客大犒家奴自與妻韓氏亦就中庭設宴慶賀韓氏曰我家世居白鹿莊縱遇凶歲不受飢寒焉知非前人余慶但已過壯年尚無子嗣未免形影相吊耳漢傑曰古人雲無官一身輕有子萬事足惟此最為難耳但劉氏世多修積不應絶嗣若獲早歲抱子慰我屬望庶得桑榆晚景之靠韓氏曰前者妾曾於蓮花院彌勒佛座下布施金錢二十萬祈福求嗣近來腹痛隱隱早晚間若得分娩實叨神貺漢傑曰若得劉門有後誓當皈依佛前朝夕禮拜以答神庥夫婦飲至更深而罷是夜星光朗耀香氣襲人韓氏果然分娩竟舉一雄面目崢嶸日角有光試啼聲英物也劉漢傑大喜急向神前叩禱拜謝次日即命僕從輦錢至蓮花院酬還神願畢回歸路遇故人趙豹薛超問何往二人皆言往合肥投軍效用漢傑正喜得子挽留至家當軒酌酒十分款待二人亦舉手稱慶暢飲大醉劉漢傑乘興言曰賢弟輩欲投軍自效固屬有志勤王但當今勢變難料盜賊縱橫朝廷多不之理況四帥雖死五姦猶存騷擾天下激厲英雄多從草澤中崛起賢弟既到合肥當見機而行慎勿拘執趙豹薛超齊聲曰某二人不過借此機會一觀朝廷氣運何如耳安得如仁兄脫然事外東山高臥哉漢傑曰非愚兄偷間自樂見大元機局已約略可知矣但賢弟輩皆有用之才入軍投效自當選拔三人促膝談心至次日珍重而別趙豹薛超行至中途又遇泰州楊進婁縣徐有芳海門魏鏞皆往投軍五人同至廬州合肥縣直渡巢湖聞梅參政兵屯藏舟浦凡投軍者皆先入亞父館注名申送營中考驗收用趙豹薛超等注名已畢見懸挂榜文雲安豐路行省參政兼統制兵馬招討使左都督梅為召募事宜曉諭軍民人等知悉所有各件才藝臚列於後其一熟諳兵法深明韜略可為元戎者其二驍勇過人斬將搴旗可為先鋒者其三武藝出衆才堪驅使可為散騎者其四諳曉天文善占風候可為策劃者其五素知地理深通險易可為向導者其六心術公平為人正直可掌紀録者其七機變精明動能料事可與議軍情者其八語言便捷足能動人可以為説客者其九精通演算法毫釐不差可以掌書記者其十多讀詩書以備顧問可為博士者其十一素明醫學神聖工巧可為國手者其十二善能馳驟探聽機密可為細作者其十三掌管錢糧出入有經可以給軍餉者以上十三件中凡有曉一件者即赴亞父館注名申送幕府聽候考驗果稱其實立即重用不拘資格盡心王事務圖報效懋著功績不次超擢封候相悉在此舉敬茲告示曉諭通知至元二十七年月日押五人看了榜文投入幕府梅參政委牙將驗過皆録入裨將以次擢用旬日梅參政又召集軍士萬人不時檢閲操練精熟乃發令箭三支一調京口都督彭悅進廣德州一調徐州鈐轄戚磷赴六安州一調松江統制裴金仙取寧國自領大軍直搗鳳陽由和州而進
