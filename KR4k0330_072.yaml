body:
  text: 第七十二回摩天嶺三將隕命宋驃騎將軍焦芳被圍七星岩自刎所部軍士餓死者過半其餘逃下者俱為元兵所殺全隊陷沒都押牙斛律亢宗大軍被元將樊飛豹飛彪弟兄之兵扼險阻定二樊將焦芳誘入峪口焦如魚遊釜中坐以待斃聞宋將已死遂奮勇衝殺而來斛律統制恐橫州有失急引兵退入橫州始知焦芳全軍被陷斛律統制痛悼不已令人飛報長沙元將樊飛豹飛彪仍來攻城斛律統制大怒曰羯奴損我二將誓必擒之副將屈突申獻策曰敵將以棄城賺我損兵折將我亦以此計賺之統制與衆將出城誘敵某伏一軍于華清樓上俟敵將奪城而入某在樓上用千斤閘下之敵將縱不死也九分無氣則焦傅二將軍之仇可報矣斛律統制然之樊飛豹引兵攻城洪時錦一軍出城敵住不數合敗走飛豹方欲追趕吳廣一軍東出接應飛彪縱馬抵住飛豹恐飛彪戰吳廣不下跨馬夾攻吳廣敗走二樊急追王彥廖雲兩軍又至樊飛彪一見廖雲指曰敗將復來送死耶廖雲大怒四將戰無幾時斛律亢宗引大軍一湧突至二樊奮勇抵敵混戰一會王廖二將又拍馬落荒而走樊飛豹大呼曰衆軍不趁此時奪城橫州幾時恢復斛律統制故作驚慌之狀樊飛彪急引一軍躍馬先人剛至門下忽敵樓上踶踏一聲屈突申將千斤閘放下梆子響時亂箭如雨樊飛彪連人帶馬壓死于華清樓下軍士被亂箭射死者無數樊飛豹眼快急退幸免亦中數箭剛得出城斛律統制合四將之兵一齊殺回緊緊圍定元師口中聲聲只叫休走了樊飛豹飛豹畢竟英勇奮力衝殺潰圍出走保定敗殘人馬身帶重傷而去斛律統制始鳴金收軍入城撫定居民見此次雖得一州而損兵無數死大將二員得不償失遂重整人馬正欲進兵攻打南陵忽寇節度又撥牛竑張燕二將引兵三千前來助戰斛律統制接入甚喜置酒款待次日一同進兵直抵銅柱江下寨銅柱者漢伏波將軍馬援征蠻時標銅立柱也唐時馬絇為安南都護亦建二銅柱於故處又五代時晉馬希范平蠻亦建銅柱二公皆以為伏波之裔故今左右江各有其一至欽州蠻界銅柱上刻雲銅柱折交人滅故至今交人往來必纍碎石於下且説斛律統制兵至銅柱江早有元軍中四總管曹豹王淮周鳩範瓊四將引兵迎敵牛竑張燕挺槍掉斧縱馬交鋒鏖戰不已斛律統制急令屈突申洪時錦二將引一支生力兵由西北角殺出橫沖其軍首尾截作兩段而元兵經蒯參政練後頗有紀律四總管雖潰未能大創各鳴金收軍蒯參政見偏將軍樊飛豹敗回橫州已失又聞宋師大至怒責飛豹黜罷先鋒之職令守南寧自引大軍親來督戰斛律統制遂大振軍容一面迎敵一面命牛竑張燕領輕騎暗襲南寧越日元軍中曹豹王淮周鳩范瓊宋軍中王彥廖雲吳廣洪時錦大戰于銅柱江上蒯參政援桴擊鼓兩軍殊死戰鬥不一會宋師少卻蒯參政麾動大將旗正欲掩殺忽報偏將軍樊飛豹逃至著驚不小急令後軍改作前隊回兵徐退且救南寧宋軍望見元兵隊伍忽亂情知南寧有失一齊攻殺元軍大敗四總管兩副將忙保參政奔至在城下忽宋將牛竑引軍突出截殺一陳早有王淮中箭落馬蒯參政遂不敢入南寧急望上思州而走斛律統制見既得南寧亦不追趕屯兵城外自率一軍入城安民命廖雲鎮守三日後即統諸將進打思州元偏將軍樊飛豹兵阻鳳凰山縱馬迎敵屈突申一見樊飛豹咬牙切齒大罵射不死的酋奴樊飛豹更怒目圓睜聲言為弟復仇揮刀便砍屈突申亦捉矛就刺二將惡戰三十余合吳廣在門旗下覷定分明暗發一矢正中樊飛豹額角血流被面樊飛豹負痛刀法便亂被屈突申一矛刺死宋師奮勇大殺一陳元兵尸積如山餘兵逃去蒯參政暗驚宋師利害再令人調柳州都總管索虎通慶遠副將吳貫三兩軍速來助戰宋師既離思州不遠即命朱光鬥羊雷迎敵二將連戰皆敗蒯參政納悶營中相持數日未決遂引裨將數人出營暗窺宋師動靜觀玩一會回營謂衆將曰宋師雖鋭吾有以破之矣衆問其故參政曰行軍下營自有法度按八宮陰陽數置之營居陽卦之上則以九為法陰卦之上以六為法營門向陽以受陰氣不飲死水不處死地不居地柱不居地獄不居天龜龍首大將軍宜居九天之上如隨六甲所居則將軍居青龍旗鼓居蓬星士卒居明堂伏兵居太陰軍門居天門小將居地戶斬殺居天獄軍糧居天牢治罪居天庭軍器居華蓋所謂行軍營居天地也又宜具四獸列八卦之表測影以定子午之位如南有汙池為朱雀北有阜堆為元武東有叢林為青龍西有大道為白虎若夫朱雀無頂元武折足青龍悲哭白虎無銜刀皆不可居也強居之者軍覆皆死宋軍下營處正是龍首亦為地柱是死地也用重軍圍之絶其外援其軍必困困而擊之其破必矣遂調度諸將準備破敵先是宋營中斛律統制見元兵纍日不出遂移營逼之牛竑進曰此間有山崔嵬可瞰元軍虛實屯兵其上元軍若至可以下壓元軍其能當乎斛律統制曰不可地太孤高恐系絶地防敵人斷樵汲也張燕笑曰孫子不雲置之死地而後生置之亡地而後存乎而況行軍下營貴陽而賤陰好高而惡下既得地勢敵兵早屈於下風矣斛律統制終不以為然屈突申曰依末將主見吾軍分屯兩處一軍屯山頭一軍屯平地兩為接應犄角相援始為周密斛律統制從之即分兵五千令牛竑張燕屈突申三將屯于山椒乘高以瞰元軍為奇兵自統大隊與元軍相敵元軍若至則疾走其營拔元幟立宋幟焚其輜重前後夾攻之元將可擒矣三將領兵大喜而去移營數日元兵仍然不出斛律統制令王彥挑之元軍分毫不動斛律統制大疑四下哨探並無埋伏斛律暗思元人徵調柳州慶遠二軍助戰或待二軍至始戰耳忽一夕元軍大至鼓噪聒耳統制恐元軍突營令堅守鹿角勿動至天明俟元軍疲倦擊之誰知次日宋營前後左右遍是元軍重重疊疊似有百萬之勢宋兵見之多有懼色統制只得下令衆將分頭殺出抵敵元軍忽散忽合愈殺愈衆不知有多少人馬吳廣王彥洪時錦等力不能支宋師大潰斛律統制亦阻遏不住棄營而走死者無數蒯參政下令追擊攻殺斛律統制殿后且戰且走將至南寧界口卻得廖雲一支生力兵至元師始退卻不見牛竑張燕屈突申三將之兵來援統制疑惑不定令人急探誰知三將之營已被羊雷朱光鬥攻破三將協力戰退羊雷朱光鬥正欲下山赴援而元將曹豹范瓊周鳩所統皆是鐵騎遏定去路三將幾次引軍衝突俱如銅牆鐵壁堅不可撼且弩石如雨人不可近三將無可如何仍舊殺回直奪營寨羊雷朱光鬥二將輪流交戰直誘宋師至摩天嶺上此嶺上與天齊四山環繞綿亙數百里最為險惡嶺下岩壑深廣峻絶孤懸為僮瑤出入門戶瘴氣最重宋軍士中毒者輒斃三將心中惶惑恐效焦芳故事令軍士探路則四山皆可下而不知路向何往且士卒中惡死者纍纍張燕十分著急自往探之見衰延千里崎嶇巉崖怪禽異獸啼嗥動人愁雲慘霧晦明難分張燕探畢回歸亦中瘴癘口不能言嘔吐不已牛竑屈突申無策可展忍飢不敢飲食元將朱光鬥羊雷曹豹范瓊周鳩等圍至二十餘日各引輕騎殺上嶺來三將勉戰一會復受重傷俱力盡而死全軍覆於嶺上元將奏凱而歸
