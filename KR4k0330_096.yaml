body:
  text: 第九十六回劉伯溫望氣遊西湖宋穆宗景新五年即元順帝至元六年翔龍府南海縣人朱光卿一日晨起攬鏡自照見己蟒玉冠服立於鏡中異之又遊花田見二老人童顔鶴髮飄飄欲仙聚語於素馨花下一老人曰天下何時太子一老人曰待朱天子至天下仍一統朱光卿聽得心中暗喜正欲上前叩問二老忽不見朱光卿益以為神遂潛蓄異志聞惠州九曲嶺有聶秀卿談景山者自稱定光活佛哨聚有千餘人遂往歸之自言其異二人大喜願相翊戴並接其妻子至寨中議以為元滅金絶宋而武都已復宋世遂倡言為大金國復起立光卿為金主聶秀卿為丞相談景山為將軍光卿妻為皇后子為世子移兵圍龍川龍川縣變生倉猝登陴守禦不及一日一夜遂為所破縣令千戶俱死朱光卿隨得東莞勢如破竹率兵直取海豐時翔龍府留守司統制乃總令衛大將軍狄勇聞變即引精兵兼程而進時賊兵已入海豐狄留守遂圍海豐一鼓破之聶秀卿談景山俱死朱光卿就縛妻子皆被擒獲光卿至此始大悔恨曰花田老人誤我矣狄留守命械至武都磔之旬日遂平此信傳至上都是時順帝左相唐其勢謀逆唐其勢者左丞相撒敦之子撒敦即燕鐵木兒之弟撒敦卒唐其勢代父為相伯顔為右丞相用事唐其勢怒曰天下本我家天下伯顔何人位居吾上遂懷異志與從父答裏答謀立所親為帝禦史張金告變伯顔乃率完者帖木兒等引兵圍府唐其勢之妹伯牙吾氏即順帝後亦在府中唐其勢被擒攀折殿檻不肯出其弟塔刺海走匿皇后座後蔽之以衣左右曳出斬之血淺後衣唐其勢伏誅伯顔使人並執後至後呼帝曰陛下救我帝曰汝兄弟為逆豈能相救乃遷後出宮令鴆之伯顔此時大權皆在掌握奏罷科舉順帝允之宋主聞而歎曰欲得實才莫如科舉詔罷科舉元政由是大壞時有高安縣丞劉基字伯溫處州青田人也少穎悟善經學以至元初進士任高安曾遇老人鄧祥甫授以天文術數遂旁通天官陰符家言因見元政衰亂鬱鬱任所又聞順帝以罷科舉下詔遂挂冠去歸青田隱紅羅山曾詠太公釣渭圖以見志雲璿室群酣夜磻溪垂釣時浮雲看富貴流水淡鬚眉偶應飛熊兆尊為帝者師軒裳如固有千戴起人思基昔日嘗佐石抹宜孫幕後甚悔之至是惟與浦江宋濂龍泉章溢麗水葉琛四人相契優遊山水數年一日葉琛章溢與客數人邀基往遊西湖基欣然願往泛舟湖中飲酒方酣四顧空闊南北高峰山水佳麗令人應接不暇座中有少年朗吟曰虛度韶光二十春昂然七尺困風塵不如死在西湖裏贏得青山葬我身基聽罷大笑曰客鍾情甚矣以酒觴之忽見異雲起于西北定睛看時不覺狂喜大言曰此天子氣也應在金陵不出十年有王者興吾與公等當輔之座客皆駭葉琛急止之曰公醉矣章溢因問曰何為天子氣基曰天子之氣外黃而內赤猛將之氣外赤而內白反此則為凶兆章溢曰雲氣之占亦有説乎基曰然有將軍雲氣有伏兵雲氣有勝兵敗兵雲氣有城上姦賊雲氣是以順之者昌逆之者亡葉琛曰何以占之劉基曰占氣之時觀其初出如甑上氣勃鬱上騰積而為霧氣雲氣結為虹霓暈珥之屬不積不結散浸一方不能為災必森森疾起者乃可占常以平明小晡日出沒時候之其內有風雨為解者亦不成災也雲氣如弩弓之狀者天子之氣也雲氣長數十百丈者猛將之氣也或雲氣無故如虎行雲中者主暴兵或如人字在空者所發之處必有人告急或望無雲獨見赤氣如旦暮之霧或黑雲極天白雲如仙人衣十萬聯結部隊相逐罷而復起皆動兵之象若出軍之日天氣漠漠雲彩陰沈而寒者必戰之象也如或有青氣見君王相上者大勝或雲三道如霧非霧如塵非塵者敵人發軍之征隨其起處防之白雲如匹布起於東方者大兵起也赤者尤甚青者大喪黑者亦如之或黑雲三道首尾鋭而中裂者其下將有大戰或雲氣赤而具緑黃者大臣專權之兆不早除之必有大變於軍上往來者往者敗來者勝如雲氣散如錦文者當有赦書行天下若無慶賀事必見流血雲氣如虎頭者亦暴亂之象也此雲氣之七占為將者當以勝敗之象立修德之防章溢葉琛齊聲贊曰非吾兄精象緯之學焉能語此日暮酒闌返棹而歸
