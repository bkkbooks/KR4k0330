body:
  text: 第三回冬青樹記換君王骨會稽獅山屭湖間有一老人操舟往來江上自言朱姓江上人皆呼之曰朱叟與村中父老極為相得花朝月夕往往刺舟而來酌酒與父老共飲傾觴談心整日不倦一日正飲間朱叟忽掩面大哭衆皆愕然朱叟曰吾悲宋室耳衆解之曰宋室雖可悲憫然事往矣翁毋自苦朱叟收淚從容謂衆曰老夫世居淮西服疇食德代沐國恩自夏貴以淮右降元舉家逃竄十年並無確耗老夫浪迹兩浙蜉蝣江上家國茫茫乃故宋之遺民也惡得不悲言訖涕泗橫流衆皆感泣朱叟淚滿杯中舉酒酬江吟曰煙凝楚岫愁千點雨灑吳江淚萬行牢落京湖數十載不堪獨坐細思量朱叟曰老夫略識塗鴉托拾唾餘博父老一噱耳但老夫在淮時亦喜與裏中父老烹鮮炮羔敦崇信義惟期積厚作子孫計若緩急有無施與皆我等分內事也時座中有陶翁徐翁者頗讀書明大義皆感歎曰乃翁素履所蔭未可量也我等俱宜效之衆皆肅然起敬自此逐日登秦望遊天姥訪芋蘿玩若耶聚飲江幹散步古剎會稽乃千岩競秀萬壑爭流之區朱叟一面玩景一面探訪家音一日過余姚之墟見沙浦坐一少年面如死灰欷歔欲絶朱叟憐而問之則曰韓其姓懷珠其名滁州全椒人宋末父為縣尉薄宦余姚卒于任所今始間關來越尋親骸骨未知何處是以慟耳朱叟曰滁州千里迢迢女雛年弱質烏能達此少年曰懷珠年近弱冠但念有父不得生還豈骸骨亦不能歸裏中心慘但五內俱裂辭母離滁至中途已資斧告罄幸遇同裏朱阿哥來浙憐我幼弱隨行始達朱叟聞一朱字急問朱姓者何名來此何故少年曰名方義本淮西人宋滅元興家室離散伊尋父來越並狀貌年齒歷歷述之朱叟不覺泣下曰是吾子也暌違數十載今日始得音耗衆父老皆大喜稱慶少年叩首泣謝曰老翁不日骨肉重逢小於親骸何日得歸朱叟此時悲喜交集喜者父子相逢有日悲者煢茲韶年孺子間關跋涉尋親骸骨若不代為借箸奚以慰其孝思衆父老皆慰藉少年曰爾父臨沒年月葬記女得聞否少年答以未聞衆父老皆有難色朱叟停會私問其父宦途行徑宦囊充實否少年捧腹泣曰前日貧無卓錐近來連錐也無但父沒亦有因縣令史公本以夤緣賈平章館客廖瑩中堂吏翁應龍二人得選日日坐私衙打屈棒替豪門作犬馬與父有隙父解組乞歸因以詩諷之曰拷打追來隻為金轉增冤孽罪何深莫將棘枳棲鸞鳳願得挂冠遊竹林縣令懷恨在心乞休不允因事構陷遂卒任所縣令尋亦被逮此母氏在家言之朱叟慨然曰女父素行若此骸骨決然可尋同至城近凡蕭寺廢院停棺處物色殆遍皆有主者衆訝曰豈一縣尉尸骸競委溝壑耶少年號泣而行朱叟與衆探墳問冢白楊箱望處搜剔備至一日少年泣謂朱叟曰夜來夢身臥雪地雪月交輝忽又行走河畔宿草蔓延芊芊綿綿不絶耳中若聞人語有雲官告終養身無寸絲人欲請賓口不能言似乎親骸不可得也衆人疑辨一會有謂吉者有謂不吉者內有羅翁名銑者恍然曰是矣終無絲冬字也請不言青字也合冬青二字意者乃父尸骸其在冬青樹下乎朱叟亦悟雪月雪地冬也河畔草青青也羅翁所測無疑衆人一齊行至西山幽絶處果有冬青數株樹下桐棺纍纍逐一看去惟最下一棺業已敗朽並無封志槽上垢泥鋪蘚白骨多露於外少年一見心酸即欲刺臂瀝血忽見骨旁有玉塊一枚泣曰此我父故物也衆問何知曰與家中母氏所存無異常言雙塊一存父身一藏母所非其驗乎衆皆奇之少年帶淚刺血真沁入骨滴滴不溢遂撫骨大慟甲乙檢集包好叩首衆人方俗拜謝朱叟忽其子方義踉蹌而至衆皆大悅朱叟父子喜出望外方義又見懷珠已得父骨深幸死親生父各遂所願懷珠十分感激深謝朱叟父子德比二天異日誓圖死報倘不於本身必於其子孫見之朱叟遜謝今按韓懷珠即義死鄱陽之韓成祖也當時衆父老已知朱叟將離會稽又嘉方義懷珠二人仁孝可風爭相挽留至家欲以觴之方過姚墟忽道塗紛紛傳言世祖遣官伐陵取骨收寶使臣奉旨將至臨安會合平章不日即臨會稽衆父老驚訝不已暗想自有天地以來豈有伐陵天子恐系訛言回至山陰人人傳説果有是事皆訝曰奪其國而更伐其墓太屬不情朱叟憤惋泣下曰巍巍至尊沒後朽骨不能保全何宋帝之不幸至此耶時同行有少年姓唐名玨字玉潛者獨倡言曰我等逐日遊戀獅山屭湖間目極宮殯尚懷水土之恩今遭大變理宜瓣香杯酒陵前瀝奠略表小民寸心衆父老皆言甚善獨朱叟沈吟未決陶翁讓之曰翁平日忠義自許此時何氣餒不勝朱叟搖首曰徒往一奠此事殊未了衆皆拱手聽命朱叟曰陵中之寶可取陵中之骨不可去也須設法藏之衆謂藏之亦未盡善元主特為取骨若不得骨決然征問左右居民無噍類矣一時擬議未定又聞使臣已蒞浙省總統江南浮屠楊璉真珈亦赴杭城會稽蕭山知縣明日皆來巡視禁上遊人朱叟謂懷珠曰事急矣請以令先君骨易之懷珠泣而不答衆父老曰此計甚善韓縣尉以臣代君朽骨猶存忠義女以千里尋親不得乃父之骨而得君王之骨相易以葬亦仁人孝子之用心也懷珠方允衆父老甚喜行過水隩忽江幹有一丐者背負竹籮手持竹夾一路長歌而來歌曰滄桑感慨兮陵穀遷移珠宮抔土兮衰草迷離高孝兩朝兮惠澤布施遺骸不保兮令我心悲衆聞其歌異之丐者見衆父老正色曰公等殯宮比鄰忍坐視乎朱叟示以意丐者大喜自言姓林名景曦字霽山在宋為太學生公等好義願與共事衆父老甚喜同心各去備器械黃昏時候首先至理宗皇帝陵所惟見墓木虛拱翁仲空立駝馬尚猶睜嶸丹青亦未剝落但寒食青草夜月棠梨麥飯一盂也無諸人暗暗奠訖獨有羅翁名銑者原本故宋中宦深知陵中廣狹曲折布置之法穴出隧道徑達靈寢用鐵管撬開寢門白玉棺即見衆人用力透其樞紐舉而啓之惟更換其骨其餘珠襦玉匣分毫不動負骨而出掩其關塞其隧土色石痕如故朱叟一得此骨隨交與懷珠曰以理宗皇帝龍骨作爾父骨當不辱沒女矣懷珠泣謝時林景曦亦至高孝二帝陵前一時性起欲遍易之父老皆慮無骨更換而同事者衆即奔各處無主墓中隨取無數人骨不拘或貴或賤或長或短七腳八手盡將南宋諸帝陵中如法更換其骨朱叟乃斫文木為匱復黃絹為囊各署其表曰某陵某陵葬之蘭亭山下韓懷珠曰帝王之骨小子何敢竟葬為父不如一齊瘞此異日或有還陵之期父骨既已代君僭居陵寢小子以玉塊一枚歸復母命於心慰矣衆皆大喜無不以忠孝獎之又將理宗之骨深深瘞訖朱叟乃市羊豕具牲醴少年唐玨作文以告林景曦亦作詩吊之陶翁謂朱叟曰瘞處若不立記將來此骨還陵無期矣朱叟曰不必他物每瘞一處即種冬青於其上他日有繼我等志者冬青樹即宋君之墓志也少年唐玨爭先種之井口占一絶曰一杯自築珠宮土雙匣親傳竺國經只有春風知此意年年杜宇哭冬青衆父老亦各於所函土堆上逐一種之朱叟候衆人種畢乃舉酒酹曰炎宋無辜蒙古伐陵罪列穹蒼虐及杳冥慘矣列聖鑒我椒馨瘞玉何所視此冬青再拜奠別共祕其事外人無復知者時至元戊寅歲十二月初八日也次日朱叟父子及韓懷珠辭別父老遂回滁州今按南宋宮殯在會稽者甚多而屭湖之濱獅山之側塋址可識者約有二十四處俗呼為二十四堆是也後人觀此有感詠以詩曰屭湖湖水明如鏡照出興亡事可哀二十四堆春草緑錢塘風雨翠華來當時浙省平章哈馬黎乃樞密正使和禮霍孫之弟撫恤人民頗有幹略聞禦史台採訪人才亦屢下士禮賢輯睦同寅錢塘江下每多盜賊盤踞津隘商旅難通嚴檄武辨巡緝稍稍斂手時有江寧巨盜秦錫帛邢土龍藍天蔚等由潤州楊子橋趨過南徐私窺臨安聞哈平章威望素重亦遂引去在杭州又有京西華州寇復雷其人偉岸風骨目瞬如電河東關普靈面如重棗聲若洪鐘棗陽焦芳歙縣宇文廣聊城斛律亢宗等無不智勇足備出人意表遨遊錢塘憑吊臨安有飲馬長江之志正遇侍郎廬世榮宦者咬住奉旨伐陵來浙哈馬黎同楊璉真珈等接旨已畢飛馬報往紹興此風一出人人吒異數日備齊車輦董率卒役直往會稽有紹興知府劉含芬暗暗飲泣承接不遑會稽山陰蕭山諸縣令只候陵所廬世榮咬住等於是月十二日同至理宗陵寢近處略略巡視下令人役金寶不得損傷亦不許隱匿違者定按軍法軍役得令一聲呐喊只見雲愁霧慘日黯風悲天地無色草木飲泣縱斧處鳥雀爭飛揮鋤時狐兔逃竄龍螭豐碑一齊粉碎鸞鳳文石並無瓦全層層撅開將珠玉金寶盡行輦出侍郎盧世榮逐件查明注册更往內掘石門緊閉用鐵錘擊碎石管一聲響亮寢門洞開已見靈柩左右石欄盤白玉神路燦黃金殿寢陳設十分華麗咬住命盡行折毀珍玩一一運出然後破棺抉首軍士以利斧斫破石槨直截其首而出棺內所有罄行取之咬住一見首骨訝曰此陵不上三十年骨已朽至此乎想應宋室數盡矣一時伐遍諸陵搜掠靡遺壞棺破穴殘年斷骼委棄滿地甚而近處有公卿大夫之墓士庶富貴之塋驕兵悍卒見冢即掘棺既毀胔棄骨草莽間微或阻之拔刀相向虜掠姦淫無所不至有司知而不問會稽遭此慘酷人人切齒處處痛心行道之人無不飲恨吞聲掩面而過此即大元世祖皇帝澤及枯骨之第一善政也會稽隨即大旱三載赤地千里江陰水決衢州地震無非人民怨氣所致喜得山陰唐玉潛林霽山既同朱叟等換骨倡為義舉朱叟別後二人遂訂莫逆之交往往作詩互相贈答及見諸陵伐掘後二人憤極偵元使去後凡各處斷殘肢體盡收而葬之其有不獲者行賄西僧買歸以葬葬畢遠循懼獲罪也且説哈馬黎督率軍役伐掘已畢回至臨安將理宗首骨用匣庋置輦上金寶廬世榮咬住離了浙省即回燕京寇復雷等在余杭縣初聞此信人人怒髮衝冠大罵虐及枯骨羯賊有為君天下者乎衆人商議發掘後離杭回京我等先在北新關三十裏羅剎江岸等候劫殺廬世榮並宦者咬住奪回君王骨仍置陵中方泄吾憤衆皆磨拳擦掌準備劫殺比及寇復雷等知之則廬世榮去杭已三日矣諸人歎息而罷世祖一日得理宗首骨並許多珍異喜至手舞足蹈命精巧工匠將骨用珠玉嵌就鑲成琳瓏八寶龍骨飲器酌以酪漿嘗其旨否十分滿志重賞廬世榮咬住二人官爵有差而加西僧嗣古妙高為太傅自以為得此飲器宏開景運國祚綿永設宴大慶西僧等合口頌揚群臣皆呼萬歲而不知上天震怒人心叛離國運自此斬矣
