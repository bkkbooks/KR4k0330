body:
  text: 第六十二回衆夷國入貢武都元成宗一日設朝有福建平章高興建寧路禦史中丞忽都魯兒二臣飛章上奏以宋帝建都邵武有併吞全閩之意又立鎮建閫措畫甚大不可不先事預防京湖安撫使勃羅帖木兒亦奏全楚陷沒僅余荊郢觀宋人舉動有席捲京湖之志臣等外鎮閫帥並無其敵乞陛下早作良圖成宗覽奏憂形於色平章梁德圭張九思進曰自古兩國相敵非戰則和陛下欲休兵養民何不竟遣使與宋人劃江為界各保境土免致塗炭生靈豈不美乎且臣觀內外將師並無知兵若老太傅伯顔都元帥張宏范者喪師辱國非止一次矣所謂揚湯止沸不如去薪也成宗方欲從之有翰林承旨留夢炎急奏曰不可不可大元中外一統胡越一家豈無懷抱孫吳可以戡亂定功其人者若與之和是借寇兵而齎盜糧也陛下若命將伐宋老臣雖邁當為行軍司馬作露布以告厥成功張九思笑曰承旨有意征宋能保其必勝乎留夢炎曰仗陛下天威將帥得入老臣雖儒士亦請試鉛刀一割帝曰留卿之言甚壯張九思遂不敢復言帝即詔以建寧路總管武康侯赫連頠率閩中兵征之夢炎即預參幃幄拜行軍司馬更詔廣右行省參政蒯毅夫檄調各處將士進兵太平兩路夾攻宋人疲於奔命矣留夢炎齎詔遂赴閩中而去時大宋重康二年春有海外夷王遣使入貢不期而來武都者凡十有八國各獻方物雜陳百戲而貢物最為珍異者首推日本日本國王坦呢特布因蒙古喪師而退感帝德弗衰因聞大宋禦極乃命國相紇搭大將叱吒一文一武奉表宋朝以一瑪瑙甕滿貯甘露又曼陀羅華五瓶曼陀羅華者日本王子七歲即講聖鬟經天為雨花瓶皆用文貝嵌就又吠琉璃一方吠琉璃者寶青色至堅一切寶皆不可破亦非火焰所能鎔惟鬼神有道力者乃能破之此寶出須彌山非日本土産此物乃番舶過海所得者也至日本所轄五畿七道三島所産異物如芝草紫玉仙樹漿棋子等類無不畢獻次則真臘獻七寶床雞駭犀瓊漿石即石瑪瑙也再次則暹羅獻元精玉黃蛇珠又次則占城獻女珊瑚一樹安南獻仙艾花此花以仲春日開雨後花落水面群魚吞之多化為龍外此若三佛齊獻神鹿一隻高三尺前黑後白毛短蹄三跲滿刺加獻蕉心簞爪哇獻五色鳥琉球獻辟寒金忽魯謨斯獻草上飛草上飛者奇獸大如貓身玳瑁斑百獸見之皆驚伏和蘭獻神統統長二丈有餘發之可洞石城震數十裏蘇門答刺獻如意珠此珠出摩竭大魚腦中魚身長二十八萬里珠一名金剛堅得此珠毒不能害火不能爇餘更有佛郎機合貓裏婆羅蘇吉丹交欄山諸國皆有異寶入貢不可殫述各國既入武都自有接待外夷各官館驛只候文武預先奏知帝乃于中和節禦奉天殿大設朝會十八國使臣一齊山呼九拜舞蹈朝見各國王表奉正朔各獻方物日本一表尤極深感戴之意帝一一慰勞受其禮物二使臣一文一武俯伏丹墀帝視之已頭半白黑矣帝勞之曰朕前在上國過蒙推許別後未幾二卿已兩鬢含霜回憶奉聖寺扶桑島諸事依依如昨勞卿遠涉惠顧中土國王無恙耶二卿亦無恙耶叱吒紇搭齊奏曰日本蒙天皇寵臨為海邦大振國威敝主所轄五畿七道三島及附庸百國罔不臣服皆昔年天皇威德之所賜也海不揚波知聖人在位久矣薄具土産略表寸心煙波餘生致勞天皇寵問圖報無地矣帝一時感舊不禁愴然良久于暹羅占城真臘諸國無不問候備至各國使臣俱極感激叩謝而出次日帝於宜政殿設宜春宴十一國使臣俱齊百戲雜陳殿左右太常樂部亦皆鳳吹彎謳鵾弦雁柱龍笛象管蝶拍鶯簧疊奏太和舒和昭和休和諸樂一時真是天上人間千載一時帝又命學士樊東樓鄭夢蘭令狐韜等作王會圖詩以紀一時之勝文學諸臣若司馬肅皇甫惇白映雪等輩和者又數十人可謂君臣同樂中外一家酒已半酣各國使臣奏曰外臣不解文字請各陳風土以佐觴政可乎文武皆曰甚善齊傾耳聽之有占城使首言其國晝夜分十更用鼓打記非子不起非午不睡見月則飲酒歌舞為樂十人五人圍坐以竹杆插入糟甕中輪次吹之至國王則每采生人膽人酒與衆人同飲以為通身都是膽也真臘使者曰吾國風土與上邦不同貿易皆用婦人如中國針梳磁漆等物最貴婚娶則燃燈不息女十歲即嫁至國王則三日視朝坐七寶床列玉猿孔雀犀象名百塔洲以桑香佛含為撰盛以金銀盤盂諺所雲富貴真臘也琉球使者曰吾國有歡會門以金葫蘆團扇為儀衛美姬含米造酒名曰米奇官皆金簪子弟入國子監讀書歸為長史至歸人則以羅紋白布為帽雜毛為衣螺為飾其聲如城以墨黥手為花鳥之形有奉神殿神以婦人為尸名女君三四百人各戴草圈攜樹枝乘騎入王宮遊戲一唱百和音甚哀慘爪哇使者曰吾國舊傳乃鬼母與罔象合生子百餘嘗食人忽一日雷震石裂中坐一人衆異之遂為國王領兵驅滅一村男女凶惡有異僧取水噀之化為彌猴獨一老嫗不化隨老猴為侶稱猴王猴夫人生子一歲則置刀一把名不刺頭每十月為春首有竹槍會夫婦並坐塔車至會所各執竹槍妻執三尺木棍立其中以鼓為號二男交鋒三合二妻以棍隔之曰那刺那刺即退散若殺死王令勝者與死者家金錢一個死者之妻即隨勝者男子而去文武聽畢無不大笑暹羅使者亦笑曰吾國土俗又與上邦不同大小事悉決於婦其夫聽命而已習水戰大將用聖鐵裹身刀矢不能入聖鐵者人腦骨也人死將尸放海邊令鳥食之餘骨棄海中謂之鳥葬三佛齊使者曰吾國水多地少民置木筏蓋屋而居覆以柳葉田土甚肥故諺雲一年種穀三年生金吾國之謂也蘇吉丹使者曰吾王以五色布纏首跣足乘車從者五百餘人各執槍劍如虎鹿牛羊狀吾國東至海水勢漸低女人國在焉逾東則尾間所泄非復人世矣忽魯謨斯使者曰吾國有五色土紅如銀珠白如石灰又有青緑鴉姑以銀鑄錢名底那兒鬥羊角灣向前上帶小鐵牌行動有聲人養在家賭錢為戲産花福祿獅子駝雞如鶴長三四尺腳二趾毛如駝行亦如之佛郎機使者曰吾國有蜈蚣船者底尖面平長十丈闊三尺旁駕櫓四十每舟容三百人雖無風可疾走俗最信佛每六日拜禮手持紅杖而行婚姻詣佛前相配以僧為證謂之交印當下一十八國各陳土風一時聽者無不哄堂有日本使臣紇塔推箸而起曰蒙天皇寵宴海邦下臣皆飲和食德足矣各國使者俱起叩首謝恩帝始命徹宴令文武送出各國使臣在武都留連旬日一一辭別俱回以禮物厚其賞賜優詔答之使臣皆有重贐而紇搭叱吒尤賞賚甚厚及占城暹羅真臘諸使亦另有加等無不大喜過望歸海上而去
