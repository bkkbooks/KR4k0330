body:
  text: 第七十回關將軍招降呂大成建寧路總管武康侯赫連頠奉旨伐宋而宋將韓靖夏一味持重以老其師赫連頠欲戰不得遂自引一軍從新城小徑竟襲杉關一面令人由間道走報江右令襲撫州吉安等處誰知建昌府節度使韓侯搏虎乃韓太尉之侄聞宋元交兵不時哨探又聞赫連頠引兵偷襲杉關須出新城小徑韓節度急選精兵一千埋伏揭陽道自引一軍出飛嶺邀之赫連頠不意此間又遇宋師知其謀已泄健卒又飛報軍司馬留夢炎已死元軍敗回建寧仰天歎曰功不成矣率兵欲退只見韓節度大軍掩至元軍當者立斃赫連頠怒曰宋人欺吾不能戰也揮鞭躍馬直取韓搏虎韓搏虎舞刀交還二將棋逢敵手大戰三十餘合赫連頠精神倍增畢竟宋師從上壓下元兵不敵赫連頠抑止不住大隊遂潰韓節度追至揭陽道口一聲呼哨伏兵四起元軍大敗赫連頠畢竟能軍約束將士雖敗猶能成行惟傷裨將十余員赫連頠獨當後殿且戰且走保衛殘兵徐徐而退韓節度亦鳴金收軍奏凱而歸赫連頠總管回至建寧查點士卒損兵數千死驍將十余員裨將數十人副將蠻子呀班被擒復釋軍司馬留夢炎被宋人辱罵而死赫連頠總管上表白劾元主優詔答之赫連頠總管憤極嘔血數升臥病月餘而死從此建寧路將領無人武備不復修矣韓太尉自此一戰大獲全勝又至郎官原覓得楊孝伯尸首葬之傳集各路人馬唱凱而歸奏聞宋主從此元軍不敢南向牧馬杉關威名永著一日詔下韓太尉進爵為侯宇文廣升總領衛大將軍張昌石雄王遼朱昶升驃騎將軍楊孝伯追封為侯子孫蔭襲本職勞賞三軍建昌韓節度戰敗元軍齎詔褒美將士俱齎賞有差時江西平章乃中書右丞孛羅帖木兒一得赫連總管之報即檄臨江府都指揮使呂大成兵伐吉安呂大成得令引兵三千徑過萬安縣屯金船嶺韓節度聞之檄南安守將總領衛大將軍拓跋琳領本部人馬抵敵拓跋琳遂移師萬安縣駐扎時萬安西村有陰生者名子宸家貧甚剌館谷以為生歲暮無投聘者除夕妻孥相對忽有剝啄聲啓門視之則兩蒼頭共一老仆雲是上高縣巨室某延師致金為聘車馬相迎束惰二百兩陰生大喜過望期以燈夕後蒼頭等倉卒別去竟不言姓氏陰生亦未及問既而念其家鄭重乃爾主人不通姓名且素無先容何以致此疑是誤投妻強解之曰必村落暴富不識字人耳生亦信之燈夕果有車馬及前日老仆蒼頭欣然而至陰生迎問曰仆素昧生平謬辱聘召昨歲暮倉卒未敢致問華門貴胄願示其詳老仆惟言姓黨且曰先生勿問第至其家便能知之陰生再欲問時則已駕車催行矣暗思延師教子容有他意欣然別妻登車而去山程水驛曲折都非熟徑凡五晝夜老仆曰近之矣生視其徑多逶迤屈曲絶無人家不一會忽峭壁當前老樹纏藤上參雲漢僅有欹斜小徑仆與蒼頭等扶掖而登既逾其顛則細草平坡野花當路又似別一境界行一二裏遙望甲第巍峨老仆指曰此即主人宅也到門見堂宇煥赫如王侯家下車曆門十數重不見主人晉接至一庭坐定蒼頭數十人環立兩行生局蹐不自安少頃老仆復出曰主人偶事他出未及倒屣改日請見生唯唯老仆遂引陰生復過廳事五六所至一處有花木亭池精舍一區老仆曰此書室也給使小蒼頭數人床器帷帳及生之被服巾履靡不璀璨生駭異如夢老仆引弟子出拜瑤環繡服儼貴介子弟年近十五六執禮甚恭既而蒼頭報席設醉白堂弟子即請生復至一堂珍錯羅列目所未睹生首坐弟子相陪甫登席隱隱聞樂聲作不知其處酒一行輒有童子碧衣珠襪按拍向席而歌悉生平所未曾聽者童子以十二人為隊歌一闋即更凡歌二十餘闋生起謝弟子令罷酒即撤席間金杯碗數事贈生命老仆送生仍入書室弟子次日受業時發問性甚慧弟子日誦千言過目便了但搜古人辭絶不事應制文藝策略乃告生曰弟子無意功名但得識數行書稍習世事足矣自春徂夏群書該洽前後贈生已數百金言歸輒不許生亦安之居無何漸及歲暮蒼頭告生曰主人今日滿載而歸矣中堂即大設華筵請生觀劇生至中堂始與主人識面蓋冠雉冠服甲服腰橫寶劍上嵌七星四座賓客皆豪雄偉岸戎服登筵生心驚股栗舉止失措不敢發一辭主人豪飲劇談笑謂生曰先生勿驚仆等江湖豪俠士也因仆等嗜殺罔顧仁義特令小兒受業得以稍知大體今承不棄嘉惠後學沾被靡暨特治卮酒聊以談心不日當送先生歸裏生聞言局蹐席間聞衆客舉觴交慶意似得鄧通銅山郭況金穴也者席終生歸書室終夜不寢翌日主人具彩緞數十端黃金二十脡命弟子黨生再拜而謝主人亦拜謝仍命老仆送生星夜歸裏既歸生以語之妻猶未信啓篋視之則珍瑰燦然其妻大喜越日生與婦正慶幸間忽弟子黨生踉蹌而至生驚問之黨生拜伏於地泣告曰吾父專一聚衆行劫前日歸家得豫章餉銀八千兩平章聞之即敕呂指揮督兵剿捕吾父得信知必不免急命弟子速奔先生處逃避或可漏網一子乞先生憐之陰生用手扶起急問曰然則汝父母將作何計黨生掩面哭曰譬諸弟子在此間間話時即吾全家就縛時也陰生聞之亦涕泗橫流泣不可止其妻勸之曰伊父劫掠為生是渠惡報何哭之為生答曰非也伊父本非讀書人待師忠且敬如此其慷慨揮霍有出於尋常萬萬者吾特為此一念而悲耳其妻又曰吾家得此修甫僅免飢寒弟子逃死而至吾家甚貧何以容之生未及答黨生聞之即出橐中馬蹄金約數十錠雙手獻之其妻一見忙謂生曰汝急須設法救護弟子以全師生陰生見其妻得金而喜乃歎曰此閨閣本相而亦近世冷暖之常情也又謂黨生曰吾與汝猶骨肉也汝父雖不肖汝則何辜吾即貧如刺骨亦必汝容也況得汝束修又有汝橐金即於吾家終身焉可矣且吉安乃系宋地大元之兵決不敢越境而捕黨生拜謝至是而陰生之家以富且説元指揮使呂大成屯兵金船嶺與宋師連戰皆捷宋將拓跋琳甚忿整飭人馬欲決死戰而元軍餉銀運至中途忽被盜劫平章切責本郡長吏訊官等呂指揮立撥旗校數百人盡捕其黨殺之奪轉餉銀業已耗失過半而營中糧運不繼士卒多出怨言宋將拓跋琳逐日討戰呂指揮惟令堅守相持月餘未交一戰平章孛羅帖木兒欲劾奏之呂指揮不得已率兵與拓跋琳大戰於五雲洲邊不一會拓跋琳又力怯敗走呂指揮素聞萬安縣積儲甚富遂襲其城移兵人焉至夜半忽宋師大至拓跋琳督兵圍定四面攻打而呂指揮欲就糧城中誰知內系空城業已中計幾次欲奮勇衝突潰圍出走而士卒多病又聞平章李羅帖木兒欲將指揮家口系獄械至峽江都督嶺被強人劫去呂指揮心如芒剌十分焦急逐日登城望見宋師人人精鋭自思兵弱糧盡如何抵敵指揮抑鬱無聊忽報宋軍又添一支生力軍馬來助攻城大將乃龍武大將軍武陵侯關普靈也呂指揮益知難敵元兵大困城中數日無糧守陴皆哭忽小校在城上拾得一書獻與指揮呂大成呂拆而觀之其略曰某與將軍同裏憶昔蒲州共事筆硯時迄今思之景依依其如昨也前在台州亦偶相遇但邂逅間不及款曲想同學之情仍然同心也今將軍奉檄侵宋出師三月毫無寸功進不能破敵兵退不能免劾奏以有用之才付無用之朝危哉此時禍不旋踵矣家口業已入宋代為安置棄暗投明豈無意乎如必膠柱欲守不二之節則南雄鎮羅浮山諸戰將軍所深知也欲戰則出不出則降大宋重康四年二月日河東契弟關某再拜呂指揮得書再三觀之自知不敵遂開門出降關普靈拓跋琳大喜呂大成急問家口一事何以便能入宋關普靈笑曰此皆弟念同學之誼特令裨將等略施小計至臨江賺之今已在武都矣呂大成稱謝不置關普靈率兵同呂大成入朝拓跋琳仍去鎮守南安呂大成既見宋帝關普靈薦為衛將軍守惠州
