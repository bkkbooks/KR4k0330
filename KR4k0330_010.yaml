body:
  text: 第十回棲霞嶺皇甫惇題詩范國昌等既過鎮江登芙蓉樓觀玩江景回視北固青青焦山圌山端然可見又上西南萬歲樓見揚子江中船隻蟻聚霖邐直達江灣青龍鎮等處一望無垠因在鎮江打探吳越消息聞奏錫帛攻陷鳳陽太守孟知節力不能支仰藥而死守將梁毅並弟梁果戰敗降賊太平府牛渚磯守將陳宏統王杲自以長江可恃師久遂生怠心疏虞防守一日晨起大霧滿江迷漫對面不見王杲始命哨軍沿江巡視不知楊鎮龍之兵已偷渡採石擒了斥堠殺至牛渚已過營前二將慌忙上馬措手不及衆軍大潰一時殺死溺水者不計其數王杲被擒陳宏統赴水而死楊鎮龍降其餘衆遂圍太平夏貴確有主見不慌不忙輕輕又將太平降于鎮龍錫帛鎮龍兩處陷沒無數郡縣三吳道路梗塞范國昌等聞之逆料三吳非可久居將往京湖白映雪亦言昔日蒙古會稽伐陵有人大鬧臨安之事亦思暫避兩浙范國昌曰此非常之舉也我等曷往物色之司馬肅曰貶聖伐陵千古公憤可笑白子丹猶為之獻策以退敵也映雪曰饒平有老母在焉深恐城門失火殃及池魚彼時亦箭在弦上不得不發耳三人一同遂往東京卻説臨安西湖每到春日畫舫蓮舟遊人無算或挾歌妓舞女蕩槳或載檀板金樽刺船其湖心亭蘇公堤熙春橋等處弄潮者畫則管弦咿啞終日不絶夜則燈水輝煌達旦不休所謂暖風薰得遊人醉也又西湖山水清麗綽約可愛故能惹動士女遊覽不置蘇子所雲欲把西湖比西子淡妝濃抹也相宜良非虛語湖上有天竺峰八仙石冷泉亭大觀台諸勝山之北為棲霞嶺嶺下有嶽王墳精忠廟勒賜褒忠行福祠時有一人就祠近築室而居姓向名南枝隔山又一人姓施名澤久二人俱精悍有力演易筋經賣槍棒作生活計居近西湖生平鋤強扶弱好打不平元世祖至元二十一年西湖遊人較往年更勝一籌二人見湖上湖下湖左湖右如荼如火星布雲湧一般觀玩之際惟聞笙簧繚繞笑語嗷嘈有人以詩記其事雲乍睛時節好天光紈綺風來撲地香花點胭脂山潑黛西湖今日也濃妝白舫青樽挾妓遊語音輕脆認蘇州明知此地湖山勝偏要違心譽虎丘畫羅紈扇總如雲細革新泥簇蝶裙孤憤何關兒女事踏青爭上嶽王墳明儕遊興略相同裏外湖橋宛轉通覿面幾番成一笑剛才分路又相逢畫舫人歸一字排半奩春水淨如揩斜陽獨上長堤立拾得花間小鳳叉梨花無主草堂青金縷歌殘翠黛凝魂斷蕭蕭松際路滿天梅雨下西陵珠翠叢中逞別才時新衣服稱身裁誰知百襇羅裙上也畫西湖十景來時樣梳妝出意新鄂王墳上小逡巡擡頭一笑匆匆去不避生人避熟人白石敲光細火紅繡襟私貯小金筒口中吹出如蘭氣僥幸何人占下風苔陰小立按雙鬟貼地弓鞋一寸彎行轉長堤無氣力纍人挽著上孤山施向二人觀玩良久見湖岸湖舟無非擁妓酣飲叢雜朱翠按譜度曲甚者袖手玩景選勝賞心而已施向二人雖豪俠者流頗有不屑之意直至湖心亭眺望之際恰有士人數輩在亭下浮白呼廬舉觴豪飲一人曰悶酒寡飲殊乏風雅即景為題不成者罰金穀數四座皆然之其人首唱曰白沙堤外蕩舟行煙雨空濛畫不成忽見斜陽西嶺照半峰陰暗半峰睛次座者曰本地風光拈來皆成妙諦如某從何處設色亦蘸筆書雲花塢斜連花塢遙夾堤水色淡輕綃外湖艇子裏湖去穿過湖西十二橋又次者曰此自然天籟也當歌對酒我輩擱筆矣不得已勉強一吟題曰長短蘭橈拂渚汀聲聲蕭鼓集西冷為誰唱出桃花曲盡著蕭郎廉外聽最次者曰風流蘊藉洵是可人但未免綺語撩人矣説罷遂奮腕疾書雲一到湖心眼界寬雲光霮接風湍亭前春色濃如許莫作瑤池清淺看衆皆譁然笑曰騷壇得此軍可殿后矣洗踐更酌仍相豪飲施向二人在亭上亦鼓掌歡笑曰如此遊湖可兒可兒衆忽仰視訝曰施向二好漢也急起邀入坐定二人坦然無疑舉巵如錢鯨吸川盡醉方止大笑曰但識琴中趣何勞弦上音淵明尚撫無弦琴也而況我等武人不識之無庸何傷衆士人見他豪邁可敬酒後耳熱方欲舞劍為樂以佐觴政忽有杭州都巡檢司欲遊此亭賞湖先令僕役散除間人施向皆怒曰多大巡檢此亭獨汝合遊也剛欲發作衆士人恐其滋事波及逡巡避去施向二人仍少坐一會見巡檢未至亦過六一泉孤山寺等處遊遍而歸方至嶽王墳見一士方巾便服周覽墓道欷歔久之又至精忠廟再拜奠酒忽然放聲大哭二人驚異之宿酒皆醒見士人袖出小金盒一具拈管題壁雲不是金牌下九閽燕雲唾手復中原千秋大獄成三字全宋精忠聚一門獰北兩官悲斷夢向南孤木自招魂蠟書夜月西風冷背上空留舊涅痕其人題罷猶涕泗橫流二人上前慰之曰先生忠義人也至情相感如是如是其人遜謝自言復姓皇甫名惇湘江人也避亂至此有感蛙鳴不圖遂聒尊聽亦問姓字二人告之重新敘禮意氣相投忽旁邊轉過一人大喝曰何物寒酸於以糞土汙人牆壁皇甫惇大驚未及回答施向二人一見知是錢塘縣惡棍王多管本名科遠系余杭人氏原是一介纍舉不第的秀才因其唆訟好事全無行止士林羞與之伍廣文以劣等申之提舉褫其衣冠竄過錢塘至是益橫鄉黨苦之其家甚富前代居閩有祖名好謙者因過鎮江遇韓世忠大戰金山寺殺敗兀術追至黃天蕩以鐵綆貫大鈎沈于江中前後將金兵圍得水泄不通兀術大窘業將被擒王好謙乃寬衣大帽從容至營中獻破海舟之策命兀術舟中實土鋪板穴船擢漿風息以火箭射宋軍箬蓬世忠大敗兀術過江深德好謙謝以美官不受賞之千金遂成巨富王多管究竟賊種苗裔席饒裕之業至錢塘又納粟補博士員凡官長一至即奉百金為壽若遇錢神墨吏便與膠漆不相離矣當下在精忠廟見皇甫惇題詩玩其聲口有事可搜遂責皇甫惇曰汝一介寒酸何得又謗朝廷禍至勿悔皇甫惇浪迹此間不知所措施向二人急引至家中暫避次日命之速走猶未拔關突有差役數人排闔而人將鐵索鎖了皇甫惇就走施向二人不敢爭執皇甫惇欲辨不能掙扎不得帶至錢塘縣宰升堂即問名姓皇甫惇又羞又惱逐一説出復問精忠廟如何擅題反詩皇甫惇不敢隱瞞將詩呈上縣宰反復沈玩意甚惻然命請王鄉宦少時王多管昂然而至縣宰笑迎起居畢曰王兄謂皇甫惇所題譏訕朝廷反情畢露其旨安在王多管曰通首皆懷不軌即如千秋大獄成三字全宋精忠聚一門千秋台乃至元九年立於斡難河以旌武功以志始基獄者言二犬也三字者今上以奇渥溫為姓忽必烈為名俱三字也大獄二字言二大犬暗刺當今始祖乃蒼白狼黝白鹿相配而生也復興宋室謀反作叛想其父子兄弟俱有成謀故暗將精忠二字托之武穆也狩北兩宮悲斷夢大約今冬起意北征使燕京上都兩處寢不安席宵衣旰食也向南狐木自招魂木生在火宋南渡中興南為火地宋以火德王天下又凡元者屬黃黃者土也取木能刻土向南孤木自招魂謂以一木獨支大廈能為宋末諸帝泄憾招魂也至次句唾手燕雲恢復中原則朗若列眉矣縣令曰不然唾手燕雲終欲復仇而報國誓心天地尚令稽首以稱藩此武穆王表奏高宗誓滅金人之語非皇甫生所撰也王兄誤解矣彼異地羈旅偶一感懷何遂加以訕上之罪王多管不悅曰渠言中原且不在意其志非小縣公獨不見前日大鬧臨安乎縣令變色曰前日大鬧臨安黨與甚衆且皆強梁跋扈之徒此人孱弱一書生彼自詠南宋之武穆王耳豈得以筆墨之故陷人不義不義之行侯長孺不為也王多管語侵縣令縣令置若不聞竟將皇甫惇釋放且勉之曰玩汝詩詞頗懷忠義異日得志莫渝初心侯某有厚望馬皇甫惇拜謝而起王多管懷恨而出按縣令姓侯名長孺南陽人也初任錢塘下車伊始王多管即遣人饋蒸豚一蹄長孺不便推卻受而啓之內藏百金長孺大異之受豚反金後稔知積惡有素但未發覺時偵察之長孺杜絶請托多管無門可入搜得此事謂指斥乘輿坐以大逆或可挾制不敢不從發發利市詎知侯長孺以賜同進士出身作民牧豈不曾作過詩來而落汝含沙射人圈套也王多管出衙大怒縣令思中傷之遍造無根謗言震撼上官又令其子王元賄買沿江巨盜多於錢塘江近時時搶掠戳傷人命又令人常在江邊打撈浮浪尸首或去頭足或損陽陰捏作無影疑案如此之類種種不一月餘錢塘縣遂有不決之案七十餘端縣令公事旁午上官切責下民抱怨侯長孺初任尚有循聲至此竟左支右絀了更還有錢塘榷稅田土婚姻吏胥舞弊逐節生枝委決略有缺陷皆索瘢剔痍人人上控平章脫脫大怒以不職奏免罷官而走王多管大喜得計誰知事有巧遇恰好錢塘繼任姓葛名天民亦湘江人氏皇甫惇深得侯令救護十分感激既見王多管種種不法百計傾陷老大不平然無可借手聞葛天民補任錢塘正合機會遂將前事逐一告之葛天民與皇甫惇下帷數載誼屬中表因皇甫惇見宋滅元興無心仕進故遊歷京湖仍然書生葛天民生性疾惡如仇王多管之名耳之最久一蒞任見被害之家告王多管者狀子如雪片飛來葛天民立獲數盜用重刑榜掠供出其子王元賄托之謀即將王元拿至質讞誰知王元狡猾凶頑克肖乃父倔強不服株連吏役與天民抵牾天民大怒將蠹役數人立斃杖下胥吏恨入骨髓夾拶群盜死去活來一口咬定王元至死不變王元亦受刑不過盡皆吐實王多管至此惡貫始盈方得伏法而按察金事哈刺哈孫並知府阿速以天民執法而少趨奉偏將招詞層層駁辨從輕未能大辟葛天民怒氣無處發泄將王多管刺了雙目其子王元剜去二肘發往袁州府萍鄉縣安置前案始明正值侯長孺亦按籍復仕分發江西聞知此事遂求任萍鄉至任所令人察之見王多管在一斗室中瞑目上坐口中喃喃自言此案如何起結如何更變如何聳動官府條分縷晰了了甚明其子旁列矮坐以足指夾筆管書之報知長孺令人拿至將父子立斃杖之人以為天道好還毫釐不爽雲
