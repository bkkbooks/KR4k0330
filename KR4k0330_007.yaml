body:
  text: 第七回楊鎮龍兵犯牛渚當時寇復雷等尚在嚴州聞壽陽強盛將往歸之藉以起事韓昭曰不可昭昔在廣德曾見錦帛一面其人似王敦蜂目已露惟豺聲未著耳雖能食人終為人食大丈夫共事須擇磊磊落落如青天皎日者與之方能有濟若非其類同流合污固不可隙末凶終亦未盡善諸君不可不慎也關普靈曰甚善徐英公遣將謂以彼福澤成我功名也然弟在河東相識有種世龍其人者弟名世虎原故宋豹林老種之後素秉忠義廣結當世英雄家資巨富破家助友常言曰傾我黃金百鬥結成天下一家又言欲於閩廣間倡義起事號召吳越其志非小我等且探聽的確共往歸之韓昭大喜曰似此方不負我等初心也衆皆願往遂向東京進發卻説楊鎮龍見衆兵臨安得勝而回又得關普靈回書並許多禮物甚是欣喜秦錦帛既據壽春亦以書約會請圖浙東共達建康聯盟犄角鎮龍遂大舉人馬欲過江南由溫州紆道直抵吳興進窺秀水時吳興守將乃故宋降臣劉權閉關死守鎮龍分兵打安吉州有防禦使廉思領兵出迎鎮龍命驍將慕容光出馬慕容光乃寧羌州人氏面如重棗猿臂善射兼萬人之勇廉思忠以膏粱子弟焉能抵敵勉強對壘生擒回陳元軍大潰鎮龍指揮人馬追至城下見吊橋拽起方始回軍次日鎮龍分布軍將架起雲梯極力攻打城中驚惶無措有魏明史進二將一躍上城砍翻軍士斬關而入州牧王炳仰藥而死衆兵入城虜掠一空再攻長興開門納降守將劉權星夜往臨安告急鎮龍分兵攻打不休劉權見援兵不至勢不能支棄城望嘉興而逃鎮龍既得吳興拔安吉襲建平遂攻廣德廣德軍乃元將勃律丁鎮守聞賊兵至大怒督兵至苦竹嶺迎戰手舞鋼叉與魏明力戰三十餘合魏明力怯方欲回陳被勃律丁手起一叉刺于馬下元軍大至鎮龍大驚慌忙押定陳腳慕容光飛馬上前軍已大亂混戰一會損傷極多究竟鎮龍所聚烏合虜掠其長攻戰其短全無紀律一敗即亂次日進兵官礄令史進在左慕容光在右別成長蛇之勢鎮龍披執舞刀出馬不數合勃律丁率衆大敗奔走鎮龍長驅直追近城下勃律丁不敢入城拍馬落荒而逃鎮龍躍馬爭先剛剛入城敵樓上一聲梆子響亂箭射下鎮龍馬蹶坑塹左右伏兵一齊殺出幸得史進慕容光策應兵到鎮龍死戰殺出身中十有餘箭幾乎被擒部下多帶重傷回營納悶當時史進入帳獻以周郎賺南郡之策鎮龍從之卻説勃律丁聞鎮龍中計被創大喜當晚忽報賊營大亂哀聲四起勃律丁暗思鎮龍若斃餘黨可一鼓殲之命重軍堅守城池小心防護自率精兵潛往劫寨誰知儘是空營情知中計火速退回慕容光史進雙馬殺出弓弦響處勃律丁中箭落馬史進一刀取了首級鎮龍已在城下督兵攻城矢石交下尚難近前命軍士大呼以首級示之衆軍無主自然張皇沿夜攻破其城殺掠無遺探馬報人太平府去了太平乃建康門戶龍山南指牛渚北臨鐵甕當其東石頭枕其背牛渚採石二礬險扼江口極為長江要害之區太平自昔日賈似道師潰逃歸元兵屢力口殘敗沿江斥堠不設防守無人鎮龍即襲破昭關徑出含山縣不由蕪湖偷過和州將渡採石磯太平方始戒嚴且説太平知府夏貴當初以淮西降元奏授行省左丞權知府事遂守太平至是聞廣德已失尚以長江天塹賊兵安能飛渡忽報賊過和州將渡採石夏貴驚慌無措急命都監陳宏統團練副使王杲領兵一千將牛渚磯屯住牛渚與太平相隔僅二十五裏去採石二裏鎮龍揚帆而來聞牛渚有兵也不退避竟在和州之橫江浦對採石磯下寨時有范國昌司馬肅二人從姑蘇遊至和州將渡採石聞有兵阻戲吟曰橫江館前津吏迎向餘西指有元兵即今欲渡緣何事如此扁舟不可行范國昌吟畢笑曰降臣拒叛臣類聚怎交兵司馬肅亦笑曰寧為叛將死不作降臣生二人不敢濟江遂轉京口而去且説涪陵公趙晟與二馬隨著衆商直至真臘國此城猶在占城國之西南由廣州發船北風十日可到其國天氣寒風土大異國中望天處微有小痕古雲女媧氏補之所不至也其俗嫁娶男歸女舍國人生女至九歲即請僧誦經作梵法損其童身謂他日必能諧好宜家室至十歲即嫁其妻或與人私夫必大喜謂妻美故而立法最酷凡國人殺害華人者依法賞死如華人殺國人至死者即重罰金無金則賣身取金贖罪刑有斬手頭足燒火烙印胸背黥額或木削尻其標即絞罪也然無盜少訟大凡人家失物知盜是某不吐實以鍋煎油待沸出手探之果盜則手隨腐爛否則如故蓋其術如此又有浮石圖十二座或兩造結訟難分曲直令兩造各坐一塔外用各眷屬提防巡視或一二日或三四日不直者必得奇疾異症直者無恙謂之座天獄亦土神之靈也似此則較中土少無數獄訟盜賊矣衆商在彼爭相居奇惟涪陵與二馬宴然無事一日報有滿刺加國王遣使來聘與真臘聯姻國王已允不日將送公主至矣涪陵抑鬱一無聊日日感歎亦與二馬至三街六市等處觀玩見百貨雲集異産雜遝舉不知為何物何用土音人形亦與中國懸殊時值退朝有無數車馬紛紛攘揍道旁者指示之曰若者大夫若者國相若者公候勳戚若者酋長軍將也儀制率多猥瑣人物亦多怪異觀罷而歸衆商正在誇奇爭勝你得貓睛珠我得交臂玉你誇清泥乃無價之寶我炫陽燧為希世之珍這邊誇勝那邊道強聒絮不了真是賣物當行不消説得今按真臘國所産最珍者惟有夜明珠其珠光彩若月照人無妍媸皆成美麗漢成帝時入獻中國飛燕以賜婕妤此其證也但此珠不常産雖産外商亦不能采也一日國中沸騰傳言滿刺加固公主已至涪陵亦與二馬齊往觀之見本國車馬過畢隨有小香車十餘隊蜂擁而來其中粗叉俊粉媸妍不一嗣後一輦香車雲蠻霓旌侍從皆肅衆譁然曰公主至矣視其中一女子回面孿耳齞唇曆齒傴肩皤腹裙底蓮船約尺有五而金冠象簡珠圍翠裙抹巾障袖猶強作媚態涪陵不覺破涕一笑二馬觀之亦失聲大笑國人爭相讚美意涪陵諸人皆共笑其美也卻説真臘國王年老仁慈武備不修有紅夷國王禿忽魯聞真臘與滿刺加聯姻結盟疑有併吞紅夷之意命大將鼇奴率衆島酋長兵伐真臘國王大恐集文武商議勉強命將禦之紅夷酋將鼇奴勇健異常所部皆碧眼赤發耳帶金環似人似鬼凶惡之徒兼善火攻兵所到處靡不殘破真臘兵將聞名早已心膽俱裂且幸鼇奴統兵已離真臘不遠忽見海中現出一隻巨魚如狀鮊鱎嘴似鸚鵡共有八足略現半身即望之若山八足微動波濤洶湧雪浪排空鼇奴知是真臘浮胡之魚阻舟不敢前進退回紅夷去了國王大喜謂是天意不欲強暴淩慈良之國也涪陵住此數年見非可久棲辭別衆商衆商以定風珠贈之遂與二馬拽起風帆駕舟起舵望占城進發涪陵緘口真臘不言故國者數年舟中歎曰頻年海外飄泊無歸中都阻隔雲山縹渺萬里之行何時已乎晟以煢獨靡依不足論矣深纍二兄撇桑梓而棲異域耳二馬齊聲曰是何言也弟兄雖愚魯武夫頗明大義縱使蒙古混一中國弟兄若歸便稽首而稱臣哉涪陵曰想惠州一戰趙氏無噍類矣我等宜就近廣南諸國探聽的確可歸則歸一行賴有定風珠海中無虞不日已至暹羅之釣魚島島邊酋長部落知是中國人一直放過遂入暹羅三人變姓名權在暹羅棲身待時而動
