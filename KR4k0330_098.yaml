body:
  text: 第九十八回哈麻獻策造龍舟宋成宗嗣慶二年以廢去四大營武備遂隳六鎮雖設節度多不得人盜賊四起一時若漳州賊李志甫汀州賊羅天麟靖州賊吳天保湘鄉賊沈芝仙道州賊蔣丙所在煽亂而袁州賊周子旺自稱南朝周王勢尤凶悍告變者星飛雨急更有應火達者潛伏京輔欲奪杉關成宗歎曰聚六鎮五十二郡之鐵鑄不成此一錯也時宿將既卒惟種世虎尚鎮長沙詔平湘廣諸賊韓飛瓊亦繼守杉關命討近處群盜猶幸諸賊起事雖撾殺命官相結為亂俱無大志烏合之衆倏起倏滅種節度雖老威望猶著兵行皆有紀律如蔣丙吳天保沈芝仙等無不次第被擒遂移師江右會合建昌節度使馬如玉共討周子旺子旺直奔南安上桂嶺桂嶺三關之營亦廢無兵扼險子旺遂守北藏嶺以拒官兵馬如玉攻之不克為流矢所中而卒種節度大怒督兵奮力仰攻直奪其險子旺又竄韶州種節度追殺之韓元帥討李志甫羅天麟二賊初戰亦為所敗復戰伏虎庵羅天麟被擒李志甫敗入海惟應火達一時未能平服足有三月始被韓元帥誘入甘露岩伏發擒斬之二人平賊後入武都見帝重加賞賚進爵為侯種節度未及還鎮而死韓元帥升建昌節度使是時方保珍擾亂台州張士誠亦起兵據高郵國號大周自稱誠王知府李齊不肯屈膝士誠怒使曳倒捶碎其膝而剮之蘄州羅田縣人徐壽輝亦以紅巾為號攻陷蘄水黃州以薪水為都國號天完僭稱帝遣其將項普略丁普郎等取漢陽興國順流而下占據杭州諸處沿江盜起江右宋州亦失陷無數先是至正間朝中有數君子如翰林侍講學士揭篌斯翰林學士虞集編修楊載侍讀黃溍國子祭酒歐陽玄翰林承旨巙巙等著述作用皆一代人物至是皆卒右丞哈麻等乃進西番僧於帝行房中運氣之術號演揲兒法又進西番僧伽磷真善祕密法帝皆習之久而益精荒於淫佚漁獵美色無所不至帝亦自思得承大統出乎望外天下大亂豈能復治遂以政事付中書聽其裁決日惟以遊宴為事乃用宮女十六人按舞曰天魔舞取豔麗異常者首垂發數辮戴象牙冠身披纓絡大紅綃穿長短裙襖各持加巴刺般之器及宮女十一人練槌髻勒帕常服或用唐帽窄衫所奏樂用龍笛頭管小鼓箏琵琶笙胡琴響板每宮中贊佛則按樂而奏度曲而舞帝覽之樂甚又于內苑中浚池思作一解纜蕩槳之樂而未得其法哈麻進曰臣有龍舟之法帝問其詳哈麻曰其船首尾須長一百二十尺廣二十尺上建五殿龍身並殿宇俱用五彩金裝船行則龍首眼爪尾皆動造玉漏約高六七尺為木匱藏壺其中運水上下匱上設西方三聖殿匱腰設玉女捧時刻籌時至輒浮水而上左右列二金甲神人一懸鍾一懸鉦夜則神人自能按更而擊帝如法造就於後宮海子內演之果然船行龍首尾眼爪無不皆動帝大稱賞曰無怪煬帝錦帆江都之遊其樂忘返也遂重賞哈麻有奏邊報者帝輒止之曰政事白有中書朕不與知近臣多歎息而退
