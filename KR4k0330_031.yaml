body:
  text: 第三十一回白映雪奇緣有幸卻説雲夢賊賈翀聞弟賈羽辛因攻襄陽兵敗殞命陷沒全軍號哭欲死數日後始有劉環領兵千餘逃歸賈翀一見劉環且怒且泣立命斬首時新收二謀士廖維新翁國肜齊諫曰楚殺得臣而晉文公竊喜不如留之以圖報復賈翀令重責一百脊杖撥往水寨白文狻處聽用為弟賈羽辛發喪招魂諸事辦畢遂與二人計議廖維新曰壽春淮南王兵精糧足有虎視江漢之意不如卑禮厚幣與之聯合約其攻打安慶我師亦進蘄黃聲勢相應目下襄漢無人淮南若得安慶我兵若下蘄黃首尾相顧元人疲於奔命大事定矣翁國肜曰近今九月下旬乃淮王壽誕將軍速備禮物遣人祝壽即與聯盟最為得計賈翀即備珊瑚枕一具琥珀盞一架於闐玉塊一雙集翠寶裘二件副以壽帳文玩彩緞金幣等物令廖翁二人賚赴淮南二人領命離了安陸登舟望淮南進發直至廬江轉入淮清河徑達壽陽上岸廖翁二人見壽陽城中戶戶懸燈家家結彩各巷口俱豎起綺欄畫樓鸞簫象管龍笙鳳笛一派仙樂鏗鏘動聽秦錫帛妄自尊大蟒玉受朝賈智深等率文武捧觴上壽畢祝嵩呼廖維新翁國肜二人先謁賈智深然後進見頌揚禮畢始達來意將禮單國書呈上錫帛略看一遍再觀禮單見悉是重寶欣喜不盡當殿設宴命平章賈智深史獻壽參政萬俟蠣少尹英綏猷等陪宴廖翁二人工諛獻媚曆舉王霸之業欣動錫帛錫帛不覺身在人間自謂已居九重帝闕矣廖翁又與賈史諸人針鋒相湊膠漆相同聯合之事悉力贊成錫帛手撫二人曰孤與爾主願結昆仲掃平京湖結為唇齒毋負初心成大業有何難哉二人稱謝盤桓數日辭歸錫帛亦以禮物答之重賞二人勞慰備至且曰既已聯盟孤即日命將先取廬州次打安慶以通京湖之路歸語爾主速打蘄黃機會不可失也廖翁二人領命尚與賈史諸人戀戀不捨珍重而別一歸雲夢賈翀喜不自勝即大起水陸軍馬命倪鵬兒汪夜叉姚太師宋羅睺趙閻羅等皆同出征先打漢陽漢陽自韓搏虎去後軍伍廢弛倉廩空虛百官上下相蒙府尹放衙後便入靜室若優遊事外者然萬戶亦少年紈褲蔭襲得職聞兵至倉皇失措軍士望敵先潰雲夢兵由陽臺漢沔先掠城市次虜鄉村漢川一帶雞犬俱盡既入漢陽民婦有姿色者淫之不從者殺之男子強壯者虜之幼弱者殺之苦矣漢陽士女實遇此慘酷也賈翀既得漢陽兵屯漢川候淮南動兵再攻蘄黃時有范國昌司馬肅白映雪劉知機扈德威韓搏虎一行六人由房縣過長沙扈韓二人一股豪氣與諸人俱不覺勞瘁內中惟白映雪年少風霜經幾處名勝觸景興懷自顧身世未免增感一日至湘鄉縣投宿郵亭偶見一塔額曰觀湘塔信步登臨一望雲天縹眇衡嶽聳峙眼底見左抗荊門右納夏油五嶺三湘四顧空闊自思若得北庭無恙焉能奔波至此耶泫然泣下感懷吟雲觀湘塔上望家鄉萬里雲山共眇茫自昔風塵供下吏略將甘旨奉高堂嶽峰黯淡愁雲鎖楚水潺湲淚點長鈴語浮圖悲寸草猶聞慈訓語琅琅吟畢而下一日行至茶陵州此州在千岩萬壑中地近江右離長沙尚遠諸人入境見戶口寥寥宅舍無煙百姓逃亡過半良由州牧鈎考錢糧敲臀吸髓常例之外無限誅求正供之餘實多索取征理司索賄州牧牧州責之長吏長吏問之胥役胥役剝諸鄉里上下交征不留餘地茶陵地僻民瘠終幾縲絏田園荒蕪展轉流離怨謗四起而州牧尚以敲比為能事獻諛長官迎合上意殊不知數萬赤子皆呼天搶地無所控訴思制梃而撻之矣正值征理司穆爾忽兒按臨茶陵鈎考本年分錢谷州牧益加嚴峻用鐵蒺藜等刑催比論囚民不堪命一聲喊起將城門緊閉各執刀杖禾叉打入行台將穆爾忽兒砍為肉醬隨行人役亦死於亂刀之下州牧奪路出走恰遇范國昌等數人范國昌曰此紗帽下劫賊也言未畢被韓搏虎射殺大呼曰殺了酷吏救茶陵百姓隨有一班蠹役家丁上前抵抗韓搏虎連發數矢應弦而倒扈德威亦拔劍砍翻數人衆百姓又蜂擁追來刀杖交施無處逃竄末後擒一漢子衣服華麗氣概勇健百姓譁然大呼曰此即茶陵第一食人虎狼也德威聞之舉起從空丟下跌個半死百姓爭食其肉頃刻皮肉皆盡城中父老大開城門捧香迎接皆曰即請衆賢士一位為茶陵之主行省兵來我等誓願竭力戰守范國昌等招父老諭之曰爾等各安生業保全家室流亡者招之速歸飢寒者賑之得所我等暫守此城池可速上梧關請宋兵前來保護爾等自有更生之慶司馬肅隨修書一封命精悍數人去訖范國昌等逐日招撫流離修茸城垣巡視田畝稽查府庫民氣稍復惟白映雪優遊山水琳宮梵宇古洞幽岩足迹殆遍茶陵州相去數十裏有只鵝靈岩洞石室幽邃居然大廈相傳後唐時有耒陽人蕭禪和為弓手催租宿一逋負家夜聞兩鵝對語其一雲主人明日將烹我以待蕭老奈何及旦詰其主果然遂索其鵝以去隱居此岩後坐化於永新之慶寧寺鵝亦飛去岩中石壁猶鐫黃山谷所題詩雲大廈高堂未足論鑿時功力借乾坤慶長可坐三千客今古惟留十八尊谷口白蓮生玉沼壁間青蔓挂雲門開山蕭老今何在六股鳴環錫杖存好事者並鐫雙鵝於岩中以志勝迹岩前曲欄回榭旁建小閣額曰凝香閣閣道後另有殿宇香火千龕非仙即佛殿左又一斗室內一像貌美且都似紫姑神者雙眸炯然拈花欲語映雪凝神久之不覺心動隨吟雲天臺一別赴風塵誰寫芳蘭證夙因洞口桃花真爛熳應無仙犬吠劉晨吟興不已又雲明眸皓齒偎靈岩香火千龕表職銜冰作肌膚玉作骨不為仙子也非凡映雪吟畢留戀不舍又愛其房室幽寂欲為寺僧僦屋小住遂至客堂與僧問訊畢具達己意寺僧曰靈岩乃系名地恐相公未必能詩耳不然何礙映雪知此僧雅尚文墨思以動之請僧命題恰有一行腳僧結裝欲歸桂陽寺僧即指曰以此為題映雪應聲雲騷客送僧轉桂陽海門帆勢極瀟湘碧雲千里暮還合回首猶看江水長寺僧聞詩大喜留居寺中供帳飲食甚敬禮之當晚猶憶神像婉麗挑燈不寐戲作松人風一詞以記之其詞曰十年留意訪嬋娟今日始逢仙梅花帳裏惹鴛夢空品評柳媚花妍氣少幽蘭馥馥神凝秋水涓涓香奩何處渺雲煙瑩質最堪憐又怪人間無豔雪多應是玉映霞天焉得良宵會合百年長臥花前吟詠再四方欲就寢忽聞叩門有聲啓之一女郎驀然而入即所見之紫姑神也粉光黛影射入雙目較日間豐神益加綽約映雪趨而揖之回旋顧盼幾難自主不知如何措辭中心怔仲俟神定乃曰卿紫姑神耶女郎笑曰癡郎初見便卿誰也映雪亦笑曰尊卿愛卿是以卿卿我不卿卿誰復卿卿女郎曰妾非紫姑乃水晶宮瑤華三姑子也偶謫塵寰未逢佳士知君夙企仙緣讀郎詩故引桃源入棹耳映雪訝曰然則卿龍女也卿家何處女笑曰君日讀死書杜光庭尚有考記郎還未知之也妾家即在蘇州之東入海五六日程途小島之前闊百餘裏四面海水皆粘濁獨此水清無風而浪高數丈船不敢通夜靜時遠望之見水面紅光如日方百餘裏上與天連者妾家即其下也映雪驚喜欲狂曰荷蒙仙眷提掇凡愚離脫俗塵三生有幸女郎笑曰郎真癡於情者然妾奔趨已憊良宵夜談尚猶有待隨就燈下卸翠鳳翹金雀花雙朵解衣就寢映雪搴幃則已闃其無人惟見衾枕橫陳而已大駭莫解是真是夢擁被孤眠倣徨終夜次日不言其故散步廊室眼睜睜盼金鳥西墜玉兔東升準備今夕款洽不可錯過低吟一絶雲霧縠霓裳淡欲飛人間若個許相依襄王愛作巫山夢留住竹雲不放歸挑燈時女果至接談之頃意甚殷勤口談指授淵辨不竭映雪白顧下帷十年不及也然時偵察之明明入寢一登榻仍復渺然映雪不勝惆悵自思來宵且先寢以俟次夕又至扳談數語即先解衣而寢見女郎披幃登榻急捉其臂隨手轉側如一團絳雪飛空索之杳然仍無形影映雪弄得如醉如癡莫可遣懷戲作黃鶯兒一闋其詞雲處處惹人愁最關情是雙眸等間一轉教人瘦腰肢恁柔肌香恁稠凡夫端的難消受與卿謀人神路隔若個許相儔一夕女至映雪責之曰既觀芳容何須咫尺巫山使人于邑是何幻術也女歎曰所謂仙家伉儷者交以神不交以形若以形交則秦弄玉應抱子矣何以至今簫臺上猶寂寂無雛鳳聲也妾所以就郎者以郎為君子妾為謫仙完此一種夙緣於願足矣若復戀戀床第則妾為私奔郎為淫欲郎又何取乎妾妾又何重乎郎也映雪一聞此言肅然起敬斂容答曰然則白某不將終身一曲雉朝飛耶女曰白郎前程萬里尚當翊戴興朝為國柱石郎自有命婦妾特為郎送一物至即攜此柳西去求之當得美麗佳人不亞於妾也映雪問攜何物女出一枕付之曰此枕名桃花水晶枕郎君命婦即此枕求之決然不謬白郎珍重後會尚有期也女飄然而去映雪爽然若失悵望良久不勝淒其視此枕長不逾尺表裏瑩徹精光閃爍內現桃花一支五瓣灼開鮮麗可愛映雪把玩不釋辭別寺僧望西而去行十餘裏已入叢穀四圍蒼莽無可問途忽一秦吉鳥矯冀高飛映雪異之迹至山南盡處倏有村落槐蔭蔥郁中亞字牆綿亙百余步左側園扉洞開映雪疑為大家宅第不便探問逡巡趨而過之時已黃昏欲入投宿殊嫌造次蹀躞之間一老仆當門見而問之映雪告以故老仆引路映雪隨入堂上一翁拱立以俟見映雪乃一少年書生展問邦族映雪具以實告翁曰秀水之白爺系足下何人映雪起立曰先君子也老翁不覺駭然詫異連聲曰是吾壻也是吾壻也隨即笑容滿面而入映雪不知就裏徘徊中庭見屏風後窺者數四心中疑異少時一嫗偕出翁指曰此掘荊也映雪尚未施劄老驅笑曰甚好風吹得賢壻至此荒僻簡褻休哂映雪益發不敢回語翁已窺其意始告之曰老夫姓蔡名德新石門人宋末時與令先君同宦嘉興令先君官秀水老夫令桐鄉老夫與令先君一十八載交好情逾骨肉指腹聯姻暨後賈似道誤國告休不仕隱遁荒僻二十餘年不通音問更無子嗣今賢壻至此實慰鄙懷映雪如夢初覺慌忙下拜展禮已而泣下二老驚問之映雪曰先慈母存日亦言有蔡伯父指腹聯姻一事只説天南地北永無會合誰知猶有今日惜乎慈母不能得見耳二老亦代為哀惋蔡夫人勸曰賢壻賁臥吾家有慶往事不必悲悼於是大設筵席殷勤款洽蔡翁就席前叩其別後始末映雪將其家秀水成進士仕饒平破巨寇辭禦史遊荊湖逐一告之蔡翁擊節歎賞曰賢壻忠孝兩全仁智交盡青年發軔便如許建樹他年出人頭地未可量也蔡翁喜不自勝謂夫人曰可惜女兒淑婉抱恙未瘥不然乘龍佳期真有幸也夫人曰賢壻小住數日候淑婉病愈即當完姻映雪唯唯不敢動問飲至更深方寢暗思龍女之言確有先見也且説蔡德新無子五旬後始舉一女名曰淑婉夫人曹氏閨訓維謹女紅之外兼課文史淑婉喜辭翰觸口皆成錦鏽其父常曰淑婉易叉而櫛何愁玉堂金馬不能唾手而得自適茶陵若塵世外自念與白氏宿緣盡矣淑婉筆墨之瑕喜調秦吉鳥撥翎刷羽未嘗離手而慧鳥亦終日與言啁晰不休淑婉飼之則食他人飼之則不食小鬟在旁戲曰小姐日日飼汝寧不為小姐作合耶淑婉怒止之秦吉鳥舉翅飛去又淑婉家中蓄一水晶枕光瑩無比淑婉自誓願與水晶比潔行坐起居愛弄不釋一日偶置案頭失手墜碎只見精光錯落片片有桃花色滿地皆錦淑婉大驚如淵明失菊伯牙碎琴一般心甚不懌暗思寶物損壞定非佳兆寧身與枕俱碎也淑婉逐日鬱鬱又念親老無嗣益加感悼漸至臥病不起二老延醫診視皆言此乃繫念所好之物中心憂鬱因得痼疾以原物投之自當奏效非刀圭所能為力也家人等又東西賓士物色良醫投以妙劑俱不能起瘦骨支狀奄奄待斃蔡翁夫婦老大著急一夕遇映雪投宿而至淑娩聞報病約去十分之三而中情鬱結纏綿未已蔡翁雖日與映雪盤桓心如是蝟亂時憂時喜映雪正欲探問忽秦吉鳥當頭呼曰相公獨不醫小姐疾耶映雪暗驚此鳥引我入幕煞有慧心舉手謝之問之家人言即小姐調弄者也因問病狀鳥言憊甚映雪大驚問服藥未鳥言此疾非藥餌可愈乃繫念桃花枕所致原物一至病立起矣映雪驚問此枕系何物製成鳥言水晶所制乃龍宮異寶也此真愛莫與助矣映雪益驚龍女之言毫釐不爽遂向秦吉鳥力言此疾可愈秦吉鳥飛入病所告知淑婉淑婉不理蔡翁出堂憂形於色映雪叩以致病之由蔡翁備陳顛末既而曰非弱息溺於玩好實先代之遺澤也當年蔡君謨祖父用鼠須栗尾筆為歐陽公書表忠觀碑文字雙絶既而龍洞君欲得此碑移鎮水府以水晶玉如意一支水晶桃花枕一枚置於墓所易碑文而去歐陽公異之自受如意以枕贈君謨祖父相傳至今按水晶以日本産者第一于塗次之大秦又次之至海內所出則南方者黑信州者濁此枕性堅而脆刀刮不動色白如冰內有桃花無絲毫瑕痕高出於塗倭國之上蓋稀世之珍也弱息每以此枕瑩潔自況今病垂危百藥罔效恐身與物俱碎也言罷嗚咽映雪曰大人勿憂是即龍宮寶物某有一具未知當否遂出懷中一枕呈上蔡翁驚視之溫潤光瑩桃花內現形式無二一時狂喜持入以示夫人急至病所與淑婉言之淑婉疑信參半夫人出枕示之淑婉突見故物蹶然而起一時四體舒暢抑鬱頓解啞然笑曰沈屙不知何往如釋重負把玩不舍直如骨肉重逢良朋遠至秦吉鳥亦飛舞近前呼曰不是白相公遮莫群醫用遍妙藥罔效也淑婉面頰發赤蔡翁夫婦喜出望外急至堂前與映雪稱謝淑婉養息數日平復如初蔡翁夫婦逐日預備擇吉成婚至期紅燭高舉笙歌疊秦回廊復榭錦幔重重無何彩輿停駐籠燭數十簇與新人交拜訖導入內寢映雪從燭花影裏微窺淑婉宛然龍女亦畫中人也映雪以黃甲出身出宰告休遊遍京湖方胼嘉偶一時親友如雲傳為嘉話蔡翁肆筵設席鼓樂交作歡呼暢飲喜溢門楣次早映雪淑婉雙雙謁見忽架上秦吉鳥曰鸞鳳得所忘卻紅葉蔡翁大笑令小鬟取美食飼之不食淑婉飼之亦不食映雪笑曰是矣舉箸飼之秦吉鳥方食自此映雪非宴飲堂上即談論閨中一日方與淑婉尋詩遣興忽一麗人搴簾而入笑曰得婦之言今可驗否映雪視之即龍女瑤華三姑子也不及款曲慌忙拜謝淑婉亦拜龍女急止之曰賢妹代吾完此夙緣我之受惠多矣何用拜為映雪深為感慰淑婉亦謝其預贈寶枕得延殘喘欲往告父母龍女止之曰寶物自有定數白郎既成嘉禮即宜振翼雄飛恐金蘭輩懸望久也映雪猛省謝曰來日即當赴州未識前路可成功否龍女曰恢復事業已有八九戮力同心何慮無成但白郎亦識令先君存日有異聞否映雪曰無之龍女曰令先君酷好放生令秀水時豫時偕一婢子改成魚服遊錢塘江下為漁者所得幾羅刀俎幸遇令先君見豫鱗中灼灼有光以五十金買而放之豫感佩不忘無以報德故為白郎完此一段情緣使曠夫怨女兩得其所望與吾妹各相保重從此迢迢蓬山盈盈弱水豫雖有薄譴自此升矣話畢卷簾而出映雪淑婉欲挽留謝別但見雲生足下冉冉而去
