body:
  text: 第九十三回還珠亭冤鬼泄憤合浦之東舊有還珠亭以漢時孟嘗為合浦太守治稱神明失珠復還後人因建亭以表之此亭路當孔道宋初亭中過客宿者往往無故自斃縣令不能決久之此亭遂廢宋穆宗景新五年孟縉雲來守廉州政通人和百廢俱興慨然欲復修此亭以勵守宰縣令吏胥等阻之以為此亭久廢多出疑案不可復建孟太守不聽鳩工庀材不日告成更為匾額名之曰還珠亭縣令吏胥皆私相竊議曰從此亭中又多事矣孟太守下車伊始亦聞昔年許多疑案尚未深信是夜即宿亭中以瞻其異縣令吏胥皆為太守危孟太守宿至更許果見一紫羅衫女子血濺滿面伏地稱冤太守曰有何冤狀女子曰妾夫為石城縣令任滿宿此亭亭長無狀枉殺妾家二十餘口埋在亭下盜取財物太守曰石城與廉州接壤道經官員被人劫殺合浦縣宰獨不知耶女子曰當時鐘明亮寇亂潮陽各處縣宰禦寇且不暇寧計及此孟太守又問女全家被亭長謀殺自應冤構亭長何過客經此輒遭魅魔令斃是何道理女子泣曰妾冤沈海底蓄忿無可發泄故逢人即訴彼薄福之人見妾即自驚斃非妾之罪也孟太守點頭道是又問亭長何人女子曰即充太守門下公幹所稱燕頷虎頭毛太尉者也太守得實揮之令去曰為汝昭雪勿得戀此遊魂為厲則滋汝罪戾矣女子叩頭而出孟太守次日亦不明言其故細察府中吏役並無姓毛之人遲疑未發暗思此人必虎而冠者府中無之縣內必有此人又察縣令吏役册籍亦無一姓毛者一夕微服至茶肆中坐定見往來無非胥役紛紛議論謂某案非某人不可某案非某人莫辦衆皆譁然又一役曰今龍門江海船被劫失去貢物無算殺死防海千戶兵卒十餘人誰任此案一役曰此案非毛太尉不可衆皆然之孟太守聞言驚駭又未便向前細問回衙去訖翌日比案見各役紛紛銷納文結惟欽州龍門江一案未銷太守問此案誰人承辦衆役稟曰戚揚太守冷笑曰非燕頷虎頭之毛太尉乎衆役皆曰然時戚揚已蒼顔白髮在旁伏地稟曰此案系水寇搶劫早晚恐未能拿獲乞假以日月太守曰此案姑且少待更有還珠亭戕官謀財一案戚揚須急為辦理遂飛簽下之戚揚聞言色變悚息待命太守即傳人役併合浦縣宰齊至亭中令人往下深掘之共得尸二十七具縣令錯愕不知所出太守曰此石城縣令及家口之尸也縣公鞫問戚揚便知端委戚揚此時已汗流浹背方欲跪下忽兩眼一昏見一紫羅衫女子上前噴血滿面登時暈死縣令命人以水沃之復蘇即將謀殺情狀一一説出時戚揚已成巨富更拘其家小用重刑拷問盡皆吐實天道好還戚揚昔日行劫殺石城令二十七口及今四十年仍以全家二十七口抵罪分毫不爽孟太守令將石城令二十七尸葬之高原豎碑立墓此亭遂傳至今日毫無他異
