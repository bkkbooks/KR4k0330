body:
  text: 第六十九回韓太尉罵死留夢炎時宇文廣自知孤軍難敵引軍退建寧界口扼險而守令人星夜回杉關求援報人韓太尉立檄張昌石雄朱昶王遼四將引兵三千先行自統大軍五千隨後一日夜即抵宇文廣營中文廣迎入極言赫連頠鋒芒甚鋭日來討戰末將拒險以死守之韓太尉曰我兵失利且勿妄動建寧路密邇武都須大敗之小小進退不足計也命營中將土權為楊孝伯招魂設奠太尉率衆將痛哭奠之大小三軍無不感動遂下三大寨以四將居左宇文廣居右己居中犄角相援首尾互應作常山蛇勢太尉按兵不動日在營中教士卒以步戰法船戰法林戰法穀戰法養精蓄鋭相持半月赫連頠總管不獲一戰意以宋將持重徒老我師遂揚言抄出新城界口徑襲杉關宋營將士皆言根本宜護太尉不之理諸將皆摩拳擦掌欲請與戰太尉又不許諸將莫解其故赫連頠見宋師不動聲色知不可以虛喝遂以行軍司馬留夢炎統屬將士權攝營中事宜與宋將相持自引一軍抄過建寧渡綏江赴新城欲襲杉關兵行數日宋營始知之韓太尉令人哨探果然分兵而去乃喜謂諸將曰此可以戰矣即撥張昌朱昶二將各領兵五百抄出元軍之後近甌城分左右埋伏宇文廣引兵一千亦抄出元軍之後五十裏外埋伏截斷歸路再調石雄引兵一千伏于宋營之左王遼引兵一千伏于宋營之右自統健將數員以一軍應敵分撥已定隨下戰書約次日決戰元軍中行軍司馬留夢炎得知即請副將蠻子呀班總統葛顗都監唐玲等商議應敵蠻子呀班曰水來土掩兵來將當宋師欲戰自有某等足以對敵司馬但督裨將等緊守大寨以固根本留夢炎曰老夫當親臨行間以勵將士方不負元主策遣之意葛總統曰兵凶戰危軍司馬何必親冒矢石以某等為不足破敵耶留夢炎曰不然戰爭之事老夫何敢越俎但以老夫衰朽殘年且不畏鋒鏑親蒞戎行將士見之恐奪其功則士氣百倍矣三將然之翌日昧爽唐都監緊守大寨副將蠻子呀班總統葛顗皆披執整齊簇擁留夢炎而出宋營韓太尉有子名飛瓊年方弱冠驍勇善戰亦白袍銀鎧持戟躍馬隨于父後韓太尉一見元軍門旗下有龐眉皓首須髯若雪跨青驄馬軒然而來者乃即馬上欠身問之答曰老夫行軍司馬留夢炎也太尉猛省急問曰老先生乃端拱間狀元宰相之留夢炎乎抑別為一人乎留夢炎正色曰夢炎即老夫一人惡得有二太尉冷笑曰然則老先生乃故宋舊臣也今宋元交兵兩軍對壘乃鋒鏑死亡所在老先生身臨不測之地意欲何為留夢炎不覺面赤神沮惱羞成怒忿然曰宋室氣數已盡崖山一戰靡有孑遺汝等假託宋氏妄言恢復鼠竊狗盜皆中山狂人之黨若稍知時務趁此時面縛請降或保首領不然則微軀三尺將付於京觀之顛矣韓靖夏聽華微微而笑揚言曰宋元兩軍將士且肅聽一言留夢炎在故宋以狀元及第身為宰相奇榮殊遇不可謂不至矣諺雲烈女不事二夫而女子稍有志節者尚能不惜一死為天地留正氣為人倫扶綱常乃堂堂天子門生巍巍國家元老而顧反顔事仇不復知人間有羞恥事謂為跖犬吠堯則跖之犬雖吠非其人而尚能為主留夢炎乃瘓狗狂噬反傷其豢養之人尚於兩軍陳前謂我等為假託趙宋鼠竊狗盜乎又其甚者留夢炎上欺幼主則觀望誤國下黨姦相則阿附取容進不能背城借一免君於懷湣之羞退不能伏劍飲鋩盡節作祖宗之氣偷生以逃德祐畏死而降蒙古天地所不載鬼神所不容人類所不齒便當囚首蠻部餂彼餘瀝何面目見我大宋龍興之人物乎皓首匹夫賣國老賊是皆大宋一十八主有靈天奪之魄故令汝今日自來送死遂厲聲大呼曰衆將速拿老賊碎尸萬段韓飛瓊應聲而出留夢炎聽畢氣填胸臆一聲長歎兩足直挺眼昏頭眩翻身墜于馬下登時遂死元軍數員健將忙負人營去蠻子呀班急拍馬殺出敵住飛瓊韓太尉麾動大軍混戰一會飛瓊撥馬便走宋師遂退蠻子呀班葛顗二將初聞韓太尉罵留夢炎之言亦氣餒無心交鋒細見宋師少退急放人馬從後追殺宋帥倉皇不敢入營望寨後奔走元兵搶入營中忽號炮一聲左石雄右王遼兩支伏兵殺出韓飛瓊亦引大軍翻身殺回三路人馬圍定元軍大敗總統葛頠被韓飛瓊一戟刺于馬下副將蠻子呀班心膽俱裂保護人馬奪路而走宋師從後奮勇攻擊都監唐玲不敢停留拔寨而走宋師追至三十裏蠻子呀班曰任汝追襲若至甌城有所恃而不恐矣元軍前哨回報已近甌城蠻子呀班心始放下行不數裏忽見山顛高阜處有宋字紅旗招展山下左側即有一聲鼓響張昌一軍殺出蠻子呀班忙縱馬迎敵山下右側又一聲鼓響朱昶一軍突至唐玲即舞刀交還宋師皆生力人馬以一擊十元兵困乏焉能抵敵張昌朱昶截殺一陳奪得衣甲器械駱駝馬匹糗糧等類無數蠻子呀班唐玲不敢戀戰殺開血路遂走宋將亦不窮追蠻子呀班敗走即遠見宋師已退乃安定魂魄按轡徐行謂衆將士曰今脫離虎口矣約定人馬行進漁梁為梅嶺鳳嶺兩山相連中通一徑處行近漁梁忽鼓角齊鳴旌旗續紛一彪人馬列開當頭一將大呼曰宇文廣在此等候多時元軍將士至此面面相覷都監唐玲忿然曰宋將寧有三頭六臂耶揮刀而出與宇文廣交鋒不三合宇文廣大喝一聲將唐玲刺死馬下宇文廣棄了唐玲直奔蠻子呀班蠻子呀班捨命相敵宇文廣抖擻精神力戰數合賣個破綻將蠻子呀班生擒馬上拔劍在手擬欲割頭蠻子呀班一時魂魄俱無聲聲願降宇文廣知是無用之物遂擲之於地厲聲曰宇文將軍饒汝一死今後若更來侵犯拿住時身首異處蠻子呀班得命即拜伏於地曰元主即將某淩遲處死某亦不復來侵宋矣叩謝而起帶領殘兵抱頭鼠竄而去宇文廣率兵始歸
