body:
  text: 第九十九回韓節度誤釋友諒宋成宗嗣慶六年江右湖廣大飢廣右瑤賊吉烈思及土官黃英岑伯顔等雲擾南寧攻破昆侖關進拔柳州慶遠等郡守臣拓跋琨狄義龐鳳皆死節度使吳炳南不能敵遂緊守桂林廣南潮陽關等處海寇邵宗愚殺戮人民搶州劫郡虜掠倉庫翔龍府留守王耀先鞭長不及潮州高廉等處皆失將士死者甚衆是時陳友定已據建寧正攻福州故武都尚無兵侵犯而江右各郡則方穀珍屢寇而韓飛瓊屢卻之帝日夜焦思令上官朴之子上官璉權為都部署守護杉關以史進之子史全忠引兵一千屯桂嶺扼湘廣江右諸路防賊兵驟至時嶽鎮子嶽奎任樞府種世虎之子種繩武管度支六官多不兼備而致仕者歸隱者上表輒去帝下詔切責然不能禁之衡湘自吳天保蔣丙等倡亂後餘黨未靖韓節度飛瓊恐復嘯聚遂自引一軍徇各處痛加捕剿復擒斬數千人兵至湘鄉偶被巡兵獲二十七人似商非商似賊非賊節度以誅戮太甚恐及無辜乃再三審問內有一人形貌甚偉自言沔陽人以捕魚為生乃避賊者非賊也叩其名自言姓陳名友諒十分剖辨確有可憑節度遂縱之去既而曰此人目動言肆狀亦雄傑必非善類不如殺之以絶異日之患急令人追回則已逃匿不知去向矣節度甚是惱悔引兵巡遍各郡時營陽邵陵全州道州杉靖桂陽俱為元將鄧祖勝等奪去宋已無力爭討所控者武安湘東數大郡而已韓節度引軍回武都復命訖不久遂卒帝為之泣贈少保厚葬之是時成宗雖除五鬼又有三尸一少卿梁佩以聚斂為事朘削小民一大理寺丞冉釗以殘酷為能決獄流血一吏部郎吳鈎貪墨無厭賄賂公行當此國運衰微恰遇此三人扼據要津中外益失所望人心早已解體種繩武纍欲奏免三人而帝方倚之為重疏人不報嶽奎歎曰所謂上與介甫如一人也時事可知矣且説沔陽陳友諒本漁人子曾為縣吏鬱鬱不得志因見天下大亂潛懷異念乃以數十人托為捕魚來窺衡湘不料被獲幾陷羅網逃過大江遂不能久待因與項普略有舊直投蘄水先見倪文俊文俊用為簿書掾既而普略引見徐壽輝壽輝與語大奇之拜副元帥號為天完將獨領一軍乃招其黨如張定邊陳英傑等遂欲縱橫天下時荊襄武昌安陸俱為項普略攻下乃與普略約定普略攻江右友諒竟渡大江取房州直抵嶽陽宋將任安世乃任天鵬之子權守嶽州擁兵出敵戰敗為張定邊所殺遂破嶽州陳英傑分一軍往奪衡陽守將廖重貴戰死周府尹自縊陳友諒兩路合兵進攻長沙此時長沙節度使已廢守臣寇靖海聞陳友諒即韓節度所釋放者乃大怒曰吾父坐鎮長沙十年賊兵不敢正視今友諒犯界是欺某為紈槽子不能戰也率兵三千出城大殺一陳賊兵頗有損傷次日復戰寇靖海麾衆列成一陳名曰六子連芳陳將友諒層層圍定箭如飛蝗賊兵傷者甚衆友諒不識陳法左右衝殺無路可出面中三矢十分危急寇靖海望見驟馬殺入陳中綽起開山大斧正欲劈友諒首級忽馬失前蹄反將寇靖海掀翻在地友諒急捉矛刺之被賊兵將士剁為肉泥宋兵見主將已死其陳遂亂陳英傑張定邊等乘勢督兵截殺死者無算友諒遂入長沙其餘營陽建州武陵等郡勢如破竹陳友諒打聽項普略亦取南康普略將趙普勝戰於湖口殺行省平章星吉普略已進兵襲破吉安友諒聞之遂直過廣南史全忠由桂嶺兼程而進急至湘江深溝固壘不與交鋒友諒無可如何嶽奎聞之亦引兵五百至湘江犄角下寨扼住賊兵相持月余聞宋主成宗有疾嶽奎急引兵暗暗退去回至武都帝隨殂在位七年嶽奎種繩武等輔太子桓即位年方五歲倉卒間請吳太后臨朝垂簾聽政方議遣兵往阻韶州尚無其人忽報陳友定已攻破南關上官都督戰死陳友定引兵長驅而來直搗武都吳太后聞報大驚種繩武曰事急矣臣保太后陛下速幸漳州避之嶽奎奏曰臣誓死守武都宮中諸王妃嬪及朝中文武扈從者即時起行此時陳友諒已戰敗史全忠過了湘江圍困韶州嶽奎一意守定武都惟望廣南江右兩處兵入勤王誰知項普略趙普勝之兵已由臨江趨贛州取建昌矣廣南告急文書一日數至尚未知帝幸漳州嶽奎命都尉劉鋌副將軍石成統制申屠禮金吾將軍慕容萇四將留兵三千守城自統大隊往迎陳友定對敵而友定以長勝之兵奮勇而來武都數十年不見兵戎百姓望風而遁宋兵未戰先自驚愕靡定嶽奎三令五申連斬數十人不能禁止而陳友定之兵已至兩陳對圓陳友定命驍將薛義出馬不三合被嶽奎斬之賊兵少退嶽奎麾兵大殺一陳陳友定奪氣是夜嶽奎出其不意襲其營陳友定大敗而去忽探馬報來江右建昌府已失屈突節度盡節嶽奎著驚又報陳友諒連陷韶州肇慶二郡直打翔龍府宋軍聞之人心慌亂俱無鬥志復戰遂為所乘兵潰副將孟鴻焦肱宇文煥等俱死嶽奎血戰三晝夜衣甲盡赤渾身上下矢集如蝟毛遂拔劍自刎畢竟嶽氏一脈忠義陳友定進攻武都四將與友定背城一戰奈人心不屬士卒多望陳先逃四將亦力盡而死時三尸未扈駕從行遂獻城納降武都一時死節者如侍郎呂穆之諫議大夫耿純學士鄭夢蘭及告老致仕者凡數十人是日翔龍府亦為張定邊所破留守王耀先死之耀先乃老將王方子參政司馬昂被執不屈而死史全忠湘江兵敗聞帝在漳州引兵急趨扈從保護而陳友定既得武都即率輕騎倍道而進攻取漳州時關普靈之子關浩為扈駕將軍與史全忠等引兵奮勇殺賊乃寡不敵衆賊兵愈殺愈衆關浩知事急急命種繩武范景先等保護太后少帝由澄海縣望海道而去關浩率兵死戰陳友定麾衆圍之關浩嗔目大呼陷陳殺其驍將數人已身受重傷至死猶手握畫戟牢不可解史全忠力盡被執陳友定勸之降史全忠睜目大罵陳友定肢解之軍土死者無數其餘汀州延平各郡俱為陳友定攻下分兵回福州自據武都陳友諒既下翔龍府又攻惠州南雄諸處宋臣文武死節者如右丞劉敏參政方連茹府尹王義方統制官扈從龍楊勇藍忠等十餘人元平章也兒吉尼總制張榮亦乘勢引兵襲破桂林郁林思恩節度吳炳南逃去廣右諸郡元人傳檄而定至是宋亡起顯宗重康元年庚子即元成宗之大德四年終成宗嗣慶七年丁酉即元順帝之至正十七年享國共五十八年少帝仍航海而去計顯宗重康十七年昭宗隆熙二十四年穆宗景新十年成宗嗣慶七年重康初立國武都規模甫就君臣皆勵精圖治同德同心隆熙禦極則宋元業已交好內外文武輔導得力生民樂業下詔求涑實恭默守文之主景新初政頗猶可觀後漸興土木弛意奢侈武備不修老成亦凋謝殆盡佞人用事遂荒於政嗣慶即位四海鼎沸六鎮焉能久存加以內外空虛人心散離文治武功兩無其人所謂人之雲亡邦國殄瘁也猶幸三百年養士餘澤未湮顯皇帝亦加隆禮重為培埴國脈故雖偏安海隅其亡也節義之士指不勝屈而君臣仍脫身海外並未作青衣天子從此群雄竊據稱帝稱王者重復紛紛然起矣
