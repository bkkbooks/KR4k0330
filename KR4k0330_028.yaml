body:
  text: 第二十八回劉先鋒修書取漳州卻説邵武路制置使王方乃河南閿鄉人氏登至元初進士有文武才以判福寧州升任此職常謂邵武乃八閩上遊邵武震動則訴流而下諸郡皆魚肉矣此時聞宋師奪了杉關長驅而來李繼業逃回忙與知府常庚揚護軍泰順不哩副統制朱昶等商議應敵之策王方曰宋人不諳向導深入重地為兵法所忌朱統制引步兵一千埋伏鶴沖溪左右其地南道路狹且多葦蘆最利火攻去五裏有山曰樵山下有蒙穀護軍可領騎兵一千埋伏俟敵兵過後擊之吾以大軍策應兩處李總兵與府公護守城池此番縱不能殺退宋師亦令敵人膽落矣分撥已定諸將去訖果然劉瑛史進前哨已過千松嶺漸近鶴沖溪口尚無準備石雄曰前面沿溪路險恐防有詐且王制使知兵不可不慮劉瑛然之分兵三隊而進前隊有失次隊接應次隊有失後隊接應史進奮勇爭先恰入溪口葦蘆中伏兵齊起朱昶殺來史進迎住元兵方才舉火次隊劉瑛已到一齊混戰朱昶敗走史進追及樵山蒙谷內號炮響時泰順不哩引兵殺出史進劉瑛被圍在垓心大戰良久不能抵敵方欲退走後隊劉瑝石雄又到雙馬夾攻用生力兵始退元軍四將合兵追趕不數裏王方大軍已到宋師困乏朱昶泰順不哩領兵殺回四將不支大敗而奔劉瑛不提防被王方拈弓搭箭射中左腕史進捨命衝殺保護劉瑛方免仍舊退回千松嶺下寨涪陵中軍繼至即聞敗績切責諸將俱各謝罪涪陵自提大隊搦戰王方深溝固壘一騎不出涪陵大怒勒兵攻營堅不可入縱馬至鹿角邊細窺其營布置井井有法暗驚敵將不可小覷方欲回馬忽見元營中旌旗麾動一聲鼓響突出精騎殺來有朱昶李庠二將飛馬直奔涪陵大呼趙宋孺子休走涪陵舞劍相迎不三合抵敵不住落荒而走衆將俱被精兵圍裏廝殺不及保護只有拓跋琳一見大怒狂叫如雷飛馬趕上手起一斧李庠落馬朱昶見李庠已死忿怒不休揮刀來戰恰好馬遇陽史進亦到朱昶正慌史進輕舒猿臂活擒過馬元兵始退而宋師亦有損傷三將齊保涪陵回營皇甫惇侯長孺二人諫曰殿下荷興復重任不可親犯鋒鏑語雲千金之子坐不垂堂今後切宜珍重防有他變涪陵口雖允諾心中不以為然命將朱昶監下卻説朱昶有兄朱昌為團練副使聞弟被擒十分忿怒入帳請兵決戰王方不許朱出不悅而退次日朱呂引本部人馬竟不奉令直來宋營討戰衆將已有準備命石雄引一軍略戰數合詐敗以驕之朱出性烈如火大驅人馬恨不踏平宋營救出朱昶忽連珠炮響兩軍殺出右有馬遇樂左有查士珩元軍圍在垓心朱出危急卻得泰順不哩引兵殺入朱出人馬已損大半狼狽而歸王方怒其不遵軍令喝令斬之衆將再三請饒王方怒始稍解曰且看用人之際押赴軍政司重責一百軍棍打至五十衆將又苦苦告免方始發放降副使為萬戶朱出滿面羞慚而退宋營得知涪陵命放過朱昶賜以酒食撫以溫語令往元軍招降朱出朱昶欣然願往偷入營中與朱出言及此事朱出正含恨在心約內外夾攻以火起為號朱昶復命訖一日王方大出軍馬與宋師決戰良久未分勝負忽元軍後帳屯糧處火起王方情知有變急往救護突出史進劉瑝二將將王方抵住宋師已攻入營中泰順不哩見前後皆有宋兵棄營而走被拓跋琳斧劈兩段元兵大敗王方一騎馬一杆槍潰圍殺出領殘兵急奔邵武遠望城上靜悄悄不見一軍心中大疑令軍士大呼城上問為誰王方答之忽一聲鼓響刀槍齊豎劍戟林立涪陵憑闌坐定左有劉瑛右有馬晉臣指定王方笑曰將軍何自苦不如歸順宋室名列鼎鼐爾副將赤爾溫吾已誅之矣將首級擲下王方怒氣填胸揮兵攻城只見城門開處張懷亮飛馬殺出大呼休要走了王方馬遇樂從東門殺出查士珩從西門殺出一齊來捉王方王方知是不敵忽見亂軍中一將白馬銀槍所到處宋師披靡細認之乃杉關總兵李繼業也二人號召敗殘兵馬殺開血路望漳州而去涪陵盡降其衆重賞朱出朱昶衆軍俱有犒賞出榜安民又召父老而諭之曰胡元禦宇殘酷備至天變疊興水旱不時幹戈四起以致爾等橫遭流離死亡之慘吾今率兵先奠閩廣光復宗社以閩廣昔年遭塗炭尤甚也閩中乃昔年朱子講道之鄉百姓深明大義事定尚當輕徭薄賦以蘇民困兵行處秋毫無犯各安生理勿致震恐邵武百姓鼓舞大悅皆曰今後復為宋民矣涪陵駐師邵武以控要地張懷亮史進查士珩三將領兵三千取汀州劉瑛馬遇樂拓跋琳三將領兵三千取澗州先得者便為首功衆將去訖卻説汀州乃甌閩奧區倚山為城背負嶺表轄八縣而當三面有雲棧天梯地極險阻守將乃中尉蠻子沙以地險可恃不修武備警報置之不理宋兵入境過蓮峰山張懷亮喜形於色史進曰將軍未見敵而喜何也張懷亮曰此山東傍蓮城峭壁攢峰連互數十裏乃天險也此處無兵把守汀州已入吾掌中矣查士珩曰前去尚有鶴鳴雞籠二山連控隘道不可不慮張懷亮曰蓮峰之險且不守況二山乎果然兵行處如人無人之境耕夫皆荷鋤而觀師至荷囊嶺離城不遠令人哨探回報隗府尹鈎考錢糧甚急中尉蠻子沙日在醉鄉全無準備張懷亮大喜曰我兵遠來人馬勞頓倚山為營以防不虞來日當一鼓下之三將皆久練沙場當夜自然小心夜半後忽陰雲四合狂風暴雨驟至風雨中若萬馬奔騰之狀三將大驚急起看時見山前一派霞光五色燦爛光耀奪目少頃見一黃衣人高丈余舉手向三將言曰汀州可惜一時雲霞飛舞風雨頓息黃衣人亦忽然不見三將大疑曰豈汀州未可取乎次日急尋土人問之土人曰此處地名獅子岩乃定光佛駐錫所在山上建有梵宮香火最勝近因隗太守為中尉祈福每來梵宮大作功德故近來香火尤倍於昔三將問曰隗太守官聲何如土人曰趨承上官刻薄小民其他小人不敢言三將命賞賜土人去訖張懷亮大悟曰所言汀州可惜者乃汀州百姓可惜也某三人當於神前立誓城下時不妄殺一人惟貪殘官吏罪在不赦史進查士珩深善之三將隨至梵宮果見佛像與夜來黃衣人無異暗暗禱告拜畢回營下令曰此去城下時若有妄殺一人者不問兵將立當梟首三軍肅然師至城下蠻子沙猶踞胡床擁侍妾吹竹彈絲轅門尚聞鼓樂之聲太守府中亦在內衙施瑄楚敲比錢糧諂附中尉助桀為惡汀人恨入骨髓聞宋師大至爭開城門宋師一擁而入府尹隗廉為亂軍所殺蠹役胥吏平日作城狐社鼠者俱為汀民殺而食之蠻子沙擁數員健將奪門望福州而走軍士阻攔不住飛報府中被史進追斬之兵不血刃遂下汀州三將撫輯軍民父老稱慶衆官皆降惟長汀縣韋蔚文閉戶掩泣誓不投降坐以待死諸將請殺之張懷亮不許曰某等所以神前立誓者正為此人耳親造其門曉以大義再三安慰韋縣令感其意誠乃降張懷亮即請韋蔚文權攝府事查士珩領兵鎮守遂回兵邵武報捷涪陵重賞諸將隨命劉瑝鎮守汀州換回查士珩總制杉關以朱呂朱昶副之二將欣然去訖忽報吉安府長孫太守遣葛縣令來邵武納降涪陵忙令請入葛天民進見起居禮畢將降書圖籍呈上涪陵覽罷安慰備至隨有皇甫惇侯長孺各敘契闊涪陵因問長孫太守公子一事葛天民曰如意逃去今尚未歸梁氏念子奄奄待斃太守近來方寸已亂事無大小皆天民處決因思吉安乃江右第一富饒之郡又形勝名區早不納款定為他人竊據異日殿下又多一番爭戰矣不如此時遣使鎮撫以便專意南征涪陵極口稱謝曰贊成故宋之業者皆先生之賜也設宴款待甚是浹愜次日因命皇甫惇馬遇陽隨天民至吉安撫慰軍民去訖且説漳州控引番禺亦是要地守臣乃囊瓦後身出桑哥門下姓盧名世華兄名世榮為工部侍郎掊克聚斂得幸世祖世華以出入桑哥之門拜後將軍轉運使兼知漳州府事逐日會計出入鈎考錢糧汰減軍餉刻薄吏胥凡受節制官校靡不被其裁抑武備廢弛防守無人幸得王方李繼業二人來投代為區畫略修守禦然世華傲睨自恣臨下無禮少拂意便箕倨謾罵李繼業每屈受之王方不能堪而世華尤忌其能多不禮二人料宋兵既下汀州漳州難保無虞極力整飭戎行修樓櫓挂氈幕安炮座設弩床運磚石施燎炬垂櫑木備火油凡防守之具漸次修理厲兵秣馬人心始固恰好宋兵已到劉瑛見城中並無動靜知有準備就城北銅鉢山犄角下寨次日搦戰見王方守城李繼業出馬劉瑛暗驚二人卻在此間又遇徑敵拓跋琳指李繼業曰既敗之將又臨軍陳想汝狡兔有三窟也李繼業怒曰杉關偶失機會汝等遂得猖獗此間無非大元地土有吾在此汝等立見其敗也拓跋琳即與交鋒二人抖擻精神大戰五十餘合未分勝負劉瑛恐有失鳴金收軍逐日交鋒宋師頗有損傷又聞張懷亮已取汀州毫不費力得了首功劉瑛等甚是焦急繞城遍看無瑕可攻徒戰則元兵或一日一出救應出奇不至大創相持月余而宋師反傷了健將杜容李恢張懋才等數人一日李繼業領兵出城檢空闊處布成一陳名曰七星八卦陳大呼宋將能打陳否劉瑛等登高阜處瞭望見陳內旗幟森嚴金鼓響處七將穿插在八門之中各按星曜各正方位布置得井井有條變態風雲大有聲色拓跋琳恃勇欲進劉瑛馬遇樂齊聲曰不可將軍不請陳法誤入其中徒傷將士耳別尋計破之劉瑛始知城中全賴王李二人保障盧世華以行尸走肉又貪婪又忌刻欲下漳州計從此出遂布散流言説王李二將軍屢敗宋師威名日著所以不退宋師者欲借宋師立威奪盧轉連後將軍印也此言傳入城中盧世華果然起疑又兼軍民無不推仰二將保全漳州盧世華益發羞惱成怒暗與心腹將校計圖二將繼業連日請戰盧世華不許詞色之間未免綿裏帶刺泥中藏針王李二人寢食不安劉瑛知此消息修書一封拴於箭頭覷定無人射入城去有小校拾得獻與王方方拆書觀之書曰仆聞智者觀時達者審勢時勢可為決策而定大計比如順風而呼聲非加急其勢疾也若時勢已去外有強敵內有掣肘縱使雄才大略抱不世出之資亦笑越客徒勞耳況手無寸尺寄人籬下讒語蚊聚流言疊起不惟難建非常之功亦且恐蹈不測之禍尺紙到日不忍坐視附呈一律祈請殷鑒詩雲胡馬南來久不歸山河破碎一身危功名誤遇等雲過歲月驚人似雪飛每事恐貽千古笑此心甘與衆人違艱難重有君親念血淚斑斑滿客衣王方覽畢暗思宋將雖系反問恰中心病正在沈吟李繼業亦至王方付書與之繼業觀至後面忽然色變淚下如雨王方大驚問之繼業泣曰此詩乃先高祖若水侍郎盡節時絶命辭也宋將不書別情單用此詩我殊內愧繼業當即日挂冠匹馬歸去王方曰汝祖若水盡節于靖康我祖剛中獨非盡忠於紹興乎責以事仇之義我等皆名教中大罪人也繼業益發欲去王方曰不可岑彭歸漢亦上雲台尉遲投唐終列麟閣我等以昔日事元者改而事宋失東隅而收桑榆於公可乎繼業尚遲疑未決王方大怒曰凡處大事明斷而成何狐疑之有隨修回書一封射下城去約會宋師黃昏入城以白旗為號且知城中軍土皆無戰心可為己用暗暗諭之無不願降惟市舶使賀璉兵屯齊雲閣堅如鐵石立意仕元説之不動二人不以為然至黃昏時宋兵果來圍城王方連發火箭豎起白旗剛啓北關忽賀璉一馬殺至手起槍落王方滾鞍下馬衆軍救起李繼業隨至大怒與賀璉巷戰不休宋師已入拓跋琳當先殺來斧劈賀璉打入帥府盧世華冠帶自刎馬遇樂生擒指揮石守義劉瑛亦獲都鈐轄霍仙芝俱皆願降出榜曉諭軍民大悅要知漳州府東南即是大海珍寶雜錯番船畢集府庫殷實商賈輻輳劉瑛隨即報捷邵武即率衆將至漳州安撫軍民賞勞諸將王方命醫調治病愈試用李繼業權鎮漳州侯長孺知府事兼市舶使涪陵就水雲館大宴賀諸將人閩戰功命文臣賦詩以紀其事
