body:
  text: 第二十六回涪陵公兵進邵武卻説涪陵既得撫州駐軍建昌遂遣張懷亮馬遇樂並新降查士珩馬晉臣等分頭攻拔會昌石城寧都未下州縣遂達揭陽以通閩廣一日馬遇陽引史進來見涪陵迎入帳中史進拜伏於地曰史進今日有主矣涪陵挽起賜坐寒喧畢史進遂將南安版圖呈上涪陵驚曰將軍已得南安乎是何神助如此其速史進備陳糾合拓跋琳襲取南安方略涪陵大喜手撫其臂曰得將軍大宋有光矣即遣皇甫惇去撫慰南安三關等處以馮道南知府事三關將士皆有犒賞史進隨軍聽用署右先鋒之職史進聞長寧未下願領兵去取長寧涪陵許之忽報有吉安太守公子遣使納降涪陵怪而問之則太守姓長孫名軌其子名如意如意狎昵比匪與諸惡少時同臥起日遊廛市太守屢戒不從怒加鞭撻母氏梁夫人曲為庇護與太守往往反目公子如意益無忌憚或朝出而暮返或一出而不歸民婦有貌美者輒思染指人家有一花一木可供賞玩者皆抉牆撤屋取之而去廝仆倚勢貪橫人皆苦之縣尹佐二徇情匿不以聞故太守署內綱紀益發不振梁氏愈縱如意益橫所謂世祿之家鮮克由禮良可歎也如意好佩鶉不惜百金市一俊鶉錦衣健翮系以金鈴行止所在鶉皆從之一日遊至城南淩波亭如意科頭箕踞於亭上俯瞰江流空中飛過秦吉了數頭啁哳有聲如意所佩鶉振翼疾飛逐去豈知秦吉了出自南中黃冠紅頭耳聰心意舌巧能言錦鶉身帶金鈴逐之不上從空落下正當縣南汪涯鐵十字處為民家一犬嗾之立斃如意一見槌胸大哭若喪父母一時惡奴廝仆等扭其人至榜掠無完膚復交縣尹治罪如意被發號泣跣足入廬陵衙中縣尹設詞安慰如意堅執請破家償金誅民抵鶉縣尹無可如何含糊問過命且監下誰知此人傷重當晚斃於獄中縣尹謂此人已死如意當無言矣遂置不問民家冤屈無伸人人傳説皆謂今後家家不再喂犬矣當時吉安合當有事縣令告滿離任繼者正是錢塘葛天民下車一聞其事大怒即捕惡奴一人杖殺之據情以報太守太守如夢初覺將如意痛加斥責梁夫人方欲開口太守罵曰骨肉事小官方事大有玷官方恐骨肉亦將難保矣梁氏語塞太守因即禁錮如意不許出署梁氏暗縱之去女口意深恨葛令諸狎客復慫恿之遂出一策願獻吉安自為內應城下時殺了葛令可報此仇一日背父潛逃親至建昌納款涪陵聞之大怒曰叛君父者不忠不孝莫謂區區吉安一縣即全奉豫章趙某亦不受此姦命被天下非笑也立命逐出諸將請曰如意固屬非義機會亦不可失也涪陵曰子父不姦之謂禮守命共時之謂信管仲尚能以此相齊諸公獨不能以此相某乎古人言行一不義而得天下不為況區區一吉安獨無他策以下之乎諸將惶恐而退卻説葛天民已知如意叛父獻款私往建昌笑曰此呆孺子耳不惟無功且將被斥遂故作倉皇之狀稟知太守以探其意果然長孫軌驚得手足無措一面令人守城一面入內尋梁氏大罵睜目切齒氣填胸臆口中説不出字直奮老拳迎面欲打猶未下手梁氏竟先批其頰一把扭住拔落髭須無數太守拽足拽手未及扳著梁氏而滿面血迹已皆梁氏指爪之痕幕客門役等亦驚慌無措齊為勸解方始丟手葛令在外衙袖手冷笑不止太守此時不便升堂理事令葛令請萬戶推官都監等商議守城又委三衙等點查戶口以防姦細城中出入密加盤詰又令人役拆毀城外民居許多吩咐一時傳出葛令徐稟曰不勞張皇吉安高枕無憂太守問何意葛令曰鄭公子華之事府祖所知也故宋興復之兵豈受姦命太守頓悟後聞如意果然被斥逃去不歸密捕狎客等亦不知去向方始放心且説涪陵在建昌不問吉安命將鎮守各處整飭人馬擇日起行沿嶺直過閩中先打邵武拓跋琳在上梧關聞之亦以兵來會合於臥佛岩住臥佛岩者相傳昔日有頭陀臥於石上七日不去遂坐化於此故名路皆險惡幸得拓跋琳熟諳此處路徑履險如夷涪陵勞慰備至拓跋琳曰前去五十裏有飛狐嶺連控隘道再去三十裏杉關嶺一連江西新城縣界一接福建光澤縣界乃二省交界處所邵武路重鎮也殿下不可不防涪陵深然之命諸將量敵而進不一會果見一嶺巉岩峭壁連雲摩天隘口上有藍旗招展涪陵曰此飛狐嶺也前哨乃劉瑛為正先鋒史進副之一至嶺下史進勒兵討戰元兵萬戶龍從雲出馬十餘合被史進一槍刺死劉瑛督兵攻殺元兵退走遂搶了飛狐嶺報人中軍繼進沿途山勢凶惡林木叢雜劉瑛史進率軍士緩緩而行忽路旁飛起一鳥狀如鴟梟蓬首而人面足如人手向著衆兵長鳴曰鴸鴸三軍突見異鳥無不駭然齊聲呐喊史進引弓一發帶箭望西南而去一時驚動山谷又出一蛇長過數尋青黃其色青黑其首蜿蜒昂頭高起丈餘尾如風聲見人如飛而來三軍慌忙一齊亂箭射去蛇尚翹首四望目煒煒有光鳴聲如磬口出毒整狀如炊煙觸者皆頭悶眼暈嘔吐不止三軍不敢前進中軍拓跋琳大怒欲仗劍往斬之涪陵止之曰將軍雖勇奈有毒螫不可近身命軍工以神臂弓射之然蛇近無有躲處軍士皆遠遠而射百步之外多不能中馬晉臣請以轟天雷擊之軍士急安置炮座方欲發動藥線誰知炮不舉火衆軍錯愕不知所出蛇已張吻乘勢飛來一時軍士奔走不及者咋而食之齧者立斃觸者皆頭痛欲裂瞬息之間蛇已化為悠然丈夫長有丈餘高語曰余玉京王世子將過柴桑歸洞庭爾非寄奴焉能阻吾去路諸將駭絶面面相覷涪陵拽滿雕弓嗖的一矢丈夫頓仆仍化為蛇涪陵事急智生急命軍中取一鬥雞來雞聞螫氣振翼長鳴毒整全無再鳴一聲蛇已俯首衆軍刀槍並舉砍碎為泥少時軍士受毒者俱大吐不止衆將問其故涪陵曰雞食百蟲能吸毒螫此夏禹制驕蟲法也衆將皆曰蛇之大者至此無以加矣非殿下以法斃之其毒幾不可制涪陵曰蛇之大者固不止此然某昔在暹羅時飲過香雪春味甚甘美其蛇可以釀酒又在海上遇鮫人時見一異蛇闊五寸長五寸厚一寸首尾俱齊如綢帛五色相錯而方口大如鬥某不知為蛇而以為手巾也方欲拾之鮫人曰此扁蛇也某方悚然少時其行如飛比狡兔更速始知蛇更有扁蛇圓蛇方蛇之類但不知此蛇自言為玉京王世子過柴桑歸洞庭作何解耳時候長孺隨行在軍進曰昔安期生每跨蛇以朝玉京故謂蛇為玉京子又柴桑有地名曰蛇裏意者過蛇裏乎寄奴新洲射蛇固以殿下今舊一箭應之而又雲歸洞庭者必是巴蛇方有此巨即吞象之蛇也涪陵問巴蛇何以於洞庭見之長孺曰夏時後羿射殺一巴蛇在洞庭湖邊腐後其骨撑持若陵故曰巴陵此其證也又帝堯有善射之臣曰羿擒封豕于桑林屠長蛇於洞庭合而考之總不外巴陵取義一事故知此蛇必巴蛇也涪陵甚喜長孺考據之精諸將皆歎其博洽遂傳令大軍起行直叩杉關且説杉關乃邵武咽喉有都督韋權總統曹瑜副使李繼業三將把守共有五千人馬聞宋兵至大開關門出戰劉瑝與曹瑜交馬十余合曹瑜詐敗而走劉瑝欺曹瑜年老縱馬來追李繼業引伏兵殺出宋師被圍劉瑝左右衝突不出正在危急忽史進引一支人馬從東南衝突而來將元兵分為兩段劉瑝始得全軍而還韋權曹瑜商議曰宋師此來鋒芒甚鋭須如此如此方能取勝李繼業隨遣健將李弼吳宣去訖令守關軍士多設炮石弓弩閉關固守不與交鋒相持不止一日涪陵營中漸次糧草不繼按日計程馬遇陽應該五日前運糧早至遲延許久沿途恐有疏虞急令拓跋琳引本部兵去催趕接應拓跋琳去後三日更無回音軍心慌亂一連數日士卒全無支給口出怨言涪陵行坐不安又命史進火速前去催督史進猶未起身忽杉關上擂鼓搖旗呐喊而來軍士皆無鬥志喜得衆將堅布鹿角緊閉營門用神臂弓翼以破敵弓退之皇甫惇又進連弩法侯長孺又造霹靂炮士卒皆忍飢死守營不得破且説馬遇陽押定糧草惟慮著飛狐嶺路途險隘不防臥佛岩相去十裏蜈蚣嶺兩廂俱是峭壁孤懸一徑出峪二小路一達杉關一通蓬頭寨惟過嶺一徑路稍平坦差遠數裏乃杉關大路馬遇陽催趕糧運一心趕急直取小徑入峪四望見南道路狹草木蓊鬱心中狐疑約住人夫命哨探而進言未已忽一聲梆子響李弼一軍殺出箭如飛蝗馬遇陽不敢戀戰慌忙且退後面吳宜又引兵截住去路馬遇陽叫苦不疊又逼隘道無力可展令軍士捨命而護定糧車腹背受敵看看勢力不支搶去糧車無數挨至晚下馬遇陽幾次突圍欲奪路出走皆被亂箭射回元兵前後緊緊圍定星月之下俱不敢少懈披甲荷戈松風刺骨又聞草蟲亂鳴入耳悽楚惟見宿草遍野滿目蕭條一片英雄心幾乎化為烏有馬遇陽仰天歎曰天不欲復興大宋也何其絶人太甚耶遇陽心中十分惶惑恐軍中無糧軍心有變又慮身入險地無從用武左右尋思來日不可不死中求生一時一股雄心按納不住似左右麾下不少千軍萬馬添力助威回視元軍直芻犬土雞耳次日結束停當一刀一馬奮勇殺出正遇吳宜擋住去路遇陽咬牙切齒大喝一聲刀劈馬下忽元兵在前者紛紛擾擾轍亂旗靡拋戈棄甲者無算只見拓跋琳引兵衝殺如入無人之境元將李弼迎住交手不三合被拓跋琳一斧砍死元兵死者甚衆餘者逃去馬遇陽大喜急督軍士奪回糧車二將合兵一處遇陽深謝拓跋琳救援之力拓跋琳亦言奉涪陵殿下之命催趕糧官此方路徑無過某熟某正慮此處地險有詐恰好遇著營中已無糧食三日矣馬遇陽大驚不分星夜急急催行中途又通史進亦言奉命催糧軍心將亂恐為元兵所乘馬遇陽益發急如星火趕赴營中交割後伏地請死涪陵甚怒誤限之罪幸未失糧姑免深究將遇陽喝退一時三軍得食歡聲如雷次日即命史進率兵搦戰韋權開關令驍將李通出馬史進抵住戰了數合宋軍陳後先自紛亂乃曹瑜李繼業引奇兵從關左抄出截斷後軍劉瑛弟兄奮殺不退元兵儘是鐵騎不能抵擋大敗出走史進回馬來援亦被圍垓心正在危急有中軍張懷亮馬遇樂各引兵一支透入重圍始將史進救出查點人馬折傷無數劉瑛史進入帳請罪涪陵曰非汝二人罪乃我兵不識地利故也今後進兵各宜留意不可孟浪諸將退出拓跋琳入見涪陵願往哨探關後路徑涪陵戒以小心拓跋琳遂扮作樵夫模樣直過半嶺見蘿徑蔓延荒草滿目峭壁危立闃無鳥聲更行十餘裏見雲氣浴郁中露出林巒林中聞伐木丁丁拓跋琳急急趕至林邊有二樵子在內相和而歌歌曰深山伐木遣情懷獨步間行上石崖樵罷歸來觀夜月逍遙勝似陟金階歌畢二人拍手大笑拓跋琳聞之自歎不如樵者清間也入林問以關後路徑二樵子俱言不知急急擔薪如飛而去拓跋琳悵望良久見關後多是懸崖峭壁惟有鳥道並無人徑遂下嶺來轉過峪口倏見一小溪水聲潺潺直過關南心中暗喜有溪必有徑遠望隔溪一帶皆荒林茂草緑褥蔥翠怪石臥起沿溪看去不數裏忽山凹有一乞者手中橫笛一路長歌而來歌曰賦性孤高似野牛銜杯執杖過汀洲竹籃向曉提殘月檀板臨風唱晚秋兩腳踏空塵世界一身曆盡古今愁平生不受嗟來食村犬何勞吠不休乞者歌罷一見拓跋琳驚曰將軍為何來此拓跋琳訝之誑以樵子乞者笑曰將軍休得瞞我明修棧道暗度陳倉杉關後路非我不能知也問其姓則曰姓石名雄汀州歸化人氏在家不事生産習慣武藝流落至此將軍欲過杉關若能摯帶石雄即是向導拓跋琳問習何武藝石雄放下竹笛隨於籃中出流星二枚使動之下寒光一瞥呼呼風聲又如二白龍天矯攫拿一上一下不見人影拓跋琳大喜即命同行隨入營中稟見涪陵叩以關後小徑從何偷渡石雄曰此關控八閩之上遊據嶺表之要害山扼江右水引樵川若無杉關是無邵武也關後素無行人惟出紫雲峪轉石子埡渡落魂澗上天梯嶺嶺左右有二小路由左出則大風窩九龍坪鳥扳石直抵關後即此關間道也出右則狼毒山仙壇觀藍田道通五龍穀合蜈蚣嶺由江右去矣但沿途皆羊腸小徑只容一人一騎不堪隊伍涪陵歎曰馬遇陽運糧被陷不諳此間道故也地利可不審哉隨令張懷亮拓跋琳馬晉臣三將領精兵一千以石雄為向導抄出關後前後夾攻涪陵自率諸將頭帶沖天金風雙翅盔身披黃金五環鎖子甲腰系紫絡寶縧金彎帶挂劍上馬親臨行間直抵關下搦戰一時士氣百倍元兵屢勝不以宋師為意又聞打關韋權欲守曹瑜欲戰李繼業請二將俱守自己率兵出戰剛開關門史進一馬突至李繼業抖擻精神戰了一會史進狂叫如雷力不少懈李繼業戰史進不下虛掩一槍繞關而走涪陵將旗揮動馬遇樂領兵從東殺來查士珩領兵從西殺來劉瑝領兵從南殺來劉瑛領兵從北殺來元兵一時沖散兵不顧將宋師遂圍了杉關關上韋權曹瑜方欲出兵救應忽報飛鶴嶺有兵直襲關後韋權大驚忙令李通王雙火速往護誰知石雄已早爬上軍士蟻附而登王雙被石雄舉起流星死於非命李通亦被亂軍所殺前關亦奮力攻打韋權力不能支望闕拜謝曰臣力竭矣誓將一死以報國恩遂拔劍自刎宋師斬關直入曹瑜巷戰馬蹶死於亂刃之下李繼業匹馬逃往邵武而去餘兵盡降涪陵入關出榜曉諭軍民安堵秋毫勿犯重賞石雄大犒三軍養精蓄鋭不日進攻邵武又將韋權曹瑜二將尸首收殮葬于關下以旌其忠
