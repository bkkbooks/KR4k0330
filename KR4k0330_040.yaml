body:
  text: 第四十回藍天蔚棄暗投明壽陽偽將藍天蔚由南陵敗走吳興時耿星星鎮守吳興二將商議欲雪敗衄之恥耿星星乃移兵屯石門縣走馬岡遙為聲援藍天蔚領兵由秀水海監偷渡涇水直走南陵過石礱磯拿獲沿江屯衛守卒用為前導襲破南陵時寧國府守將乃指揮劉成即劉遇隆也火速提兵來爭南陵大戰於朗陵坡劉遇隆三戰不勝遂失南陵退守石柱關藍天蔚直抵關前索戰劉遇隆少年亦頗有識因出牛千餘頭角束利刃尾施油炬列為火牛大陳以禦之藍天蔚久經沙場望見火牛笑曰此死法也豈可再用令軍士速掘深塹寬丈餘長十餘丈復翼以強弓硬弩一牛仆二牛必不能行然後令善射者發弓矢直射牛鼻牛負痛狂奔元兵必潰既而藍天蔚略與交戰佯敗繞塹而走元軍中放出火牛勢甚猛烈果然一牛仆二牛便阻弩箭直中鼻上牛痛急亂竄元兵白相踐踏死者無算藍天蔚督兵掩殺一陳劉遇隆棄關不守敗入旌德城中堅閉不出藍天蔚圍之三匝劉遇隆暗思賊兵遠來糧必將盡能戰不能守旌德城小而堅積儲充足準備持久俟糧盡擊之誰知藍天蔚亦早計及此因敵就糧督兵攻打不三日攻陷西南一角元兵不支劉遇隆恚甚躍馬下城挺槍直取藍天蔚劉遇隆怎敵藍天蔚不數合大敗而走藍天蔚又奪了旌德方喜士卒得食詎劉遇隆出城時早約守城軍吏如勝急鳴鼓助戰敗則火焚倉庫棄城而逃一時煙漲蔽空不能撲滅連庫糗糧一火煨燼藍天蔚歎息良久急遣裨將火速往廣德州借糧以濟燃眉時廣德州守韓某系賈智深妻舅智深素與藍天蔚不睦州守又忌其功竟不與糧先是韓某鎮守廣德京口都督彭悅兵來時韓某死拒建平縣之諸葛城百計禦之彭悅久而無功引退韓某當萬俟蠣去後仍權州事至是聞藍天蔚連復二縣暗遣心腹至壽陽與賈智深説知智深瞞過恢復二縣之功劾其貪戰邀功越境啓釁乏糧必敗有失淮南鋭氣偽王秦錫帛于失陷鳳陽時即有心殺之奈史獻白壽莫綏猷等保奏免今又妄動致敗益中其忌怒命史獻白壽以檻車囚至壽陽殺之史獻白壽沿途打探則藍天蔚連戰皆捷收復南陵旌德太平宣城四縣劉遇隆抵敵不住死守寧國府相持未決藍天蔚築起土山以瞰城中日夜攻打劉遇隆漸不能支藍天蔚下令軍中限三日下之恰好次日史獻白壽檻車即至藍天蔚接待畢史獻白壽因述來意藍天蔚曰參政奉命囚某某有何罪或出淮王本意抑賈平章之主見也史獻白壽曰雖出淮王令旨乃賈相奏將軍貪戰邀功引兵越境致敗有損國威故有是命今將軍連復數縣所戰皆克則左相所奏皆虛誑應坐史某當回壽陽與將軍辨明此功水清自然石見藍天蔚曰某若攻寧國不下願就檻車以正擅兵越境之罪某之功罪皆賴右相一言耳説罷恚怒不已深恨賈智深忌妒有誤大事自念理直氣壯亦無囑託更無饋送史獻白壽怏怏出營路過廣德州州守賄賂甚厚二人甚合心事盤桓數日計議停妥回至壽春直奏藍天蔚握兵倔強不就檻車大王可命廣德州守就近以兵襲而擒之久則生變錫帛許之賈智深即令人往廣德州去訖州守既得密旨即擁檻車一乘刀斧手五百人直望寧國而來方至中途聞藍天蔚已破寧國大驚頓足曰計不成矣躊躇一會令藏去檻車直投宣城令人報入府中説淮王已知將軍恢復寧國功可贖罪令韓某權攝府事請藍將軍面敘藍天蔚心疑命人哨探韓某來此曾帶人馬否人役回報隨行五百刀斧手藍天蔚立即上馬出城遂遠望見韓某領五百刀斧手一字兒列開藍天蔚縱馬上前方欲施禮韓某手中弓弦響處箭已當頭藍天蔚急閃一手接住大怒曰與爾素無冤仇如何暗害某當走訴淮王誰功誰罪韓某大言曰奉命拿獲叛賊以正國法軍士一擁圍住縛定韓某直入府中盤查倉庫錢糧打點章奏擬三日後即押赴壽陽正法藍天蔚怨氣沖天終日悶懨欲死不數日又聞淮王令下不必械赴壽陽即于宣城處決以有前功賜仰藥自盡藍天蔚聽罷大驚曰某與淮王患難相從今事業未成遂忘故人耶一時憤惋至於泣下既而曰鳥盡弓藏古人皆然況某等乎靜以待命而已恰好劉遇隆兵敗琴高山得此消息大喜不分星夜倍道而進一鼓襲破宣城轉奪寧國下令曰有人生獲藍天蔚者千金重賞有傷其生命者族誅元兵急將藍天蔚擁入府中劉遇隆親解其縛扶之上座納頭便拜曰以將軍才略何不輔弼大元掃清宇內名垂青史奈何助桀為惡乎藍天蔚羞慚滿面無可措辭惟請死塞責而已劉遇隆笑曰將軍何執迷也爾主起義惟將軍相從最久猶聽讒言檻車就征即以報將軍之功也將軍何負于爾主哉今大元一統群雄竊據者不久即滅將軍何不三思乎藍天蔚曰某本順昌弓手亡命江淮自謂擇主而事不負生平詎知血戰半生為賊黨所賣不忠不孝兩無所辭尚復靦顔人世耶將軍若施法外之仁赦某還鄉老死壟畝若欲歸元寧作刀頭之鬼劉遇隆見他執意不從艴然不悅曰遇隆以豪傑待將軍將軍猶以木偶人視遇隆也仍令囚之劉遇隆始清查戶口修理城垣吊生問死召集流亡約有數日安撫早奏以劉遇隆失陷寧國府兼四縣法應斬決念已恢復宜逮入京交部議處差官到日劉遇隆錯愕不知所出褫去衣冠束手受縛自入囚車差官簇擁而去藍天蔚在獄中歎曰夫差誅子胥勾踐殺文種何不約而同也耶律淵聞遇隆已去乃調合肥張知白來守宣城控制要害以防賊兵竊發原來張知白亦素聞藍天蔚將才可用一到寧國即放出囚車薦往京口彭都督處藍天蔚拜辭去訖暗思劉遇隆械京逮問年少可惜當設法救出此人共投明主方不辜負一場邂遁藍沿途打探聞已過丹陽喜曰計在是矣遂直往鎮江投入都督營中將薦書呈上彭悅令為裨將隨軍聽用有功升賞藍天蔚即請將令沿途巡哨彭悅許之藍天蔚賺得將令乃急出城追至金壇款住差官且言彭都督有密語囑託請暫回京口緩行數日差官驗過令箭約住人役仍返舊路暗思彭都督必有賄囑時劉遇隆在車中見軍官乃藍天蔚心中大疑藍天蔚頻顧以目遇隆不省是夜宿於青龍鎮藍天蔚一人破鈔大犒人役無不歡喜過望差官與藍天蔚呼盧暢飲亦酩酊大醉至夜深睡熟藍天蔚為劉遇隆落去肘鎖附耳曰趁此月明館驛後越牆可遁二人偷出鎮後直渡青龍灣劉遇隆始問曰將軍為何來此藍天蔚曰有繼任寧國府守將張知白薦某京口聽用某思將軍少年可惜故賺得令箭救出將軍另投明主也不枉與將軍爭戰疆場一番識面劉遇隆稱謝曰兔死狐悲物傷其類遇隆得蒙拯拔足覘高厚未審瞻烏爰止於誰之屋耳藍天蔚曰今日欲投明主惟歸故宋耳劉遇隆曰屬在敵國恐不見録藍天蔚曰不然江右閩廣收録多少豪傑而況我等千里投奔乎前日某所以不願歸元者只此故耳劉遇隆始悟二人遂望廣南而去卻説差官次早直至日上三竿高臥方起喚醒人役不見劉遇隆藍天蔚驚得目瞪口呆不知所措從人曰且去京口問彭都督如何妄發令箭失我欽犯並問金壇丹陽兩縣令作速追緝大人或可免罪耳差官然之投入營中説知此事彭悅暗吃一驚明知為令箭所誤卻又不肯任咎惟問差官交還令箭差官無言而退再問兩縣縣令亦言欽犯若在監獄逃遁責不容辭驛路限期業已逾界三日縣中不與聞也差官默默左右思索難免一死托言且稟安撫于中途亦逃去祝發人山不知所終
