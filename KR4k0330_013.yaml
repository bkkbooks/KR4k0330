body:
  text: 第十三回智深獻策掠廣陵且説楊鎮龍既得太平與史進慕容光等議進取之策降將夏貴曰太平乃建康門戶既得太平建康震動必有重兵來伐不如緊守牛渚採石二磯並各隘口一面召募養兵以待再舉未遲史進曰不然太平令與鳳陽犄角相助安豐路不便出師若伐鳳陽則太平襲其後若征太平則鳳陽乘其虛分兵則勢已孤且江南屢遭兵戈士馬不備至糧運多赴海道達上都元人雖來無能為也宜乘破竹之勢直搗宣城就取寧國機會誠不可失鎮龍兩從之一日史進領兵欲行將取寧國慕容光引二人入帳鎮龍視其人岸然風骨狀如熊虎蓋即廣南之耿星星張師旦也饒平一戰鍾明亮兵敗自刎二人逃此鎮龍當用人之際一見大喜即署麾下二人願隨史進共取寧國史進心薄其人不許二人固請鎮龍許之史進思奪其功大怒曰臨陳逃亡不能救主不能盡節史某不與共事也大王別遣他將鎮龍被史進搶白頗有怒容然猶豫未決二人新不間舊滿面羞慚謝過而退史進領兵忿忿而去鎮龍甚恚史進思尋事殺之然史進雖剛愎自用而勇略兼備戰無不捷要非鎮龍所能駕馭也鎮龍性最褊急無遠識尤多忌刻風陽秦錫帛因軍中乏糧遣人約會太平共取安豐隨乞糧百斛暫救眉急不日見還鎮龍不與慕容光急諫曰既與聯合緩急尚當相助奈何靳糧不與鎮龍曰太平之糧僅可支給本營目下攻取寧國兵興糧隨若寧國持久不下則我軍尚不能支焉有餘糧及人慕容光再三苦告曰百斛糧不能窘我太平大王三思堅同盟之意也鎮龍堅拒不允惟婉詞以謝其使慕容光歎息而出曰事立敗矣秦錫帛一聞乞糧不與怒欲興師爭奪太平史獻白壽止之曰不勞鳳陽張弓寸箭元兵若進攻太平我坐視不援可立見其潰也爾時鷸蚌相持不坐受漁人之利乎錫帛怒始息然營中實已乏絶漸至歲除軍士多出怨言錫帛命再加抄括濠梁各處百姓積藏已纍次膠削又經此番俱不能卒歲了濠梁之民大困搜括之令一下雞犬俱無流離展轉填滿溝壑周衰尚雲哿矣富人哀此煢獨此時之富人一般與煢獨皆餓殍矣錫帛日日慮乏糧一事賈智深曰吳中惟廣陵乃南北都會枕江背淮四通五達舟車所聚最為富饒欲蘇我軍之困非廣陵不可錫帛問計將安出賈智深曰目下已屆元夕命諸將如此如此足矣錫帛大喜依計而行且説廣陵即今揚州府轄三州七縣繁華富麗冠冕三吳唐人所謂煙花揚州也至元夕之盛即京師無以過之昔唐元宗皇帝元夕問仙師葉法善曰元夕四方以何處為最仙師曰無逾廣陵者矣帝愀然曰朕安得一遊廣陵也仙師曰當為陛下謀之少頃殿前起一虹橋請帝登焉帝遂命樂官李龜年雷海清等數十人相從俄而遂見廣陵果然燈火輝煌士女淡抹濃妝望月踏歌於道語音繚繞笙簧嗷嘈滿城管弦綺羅疑非人世帝喜不自禁命樂官等將月中所得霓裳羽衣曲於雲中奏之廣陵士女皆仰而望見以為仙人現于雲中瞻拜不已遊罷而歸數日後節度使果奏其事夫以廣陵之盛而天子猶慕之其名勝可知矣時元世祖至元二十二年廣陵正值上元滿城火樹或十丈或二十丈無不燃燈萬盞百戲雜陳樹下衣羅綺曳錦繡細叉粉豔麗如仙者名妹不計其數相與踏歌入雲鼇山萬疊寶炬千層彩樓百座凡鳳笙龍笛鸞簫象管齊奏於不夜天中並星毬檀車香風拂拂香氣氤氳令人應接不暇所謂風吹玉漏穿花急人倚朱欄送目勞也當時有騷客玩此吟一律以寫其勝雲及時膏雨已闌珊黃道春泥曉未幹白麵郎敲金燈過紅妝人揭繡簾看管弦沸月喧和氣燈火燒空奪夜寒一片歌喉盈耳畔卻疑身在五雲端又絶句雲鼇山萬疊照樓臺都把臨窗格子開椒眼竹籃呼賣籍金錢拋出繡簾來滿城士女正在賞玩不休忽江都縣衙前鼇山火起延燒民居衆人爭赴救火縣宰隨出令人作速撲滅倉卒間有置制使孟知縉猶鹵簿呵殿而來人叢中一片喊聲應者四起孟知縉情知有變方欲避入縣衙已喊殺連天有數人上前一把擒住縣宰見不是頭竄伏暗處一時各衙警報俱有強人打入劫奪庫藏沿街大掠又報城外炮聲震地大隊將至虹橋這邊説楊鎮龍兵襲蕪城那邊疑秦錫帛師過通州城中人民驚惶無措抱頭亂竄此時一派哭聲遇賊不免樂海變成苦海遊場改作戰場士女無辜突遭此鋒鏑死亡之慘也時鎮守揚州都督石中孚是員老將一聞火起有變即令各隘下閘各衙多備弩箭火炮緊守府庫違者定按軍法披挂出府正遇秦杞秦梓率衆紛紛攘攘而來石中孚大喝且住隨與二人交馬不一合輕舒猿臂將秦杞擒下秦梓見兄被獲大怒奮力來奪亦被中孚拿住余兵死者無算石中孚正在攻殺之際忽報置制使為賊所擒大驚殺至江都衙前遇著刑士龍督兵虜掠中孚大怒揮刀直取士龍二人大戰五十餘合勝負未分中孚詐敗拖刀而走士龍性起放馬過來弓弦響處士龍中箭落馬中孚勒馬回頭舉刀直取首級忽嗖的一矢從旁飛來中孚眼快隨手接住藍天蔚飛馬已到中孚怒發如雷抖擻精神舞刀又戰藍天蔚三十餘合漸至力乏刑士龍負傷助戰二人夾攻中孚大敗而退衆兵力不能支一齊欲遁恰有副將馬芳柴貴等總統阿達疊木兒兵到一齊混戰藍天蔚刑士龍自知不敵保護鳳陽兵望城而走剛欲出城此時城上有中孚撥來軍士殺散賊兵安置炮座布列弩床一發動矢石如雨十分利害隨後追兵甚急刑士龍大窘藍天蔚心生一計命衆軍擁近城邊佯作欲出之狀城上一聲呐喊矢石欲下藍天蔚將孟知縉押赴向前城上軍士見是置制使投鼠忌器不敢發機賊兵棄了盂知縉乘勢斬關衝殺而出猶未及半門首千鈎閘踏下壓死兵士不計其數刑藍二人僅以身免時東方既白石中孚率兵追剿有龐奮褚點阻住去路石中孚大呼誰擒此賊副將柴貴應聲而往褚點戰柴貴不下無心戀戰且戰且走石中孚麾動後軍大殺一陳見相去已遠方始回兵是役也鳳陽雖劫得庫藏而歸已屬大創損兵甚多諸將皆重傷石中孚收兵回城先向孟知縉謝過孟知縉自顧甚有慚色中孚入府大怒衆將違令失了府庫衆將齊票都督令下時置制使業已被擒失去庫藏矣非小將之罪也石中孚怒氣始息押過秦杞秦梓審問始知是鳳陽黨夥確來劫糧中孚又問系何人計劃或廣陵城有人暗引二人回言即賈壽州之謀也中孚咬牙切齒大罵賈賊又問二人姓名二人以實告諸將聞是錫帛之子盡目眥欲裂七竅生煙立請磔之杞梓二人乞命叩頭不已中孚笑曰公等以為殺之便也二豎子誅之汙吾刀斧兼與錫帛結媾惡戰不休今留在廣陵使錫帛不敢正覷如趙國之質秦異人是質二子而廣陵有泰山之安諸君亦得免血戰之勞也衆將皆喜曰都督勝算非人所及中孚命將所獲賊兵賜以酒食放歸鳳陽將此語達之錫帛衆兵得生喏喏連聲而去當時城中死傷甚衆恨敵人骨見獲者縱之老大不平石中孚忙合衆官一面申奏一面撫恤命死者掩埋傷者調治帑藏有未盡者悉數發之以恤死傷之家人心少安後人有悼揚州士女者雲昨日笙歌燕畫樓今朝血肉委荒丘哪堪此地重來賞明月二分一段愁無端簫鼓起戈矛遏斷長淮水不流但得二分明月好再燃燈火看揚州藍天蔚等離了廣陵會合衆將始知秦杞秦梓被陷大驚頓足曰二公子被擒我等何以復命諸將皆無可奈何回至鳳陽將人馬交割所得帑幣金銀逐一納上秦錫帛大喜三軍得食鼓舞稱慶諸將始伏地請死齊言二公子被陷之故賈智深大怒諸將不協力保護又不救出有何面目回歸時座中秦開歧史獻幬俱怒皆請正法誰知秦錫帛毫不在意徐謂衆人曰諸將赴廣陵並非保護吾子賞元夜也豎子定然恃父之威不遵約束所以失陷于諸將何與若使諸將皆豎子輩幾敗乃公大事矣且能使三軍得食即損二子何傷反將甘言安慰衆將一時軍中感動皆言願效死力攻破廣陵救出公子錫帛不許方欲令人探聽下落忽報被擒軍士俱已放回錫帛喚入問之衆軍將石中孚所言一一説知錫帛恚曰是欲挾制鳳陽使我投鼠忌器不敢動兵也拼將二子任女淩遲誓必血濺揚州賈智深勸曰塞翁失馬焉知非福大王宜靜以待之若有機會廣陵可圖石中孚決不敢傷二公子也秦錫帛口雖強倔心中叫苦不疊喝退軍士不樂而罷
