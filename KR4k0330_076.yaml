body:
  text: 第七十六回狄樞密智破昆侖關元柳州都總管索虎通慶遠副將吳貫三奉檄往思州助戰中途聞蒯參政已在摩天嶺大破宋師二將以南寧空虛不如且襲南寧時寇節度攻打思恩續取太平南寧雖有重兵鎮守僅留萬戶周綸虞候馬坤鈐轄王梁三將守之三將不意元兵猝至忙出迎敵索虎通戰敗三將吳貫三出其不意襲了南寧三將忙引兵退保橫州而寇節度在青龍嶺不知也狄樞密方引重兵直犯桂林忽聞南寧得而忽失急令衆將倍道而進索虎通聞之謂吳貫三日橫州三將無能為也公足以禦之如宋師大至吾當親往抵敵遂率本部兵駐守昆侖關以拒宋師此關控制南寧各路洵為天險狄樞密聞報即於關外五十裏下寨越日令狄勇引兵打關關上灰瓶礧木石子弩矢交下人不敢近引兵而退回營復命樞密怒之次日率衆將自來關前討戰關上不理樞密怒命將士攻打忽關上一聲梆子響發動車弩此弩運于車上以十四石弩弓連著鐵鈎繩車行軸轉引弩弓持滿弦挂牙上大箭一鏃刃長七寸廣五寸竿長三尺圍五寸以鐵葉為羽左右各三箭略小於中箭牙以發箭能高能遠百步所中城垣罔不崩頽此法本用以攻城索虎通轉用以禦敵復以粃粳蔽其目灑以金汁等類宋師如何敢近狄樞密急麾將士速退傷者輒斃回營自思此關不破南寧如何得復隨令軍中造木幔布幔之法木幔以板為幔立桔橰于車上懸幔逼近關前布幔用復布為之或生牛皮或氈毯等項作為大幔以弱竿懸之動搖不定弩矢雖利中於幔上亦無能為軍士可于幔後以神機銃擊敵諸將如法布置擂鼓而進誰知索虎通亦有抵禦方法宋軍中神機銃雖利亦無所用關前要隘又遍撒鐵菱角及陷馬坑塹等類軍中往來甚是不便索虎通又暗使人于關外井中及有水草處沈以毒藥宋營將士飲之遂病狄樞密知之即令鑒井而飲一時無泉樞密令擇地有黃羊糞者必有水軍士如法掘之果然及泉相持十余日聞關上糧草甚足屯于關後可以持久狄樞密令軍士捕得野豬獐鹿等物以艾置瓢中開四孔系獸項下針其尾端望關後縱之盡奔入積屯內火起盡焚其糧此著索虎通初未及料失去輜重無數甚是惱悔狄樞密見此關難以明攻命掘子軍用蜀钁鋤尋著地脈穴地道以攻之而索虎通深明地聽之法常令少睡者枕空葫蘆臥聽有人行四十裏外東西南北皆知之至是因火獸燔其糧草亦慮及此因就關內八方穿井各深二丈以新甕薄皮鞁口如鼓令聰耳者于井中枕甕而聽可知去關五百步一日審知宋師來掘閘門即於近處以乾艾一石燒令煙出用板于穴下封之而令煙泄宋師掘子軍一隊盡焦灼於內狄樞密見此計又不行情知攻守皆敵將所長且別尋良策破之既而歎曰先節度武襄以元夜張宴即奪此關平儂智高定國若不能破關無顔對先人矣一日偶問南寧守將其才何如左右答曰慶遠副將吳貫三也稍有權略然不及索虎通遠甚狄樞密聞言遂遣諜者間之且説吳貫三本意原以奉檄助戰急欲蒯參政建立戰功坐守南寧甚非得已而索虎通臨行時又以橫州三將無能命與抵敵心中未免怏怏宋營諜者知之即散布流言索總管欲並其軍故不令立功且言前襲破南寧皆索總管一人善戰之力吳將軍適乘其便而已何功之有吳貫三聞言甚恚曰某奉參政檄耳非索總管部曲也索總管自言善戰如何一守此關半月不能破敵吾行當走訴於參政矣索虎通在關上聞之驚曰此宋人反間之計欲吾兩人鷸蚌相爭坐受漁人之利急令裨將二人回南寧達知此意反復開導且極相推許以安慰之吳貫三勉強放下狄樞密聞之又遣諜者間以浮言曰吳將軍誠實君子也然甘言誘我吳將軍已入總管算中矣夫千里奉檄而不赴轅助戰見今蒯參政奉詔出師失陷州郡徵調之將又各自為戰軍令何在元主怒則參政危矣參政一怒而凡不遵將令者獨能免於罪乎此言一布人人傳播吳貫三本模稜之人見浮言又起大怒曰吾已為索總管所誤今日豈容再誤又聞參政已回桂林日日閲兵耀武將大戰宋師遂決意不守令人于關上婉言語索虎通曰此間有總管一人進戰退守皆足禦敵南寧一郡不足慮也某當往參政處協守桂林免誤大事索虎通明知諷已勃然大怒曰忌妒小人不足與圖功也對使者唾罵之使者抱頭鼠竄而去至南寧一一告知吳貫三怒髮衝冠拍案大罵曰欺某慶遠軍不能滅汝柳州兵也遂欲率本部人馬來襲關上索虎通聞之益怒曰宋將吾且不懼寧懼汝耶二將正欲爭鬥兩軍皆震幸軍中有一提點使荊洪範老成諳練以為軍中自相魚肉轉與敵人以間忙至關上以正言勸止總管又入城中安慰副將兩處極力調停委曲感悟二將始止荊洪範見二將歡洽如初不勝之喜時當八月之望乃于中秋月夜就關上大設華宴名曰連珠宴取二將同心之意是夜請吳貫三上關飲宴二將攜手共話衷腸少頃入席部下將校各依次對月而坐軍樂大作浮白暢飲三軍皆有犒賞荊洪範起身為二將把盞二將亦交相推贊豪飲一會酒興方酣忽關前一派喊聲軍土飛報宋軍已上關矣索虎通拍案一驚慌披執上關則宋將藍天蔚慕容長二人已從樓櫓騰身上關軍士皆蟻附而登宋將勇不可當元兵敵者皆死關外大軍亦擂鼓呐喊炮聲震天元兵倉卒焉能抵禦慕容長奮勇斬關落鎖關門大開宋師直入索虎通頓足歎曰荊洪範誤事不少遂棄關而走當下吳貫三亦甚驚慌欲來爭關索虎通即揮之令去曰速守南寧若更有差池將無面見參政矣吳貫三跨馬下關至中途見飛馬來報曰南寧府被橫州三將仍舊奪去吳貫三怒曰宋將欺吾太甚見元兵紛紛攘攘沿途而來吳貫三聯成隊伍殺至城下知城中有備堅不可攻次日索虎通亦引兵至二將互相埋怨幾欲相殺速喚提點荊洪范則荊洪范見關城兩失知難免罪已赴清江而死索虎通曰趁此時人心未定作速攻城猶可解免否則滋汝罪戾索虎通吳貫三二將遂督三軍奮力攻打城中此次守禦皆備矢石交下人不可近忽軍士指曰塵土大起宋師至矣索虎通忙令三軍準備迎敵少時狄樞密統大隊人馬方至索虎通欲以逸待勞宋師喘息未定便指揮三軍一湧而進殊宋師久住昆侖關外全未交戰養精蓄鋭已非一日今既通敵人人思奮一可當十元軍中裨將秦朗尚世雄等皆被藍天蔚戰死元兵欲潰吳貫三忿怒出馬慕容長接住交鋒力戰二十余合吳貫三力怯方欲敗退慕容長喝聲著中揮刀斬之索虎通見宋將難敵不敢戀戰忙保護人馬望柳州敗走狄樞密督軍追殺一陳見去之已遠方鳴金收軍入城至府中坐定周綸馬坤王梁三將伏地不敢仰視狄樞密怒曰寇節度以大事托汝既控重地又有重兵乃疏虞至此不按軍法焉警頑惰立合推出斬之有慕容長藍天蔚種世虎三將一齊請曰周綸馬坤王梁三人失陷重地應按軍法但念業已恢復乞樞密從寬論罪狄樞密沈吟片時命降為千夫長隨軍立功以次擢用三將叩頭謝訖狄樞密遂另撥大將把關守城養兵數日始統大軍望柳州而進
