body:
  text: 第五十三回扈先鋒收復嶽陽郡嶽招討見連收數郡三降將俱建奇功即令人鎮守更換三將回營十分獎勵仍命三將各帶精兵五千乘破竹之勢略定郴辰桂陽等處再令先鋒扈德威統水陸兵二萬五千率史進狄勇種世虎拓跋琳嶽坤五將徑由漳州過洞庭取嶽州府分撥已定扈先鋒造齊戰艦統軍率衆由湘陰撥舟人青草湖徑巴邱山入洞庭之西至巴陵峽口有元兵阻住扈先鋒欲奪險而上時元軍中乃常山王成吉思帖木兒自引大隊阻住峽口而以都督阿爾忽術守城當下常山王望見宋師號炮震時早有驍將夔夔放下四五十號戰船沿湖擺開夔夔手橫丈八蛇矛立於船頭往來如飛宋軍中種世虎已覷定分明拽滿雕弓暗發一矢夔夔正當上風頭行舟如駛忽應弦而倒元軍大驚扈先鋒用槍尖一指宋師齊進兩軍水面交鋒元兵幾次衝突宋師列在水上堅不可入扈先鋒昔年建閫襄陽慣習水戰所造蒙沖以犀革覆船皆兩廂開制棹孔前後左右有弩窗矛穴炮車置壘木鐵汁安樓三重列女牆戰格樹幟幡敵不得近矢石亦不能敗其餘戰艦走舸遊艇俱設女牆木床奔走往反速如飛鷗乘人不及更有海鶻頭船頭低尾高前小後大如鶻之狀左右置浮板如鶻翅翼雖風波大漲不慮顛翻當時扈先鋒即乘海鶻頭往來衝殺一會奮勇躍入元軍舟中砍翻軍十五將繼之元兵多半識得扈先鋒者望風而逃又宋師精鋭元兵不敵夔夔被創不堪力戰棄船上岸宋師遂奪險上岸常山王大軍阻遏不住移營少退扈先鋒直逼元軍下寨常山王令人下書扈先鋒批來日決戰暗與衆將計議已定次日以史進出馬元將夔夔捉矛交還史進力怯撥馬望城東而走夔夔自恃有常山王大隊接應督兵即追常山王亦恐有詐自出一軍隨後策應剛得離營拓跋琳引兵疾往砍開鹿角元軍將士慌來抵敵被拓跋琳槊翻健將數人元兵不支而潰遂據其營常山王返旆來追扈先鋒引軍攔住即與交馬扈先鋒乃久練沙場常山王焉能抵敵不三合敗走扈先鋒亦不追趕且説夔夔追史進直過城東忽一聲鼓響嶽坤狄勇各引一軍截出後路夔著驚即移後隊迎敵史進督軍勒馬殺回元兵圍在垓心死戰不已卻得常山王敗兵亦至殺入救應夔夔始脫身保護常山王且戰且走史進三將追殺不已都督阿爾忽術在城上望見常山王正在危急忙披執上馬引兵出城助戰混殺一會夔夔已被嶽坤刺落馬下阿爾都督也不顧衆軍捨命殺開血路保常山王望城而走忽探馬飛報阿爾都督引兵出城時宋師已乘機入城常山王大驚奔至城下只見宋將種世虎威風凜凜立於城上厲聲曰羯奴吾取城多時矣常山王追悔不及阿爾都督引殘兵保護望澧州而去扈先鋒率衆將入城招撫安輯官吏降者無數軍民無犯百姓大悅隨令狄勇引兵徇華容嶽坤領兵收平江史進拓跋琳引軍進攻澧州元常山王阿爾忽術堅守石門關且以二將兵少思養精蓄鋭一鼓殲之故閉關不戰史進即選精壯軍士數十人自己扮為赤松山樵子各擔柴負薪混入關中約定火起為號拓跋琳引兵打關史進內應其關遂破阿爾都督為史進所殺常山王自知澧州難恃奔襄陽而去州守不敢迎敵皆降安民畢兵回嶽州扈先鋒告捷長沙嶽招討見各路俱有捷報舉手加額為涪陵王稱慶惟郴辰桂陽等處三將久無半音耗暗思三將連取大郡戰無不捷豈區區郴辰桂陽不能收入版圖次日探馬飛報三將合兵至辰州郴州俱已納款惟劉遇隆戰桂陽州臨武縣桐柏山失利嶽招討聽畢有張懷亮等皆欲請兵往援招討曰小小進退不足介意彼三人同心協力何功不成且待數日自有捷音越三日又報劉遇隆再敗藍山縣錦雞石招討聞之甚喜諸將不解直至扈先鋒嶽州兵回始得露布告捷劉遇隆誘戰引元將莫如龍莫如虎至天窗岩陷入飛天網攪地龍之內用地雷火攻大破元將覆其全軍桂陽所屬皆服嶽招討笑謂衆將曰果不出吾所料也自是湘湖州郡半為宋土嶽招討飛奏宋主一面檄調鎮守肇慶府驃騎將軍韓搏虎至同征雲夢
