body:
  text: 第九十回許廉訪請頒葬制元英宗酷信佛法每言佛門可治天下故崇奉西僧十分隆重右丞相拜住奏曰清靜寂滅自治可也非可以治天下帝不以為然聞宋昭帝下詔求諫又謂拜住曰我朝亦有如唐魏徵之敢諫者乎拜住對曰盤圓則水圓盂方則水方有太宗納諫之君即有魏徵敢諫之臣帝稱善久之時翰林承旨西僧教瓦斑仕至太子少師帝尊寵之一日奉元行宮正殿災帝語群臣曰世皇昔建此宮至朕躬而毀實朕不能奉釋之故遂又拜西僧輦真吃刺思為尚書乃下詔出獵駕至柳林忽大風雨雹拔柳林行宮內外大木三千餘株帝驚猶以為西山佛寺功久不就下詔極力催督甚急監察禦史觀音保上疏力諫以歲飢且東作方興請停其功帝大怒立命斬之有道士劉志先僧圓明等俱以妖術作亂命大元帥完顔等討平之帝遂果於誅戮朝臣人人自危巡上都還駐蹕南坡有宣徽使鎖南禦史大夫鐵失二臣俱領衛兵夜半後擁兵攻入行幄先殺丞相拜住英宗遂為鐵失等所殺乃迎皇叔嗣晉王也孫鐵木兒以支庶入繼大統遂為泰定皇帝帝既立乃族誅鐵失等於燕都籍其家有樞密副使兼中書平章張圭乃張宏范次子張景略之弟以武階調文職自上都至上疏以逆黨未討姦惡未除政令不行賞罰不公賦役不均財用不節等事請裁擇之帝不報是時人心浮薄民間酷信陰陽相地之説青烏家專一談論風水煽惑人心一為所迷有停棺至數年不葬者有既葬而遷而又遷者有葬後以元武藏頭蒼龍無足而滅宗嗣傷骸骨窮通得喪彼此構訟不休者則有曹州定陶縣邊留翁一事邊留翁者居定陶戚姬村夫婦以捕魚為業僅一女無子薄有余積乃于範蠡湖側構一園林買山為終老之計其地左泉右石後枕阜陵前俯清溪邊留翁甚合心意無事即就湖濱捕魚優遊山水西山有一薛翁家資巨富酷信風水適聘一地師至名曰高談生遍為薛老物色龍穴俱無佳者至城南一見邊留翁地乃大驚曰此瓜地安魂湖燈妥骨之吉壤也薛老愀然曰此非吾産也雖佳何益高談生遂為畫策以薛老一子與邊留翁之女聯姻不欲厚奩但得園中幅地為薛老作佳城邊留翁有何見識私幸聯姻富戶無不允從不日成婚乃迎邊留翁夫婦于家飲食俱極豐腆禮貌尤恭邊留翁即贈以地薛老大喜遂請高談生相地按穴如法築墳自後對於邊翁夫婦禮貌寢衰又久而竟逐之邊留翁夫婦無奈仍拉船至江邊捕魚為生薛老夫婦至是且將其媳日加箠楚不與飲食其子亦擯斥之不以為妻叉釧服飾等類盡行剔去謂漁家女惡得服我家物媳竟磨滅而死草草葬畢邊留翁夫婦但悲泣而已一日捕魚至范蠡湖邊望見泉石依然林巒如故而巍然高阜者乃薛氏之生墳也欷歔久之忽見一人田中耘草乃故莊客也遂向之嗚咽不能成聲莊客曰薛老以巨富而與翁聯姻者特為此地耳邊留翁始知其詳欲控薛老而苦無錢欲刺地師而苦無刃乃伺縣令出衙時攔輿訴之縣令集訊而邊留翁絶無執據反被斥逐冤填胸臆鬱鬱而死其妻亦呼天號泣自沈于江高談生遂往賀薛老曰佳城自此定矣薛老謝之百金未幾而薛老家三被回祿皆見邊留翁父女三人因風縱火而薛老之子與一富室冉姓者聯姻冉故縣中惡胥虎而翼者也薛子偶斥其妻其妻恚甚投繯而死冉至將薛老夫婦並其子縛而捶之窘辱萬狀始拴其子去鳴於官陷於獄中薛老上下行賄直破千余金始得其子出獄薛老一日偶見邊留翁夫婦偕數人持黑索者至薛老不覺失驚謂其婦曰邊親家來矣其婦應之登時夫婦俱死薛子即請高談生葬于穴內又重謝以百金不數月雷轟其冢陷入地者丈餘竟成深潭而冉富室仍不忘舊仇以登州府劫餉一盜扳薛子入案竟坐大辟其女之憤始泄而高談生仍徜徉事外東處覓龍西家尋穴其設局騙人金錢猶其小焉者也又傳其徒數十人一味走富室謊愚民串地棍買絶地各處皆翕然從風爭相致之竟有推高談生以地行仙者後為仇家所殺肢解之而去山東廉訪使許思敬聞之大怒立飭郡縣嚴究青烏之黨以泰定二年正月入覲請將族葬之制頒行天下禁止陰陽家相地邪語上疏奏曰臣聞術數之學凡有濟於世者皆律所不禁而獨似是而非言偽而辨者不可不大為之防恐其以贋而亂真也夫古之葬者不封不樹後世聖人制禮始葬祭並用而葬欲吉壤蔔之而已使沒者得其安生者遂其願非如近世所雲輒以朽骨為名利階也竊以青烏指南之術原本邪説而衆生必死死必歸土自倡為富貴利益之説以欣動人心無論蚩蚩者氓入其局中即縉紳詩禮之家亦罔不堅持其説以為玉尺錦囊諸書悉本乎河洛皇極足表裏乎聖經豈不謬哉伏維陛下宏天地之量並日月之明頒行葬制永定畫一之規禁止邪辭免生伎倆之技以奠人之心以正風俗則渾穆敦厚之象未必不再見於今日也臣無任激切屏營之至帝覽奏善之即詔發行省凡葬者俱依族葬之制其有妄談風水者一律禁止行省若不嚴行屏息禦史台臣用以上聞陰陽家學問容或有之若一味堅持其説則過矣夫親在則以親為可有可無之人親沒則以親為求富求貴之具心地若此尚可問乎談風水者可以寤矣曾見有人題金山郭璞墓詩雲雲根浮浪花生氣來何處上有古碑存葬師郭璞墓曉世之意隱然言外所謂但見戴紗帽者來看地不見戴紗帽者來上墳也故後賢有造生壙詩雲莫笑先賢造化台何人不向此中來譬如華屋身將住可否梅花手自裁三板暫教風日閉一門直待子孫開香山墳畔泥濘酒先與群公醉幾回風水之説既不足信至選吉擇日尤可笑者後賢亦有詩雲何須六甲卜王匡心是功曹善主張展氏自知無隱慝呂才從不信陰陽燕藏戊已巢雖穩人守庚申道亦亡豈若信天翁最好一生所到是康莊觀此則選吉擇日之説亦甚無謂杭州有吳東升者百夫長也頗善詞翰年八十臨終曾作詩曰囑咐兒孫送我終衣裳棺槨莫豐隆停喪只可經旬外出殯須行徑路中念我行藏無大過請僧超度有何功掘坑埋了平生願休信山家吉與凶嘻武辨有此殆有過人才識而隱于百夫長者
