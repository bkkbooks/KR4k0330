body:
  text: 第七十七回範仆射登臺觀星宋重康六年帝在武都聞諸將進兵廣右各路俱有捷音因召左仆射范國昌尚書司馬肅葛天民樞密嶽燕超等入朝帝設宴內廷樞密使嶽燕超即席奏曰廣右大功垂成臣當親提一旅之師助諸將成不世之功帝大悅遂仍拜招討之職燕超與諸臣宴罷叩謝而出是夜仆射范國昌與尚書左丞葛天民偶步城東翠微閣上仰觀天象見衆羅列謂天民曰左丞識星象否天民曰略知一二願聞其詳范國昌遂步目睿璣審躔度用手指定謂天民曰中宮太極其一常明者太乙常居也旁三星曰三公或曰子屬後四星末大星曰正妃余三星後宮之屬也環之十二星藩臣也皆曰紫宮前列直鬥口三星隨此而鋭微曰陰陽或曰天乙紫宮左三星天槍右三星天棓後十七星絶漢抵營室曰闖道北斗七星所謂目睿璣玉衡以齊七政杓指龍角衡中南北魁枕參首用昏建者杓杓自華蓋以西北夜半建者衡衡正中州河濟之間平旦建者魁魁自海岱以東北也鬥為帝車運為中央臨制四海分陰分陽建四時均五行移節度定諸紀皆學於鬥鬥魁戴筐六星曰文昌一曰上將二曰次將三曰實相四曰司命五曰司祿六曰司災在魁中貴人之牢魁鬥六星兩兩相比者曰三台三台色齊則君臣和不齊為乖戾輔星明近主輔臣親強暗小主疏弱杓端有兩星一內為矛招搖一外為楯天鋒有勾圓十五星曰賊人之牢牢中星實則囚多虛則開出也至若天乙天槍天矛天楣動搖其芒角則天下之兵戈大起矣天民間曰福慶之星飛流之星其化何如范國昌曰福慶者乃天地純粹之精氣飛流者乃五星之精氣動而化之者也五星有變則精氣散而為妖星故漢書曰天星而景現景星者黃而潤澤其伏無常常出有道之國苟或現於君上此乃應天之兵大慶之兆也流星長四五丈如龍蛇動搖者大將凶或白雲如車輪下有流星旋入北斗者主人當走星有孛於招搖者夷狄將亂或流交於天心者敵盛或流沖太白而過者大將凶或流星貫日而滅敵凶或流星貫于紫宮備姦賊以下謀上流星前赤後青黑者客軍敗故曰流星者天使也上曰飛下曰流飛大曰奔星小曰流星入河鼓大將亡出王良兵起入將軍及羽林兵大起使星出入天庫胸奴兵起抵天市垣大將亡抵天狗犯弧矢將有千里之行此大略也天民又問曰何謂客星范國昌曰非主座之星曰客星色句如氣勃勃似絮所過之宿必有災害出營室無兵亦不罷入奎破兵殺將犯婁胡亂入昂胡入犯塞入畢邊有急兵犯嘴堡虛軍儲少飢犯柳兵起守張將有陰計兵起入招搖胡兵起入天槍天棓兵起犯文昌星蒼色將有憂色色赤將驚色黃將喜色黑將死守傳日胡入中國守天雞天下兵馬驚守天街胡王死人婁庫兵起守南河兵起守騎宮將憂士卒疫守北落師門虜入寨兵起守天倉粟貴入天苑兵作馬死入天宮天下弓弩皆張出天宮胸奴兵起守庫騎西羌來降守九洲殊口負海丕安天民問曰彗星之征應何如范國昌曰彗星長而亙天兵大起也引尾入城城將拔近則八日遠則十二日有應彗直垂入軍營者凶宜拔之否則士卒俱死若在敵宜急擊之彗出於月之左右者不出三十日有兵起抵觸月者暴兵起若毫白者有大喪也蒼黃者臣下謀叛黑者兵大起也從中天出曳尾向西者姦人謀主將從南曳尾向北者妄殺向東身尾俱從天中出者士民多飢曳尾向東者民凶從北出尾曳向南者士人凶彗形如寶寇來疾速形如幢節者寇強不可妄動色如血者敵兵陰到光焰燦爛而尾長闊者敵盛凡彗所指處皆凶地也天民又問曰彗星如是又何為妖星范國昌曰天雁星將軍之精華也青赤有光尾長三四丈大猾星者飛星忽作如雲者也所兆地有流血積骨之象頓頑星如天甕前卑後高現則大將死燭星者狀如大句其出也不行繞見而滅所燭之地城邑拔兵破亂也天狗星者狀如火流星有聲其下止地其形類狗中天而下圓如類頃田而上鋭黃色現則千里破將軍也蚩尤旗類彗而尾曲像旗現則王者征伐四方天蓬絮者類十小星綿聯如絮所見之野當有兵起虎頭星者其落大如月著地則光大聲如雷所墜之地兵火起旬始星出於北斗旁狀如雄雞怒則青黑像伏鱉現則兵亂格澤星如災火之狀黃白色起地上鋭而下大也其現也不種而獲必有大害枉天星者類火流星蛇行如蒼裏如有毛日長如匹布著天現則天下兵起昭明星者白而無角乍上乍下所見地兵多變動也五殘星出正東方狀如辰星去地可六丈大而黃六賊星出正南方去地六丈大而數動有光焰司詭星出正西方去地六丈如太白鹹漢星出正北方去地亦六丈而赤數動察之則中青此四星若出非其方其方當起兵為亂衝擊者不利焉四鎮星出四隅之地去地可四丈城維藏光星亦出四隅去地可二尺若月之初出所見則下有亂兵動有德者昌或二赤星有月背者利宮姓為將或一赤星從西向東者利角姓為將或二赤星共尾一處從東向西者利商姓為將或三赤星引尾直上者利羽姓為將妖星之辨如此葛天民曰此皆星象所見兵家禍福之本不可不詳者也二人在閣上重復觀玩良久見紫微垣中一會明朗一會昏暗團團俱生黑氣又太微垣後一十五星與天市垣諸星率多動搖不定葛天民歎曰元人以沙漠人主中國其氣運亦不久矣夫紫微者帝星也當如五彩龍成水之始達日之始升乃國運昌明之象今微垣黑氣彌漫彗星直入其中蒙古猶能久乎范國昌笑曰以緯象測之不出四十年當有帝星現矣按分野為星紀應在吳越真主其起于淮揚濠泗間乎天民曰仆射何以知之國昌曰填星居於星紀五星皆從而聚於一舍是以知之但此時彗星入微垣元人不久當有篡弒之禍而彗星又自箕入鬥天下荒亂生民之飢饉何時已乎葛天民曰天定勝人人定亦可勝天吾主應南極之象僅牛女翼軫之分國雖偏安亦建王業非人事成於下而天象著於上乎但氣運似甚迫促耳國昌即掩其口天民遂不復言國昌私告天民曰吾昔在房州涪陵祠夢遇藝祖示以識語雲建閫固圉開府從龍三五播遷六六一統首二句已應閩中廣南之事三五播遷者應主上十五歲航海播越之意六六一統者大約僅三十六年仍歸一統耳而秦王亦示語雲重建越王台玉關不肯開燕京承暗統南去復南來首尾三句皆應惟燕京承暗統一語不省且姑俟之久而必應子勿妄言天民許諾二人遂歸
