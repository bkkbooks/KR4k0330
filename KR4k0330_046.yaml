body:
  text: 第四十六回賈平章壽陽篡位淮王秦錫帛自鳳陽敗歸後猜忌日甚淮水之戰又以張師旦不力戰保護致隕世子痛恨諸將欲行誅殺一日與左相賈智深議曰張師旦雖智勇足備而強悍暴戾終難駕馭孤欲因事除之免生他日之患卿以為何如賈智深曰此無難事鳳陽之復大王尚未行賞以犒功為名賺人壽陽誣以怨望殺之不然一生他變恐諸將非其敵也淮王深然其策既又以耿星星在廣德逗留不速赴援致敗亦欲逮之賈智深曰一箭雙雕大王此舉甚善淮王大喜議妥即差官往鳳陽廣德去訖不知賈左相久蓄不臣淮王之猜忌日甚左相之覬覦亦日深此謀一定智深即遣心腹通知二將以淮王近日妒賢忌能謀殺功臣已定某日飲至策勳實賺殺二公之謀云云二將自恢復鳳陽後見不行封賞未免觖望又聞此信益不自安張師旦乃以言挑邢士龍曰淮王為人殘刻少恩將軍由六安州直趨曆陽血戰千里毫無封賞將來若臨行陳誰肯用命邢士龍曰淮王之不行賞者以喪世子失鳳陽故也鳳陽若不恢復則吾與公罪且不免將功折罪亦雲幸矣尚得隴望蜀哉張師旦曰鳳陽之失世子失之獨無應得之罪乎我等復故城於既失之後元大將死者不下數十員殺其參政覆其全軍即鐵券分封恐不為過吾與公等疆場備戰所望者只此耳今懋典竟安在耶邢士龍曰不然凡為人臣者盡心為國與君分憂而已至疆場爭戰皆為將者分所應當即有功不賞亦靜以待命而已其他非所知也張師旦見説他不動暗遣人至廣德州耿星星處約會耿星星回書密言淮王不仁不如推戴賈丞相共圖霸業約於某日會合壽陽議圖大事張師旦正合心意暗暗準備不日差官至鳳陽命邢士龍一人鎮守張師旦即隨差官同入壽陽時賈智深已密布心腹不時打聽聞張師旦耿星星至即邀入府中直至密室則韓某先已在內更有參政莫綏猷左丞楊瑊院判王芝仙鈴轄耿青府丞蔡傳荊章坦等惟右相史獻白壽連邀數次不至時座中莫綏猷曰淮王近日荒酗猜疑在廷諸臣人人危懼又復謀殺有功文武解體元兵一至壽陽何以當之今賈相豁達有度功德日隆我等曷不共相翊戴正位稱尊徐圖大舉諸君以為何如衆人皆言如命蔡傳荊曰舉大事者須得人心今我等無不願推右相機會誠不可失耿星星曰史獻躊不至恐泄機密不如令人劫之張師旦曰史獻白壽一人焉能成事但邢土龍尚擁重兵守鳳陽系淮王起義之人若不防備內寧必有外憂韓某曰且請右相一同商議少頃賈智深至諸人備言衆口一辭力相保戴惟史獻白壽邢士龍二人一在內一在外未免稍掣肘耳賈智深故為推遜曰智深有何功德焉敢當此衆皆曰人心所屬此天與也天與不取必有大咎賈智深曰史獻白壽為人隱忍少決斷不足慮也邢士龍遠在鳳陽何能便至即至而主客相形一戰可以成擒淮王近日日在醉鄉已與智深定計於千秋節設宴含章殿就席前執張耿二將軍以擲杯為號今日之舉即可將機就計韓某以鐵甲兵一千阻塞朝門耿青率壯士五百埋伏殿角左廂一聞鐘聲即入宮捕秦氏無少長皆殺之淮王業有令旨命智深畫計謀殺二將兵入禁門必不疑也余皆依計而行賈智深更有心腹健將二人一名項嗣昌一名閻飛熊俱力敵萬夫智深命隨侍左右臨機應變是日淮王陛殿文武拜舞畢淮王宣言鳳陽疊次陷沒失而復得隨征將士幾經血戰厥功殊偉孤欲仿古人飲至策勳之典便殿設宴君臣同樂文武諸人當為張耿二卿把盞群臣舉手稱慶少時供俸官陳設方物水陸珍錯無不畢集淮王命依次列坐喜樂交作淮王一心以賈相為之計劃停妥頻以目視之賈相亦暗相照會酒過三爵淮王舉杯方欲擲下忽賈智深將金鍾連撞數聲見殿角下無數甲士頓起耿青仗劍直奔淮王張師旦耿星星隨後秦杞秦梓情知有變掣劍上前望智深便砍早被項嗣昌閻飛熊奪劍殺之淮王下殿欲走耿青一把扭住張師旦按劍厲聲言曰淮王殘刻不仁素無君德我等共推左相為主有不從者先試吾劍文武嚇得面如土色莫綏猷蔡傳荊等皆曰惟將軍命衆官無可奈何皆曰諾惟史獻白壽就席前舉起玉巵望賈智深迎面便擊大罵篡國逆賊言未畢被耿星星拔劍斬之淮王秦錫帛暝目大罵賈智深孤自金山起義以來何負於汝身為篡逆禍不旋踵天道好還孤生不能啖汝之肉死必褫汝之魄一時罵不絶口有耿青回顧賈智深曰殺之乎生之乎智深曰速殺之為南宋人吐氣耿青麾動甲士淮王及侍從內豎數十人皆死於刀劍之下耿青率兵直入後宮不分良賤數百口誅戮殆盡賈智深乃命約定前後軍土打掃宮殿莫綏猷等始率衆官請賈智深升殿受賀更稱為壽陽王妻韓氏為妃長子熙為世子次子尚幼莫綏猷韓某為左右相蔡傳荊為參政張師旦耿星星為左右都督閻飛熊項嗣昌為龍虎二將耿青為指揮使楊醹章坦王芝仙汪維彥等俱任樞要內外文武俱加升賞傳諭各處將士緊守要害消息傳至鳳陽邢士龍聞之勃然大怒曰智深與某等起義共立淮王今逆賊弒君篡國不共戴天誓必殺之為淮王復仇遂傾鳳陽之兵直抵壽州而來中途早有張師旦耿星星二將引兵來迎邢士龍一見二將愈加忿怒嗔目大罵曰二賊黨惡弒君有何面目更立人世二將在馬上欠身施禮曰將軍但知其一不知其二淮王殘酷不仁自取滅亡我等所以更立壽陽王者防元兵若至為將軍守昔日血戰開基之業也邢士龍怒發如雷任你花言巧語如何肯聽揮刀便砍二將用槍尖抵住曰我等念疆場共事故婉言勸之公一味執迷我等寧懼汝耶邢士龍復手一刀二將不提防虎口震破鮮血進流一齊大怒雙槍並舉邢士龍毫無懼怯大戰五十餘合漸次力乏遂走二將亦不追襲收兵回營邢士龍打點精神次日力戰當日困倦被二將劫寨所將之兵亦多二將部下降去大半邢士龍欲戰二將閉營不出一連數日忽報鳳陽已被耿星星奪去家口俱陷邢士龍大驚只見張師旦耿星星耀武揚武列陳討戰邢士龍揮刀而出二將笑曰將軍家口已接入壽陽去矣曷自苦乃爾邢士龍不聽二將又接戰一時不數合敗走邢士龍不舍驟馬趕來忽踢踏一聲連人帶馬跌入坎塹中兩旁伏兵用撈鈎抓起二將回馬招降其衆將邢士龍簇擁直入壽春押赴府中壽陽王賈智深一見忙下隊親解其縛邢土龍大罵弒君之賊淮王何負於汝而汝反耶可恨士龍手無寸鐵不能剜心抉目為淮王招魂高祭耳壽陽王笑曰將軍與智深乃同事起義之人淮王猜忌日甚謀殺勳舊為衆所迫至此非智深本心也將軍為淮王復仇力已盡矣將軍家口業已安處無恙將軍何不輔助智深共圖王霸之業必區區以淮王為念乎士龍罵益厲曰與賊共事狗彘不如忽奮手奪過衛士佩刀望智深擲去智深急閃插入殿庭石柱上入有寸許火星直進龍虎二將忙將士龍依舊縛定智深知不肯降命推出斬之邢士龍至死罵不絶口賈智深憐而葬之恤其家
