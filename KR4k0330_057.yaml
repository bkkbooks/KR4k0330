body:
  text: 第五十七回廣陵散竹生得譜湘陰寇竹生白系獄得遇陳副使昭雪而歸廬墓三載有鄉先達不時顧恤家始小康杜門謝客惟與王用槐間有往來偕一母一妻深自韜晦如是者數年遷於洛西一日省親道經東平鎮暮宿華亭是夕星月閃爍竹生寢不成寐又當秋夜四壁蟲聲啾瞅唧唧每懷身世未免淒然披衣徐起四顧闃寂只見屋角參差夜色蒼涼更遠遠望去覺叢樹修篁瑟瑟風起鳥啼一聲不覺有感於中遂踞胡床取緑綺按弦而鼓鳥夜啼一曲覺弦中風雨指下波瀾不啻有雍門之悲者竹生寫心未已更連奏楚澤涵秋塞門積雪二曲正在五弄三終神爽飛越忽亭西一人鼓掌大笑竹生輟手驚起揖之就坐其人遂請過七弦審視一會撫玩不置乃曰仆生平亦有膠柱之癖但久荒絲桐為君一鼓下里巴人以佐良宵清話可乎竹生大喜其人遂奏清夜吟一曲音韻淒側動人竹生自謂弗及也其人曰此清夜吟與君所鼓不換金不換玉皆琴曲十小調也竹生笑曰君誤矣愚所鼓仍楚澤涵秋塞門積雪也其人口不然琴曲十小調一曰不換金二曰不換玉三曰白夾泛吟四曰越溪吟五日越江吟六日孤猿吟七日清夜吟即豫適所鼓也八日葉下聞蟬九日三清十亡其名皆隋時賀若弼所制至宋太宗時始改不換金為楚澤涵秋不換玉為塞門積雪此十小曲大略也竹生見其人深明琴調十分歎服叩其底蘊對答如流竹生自以為鍾期遇伯牙惜相見之恨晚二人促膝談心你稱曹子建玉樹臨風我羡白樂天陽春白雪一會説李水千幹公百衲精妙入神一會説蔡伯喈焦尾希世罕覯辨論一會其人曰琴調更有佳者足下亦欲聞乎竹生聞言急代為撫軫理弦焚香以俟其人援琴而彈竹生諦聽之若風入松間泉流石上儼鍾儀之操南音莫名其妙疑師曠之調清角不減共精元鶴白鵠欲翔欲舞不知此曲為何曲也彈畢方欲叩之其人忽顔色慘沮推琴長歎而起曰千年不鼓之曲今更流傳於世矣竹生即問此曲何名其人曰此廣陵散也凡四十一拍共有六段段各有題按開指一段小序三段俱名止息今並以傳足下最宜留心竹生此時一心在琴急問其詳其人曰大序凡五段曰井裏申誠順物因時于時正聲凡十八段曰取韓呼幽亡身作氣含志沈思返魂徇物沖冠長虹風寒揚名烈婦奴人發怒含光沈名投劍亂聲凡十八段曰峻迹守質歸政讐畢終思同志用事辭鄉氣銜微行後序凡八段曰會止息意意絶悲志歎息長籲傷感恨憤亡計足下領會此調抱琴一出海內盡傾心矣竹生曰何謂廣陵散其人曰晉承魏後有王陵母邱儉文欽諸葛誕等為揚州都督咸有興復之謀後皆為司馬氏所殺廣陵散者言魏之散亡當自廣陵始也今傳之足下仆東市之恨可瞑目矣竹生盤桓終夕猛省此曲乃魏晉絶調此人如何得知叩其姓字裏居其人曰仆即魏人中散大夫稽康是也因鍾士季之譖為司馬昭所害天道好還士季亦為伯約所算死於亂軍之手司馬氏國運不久亦斬宿恨雖申奈廣陵散未傳海內不但袁孝已引以為恨即天下後世知音者莫不引以為恨也故遊魂飄泊千餘年猶戀華亭今夕適聞足下琴聲不覺技癢幽明遇合亦奇緣也上虞雖遙仆從此逝拱手而起竹生欲挽留致謝倏忽不見竹生不勝駭異幸得廣陵散前後四十一拍無不了了於心抱琴歸寢次日始歸自此廣陵散仍傳於世
