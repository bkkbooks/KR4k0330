body:
  text: 第四十一回謝侍郎燕京死節謝疊山先生枋得原故宋江西招諭使知信州宋亡更姓名遁入建陽元世祖至正二十五年廉訪使程文海訪江南人才薦宋遺士三十人於朝枋得在其中枋得曰某所以不死者以有母在耳今先妣考終某自思無意人間事某至愚極暗決不可以辱召命也明甚堅拒不行既而翰林承旨留夢炎亦以枋得才可大用力薦於朝枋得聞之復遺書留夢炎言江南無人才示有如今之可恥者春秋以下之人物本不足道今欲求一人如瑕呂飴甥程嬰杵臼卒不可得辨論凡數千百言亦卒不行隱居唐石山廉訪使程文海與福建參政魏天祐交章薦之天祐遣差官至山中再三催促請行枋得乃以書辭雲某所以寧為民不為官者忠臣不事二君烈女不更二夫此天地間常道蒙大元以禮招徠上有堯舜下有巢由上有湯武下有隨光夷齊某所以效虞人之死而不往學夷齊之死而不仕者正欲使天下萬世知大元之量可與為堯舜湯武能使謝某不失臣節視死如歸也茲蒙鈞旨雲欲訪問某何事某決不敢魯有公父文伯死而母敬薑不哭室老曰焉有子死而不哭者其母曰孔子聖人也再逐于魯而此豫不能從今其死也未聞有長者來內人皆行哭失聲閨中自殺者二此子也必於婦人厚而于長者薄也吾所以不哭君子曰此言出於母之口不害其為賢母也若出於婦人之口則不免為妒婦矣言一也所居之位異則人心變矣某義不出仕者也今雖有忠謀奇計則人必以為妒婦矣恐徒為天下所笑時劉忠齊仕元為相亦薦枋得於朝謂加以重任必有奇效枋得亦以書報之雲某江南一愚儒耳自景定甲子以虛言賈實禍天下號為風漢先生之所知也朋友自大都來乃謂先生以賤姓名薦朝廷過聽遂煩旌召某乃丙辰禮闈一老門生也先生誤以忠實二字褒之入仕草一年居官不滿八月斷不敢枉道隨人以辱大君子知人之明今年六十二矣某斷不可應聘者其説有三一曰老母年九十三而終殯在淺土貧不能備禮則不可大葬妻子爨婢以某連纍死於獄者四人寄殯叢冢十一年矣遊魂漂泊豈不懷歸弟侄列國者五人體魄不可不尋遊魂亦不可不招也凡此數事日夜關心某有何面目見先生乎此不可應聘者一也某在德祐時為監司為帥臣曾握重兵當一面矣自丙豫以後已解兵權棄官遠遁即不曾降附宋朝文臣降附表即無某姓名宋朝帥臣監司寄居官員降附表即無某姓名諸道路縣所申歸附人戶即無某姓名如有一字降附天地神祗必殛之甲申歲大元降詔赦過宥罪如有忠於所事者八年罪犯悉置不問某亦在恩赦放罪一人之數子若貪戀官爵昧于一行縱大元仁恕哀憐孤臣豫有何面目見大元乎此不可應聘者二也某前後纍奉太母詔書並不回奏惟有繳申二王乞解兵權盡納出身以來文字生前致仕削籍為民遁逃山林如殷之逋逃臣耳聞太母上遷久矣北向長號恨不即死然不能寄一功德疏如任元受故事今日有何面目捧麥飯灑太母之陵乎此不可應聘者三也今朝廷欲跟尋好人某決不可當此選願與太平草木同沾聖朝雨露生稱善士死表於道曰宋處士謝某之墓雖死之日猶生之年感恩感德天實臨之先生亦可以察某之心矣又與廉訪使程文海書雲大元制世民物一新宋室孤臣只欠一死某所以不死者以九十三歲之母在堂耳先妣以今年二月考終於正寢某自今無意人間事矣苫塊餘息心死形存小兒傳到郡縣公文乃知大元欲求至誠無偽明達治體可勝大任之才執事薦士凡三十賤姓名亦玷其中執事薦異才而及某非其人非其人貽笑於天下取譏於後世非大元夢蔔求賢之意也孔子有父母之喪君命三年不過其門所以教天下之孝也傳曰求忠臣必于孝子之門為人臣不盡孝於家而能盡忠于國者未之有也為人君不教人以孝而能得人之忠者亦未之有也某親喪未克葬持服未三年若違禮悖法順執事之意其為不孝莫大焉決不可以辱召命也昔丞相史嵩之父歿天子詔起復太學生叫闖闔而攻之其詞曰天子當為國家扶綱常為天地立人極奪情非令典起復非美名是故忠臣論事必識大體君子取人先觀大節執事不可稱非其人而辜大元求才之意某不可進不以禮而誤執事知人之明傳曰為人子止於孝為人臣止於忠某不能為忠臣猶願為孝子惟執事亮某之心使某幸而免不孝之名是成我者之恩與生我者等也程文海得書見枋得十分堅拒不好再強惟參政魏天祐心中大有不快暗思圖之又值壽春漢陽兩處用人孔急天祐入朝力薦嶽燕超于太傅伯顔及回福建則枋得日賣卜於建陽驛橋與嶽燕超不時往來魏天祐心中暗喜以為一箭雙雕及燕超去後暗思必枋得縱之也紿入衙中以一室禁錮之久之釋歸仍設蔔肆至正二十六年會當入朝天祐欲逼以北行於是又命差官來啓曰奉參政命請先生入城演易枋得遂收行李令其子定之隨侍左右然後笑謂差官曰謝枋得死期至矣差官愕然同入參政府中見天祐磬折以待枋得舉手就座天祐益恭茶罷始啓曰大元肅清區宇肇造諸夏制度文物未遑議處故側席求賢各路設廉訪以聘名士先生乃故宋黎老焉敢播棄前者程廉訪天祐俱有薦章開罪于先生先生豈無意乎枋得曰亡國之大夫不可與圖存李左車猶能言之況稍知詩書頗識義理者乎參政有薦章枋得亦有小啓參政想應諒我矣天祐曰不然箕子乃是懿親尚陳洪範九疇先生何吝玉至此枋得一聞以商況宋以周比元艴然不悅曰枋得若貪戀官爵昧于一行縱大元仁恕天含地容哀憐孤臣不忍加戮枋得有何面目見大元乎故夷齊不仕周食薇亦知武王之德四皓不仕漢采芝亦佩高帝之恩大元之赦枋得屢矣枋得受大元之恩亦厚矣請參政勿勞説辭天祐左右思慮俱不能動日以詩酒盤桓時而遨遊考亭山水時而選勝武夷洞天時而幔亭張飲索詩枋得則俯首無語時而衙齋設筵論道枋得又帶刺行譏相處月餘天祐俱容忍之枋得每當酒後好論樂毅申包胥張良諸葛亮事若抱千古不平之恨者天祐乃譏之曰人情責人則明責已則暗古今人大抵如斯枋得怒曰慷慨就死易從容赴義難若輩惡足語此天祐亦不能堪怒責曰封疆之臣當死封疆安仁之敗何不死枋得曰程嬰公孫杵臼二人皆忠於趙一存孤一死節一死於十五年之前一死於十五年之後萬世之下皆不失為忠臣王莽篡漢一十四年龔勝乃餓死亦不失為忠臣司馬子長有雲死或重於泰山或輕於鴻毛韓昌黎亦雲蓋棺事始定參政寧知此也天祐無可回答乃曰強辭枋得曰昔張儀語蘇秦舍人雲當蘇君時儀何敢言今日乃參政之時枋得復何言枋得自此以後絶口不飲食者二十餘日不死乃復食一日魏天祐起行入京逼與俱往由建寧路起行枋得舊日交遊俱來送別于建寧縣之鳳凰台相持泣下餞詩甚多疊稿盈幾內有張子惠者與枋得更為知已餞詩獨出人意表曾有句雲此去好憑三寸舌再來不值一文錢枋得會其意甚稱賞之惟令其子定之護送謝別衆人臥眠轎中而去不日抵太平府渡採石磯瞿然曰不食矣自此每日只少茹菜果日就尪贏猶勉強起立南向再拜慟哭積數月困殆益甚四月初一日始至燕京天祐見枋得如此亦未便奏聞至初五日枋得卒於驛中天祐始奏知元主世祖深歎其人死不屈節令歸葬故里以成其志枋得子定之始得護骸骨歸葬於信州弋陽為題曰宋處士謝疊山先生之墓定承父志也枋得生平無書不讀為文章高邁奇絶自成一家學者多師之所著有詩傳注疏行世其精忠徑節與文少保如出一轍論者謂扶綱常于夷狄亂華之時振風化于宋柞將傾之際身雖死而英氣凜凜至今猶存此公可謂遵孔孟之訓者矣此信傳至廣南嶽燕超聞之臨風悲奠慟悼不已急奏知涪陵王涪陵王亦泣曰先朝節義之臣國家之元氣也親為設祭復其官爵諡曰文節遺吉安知府親臨信州弋陽築墓表阡致奠畢厚恤其家
