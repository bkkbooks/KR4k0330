body:
  text: 第七十一回寶林寺韓昭毀佛韶州府城東南五十裏有溪曰曹溪溪上有寺曰寶林乃唐高僧盧慧能道場也慧能即六祖新州人唐貞觀戊戌年生有夙慧三歲時聞誦金剛般若經即能尋師二十四歲傳五祖衣鉢三十九歲祝發七十六歲而卒唐高宗時慧能初至池州五祖宏忍大師以鉢盂錫杖及所傳袈裟謂五百衆僧曰誰作無像偈即傳衣鉢首座一僧名神秀即題曰身似菩提樹心如明鏡台時時勤拂拭莫遣有塵埃慧能見之乃曰佛宗本是空如此仍有像矣即改題曰菩提本無樹明鏡亦非台本來無一物何用拂塵埃五祖宏忍曰此全悟道脫然無像可傳衣鉢矣即以法寶授之當時池州太守問五祖曰會中五百僧不付衣鉢何獨付于盧行者五祖曰雖有五百人四百九十九人會佛法惟盧行者不會佛法獨悟道方傳得衣鉢太守深然之慧能受法遂為六祖後再至廣州法性寺繼至韶州曹溪寶林寺末歸新州國恩寺以開元三年八月十三日段三州官吏于中途爭迎六祖真身不能決乃祝曰焚香所指處師即歸焉香指曹溪因遷龕並衣鉢建塔存之而白光沖天五日不絶五代時僭王劉鋹迎衣鉢至廣州夫人偶觸墜地不能修補因舍田數千頃贖罪及黃巢之亂兵犯曹溪雲霧晝晦軍人失道鹹致恭乞哀而去其肉身傳至宋末香蕉如漆以手摩鬚髮如剃其衣一襲乃達摩所傳西域屈昫布緝花心織成者一襲乃唐元宗所賜織成淡山水者一西天鉢並非銅鐵木石一西天履更非革非木不知何物也貝葉經十七葉字如刀削至元丙子元將張宏范師犯廣南下韶州兵屯曹溪軍士至寺中鹹用刀刲脅以驗真偽遂折其指元兵大驚鹹叩頭乞命相戒以為禍不旋踵師去後韶州等處士女尊禮備至廣南一帶鄉紳士大夫燃香禮拜奔趨若恐不及加以元主尊禮西僧崇尚釋教韶州人士居然以為牟尼再世曹溪一寺即兜率陀天矣時樂昌縣有蕭生含瑜偶過曹溪遊寺中觀玩法相一會至客堂坐定問長老曰聞昔年六祖禪師與智光禪師傳法分戒於儀鳳山菩提樹下其所演説惟依般若三昧令學者頓悟菩提長老能道其詳否長老不能答遂留蕭生在寺盤桓數日蕭生與長老兩情相得日見輦錢帛布施入寺者絡繹不已蕭生暗思此寺有田二萬餘頃猶且日日斂錢將來不幾富可敵國耶以長老待生甚厚未便究詰其支用何處而寺中亭台池沼淨室精舍罔不閡肆華美奇花異草珍木怪石處處令人賞心不置內有一亭曰卓錫亭亭前有泉曰試甘泉蓋取東坡又試曹溪一勺甘之意結構精妙復道幽窈花木最勝蓋非其人不得至也蕭生逐日與長老接談後必至亭前消遣一會私念不意昔人所詠曲徑通幽處禪房花木深卻在此間也一日長老出寺未歸蕭生獨步亭前見薔薇花含苞吐豔芬芳襲人正在花架下流連未已忽亭子後遠遠若聞絲竹之音蕭生異之由閣道左行連過曲廊回榭數處有一短牆其音若自牆內出者蕭生乃扳牆而望見復室中男女交錯管弦咿啞杯盤狼藉首座者即寺中老僧左右環立及侍坐者無非寺中年少沙彌俱各倚紅偎緑調笑取樂長老更擁抱妖姬豔女輕吹細彈酣歌暢飲謔言嫚語無所不至蕭含瑜一見心頭火起正欲發作忽轉念曰投鼠忌器吾已入網羅中矣悄步而出仍歸卓錫亭前玩花一會始至客堂則長老仍從方丈而出接談後便欲辭去長老再三不許蕭生勉強住至次日見長老禮意十分勤懇心中不忍乃以言挑之曰釋門動稱五戒殊不儘然長老曰沙門戒律甚嚴先生或者于五戒之外更有所見乎蕭生曰非也釋子不必定守戒律而亦有證果成佛作祖者長老忽色變徐曰豈有此理蕭生曰不見西湖道濟酒肉不離於口姚秦鳩摩羅什尚能禦婦人一交而生二子乎長老一聞此語打著心病滿面發赤情知破綻必為所窺遂勃然大怒曰莊嚴佛地何物狂生敢如此謗言一聲拿下只見沙彌十餘人奔至客堂將蕭生擁至後面殿角下不由分説綁縛起來蕭含瑜有口難辨追悔無及任你乞命置之不理少時長老至前數之曰吾念孱弱書生故推誠待汝乃敢訾吾短將謂吾戒刀不利不能取汝首耶蕭含瑜自知難免乃泣請曰念數日盤桓交淺言深命死不敢辭乞付全尸衆沙彌不許惡狠狠即提刀就剁蕭含瑜已魂不附體長老上前止住沈吟一會乃曰負石沈江長老自去蕭含瑜眼睜睜看著衆沙彌又加一石縛定兩臂用兩人扛至曹溪上流投于洪波巨浪中兩沙彌方始歸去誰知蕭含瑜未合身亡自入水中即得奔流急湍衝突一會繩松石脫人便載沈載浮飄流水面即大聲呼救偶遇漁舟撈起始得上岸改換衣服拜謝漁人問明此地乃屬湘江已至韶州府城東矣急奔至曲江城中走訴縣令縣令以無所證驗斥之不理蕭含瑜氣填胸臆無可發泄搶地呼冤再控韶州府府尹梁伯鸞暗思寶林寺乃歷代名勝豈容有此姦僧立拘集僧衆並委員辨搜捕寺中果於復室內得婦女一百十八名梁府尹大怒切責縣令不理猶朔望日在寺中進香不已縣令惶恐謝罪請案鞫問梁府尹許之縣令回署將衆僧用重刑拷打一一供出婦女俱系布施入寺有慕清淨自願帶發修行者有慕富足者有戀年少沙彌不忍歸去者衆僧尚未供畢縣令已怒髮衝冠咬牙切齒令將長老拶起其餘以烙鐵火煆烙之一時叫苦連天始將婦女一一鞫問內有一婦頗具風格縣令好生面善尚未問及婦自陳乃東莞人姓沈名瑤枝即縣令昔年所買侍妾於中途逃去者也縣令滿面發赤雙目直瞪揮手令速杖斃餘者斷令歸家須本夫家主親身來領凡來領婦者無不笞責之蕭含瑜冤始白賞銀二百兩令歸樂昌勉以奮志下帷後蕭含瑜成名刺桂陽州當時縣令鞫清此案申詳府尹梁府尹分別首從如法處決又將寺中田産留五十畝另行招僧焚修餘盡入官可安撫窮民數百戶立時奏聞宋主旨下俞允正值刑部尚書韓昭由翔龍府按部至韶贊羡梁府尹此舉利國裕民甚愜人意梁府尹遂會同韓尚書將寺田逐一履勘深歎二萬餘頃沃壤從前徒為藏姦養蠹之用勘畢又至寺中韓尚書一見招提蘭若僭擬宮殿立命人拆毀其三分之二惟湘山殿乃寶林祖祠不在拆毀之數又將六祖肉身衣鉢等類舉火焚之一時煙焰並作空中若有人語曰深謝韓大人數百年明鏡無光今始得清淨化身矣頃刻間異香撲鼻梵音盈耳隱隱向西而去
