body:
  text: 第八十三回草四堆宋主掃墓余姚王生名勉字器之卓犖有大志而蹇於遇年三十猶蕭然四壁落魄不偶欲圖青雲而元人適罷科舉欲營什一以博升鬥則撫掌揶揄者適笑於其旁乃改業習小兒醫一月而殺三孺子皆豪貴家嬰兒幾罹不測急取其書毀之久而貧無卓錐乃投身典肆中傭作會計主管典肆翁以其有文名遂收之且厚其餼繼而典肆虧折肆翁急謝遣之王生大窘焦急欲死過府城五雲門見一鬼跋雷門上腳垂至地王生曰此防風鬼也聞琴聲則舞急取琴鼓之鬼端坐不動兩手掩耳示不欲聞王生歎曰時衰鬼弄此之謂矣棄琴而去竄至錢江忿極方欲踴身一躍偶見江幹一廟又轉念曰且到廟中自縊免致身葬魚腹王生覓得一索直入寺中仰視則伍大夫廟也泣拜於地曰將軍乞食吹蕭終有霸吳之日王勉沿門托鉢即是絶命之時何懵懵者天生人之不偶若是也哭訴一會取繩正欲自縊忽見神座下臥一物黑色蒙茸目閃爍有光一狐正在睡熟急收繩縛之狐自夢中驚醒作人語曰某狐仙也昨赴天臺醉歸經此少憩不意為君所縛君如釋某彼此有益王生戲問何以相謝狐曰使君巨富可乎王生貧寒如洗正中心病再問曰汝言戲否殆欲曳尾遁耳狐曰是人孤陋寡聞將為勤學死矣一富且不能致狐何以仙稱也生即釋之狐方起身少刻化一老翁鶴髮童顔唐巾儒服藹然可親重與王生敘禮二人邀入酒樓把盞傾心老翁談吐甚廣王生自謂不及因問致富之策老翁曰越人信鬼惟鬼道足以惑之會稽郡各處富民率多刻薄起家倚富壓貧我今擇其尤徑入其家拋磚引石打雞弄犬橫生怪異之病彼必請法師求符篆百俱不效君然後言能驅邪但書花押向空焚之我出此戶又入彼家不三月君之巨富成矣王生大喜稱謝又轉念曰此財似出非義翁何不更出一策老翁大笑曰此財雖不義而詭於義者也君猶欲守義將為溝壑死矣吾固言君獨學寡聞也王生亦笑許之老翁遂去未幾而會稽郡各處疫癘大作俱有鬼狐作祟遍請法師不能驅遣獨王生之符篆一至立即平安不閲月致數千金生乃市田産修房舍置奴僕而病者益衆求者愈廣一一應之儼成巨富暗思此儻來之物何必苦聚貽笑錢癖遂力行濟人利物之事不論巨細不限遠近無不被其恩沾其惠隨得隨用任意揮霍自此會稽各處王勉之名大噪一夕老翁忽至王生再三致謝曰翁再造全某之命此德當銘之五內沒世不忘老翁笑曰君今富矣復欲貴否王生笑曰人苦不自足既得隴復望蜀耶人亦孰不欲富貴但如翁者固欲富而即富矣豈欲貴而亦即貴乎老翁曰子非富中人乃貴中人耳生曰翁何以知之老翁曰子以不義之財作仗義之舉此念已超出尋常萬萬本處有現成之貴非子而誰王生驚曰目下之貴非採訪即選舉如此仕途容及王某也耶抑翁別有術致之耶老翁曰子靜待之不出旬日大貴至矣王生疑信參半老翁居其家未半月忽報宋主率同文武由閩中武都起駕越江右至會稽為南宋諸帝灑掃陵寢時宋元已和浙省平章脫脫早臨會稽預修地主之儀且説宋帝詔種世龍嶽燕超等輔太子監國自率范國昌司馬肅關普靈寇復雷大小文武十餘人幸會稽郡元平章脫脫率同浙省大小文武接入城越日駐蹕獅山之側屭湖之濱南宋諸帝陵寢帝一一謁拜俱各封護修理完好脫脫只候宋主禮意亦極殷勤而帝終以伐掘為恨脫脫奏曰此先帝所為外臣雖愚何敢直彰其惡帝怒曰平章以朕不能討平江浙耶一時關昔靈寇復雷等辭色甚厲二人昔日大鬧臨安此時正揚眉吐氣共誚讓之脫脫神色不撓徐對曰宋元既聯兄弟之好今一旦敗盟則曲直所在知者自能辨之即如陛下所雲上國有問罪之師寡君亦有禦敵之賦彼此反復辨難絶不少屈獨范國昌折之曰寡君為謁陵而來陵中虛實不獲周知寡君之羞也平章既作東道主陵骨一事不問平章寧入上都問上都乎果爾則宋元又兵連禍結啓釁之由恐平章責有難辭脫脫惶恐謝曰相國見諭責固難辭但君父之惡臣子何忍顯暴范國昌正色責之曰世祖所作諸惡薄海內外誰不知之寧待平章今日始顯著耶如不欲顯著則北朝皇帝不應三次遣使入宋議和矣為人臣者于君父有失能使之修德行仁痛改前愆方為忠孝若一味彌縫掩飾則愈掩愈彰矣脫脫拜伏曰非相國之言脫脫幾陷於罪矣帝謂之曰伐陵一事自于平章無與朕只欲得陵中詳細其他不過求也脫脫又奏曰伐陵乃至正二十二年間事迄今二十餘年陛下請駐蹕會稽容外臣訪之數日始回奏曰外臣當為陛下表賀稱幸帝問之脫脫奏曰聞當時伐陵此間好義之民潛取諸帝陵骨用別骨換之當時世祖所伐去者皆尋常骨也但不知諸帝陵骨義民等藏於何處耳帝聞之一悲一喜曰即求平章訪查陵骨下落脫脫不得已應命再至山陰會稽諸縣物色訪問並無人知蓋當時朱叟與村中諸父老已多年物故盜骨一事乃逆旨所為皆祕不敢言故至今無可訪尋脫脫甚悶三日後有餘姚王勉赴轅自言能識陵骨藏處脫脫大喜引見宋主帝問現在何處王勉俯伏奏曰小民有俚語獻上即日炎宋無辜元帝伐陵瘞玉何所視此冬青帝急問曰何謂冬青王勉復奏曰會稽蘭亭山原處處有冬青樹者其下皆陵骨所在也帝聞之立拜王勉為工部郎中作山陵使者命為前導帝與文武及元平章脫脫等即至冬青樹所一一掘之果然瘞骨其下帝見之大慟關普靈寇復雷目光如炬怒髮衝冠脫脫亦失聲歎曰先帝不仁至此極矣急令工人等重啓其陵開其隧脫脫親負一具宋臣文武亦皆負一具送入陵中安放妥貼復封其陵帝始陳設方物薦其鼎俎刑牲藉茅大展祭告帝悲悼不勝諸陵一封畢帝深德會稽昔年藏骨義民冬青所種處令封其樹勿使剪伐惜不知其人無可酬賞乃命會稽一郡免賦十載大宋代為完納其銀皆由武都輦至浙省交與平章務令民沾實惠勿使不肖官吏別生枝節帝又重賞脫脫不日發駕起行直回武都脫脫送出浙省界口始回道經會稽聞百姓頌德不已皆稱宋主為有道天子脫脫歎曰如此方是君人大體不圖先帝當日乃狂悖至此也王勉隨駕入朝遂仕于宋果中老翁之言而大貴而王勉每食必祝曰狐仙翁蓋其富也狐所致即其知陵骨在冬青下亦狐所指授也狐去時自言隱於天臺後遂不復至
