body:
  text: 第三十六回冤構冤萬俟蠣殺身卻説壽陽偽王秦錫帛聯合雲夢賈羽辛起兵聞賈羽辛攻下漢陽即命藍天蔚領兵一萬攻淮西邢士龍領兵一萬打安慶兩路進發賈羽辛亦引兵進襲蘄黃三處飛章告警報入燕京閣門大使奏聞世祖臨朝右相完澤出班奏曰前董文炳表稱壽陽賊起事數年兼有名號濠梁路梗陛下可即命宣撫使酌量各鎮移師進剿不可遲延世祖從之有禦史中丞崔彧請行省兼用招撫免致流民從賊黨與既衆剿殺愈難亦剪賊羽翼之一策也世祖不允荊湖宣慰使立智理威亦上章請恩威並用剿撫俱行得堅壁清野之法世祖曰此所謂養虎貽患者也見今賊勢囂張若不疾加迅掃恐淮南萬里將流毒靡涯矣卒用完澤之計旨下各省凡從賊者概行誅戮罔有攸赦時世祖年已七十有餘性仍強戾每事多遵蒙古舊制宏吉刺皇后專預朝政宰相樞密使不得見帝每事輒取決於後故江淮荊湖盜賊縱橫即奪去州郡猶不之知皇太子奇渥溫真金頗仁孝於至正二十二年已卒帝復昵群小日與狎客宮闈宣淫完澤等憂之行台侍禦史王暉作承華事略二十篇進獻世祖觀畢曰此腐儒之見也惟錢法令更造至元寶鈔頒行天下與中統交鈔並行以至元鈔一貫文值中統五貫文子母相權務使新舊互用江南諸路學田錢糧概用鈎考時又擬更律令方傳右丞何榮祖等改造新律忽近臣奏張景略殉節廣南陷沒六郡喪師七萬有餘軍將得歸者僅數人而已閩中江右兩不能進無功而退世祖方執筆在手大驚投筆於地曰壽春漢陽雖不足介意惟故宋素得人心借此號召舉事雲集回應大元宿將無人恐朝臣非其敵也令廣右衡湘緊把關隘待二賊平後更議征宋卻説安豐路宣撫使董文炳得旨即調淮安制置使石中孚領兵救淮西調京口都督彭悅領兵救安慶太平府都統耶律淵進兵襲濠梁一時三路起師合肥守將張知白正與藍天蔚相持石中孚兵至藍天蔚不能抵敵連戰皆北石中孚命張知白守護淮西自率兵長驅而進時秦開岐守鳳陽率兵登埤悉衆出戰藍天蔚已退至宿州三峽關會秦開岐接應兵至乃與石中孚大戰良久元兵少卻開岐正督兵進戰忽報耶律淵已攻破定遠宜速退不可戀戰石中孚乘勢大殺一陳敵兵死者甚衆藍天蔚死拒宿州石中孚日夜攻打不息忽耿星星樂螭二將兵至藍天蔚令速往協守鳳陽宿州不足慮也石中孚見攻打不下棄了宿州移兵靈壁縣一鼓破之藍天蔚大驚曰鳳陽前後俱失淮王若無重兵來援危矣石中孚竟不攻宿州與耶律淵合兵圍困鳳陽秦開岐本無技能惟令龐奮褚點耿星星樂螭日率烏合輪流出戰遇耶律淵石中孚二人俱是能將不貪野戰龐奮褚點相繼重傷而卒石中孚又箭中樂螭墜城而死造雲梯虹橋一擁上城耿星星忙率兵保護開岐等棄城走往宿州二將復了鳳陽石中孚謂耶律淵曰都統兵鎮風陽老夫還將宿州下之遂引兵復至宿州築長圍以困之城中漸次糧盡藍天蔚耿星星力不能支保護開岐潰圍而出遁回壽陽去了石中孚又復宿州分兵鎮守耶律淵即請石中孚權守鳳陽自率兵將往寧國曰兵貴神速乘破竹之勢數節後自迎刃而解矣領本部兵去訖且説秦錫帛聞淮西敗歸恐鳳陽有失急命耿星星樂螭領兵協助鳳陽猶放心不下又命張師旦兵屯紫金山自率大軍往應師未起行流星馬飛報鳳陽已失宿州告急錫帛大驚又報刑士龍攻打安慶不下退回泗州阻兵盱眙江京口都督彭悅奪廣德州去了錫帛一時見不是頭倉皇失措正欲命秦杞賈智深領兵速救廣德忽報宿州已失樂螭龐奮褚點等俱死寧國公已回入見錫帛咆哮大怒貶開岐公爵不準預事欲斬藍天蔚耿星星等有史獻白壽莫綏猷二人極力勸免始喝退二將當下萬俟蠣進曰漢陽許久不聞資訊恐未動兵坐觀成敗非聯盟之義也大王可遣使令速起兵牽制元師錫帛先令人探之則已被蘄州守將劉耀殺敗而歸兩處皆不能成功錫帛反失鳳陽十分忿怒不日惟廣德州報來京口都督彭悅敗回鎮江而去而寧國府又被太平都督耶律淵攻打垂危錫帛立命藍天蔚往救以萬俟蠣監軍星夜赴援孫虎死拒宣城以待援兵藍天蔚所部一到奮擊元兵孫虎亦從城內殺出耶律淵不能抵敵退五裏就宛溪下寨萬俟蠣與孫藍二將宣城會合大軍駐於城外靠定敬亭山以作聲援元兵既退設酒稱慶是夜萬俟蠣宿於帳中酒後悶悶寢不成寐方合眼忽刁鬥一聲旋又驚醒既而陰風透骨冷氣逼人恍惚間聞有人聲自遠而近呼曰萬俟蠣償我命來萬俟蠣睜眼視之見褒城劉友恭挺立面前手執利刃當心便刺萬侯蠣大叫一聲驚覺乃是一夢而心中鶻突猶隱痛不止自知不祥恐不利於出師不如託病請鎮廣德州權避此地次日飛奏偽主秦錫帛錫帛最重萬俟蠣善理錢糧較賈史二人尤加親任言無不從賈史二人嫉之錫帛既允萬俟蠣引兵一千赴廣德去訖藍天蔚即命孫虎守城自勒兵出戰元陳中健將裴金仙出馬不數合敗走追過敬亭山耶律淵一馬殺出麾動旌旗四下伏兵大起藍天蔚所部圍在垓心左沖右突奈元兵如銅牆鐵壁堅不可撼卻得孫虎引一支生力兵接應而出余兵奪路奔走自相踐踏元兵追至城下藍天蔚孫虎入城見城門已閉吊橋拽起城上皆元兵旗號蓋孫虎聞藍天蔚被圍引兵救應離城時元兵已賺入矣二將一見城陷拍馬回身思走南陵耶律淵追兵已到直取二將二將挺槍交戰不三合耶律淵手起刀落斬孫虎于馬下藍天蔚戀戰刺斜裏殺出保護殘兵直望南陵而走耶律淵復了寧國城中官吏仍復降元撫集餘衆不日征進且説壽陽偽王秦錫帛既貶開岐摘取印綬不與軍國重事勒令間居開岐頗懷怨望忿不朝參賈智深亦自負有創業起事之功與史獻白壽等不見寵異又曾與藍天蔚論功忿爭錫帛叱之心共怏怏萬俟蠣又每對錫帛言賈智深其心叵測錫帛性多猜忌小有不合輒科頭箕踞謾罵無禮既疑智深而復托以重任智深益橫肆驕恣每曰淮王非賈某能壽陽稱尊耶時智深已勢傾朝野會開岐有美妾娟娟者善歌舞有國色智深求之開岐不與遂誣以怨望謀反而復撼以危言激以他變兩相附會不由錫帛不信況錫帛本殘忍之徒又因失陷鳳陽豈無芥蒂立命下獄審問務得實供發落適萬俟蠣自廣德州回即命鞫之賈智深手書小紙付萬候蠣曰此事關參政一言務令得實不然淮王徒負殺兄之名參政有未便焉萬俟蠣不知原委拿出老法司鍛煉手提出開岐用重刑拷掠令招反情開岐無一撓辭萬俟蠣大怒喝令獄卒嚴加榜掠獄令用鐵蒺藜杵渾身拷打皮開肉綻體無完膚死去用水噴活又以檀木攢指旁立二人用杖敲擊然後以二人拿住攢指廝扭左扭右抵抵得開岐頭髮散亂指骨皆裂就地打滾恁般酷刑仍然不招萬俟蠣再命用繩重重縛定以紙糊其口燭之以火開岐渴極求飲以酒與醋灌之一時受刑不過五內俱裂大叫一聲七竅流血而死賈智深聞開岐已死命將奏棟秦橈二子棄市急令心腹往取娟娟娟娟聞之泣曰身非緑珠今日亦當為石季倫墜樓也投後園池中而死賈智深歎惜不已奏知錫帛錫帛問有何驗智深曰罷黜怨言謀為不軌事雖不明觀其事體皆莫須有也錫帛誤聽莫須有為莫綏猷大怒立命將莫綏猷斬之賈智深急奏事出於莫須有非參議莫綏猷也錫帛亦怒曰莫須有三字何以成獄賈智深曰大王先太師之決嶽少保固有是獄也錫帛見智深出語譏訕一時急焰中燒欲徹底根究再問智深智深以推萬俟蠣錫帛怒喚萬俟蠣問之萬俟蠣奏曰此大王意也錫帛未及答只見開岐妻梁氏攜幼子入見牽錫帛之衣而哭聲動左右錫帛問死時有何言語梁氏言惟指天誓日並無別詞錫帛氣填胸臆頓足大哭曰冤哉吾兄被賊奴所誤矣喝斬萬俟蠣萬俟蠣倉皇失措目視賈智深智深急諫曰萬俟蠣勘問此案縱然有罪乃奉大王鈞旨且理財有功亦當從寬恕宥錫帛怒氣不息廢黜不用以莫綏猷代其職莫綏猷此時一驚一喜深德賈智深不已錫帛明知此事乃賈智深伎倆然無可奈何命厚葬開岐優恤梁氏母子恩禮有加萬俟蠣出朝方知為賈智深所賣追悔無及離了壽陽將家小安置自思惟投故宋若得收録便慫恿兵伐淮南少泄吾憤從此當洗心滌慮痛改前非或可收之桑榆耳遂望合肥過洪都一日行至楓香驛旅邸投宿命主人具食主人設五著訝其太多主人曰客人時相隨數人客一人獨食耶萬俟蠣聞言毛髮皆豎挑燈獨坐終夕不敢安寢耳畔每聞涕泣聲長歎聲號呼索命聲未及天明倉皇遁去至一山峪間時曉色蒙迷見樹木翳天不辨遠近信步而行忽林中一聲鳴鏑奔出數人一把擒住萬俟蠣萬俟蠣忙將橐中資斧雙手獻上擒者曰我等非圖財寶未敢專決且見將軍自有定奪隨將萬俟蠣綁縛押至一處見有營帳少時三通鼓罷衆邏卒稟知鷹抓燕拿而進帳中一少年將軍憑幾危坐萬俟蠣看時好生面善那將軍一見愕然起身覷定再三審視忽問曰汝非陽武縣之萬俟蠣耶萬俟蠣尚未答應將軍又問曰汝非任褒城縣令之萬俟蠣耶萬俟蠣聞褒城二字自思今番死矣結舌不敢答應將軍掀案大怒喝令夾起只見軍士拔出利刃將萬俟蠣兩足心兩手心各刺一隙用繩穿定始將三木套上以轆轤轉輪霎時便撑起丈餘萬俟蠣生平慣用非刑決囚的老辣手並無此法今日一見屁滾尿流慌忙説招軍士已撑將起去魂魄俱無四肘愈穿愈裂三木越夾越緊不等追問已將如何任褒城如何走壽春本末始終毫不敢隱但一面説話一面呼疼口中語眼中淚兩俱滔滔不絶説畢放下暈絶在地水沃復蘇用手輕摸四處方知夾棍如此利害問左右曰某頭還在否左右不理誰知少年將軍即褒城劉友恭之子劉遇隆已仕元至指揮調守安慶因藍天蔚兵退仍屯兵隘口令邏卒四下巡綽防有姦細萬俟蠣端端至宿松縣沖入網中事豈偶然當下劉遇隆謂軍校曰此賊與某不共戴天今又投入壽陽為國大患不可以常刑處也當寸寸磔之為國除害並為褒城人士少泄冤忿軍校皆曰遵指揮令萬俟蠣聞言魂不附體劉遇隆隨于營中設香案澆酒焚帛泣告其父之靈始將萬俟蠣綁出轅門萬俟蠣已昏憒不省忽睜眼一視見持刀者乃少年劊子酷似當年褒城屈死之偷瓜賊也始自歎曰萬俟蠣汝生平惡貫已盈今日始死亦雲幸矣眼睜睜覷著劊子剁其四肢鈎其舌剜其心又將抉其目斷其首忽後面一人用手托住回視之秦開岐也忙掉頭一視已身首異處矣劉遇隆令將其尸寸磔之籲天道好還誰謂蒼蒼者憒憤乎哉
