body:
  text: 第八回鍾明亮入寇藍關卻説故宋右丞相陳宜中航海時逃竄占城數年聞故宋已為煨燼自思從此不為名分所屬矣然占城與廣南音息可通又慮有故國父老相遇且占城國王不以禮相待自知在此難免非笑以相臣而供人口實內顧五色棄了家室更往暹羅事非偶然端端涪陵三人亦由真臘至此相遇敘及國事陳宜中始言衛王赴海而死陸秀夫張世態並馬南寶等俱在崖山殉節涪陵放聲大哭望著廣南呼天搶地淚盡繼之以血二馬尤悲悼其父自不待言涪陵撫膺欲絶宜中方欲勸止涪陵憤泣曰祖宗養士三百年國亡始得數人之報使在廷盡如信公越公諸人國不亡矣宜中大慚而退遂起謀害之意時有王霖者故宋浙東安撫也恭宗時逃位至此仕于暹羅一日宜中相遇談及故國亦甚扼腕繼言語涉公趙晟在此語涉譏刺俱有不安宜中惱羞成怒曰德祐元年右相之命宜中在溫州以母老乞養力辭誥命公所知也洎太后以書達老母命宜中就任宜中所迫者母命耳國運興亡自關天命何得波及群臣也涪陵孺子素與宜中抵牾今日相遇已無名分尚猶誚讓我等其生死可在掌握中也王霖問計宜中曰元主平定西夏四十余國海外諸邦誰不震恐令國王稽查國中拿獲趙氏苗裔一語便了卻涪陵孺子王霖自知不便啓奏令大夫共輦奏之國王亦慮蒙古強暴遂允其旨命巡城金吾嚴查得實械赴免貢涪陵一日在城聞此風聲也不顧馬氏兄弟望城西出走西竄數十餘裏力已困乏足酸腹餒一望荒島並無鳥聲回視海水滾滾東流煙波汨沒浩渺綿亙不如所止呼天號泣仍然蒼蒼冥冥就岸近一石磯坐定淚如泉湧自言自語謂近廣諸國或可探聽音息誰知反入虎口自顧此境正合昔日道君皇帝北狩時在五國城吟雲杳杳神京路八千宗祧隔越已千年衰殘病弱哪能久辛苦窮荒敢怨天淒切之音動于林木欲蹈海自盡則流水無知亦徒以萬傾於波作一壞三尺無可奈何仍復起身顛躓沿岸而走忽見滿山遍地皆黑漆匙筋仰視其處多連抱大木匙筋乃木之花與須也不暇掇拾約行十餘裏至一水澳見一人碧眼蜷須徐步而來急上前哭訴以被陷異域之故其人曰君中土人也年甫冠儀錶不凡非青宮之貴介即侯門之世裔也保毋別情乎涪陵不能隱諱以實告其人愀然曰是可憫也吾送汝竟回廣南何如涪陵泣拜曰固所願也其人遲疑一會又曰廣南近不可歸吾本欲赴東海且隨吾往或近閩浙等處暫居異日方可回歸涪陵恐至諸國又如暹羅其人曰且往見機而行遂同至一處招得一舟隨風飄去其人訝曰汝身有何珠寶涪陵出定風珠示之其人曰此拘彌國産也亦名履水珠入水不溺謹密佩藏汝國中稀世之珍也其人食用諸物隨身俱備涪陵十分感戴又其人喜浴浴後蹲坐艙中以伴涪陵但不多言笑一日其人在舟中遙指隱隱青翠處謂曰此日本國之薩摩洲也汝可即在日本權住異日得志勿相忘也言訖淚如雨下涪陵大哭曰恩人使入湯之禽再假羽毛已斷之足復蒙接續所謂群蟄應南山之雷窮鱗得西江之水也恩重如山安忍相負收淚方欲叩謝忽見足下晶光錯落粒粒皆是明珠蓋其人之淚也驚駭久之其人手出一帕拾取承之盈千纍萬眼中尚撲簌簌不止以賜涪陵曰吾南海之鮫人也將往赤城市綃值汝悽愴於此偶然相遇亦夙緣耳汝得此珠不慮資斧前途保重吾往矣恐誤吾海市也送至岸所一躍入海而沒涪陵驚訝不已上岸至薩摩洲一味言語全然不通衣服甚是藍縷土人見涪陵大異之無論老者少者妍者媸者俱前圍繞驚視見涪陵衣服意若羡之涪陵心憐其人各與鮫珠一粒土人大喜喃喃不知何語交臂若作謝狀出以飲食俱難適口涪陵在此日日揣音聲察顔色稍得其似時懷故土望洋而悲間觸景物破泣而笑又土人群處偶有不合便有持刀槍廝殺性命不顧難分難解而涪陵一至隨即斂手蓋心敬之也一日土人有赴國者約涪陵共往欣然同之土人心德涪陵欲達於朝不日至其國涪陵視人物詭異面如鍋底口若血盆紅發赤須鈴眼露齒三分似人七分似鬼剽悍暴戾素性好殺無他執業專一沿海為寇生活涪陵初至心甚畏怖恐其或噬人也然國人甚敬禮之其國濱海所控山島九百餘裏以木作棚為城倚山為宮室近郭五十裏有一山曰靈芝山國之鎮山也山産紫玉並獨搖芝草此草無風自動莖大如手指赤如丹絲其葉似莧而闊有細實如雞子十二枚繞其四方按十二辰也所産之地左右無草國之南有水仙樹樹中有水謂之仙漿飲之醉至七日又出寶馬曰飛風輦日行千里出楓葉之魚所産異物不可勝數國王名坦呢哩特布號老王子頗能治國撫下用人俱得其宜聞蒙古並了中夏心中老大不忿曰中原皇帝乃天上人為之豈爾韃靼所能統馭也耶竟不納貢亦不上表稱賀每謂臣下言蒙古能滅西夏四十余國未遇敵手惜宋室乃正朔所在一旦殄滅蒙古之勢張矣一日有部下紇搭大夫奏曰今有故宋趙涪陵在此乞大王禮之王大喜即以賓禮請見涪陵遜謝起居國王慰問甚至且曰下國離中土萬有四千余裏隋開皇時始通中國大宋仁宗皇帝天聖年間孤先王聞知中國出了聖人親自入貢迄今與上國暌違又數世矣不擇鄙陋即請權住日本與孤同參國政豈不美哉涪陵見國王禮意殷勤遂安心住於日本不提再説廣南巨寇姓鍾名明亮長樂人氏聚衆數千有蘇州朱賁石城童乂東管耿星星東光張師旦等輔之內惟張師旦頗有謀略能出計劃耿星星勇冠三軍昔年落魄江湖投宿一古寺中遇群盜與寺僧合謀劫一大姓適耿入寺慮泄其機僧與群盜起以利刃迫之耿大怒將寺中銅鍾一口用手輕輕托起以示威猛群盜攝伏不敢犯寺僧速供食寢謝過而止殊盜衆見耿衝破其綱夜半相約欲負寺中韋馱天尊而去天尊系銅所鑄其值不下百緡奈重甚剛剛轉動仆身便倒天尊護杵二指適將一盜貫心而死大震一聲盜衆盡散寺僧驚起一見駭異數人不能扛耿上前以雙手挽起仍安置如舊面不改色氣不喘息寺僧拜伏于地謝曰僧等今後再不與群盜伍矣耿不顧天明竟去一日遊至海豐縣見縣尉率無數兵役追獲鍾明亮甚急明亮大窘無處逃竄耿不忿披靡直入奪其兵器而舞獨擋兵役衆皆辟易明亮以是得免及明亮大舉攻陷南雄府始興等縣耿千里來歸明亮大喜與張師旦二人俱任心腹爪牙旬日又招得李虓章王同曹順曹能等隨添無數人馬師旦臨陳用金人鐵浮圖之法練成牙兵身披重鎧頭戴鐵兜鍪周匝綴以長簷三人為伍貫以韋索每進一步即用以拒馬更翼以弓石有進無進果然摧堅陷陳鋭不可擋又拔長寧龍川等縣惠州震恐直窺潮陽時潮州府總兵姓狄名定國汾州人廣南參政以狄氏為南人所畏服潮州近海盜出無常定國素有威望奏授此職駐師潮陽靜鎮海道時聞賊已猖撅統兵守住藍關控制要害鍾明亮叩關討戰定國下令曰鋭氣方張不可與戰俟其糧盡引還擊之可獲全勝命關上多設炮座安布弩床以老其師明亮等無可如何大掠關下潮洲人民前經元師殘虐後瘡痍未復又遭此翻蹂躪九死一生明亮一日退兵十裏定國不出又退十裏定國不追直退至五十裏外定國仍置之不理忽報海道有數百艘賊兵上岸徑奔潮陽定國始驚令其子狄勇緊守藍關自提兵往策應潮州剛至韓山與賊兵相遇兩軍各列陳勢耿星星躍馬綽刀而出定國挺槍迎住二人大戰八十餘合勝負未分定國暗晾賊將驍勇當以回馬槍殺之忽賊隊中喊聲起處李虓章王同一齊衝殺過來鐵浮圖之兵勢如潮湧將元兵沖為數段求援不及三軍大亂棄甲拋戈而走定國虛掩一槍棄了賊將速奔潮州恰至城下見敵樓上遍插旗幟悉是賊號張師旦扶檻按劍言曰吾已取潮州多時了定國大怒攻城箭如雨下定國無奈率兵退保饒平以圖恢復
