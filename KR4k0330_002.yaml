body:
  text: 第二回程廉訪招賢納士元世祖平宋後宗室大臣族姓概行遷於內地凡台省諸職間用南人惟禦史台按察司等官不用南人又制江南人為十等一官二吏先之者貴之也貴之者謂有益於國也七匠八娼九儒十丐後之者賤之也賤之者謂無益于國也嗟乎以儒者而屈乎娼之下丐之上聞者尚猶羞之矧當時有志之士肯立於其朝乎至是禦史程文海奏曰陛下掃平區宇中國之天下須參用中國人則風土人情悉得其宜如禦史台按察司乃采風問俗之職江南等處風土非南人不諳也且江南為故宋人物薈萃之地今宜設各道廉訪使博采知名之士朝廷充用天下可不勞而定矣況陛下詔書崇奉釋教停罷科舉非採訪何由得知世祖允奏即命程文海為江南廉訪使拜集賢直學士兼侍禦史行禦史台事文海得旨一至江南令人訪求留夢炎趙孟俯二人至謂之曰當今大元天子側席求賢文海故有是命二公抱經邦濟世之才與草木同朽是明月之珠夜光之璧季諸道塗矣二公若能以昔日事宋者改而事元或可稍展驥足耳二人齊聲曰亡國之大夫不足與圖存某等猥以庸質深荷採訪薦舉若肯垂手引援身立治朝得以尺寸自效固所願也文海大喜給與誥身二人叩首謝命薦人燕京俱用為翰林承旨留夢炎謝表有雲使伏櫪駑蹇布騏驥而蹀足竄迹翩翎排鴛鴦而刷羽又雲分其鬥米濟濡沫之枯鱗惠以餘光照芃棲之寒女趙孟俯亦用杜牧之語書奇文海雲泛大鯨之海每覺魂搖戴巨鼇之山未如恩重甚至有雲惠深范叔綈袍贈榮過蘇春佩印歸嗚呼二人之求仕如此其亟也文海隨又訪求趙孟適張伯淳葉李二十餘人薦之於朝內中惟謝枋得逃去不就余者世祖擢居顯要皆大用之當時臨安有一衣錦山山之東峰天生一片圓石徑二尺七寸其光可鑒人影毫髮不爽五代錢謬幼時遊玩至此自顧其形皆冠冕黼黻如王者狀繼後唐昭宗皇帝因封錢謬所居營為衣錦營又升為衣錦城並封此山為衣錦山程文海採訪江南時將過浙江恰好山中有二名士一姓范名國昌汝南人也一復姓司馬名肅河內人也因避宋末之亂相遇於平江各訴衷曲志同道合相約共隱及元兵北去二人曰聞臨安大好山水曷往杭州一者不忘故國二者得玩湖山佳麗遂至城東買山為終焉之計二人每於月下星前促膝談心間及國事未嘗不潸然流涕也或時蕩舟西湖或時散步葛嶺或時招涼蘇公堤上或時選勝靈隱寺中一觴一詠凡飛來峰小孤山諸處名勝招之可到但題詠時出口無非乾坤有象家何在江漢無情水自流其時地使之然也一日又聞元主命程禦史訪求江南人才留夢炎趙孟俯俱薦入燕已得位矣二人大慟曰生死事小廉恥事大人之無良一至於此蒙古江南十等之制儒宗掃地矣矧宗藩舊相忍覘顔於其朝哉此間密邇杭城徵聘來時不惟羞殺故國之父老亦且有玷舊國之山川也收拾琴書往蘇松別求名勝而去二人在途不時感歎國昌唱然曰風景不殊舉目有山河之異吾與兄寧終作楚囚泣耶司馬肅亦歎曰胡元雖混一中國然觀道途情形舉目皇皇人心未定草澤中若有英雄崛起扶持顛危天下事未可知也二人安步當車緩緩而行非止一日忽見一關范國昌訝曰此獨松關也屬蘇州吳江縣所轄方欲進關見把關軍士圍著許多車馬與二少年壯士廝打二少年全無懼怯赤手空拳施逞威風衆軍士俱披靡莫當遠遠圍定大嚷曰過關常例俱有明文乃大元天子所設爾恃強違例賣弄本事欺藐國法稟見關主定奪爾能插翅飛否二人方知就裏上前排解代給常例可笑作怪軍土便不語了二少年猶忿怒不息大罵酋虜作法自斃某若得志誓將汝等羯賊逐出斡難河外方泄吾憤二公上前急掩其口代為謝過擁著車馬一同過關少時隨後一人打馬揚鞭而來相貌堂堂氣宇不凡一見二公滾鞍下馬稱謝曰孺子輩無禮深荷二賢土解紛今晚逆旅請同下榻一敘可乎二公心知其為少年父也暗奇其人許之行不數武則二少年已只候於客舍中矣三人一同入邸坐定各陳姓名其人自言雲中馬邑人氏姓嶽名燕超二子嶽鎮嶽坤世居山後農耕為業惟高曾以上名勝者景德樣符間曾任三關總制兵馬使兼團練使之職餘俱不顯宋末窩坦台陷沒雲中避亂東京再遷會稽山陰近聞元主設各道廉訪使訪求人才某見江浙被程禦史薦入燕京者甚多故今移家遠徙某觀二公行色高視闊步毋乃亦此意乎二人聽罷啞然而笑曰智者所見略同哉共剖心腹如出一轍燕超曰某以武人尚不忍見故宮之禾黍彼留趙諸人豈無人心者范國昌浩然歎曰冠履倒置如斯為盛囚首虜廷身是故宋遺老中原從此無名分矣司馬肅曰蒙古滅天毀聖停罷科舉故設採訪之官然崇尚西僧已三綱殄絶又求人才前後自相矛盾滿廷髡禿雜以縉紳彼非求治乃欲羞殺儒者也范國昌曰蒙古放梟囚鳳不齒儒者然儒者席上之珍其貴自見蒙古何知不足語此是非九方臯焉能賞識於牝牡驪黃外哉惟滅天毀聖擢發不足以數其罪也燕超忽然觸著滅天貶聖一事不覺髮指一時酒後耳熱拔劍起舞復長吟雲獵獵北風吹倒人乾坤無處不生塵胡兒凍死長城下始信江南別有春范國昌亦向臨安釃酒吟曰國破山河在人非殿宇空中原何日事搔首賦車攻司馬肅慨然歎曰留夢炎在宋為狀元宰相富貴可謂極矣不守節義並不知進退者也亦成一律曰黃犬東門事已非華亭鶴唳漫思歸直須死後方回首誰肯生前便拂衣此日區區求適志他年往往見知機不須更説蓴鱸美但在松江水亦肥三人促膝達旦竟成莫逆國昌叩其二子俱年方弱冠且武略精通言談之間意氣自豪燕超叱之曰孺子在家專務弓馬未嘗學問既見長者理宜肅玲德誨多識之無為是二公起謝稱賞不已次日作別燕超曰某在東京有二契友韓靖夏高耀卿耀卿乃渤海世胄宋末時不屑進取隱身博徒賦性豪邁最尚任俠家資百萬揮灑如土韓靖夏乃延安人氏曾為東京留守司統制因見賈似道專權誤國棄官而去二人與某訂交最深分手時相約異日當會於閩廣間不知二兄異日亦可於閩廣間得相遇否二人一齊言雞黍之約千里不爽各宜努力皓首為期因問燕超何適燕超曰某今日猶飄萍轉蓬行蹤靡定然男子仗劍樽酒間四海皆吾家也且過廣陵再定行止燕超遂向維揚進發二人亦投松江而去
